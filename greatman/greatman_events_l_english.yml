l_english:

 joi_great_man.1.t: "Lord Kelvin"
 joi_great_man.1.d: "William Thomson, 1st Baron Kelvin, the eminent Glasgow University physicist who established the absolute temperature scale that bears his name."
 joi_great_man.1.f: "\"When you can measure what you are speaking about, and express it in numbers, you know something about it.\" - His famous dictum on scientific measurement."
 joi_great_man.1.a: "Appoint him to head the National Physics Laboratory"
 joi_great_man.1.b: "Fund research into thermodynamic systems"
 joi_great_man.2.t: "Michael Faraday"
 joi_great_man.2.d: "The self-taught scientist who discovered electromagnetic induction and laid the groundwork for electric motor technology."
 joi_great_man.2.f: "\"The important thing is to know how to take all things quietly.\" - Reflecting on his humble origins and revolutionary discoveries."
 joi_great_man.2.a: "Establish the Faraday Institute for Electrical Engineering"
 joi_great_man.2.b: "Invest in prototype dynamo development"
 joi_great_man.3.t: "On the Origin of Species"
 joi_great_man.3.d: "Charles Darwin's seminal 1859 work introducing the theory of evolution by natural selection."
 joi_great_man.3.f: "\"There is grandeur in this view of life... from so simple a beginning endless forms most beautiful have been, and are being, evolved.\""
 joi_great_man.3.a: "Ban this dangerous heresy!"
 joi_great_man.3.b: "Fund evolutionary biology research"
 joi_great_man.4.t: "Dr. David Livingstone"
 joi_great_man.4.d: "The Scottish missionary-explorer who mapped vast regions of Africa and 'discovered' Victoria Falls in 1855."
 joi_great_man.4.f: "\"I will place no value on anything I have or may possess except in relation to the kingdom of Christ.\" - His journal entry during the Zambezi expedition."
 joi_great_man.4.a: "Sponsor further African expeditions"
 joi_great_man.5.t: "Luke Howard"
 joi_great_man.5.d: "The 'Father of Meteorology' who developed the modern cloud classification system (cirrus, cumulus, etc.) in 1802."
 joi_great_man.5.f: "\"Clouds are subject to certain distinct modifications...\" - From his Essay on the Modification of Clouds."
 joi_great_man.5.a: "Establish national weather observatories"
 joi_great_man.6.t: "Sir Alexander Fleming"
 joi_great_man.6.d: "The bacteriologist who discovered penicillin in 1928, revolutionizing treatment of bacterial infections."
 joi_great_man.6.f: "\"One sometimes finds what one is not looking for.\" - On his accidental discovery of penicillin."
 joi_great_man.6.a: "Mass-produce this miracle drug"
 joi_great_man.7.t: "James Prescott Joule"
 joi_great_man.7.d: "The brewer-turned-physicist who discovered the mechanical equivalent of heat, establishing the foundation of thermodynamics."
 joi_great_man.7.f: "\"The grand agents of nature are indestructible.\" - His conclusion on energy conservation."
 joi_great_man.7.a: "Collaborate with Lord Kelvin"
 joi_great_man.7.b: "Apply to steam engine design"
 joi_great_man.8.t: "Charlotte Brontë"
 joi_great_man.8.d: "Author of Jane Eyre (1847), whose revolutionary feminist protagonist challenged Victorian social norms."
 joi_great_man.8.f: "\"I am no bird; and no net ensnares me: I am a free human being with an independent will.\" - Jane Eyre's declaration of independence."
 joi_great_man.8.a: "Censor this improper novel"
 joi_great_man.8.b: "Celebrate this literary masterpiece"
 joi_great_man.9.t: "George Eliot (Mary Ann Evans)"
 joi_great_man.9.d: "The pioneering female novelist who wrote Middlemarch (1871-72), considered one of the greatest English novels."
 joi_great_man.9.f: "\"It is never too late to be what you might have been.\" - From her final novel Daniel Deronda."
 joi_great_man.9.a: "Promote rural realism in literature"
 joi_great_man.9.b: "Study her moral philosophy"
 joi_great_man.10.t: "Thomas Carlyle"
 joi_great_man.10.d: "The Scottish philosopher whose Latter-Day Pamphlets (1850) critiqued industrial society and 'pig philosophy'."
 joi_great_man.10.f: "\"Cash payment is not the sole relation of human beings.\" - His critique of utilitarian economics."
 joi_great_man.10.a: "Suppress these radical ideas"
 joi_great_man.10.b: "Consider his social critiques"
 joi_great_man.11.t: "Ralph Waldo Emerson"
 joi_great_man.11.d: "Leader of the Transcendentalist movement who championed individualism in Nature (1836) and other essays."
 joi_great_man.11.f: "\"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.\""
 joi_great_man.11.a: "Embrace self-reliance"
 joi_great_man.11.b: "Reject this American idealism"
 joi_great_man.12.t: "Walden"
 joi_great_man.12.d: "Henry David Thoreau's 1854 meditation on simple living in natural surroundings at Walden Pond."
 joi_great_man.12.f: "\"I went to the woods because I wished to live deliberately...\" - The iconic opening of Walden."
 joi_great_man.12.a: "Dismiss as eccentric nonsense"
 joi_great_man.13.t: "Civil Disobedience"
 joi_great_man.13.d: "Thoreau's 1849 essay arguing moral obligation to resist unjust laws, influencing Gandhi and King."
 joi_great_man.13.f: "\"Under a government which imprisons any unjustly, the true place for a just man is also a prison.\""
 joi_great_man.13.a: "Suppress this dangerous text"
 joi_great_man.14.t: "Principles of Economics"
 joi_great_man.14.d: "Alfred Marshall's 1890 foundational neoclassical economics text introducing concepts like price elasticity."
 joi_great_man.14.f: "\"Economics is a study of mankind in the ordinary business of life.\" - His definition of the discipline."
 joi_great_man.14.a: "Implement his economic theories"
 joi_great_man.14.b: "Fund economic research"
 joi_great_man.15.t: "On Liberty"
 joi_great_man.15.d: "J.S. Mill's 1859 philosophical defense of individual freedom against state coercion."
 joi_great_man.15.f: "\"The only purpose for which power can be rightfully exercised over any member of a civilized community... is to prevent harm to others.\""
 joi_great_man.15.a: "Adopt liberal reforms"
 joi_great_man.16.t: "Friedrich Nietzsche"
 joi_great_man.16.d: "The German philosopher who proclaimed 'God is dead' and developed concepts of the Übermensch and will to power."
 joi_great_man.16.f: "\"He who has a why to live can bear almost any how.\" - From Twilight of the Idols (1889)."
 joi_great_man.16.a: "Condemn this nihilism"
 joi_great_man.16.b: "Study his existential philosophy"
 joi_great_man.17.t: "Carl Friedrich Gauss"
 joi_great_man.17.d: "The 'Prince of Mathematicians' whose 1801 Disquisitiones Arithmeticae founded modern number theory."
 joi_great_man.17.f: "\"Mathematics is the queen of the sciences.\" - His famous maxim about the discipline."
 joi_great_man.17.a: "Establish mathematics institutes"
 joi_great_man.17.b: "Apply this to telegraphy research"
 joi_great_man.18.t: "Georg Ohm"
 joi_great_man.18.d: "The physicist who formulated Ohm's Law (1827) describing the relationship between voltage, current and resistance."
 joi_great_man.18.f: "\"The theory I have developed is based on experimental evidence...\" - From his seminal paper on electrical circuits."
 joi_great_man.18.a: "Standardize electrical units"
 joi_great_man.18.b: "Develop electrical infrastructure"
 joi_great_man.19.t: "Joseph König"
 joi_great_man.19.d: "The German chemist who pioneered food chemistry analysis methods in the late 19th century."
 joi_great_man.19.f: "\"Precise measurement is the foundation of nutritional science.\" - From his chemical analysis manuals."
 joi_great_man.19.a: "Implement food safety standards"
 joi_great_man.19.b: "Patent analysis methods"
 joi_great_man.20.t: "Siemens Cycle"
 joi_great_man.20.d: "The Siemens brothers' development of regenerative heating for industrial furnaces in the 1850s."
 joi_great_man.20.f: "\"Waste not the smallest thing created, for grains of sand make mountains.\" - His engineering philosophy."
 joi_great_man.20.a: "Adopt for steel production"
 joi_great_man.20.b: "Develop internal combustion engines"
 joi_great_man.21.t: "Alfred Krupp"
 joi_great_man.21.d: "The 'Cannon King' whose steelworks pioneered breech-loading artillery and industrial vertical integration."
 joi_great_man.21.f: "\"Only quality endures.\" - The Krupp company motto since 1812."
 joi_great_man.21.a: "Modernize artillery corps"
 joi_great_man.21.b: "Mass-produce steel cannons"
 joi_great_man.22.t: "Amanda Jones"
 joi_great_man.22.d: "The feminist inventor who developed vacuum canning in 1872, revolutionizing food preservation."
 joi_great_man.22.f: "\"The world is moving, and women must move with it.\" - Her advocacy for women inventors."
 joi_great_man.22.a: "Implement for military provisions"
