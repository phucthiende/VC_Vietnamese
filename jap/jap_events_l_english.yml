l_english:

 joi_flavor_jap.1.t: "The [ROOT.Var('emperor_var').GetCharacter.GetFirstName] Restoration"
 joi_flavor_jap.1.d: "The [GetLawType('law_bakufu').GetName] has fallen from power, and [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] has restored the political primacy of the monarchy. This momentous occasion marks the end of centuries of military rule in #v $JAP$#!, and heralds a new era of modernization and reform. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must choose [ROOT.GetCountry.GetRuler.GetHerHis] political allies carefully."
 joi_flavor_jap.1.f: "The former Shōgun bows with respect and shame as he hands over his residence and seat of power, the mighty Edo Castle, to the restored Emperor. Renovations are set to begin at once; the old castle to be replaced by a glorious Imperial Palace. Though the exterior will appear much the same as the former imperial residence in Kyoto, the Emperor plans to combine Japan's rich decorative traditions with strange Western fashions. A metaphor, perhaps, for the future shape of Japan."
 joi_flavor_jap.1.a: "It is always wise to proceed with caution."
 joi_flavor_jap.1.b: "The pace of reform must advance in great strides!"
 joi_flavor_jap.1.c: "The Restorationists shall transform the entire nation anew!"

 joi_flavor_jap.2.t: "Kōbu Gattai (Union of Court and Shogunate)"
 joi_flavor_jap.2.d: "With anti-bakufu factions in retreat, Shōgun [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] of the Tokugawa [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] has united the nation's [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] to crush rebellion in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], securing the Imperial Palace and consolidating power."
 joi_flavor_jap.2.f: "\"I expected him to charge gloriously at Osaka, yet he arrived late—never even glimpsing enemy banners. Such indolence! Even between father and son, suspicion grows. What plots occupy the Shōgun's mind?\"\n\n\"Though the Shōgun departs, never forget bushido. Guard this land eternally; your service to the Emperor ends only with death.\""
 joi_flavor_jap.2.a: "As for centuries, court nobles and military houses shall rule jointly."
 joi_flavor_jap.2.b: "These restorationists must be eradicated!"

 joi_flavor_jap.3.t: "Ansei Five-Power Treaties"
 joi_flavor_jap.3.d: "Fleets from [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName], [SCOPE.sCountry('NET_scope').GetName], and [SCOPE.sCountry('RUS_scope').GetName] have anchored near Kyoto, coercing the Emperor to ratify treaties granting foreigners trade privileges."
 joi_flavor_jap.3.f: "\"Nagasaki and Hakodate shall open for ship repairs and provisioning. Only vessels in distress may enter other ports without [ROOT.GetCountry.GetName]'s permission.\"\n\n\"Foreign ships in our ports obey Japanese law. Violations by officers shall close harbors; by crew, they face their captains' justice.\"\n\n\"All open ports shall grant equal privileges to every foreign power, matching those long held by the Dutch and Chinese.\""
 joi_flavor_jap.3.a: "This opening shall mark a turning point in [ROOT.GetCountry.GetName]'s policy!"

 joi_flavor_jap.4.t: "Western Learning?"
 joi_flavor_jap.4.d: "As rangaku (Dutch studies) spreads Western technology, its adherents increasingly debate [ROOT.GetCountry.GetName]'s policies. Many argue Westernization strengthens Japan—a view fiercely opposed by the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]."
 joi_flavor_jap.4.f: "With the ban on Dutch books lifted, tens of thousands circulate freely. Foreign experts teach in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], while our artisans replicate steamships and engines. Western envoys marvel that [ROOT.GetCountry.GetName] now rivals the most advanced nations."
 joi_flavor_jap.4.a: "Throw open the doors—we must Westernize completely!"
 joi_flavor_jap.4.b: "These novelties are fleeting—our traditions endure."

 joi_flavor_jap.5.t: "Tenpō Reforms"
 joi_flavor_jap.5.d: "The decade-long Great Tenpō Famine has ended, but its scars remain. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] resigns in disgrace, while his successor proposes economic reforms to restore Kyōhō-era prosperity and prevent future disasters."
 joi_flavor_jap.5.f: "\"They say a state without nine years' reserve is deficient; without six, reckless; without three, no state at all. Though eras change, the virtuous now despair.\""
 joi_flavor_jap.5.a: "No measures are needed—this famine was an anomaly."
 joi_flavor_jap.5.b: "Reforms must prevent such calamities."

 joi_flavor_jap.6.t: "Sonnō Jōi (Revere the Emperor, Expel the Barbarians)"
 joi_flavor_jap.6.d: "As the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]'s failures mount, anti-shogunate sentiment spreads through [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], blaming foreigners for [ROOT.GetCountry.GetName]'s woes and exalting the Emperor."
 joi_flavor_jap.6.f: "\"Two million years of unbroken imperial lineage—from the Age of Gods to Emperor Jimmu's reign 2,300 years ago—the sacred bloodline endures unchanged.\""
 joi_flavor_jap.6.a: "The Shōgun rules by the Emperor's mandate."
 joi_flavor_jap.6.b: "Expel the barbarians—long live the Emperor!"

 joi_flavor_jap.7.t: "Mito Rōnin Assassination"
 joi_flavor_jap.7.d: "Loyalist rōnin, outraged by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s policies, have wounded pro-shogunate minister [SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] [SCOPE.sCharacter('shogunate_ig_minister').GetLastName] in a failed assassination. The perpetrators are captured."
 joi_flavor_jap.7.f: "\"After the attack, [SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] languished, submitted his succession documents, and perished.\"\n\n\"A good duck isn't netted—it's palanquined. The frugal sick need no pillows; the dying write wills with their buttocks... The Shōgun orders ginseng executions; samurai avenge Tokugawa's flesh.\""
 joi_flavor_jap.7.a: "An unlucky minister—these amateurs bungled it."
 joi_flavor_jap.7.b: "Execute these traitors who defy the Shōgun!"

 joi_flavor_jap.8.t: "Jōi Imperial Campaign"
 joi_flavor_jap.8.d: "As jōi sentiment grows, Emperor [ROOT.GetCountry.GetRuler.GetFirstName] bypasses [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName], secretly ordering Nagasaki's daimyo via #V loyalist cell 'Tenchūgumi'#! to expel foreigners and reform the shogunate."
 joi_flavor_jap.8.f: "\"The recent treaties' envoys have reached [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. As this conflicts with the Shōgun's will, I ask: How can you, as stewards of the realm, tolerate such self-abasement?\"\n\n\"While invaders threaten and other domains pledge unity, this house—its samurai, its generations—stands resolved.\""
 joi_flavor_jap.8.a: "The Emperor's decree must be proclaimed nationwide."
 joi_flavor_jap.8.b: "Crush all opposition to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_jap.9.t: "[ROOT.GetCountry.GetRuler.GetFirstName] Purge"
 joi_flavor_jap.9.d: "Alarmed by anti-shogunate factions, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] orders samurai and courtiers to purge imperial loyalists."
 joi_flavor_jap.9.f: "\"The rash Heavenly Sovereign declared: 'I depart now from the Emperor.' As he ascended, mountains quaked. The Emperor trembled: 'My brother comes to steal my land.'\"\n\n\"When he washed the eight-span jewels in the celestial well, their chime birthed gods from mist.\""
 joi_flavor_jap.9.a: "These are patriots—spare them."
 joi_flavor_jap.9.b: "Annihilate these rebels against the court!"

 joi_flavor_jap.10.t: "[SCOPE.sCountry('western_merchantship_country').GetName] Merchant Fleet Arrival"
 joi_flavor_jap.10.d: "Several merchant vessels from [SCOPE.sCountry('western_merchantship_country').GetName] have arrived near [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], requesting permission from the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to dock for supplies. Their captain presented a commercial license issued by [SCOPE.sCountry('western_merchantship_country').GetName]'s naval admiral [SCOPE.sCharacter('western_army_merchant_leader').GetFirstName] [SCOPE.sCharacter('western_army_merchant_leader').GetLastName]."
 joi_flavor_jap.10.f: "\"Henceforth, [ROOT.GetCountry.GetName] shall provide shipwrecked [SCOPE.sCountry('western_merchantship_country').GetName] vessels with firewood, water, and provisions—paid in gold, silver, or goods if bullion is scarce.\"\n\n\"Both nations shall render mutual aid to distressed sailors, delivering them to designated ports. While awaiting repatriation, foreigners must obey local laws.\""
 joi_flavor_jap.10.a: "Permit their docking—we cannot afford to offend [SCOPE.sCountry('western_merchantship_country').GetName]."
 joi_flavor_jap.10.b: "Drive away these [SCOPE.sCountry('western_merchantship_country').GetName] barbarians!"

 joi_flavor_jap.11.t: "Dutch Report"
 joi_flavor_jap.11.d: "A delegation from [SCOPE.sCountry('NET_scope').GetName] has arrived in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], presenting their annual foreign affairs report to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]—a tradition dating back to Shōgun Tokugawa Yoshimune's reign."
 joi_flavor_jap.11.f: "\"Mr. Sardani mocked our questions relentlessly—until a flea in his ear silenced those venomous grimaces.\"\n\n\"Despite imperfections, I marvel at men who replicate machines from mere diagrams without seeing the originals.\""
 joi_flavor_jap.11.a: "This intelligence helps maintain [ROOT.GetCountry.GetName]'s isolation."
 joi_flavor_jap.11.b: "We must deepen our understanding of foreign affairs."

 joi_flavor_jap.12.t: "Rangaku Advocacy"
 joi_flavor_jap.12.d: "As Western technology spreads through [ROOT.GetCountry.GetName], rangaku scholars in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] extol its virtues—reaching the ears of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]."
 joi_flavor_jap.12.f: "\"This Western contraption leaves one disoriented—like crossing the Pacific without sleep. It functions, yet lacks a soul.\""
 joi_flavor_jap.12.a: "Ban these frivolous novelties!"
 joi_flavor_jap.12.b: "Encourage further study of Western learning."

 joi_flavor_jap.13.t: "Ishin Shishi (Restoration Patriots)"
 joi_flavor_jap.13.d: "The restoration movement has birthed #V 'Ishin Shishi'#!—reformist samurai and commoners gaining political influence with widespread popular support."
 joi_flavor_jap.13.f: "\"The Imperial Restoration must be grand in scale—reviving Emperor Jimmu's governance to unify the realm.\"\n\n\"To serve the nation, we must abandon old grudges. Now is the time to rally behind [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName]!\""
 joi_flavor_jap.13.a: "They disrupt social order."
 joi_flavor_jap.13.b: "Though Zhou was ancient, its mandate was renewal!"

 joi_flavor_jap.14.t: "Charter Oath"
 joi_flavor_jap.14.d: "Drafted by [SCOPE.sCharacter('industrialists_ig_leader').GetFirstName] [SCOPE.sCharacter('industrialists_ig_leader').GetLastName] and proclaimed by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], this document outlines the restoration government's principles."
 joi_flavor_jap.14.f: "\"Deliberative assemblies shall decide all matters openly.\"\n\n\"All classes shall fulfill their aspirations without discontent.\"\n\n\"We shall seek knowledge globally to strengthen the realm.\""
 joi_flavor_jap.14.a: "\"I swear before heaven and earth—let all daimyo account for their actions!\""

 joi_flavor_jap.15.t: "Sword and Topknot Ban"
 joi_flavor_jap.15.d: "As modernization progresses, [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] cling to #V swords and chonmage topknots#! as tradition. Westernizers demand #B prohibiting these symbols in favor of Western hairstyles.#!"
 joi_flavor_jap.15.f: "\"Civilian attire and hairstyles are personal choices—but swords are forbidden except in formal military dress.\"\n\n\"Violators will have their blades confiscated.\""
 joi_flavor_jap.15.a: "These are sacred class symbols—the state must not interfere."
 joi_flavor_jap.15.b: "Issue the edict banning swords and topknots!"

 joi_flavor_jap.16.t: "Blood Tax Riots"
 joi_flavor_jap.16.d: "Opposition to conscription has spawned terrifying rumors among [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], who call it 'sucking blood from commoners' and riot nationwide."
 joi_flavor_jap.16.f: "\"They say Westerners tricked the Emperor—now boys aged 18-20 will be bled dry while girls over 15 are shipped overseas! In Oku County, many already lie drained.\"\n\n\"At 'military schools,' they'll raise flags to mark where foreigners will strangle children and drink their blood!\""
 joi_flavor_jap.16.a: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must dispel these rumors."
 joi_flavor_jap.16.b: "Arrest these panic-mongers and execute them!"

 joi_flavor_jap.17.t: "Last Samurai"
 joi_flavor_jap.17.d: "The once-dominant samurai class fades into obscurity with modernization. Bushidō becomes antiquated, and wandering rōnin vanish from the roads they once dominated."
 joi_flavor_jap.17.f: "\"I came to my ancestral lands to understand the weight of every breath, every tea ceremony, every life we took. The Emperor hears me not—but his armies will come. For 900 years my clan protected our people. Now... I've failed them.\"\n\n\"So you'll commit seppuku? Because bushido is obsolete?\"\n\n\"A perfect flower is rare—one might search a lifetime without regret. I? I shall die by the blade.\""
 joi_flavor_jap.17.a: "Civilian governance must prevail."
 joi_flavor_jap.17.b: "The spirit of bushido shall endure!"

 joi_flavor_jap.18.t: "[ROOT.GetCountry.GetRuler.GetFirstName] Constitution"
 joi_flavor_jap.18.d: "After prolonged reforms, [ROOT.GetCountry.GetName] has emerged as a modern state rivaling the world's most advanced nations. A new constitution delineates the rights of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s government, parliament, and citizens."
 joi_flavor_jap.18.f: "\"[ROOT.GetCountry.GetName] shall be reigned over by the unbroken imperial line. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is the head of state, holding sovereign power under this constitution.\"\n\n\"The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] exercises legislative power with the Imperial Diet's consent. He convenes, prorogues, and dissolves the Diet, issuing emergency ordinances when necessary.\"\n\n\"Japanese subjects shall enjoy legal protections against unlawful detention, maintain freedom of movement, and bear military and tax obligations as prescribed by law.\""
 joi_flavor_jap.18.a: "The constitution must emphasize the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s divinity."
 joi_flavor_jap.18.b: "The constitution should prioritize pragmatism."
 joi_flavor_jap.18.c: "Constitutional government above all!"

 joi_flavor_jap.19.t: "Failed Restoration"
 joi_flavor_jap.19.d: "The modernization efforts have collapsed under [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] resistance. With leading reformers gone, Edo-era traditions are resurgent in [ROOT.GetCountry.GetName]."
 joi_flavor_jap.19.f: "The cries of '#B Datsu-A Ron#!' and '#B Fukoku Kyōhei#!' that once shook the nation now fade. Railroads stall, factories stand idle, and Western constitutions remain rootless.\n\nWe dreamed of reshaping our people like Europe, of disciplined armies like Prussia—yet now foreign ironclads patrol our waters while we struggle to lay a single railway. The restoration's light dims."
 joi_flavor_jap.19.a: "The bakufu comrades shall..."

 joi_flavor_jap.20.t: "Kazoku Peerage Edict"
 joi_flavor_jap.20.d: "With the #V Kazoku Edict#!, the restoration government has formalized aristocratic ranks, marginalizing the centuries-old [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]. Debate rages over preserving their privileges."
 joi_flavor_jap.20.f: "\"Titled individuals shall enjoy reciprocal treatment. Widows retaining household status may keep their ranks.\"\n\n\"Succession follows legitimate primogeniture, with bastards inheriting only absent heirs—all subject to Imperial Household approval.\"\n\n\"Rights may be revoked for dishonorable conduct, criminal acts, or defiance of imperial decrees.\""
 joi_flavor_jap.20.a: "Impose stricter controls on the kazoku."
 joi_flavor_jap.20.b: "Let the kazoku retain political influence."

 joi_flavor_jap.21.t: "Fall of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 joi_flavor_jap.21.d: "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] rebels have seized the capital with insider support, forcing the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to restore power to the shōgunate."
 joi_flavor_jap.21.f: "\"Traitors exploit imperial authority to slaughter loyalists, distorting the late [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s edicts without remorse. Should this continue, [ROOT.GetCountry.GetName] faces ruin.\"\n\n\"As the people's parent, I must expel these rebels to appease my ancestors and avenge this injustice. Shōgun—understand my grief! Destroy these villains and restore peace!\""
 joi_flavor_jap.21.a: "This is not the end, but a new beginning."

 joi_flavor_jap.22.t: "Shogunate Forces Advance North"
 joi_flavor_jap.22.d: "A [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] army marches from Osaka toward Kyoto—claiming this is merely an internal daimyo conflict. Should the court intervene?"
 joi_flavor_jap.22.f: "\"Since the ninth, all disturbances—Edo's riots, Nagasaki's thefts—stem from Matsudaira's conspirators inciting chaos. Unless these traitors are surrendered, I must execute justice.\" —Lord [SCOPE.sCharacter('landowners_ig_leader').GetLastName]"
 joi_flavor_jap.22.a: "Monitor the situation without engagement."
 joi_flavor_jap.22.b: "The court must intervene immediately!"

 joi_flavor_jap.23.t: "Shinsengumi Code"
 joi_flavor_jap.23.d: "As [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] becomes [ROOT.GetCountry.GetName]'s political center, [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]-backed rōnin groups like the famed #V Shinsengumi#! emerge."
 joi_flavor_jap.23.f: "\"Never violate bushido. Never resign without permission. Never incur private debts.\"\n\n\"Avoid lawsuits and duels. Breachers shall commit seppuku.\""
 joi_flavor_jap.23.a: "Support the Shinsengumi."
 joi_flavor_jap.23.b: "Disband these vigilantes!"

 joi_flavor_jap.24.t: "Surrender of Edo"
 joi_flavor_jap.24.d: "With [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] forces retreating, Edo's officials offer the city to imperial commander [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName]."
 joi_flavor_jap.24.f: "The former shōgun bows before [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], surrendering Edo Castle—soon to become an imperial palace blending Japanese tradition with Western motifs. Perhaps this hybrid design foretells [ROOT.GetCountry.GetName]'s future."
 joi_flavor_jap.24.a: "This is clearly a bakufu stratagem."
 joi_flavor_jap.24.b: "Victory belongs to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_jap.25.t: "Northern Alliance"
 joi_flavor_jap.25.d: "After shogunate defeats, northeastern daimyo form a defensive pact, petitioning [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] for amnesty while pledging loyalty."
 joi_flavor_jap.25.f: "\"If [SCOPE.sCharacter('devout_ig_leader').GetFirstName] truly repents, leniency may be granted.\"\n\n\"Aizu domain mediates with Sendai and northern clans to submit petitions—we seek consensus before proceeding.\""
 joi_flavor_jap.25.a: "Negotiations are possible."
 joi_flavor_jap.25.b: "Crush these rebels!"

 joi_flavor_jap.26.t: "Standard Language Debate"
 joi_flavor_jap.26.d: "The restoration government seeks to establish a standard language for education reform, but disputes erupt between Kantō and Kansai factions."
 joi_flavor_jap.26.f: "#V Tokyo#!'s #B warrior dialect#!—austere and favored by reformists—contends with #V Kyoto-Osaka#!'s #B courtly speech#!, long dominant in theater and academia. Which shall become [ROOT.GetCountry.GetNameNoFlag]'s national standard?"
 joi_flavor_jap.26.a: "Adopt the Kansai dialect."
 joi_flavor_jap.26.b: "Adopt the Kantō dialect."

 joi_flavor_jap.27.t: "The Rokumeikan Diplomacy"
 joi_flavor_jap.27.d: "As our nation came to be widely recognized by the world as an advanced and civilized country, His Majesty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] proposed the construction of a grand building in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] dedicated to diplomatic engagements with foreign envoys. Inspired by the verse *'The deer cry out harmoniously'* from the *Classic of Poetry*, it was ceremoniously named the #V 'Rokumeikan'#! (Deer-Cry Hall), symbolizing Japan's embrace of Western-style state banquets and cosmopolitan culture during the Meiji era."
 joi_flavor_jap.27.f: "“The red disc at the center of [ROOT.GetCountry.GetName]’s flag shall no longer resemble a mere rice cake sealing a closed empire, but henceforth become what it was always meant to be: a noble emblem of the rising sun, advancing ever upward among the enlightened nations of the world.”\n\n“This shall be a cherished memory of the [ROOT.GetCountry.GetRuler.GetFirstName] Era—a glorious gift bestowed by this generation upon the next.”"
 joi_flavor_jap.27.a: "This building shall proclaim our stature in Asia."
 joi_flavor_jap.27.b: "This building must serve diplomacy with Western powers."
 joi_flavor_jap.27.c: "Let this be a gathering place for the *kazoku* peers."

 joi_flavor_jap.28.t: "[ROOT.GetCountry.GetName] General Staff Office"
 joi_flavor_jap.28.d: "With the expansion and modernization of [ROOT.GetCountry.GetName]’s military, the outdated command structure became inadequate. At the proposal of [SCOPE.sCharacter('armed_forces_ig_leader').GetFirstName] [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName], a General Staff Office modeled after Prussia’s system was established. However, severe disagreements erupted among army and navy leaders regarding the future direction of our military development—a foreshadowing of the interservice rivalries that would plague Japan for decades."
 joi_flavor_jap.28.f: "“In all matters of state, I consult [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]. I confide everything in him; this is no longer the era of isolation and expelling foreigners. We must collaborate with visionaries who can foresee a century ahead—men like [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName], whose insights are steadfast and actionable. Every policy of mine seeks his counsel. I trust him utterly.”\n\n“Men grown complacent with rank neglect their duties, barking orders while idling—but [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName] was never such a man. This held true not only then but throughout his life.”"
 joi_flavor_jap.28.a: "The Army must receive the lion’s share of funding."
 joi_flavor_jap.28.b: "The Navy’s needs must take priority."

 joi_flavor_jap.29.t: "Hansekki Hōkan"
 joi_flavor_jap.29.d: "As administrative reforms progressed, maintaining the antiquated *bakuhan* system became untenable. Responding to petitions from southern *daimyō*, the lands and population registers once controlled by feudal lords were ceremoniously returned to the imperial court in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], placing them under direct central governance—a critical step toward dismantling feudalism."
 joi_flavor_jap.29.f: "“The Emperor acknowledges the lords’ petitions to restore the registers. Such principled loyalty merits reward: *‘Under heaven, no land is not the King’s; within the realm, none are not his subjects.’* Henceforth, no lord may privately claim land or people. Yet His Majesty shall not slight his faithful vassals—the court shall judge what to grant and what to reclaim.”"
 joi_flavor_jap.29.a: "The administrative system requires complete restructuring."
 joi_flavor_jap.29.b: "Permit certain *daimyō* to retain limited privileges."

 joi_flavor_jap.30.t: "Chitsuroku Shobun"
 joi_flavor_jap.30.d: "With the new Meiji government firmly established, the old court nobility had effectively withdrawn from politics—yet they retained sinecures draining the treasury with lavish stipends for idleness. [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName] and Restoration officials grew furious, urging [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to terminate these feudal pensions."
 joi_flavor_jap.30.f: "“All former *daimyō* and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] shall receive bonds worth 5–14 years’ stipends (minus taxes), redeemable over 30 years. After a 5-year freeze, annual lotteries will select bondholders for repayment. Interest rates shall be 5%–10%, inversely scaled to original stipends—favoring the lesser ranks.”\n\n“If we swiftly mint and circulate currency for those exchanging bullion, old coinage now hoarded as treasure will soon hold equal value. The key is rapid circulation to preserve real worth.”"
 joi_flavor_jap.30.a: "Issue promissory notes as a token gesture."
 joi_flavor_jap.30.b: "Compensate former nobles with government bonds."

 joi_flavor_jap.31.t: "The New [ROOT.GetCountry.GetRuler.GetLastName] Shogunate"
 joi_flavor_jap.31.d: "Under [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]’s leadership and the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]’s reforms, [ROOT.GetCountry.GetName] achieved technological modernization, now standing peer to the world’s great powers—a symbolic 'new shogunate' for the industrial age."
 joi_flavor_jap.31.f: "“The sovereign rejoiced: ‘I have borne three noble children.’ He took the jeweled strand from his neck and shook it, offering it to Amaterasu: ‘Rule the Plain of High Heaven.’ This strand was the *Kurakami-no-Kami*. To Tsukuyomi he said: ‘Rule the Night Land.’ To the tempestuous Susanoo: ‘Rule the Ocean Plains.’”"
 joi_flavor_jap.31.a: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s authority shall eternally guide [ROOT.GetCountry.GetName]."
 joi_flavor_jap.31.b: "[ROOT.GetCountry.GetName] needs more enlightened minds in court."

 joi_flavor_jap.32.t: "[ROOT.GetCountry.GetRuler.GetFirstName] Democracy"
 joi_flavor_jap.32.d: "As the #V 'second generation'#! of post-Restoration Japanese came of age, Western influences permeated daily life—evident in booming literature, art, and theater. Meanwhile, #V 'minponshugi' (populism)#! and liberalism spurred demands for greater rights for commoners and women, fostering an era of vibrant openness in [ROOT.GetCountry.GetName]."
 joi_flavor_jap.32.f: "“For whom is today’s politics conducted? Frankly—neither for His Majesty nor the people, but for petty cliques. These politicians forget the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s dignity; they claim to serve yet govern capriciously, rewarding cronies.”\n\n“Protests are silenced, grievances ignored—can a nation thrive thus? Even a child knows it cannot. Without ending these abuses, Japan will perish.”\n\n“Salvation lies in heeding the people’s will through elected assemblies. Only thus can tyranny be checked, harmonizing ruler and ruled in shared prosperity.”"
 joi_flavor_jap.32.a: "This selfish ideology threatens [ROOT.GetCountry.GetName]!"
 joi_flavor_jap.32.b: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] should tolerate this."
 joi_flavor_jap.32.c: "Romanticism shall nurture liberty and happiness."

 joi_flavor_jap.33.t: "Teikoku Gekijō"
 joi_flavor_jap.33.d: "In downtown [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], citizens marveled at a new hybrid marvel: the #V Imperial Theater#!, blending Western architecture with gilded *byōbu* screens and vermilion pillars—hailed as a 'theater of civilization' for staging both *kabuki* and Western opera."
 joi_flavor_jap.33.f: "“Are blooming flowers real, or mere illusion? The petals scatter like mist—I yearn to linger, yet their beauty slips away like a flute’s fading note. Adrift in this fleeting world, I, a man, know not my path.”\n\n“The maiden’s eyes, her lips, her flower-adorned grace—even monks would falter before such beauty. Her sleeves flutter like Yoshitsune’s memories, her tenderness like Shizuka Gozen’s daughter.”"
 joi_flavor_jap.33.a: "This theater shall crown [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] as a cultural capital!"

 joi_flavor_jap.34.t: "Tokyo Manga Association"
 joi_flavor_jap.34.d: "Recently, young artists dubbing themselves 'comic sketchers' formed the avant-garde #V Tokyo Manga Association#!. Their satirical works—featuring risqué scenes like nude dancers—asserted manga as a distinct art form, challenging conservative aesthetics."
 joi_flavor_jap.34.f: "“People resent politicians and sumo wrestlers lampooned in newspaper cartoons, while artists chafe at stereotypes.”\n\n“To confront life’s trials through art—beyond our duties as painters—is a joyous calling.”"
 joi_flavor_jap.34.a: "These ruffians go too far!"
 joi_flavor_jap.34.b: "Manga is truly unique!"

 joi_flavor_jap.35.t: "Ōta Toyotarō’s Love"
 joi_flavor_jap.35.d: "The novel #V *The Dancing Girl*#! caused a sensation, chronicling young bureaucrat Ōta Toyotarō’s doomed romance with German dancer Elise during his studies abroad—a tragedy of cross-cultural love shattered by scandal and his forced return to [ROOT.GetCountry.GetName]."
 joi_flavor_jap.35.f: "“In that study, between Schopenhauer and Schiller, our love bloomed. Our countrymen assumed us married, yet ours was innocence itself.”\n\n“My love burned fiercer as parting loomed. Though some may scorn me, Elise’s face—her disheveled hair, her sorrow—haunts my grief-stricken mind.”\n\n“Like a rudderless boat eyeing distant peaks (as my friend Aizawa guides), I drift. The fog-cloaked mountains may never satisfy. Poor yet happy, I cannot forsake Elise.”"
 joi_flavor_jap.35.a: "Love with a Westerner? Absurd!"
 joi_flavor_jap.35.b: "Love and duty are irreconcilable."
 joi_flavor_jap.35.c: "His pitiful homeland destroyed this romance."

 joi_flavor_jap.36.t: "Ginza Culture"
 joi_flavor_jap.36.d: "The chime of streetcars mingled with newsboys' cries on the cobblestone streets. At the heart of #V Tokyo#!, #V Ginza's avenues#! were quietly rewriting urban life: cafés replacing izakayas, department stores displacing small shops—a #B new stage of civilization#! and #V modern lifestyle#! emerging through newspapers, fashion, and metropolitan spaces."
 joi_flavor_jap.36.f: "“Inside a Ginza café, the air smelled of hot cream and fresh ink. Beside me sat a schoolgirl in Western dress; by the window, an old gentleman in a bowler hat.”\n\n“The city transforms. Ginza is no longer just a thoroughfare for hurried officials, but a place to linger—to converse, shop, reflect, even fall in love.”\n\n“This frivolous metropolis! Improper liaisons! Youths loitering outside shops, disrupting business by mere presence!”"
 joi_flavor_jap.36.a: "Decadent Western corruption!"
 joi_flavor_jap.36.b: "Ginza points to the future!"

 joi_flavor_jap.37.t: "Ningen Shikkaku"
 joi_flavor_jap.37.d: "A controversial novel titled #V 'No Longer Human'#! circulated secretly among [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. It chronicled the life of Ōba Yōzō—a man who performed clownish antics for others while hiding his true self—from childhood to adulthood. Its nihilistic prose resonated deeply with Japan's disaffected youth."
 joi_flavor_jap.37.f: "“I lived a life of shame... never understanding what 'human existence' meant.”\n\n“Repeated humiliating failures... I often wished for death, yet always failed even at that.”"
 joi_flavor_jap.37.a: "Ōba Yōzō is the shadow in all of us."
 joi_flavor_jap.37.b: "Ban this degenerate literature from [ROOT.GetCountry.GetName]!"

 joi_flavor_jap.38.t: "Shirakaba"
 joi_flavor_jap.38.d: "An avant-garde literary journal called #V 'White Birch'#! gained popularity among [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Its contributors championed liberalism, humanism, and social equality while openly critiquing Japan's traditional values—a radical stance during the Taishō era."
 joi_flavor_jap.38.f: "“A dead bee's solitary end felt eerily familiar... its final thrashing terrified me.”\n\n“I threw a stone at a salamander on a creek rock—it died. In its loneliness, I saw my own: contemplating death while still alive.”"
 joi_flavor_jap.38.a: "This journal will shape [ROOT.GetCountry.GetName]'s literary world!"
 joi_flavor_jap.38.b: "It'll fold soon due to 'funding issues'."
 joi_flavor_jap.38.c: "Clearly funded by British agitators!"

 joi_flavor_jap.39.t: "The Runaway Lotus"
 joi_flavor_jap.39.d: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s papers buzzed with scandal: a #v $aristocrats$#! daughter—a celebrated writer—rejected her coal-magnate fiancé from the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] and eloped with a penniless law student, defying patriarchal norms."
 joi_flavor_jap.39.f: "“I renounce those who wield wealth to trample women's dignity. I choose freedom!”\n\n“My darkest hour—why won't she just die or take vows?”\n\n“If all else fails, commit lovers' suicide—at least I'll burn incense at the altar.”"
 joi_flavor_jap.39.a: "Her father's feudal mindset caused this disgrace."
 joi_flavor_jap.39.b: "Expel her from the #v $aristocrats$#! ranks."
 joi_flavor_jap.39.c: "Police must arrest these moral degenerates!"

 joi_flavor_jap.40.t: "Haru to Ashura"
 joi_flavor_jap.40.d: "The poetry collection #V 'Spring and Asura'#! recently published, depicting a #B utopian world#! of spiritual fulfillment. To readers' astonishment, these brilliant verses came from an obscure [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]—the reclusive poet Miyazawa Kenji."
 joi_flavor_jap.40.f: "“With a white knapsack, like a carefree forester, I whistle under May's golden light—what joy, this solar spring!”\n\n“All things shine through me; by day's end you'll depart, my sister, as sleet falls under radiant skies.”"
 joi_flavor_jap.40.a: "Just peasant fantasies."
 joi_flavor_jap.40.b: "His poetry mirrors the universe's soul."

 joi_flavor_jap.41.t: "The Constitutional Protection Movement"
 joi_flavor_jap.41.d: "When [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] bypassed parliament to appoint [SCOPE.sCharacter('armed_forces_ig_leader').GetFullName]—a Restoration-era elder and [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] leader—as Prime Minister, newspapers decried this 'unconstitutional coup'. Mass protests erupted: [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], and [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] flooded [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s streets, demanding #bold 'Government by the People'#! and a cabinet formed through elections."
 joi_flavor_jap.41.f: "“The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] preach loyalty while sniping rivals from [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s shadow—using imperial edicts as bullets!”\n\n“As democracy falls to militarists, I gathered party leaders. All agreed: we must defend constitutional government!”\n\n“[ROOT.GetCountry.GetName] must restore true parliamentary democracy.”"
 joi_flavor_jap.41.a: "The military's rule betrays the constitution!"
 joi_flavor_jap.41.b: "Don't blame His Majesty for the military's power grab!"
 joi_flavor_jap.41.c: "The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] are Japan's backbone!"

 joi_flavor_jap.42.t: "Peace Preservation Law"
 joi_flavor_jap.42.d: "Facing relentless protests, the furious [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] proposed the 'Peace Preservation Law' to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. This draconian bill authorized arrests and secret trials for any act deemed threatening to 'national order'—a weapon against dissent."
 joi_flavor_jap.42.f: "“Organizing groups seeking to alter the kokutai or abolish private property: ≤10 years imprisonment.”\n\n“Inciting such acts: ≤7 years. Offering funds for subversion: ≤5 years. Accepting such funds: equally guilty.”\n\n“This law applies to all crimes within its jurisdiction.”"
 joi_flavor_jap.42.a: "This law tramples free speech and assembly!"
 joi_flavor_jap.42.b: "Pass it—time to crush opposition!"
 joi_flavor_jap.42.c: "Reject it—state surveillance needs limits!"

 joi_flavor_jap.43.t: "Thought Criminal Surveillance Law"
 joi_flavor_jap.43.d: "With liberalism marginalized, the triumphant alliance of [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] launched a final purge: the 'Thought Criminal Surveillance Law' legalized arrests for ideological 'crimes'—any deviation from 'Japanese tradition and honor'."
 joi_flavor_jap.43.f: "“Parolees convicted under the Peace Law shall undergo 'protective surveillance' by probation officers or religious institutions.”\n\n“Surveillance may restrict residence, associations, and correspondence.”\n\n“Leading subversive organizations: death or life imprisonment. Membership: ≥2 years imprisonment.”"
 joi_flavor_jap.43.a: "The military will make [ROOT.GetCountry.GetName] great!"
 joi_flavor_jap.43.b: "The military acts by His Majesty's divine will!"

 joi_flavor_jap.44.t: "[ROOT.GetCountry.GetRuler.GetFirstName]'s Restoration"
 joi_flavor_jap.44.d: "With the marginalization of liberals and the #v $bureaucrats$#! government successfully establishing firm control over the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName], calls for restoring the spirit of the Meiji Restoration and implementing direct rule by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] have rapidly gained momentum, reaching the highest echelons of power in [ROOT.GetCountry.GetName]."
 joi_flavor_jap.44.f: "\"The nation must reflect deeply on why divine justice has been unevenly dispensed, establish the foundation for [ROOT.GetCountry.GetName]'s reconstruction, unify the national will of all Japanese people, and under this great unity, call upon the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to exercise supreme authority and swiftly complete the nation's rebirth.\"\n\n\"Labor wages shall be based on free contracts, with a standardized eight-hour workday, Sundays and holidays off with pay, and the prohibition of child labor under 16 years of age.\"\n\n\"How can a nation that preaches divine virtue to the world mistreat its own youth? Thus, women's labor shall be free and equal to men's, ensuring the excellence of future citizens.\""
 joi_flavor_jap.44.a: "The sanctity of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is beyond question!"
 joi_flavor_jap.44.b: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall share glory with the nation."

 joi_flavor_jap.45.t: "Sunlight After Rain"
 joi_flavor_jap.45.d: "After a prolonged era of cultural flourishing and intellectual openness, the Freedom and People's Rights Movement has finally triumphed in [ROOT.GetCountry.GetName]: government restrictions on culture, publishing, and the arts have been lifted, [GetLawType('law_protected_speech').GetName] is enshrined in the constitution, and a parliamentary government with [GetLawType('law_universal_suffrage').GetName] and separation of powers has been established through the first general election. The shadowy rule of the #v $bureaucrats$#!, #v $aristocrats$#!, and #v $officers$#! since the Meiji Restoration has ended, with power now vested in the constitution, the Diet, and the people."
 joi_flavor_jap.45.f: "\"I tell you, you all possess one invaluable treasure—what is it? Gold? Silver? Jewels? No, none of these. It is something far more precious: liberty. Without asserting popular rights and freedom, neither happiness nor peace can be attained.\"\n\n\"Our national polity in [ROOT.GetCountry.GetName] is the pride of the world. We must rationally elucidate its principles so our people may believe in its true essence. The mythical interpretations peddled by so-called traditionalists no longer resonate with the youth. We must clarify Japan's place in global trends and its mission to advance human civilization.\""
 joi_flavor_jap.45.a: "Through the clouds of autocracy and authority, the sunlight of freedom shines upon all citizens of [ROOT.GetCountry.GetName]!"
 joi_flavor_jap.45.b: "The Yamato people shall be reborn from the ashes."

 joi_flavor_jap.46.t: "Seikanron (Conquer Korea Debate)"
 joi_flavor_jap.46.d: "As the #V Meiji Restoration#! progresses, many ultranationalists within [ROOT.GetCountry.GetName] argue that our newly modernized nation has a divine mandate to reclaim territories once held in ancient times—specifically, the conquest of [SCOPE.sCountry('KOR_scope').GetName]."
 joi_flavor_jap.46.f: "\"[SCOPE.sCountry('KOR_scope').GetName] knows defense but not offense, itself but not others. Its people are cunning, stubborn, and arrogant—unmoved by reason or provocation. Only through military force will they submit.\"\n\n\"Moreover, Korea insults our Empire with defiant words, bringing shame upon us. For the Emperor's honor, we must strike this 'enemy under the same heavens.' To not conquer is to betray our sovereignty!\""
 joi_flavor_jap.46.a: "We must maintain friendly relations with [SCOPE.sCountry('KOR_scope').GetName]."
 joi_flavor_jap.46.b: "The Korean Peninsula is [ROOT.GetCountry.GetName]'s divine destiny!"

 joi_flavor_jap.47.t: "South Manchuria Railway Bureau"
 joi_flavor_jap.47.d: "After negotiations with stakeholders in Manchuria, [ROOT.GetCountry.GetName], [SCOPE.sCountry('RUS_scope').GetName], and [SCOPE.sCountry('CHI_scope').GetName] have jointly established a multinational railway company. Managed by Japan's Railway Bureau, profits are shared by equity, while control and ownership belong solely to [ROOT.GetCountry.GetName]."
 joi_flavor_jap.47.f: "\"Development in Manchuria shall grant equal benefits to all parties. The railway and its assets—tracks, bridges, stations, docks—shall be acquired at prices agreed upon by mutual representatives.\"\n\n\"Recognizing Japan's ascendancy, the company shall operate under [ROOT.GetCountry.GetName]'s oversight. Its structure may adapt over time, but the goal remains equal representation. His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has approved this venture; only the partners' consent remains.\""
 joi_flavor_jap.47.a: "Government oversight will stabilize Imperial rule in Manchuria."
 joi_flavor_jap.47.b: "The Railway Bureau must compete fairly in the market."

 joi_flavor_jap.48.t: "Socialism in [ROOT.GetCountry.GetName]?"
 joi_flavor_jap.48.d: "A group of socialists in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] has formed a party called the 'Japan Socialist Party,' publishing a so-called 'manifesto.' Their platform declares that [ROOT.GetCountry.GetName] will transition to a socialist state."
 joi_flavor_jap.48.f: "\"The Socialist Party of [ROOT.GetCountry.GetName] is a mass organization of workers, peasants, intellectuals, and students, united by class consciousness. Members pledge unwavering dedication to its goals.\"\n\n\"The Party's immediate aims are peace, independence, democracy, and labor rights. It must uphold class principles while fostering internal democracy.\""
 joi_flavor_jap.48.a: "Crush these vile socialists!"
 joi_flavor_jap.48.b: "Even if we disagree, their political rights must be protected."

 joi_flavor_jap.49.t: "Anglo-Japanese Alliance"
 joi_flavor_jap.49.d: "With [SCOPE.sCountry('JAP_scope').GetName]'s growing influence in the Far East and shared Pacific interests, Japan's foreign minister has arrived in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to propose a long-term military alliance to [ROOT.GetCountry.GetRuler.GetFirstName]'s government."
 joi_flavor_jap.49.f: "\"Both nations recognize their special interests—[ROOT.GetCountry.GetName] in China, and Japan in Korea. If either is threatened by aggression or unrest requiring intervention, the other may take measures to protect those interests.\"\n\n\"Should one signatory go to war, the other remains neutral unless multiple powers are involved. No separate agreements undermining this alliance shall be made.\""
 joi_flavor_jap.49.a: "Those dwarfs aren't worth a single coin."
 joi_flavor_jap.49.b: "Sign the treaty! Japan will be [ROOT.GetCountry.GetName]'s stalwart ally in the East!"

 joi_flavor_jap.50.t: "Nissen Dōsoron (Common Ancestry Theory)?"
 joi_flavor_jap.50.d: "As [ROOT.GetCountry.GetName] consolidates rule in Korea, the 'Common Ancestry Theory' spreads, claiming Koreans and Yamato share ethnic roots and thus should unite."
 joi_flavor_jap.50.f: "\"[ROOT.GetCountry.GetName] has no intent to annex Korea. Misunderstandings abound, but annexation would be futile. Korea must develop self-rule.\"\n\n\"If Japan remains strong, we need not fear Korean defiance. We desire Korea's prosperity—provided it aligns with Japan.\"\n\n\"A federal approach, like Germany's with Württemberg, may best serve our interests.\""
 joi_flavor_jap.50.a: "Koreans share our blood—they belong as [ROOT.GetCountry.GetName] citizens."
 joi_flavor_jap.50.b: "Nonsense! The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s whip will make Koreans work!"

 joi_flavor_jap.51.t: "Assassination of [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFullName]"
 joi_flavor_jap.51.d: "The new Korean Governor-General, [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFullName], was assassinated at Harbin Station while meeting Russia's finance minister. Shot three times, his death shocked [ROOT.GetCountry.GetName]. The captured assassin faces trial, with Western lawyers volunteering his defense."
 joi_flavor_jap.51.f: "\"For three years abroad, I sought Korea's independence and Eastern peace. Now I die unfulfilled. Twenty million countrymen, study hard, build industry, and reclaim freedom! Bury me in Harbin until sovereignty is restored—then return me home. Even in heaven, I’ll fight for Korea.\"\n\n\"Three shots... Ah, I see. What a fool.\""
 joi_flavor_jap.51.a: "Try him as a POW—don’t let him become a martyr."
 joi_flavor_jap.51.b: "Execute the assassin for terrorism!"

 joi_flavor_jap.52.t: "Japan-Manchukuo Protocol"
 joi_flavor_jap.52.d: "With Manchuria under [ROOT.GetCountry.GetName]'s control, we’ve installed a puppet regime and governor, demanding [SCOPE.sCountry('CHI_scope').GetName] recognize our sovereignty."
 joi_flavor_jap.52.f: "\"[SCOPE.sCountry('CHI_scope').GetName] shall respect all existing Japanese rights in Manchuria under prior treaties.\"\n\n\"Manchukuo and Japan agree that threats to one are threats to both. Japanese troops will thus garrison Manchuria.\""
 joi_flavor_jap.52.a: "Taming the dragon begins with Manchuria."
 joi_flavor_jap.52.b: "Sign the treaty—current borders suffice."

 joi_flavor_jap.53.t: "Treaty of Shimonoseki"
 joi_flavor_jap.53.d: "After [SCOPE.sCountry('CHI_scope').GetName]'s catastrophic defeat, Beijing cedes Taiwan, the Pescadores, and Dalian to [SCOPE.sCountry('JAP_scope').GetName]. Many see this as the death knell for China's Mandate of Heaven."
 joi_flavor_jap.53.f: "\"[SCOPE.sCountry('CHI_scope').GetName] recognizes Japan's supremacy in Korea, ending tributary relations.\"\n\n\"China cedes southern Fengtian, Taiwan, and all adjacent islands between 119°–120°E and 23°–24°N, including fortifications and public property.\"\n\n\"China will pay Japan 200 million Kuping taels in reparations, with 50 million due within six months.\""
 joi_flavor_jap.53.a: "Toyotomi Hideyoshi's unfinished conquest will be completed by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_jap.53.b: "Is the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s Mandate nearing its end?"

 joi_flavor_jap.54.t: "[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting] Military Advisors"
 joi_flavor_jap.54.d: "Interested in [ROOT.GetCountry.GetName]'s modernization, [SCOPE.sCountry('military_consultant_country').GetName] offers General [SCOPE.sCharacter('military_consultant_general').GetFullName] as an advisor. The terms seem favorable, but foreign influence warrants caution."
 joi_flavor_jap.54.f: "\"This, sir, is a Gatling gun. Two hundred rounds per minute. Nothing—man, beast, or machine—withstands its hellstorm. We’ll teach your soldiers to use it, maintain discipline, and obey orders unconditionally.\""
 joi_flavor_jap.54.a: "We welcome [SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting] aid."
 joi_flavor_jap.54.b: "We refuse their gilded poison."

 joi_flavor_jap.55.t: "Mission to [SCOPE.sCountry('japan_embassy_country').GetName]"
 joi_flavor_jap.55.d: "As part of a Western diplomatic tour, our delegation met [SCOPE.sCharacter('japan_embassy_politician').GetFullName], a seasoned [SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting] statesman. Eager to cultivate ties with newly opened [ROOT.GetCountry.GetName], they drafted potential agreements."
 joi_flavor_jap.55.f: "\"Though nations feign camaraderie, power still dictates relations. Among [ROOT.GetCountry.GetName]'s 'friendly' states, none values sovereignty like [SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting]. They are our truest ally.\""
 joi_flavor_jap.55.a: "Forge strong diplomatic bonds."
 joi_flavor_jap.55.b: "[SCOPE.sCountry('japan_embassy_country').GetName] has much to teach us."
 joi_flavor_jap.55.c: "We gain nothing from [SCOPE.sCountry('japan_embassy_country').GetName]."

 joi_flavor_jap.56.t: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] Investment"
 joi_flavor_jap.56.d: "[SCOPE.sCharacter('western_investor_ig_leader').GetFullName], a wealthy industrialist from [SCOPE.sCountry('western_investor_country').GetName], sees [ROOT.GetCountry.GetName] as an untapped market. In exchange for future political support, [SCOPE.sCharacter('western_investor_ig_leader').GetFullName] offers industrial know-how."
 joi_flavor_jap.56.f: "\"Some dismiss [ROOT.GetCountry.GetName] as resource-poor, but I see potential. Today’s wilderness will tomorrow teem with cities breathing industrial vigor.\""
 joi_flavor_jap.56.a: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] ingenuity will enrich [ROOT.GetCountry.GetName]."
 joi_flavor_jap.56.b: "We need no foreigners meddling in our economy."
