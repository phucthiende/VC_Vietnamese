 anglo_japanese_alliance:0 "Anglo-Japanese Alliance"
 anglo_japanese_alliance_reason:0 "Though [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('JAP_scope').GetName] had little historical interaction before, their shared identity as #V naval powers#! and #V common Asian interests#! have led [ROOT.GetCountry.GetName] to form a military alliance with this distant nation.\n\n#B The Far East faces dramatic changes#! - this new #V military alliance#! benefits both #B Europe's established power: [SCOPE.sCountry('GBR_scope').GetName] and Asia's rising star: [SCOPE.sCountry('JAP_scope').GetName]#!. Through deterring other [concept_great_power]s, #B our imperial interests in Asia will be mutually secured#!.\n\nWhile this alliance stands, #B we can jointly isolate other powers seeking Asian gains while maintaining cordial relations.#!"
 anglo_japanese_alliance_possible_1_tt:0 "Completed #V Meiji Restoration#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 anglo_japanese_alliance_possible_2_tt:0 "Our nation accepted Japan's alliance proposal."
 anglo_japanese_alliance_fail_1_tt:0 "Either party withdrew from the treaty."
 anglo_japanese_alliance_fail_2_tt:0 "At war with Japan"
 anglo_japanese_alliance_fail_3_tt:0 "At war with Britain"
 anglo_japanese_alliance_1_button:0 "Renew Alliance Treaty"
 anglo_japanese_alliance_1_button_desc:0 "This alliance is crucial for maintaining our Asian interests, but faces expiration: We must negotiate to preserve this vital partnership."
 anglo_japanese_alliance_2_button:0 "Renew Alliance Treaty"
 anglo_japanese_alliance_2_button_desc:0 "This alliance is crucial for maintaining our Asian interests, but faces expiration: We must negotiate to preserve this vital partnership."
 anglo_japanese_alliance_3_button:0 "Lease Japanese Naval Base"
 anglo_japanese_alliance_3_button_desc:0 "Though we have Asian bases, Japan's strategically located ports would greatly support our Far East and Pacific operations. The alliance should facilitate this arrangement."
 anglo_japanese_alliance_4_button:0 "Lease British Naval Base"
 anglo_japanese_alliance_4_button_desc:0 "Britain's global network of bases would let our forces operate worldwide without supply concerns. The alliance should facilitate this arrangement."
 anglo_japanese_alliance_5_button:0 "Terminate Anglo-Japanese Alliance"
 anglo_japanese_alliance_5_button_desc:0 "The alliance now hinders rather than helps our Asian and Pacific expansion. We shall withdraw upon its expiration."
 never_leave_anglo_japanese_alliance_tt:0 "Neither party has withdrawn yet"
 anglo_japanese_alliance_5_button_tt:0 "We will withdraw, removing #V Anglo-Japanese Alliance#! journal from both nations."

 seikanron_conqueror_korea:0 "Seikanron"
 seikanron_conqueror_korea_reason:0 "As [ROOT.GetCountry.GetName] modernizes, #B expansionist voices#! grow louder. Among potential targets, neighboring [SCOPE.sCountry('KOR_scope').GetName] features prominently.\n\nThe #V Korean Peninsula#!, an East Asian crossroads, shares our cultural heritage. Yet [SCOPE.sCountry('KOR_scope').GetName] clings to isolation, #B repeatedly rejecting our diplomatic overtures#! - an affront many [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] leaders view as #V national humiliation#!. Some #v $officers$#! urge [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to #B launch a military campaign to avenge our Imjin War defeats, end [SCOPE.sCountry('CHI_scope').GetName]'s suzerainty, and transfer control to us#!."
 finsih_meiji_military_dip_tt:0 "完成了#V 御一新：富国强兵#!和#V 御一新：巩固主权#![concept_journal_entry]"
 finsih_shogunate_reform_tt:0 "完成了#V 幕府新政#![concept_journal_entry]"
 japan_refuse_seikanron_tt:0 "This will remove #V Seikanron#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 seikanron_conqueror_korea_fail_tt:0 "Rejected Seikanron"
 seikanron_conqueror_korea_complete_tt:0 "接受了征韩论"
 seikanron_korean_adm:0 "Unstable Korean Rule"
 seikanron_korean_adm_reason:0 "#V Progress bar shows [ROOT.GetCountry.GetName]'s control stability in Korea#!.\nLiberal policies, voting rights, home affairs institutions, strong police and low unrest increase #V stability#!, while harsh policies, high unrest and no home affairs decrease it.\n\nOur rule in #V Korea#! remains unstable: #B Republican 'legitimate government' exiles#! operate from [SCOPE.sCountry('CHI_scope').GetName] and [SCOPE.sCountry('USA_scope').GetName], while #V anti-imperial rebels#! organize [concept_secession] movements.\n\n#B We must pacify resistance and integrate Korea into our nation.#!"
