 shogunate_restoration:0 "[ROOT.GetCountry.GetRuler.GetLastName] Restoration"
 shogunate_restoration_reason:0 "After prolonged turmoil, the venerable [ROOT.GetCountry.GetRuler.GetLastName] clan and [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] have reaffirmed control over [ROOT.GetCountry.GetName]. Though self-styled 'reformists' sought to make Japan a Western puppet, loyal [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] reclaimed [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nWhile order is restored, new challenges emerge: Western [concept_great_power] threaten with superior technology. Without modernization preserving our traditions, [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] authority cannot endure.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and councilors agree: We must reform samurai, redefine domains, and adopt Western methods judiciously to preserve Japan's essence."
 finish_3_shogunate_restoration_je:0 "Completed 3 #V Restoration Policies#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 shogunate_restoration_status:0 "#B #O Reforms underway under the Shogunate#!#!"
 pulse_shogunate_restoration_progress:0 "Advance restoration progress by 1"
 no_active_shogunate_restoration_tt:0 "No active #V Shogunate Restoration#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 shogunate_restoration_mil:0 "Reform: Samurai Modernization"
 shogunate_restoration_mil_reason:0 "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] were Japan's bulwark since Sekigahara. However, #V centuries of peace#! have dulled their edge. They cling to privileges #V while neglecting their duties#!. Relying on them unchanged would be disastrous.\n\nWe must comprehensively reform the warrior class, eliminating decadence while preserving bushido spirit."
 shogunate_restoration_adm:0 "Reform: Domain Restructuring"
 shogunate_restoration_adm_reason:0 "The #V bakuhan system#! of feudal domains has maintained stability for centuries but conflicts with #V centralized rule#!. #B Many impoverished daimyo petition to exchange lands for stipends#!.\n\nTo strengthen the realm, we must #B restructure the domain system, consolidating power in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!."
 remove_all_edo_local_daimyo_tt:0 "All province #V Local Daimyo#! modifiers will be removed."
 shogunate_restoration_gov:0 "Reform: Preserve Bakuhan"
 shogunate_restoration_gov_reason:0 "While centralization is needed, the #V bakuhan system#! remains #B vital for stability#!. Sudden abolition would alienate loyal clans.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] proposes #B preserving daimyo titles and stipends#!, allowing #V certain military authority#! against foreign threats, #B balancing tradition with central control#!."
 shogunate_restoration_gov_tt:0 "Maintain [GetLawType('law_oligarchy').GetName] or [GetLawType('law_autocracy').GetName] for 10 years."

 taisho_roman:0 "[ROOT.GetCountry.GetRuler.GetFirstName] Romanticism"
 taisho_roman_reason:0 "#U Liberalism#! influence progresses with progressive factions, left-wing technologies, and #U free [concept_law]#!.\n#G Autocracy#! influence progresses with conservative factions, central planning technologies, and #G authoritarian [concept_law]#!.\n#N Militarism#! influence progresses with conservative factions, military strength, and #N censorship [concept_law]#!.\n\n#V In this spring following [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s enthronement#!, #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s streets pulse with new energy#!: #V Cafés#! host Western-suited poets, schoolgirls read translated Rousseau and Byron; newsboys shout political headlines at dawn, while theaters perform Shakespeare and #B previously forbidden romantic tales#!.\n\n#U #B The winds of Romanticism#!#! #B sweep from Ginza across [ROOT.GetCountry.GetName]#!: During decades since #V Meiji Restoration#!, #B #V industrialization#! accelerated, economy boomed, and #O commerce#! flourished#!; #O #B Rail networks, shipping, and public transit#!#! enabled #B urban expansion#!; #I New media#! emerged as #B newspapers, books, magazines, recordings and photography#! spread through society via artists and writers; #V Liberal, open and vibrant#! ideas flourish alongside #B imported goods and Western culture#! - all shaping #V [ROOT.GetCountry.GetName]'s unprecedented Taisho-era prosperity#!. This #B hopeful atmosphere#! draws even the poor toward #B cities and commerce#, marking a #V golden age of possibilities#!.\n\n#B Yet these changes challenge#! #V millennia-old Yamato traditions#!, as ancestral beliefs face #B radical new ideas#!. Debates rage over constitutionalism, feminism, #U liberalism#! to #I socialism#! - each posing #B potential threats to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s government#!, provoking #B increasingly radical opposition#! from [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName], [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName].\n\n#B Regardless, [ROOT.GetCountry.GetName] enters a#V #U historic moment#! - a paradoxical era embracing both tradition and modernity, prosperity and turmoil#! Where #V ideals and romance#! infuse #O national identity#!, #B #N though none can say how long this brilliance will last.#!#!"
 taisho_roman_possible_1_tt:0 "Completed #V Meiji Restoration#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 taisho_roman_possible_2_tt:0 "Current emperor didn't lead #V Meiji Restoration#!"
