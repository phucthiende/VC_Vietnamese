 kenseiyougoundo_movement:0 "Constitution Protection Movement"
 kenseiyougoundo_movement_reason:0 "#V Support#! grows with progressive factions and free laws; declines with conservatives, military, and authoritarian laws.\n\nMany believed [ROOT.GetCountry.GetName] under [ROOT.GetCountry.GetRuler.GetFirstName] would enter a #B democratic era#!, but #B [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]-backed #v $officers$#! violated #V Meiji Constitution#!, #N staging a coup#! against the elected #V legitimate cabinet#!. They installed a #N military government#! and #B suspended the Imperial Diet under 'emergency powers'#!, serving only [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] interests.\n\n#B Our constitution suffers brutal suppression#! as protests erupt nationwide; #B Democratic leaders petition [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to dissolve the #N military cabinet#! and restore [concept_election]."
