 manchuria_railway_bureau:0 "Manchurian Railway Bureau"
 manchuria_railway_bureau_reason:0 "The #V Manchurian Railway Bureau#! is [ROOT.GetCountry.GetName]'s official institution for #B managing, operating, and developing Manchuria's rail networks#!, combining #B railway administration, commercial enterprise, and military logistics#! into an unprecedented entity - dubbed by some European observers as #V "the East India Company of the Far East"#!.\n\nSince Manchuria's industrialization, its complex #V rail network#! required centralized planning. Thus, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] established the #V Manchurian Railway Bureau#!, authorizing it to #B control all railways from Port Arthur to the Amur River, expand branch lines and military stations, and manage adjacent lands, mines, ports, and storage facilities#!.\n\nWhile currently profitable for our [concept_government], like all state-run enterprises, it suffers from #B bureaucratic inefficiency and corruption#!. Nevertheless, #B it has undeniably made Manchuria indispensable to [ROOT.GetCountry.GetName]'s industrial landscape#!."

 combined_fleet_shipbuilding_plan:0 "Combined Fleet Naval Expansion Program"
 combined_fleet_shipbuilding_plan_reason:0 "Since the #V Meiji Restoration#!, [ROOT.GetCountry.GetName] has aspired to build a #V modern navy#! rivaling Western [concept_great_power]s. Now, with #B industrialization complete and imperial interests expanding overseas#!, #B creating a powerful fleet has become imperative#!.\n\nWith guidance from skilled naval #v $officers$#!, the [concept_government] has drafted an ambitious plan modeled after European powers like the Royal Navy: #B Three battleship squadrons supported by cruisers, destroyers, and supply ships - creating a modern [concept_fleet] capable of blue-water operations, island chain blockades, and sea control#!. The nation will devote its full resources to this endeavor in coming years.\n\n#B To protect [ROOT.GetCountry.GetName]'s overseas interests, our naval power must stand equal to the world's mightiest [concept_fleet]s!#!"
 combined_fleet_shipbuilding_plan_complete_tt:0 "Our naval strength must at minimum surpass Russia's and exceed China's."
