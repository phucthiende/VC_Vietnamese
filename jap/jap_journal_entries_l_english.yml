 jap_conqueror_manchuria:0 "Conquest of Manchuria"
 jap_conqueror_manchuria_reason:0 "The [SCOPE.sCountry('CHI_scope').GetName] imperial dynasty rose from these lands between white mountains and black waters. But #B Manchuria today is but a shadow of its glorious past#! - plagued by misrule, military weakness, and foreign encroachment.\n\nTo our #v $bureaucrats$#! and #v $officers$#, #B Manchuria represents both strategic depth and vital resources#!: Vast territories connecting China proper, Mongolia and Korea; abundant coal, iron, timber and fertile black soil - all crucial for industrialization.\n\nWith [SCOPE.sCountry('RUS_scope').GetName] seizing northern concessions, we must capitalize on [SCOPE.sCountry('CHI_scope').GetName]'s turmoil to claim these lands as both Yamato homeland and springboard into China."
 finish_seikanron_conqueror_korea_tt:0 "Completed #V Seikanron#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 finish_seikanron_conqueror_taiwan_tt:0 "Completed #V Conquest of Taiwan#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 give_back_peiking_tt:0 "We will return occupied Beijing and Mongolian provinces to China."
 jap_conqueror_taiwan:0 "Conquest of Taiwan"
 jap_conqueror_taiwan_reason:0 "Taiwan holds strategic value for [ROOT.GetCountry.GetName] in southern waters. Controlling this island provides both resources and a forward base for Pacific expansion.\n\nWith [SCOPE.sCountry('CHI_scope').GetName] weakened, we must seize this opportunity to claim this jewel and solidify our East Asian dominance."
 has_jap_conqueror_taiwan_je_tt:0 "Already decided to advance on Taiwan"
 jap_conqueror_manchuria_je_tt:0 "Already decided to advance on Manchuria"

 japan_industrialize:0 "Industrialization of the Japanese Archipelago"
 japan_industrialize_reason:0 "Since the #V Meiji Restoration#!, [ROOT.GetCountry.GetName] has successfully entered the modern era: #B Foreign trade has brought abundant resources and technologies to the islands, while steam-powered machinery imported from the West is transforming traditional workshops; modern factories have been established successively in Kantō, Kansai, Kyushu, and even Hokkaido.#!\n\nHowever, as other [concept_great_power]s continue to advance rapidly in their #V industrialization#! processes, we remain #B far from matching their economic might#!. To elevate our industrial capacity to world-class standards, the [concept_government] of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has approved an ambitious investment plan. Under state leadership, we will develop #B an integrated industrial system with regional specialization across the archipelago, ensuring [ROOT.GetCountry.GetName] does not fall behind in this global industrial race.#!"
 japan_industrialize_status:0 "Establish contiguous industrial zones across the Home Islands"
 japan_industrialize_possible_1_tt:0 "完成了#V 殖产兴业#![concept_journal_entry]"
 manchuria_industrialize:0 "Industrialization of Manchuria"
 manchuria_industrialize_reason:0 "As [ROOT.GetCountry.GetName]'s national power grows, our industrial vision must no longer be confined to the Home Islands: The #bold #V vast and resource-rich lands of Manchuria#! deserve inclusion in our long-term industrial planning.\n\nSince the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] secured control over Manchuria, this territory has been regarded as both #B our new homeland in East Asia and an advanced base for further operations against [SCOPE.sCountry('CHI_scope').GetName]#!. However, this ambition #B requires substantial investment from the Home Islands#!.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has approved proposals to establish industrial bases in Manchuria. We will #B systematically direct [concept_migration] to these territories, transforming the fertile black earth region into the industrial backbone of [ROOT.GetCountry.GetName]'s East Asian empire.#!"
 russia_finish_vladivostok_tt:0 "Completed #V Vladivostok's urban development#![Concept('concept_journal_entry', '$concept_journal_entries$')]"
 manchuria_industrialize_status:0 "Develop Manchuria into our forward industrial base in China"
 tohoku_industrialize:0 "Tōhoku Armaments Development"
 tohoku_industrialize_reason:0 "During [ROOT.GetCountry.GetName]'s industrialization, Tokyo and the Kansai region have long monopolized resources and capital, while #V Tōhoku#! has been neglected as a #B "peripheral region"#!. However, as [concept_war] clouds gather over the Empire, the [concept_government] has recognized #B Tōhoku's unique strategic advantages for military industries.#!\n\n#V Tōhoku#! features sparse population, mountainous terrain, proximity to the Korea Strait, and fronts against potential Pacific adversaries. Consequently, [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] has secured cabinet approval for #B comprehensive military industrialization of the region#!.\n\nArmaments factories, artillery works, and munitions plants are being planned, while shipyards are relocating from Edo and Nagasaki to Tōhoku's ports. With [concept_government] support, #B Tōhoku will become [ROOT.GetCountry.GetName]'s - and potentially the world's - premier center of military production.#!"
