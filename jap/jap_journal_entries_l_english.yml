 bansei_ikkei:0 "Unbroken Imperial Line"
 bansei_ikkei_reason:0 "#V #P Direct descendant of Amaterasu, divine manifestation in the mortal world, the sacred and inviolable [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!#!#V #B is the current monarch of [ROOT.GetCountry.GetName]#!#!.\n\n[ROOT.GetCountry.GetName]'s [GetLawType('law_monarchy').GetName] history stands #B among the most ancient and unbroken lineages in the world#!: Since Emperor Jimmu's eastern conquest unified the Yamato plain and #B established rule over the islands#!, his descendants have governed this #V glorious Land of the Rising Sun#!. During Emperor Tenmu's reign after the Taika Reforms, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ruled by divine mandate, bringing prosperity. However, during the #V Heian period#!, young Emperor Seiwa had to delegate power to regents, leading to the #B shogunate system#! during the Kamakura period.\n\nWith the #B fall of the Tokugawa Shogunate and the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s restoration during the #V Meiji Restoration#!, the era of nominal rule has ended. The #V Meiji Constitution#! #B restored sacred authority to [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, transforming [ROOT.GetCountry.GetName] into #B a civilized power on the world stage#!.\n\n#B The Imperial Way is rooted in loyalty; all subjects serve their sovereign#!: [GetLawType('law_monarchy').GetName] holds special meaning for the Yamato people. #B [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s noble example shall endure eternally, as our national anthem proclaims:#!\n\n#V Thousands of years of happy reign be thine; Rule on, my lord, until what are pebbles now By age united to mighty rocks shall grow Whose venerable sides the moss doth line!#!"
 bansei_ikkei_status:0 "#B #V #I The current era name is [ROOT.GetCountry.GetRuler.GetFirstName]#!#!#!"
 add_je_bansei_ikkei_tt:0 "Add #V Unbroken Imperial Line#! to #V #O #B Empire of Japan#!#!#!'s journal"

 japanese_sanbo_honbu:0 "Imperial General Headquarters"
 japanese_sanbo_honbu_reason:0 "#V Imperial General Headquarters#!, modeled after Prussia's General Staff, serves as [ROOT.GetCountry.GetName]'s military command center, #bold coordinating forces and formulating strategy#!. Its establishment marks one of the greatest achievements of the #V Meiji Restoration#!: transforming Japan's military from #B feudal domains to a modern, unified [concept_war] machine#!.\n\nAs the supreme command, it oversees operations, intelligence, logistics, and mobilization. Its officers—#B elite graduates of the Army War College or foreign-trained#!—understand modern warfare while maintaining #B traditional #!#V bushido spirit#!. They handle both wartime [concept_mobilize_army] and peacetime strategy.\n\nHowever, [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] faces internal divisions: #bold Army officers advocate continental expansion and centralization, while Navy leaders favor maritime strategy and British-style modernization#!.\n\nIn this era of rapid military advancement, #variable Imperial General Headquarters#! must reconcile these differences #B to ensure cooperation during [concept_war]#!."
