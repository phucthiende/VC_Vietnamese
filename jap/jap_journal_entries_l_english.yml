 edo_sakoku:0 "Sakoku"
 edo_sakoku_reason:0 "Since the #V Genna Edict (1614)#! and #V Kan'ei Expulsion (1639)#!, [ROOT.GetCountry.GetName] has mirrored [SCOPE.sCountry('CHI_scope').GetNameNoFlag]'s #V isolationist policies#! to repel foreign encroachment. By decree, only #V Nagasaki#! may trade—exclusively with [SCOPE.sCountry('NET_scope').GetName] and [SCOPE.sCountry('CHI_scope').GetName]—while #B all other ports remain sealed#!.\n\nThough this system maintained #B two centuries of stability#!, growing Western power now threatens Japan. Foreigners corrupt traditions and incite unrest—#B 'Different races harbor different minds; Western gadgets bring calamity'#!. Thus, #V sakoku#! remains vital to [ROOT.GetCountry.GetRuler.GetLastName] shogunate's authority. Its collapse would #B devastate the regime#!."
 edo_sakoku_on_fail_tt:0 "We must end sakoku and negotiate openings with Western powers."
 edo_sakoku_1_button:0 "Cease expelling foreign ships"
 edo_sakoku_1_button_desc:0 "The Bunsei Expulsion Edict (1825) no longer suits our times. Western powers dwarf Japan's strength—persisting will invite their wrath. We must pragmatically lift restrictions."
 joi_flavor_jap_3_tt:0 "We will sign treaties granting Western powers coastal access and most-favored-nation status."
 china_lose_opium_wars_tt:0 "China defeated in the Opium Wars."

 edo_rangaku:0 "Rangaku"
 edo_rangaku_reason:0 "#V Rangaku#!#B refers to Western knowledge acquired through Dutch—Japan's sole European contact during sakoku#!. Since the #V Tenpō era (1830-1844)#!, despite #B strict maritime controls#!, scholars in Nagasaki and Dejima have studied #V imported Dutch techniques#!, heralding them as gateways to modernization.\n\n#B From street physicians to domain elites#!, devotees of #B Sugita Genpaku and Maeno Ryōtaku's translations#! proliferate. Their replicated devices and medical practices gain tacit approval from [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName].\n\nYet #B Rangaku's spread#! sparks debates among nativist scholars. The [ROOT.GetCountry.GetRuler.GetLastName] shogunate must #B clarify its stance#! to resolve court divisions."
 edo_rangaku_1_button:0 "Suppress Rangaku"
 edo_rangaku_1_button_desc:0 "Rangaku spreads dangerous novelties that erode tradition. We must ban these 'Dutch scholars' to preserve order."
 edo_rangaku_2_button:0 "Encourage Rangaku"
 edo_rangaku_2_button_desc:0 "If we dismiss Rangaku as mere medical trivia rather than statecraft, we doom Japan to backwardness. Adopt its strengths for our purposes."
 edo_rangaku_3_button:0 "Request Dutch naval expertise"
 edo_rangaku_3_button_desc:0 "Dutch traders at Nagasaki possess advanced shipbuilding. Establishing a naval academy with their instructors would bolster our defenses."
 edo_rangaku_3_button_possible_tt:0 "We will build a naval training facility near Dejima.\nDutch advisors will assist Western-style ship construction."

 tenpo_famine:0 "Great Tenpō Famine"
 tenpo_famine_reason:0 "Since #V 1833 (Tenpō 4)#!, a #B famine rivaling the Kyōhō and Tenmei eras#! has ravaged [ROOT.GetCountry.GetName]. Unrelenting cold snaps and locust plagues have devastated crops from Ōu to Kinai, sending rice prices soaring and leaving corpses in the fields.\n\nThis catastrophic [concept_famine] has brought immeasurable suffering. The people beg the [ROOT.GetCountry.GetRuler.GetLastName] shogunate under [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to #B enact extraordinary measures to save them from this horror#!."
 tenpo_famine_on_timeout_tt:0 "Wait for famine to end naturally or implement relief measures."
 tenpo_famine_status:0 "#R #B The Great Tenpō Famine still devastates our land#!#!"

 tenpo_reform:0 "Tenpō Reforms"
 tenpo_reform_reason:0 "Since the #V Tenpō era (1830-1844)#! famine, [ROOT.GetCountry.GetName]'s strength has waned: #B Empty granaries, shuttered shops, displaced peasants#!, even the shogunate's grip over the daimyo weakens. Many now believe Heaven has abandoned the Land of the Rising Sun.\n\nThough the famine has passed, its scars cripple [ROOT.GetCountry.GetName]'s economy. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has appointed Minister [SCOPE.sCharacter('landowners_ig_leader').GetLastName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] elders to lead #V agrarian reforms#! promoting #B frugality to rescue national morality and economy#!."
 tenpo_reform_tt:0 "Successful reforms may revitalize our economy."
 tenpo_reform_status:0 "#B Implement measures to revive our rural economy#!"

 meiji_restoration_add_je_tt:0 "Add #V Meiji Restoration#! to #V #O #B Japanese Shogunate#!#!#!'s journal"
 meiji_restoration:0 "[ROOT.GetCountry.GetRuler.GetFirstName] Restoration"
 meiji_restoration_reason:0 "\"If the [concept_government] faithfully implements reforms, we may restore imperial prosperity, strengthen the nation, and stand equal among states—but this is no simple task. We must make bold, just decisions to utterly transform [ROOT.GetCountry.GetName].\"\n\nFor centuries, isolated and stagnant [ROOT.GetCountry.GetName] was #B ruled by the shogunate#!. Now with the #V shōgun's fall#!, power has returned to the #V rightful [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, allowing [ROOT.GetCountry.GetRuler.GetFirstName] to personally govern. Yet #B centuries of isolation#! have left us #B far behind world powers#!, risking #V colonization#!.\n\nRestoration cannot be achieved by decree. [ROOT.GetCountry.GetName] needs #B nationwide revolution: abolish old systems, standardize laws, enrich the country, strengthen the military, promote industry#!... The new [concept_government] led by [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] has much work ahead.\n\n#B To claim our place in this modernizing world, we must civilize at all costs—even becoming a world power.#!"
 meiji_restoration_complete_tt:0 "Completed 6 #V Restoration#! [concept_journal_entry]s and the #B Iwakura Mission#!"
 meiji_restoration_fail_tt:0 "Defeated by conservative faction infighting"
 meiji_restoration_effect_tt:0 "如果我们完成了额外的6项#V 维新#![concept_journal_entry],一个奖励事件就将触发："
 meiji_restoration_status:0 "#B #P Transform Japan into a modern nation#!#!"
 meiji_restoration_birth_rate_tt:0 "All [concept_state] in #O the Japanese Archipelago#! will receive a modifier, with effects as follows:"
 meiji_restoration_mil:0 "Restoration: Rich Country, Strong Army"
 meiji_restoration_mil_reason:0 "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]—Japan's #B hereditary warrior class#!—once defended lords with loyalty and blade. But #V centuries of peace#! have dulled their swords and [concept_war] knowledge, leaving them clinging to feudal privileges, #V utterly unprepared for Western military systems#!.\n\n#B To defend our lands or expand our empire, we must build a modern national army#!—well-organized, trained, equipped, and loyal to the nation, not privileged elites."
 meiji_restoration_dip:0 "Restoration: Secure Sovereignty"
 meiji_restoration_dip_reason:0 "For #B centuries#!, [ROOT.GetCountry.GetName] relied on #V sakoku#! to repel foreigners. But when Western warships appeared off Nagasaki and Uraga, their #B cannons and steel hulls#! proved they could #B crush us#!.\n\nIf we don't open voluntarily, we'll be forced open in disgrace. [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] and [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] agree: we must dismantle sakoku and build a #B modern [ROOT.GetCountry.GetName] capable of equal diplomacy with [concept_great_power]s#!."
 meiji_restoration_eco:0 "Restoration: Promote Industry"
 meiji_restoration_eco_reason:0 "To resist [concept_great_power]s coveting our land and markets, we must #B rapidly industrialize#!, building a #B self-sufficient, globally competitive#! #V modern industrial system#!.\n\nWe need state-run factories, private investment, and Western expertise—not just technological upgrades, but #V complete economic restructuring#!."
 finish_meiji_restoration_mil_je_tt:0 "Completed #V Restoration: Rich Country, Strong Army#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 meiji_restoration_law:0 "Restoration: Abolish Domains, Establish Prefectures"
 meiji_restoration_law_reason:0 "Japan's #V daimyo system#! dates back to the late #V Heian period#!. While nominally subordinate to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], daimyo #B ruled as warlords—levying taxes, raising armies#!, making [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] mere domainal retinues.\n\nThis #V feudal patchwork#! cannot support a modern [ROOT.GetCountry.GetName]. We must abolish these #V bakuhan remnants#! and create unified prefectures #B centralizing power so the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s will reaches all corners#!."
 meiji_restoration_lad:0 "Restoration: Samurai Rehabilitation"
 meiji_restoration_lad_reason:0 "For centuries, [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] enjoyed #B privileged status#! with hereditary stipends. But with the #V shogunate's fall#!, their #B idle luxury#! funded by taxes on #v $peasants$#! has become untenable.\n\nThe [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s [concept_government] cannot #B keep feeding these parasites#!. We must end their #V privileges#! through #B lump-sum payments#!, #V clearing the way for new supporters#!."
 meiji_restoration_ray:0 "Restoration: Build Railways"
 meiji_restoration_ray_reason:0 "Travel from Edo to Ōsaka once took days. But our envoys report #B Western [concept_great_power]s crisscrossed by railways#!—#V moving goods hundreds of miles daily, troops overnight#!, #B transforming their societies#!.\n\nTo achieve #V economic parity#!, [ROOT.GetCountry.GetName] needs #B transcontinental railways#!—binding isolated provinces into a #V unified modern [concept_country]#!."
 pulse_meiji_restoration_progress:0 "Advance Restoration Progress by 1"
 not_has_meiji_restoration_je_tt:0 "No active #V Meiji Restoration#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 meiji_restoration_homeland_state_tt:0 "Is in the Japanese Archipelago"

 meiji_boshin_war:0 "Imperial Restoration"
 meiji_boshin_war_reason:0 "#V Shogunate influence#!#B will decrease with progressive forces and loyal [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName], while increasing with conservative factions.#!\n\nSince [ROOT.GetCountry.GetRuler.GetFirstName]#V [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] assumed direct rule#!, [ROOT.GetCountry.GetName] has sought to establish a system blending old traditions with new reforms, attempting modernization without overturning fundamentals. However, #B the formerly dominant [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and their scattered supporters among the daimyo are unwilling to relinquish power easily.#!\n\nThe [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and shogunate-loyal factions within [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] are forming new alliances, #B rallying conservative forces nationwide#! to attempt #V overthrowing the reformist government led by [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] by force#!.\n\n#B We must quickly consolidate our position and build sufficient military strength to counter [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]#!#V before they launch their restoration attempt.#!"
 tokyo_fall_in_civil_war_tt:0 "The Emperor will end direct rule, and the Shogun will regain power."
