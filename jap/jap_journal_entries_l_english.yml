l_english:

 edo_period:0 "Edo Period"
 edo_period_reason:0 "#V Anti-Shogunate Progress#!#B Increases with progressive forces, open borders, and [concept_revolution] victories#!.\n#V Pro-Shogunate Progress#!#B Increases with reactionary forces, isolationism, and [concept_revolution] failures#!.\n\nFor over #B two centuries#! since #V Tokugawa Ieyasu#! emerged victorious at #V Sekigahara#! and was appointed #B [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, [ROOT.GetCountry.GetName] has known relative peace: Loyal #B daimyo#! govern the provinces under the shogunate's strict #B court-military hierarchy#!, with rigid class divisions (samurai, farmers, artisans, merchants) maintaining social order. While not prosperous, the realm has been stable.\n\nYet the #V Great Tenpo Famine of 1833-1837#! ravages the land, undoing centuries of accumulation. Meanwhile, #B visits by Western ships#! undermine the #V sakoku (closed country) policy#! that underpins [ROOT.GetCountry.GetRuler.GetLastName] shogunate's authority. #B Governance from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] weakens#! as peasants grumble and domains whisper—the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s grip on [ROOT.GetCountry.GetName] #B teeters#!.\n\n#B The Edo Period has lasted 200 years. Can the [ROOT.GetCountry.GetRuler.GetLastName] shogunate last another?#!"
