l_english:
 ai_great_power_buff:0 "The Victorian Era"
 ai_great_power_buff_reason:0 "The coronation of Queen Victoria in 1837 heralded the dawn of the Victorian Era, ushering the British Empire—and much of the world—onto a new historical stage. Under the radiant glow of Pax Britannica, the First Industrial Revolution reached its culmination, driving unprecedented urban growth and prosperity.\n\nOn the European continent, Austrian Chancellor Klemens von Metternich skillfully maintained the Concert of Europe, forging a conservative alliance between Austria, Prussia, and Russia to safeguard the old order against revolutionary upheavals.\n\nThe devastation of the Napoleonic Wars had subsided, and compromise among the Great Powers brought fragile peace to a weary Europe. Yet beneath this calm, the embers of nationalism and liberalism still glowed brightly. As scientific and technological progress accelerated, traditional certainties would be questioned, and new ideologies forged—reshaping society in ways unimaginable to earlier generations."
 ai_major_power_buff:0 "The Victorian Era (Major Powers)"
 ai_major_power_buff_reason:0 "The coronation of Queen Victoria in 1837 marked not merely a dynastic event but the symbolic dawn of an age defined by imperial grandeur and industrial might. Under Britain's global supremacy, urban centers flourished, powered by the engines of the Industrial Revolution.\n\nAcross Europe, Metternich’s Vienna System sought to preserve stability through a balance of power. Austria, Prussia, and Russia acted as guardians of the old order, holding back the revolutionary fervor that had swept the continent only decades earlier.\n\nThough the guns of the Napoleonic Wars had fallen silent, ideological battles brewed beneath the surface. Nationalism and liberalism stirred restlessly in this new century, challenging monarchies and centuries-old traditions, as steam, steel, and science transformed the world around them."
 ai_minor_power_buff:0 "The Victorian Era (Minor Powers)"
 ai_minor_power_buff_reason:0 "When Queen Victoria ascended the throne in 1837, her reign came to symbolize not only British ascendancy but a global era of sweeping transformation. Pax Britannica fostered trade and stability, while the final surge of the Industrial Revolution reshaped economies and societies.\n\nMeanwhile, on the European continent, Metternich’s conservative order held sway, as Austria, Prussia, and Russia allied to contain revolutionary impulses. The shadow of Napoleon receded, but discontent simmered beneath the veneer of peace.\n\nIt was a world poised between tradition and modernity, where new inventions and bold ideas challenged inherited truths, and small nations navigated cautiously between great empires and rising ideologies."
 ai_insignificant_power_buff:0 "The Victorian Era (Insiginificant Powers)"
 ai_insignificant_power_buff_reason:0 "Queen Victoria’s coronation in 1837 signaled not only Britain’s imperial zenith but the onset of profound global change. The Industrial Revolution, nearing its end phase, drove urbanization and innovation to unparalleled heights, reshaping daily life for millions.\n\nIn Europe, Metternich’s diplomatic order sought to stifle the tide of revolution through a conservative alliance. Though peace prevailed after the Napoleonic Wars, its foundations were fragile, threatened by the surging forces of nationalism and liberalism.\n\nFor smaller states and distant lands, this was both an age of opportunity and peril—where great empires loomed large, and rapid progress promised to overturn centuries of established norms."
 ai_unrecognized_major_power_buff:0 "A New Age (Unrecognized Major Powers)"
 ai_unrecognized_major_power_buff_reason:0 "Beyond the reach of Europe’s Concert of Power, distant civilizations confronted the mounting pressures of an industrializing world. Western influence loomed ever larger, carried by steamships and rifles.\n\nYet this was also a time of renewal and ambition. Even as foreign powers expanded their dominion, reformers and rulers across Asia, Africa, and the Americas sought to modernize their states, blending tradition with new ideas to navigate the storms of the 19th century."
 ai_unrecognized_regional_power_buff:0 "A New Age (Unrecognized Regional Powers)"
 ai_unrecognized_regional_power_buff_reason:0 "Far from Europe’s capitals, societies faced an era of unprecedented change. Industrialized empires pressed outward, demanding trade, territory, and submission. Yet many resisted, striving to adapt foreign technologies and political systems to local traditions.\n\nFor these nations, survival and sovereignty hinged on difficult choices—embrace reform or risk subjugation. This was the challenge of a century defined by empire and innovation."
 ai_unrecognized_power_buff:0 "A New Age (Unrecognized Powers)"
 ai_unrecognized_power_buff_reason:0 "In lands unrecognized by the great powers, the 19th century brought both peril and promise. Expanding empires, driven by industrial might, sought dominance far beyond Europe. Yet even in distant villages and courts, the winds of change could not be ignored.\n\nNew weapons, new machines, and new ideas began reshaping even the most remote corners of the globe, forcing old societies to confront the relentless march of modernity."
