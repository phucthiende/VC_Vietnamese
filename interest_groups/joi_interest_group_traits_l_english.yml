l_english:

 ig_trait_frs: "Royal Society"
 ig_trait_frs_desc: "Our research in natural philosophy stands unrivaled, thanks to the Royal Society’s distinguished fellows: scholars from every corner of the Empire gather in London, probing nature’s truths through hypothesis and experiment. The spirit of science demands we trust no man’s word—only data and verification!"
 ig_trait_godrights: "By Divine Right"
 ig_trait_godrights_desc: "Law and morality exist solely to uphold the sacred rights of free citizens. We reject the notion of innate superiority—none but God may claim dominion over another’s liberty! Heaven has its sovereign; we have our rights."
 ig_trait_journalist: "Uncrowned Kings"
 ig_trait_journalist_desc: "The bloated bureaucrats of Whitehall and the witless woodheads of Parliament dismiss our voices—thinking us few and feeble? Then let us expose every folly in print, laying bare the government’s corruption and incompetence for all citizens to see!"
 ig_trait_heart_of_oak: "Heart of Oak"
 ig_trait_heart_of_oak_desc: "Britannia rules the waves, her battle cry ‘Justice,’ her glory ‘Freedom’! So rally, lads, and sing as one: God save our soldiers, sailors, MPs, and King!"
 ig_trait_do_his_duty: "England Expects"
 ig_trait_do_his_duty_desc: "For centuries, we’ve conquered the globe—from the Far East to North America, nations kneel before our might. These triumphs rest on our army’s honor and discipline: true patriots fulfill their oath to serve the Crown. England expects every man to do his duty!"
 ig_trait_refuse_imperialism: "Anti-Imperialist Conscience"
 ig_trait_refuse_imperialism_desc: "As a civilized nation, we bear a moral duty toward the world’s unenlightened—yet our government wallows in unjust imperialism. Though we cannot defy their wars, we may still act with conscience."
 ig_trait_textile_monopoly: "Textile Monopoly"
 ig_trait_textile_monopoly_desc: "Textiles crown our industrial pride—endless exports showcase the skill of our workers and the might of our mills, securing global dominance. The state knows their worth, aiding our expansion. With such prospects, why not strive harder?"
 ig_trait_free_trade_policy: "Free Trade"
 ig_trait_free_trade_policy_desc: "Some condemn dumping goods on other nations as immoral, but I say to them - who are you to obstruct free trade and consumers' freedom of choice? Where there is demand, we shall supply. If not us, other nations will profit from their markets' needs. Should every household be deprived of wealth brought by free trade?"
 ig_trait_technological_laziness: "Technological Complacency"
 ig_trait_technological_laziness_desc: "We are the birthplace of the Industrial Revolution, the cradle of modern civilization. Our glorious achievements and advanced technology have already secured unprecedented prosperity. Why should we bother learning so-called innovations from those unworthy of comparison?"
 ig_trait_land_deeds: "Land Deeds"
 ig_trait_land_deeds_desc: "Greedy urbanites always try to extend their claws into our pastoral countryside, foolishly wanting to turn beautiful blue skies into smoke-filled horrors like theirs. This is absurd! Britain has rule of law - don't think you can seize our ancestral lands through threats or bribes."
 ig_trait_workers_community: "Workers' Community"
 ig_trait_workers_community_desc: "Unions must gather scattered workers so these honest folk can help each other and labor together. Through community and union organization, we increase productivity while establishing places to provide basic education for workers' children, helping them reach brighter futures."
 ig_trait_labor_value: "Labor Value"
 ig_trait_labor_value_desc: "No matter how wealthy industrialists are or how advanced scientists' technology becomes, without workers' hard labor, all economic prosperity is but a bubble. We are the source of all wealth - our labor creates products' value. Thus society should ensure even lowest workers enjoy their labor's fruits with fair pay and stable lives."
 ig_trait_parish_sermons: "Parish Sermons"
 ig_trait_parish_sermons_desc: "My brethren, what good is it if someone claims to have faith but has no deeds? Can such faith save them? If a brother or sister is poorly clothed and lacking daily food, and one of you tells them, 'Go in peace; keep warm and well fed,' but does nothing about their physical needs, what good is it? So too, faith by itself is dead if not accompanied by action."
 ig_trait_divine_crown: "Divine Crown"
 ig_trait_divine_crown_desc: "The monarch solemnly swears to God to govern Britain's peoples according to their laws and customs; to administer law and justice with mercy; and to uphold God's true religion. We believe this oath and will aid his reign until it surpasses all ancestors'!"
 ig_trait_focus_priesthood: "Priestly Focus"
 ig_trait_focus_priesthood_desc: "We are the Lord's temple and should focus on serving Him, not worldly affairs. Churches distribute salvation, not bread. The poor need repentance and prayer, not protests in our streets!"

 ig_trait_citizen_salon: "Citizen Salon"
 ig_trait_citizen_salon_desc: "Participating in political life is citizens' duty. As sovereigns, we must contribute talents and loyalty to our great motherland. Though government cannot manage everything, through our political groups, rulers may better hear our voices."
 ig_trait_romanticism: "Romanticism"
 ig_trait_romanticism_desc: "In ethics, politics and aesthetics, sincerity in pursuing intrinsic goals matters most - for individuals and groups alike. Our artists convey this ideal beauty through canvas or sound; flaws are redeemed by passionate belief in spiritual freedom and romantic creation."
 ig_trait_defamation_expert: "Defamation Experts"
 ig_trait_defamation_expert_desc: "Defaming all government policies is our rightful duty. Government merely represents us in governance - how dare they forbid our criticism? Verbal attacks demonstrate patriotism - who can refute this?"
 ig_trait_advanced_finance: "Advanced Finance"
 ig_trait_advanced_finance_desc: "Bonds and stocks are our path to profit. Lending and investments benefit both our great nation and personal wealth. In continental financial games, the first mover prevails - and we shall be victors."
 ig_trait_revolution: "Vanguard of Revolution"
 ig_trait_revolution_desc: "Arise, children of the fatherland! The day of glory has arrived! Against us tyranny raises its bloody banner. To arms, citizens! Form your battalions! Let impure blood water our fields!"
 ig_trait_daughter_of_god: "Eldest Daughter of the Church"
 ig_trait_daughter_of_god_desc: "Our Catholic Church's ties to Rome have never been as tight as others'. We practically override even His Holiness' authority in appointing bishops. Our priests prioritize serving believers' joy and government policy."
 ig_trait_secularism: "Secularism"
 ig_trait_secularism_desc: "The old ways are gone. Though Catholicism remains French culture's backbone, we must acknowledge changing public attitudes toward religion in this new era. Time to step aside pragmatically."
 ig_trait_moral_blasphemy: "Moral Blasphemy"
 ig_trait_moral_blasphemy_desc: "See what society has become! Traditional morals decline, orderly society crumbles, even our nation's proudest spiritual virtues are scorned. Rather than yield to degenerates, let's teach true morality to the next generation."
 ig_trait_farmers_allies: "Farmers' Alliance"
 ig_trait_farmers_allies_desc: "France's farmers deserve a united organization. Though less influential than unions, it can coordinate to prevent losses from poor communication, stabilizing market profits - benefiting our nation."
 ig_trait_bordeaux_wine: "Bordeaux Vineyards"
 ig_trait_bordeaux_wine_desc: "The world's finest wines come from our terroir - from everyday table wines to Bordeaux and Languedoc's most expensive, prestigious vintages. No label commands global recognition like our vineyards'."
 ig_trait_against_imports: "Price Gouging"
 ig_trait_against_imports_desc: "Why should we pay for others' so-called cheap grain? Unless government compensates our losses, we'll never obey price controls that harm our interests."
 ig_trait_grand_army: "Grande Armée"
 ig_trait_grand_army_desc: "Napoleon's Grande Armée was France's mightiest military force. Though gone, its glory still inspires our people to fight when needed - from northern borders to southern frontiers, we triumph or die!"

 ig_trait_leopoldina: "National Academy of Sciences"
 ig_trait_leopoldina_desc: "We are poets and professors, the rational mind of the nation. In Berlin, Göttingen, Leipzig, Jena... among state-funded academies and lecterns, we've established a new institution: a scientific temple uniting natural philosophy with astronomy and geography. Our aim is not to accumulate knowledge, but to comprehend all phenomena and reveal nature's intrinsic connections - this is our ultimate goal."
 ig_trait_rationalismus: "Rationalism"
 ig_trait_rationalismus_desc: "Two things fill the mind with ever-increasing wonder and awe the more often we reflect upon them: the starry heavens above me and the moral law within me. They are not beyond my sight nor hidden in darkness; we behold them directly and connect them intimately with our consciousness of existence."
 ig_trait_revolutionsfuhrer: "Revolutionary Vanguard"
 ig_trait_revolutionsfuhrer_desc: "We once debated quietly at lecterns and tried persuasion through newspapers, but the government turned a deaf ear. Now we take to the streets, raise our banners, and cease debate - there is no path to freedom except through bloodshed! For it is not tyrants who fear death, but slaves who fear life!"
 ig_trait_reactionary_enthusiasm: "Reactionary Zeal"
 ig_trait_reactionary_enthusiasm_desc: "This nation belongs to the Junkers. Since the current government dares resist our aristocratic will, we shall make them face the consequences."
 ig_trait_offizierskorps: "Junker Offizier Korps"
 ig_trait_offizierskorps_desc: "The Prussian officer corps has traditionally consisted of us Junker nobles with elite military training, passed down through generations. We are the core of the state's efficient military machine, far superior to officers of other nations. So long as the government remains loyal to Junker interests, we pledge to lead the fatherland from victory to victory with blood and loyalty."
 ig_trait_army_hasastate: "An Army With a State"
 ig_trait_army_hasastate_desc: "Other states possess an army; in our case, the army possesses a state."
 ig_trait_ironcross: "Iron Cross"
 ig_trait_ironcross_desc: "The Iron Cross, first awarded in 1813, represents our soldiers' highest honor - symbolizing blood, loyalty, merit, and iron discipline. Every soldier aspires to earn this medal, which constantly inspires us to fight for the fatherland's interests."
 ig_trait_shadow_government: "Shadow Government"
 ig_trait_shadow_government_desc: "In truth, the civilian government in the capital decides nothing. Without our military's loyalty, all their so-called policies and laws are meaningless. The General Staff is the real cabinet - everything in this nation must prioritize the army's interests above all."
 ig_trait_made_in_germany: "Made in Germany"
 ig_trait_made_in_germany_desc: "German industrial goods shall never symbolize poor quality or cheapness. They must become the ultimate label representing our nation's craftsmanship, the world's most prestigious mark of origin. We will spare no effort - even at the cost of profits - to achieve this."
 ig_trait_national_enterprise: "National Enterprise"
 ig_trait_national_enterprise_desc: "Our enterprises are intimately tied to national interests. The government provides favorable policies and subsidies; we repay them with taxes and profits. So long as this close relationship continues, we gladly serve not just ourselves, but society's greater good."
 ig_trait_social_justice: "Social Justice"
 ig_trait_social_justice_desc: "Workers deserve treatment commensurate with their labor before equality can exist. We passionately believe our fatherland will establish fair cooperative systems in society and factories, passing them down through generations."
 ig_trait_rigorous_work: "Meticulous Craftsmanship"
 ig_trait_rigorous_work_desc: "No matter our profession, we always work with precision and care. Though we may lack secret family techniques or achieve perfection, we pour our hearts into creating satisfactory products."
 ig_trait_organize_strike: "Organized Strike"
 ig_trait_organize_strike_desc: "The strike remains the working class's most powerful weapon. When employers refuse fair wages, we unite and refuse work - let these arrogant industrialists witness the might of our unions!"
 ig_trait_deutsche_nationale_identitat: "German National Identity"
 ig_trait_deutsche_nationale_identitat_desc: "Germany, Germany above all, above everything in the world! Whenever needed for protection and defense, brothers stand together! Unity, justice and freedom for the German fatherland!"
 ig_trait_geist_der_exzellenz: "Spirit of Excellence"
 ig_trait_geist_der_exzellenz_desc: "We live in an era of unprecedented opportunity: with ambition and intellect, regardless of origin, anyone can excel in their chosen field. We must find our place, know when to change course, and remain dedicated throughout long careers."

 ig_trait_third_and_last_rome: "Third Rome"
 ig_trait_third_and_last_rome_desc: "Then I saw another angel ascending from the east, having the seal of the living God... These are they who came out of great tribulation, and have washed their robes and made them white in the blood of the Lamb. Therefore they are before the throne of God, and serve Him day and night."
 ig_trait_icon_in_the_snow: "Icon in the Snow"
 ig_trait_icon_in_the_snow_desc: "The Lord is my shepherd; I shall not want... Though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me... Thou preparest a table before me in the presence of mine enemies: thou anointest my head with oil; my cup runneth over. Surely goodness and mercy shall follow me all the days of my life: and I will dwell in the house of the Lord forever."
 ig_trait_fire_upon: "Fire From Heaven"
 ig_trait_fire_upon_desc: "Then the glory of the Lord departed from the threshold of the temple... And He said unto me: 'Son of man, hast thou seen what the elders of the house of Israel do in the dark? For they have forsaken My sanctuary... Behold, I will kindle a fire in their midst, and it shall devour their cities!'"
 ig_trait_war_frenzy: "Expansionist Zeal"
 ig_trait_war_frenzy_desc: "Our domains stretch across the continent from sunrise to sunset. No arbitrary borders can contain our ambition: all lands belong to Mother Russia!"
 ig_trait_register_for_army: "Conscription Registry"
 ig_trait_register_for_army_desc: "Every Russian man must dutifully register for military service annually and undergo training. These measures ensure our glorious army can rapidly expand when needed. At the Tsar's command, we shall mobilize every able-bodied man for battle!"
 ig_trait_gray_cattle: "Grey Cattle"
 ig_trait_gray_cattle_desc: "In this benighted nation, we who fight bitterly at the front are mocked as 'grey cattle' by so-called refined aristocrats. Since these nobles and officers treat us as beasts, we owe them no loyalty in return."
 ig_trait_owner_of_land: "Landed Gentry"
 ig_trait_owner_of_land_desc: "Our wealth flows from ancestral estates - these lands give us power to make governments heed our will. Yet when profits allow, we gladly contribute to national prosperity, for this too is sound investment."
 ig_trait_adm_expert: "Little Father"
 ig_trait_adm_expert_desc: "Our great leader is the 'Little Father' of all Russia's peoples. His authority and laws depend on us to implement throughout the land. When he raises his scepter in command, we shall obey without question."
 ig_trait_master_of_city: "Masters of the Cities"
 ig_trait_master_of_city_desc: "The buildings and factories of our cities belong first to us, then to the state, and lastly to others. Though some say our cities lag behind Europe's, this shall not endure - we constantly make them fairer and more orderly than any abroad."
 ig_trait_rus_westernlism: "Westernization"
 ig_trait_rus_westernlism_desc: "Look upon this rapidly changing world! None can deny our motherland lags behind progressive nations in many ways. Yet we still possess windows of opportunity to catch up - if only we're permitted to make the effort."
 ig_trait_spread_of_dissent: "Dissemination of Dissent"
 ig_trait_spread_of_dissent_desc: "See what manner of men infest our government! Foolish old bureaucrats, rotten leaders conspiring with greedy oligarchs to ruin our homeland! We owe these scoundrels no praise - we'll see them driven out!"
 ig_trait_worker_soviet: "Workers' Soviets"
 ig_trait_worker_soviet_desc: "In our self-organized workers' soviets, committees manage through temporary, recallable delegates elected by laborers. Workers determine schedules and needs through soviets, authorizing delegates to set quotas and spur productivity - kindling labor enthusiasm."
 ig_trait_worker_forces: "Workers' Militias"
 ig_trait_worker_forces_desc: "Should the government recognize workers' right to bear arms, these forces could defend both our factories and, when necessary, rise to protect the motherland itself."
 ig_trait_worker_revolution: "Armed Revolution"
 ig_trait_worker_revolution_desc: "Arise, ye prisoners of starvation! Arise, ye wretched of the earth! For justice thunders condemnation - a better world's in birth! No more tradition's chains shall bind us; we'll smash the old oppressive norms! We are the grand new world's creators - the coming dawn is ours!"
 ig_trait_gods_chosen_people: "National Character"
 ig_trait_gods_chosen_people_desc: "Our duty is to labor in national spirit according to our sovereign leader's will. Every peasant on Russian soil shall work with loyalty to leader and homeland, proving trustworthy assistants to the government."
 ig_trait_endure_suffering: "Endurance of Suffering"
 ig_trait_endure_suffering_desc: "But ye are a chosen generation, a royal priesthood, a holy nation, a peculiar people; that ye should show forth the praises of Him who hath called you out of darkness into His marvelous light. Which in time past were not a people, but are now the people of God: which had not obtained mercy, but now have obtained mercy."
 ig_trait_burden_of_mission: "Sense of Mission"
 ig_trait_burden_of_mission_desc: "History does not require us to forgive it, but we must forgive ourselves: for we chose to stay and accomplish what no one else was willing to do, for our most sincere Mother Russia."
 ig_trait_mediating_reformers: "Intermediary Reformers"
 ig_trait_mediating_reformers_desc: "In our nation, supported by a vast bureaucracy and an unenlightened church, the majority of the people are illiterate, unable to express or truly defend their own interests; we are the only ones who can turn ideas into solutions for societal issues. We must, and we are obligated to lead our great Russian motherland towards transformation."

 ig_trait_philanthropy: "Philanthropy"
 ig_trait_philanthropy_desc: "Make all you can, save all you can, give all you can. Our wealth has far surpassed ordinary measure - to us it constitutes an immense, inexhaustible fortune. Seeing this, what reason have we to withhold portions for researchers needing investment and laborers deserving relief? Let us contribute to society's betterment."
 ig_trait_innovative_spirit: "Spirit of Innovation"
 ig_trait_innovative_spirit_desc: "In these United States, our passion for technological innovation outshines all other lands. Technology begets products, and products beget profits! We gladly fund inventors, for do they not consistently generate greater profits for us?"
 ig_trait_legal_monopoly: "Lawful Monopoly"
 ig_trait_legal_monopoly_desc: "Ours is a free nation - what legal basis exists to brand our properly managed enterprises as monopolistic or unlawful? We've merely achieved modest scale through honest toil. Cease these slanders against our integrity!"
 ig_trait_loyalty_to_constitution: "Citizen Militia"
 ig_trait_loyalty_to_constitution_desc: "An armed citizenry is the strength of a free nation: free men, endowed with the resilience to endure adversity; free men, whose only safeguard is themselves; free men, armed and educated, shall never be enslaved by any government. Sons of liberty, rise from the fields and defend the land we have tilled!"
 ig_trait_sea_power: "Sea Power Doctrine"
 ig_trait_sea_power_desc: "By commanding the high seas, our nation may command the world's wealth - and thereby the world itself. To emerge as a global power, we require a navy both formidable and disciplined, with worldwide bases to protect vast merchant fleets. This is our martial calling."
 ig_trait_enemies_in_congress: "Enemies on Capitol Hill"
 ig_trait_enemies_in_congress_desc: "Why do Congressional lords perpetually doubt our patriotic soldiers' loyalty? Why must they reject every vital, reasonable demand? We spill blood on battlefields while these wretched legislators obstruct national progress!"
 ig_trait_frontier_pioneers: "Frontier Pioneers"
 ig_trait_frontier_pioneers_desc: "Ours is a great age of expansion! The western frontier brims with limitless wealth and opportunity - any settler might gain a fortune. Go west, young man, to the land of freedom and promise!"
 ig_trait_master_of_farm: "Masters of the Land"
 ig_trait_master_of_farm_desc: "Vast farmlands constitute our property and livelihood. Since the nation faithfully protects private holdings, we confidently cultivate these acres, ensuring their prosperity endures across generations."
 ig_trait_racism: "Racial Prejudice"
 ig_trait_racism_desc: "Why must these detestable negroes share our nation? America belongs to us, not their kind - let them return whence they came!"
 ig_trait_humanity_beacon: "Beacon of Liberty"
 ig_trait_humanity_beacon_desc: "O say can you see, by the dawn's early light, What so proudly we hailed at the twilight's last gleaming, Whose broad stripes and bright stars through the perilous fight, O'er the ramparts we watched, were so gallantly streaming? And the rocket's red glare, the bombs bursting in air, Gave proof through the night that our flag was still there; O say does that star-spangled banner yet wave, O'er the land of the free and the home of the brave?"
 ig_trait_freedom_of_speech: "Freedom of Speech"
 ig_trait_freedom_of_speech_desc: "The Constitution grants freedom to know, speak and debate according to conscience, for expressing thought and opinion ranks among mankind's most precious rights. Here, every citizen may freely speak, write and publish - liberty means thinking and speaking without constraint!"
 ig_trait_tyranny_of_majority: "Tyranny of the Majority"
 ig_trait_tyranny_of_majority_desc: "Majorities invariably grow despotic, systematically stripping minority rights. Individual rights must supersede collective will as society's sole moral compass - never compromised by group membership or governance."
 ig_trait_city_upon_hill: "City Upon a Hill"
 ig_trait_city_upon_hill_desc: "We covenanted with God to settle this new land. As a city upon a hill watched by all mankind, we must exemplify global morality and freedom."
 ig_trait_gospel_of_work: "Gospel of Work"
 ig_trait_gospel_of_work_desc: "We believe labor is God's will and commerce His instrument: honest trade, prompt taxes, diligent work and thrifty gratitude all manifest faith. God curses not wealth, but teaches blessings come through toil."
 ig_trait_higher_law: "Higher Moral Law"
 ig_trait_higher_law_desc: "Should laws compel moral transgression, we must disobey - no mortal decree outweighs God's voice!"
 ig_trait_american_dream: "American Dream"
 ig_trait_american_dream_desc: "We dream of a land where life should be better, richer and fuller for every man, with opportunity according to ability or achievement; a social order where each man and woman shall attain their fullest stature unhindered by birth or position; a nation granting ourselves and posterity the happy freedom we cherish."
 ig_trait_community_self_governance: "Community Self-Rule"
 ig_trait_community_self_governance_desc: "That government is best which governs least. Recognizing the individual as a superior, independent power from whom all authority derives, our Republic treats each citizen accordingly - this spirit makes America truly free and enlightened."
 ig_trait_us_populism: "Populist Sentiment"
 ig_trait_us_populism_desc: "Government itself requires constant vigilance, lest corrupt elites quietly manipulate public conduct through covert operations, ultimately poisoning democracy's wellspring."

 ig_trait_holy_blood: "Sacred Bloodline"
 ig_trait_holy_blood_desc: "Our lineage is ancient and glorious, having served as the right hand of Caesars since the Holy Roman Empire, dominating Vienna's court. So long as the Kaiser heeds our counsel, we shall spare no effort to assist his benevolent and generous rule."
 ig_trait_statutory_privilege: "Statutory Privileges"
 ig_trait_statutory_privilege_desc: "Who granted you authority to tax us? We are the nation's tax farmers and the peasants' tribunes. Beyond what we pledged to the Kaiser, not one silver thaler shall we yield!"
 ig_trait_universalism: "Universalism"
 ig_trait_universalism_desc: "All races in Austria deserve equal rights, each possessing inviolable rights to preserve their ethnicity and language. We must recognize all traditional languages' equal status to promote national equality."
 ig_trait_wiener_kreis: "Vienna Circle"
 ig_trait_wiener_kreis_desc: "Metaphysics stems from logical errors arising from natural language's ambiguity. The fundamental error lies in believing thought can derive knowledge either from its own resources without empirical material, or by inferring new content from given states of affairs. Though not every scientific worldview adherent becomes a warrior, we must now face modernity, reject these traditional views, and stand firmly on empirical science's ground."
 ig_trait_if_for_freedom: "Freedom Above All"
 ig_trait_if_for_freedom_desc: "Life is dear, love is dearer. Both can be given up for freedom!"
 ig_trait_industrial_giants: "Industrial Titans"
 ig_trait_industrial_giants_desc: "New transportation methods are transforming daily life and broadening horizons. In this pioneering era, we've emerged to convert passion into enterprise. The nation's industry relies on our innovation and progress - thus shall we ever continue."
 ig_trait_language_barrier: "Language Barriers"
 ig_trait_language_barrier_desc: "Our officers are Austrians and Germans, yet our soldiers include Magyars, Czechs, Poles, even Croats! How can they obey commands when they don't understand our speech?"
 ig_trait_local_richarmy: "Provincial Armies"
 ig_trait_local_richarmy_desc: "Every province and state maintains its own forces. So long as they remain loyal to Vienna, they'll bravely answer the government's call when needed, marching to defend the Empire."
 ig_trait_national_ties: "National Bonds"
 ig_trait_national_ties_desc: "In our empire of countless ethnicities and faiths, national conflicts and political divisions run deep. The army stands as the only true bond between peoples and sole instrument for patriotic expression - this duty it must uphold."

 ig_trait_benevolence_and_righteousness: "The Way of Benevolence"
 ig_trait_benevolence_and_righteousness_desc: "Kindness constitutes benevolence; principle constitutes righteousness; moderation constitutes propriety; discretion constitutes wisdom. With benevolence, righteousness, propriety and wisdom, the human way is complete. Thus the Son of Heaven governs all under heaven with benevolence and righteousness, secures them with love and benefit, guides them with loyalty and faith, eliminates calamities, and seeks blessings - thereby bringing stability to the realm."
 ig_trait_wise_ruler: "Sage Ruler, Worthy Ministers"
 ig_trait_wise_ruler_desc: "No principle goes unimplemented, no strategy proves unwise. With sagely ruler and worthy ministers, fortune smiles and times prosper. Today we live in a Yao-Shun era of enlightened governance - naturally all lands pay tribute to the imperial will."
 ig_trait_local_emperor: "Local Tyrants"
 ig_trait_local_emperor_desc: "Mountains are high and the emperor far away - what matters his sagacity? Our people permeate the realm. Should mighty rulers disdain our counsel, let them issue futile decrees from their crumbling capital! If they won't listen, why must we obey?"
 ig_trait_be_confucian_teach: "Moral Education"
 ig_trait_be_confucian_teach_desc: "Confucianism takes education as foundation - thus we beautify moral transformation and alter customs. Ritual's transformative power works subtly, stopping evil before it forms. Therefore kings establish schools to illuminate moral instruction, guiding the people. Our duty is educating all, embedding ethical principles deep in hearts, bringing the envisioned Great Harmony."
 ig_trait_mandate_of_heaven: "Mandate of Heaven"
 ig_trait_mandate_of_heaven_desc: "Virtuous rulers receive Heaven's mandate to govern all under heaven. Heaven's decree and creatures' nature originate not from human will. By fully realizing their nature, they comprehend all natures, fulfill Heaven's mandate, and achieve universal understanding without knowing why. How can we disobey rulers supported by such divine mission?"
 ig_trait_confucian_ethics: "Ancestral Institutions"
 ig_trait_confucian_ethics_desc: "Ancestral laws constitute household principles - establishing precautions and meticulous regulations. We must reverently uphold them without overstepping. The Sacred Son of Heaven governs through filial piety. Ancient kings' established institutions had their reasons - what qualifications has the present ruler to defy them?"
 ig_trait_social_research: "Investigation of Things"
 ig_trait_social_research_desc: "The ancients who wished to illustrate illustrious virtue first governed their states. Wishing to govern well, they first regulated families. Wishing to regulate families, they first cultivated themselves. Wishing to cultivate themselves, they first rectified hearts. Wishing to rectify hearts, they first sought sincerity. Wishing for sincerity, they first extended knowledge. Knowledge comes through investigating things. The wise should apply learned knowledge to analyze people and affairs, discerning truth from falsehood through original mind."
 ig_trait_useless_speech: "Empty Rhetoric"
 ig_trait_useless_speech_desc: "Some call us verbose, others pedantic scholars - what do they know? Merely sour grapes! We wield writing brushes to advocate causes - if we don't speak, what else remains?"
 ig_trait_peaceful_times: "Peaceful Golden Age"
 ig_trait_peaceful_times_desc: "We live in sagely governed prosperity - people enjoy abundance: lost items stay untouched on roads, doors need no locks at night, weather is favorable, disasters absent. This makes our farming easier still."
 ig_trait_rule_of_etiquette: "Ritual Principles"
 ig_trait_rule_of_etiquette_desc: "Rulers guide subjects, husbands guide wives, fathers guide sons. These Three Bonds and Five Constants form ritual's essence, maintained unaltered through three dynasties. When these three are correct, commoners follow accordingly."
 ig_trait_catch_a_fire: "Raising the Standard"
 ig_trait_catch_a_fire_desc: "People are water, rulers boats. Should rulers disregard our survival, don't expect secure thrones in the Forbidden City! Never underestimate how one-eyed stone men can stir the Yellow River to rebellion!"
 ig_trait_pragmatism: "Avoid Political Affairs"
 ig_trait_pragmatism_desc: "We common folk—what business have we with affairs of state? These grand matters are not for us to meddle in. Let those in power handle their own concerns; we need only tend to our own lives. As the saying goes, each man sweeps the snow from his own doorstep. To keep one's head down, to remain prudent and silent—these are the very means by which we survive in this world."
 ig_trait_following_its_natural: "Go with the Flow"
 ig_trait_following_its_natural_desc: "Life is lived as it comes, step by step: things are as they are, and there is little use in resisting them. Why struggle against the inevitable? One day at a time is enough. What is meant to come will come; what is not, no amount of worry will bring."
 ig_trait_conning_commoner: "Cunning Commoners"
 ig_trait_conning_commoner_desc: "He keeps his words to himself, for he knows they serve little purpose. He has seen too many suffer for their honesty—reason and fairness count for nothing. People only heed those who are ruthless and forceful; they are the ones who gain advantage. As for the honest man? He is the one most likely to suffer."
 ig_trait_chinese_boycott: "Boycott Foreign Goods"
 ig_trait_chinese_boycott_desc: "Our land is abundant, more than capable of sustaining our daily needs. The root of our present plight lies in the influx of foreign goods. Such imports not only erode our simple customs, but also bring with them those who admire foreign ways, corrupting the very spirit of our nation. Foreign gas is but ghostly fire, railways disturb our ancestors’ graves, and cameras steal the soul. We must resist the wares of these foreign devils!"
 ig_trait_government_cooperation: "Government–Merchant Cooperation"
 ig_trait_government_cooperation_desc: "Though our country possesses a long tradition of agreements and contracts, it lacks reliable mechanisms for their enforcement. Yet, by aligning ourselves with the state and operating under its authority and credit, we may not only secure greater stability for our enterprises, but also expand more swiftly across the provinces and even beyond our borders."
 ig_trait_national_industry: "Industrial Salvation"
 ig_trait_national_industry_desc: "Our nation suffers from a grave poverty of strength, and its cure lies in the revitalisation of industry and education. There is but one path to saving China: to strengthen the nation; and to strengthen the nation, we must develop industry. Without the rise of our own native enterprises, national prosperity remains unattainable. This, therefore, is our foremost responsibility."

 ig_trait_law_and_civilization: "Law and Glory"
 ig_trait_law_and_civilization_desc: "The world changes, and the Empire cannot remain stagnant forever. We are neither heretics nor servants of the West—we are the voice of reason within the Empire. We replace bloodlines with legal codes, muskets with schools, and courtly violence with open debate, all to restore the glory of this ancient state."
 ig_trait_tanzimat: "Tanzimat"
 ig_trait_tanzimat_desc: "The survival of the Empire demands urgent reform—account books must balance, courts must uphold justice, and officials must be literate. The Sublime State stands on the brink, and we are its saviors."
 ig_trait_forbidden_books: "Forbidden Texts"
 ig_trait_forbidden_books_desc: "A ruler may burn paper, but not ideas; he may ban newspapers, but not truth. Once, we whispered in libraries—now, we print pamphlets in shadowed alleys. If ignorance is sold as loyalty, we shall ignite the flames of reason and tear away the rotting mask of this antiquated empire."
 ig_trait_jihad: "Jihad"
 ig_trait_jihad_desc: "Allah has purchased from the believers their lives and wealth in exchange for Paradise—they fight in His cause, slaying and being slain, a promise binding upon Him in Truth. Who could be truer to His covenant than Allah? So rejoice in this bargain, for it is the ultimate triumph."
 ig_trait_words_remain: "People of the Book"
 ig_trait_words_remain_desc: "He sends down rain from the sky, causing plants to grow for your sustenance. Eat, but do not corrupt the earth. To every nation We sent a messenger, saying: 'Worship Allah and shun false deities.'"
 ig_trait_faith_in_chains: "Unbelievers"
 ig_trait_faith_in_chains_desc: "Allah is the Protector of the faithful, leading them from darkness into light. As for the disbelievers, their patrons are false idols, dragging them from light into darkness."
 ig_trait_arm_of_sultan: "Iron Arm of the Sultan"
 ig_trait_arm_of_sultan_desc: "The Sultan needs not just loyalists, but enforcers—we are the iron fist of his law, asking not 'why,' but 'where to strike.' Where rebellion stirs, our cavalry rides; where dissent whispers, our spies listen. Order is not born—it is forged in iron and fire. So long as the throne stands, we are the weight that steadies it."
 ig_trait_local_pashas: "Local Pashas"
 ig_trait_local_pashas_desc: "We do not oppose reform—so long as the land remains ours and order prevails, let the reformers chatter. A wise Bey knows how to balance control and autonomy: grip too tight, and the province chafes; too loose, and it slips away. Someone must guard the periphery."
 ig_trait_corruption_and_privilege: "Graft and Privilege"
 ig_trait_corruption_and_privilege_desc: "What do those fool bureaucrats know? We were manipulating tax ledgers, bribing garrisons, and playing the Porte like a lute before they were born. The land is ours, the judges eat from our hands, and even the Sultan relies on us to hold his borders. If the Empire rejects the old families’ rules, let it watch its provinces shatter into a patchwork of Beyliks!"
 ig_trait_modernists_of_sublime: "Modernists of the Sublime State"
 ig_trait_modernists_of_sublime_desc: "We believe in railroads, telegraphs, banks, and joint-stock companies. We are the wellspring of wealth, the true masters of this state—if the Sultan wishes to keep pace with the West, he must recognize that greatness flows from our investments and consumption."
 ig_trait_forges_of_tigris: "Forges of the Tigris"
 ig_trait_forges_of_tigris_desc: "Copper wires stretch, machines roar—we are neither politicians nor reformers. So long as markets stay open, capital flows, and order endures, we will hammer this ancient empire into a new world of steel and smokestacks."
 ig_trait_capital_in_chains: "Shackled Capital"
 ig_trait_capital_in_chains_desc: "We invest, build roads, and raise factories—only to face tariff walls, bureaucratic delays, and aristocratic scorn. Chain capital, and you chain progress. Deny us profit, and we will deny you a future."
 ig_trait_dini_ayrimcilik: "Religious Segregation"
 ig_trait_dini_ayrimcilik_desc: "In this land rife with segregation and discrimination, even the army is not exempt: no one would truly be willing to shed blood for a lofty infidel overlord."
 ig_trait_el_hamidiye: "Hamidiye"
 ig_trait_el_hamidiye_desc: "The Hamidiye represent our attempt to fuse tribal cavalry with modern military structures. Though at times ragged in appearance, by forging bonds of loyalty with them, this corps can help safeguard some of our most vulnerable frontiers and lines of defense."
 ig_trait_genc_subaylar: "Young Officers"
 ig_trait_genc_subaylar_desc: "What gives an army its true fighting strength lies in the young officers who command it. Building proper organization and camaraderie, introducing the latest weapons and technologies, and embracing the most daring spirit of attack — this is the value a fine officer brings to the army."

 ig_trait_engines_of_risorgimento: "Engines of the Risorgimento"
 ig_trait_engines_of_risorgimento_desc: "They say armies will unify Italy—we say factories will. Railroads link not just cities, but destinies; machines shape not just steel, but the very form of the nation. Let Italy’s glory be reborn in boiler rooms, and industry will unite the Peninsula’s beating heart!"
 ig_trait_land_of_chimneys: "Land of Chimneys"
 ig_trait_land_of_chimneys_desc: "Factories care not for the color of flags, only for steady fuel and orders. Industry asks not who rules, only that tracks reach ports and tariffs do not strangle profit. Any land can be our market—if the price is right."
 ig_trait_civic_watchmen: "Civic Watchmen"
 ig_trait_civic_watchmen_desc: "While nobles cling to faded glory and revolutionaries shatter palace china, we raise ledger books and keys. A state is not a dream—it is a system. Trust us, and the bourgeoisie will be the most reliable cogs in Italy’s machine."
 ig_trait_people_of_procedure: "People of the Code"
 ig_trait_people_of_procedure_desc: "Balanced books, lit streetlamps, punctual officials—this is enough. We seek neither upheaval nor war. Let us pay taxes, file paperwork, and live by the clock. Society is no romantic opera, but a ledger kept in black ink."
 ig_trait_stabbed_in_the_back: "Stabbed in the Back"
 ig_trait_stabbed_in_the_back_desc: "These radicals—socialists, atheists, damned troublemakers! They wave the people’s banner yet fill streets with chaos; they preach liberty while desecrating our churches and laws. We are neither aristocrats nor generals, but we know who plunged the knife into Italy’s back."
 ig_trait_land_of_peace: "Land of Peace"
 ig_trait_land_of_peace_desc: "Jesus said unto them: 'Truly I tell you, at the renewal of all things, when the Son of Man sits on his glorious throne, you who have followed me will also sit on twelve thrones. And everyone who has left houses or brothers or sisters or father or mother or wife or children or fields for my sake will receive a hundredfold and inherit eternal life.'"
 ig_trait_sancti_et_dilecti: "Holy and Beloved"
 ig_trait_sancti_et_dilecti_desc: "Therefore, as God’s chosen people, holy and dearly loved, clothe yourselves with compassion, kindness, humility, gentleness, and patience. Bear with each other and forgive grievances as the Lord forgave you. And over all these virtues put on love, which binds them all together in perfect unity."
 ig_trait_supplication_prayer: "Supplication and Prayer"
 ig_trait_supplication_prayer_desc: "I cry aloud to the Lord; I lift my voice to Him for mercy. I pour out my complaint before Him; before Him I tell my trouble. When my spirit grows faint within me, it is You who watch my path. They have hidden a snare for me along my way."
 ig_trait_risorgimento: "Spirit of Resurgence"
 ig_trait_risorgimento_desc: "The world lacks a nation with true leadership to guide humanity on the path of responsibility and fraternity among nations: we must revive ancient traditions and establish a nation brave enough to correct wrongs, support the weak, and pursue better, more satisfying achievements—alleviating the suffering of our fellow citizens and uniting all who yearn for a good life."
 ig_trait_camicie_rosse: "Red Shirts"
 ig_trait_camicie_rosse_desc: "When the horn sounds the alarm of battle, I am clad in you; you are the symbol of courage, your color strikes fear into the enemy; with you on my chest, I will fight to the end against the tyrants and oppressors of this land; when death comes to this valiant struggle, I will still be wearing that indomitable battle garment!"
 ig_trait_realists: "Realpolitik"
 ig_trait_realists_desc: "God, so many enemies stand before us! It seems our ideals are doomed to fail, if not today then tomorrow, so we might as well leave sooner rather than later."
 ig_trait_unavis: "Unanimous Voice"
 ig_trait_unavis_desc: "Fighting for Italy is the ultimate honor; our soldiers are sons of Italy, their determination and discipline are beyond question: we will sacrifice everything for the nation and the motherland!"
 ig_trait_mountain_hunter: "Mountain Hunters"
 ig_trait_mountain_hunter_desc: "The complex mountains are our country's natural barrier; even Hannibal of Carthage met his downfall on our land. As long as we maintain our skills in fighting in complex terrains, no enemy can invade our homeland."
 ig_trait_loyal_to_nations: "Loyal to the People"
 ig_trait_loyal_to_nations_desc: "The state can make mistakes, but the people must not be betrayed. Our soldiers come from the people, and our sole responsibility is to defend them. We know this task well, and we know how to truly fulfill it."

 ig_trait_railway_bonds: "Railway Bonds"
 ig_trait_railway_bonds_desc: "With the promulgation of railway policies, our financial consortiums across the country have begun raising capital through guaranteed notes and government bonds, adopting British gauge standards and low-voltage technologies. Though the central government may waver in its administrative support, we universally recognize the strategic value of railways in connecting ports to inland resources."
 ig_trait_kobugattai: "Kōbu Gattai (Union of Court and Shogunate)"
 ig_trait_kobugattai_desc: "The joint rule by imperial court nobles and military houses must extend beyond mere decrees—it must permeate every level of governance. The samurai and daimyo are the foundation of our state; so long as their loyalty is secured, the Emperor's authority shall remain unshaken."
 ig_trait_sankin_kotai: "Sankin-kōtai (Alternate Attendance)"
 ig_trait_sankin_kotai_desc: "The Sankin-kōtai system compels regional daimyo to periodically attend the Kyoto court. While this system functions smoothly, our governance remains consolidated, and both the imperial treasury and central authority profit from its continuance."
 ig_trait_kazoku_system: "Vanguards of Civilization"
 ig_trait_kazoku_system_desc: "We, the kazoku peerage, are pillars of the state. We must cultivate virtue and uphold dignity as models for the people. Titles alone do not define us—we bear the dual burdens of national duty and moral leadership, ever striving to pioneer civilization."
 ig_trait_taisei_hokan: "Taisei Hōkan (Restoration of Imperial Rule)"
 ig_trait_taisei_hokan_desc: "We, Yoshinobu, humbly petition: For the peace of the realm and the welfare of the people, we now restore all governing authority to the Imperial Court. May the Emperor henceforth administer all affairs of state and glorify the imperial lineage."
 ig_trait_sonno_joi: "Sonnō Jōi (Revere the Emperor, Expel the Barbarians)"
 ig_trait_sonno_joi_desc: "The Emperor's unbroken lineage traces to the divine Jimmu—the sole legitimacy of Japan. Western ships and guns run rampant because faithless traitors have abandoned virtue and order. We cannot betray our kokutai, our bloodline, or the gods: While our sovereign remains in Kyoto, we fight for the true Japan!"
 ig_trait_divided_troops: "Fractured Military"
 ig_trait_divided_troops_desc: "Due to government negligence, the Army and Navy operate as separate entities with conflicting chains of command, undermining morale at every turn. Is this the fault of soldiers? Never! The blame lies with those wretched bureaucrats meddling in affairs beyond their station!"
 ig_trait_bushido: "Bushidō"
 ig_trait_bushido_desc: "We warriors live by loyalty: obeying superiors without question, fulfilling duty with devotion. Propriety shapes our ethics; courage steels our spirit; honor binds our word; frugality tempers our lives. Let the world know—a soldier's righteousness flows from this unyielding sincerity!"
 ig_trait_gyokusai_charge: "Gyokusai (Shattered Jewel Charge)"
 ig_trait_gyokusai_charge_desc: "From conscription to battlefield, we embrace death as leave-taking from life. To break enemy lines under fire, only those resolved to die may survive—the fearful perish, the resolute triumph!"
 ig_trait_ronin: "Rōnin"
 ig_trait_ronin_desc: "Masterless samurai wander towns and fields, unrestrained—yet when the shōgun or daimyo issue the call, we rōnin become ready blades for our lords."
 ig_trait_samurai: "Buke (Warrior Houses)"
 ig_trait_samurai_desc: "Japan's governance rests on the balance between court nobles and military houses. We samurai are the shōgun's instruments of rule. So long as our station is honored, we shall honor the state and Emperor in turn."
 ig_trait_flower_of_free: "Flower of Freedom"
 ig_trait_flower_of_free_desc: "We live for love, for life, for poetry. The word 'freedom' stirs our hearts like a longed-for lover. We burn for the day Japan too may bloom freely—and we labor to make it so."
 ig_trait_bunmei_kaika: "Bunmei Kaika (Civilization and Enlightenment)"
 ig_trait_bunmei_kaika_desc: "What is enlightenment? The flourishing of individualism—where men act as sovereign beings, accountable to their own reason. This is kaika's true meaning."
 ig_trait_light_not_reach: "Patriotism"
 ig_trait_light_not_reach_desc: "This nation seems to prize grand monuments over countless lives—a monstrous indifference that chills the soul... Yet we cannot hate it. Herein lies our sorrow's weight: To disobey for justice, to follow conscience—this is loyalty's purest form."
 ig_trait_craftsmans_sprit: "Shokunin Kishitsu (Artisan's Spirit)"
 ig_trait_craftsmans_sprit_desc: "Our work embodies Japanese values—devoting utmost care to craft, imbuing each product with skill. In factories, such dedication may seem trivial, yet it is this spirit that makes our wares unique in global markets."
 ig_trait_datsu_aron: "Datsu-A Ron (Leave Asia, Enter Europe)"
 ig_trait_datsu_aron_desc: "The Restoration swept away old ways and set a new course: To proclaim Japan's place among civilized nations, we must shed our decaying East Asian neighbors and embrace European customs as our lodestar."
 ig_trait_japan_militarism: "Militarism"
 ig_trait_japan_militarism_desc: "The world order has ever been survival of the fittest—strong nations devour weak. Facing colossal threats, Japan must become the strongest. Every citizen must serve this cause, lest they betray the nation itself!"

 ig_trait_abbey_system: "Monastic System"
 ig_trait_abbey_system_desc: "Behold, how good and how pleasant it is for brethren to dwell together in unity! All who believed were together and held all things in common; they continued daily with one accord in the temple, and breaking bread from house to house, they ate their food with gladness and sincerity of heart."
 ig_trait_dios_patria_rey: "Dios, Patria, Rey!"
 ig_trait_dios_patria_rey_desc: "The King leads us, and hear the joyful crowd proclaim: under the will of the Lord, it shall shine again; the crown restored, it shall forever bring glory to our Fatherland!"
 ig_trait_don_quijote: "Don Quixote"
 ig_trait_don_quijote_desc: "When life itself seems mad, who knows where madness lies? Perhaps too much pragmatism is madness. To surrender dreams—this may be madness. To see too much reason may also be madness—and the maddest of all: to see life only as it is, and not as it ought to be!"
 ig_trait_ateneo_de_madrid: "Ateneo de Madrid"
 ig_trait_ateneo_de_madrid_desc: "Common experience shows that true happiness in monarchy is found when science and the arts flourish under it, meriting the highest respect of the Crown. We know well that to uphold this bond is to faithfully follow the path our forefathers laid out for the nation."
 ig_trait_alianza_de_oposicion: "Opposition Alliance"
 ig_trait_alianza_de_oposicion_desc: "The great dictator in power cannot subdue us. To them, time upon the throne is but a brief and curious interlude; for tyrants shall never rule forever the towns that belong to Spaniards!"
 ig_trait_gran_monopoly: "Grand Monopolist"
 ig_trait_gran_monopoly_desc: "There are always good gentlemen in government with whom we may deal generously—and such relationships ensure that every distinguished gentleman present may profit in turn."
 ig_trait_gigantes_mineros: "Mining Titans"
 ig_trait_gigantes_mineros_desc: "The value of mining to our nation is beyond measure. Through close cooperation with figures from all fields, and with the necessary funds, we shall secure ever greater support for this vital industry."
 ig_trait_plus_ultra: "Plus Ultra"
 ig_trait_plus_ultra_desc: "Behold this flourishing age! When prosperity is restored, ships shall once more return to the Bay of Seville: from the rising of the sun to its going down, the name of the Lord is to be praised!"
 ig_trait_conde_de_wool: "The Wool Count"
 ig_trait_conde_de_wool_desc: "Shameless thieves have stolen our sheep from the peninsula, yet our reputation remains untarnished: the merino sheep of Castile shall forever keep the looms singing!"
 ig_trait_real_decreto: "Royal Decree"
 ig_trait_real_decreto_desc: "The will of the Crown is the source of our greatest advantages in trade: we eagerly propose regulations, interpretations, and statements of all that experience shows to be necessary. Without doubt, this will advance the prosperity of the kingdom’s subjects."
 ig_trait_latifundistas: "Latifundistas"
 ig_trait_latifundistas_desc: "Whoever dares challenge our estates defies the natural order itself. Without landowners, the tenants are nothing; without us, there is no harvest. The idle talkers in Madrid had best remember this."

 ig_trait_markets_elsewhere: "Markets Abroad"
 ig_trait_markets_elsewhere_desc: "Our goods sell well—of that there is no doubt. Yet their most suitable markets lie not here, but elsewhere. And should trouble arise in those distant places, it will inevitably bring even greater trouble upon us here."
 ig_trait_capital_must_flow: "Capital Must Flow"
 ig_trait_capital_must_flow_desc: "Money flows—this is known to all. It seeks safer ground, and it seeks greater returns. And evidently, our nation has always found favour in precisely those places where capital thrives."
 ig_trait_europe_workshop: "Workshop of Europe"
 ig_trait_europe_workshop_desc: "It is a town of red brick, a factory of iron machines and towering chimneys, from which endless smoke coils into the sky without cease. Yes, gentlemen—this is the new domain of civilisation. Let the gold of progress flow forth from this grimy gutter!"
 ig_trait_colonial_commerce: "Colonial Enterprise"
 ig_trait_colonial_commerce_desc: "In short, our governance in the colonies is rightful, our enterprise in the colonies is honourable, and our presence there is beneficial to our native subjects. Nowhere are merchants and administrators more respected than under our rule, and nowhere do indigenous peoples enjoy greater assurances of civilisation than those we provide."
 ig_trait_chocolate_cream_soldier: "Chocolate-Cream Soldier"
 ig_trait_chocolate_cream_soldier_desc: "I find myself unable to trust a single word spoken by the generals! I have no ammunition—after all, what use are bullets on the battlefield? Better to carry chocolate. Alas, I finished my last piece yesterday."
 ig_trait_fighting_elsewhere: "Out of Practice"
 ig_trait_fighting_elsewhere_desc: "We do possess experience in warfare—though rarely here. Those conflicts were distant, and few paid them much heed. Yet when the time comes to apply that experience at home, things are seldom the same."
 ig_trait_oversea_service: "Overseas Service"
 ig_trait_oversea_service_desc: "Through the rotation of soldiers between overseas postings and their homeland, our army has learned to fight under diverse conditions, accumulating a wealth of experience. Properly applied, such knowledge grants us a decisive advantage in any conflict."
 ig_trait_carrier_of_the_seas: "Carrier of the Seas"
 ig_trait_carrier_of_the_seas_desc: "The prosperity of our empire—its colonies and trade alike—rests upon our ability to safeguard merchant shipping and to project power wherever it is required. For this, we have long relied upon a formidable navy, and such strength must be maintained."
 ig_trait_soldier_king: "Death With Honour"
 ig_trait_soldier_king_desc: "Our duty is clear: to defend the fatherland by all means possible. A nation that fights for itself commands the respect of all—and such a nation shall never perish."
 ig_trait_urban_suppliers: "Urban Suppliers"
 ig_trait_urban_suppliers_desc: "The long-awaited sight of ships laden with goods entering our ports has at last been realised! How joyful it is to hear cheers of triumph where once there were only murmurs of fear, sorrow, and uncertainty."
 ig_trait_efficient_cultivation: "Efficient Cultivation"
 ig_trait_efficient_cultivation_desc: "This may well be a charming place, yet it pales beside the splendour along the banks of the Vecht. There lie grand avenues and country estates, celebrated as unrivalled scenes of natural beauty and rural life—stretching across the lands between Utrecht and Amersfoort."
 ig_trait_popular_writers: "Popular Writers"
 ig_trait_popular_writers_desc: "The public is neither particularly learned nor particularly foolish, but rather impartial and just. Public opinion is as faithful as wax to a seal: it reflects, without distortion, the impressions it receives. Thus, the secret of popularity—and of eloquence—lies entirely in understanding what compels an audience to listen or to read."
 ig_trait_liberal_sovereignty: "Liberal Sovereignty"
 ig_trait_liberal_sovereignty_desc: "A strong and vibrant community of free individuals—this is the inexhaustible, living force of creation found in nature itself. Compared to it, even Rome appears but an artificial, self-important construct—brilliant perhaps, yet dimmed in the presence of our domain of liberty."
 ig_trait_crisis_of_language: "Crisis of Language"
 ig_trait_crisis_of_language_desc: "They tell us we belong to the same nation, yet we do not always understand their words. Are we truly loyal to the same country—or merely called so?"
 ig_trait_patriot: "Patriot"
 ig_trait_patriot_desc: "Such stirring patriotic verse, filled with a burning longing for our glory and redemption—when recited with proper force—bears witness to the courage of Hercules and the spirit of Achilles. We do not doubt that it shall move countless hearts and awaken noble devotion to the fatherland."
 ig_trait_municipality: "Municipal Autonomy"
 ig_trait_municipality_desc: "The freedom of a people lies in their legally guaranteed right to self-governance. In our country, citizens administer their affairs according to the privileges granted to their cities. Even a monarch ordained by God forfeits the right to rule if he oppresses his people. It is this ancient tradition that has ensured our nation’s prosperity."

 ig_trait_foreign_capital_nexus: "Foreign Capital Nexus"
 ig_trait_foreign_capital_nexus_desc: "The confidence of foreign investors is the foundation of national credit: foreign capital is not an enemy, and when properly harnessed, it can become an instrument of progress in times when domestic capital is lacking."
