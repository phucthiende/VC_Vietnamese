 joi_flavor_usa.40.t: "[SCOPE.sCountry('USA_scope').GetName] Requests a Loan from Us!"
 joi_flavor_usa.40.d: "Due to financial difficulties in the Union, they have now turned their attention to us, seeking our assistance..."
 joi_flavor_usa.40.f: "The financial problems of America have long been no secret internationally; given the close friendship between us and them, the U.S. Secretary of State visited our country, hoping to borrow a fortune from our pockets, promising that this would bring us many political benefits. The House of Commons is debating the Americans' request, should we lend to them or not?"
 joi_flavor_usa.40.a: "Is it time for the old father to pay an allowance to the foolish big son?"
 joi_flavor_usa.40.b: "What a big son, Daddy has no money either, why are you still freeloading?"
