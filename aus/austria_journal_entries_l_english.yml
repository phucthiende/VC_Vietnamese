 imperial_diet_industy_button:0 "Promote Industrial Development"
 imperial_diet_industy_button_desc:0 "Industrial growth remains crucial for Austrian prosperity. The government must implement subsidies and incentives to maintain our products' competitiveness while supporting industrialists."
 imperial_diet_agroculture_button:0 "Promote Agricultural Development"
 imperial_diet_agroculture_button_desc:0 "Agricultural stability forms the empire's backbone. We shall provide subsidies and favorable policies to farmers while ensuring our produce remains competitive."
 imperial_diet_city_button:0 "Modernize Infrastructure"
 imperial_diet_city_button_desc:0 "Our aging urban infrastructure cannot match our glorious cities' development. We shall allocate funds for comprehensive infrastructure modernization."
 imperial_diet_army_button:0 "Declare General Mobilization"
 imperial_diet_army_button_desc:0 "War clouds gather over the empire. As all peoples enjoy equal rights, they must also share defense responsibilities. The Diet must convene immediately to authorize nationwide conscription!"

 integrate_bosnia:0 "Integrate Bosnia"
 integrate_bosnia_reason:0 "Though [ROOT.GetCountry.GetName]'s influence has expanded across the Balkans with Ottoman decline, we cannot fall behind as world powers aggressively expand their territories. We must formally annex Bosnia-Herzegovina to demonstrate [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s unshakable authority in the Balkans."

 aus_zweibund:0 "Dual Alliance"
 aus_zweibund_reason:0 "[SCOPE.sCountry('GER_scope').GetName], #bold our Germanic brothers to the north#!, now stands among Europe's premier [concept_great_power]s - with booming industry, formidable armies, and growing national strength. Though [ROOT.GetCountry.GetName] no longer dominates Europe, our #bold shared blood and friendship#! form the bonds for this alliance.\n\nSurrounded by #bold hostile powers#! like [SCOPE.sCountry('RUS_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName], and [SCOPE.sCountry('TUR_scope').GetName] eyeing our interests, with Italian unrest to the south, this alliance will help #bold develop our nascent industries#!. Their world-class #v $officers$#! can assist #bold reforming our [concept_army]#!, while the mere threat of German intervention deters aggression.\n\n#bold Shared Germanic [concept_culture] ties#! unite our nations: though separate states, the #bold Rhine#! and #bold Danube#! shall stand together as against Napoleon!"
 aus_dip_zweibund_status:0 "#bold #P Shared heritage can forge an [concept_alliance] with Germany.#!#!"
 aus_zweibund_possible_tt:0 "Chose to sign alliance treaty with Germany"
 aus_zweibund_1_button:0 "Arrange Royal Tour"
 aus_zweibund_1_button_desc:0 "The Habsburgs have intermarried with German nobility for centuries. A diplomatic tour through German courts could strengthen our bonds."
 aus_zweibund_1_button_tt:0 "No royal tour in 2 years"
 aus_zweibund_2_button:0 "Lend Heavy Artillery"
 aus_zweibund_2_button_desc:0 "Škoda's renowned siege guns are among our army's most formidable weapons. Temporarily sharing these fortress-breaking assets would aid our German allies."
 aus_zweibund_2_button_tt:0 "No artillery lent in 5 years"
 aus_zweibund_3_button:0 "Purchase German Gold"
 aus_zweibund_3_button_desc:0 "With the rising German mark, their gold reserves grow steadily. Our alliance could secure favorable terms for purchasing portions of this reserve."
 aus_zweibund_3_button_tt:0 "No gold purchased in 5 years"
 aus_zweibund_4_button:0 "Enhance Medical Cooperation"
 aus_zweibund_4_button_desc:0 "Vienna's medical school ranks among Europe's finest, matched only by Heidelberg. Joint research initiatives and physician exchanges would benefit both nations."
 aus_zweibund_4_button_tt:0 "No medical cooperation in 5 years"
 aus_zweibund_5_button:0 "Conduct Joint Maneuvers"
 aus_zweibund_5_button_desc:0 "As primarily a military alliance, we must develop operational coordination between our armies through large-scale exercises - costly but invaluable preparation."
 aus_zweibund_5_button_tt:0 "No joint exercises in 10 years"
 aus_zweibund_6_button:0 "Dissolve the Dual Alliance"
 aus_zweibund_6_button_desc:0 "This German alliance no longer serves realpolitik interests. It's time to sever these ties - let the Germans be damned!"
 aus_zweibund_6_button_tt:0 "This will remove the Dual Alliance!"
 leave_zweibund_tt:0 "We will withdraw from the Dual Alliance!"
 effect_of_aus_zweibund_add_point:0 "+25 Trust"
 effect_of_aus_zweibund_minues_point:0 "-50 Trust"
 aus_has_leave_zweibund:0 "Austria has left the Dual Alliance."
 aus_zweibund_button_need_50_tt:0 "Minimum 50 Trust required"

 bohemia_industrialize:0 "Bohemian Industrialization"
 bohemia_industrialize_reason:0 "#bold Bohemia#! has been Central Europe's renowned #bold industrial and commercial hub#! since medieval times, with Prague as the jewel in our Crown of St. Wenceslas. The region's abundant natural resources and #bold Elbe River navigation#! make Bohemia perfectly suited to become a great industrial center.\n\nVienna should nurture this potential through political support and investment, transforming emerging Bohemian industries into pillars of [ROOT.GetCountry.GetName]'s growing might.\n\nThe rising [concept_company] Škoda Works demonstrates this potential, with its advanced [SCOPE.sGoods('engines_scope').GetNameNoFormatting], [SCOPE.sGoods('steel_scope').GetNameNoFormatting], and [SCOPE.sGoods('artillery_scope').GetNameNoFormatting] production. The [concept_government] should consider strategic investments in this industrial pioneer."
 bohemia_industrialize_status:0 "Develop Bohemia into the engine of our industrial growth"
 wien_industrialize:0 "Vienna Construction Plan"
 wien_industrialize_reason:0 "Vienna is one of the oldest capitals in European history, and it has long been the residence of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the aristocracy, boasting many historically significant palatial buildings such as Schönbrunn Palace and Hofburg Palace.\n\nHowever, the cities of the empire are rapidly expanding. Beyond the splendid inner city, Vienna is now overwhelmed: the walls that once defended the capital are now merely obstacles to urban expansion, and many once-insignificant villages are growing into vital parts of the city from vineyards and mills.\n\nWe must merge this ancient capital with its surrounding new towns, rebuilding it with the power of modern industry into the true heart of [ROOT.GetCountry.GetName]: a great metropolis that can perpetuate the glory and honor of the past."
 wien_industrialize_status:0 "Merge Old Vienna with its surrounding suburbs into a new metropolis"
 great_flood_of_pest:0 "Great Flood of Pest"
 great_flood_of_pest_reason:0 "The spring flood of 1838 brought a tremendous disaster to the already dilapidated city of Pest. The rising waters of the Danube nearly submerged the entire city. The displaced people hope that His Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] will take special measures to save their hometown and rebuild the entire city after the flood subsides."
 great_flood_of_pest_status:0 "A great flood has swept through the city of Pest"
 budapest_industrialize:0 "Rebuild Budapest"
 budapest_industrialize_reason:0 "When the Great Flood of 1838 receded, Pest was left with only mud and ruins. However, the flood's devastation also provides us with a good opportunity to rebuild this ancient, long-neglected city: the dams must be rebuilt, stronger than before; streets will be laid out in a rational grid, with narrow alleys giving way to wide, tree-lined avenues; railways, gas lamps, and sewers will be installed, providing a new foundation for the city.\n\nBudapest has always been the center of the Kingdom of Hungary, and it must maintain this position. To achieve this, a brand-new modern city will be essential."
 budapest_industrialize_status:0 "Rebuild Budapest as the jewel of Hungary"
 budapest_industrialize_complete_tt:0 "你的附属国完成了该日志"

 memories_of_the_old:0 "旧时代的回忆"
 memories_of_the_old_reason:0 "“你们知道，我是伟大的德意志民族最虔诚的基督教皇帝、西班牙天主教国王、奥地利大公和勃艮第公爵的后裔：他们终其一生都是罗马教会的忠实信徒。”\n\n在[ROOT.GetCountry.GetName]最需要帮助的时刻，当这些宣称忠于我们的阴谋家与各国的敌人勾结到一起——当欧洲的整个地区都被这些激进分子占据时，只有#yellow 哈布斯堡#!的帝国在[GetReligion('catholic').GetName]的统治下侍奉上帝——然而如今它也已被攻陷，许多理应属于家族的领土也被叛徒们所占领。\n\n不忠之人的罪恶必将得到报还，凭借全能的上帝和使徒之首圣彼得的权威，我们必须挺身而出，英勇无畏：鲜血将洗净他们的暴政，并从他们手中救出成千上万被俘的弟兄，使基督之名在我们的时代得以彰显，使我们举世闻名的荣耀历史得以保持完好无损。"
 event_aus_tt_a_tt:0 "这将使我们走上一条重新#G 收复#!旧[concept_crown_land_subject]的道路。\n这将#R 激怒#!满意于现有秩序的欧洲强权们。除非我们与他们保持#G 善意#!以上关系，否则他们将大幅增加干预我们[concept_diplomatic_play]的倾向。"
 event_aus_tt_b_tt:0 "这将移除#V 旧时代的回忆#![concept_journal_entry]"
 memories_of_the_old_possible_tt:0 "完成了#V 奥地利皇冠#![concept_journal_entry]"
 memories_of_the_old_complete_tt:0 "完成了4项#B 收复#![concept_journal_entry]"
 status_memories_of_the_old_1:0 "#O #B 收复哈布斯堡王朝在旧时代统治的王冠领地#!#!"
 status_memories_of_the_old_2:0 "旧帝国对我们而言仍然遥不可及"
 memories_of_the_old_silesia:0 "收复西里西亚"
 memories_of_the_old_silesia_reason:0 "#yellow 西里西亚#!的失地是我们在#B 奥地利王位继承战争#!那场不义之战中所丢失给#yellow 普鲁士#!国王的结果，我们在#V 七年战争#!的再次失败迫使特蕾莎女皇将这片属于波西米亚王国的传统领地割让给了北方的无耻之徒。如今帝国已经归来，过去的耻辱必须得到清洗。"
 memories_of_the_old_lowland:0 "收复西尼德兰"
 memories_of_the_old_lowland_reason:0 "西尼德兰，也就是他们所称呼的#yellow 弗兰德斯#!——自从接受我们的统治以来就是帝国在北方的明珠，然而却在#B 科西嘉的恶魔#!和列强的算计与交易之中被割让。[ROOT.GetCountry.GetName]不会再容忍家族的遗产被他人挪用，我们必须收复属于我们的#V 帝国封地#!。"
 memories_of_the_old_italy:0 "收复那不勒斯"
 memories_of_the_old_italy_reason:0 "那不勒斯——神圣的#yellow 哈布斯堡#!家族自然延续的一部分，自从1734年沦丧与#V 波旁王朝#!以来就脱离了[ROOT.GetCountry.GetName]的自然秩序。帝国必须惩罚这些叛逆者，收复属于我们的领地。"
 memories_of_the_old_spain:0 "收复西班牙"
 memories_of_the_old_spain_reason:0 "西班牙的王座曾是[ROOT.GetCountry.GetName]和#yellow 哈布斯堡#!王朝皇冠上的明珠：在伟大的神圣罗马皇帝#B 查理五世#!的时代，这顶王冠就代表着一个属于[ROOT.GetCountry.GetName]，遍布世界的伟大秩序——一个曾经被称为#V 日不落帝国#!的伟大秩序。\n\n尽管#B 西班牙王位继承战争#!的失利和1713年的#V 乌德勒支合约#!终结了家族对西班牙的统治，但这些愚蠢浅薄的叛逆者必须明白，#yellow 哈布斯堡#!对他们的统治终将重建，因为[ROOT.GetCountry.GetName]乃永恒之存在，我们必将横跨山海，夺回昔日的王冠。"
 memories_of_the_old_spain_button:0 "夺取西班牙王位"
 memories_of_the_old_spain_button_desc:0 "哈布斯堡家族对西班牙王位的宣称神圣而正统——伊比利亚的王冠也必然成为未来的现实。帝国的军队必须做出行动，哪怕面对欧洲强权的干涉——让我们向马德里进军！"
 memories_of_the_old_spain_button_tt:0 "10年内没有尝试过该行动"
 memories_of_the_old_spain_button_effect_tt:0 "这将开启一场针对#yellow 西班牙#!的#B 建立受保护国#![concept_diplomatic_play]；如果取得#G 胜利#!，我们将可以选择是否将其恢复为[concept_crown_land_subject]或[concept_personal_union]。\n这将大幅#R 伤害#!我们与欧洲强国的关系并促使其#R 对抗#!我们！"
 memories_of_the_old_spain_tt:0 "是[GetCulture('spanish').GetName]文化的本土"
 event_aus_crown_land_tt:0 "我们将在当地建立[concept_crown_land_subject][concept_subject]，它将获得下列修正："
 event_aus_spa_personal_union_tt:0 "我们将在当地建立[concept_personal_union][concept_subject]，它将获得下列修正："
