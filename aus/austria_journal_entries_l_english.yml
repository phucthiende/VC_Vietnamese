l_english:

 house_of_habsburg:0 "House of Habsburg"
 house_of_habsburg_reason:0 "#V #P #B 匈牙利，波西米亚，斯洛文尼亚，加利西亚，伊利里亚，威尼托和伦巴第的圣使徒国王，受上帝护佑的奥地利皇帝[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!#!#!#B #V 是当代哈布斯堡族长和君主。#!#!\n\n身世显赫而血统古老的#variable 哈布斯堡家族#!起源于瑞士的施瓦本，自#bold 1282年鲁道夫一世#!以奥地利公爵之身加冕为#bold 德意志国王#!以来便一直沿着神圣的血统将历经千年#bold 象征着罗马正统的帝国皇冠#!传承到如今。即便昔日家族统治的无数王国和土地，乃至于太阳永不落下的荣耀已经是过眼云烟，但是帝国在如今领地的统治仍然坚如磐石。\n\n哈布斯堡王朝是欧洲古老和神圣的传统秩序的代表，也是[ROOT.GetCountry.GetName]治下无数子民的领主和保护神；全能的上帝宽恕世人的罪孽，#bold 祝福圣使徒[ROOT.GetCountry.GetRuler.GetFirstName]的位置和权威#!，使世间的荣耀都属于他，直到无穷无尽的岁月；上帝赐予家族的皇冠是神对#bold 公义善行的奖赏#!，彰显帝国的君主在#bold 精神和道德上的卓越#!；皇冠的拥有者是#bold 胜利，权力与高贵的化身#!，代表着他们#bold 行使正义和维护美德的责任。#!\n\n虽然自由主义和民族主义的思潮正席卷欧洲，但光荣的#bold 哈布斯堡王朝#!就此绝不会失去我们最古老的传承，湮灭于历史的长河之中；#bold 我们是天选之人，上帝注定我们会永远统治此地：#!\n\n#variable  奥地利将笑到最后！#!"
 house_of_habsburg_status:0 "#V #O #B The oldest and most glorious lineage#!#!#!"
 duke_of_karl_dead_tt:0 "Archduke Karl has died."

 je_group_aus_imperial_affairs:0 "民族问题"
 imperial_national_affairs:0 "Imperial National Affairs"
 imperial_national_affairs_reason:0 "#B According to nationalist theory#!, there is no single #bold dominant ethnicity#! within the empire. Neither Germans, Magyars, Italians, Czechs, nor Slavs possess overwhelming strength; this is undoubtedly dangerous in times of rising nationalist movements.\n\nCurrently, the vast majority of imperial politics is dominated by #bold German #v $aristocrats$#!, who take pride in their ancient Austrian blood and naturally feel superior to other ethnic groups within the empire. Meanwhile, #v $aristocrats$#! defeated in politics, regardless of their German birth, engage in local particularism to gain greater power through #bold divisive local practices#!, which has led to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s court losing increasing control over local administration.\n\nPerhaps we must #bold persuade our loyal [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]#! to #bold compromise for the greater good of the empire, ensuring equality among the empire’s peoples.#!"
 imperial_national_affairs_status:0 "#N #B Resolve the worsening [concept_discrimination] issue within the empire#!#!"
 imperial_national_affairs_complete_tt:0 "#bold All [concept_culture] with [concept_homeland] in [concept_incorporated_state] within the empire are free from [concept_discrimination].#!"
 imperial_national_affairs_1_button:0 "Implement Compromise Negotiations"
 imperial_national_affairs_1_button_desc:0 "Following imperial failures in German affairs, nationalist anger and protests have surged. We must quell these protests; implementing compromises to lift ethnic discrimination policies may help."

 austrian_crown:0 "The Habsburg Crown"
 austrian_crown_reason:0 "From the #bold Crown of Bohemia to the title of Apostolic King of Hungary#!, from the #bold traditions of the Holy Roman Empire to the glory of the Austrian Emperor#!, the great [ROOT.GetCountry.GetName] was forged under the reign of His Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. The myriad titles and crowns of imperial rule represent the sacred bloodline of the House of Habsburg, yet the absolute authority of our current [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has significantly waned. The [concept_government] is now maintained through constant power struggles among competing [concept_interest_group] factions.\n\nAs #bold liberalism and nationalism#! sweep across Europe, the #bold Vienna System meticulously crafted by Prince Metternich#! faces growing undercurrents of dissent. We must act decisively to address these challenges and consolidate the empire's #bold Crownlands#! into a unified whole.\n\nWhile the evolution of nationalist thought threatens to undo centuries of imperial stability, we must not respond with mere vigilance and retreat. As a multi-ethnic empire without a dominant majority, [ROOT.GetCountry.GetName] has legitimate reasons for caution. Whether through forging a #bold new [concept_culture] and national identity loyal to the [concept_country]#! or by making #bold concessions to incorporate subject peoples into the [concept_government]#!, we must neutralize the nationalist threat and preserve [ROOT.GetCountry.GetName]'s unity.\n\nThe #bold House of Habsburg#! shall not fade into historical oblivion - #bold we are God's chosen, destined to rule these lands for eternity.#!"
 austrian_crown_complete_tt:0 "Completed 6 #bold Crown#! [Concept('concept_journal_entry', '$concept_journal_entries$')] objectives"
 austrian_crown_status:0 "#bold Ensure all peoples under Austrian rule submit to imperial authority#!"
 remove_aus_habsburg_territory_turrible_tt:0 "All #variable Crownland#! modifiers will be removed from the empire."
 crown_status:0 "Terminate the autonomous privileges of Crownlands"
 crown_value_birgger_zero:0 "Autonomy greater than 0"
 become_aus_cultural_homeland:0 "#variable Become the cultural homeland of South Germans#!"
 hungarian_crown:0 "Crown of St. Stephen"
 hungarian_crown_reason:0 "This progress bar displays the #bold autonomy level in Hungarian territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Apostolic Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] currently wears the Crown of St. Stephen.#!\n\nThe #bold Holy Crown of Hungary#! remains one of the most significant titles of [ROOT.GetCountry.GetName], symbolizing the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s #bold legitimate sovereignty#! over these lands. Yet Hungary's diverse population has long challenged Viennese authority.\n\nWith rising #bold Hungarian nationalism#!, the #bold Hungarian #v $academics$#! and #v $aristocrats$#!#! are fomenting [concept_turmoil] against [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s rule. We cannot #bold yield to these agitators#! the sacred crown won from the Turks in the 1699 Treaty of Karlowitz. To secure our position, #bold comprehensive reforms#! are imperative:\n\nWe must either cultivate a shared [concept_culture] loyalty to [ROOT.GetCountry.GetName] #bold before Hungarian separatism erupts into full revolution#!, or face the unpleasant necessity of political concessions."
 hungarian_crown_complete_tt:0 "Hungarian autonomy reduced to 0"
 hungarian_crown_complete_2_tt:0 "Successfully addressed #bold Hungarian #v $aristocrats$#! privileges#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 hungarian_crown_1_button:0 "Implement Fiscal Reforms"
 hungarian_crown_1_button_desc:0 "Hungary's finances remain controlled by powerful #v $aristocrats$#!, with much of the remainder lost to corrupt #v $bureaucrats$#! - only a pittance reaches the Imperial Treasury in Vienna. Worse still, internal tariff barriers between Hungary and other imperial territories stifle economic growth. Fiscal reform is essential for imperial unity."
 hungarian_crown_2_button:0 "Implement Educational Reforms"
 hungarian_crown_2_button_desc:0 "Hungarian nationalism stems from their distinct cultural identity. While they remain under our rule, we have an opportunity to mold the next generation into loyal subjects sharing our [concept_culture]."
 hungarian_crown_3_button:0 "Implement Land Reforms"
 hungarian_crown_3_button_desc:0 "Hungary's agricultural lands remain dominated by the manorial estates of #v $aristocrats$#!, some even secretly maintaining the outlawed institution of serfdom. This must change - we shall redeem these lands from the #v $aristocrats$#! and redistribute them to #v $farmers$#! and enterprising #v $capitalists$#!."
 hungarian_crown_4_button:0 "Implement Administrative Centralization"
 hungarian_crown_4_button_desc:0 "Hungary's [concept_government] institutions remain puppets of local magnates, routinely disregarding imperial decrees from Vienna. We must establish a new, reliable bureaucracy under strict oversight to restore Habsburg authority throughout Hungary."
 hungarian_nobles_problem:0 "The Hungarian Nobility Problem"
 hungarian_nobles_problem_reason:0 "This progress bar displays the current #bold aristocratic influence#! in #bold Hungarian territories#!.\n\nThe Hungarian #v $aristocrats$#! have historically enjoyed extensive privileges - rights to levy tariffs, maintain private armies, keep serfs, collect taxes, and administer local justice. These Magyar nobles, fierce warriors commanding private regiments, proved so powerful that even #bold Maria Theresa#! had to weep and make concessions to secure their military support during her reign.\n\nYet there is hope - the Hungarian #v $aristocrats$#! are no united front, but rather a fractious coalition of #bold opportunists, hereditary old fools, and hot-headed idealists#!. For the Empire's sake, #bold we must imprison these parasites hindering imperial progress!#!"
 hungarian_nobles_problem_complete_tt:0 "Completed #bold March on Budapest#!\nHungarian aristocratic influence reduced to 0"
 hungarian_kick_nobles_tt:0 "Aristocratic influence above 0"
 hungarian_nobles_problem_1_button:0 "Divide the Nobility"
 hungarian_nobles_problem_1_button_desc:0 "The Hungarian nobility's internal divisions present opportunities for manipulation. By offering selective concessions, we may fracture their united front."
 hungarian_nobles_problem_2_button:0 "March on Budapest"
 hungarian_nobles_problem_2_button_desc:0 "The noble problem cannot be solved through gentle means. The Imperial Army must be prepared to march on Budapest and eliminate them by force - though this will undoubtedly trigger widespread rebellion in Hungary!"
 marching_through_budapest:0 "March on Budapest"
 marching_through_budapest_reason:0 "Our forceful policies against Hungarian #v $aristocrats$#! have provoked the Magyar nobility to lead several regions in open revolt, declaring independence from the Crown. We must crush this rebellion and eliminate all resistance to imperial authority."
 hungarian_nobles_problem_button_tt:0 "This will forcibly revoke all privileges of Hungarian #v $aristocrats$#!\nThe Hungarian #v $aristocrats$#! will rise in rebellion - the higher their aristocratic influence, the more territory will join their secession!"
 marching_through_budapest_complete_tt:0 "Crushed the rebellion of Hungarian #v $aristocrats$#! and reclaimed the secessionist territories"
 bohemian_crown:0 "Crown of St. Wenceslas"
 bohemian_crown_reason:0 "This progress bar displays the #bold autonomy level in Bohemian territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] currently wears the Crown of St. Wenceslas.#!\n\n#bold The Lands of the Bohemian Crown#! form the strategic heart of Central Europe, connecting German, Polish and Hungarian territories. Its thriving industries and commerce attract worldwide attention, while abundant [concept_resource_potential] fuels #bold manufacturing prosperity#! that has long been the backbone of Vienna's [concept_taxes].\n\nYet with the rise of #bold nationalist movements#!, the once-pliant Czech population grows increasingly discontent. The #bold Bohemian #v $aristocrats$#!#! within the #bold German Confederation#! have formed Czech diets to advance their political agenda, promoting their language and nationalist ideals - a blatant challenge to Viennese authority.\n\nIndustrial progress brings peasant unrest, and while cities flourish, the specter of [concept_revolution] looms. To prevent Bohemian instability, we must implement #bold comprehensive reforms#! to secure [ROOT.GetCountry.GetName]'s authority over these crownlands."
 bohemian_crown_complete_tt:0 "Bohemian autonomy reduced to 0"
 bohemian_crown_1_button:0 "Implement Fiscal Reforms"
 bohemian_crown_1_button_desc:0 "Much of Bohemia's tax revenue disappears into the pockets of corrupt #v $bureaucrats$#!, while internal tariff barriers stifle economic growth. We must overhaul the financial system to maintain imperial unity."
 bohemian_crown_2_button:0 "Implement Educational Reforms"
 bohemian_crown_2_button_desc:0 "Czech nationalism stems from their distinct cultural identity. While they remain under our rule, we can shape the next generation into loyal subjects sharing our [concept_culture] through proper schooling."
 bohemian_crown_3_button:0 "Implement Land Reforms"
 bohemian_crown_3_button_desc:0 "Bohemian agriculture remains dominated by #v $aristocrats$#' manorial estates, some still practicing the outlawed serfdom. We must redeem these lands and redistribute them to #v $farmers$#! and enterprising #v $capitalists$#! to modernize the countryside."
 bohemian_crown_4_button:0 "Implement Administrative Centralization"
 bohemian_crown_4_button_desc:0 "Bohemian [concept_government] institutions frequently disregard imperial decrees, manipulated by local interests. We must establish a reliable, supervised bureaucracy to ensure Vienna's authority in Prague and beyond."
 galician_crown:0 "Crown of Galicia and Lodomeria"
 galician_crown_reason:0 "This progress bar displays the #bold autonomy level in Galician territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] currently rules as King of Galicia and Lodomeria.#!\n\nSince the #bold Third Partition of Poland in 1795#!, [ROOT.GetCountry.GetName] has firmly controlled these former Polish lands, with even the nominally independent Free City of Kraków under our de facto dominion.\n\nIn pre-Napoleonic times, Vienna paid little attention to Polish development. Though we abolished [GetLawType('law_serfdom').GetName] under our benevolent rule, the Polish #v $aristocrats$#! remain resentful. They now conspire with independence movements, seeking either autonomy or complete separation from Habsburg rule. Kraków has become a hotbed of subversion, where plotters devise schemes against His Majesty's [concept_government] - we must respond decisively.\n\nYet our tolerant policies have earned loyalty from Galician #v $farmers$#!. By developing the region's [concept_resource_potential] and maintaining peasant support, we could forge a Polish territory truly loyal to the Crown."
 galician_crown_complete_tt:0 "Galician autonomy reduced to 0"
 galician_crown_1_button:0 "Implement Fiscal Reforms"
 galician_crown_1_button_desc:0 "Galicia's finances remain dominated by powerful #v $aristocrats$#!, with much revenue lost to corrupt #v $bureaucrats$#! - only meager sums reach Vienna's coffers. Fiscal reform is essential for imperial unity."
 galician_crown_2_button:0 "Implement Educational Reforms"
 galician_crown_2_button_desc:0 "Polish nationalism stems from cultural identity. While they remain under our rule, we can shape the next generation into loyal subjects through schooling in our [concept_culture]."
 galician_crown_3_button:0 "Implement Agricultural Subsidies"
 galician_crown_3_button_desc:0 "Since emancipating Polish #v $farmers$#! from serfdom, they've struggled with subsistence farming. Targeted subsidies could alleviate their poverty and strengthen loyalty."
 galician_crown_4_button:0 "Implement Administrative Centralization"
 galician_crown_4_button_desc:0 "Galician [concept_government] institutions frequently disregard imperial decrees, manipulated by local interests. We must establish proper oversight to ensure Vienna's authority in Polish territories."
 illyrian_crown:0 "Illyrian Crown"
 illyrian_crown_reason:0 "This progress bar displays the #bold autonomy level in Illyrian territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Majesty [ROOT.GetCountry.GetName.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] rules these lands as King of Illyria.#!\n\nFor centuries, [ROOT.GetCountry.GetName] has protected these Balkan territories liberated from #bold Ottoman heathens#!. Even #bold Napoleon's brief occupation#! couldn't sever our rightful claim. Here live Croats, Serbs, Bosnians, and some Italians.\n\nOur domain includes the Croatian Kingdom (separated from the Hungarian Crown) and Dalmatia (Venetian legacy). We must promote the Illyrian identity - a symbol of imperial loyalty, not Slavic nationalism - to consolidate these crownlands and protect our #bold Danubian and Mediterranean interests#!."
 illyrian_crown_complete_tt:0 "Illyrian autonomy reduced to 0"
 illyrian_crown_1_button:0 "Crack Down on Dissent"
 illyrian_crown_1_button_desc:0 "The Balkans' cultural diversity breeds constant anti-imperial agitation. We can no longer tolerate such sedition - decisive action is required!"
 illyrian_crown_2_button:0 "Implement Educational Reforms"
 illyrian_crown_2_button_desc:0 "Balkan nationalism stems from cultural identity. While under our rule, we can mold the next generation into loyal subjects through schooling in our [concept_culture]."
 illyrian_crown_3_button:0 "Implement Land Reforms"
 illyrian_crown_3_button_desc:0 "Balkan agriculture remains dominated by #v $aristocrats$#' estates, some maintaining illegal serfdom. Land redistribution to #v $farmers$#! and #v $capitalists$#! would modernize the region."
 illyrian_crown_4_button:0 "Implement Administrative Centralization"
 illyrian_crown_4_button_desc:0 "Illyrian [concept_government] institutions routinely ignore Vienna's commands, controlled by local factions. We must establish a supervised bureaucracy to enforce imperial authority in the Balkans."
 lombardy_crown:0 "Iron Crown of Lombardy"
 lombardy_crown_reason:0 "This progress bar displays the #bold autonomy level in Lombard territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] currently rules as Grand Duke of Lombardy-Venetia.#!\n\nBefore the #bold French Revolution#!, [ROOT.GetCountry.GetName] already controlled the core territories claimed by the Iron Crown, including Milan and surrounding regions. After the Napoleonic Wars, we successfully consolidated Greater Lombardy under the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s rule. Historically a #bold center of industry and commerce#!, Lombardy's economic development attracted Italians of the peninsula's [concept_culture]. The Germanic settlers gradually adopted #bold Italian customs#! and came to identify as Lombards - now increasingly seeing themselves as #bold Italians#! amidst rising nationalist fervor.#!\n\nNeighboring Italian nationalists covet these lands, while local Lombards dream of an independent #bold Republic of Lombardy#!. We must act decisively.\n\nIntegrating Lombardy's economy into [ROOT.GetCountry.GetName] would make the region economically dependent on the Empire and less likely to seek independence."
 lombardy_crown_complete_tt:0 "Lombard autonomy reduced to 0"
 lombardy_crown_1_button:0 "Crack Down on Dissent"
 lombardy_crown_1_button_desc:0 "Lombards remain passionate about Italian unification, constantly spreading anti-imperial propaganda. We can no longer tolerate such sedition - decisive action is required!"
 lombardy_crown_2_button:0 "Implement Educational Reforms"
 lombardy_crown_2_button_desc:0 "Italian nationalism stems from cultural identity. While under our rule, we can shape the next generation into loyal subjects through schooling in our [concept_culture]."
 lombardy_crown_3_button:0 "Suppress Nationalist Movements"
 lombardy_crown_3_button_desc:0 "Italian nationalist activities have intensified around Milan, with reports of a secret society called the Carbonari sabotaging imperial rule. We must arrest these agitators."
 lombardy_crown_4_button:0 "Implement Administrative Centralization"
 lombardy_crown_4_button_desc:0 "Lombard [concept_government] institutions routinely ignore Vienna's commands, manipulated by local factions. We must establish direct oversight to enforce imperial authority."
 veneto_crown:0 "Crown of St. Mark"
 veneto_crown_reason:0 "This progress bar displays the #bold autonomy level in Venetian territories#!, which #bold dynamically affects local conditions#!.\n\n#bold His Imperial and Royal Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] currently rules as Grand Duke of Lombardy-Venetia.#!\n\nThe #bold City of St. Mark#! has been the #bold Pearl of the Adriatic#! and a #bold premier commercial hub#! since medieval times. Once the heart of the #bold Venetian Republic#!, these lands came under our rule after the #bold Napoleonic Wars#! and the establishment of the #bold Vienna System#!. Through #bold Metternich's diplomacy#!, [ROOT.GetCountry.GetName] gained this wealthy region to boost our trade [concept_tax]. But this prize has become a poisoned chalice - rising nationalism has Venetians identifying as Italians and working toward unification.\n\nWe must consolidate our rule before Venetian separatism grows. Developing commerce and shipbuilding could strengthen loyalty, or we might forge a new regional identity distinct from Italian nationalism.\n\nOur loyal Field Marshal Joseph Radetzky advocates harsh suppression of these rebels."
 veneto_crown_1_button:0 "Crack Down on Dissent"
 veneto_crown_1_button_desc:0 "Venetians remain passionate about Italian unification, constantly spreading anti-imperial propaganda. We can no longer tolerate such sedition - decisive action is required!"
 veneto_crown_2_button:0 "Implement Educational Reforms"
 veneto_crown_2_button_desc:0 "Italian nationalism stems from cultural identity. While under our rule, we can shape the next generation into loyal subjects through schooling in our [concept_culture]."
 veneto_crown_3_button:0 "Modernize Port Facilities"
 veneto_crown_3_button_desc:0 "The City of St. Mark has been a jewel of Mediterranean trade for centuries. By upgrading its port infrastructure, we can restore its commercial glory."
 veneto_crown_4_button:0 "Implement Administrative Centralization"
 veneto_crown_4_button_desc:0 "Venetian [concept_government] institutions routinely ignore Vienna's commands, manipulated by local factions. We must establish direct oversight to enforce imperial authority in the Adriatic."
 veneto_crown_complete_tt:0 "Venetian autonomy reduced to 0"

 wind_of_liberalism:0 "Winds of Liberalism"
 wind_of_liberalism_reason:0 "The wave of #bold radical [concept_revolution] sweeping Europe#! now threatens our domains. #bold Liberals#! stage constant demonstrations across our capital and provinces, while burgeoning #bold nationalist movements#! undermine His Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s rule.\n\nWhether we accommodate these radicals with reforms or maintain our centuries-old conservative policies, [ROOT.GetCountry.GetName] stands at a crucial crossroads of change."
 spring_time_happened:0 "Springtime of Nations has begun"
 increase_hun_auto_tt:0 "Hungarian autonomy increases by 25"
 wind_of_liberalism_complete_tt:0 "Completed 3 #bold reforms#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 wind_of_liberalism_on_complete_tt:0 "Our nation will progress according to our chosen reforms."
 aus_political_liberalism:0 "Reform: Political Liberalization"
 aus_political_liberalism_reason:0 "We must reshape our [concept_government] to meet liberal demands for constitutional governance."
 aus_economic_liberalism:0 "Reform: Economic Liberalization"
 aus_economic_liberalism_reason:0 "We must answer market liberals' calls to reduce government intervention in commerce."
 aus_social_liberalism:0 "Reform: Freedom of Speech"
 aus_social_liberalism_reason:0 "Liberals demand press freedoms - we should guarantee citizens' rights to critique the [concept_government] without reprisal."
 aus_political_conservatism:0 "Reform: Political Conservatism"
 aus_political_conservatism_reason:0 "Conservative governance remains vital to central authority. Our [concept_government] must protect traditional power structures from radical influences."
 aus_economic_conservatism:0 "Reform: Economic Conservatism"
 aus_economic_conservatism_reason:0 "The state must retain economic intervention powers to ensure domestic market stability."
 aus_social_conservatism:0 "Reform: Speech Restrictions"
 aus_social_conservatism_reason:0 "We cannot tolerate seditious criticism of our sacred [concept_government] and [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Stricter [concept_law] enforcement is needed."
 aus_choose_radical_way_in_springtime:0 "#variable This will commit us to liberal reforms.#!"
 aus_choose_old_way_in_springtime:0 "#variable This will maintain our conservative policies.#!"
 journal_goal_hold_for_5_years_tt:0 "#B Maintain the law required by this journal entry for 5 years.#!"

 imperial_diet_constitution:0 "Imperial Constitution of Austria"
 imperial_diet_constitution_reason:0 "As [ROOT.GetCountry.GetName]'s crownlands reluctantly surrender their autonomous privileges, the imperial [concept_government] faces growing criticism. Angry nationalists and liberals demand greater self-rule and #bold fundamental reforms#! to the [GetLawType('law_monarchy').GetName] power structure. In this climate of unrest, our gracious sovereign [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has proposed convening representatives from all imperial lands in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to discuss a #bold constitutional assembly#!.\n\nThe #bold new constitution#! would reshape our politics along more democratic lines to appease regional demands, while establishing a permanent imperial parliament representing all crownlands.\n\nThis constitutional framework will legally define the relationship between central government and former crownlands, while determining the #bold future political system#! of [ROOT.GetCountry.GetName]."
 has_finish_aus_crown_tt:0 "Completed #bold Austrian Crown#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 has_finish_aus_crown_2_tt:0 "Representatives from across the empire will convene for federal constitutional discussions."
 imperial_diet_constitution_complete_tt:0 "The Constitutional Assembly has successfully concluded"

 imperial_diet:0 "Imperial Diet"
 imperial_diet_reason:0 "This progress bar displays the current #bold parliamentary seats held by federal members#!.\n#bold Austrian Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('aus_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_aus_tooltip_advance conditions#!.\n#bold Hungarian Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('hun_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_hun_tooltip_advance conditions#!.\n#bold Bohemian Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('boh_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_boh_tooltip_advance conditions#!.\n#bold Galician Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('pol_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_pol_tooltip_advance conditions#!.\n#bold Italian Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('ita_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_ita_tooltip_advance conditions#!.\n#bold Illyrian Seats#!:#variable [ROOT.GetCountry.MakeScope.Var('yug_imperial_diet').GetValue|0]#!; changes during [concept_election] based on:#tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_yug_tooltip_advance conditions#!.\n\nUnder His Majesty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s leadership, the #variable reborn Austrian Empire#! has transformed into a great #bold federal state#!. Our peoples have united across old divisions, weathering the storms of #bold radicalism and nationalism#!, preserving [ROOT.GetCountry.GetName] from disintegration under the #bold shared [GetLawType('law_monarchy').GetName] Crown#!. Each federal member now holds between #bold 50-400 parliamentary seats#! in this indissoluble union.\n\nThough our #variable Habsburg realm#! knew centuries of #bold absolutism and enlightened despotism#!, even the #bold most loyal monarchists#! now acknowledge this federal democracy and its representative [concept_institution]: the Imperial Diet's vital role in maintaining unity. Forged by industrialization and nationalist challenges, the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], and [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] now hold #bold [concept_government] power#! as pillars of our glorious [ROOT.GetCountry.GetName]'s new era - driving #bold progress#! that has elevated us to a #bold great industrialized [concept_country]#!.\n\nOur #bold multicultural [concept_culture] policies#! form the empire's foundation. We stand as #bold Central Europe's beacon, shining for oppressed nations#!, a #bold home for all peoples, embracing generous pluralism#!.\n\n#variable God save Emperor [ROOT.GetCountry.GetRuler.GetFirstName]!#!"
