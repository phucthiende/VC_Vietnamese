l_english:

 joi_flavor_chi.1.t: "Memorial on the Strategy for Self-Strengthening"
 joi_flavor_chi.1.d: "Amid rising calls within the imperial court to adopt Western techniques, a prominent official has submitted a memorial to [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], outlining the reformist proposals of the 'Self-Strengthening' faction."
 joi_flavor_chi.1.f: "“The nations of the West devote their collective intellect to advancing agriculture, commerce, and industry—harnessing the wealth of their merchants to sustain formidable armies and navies, which in turn safeguard their economic prosperity. \n\nA state cannot be strong without a powerful military; thus, we must train our soldiers. Yet soldiers cannot be trained without funds; thus, we must develop commerce to expand our sources of revenue. Without capable men to manage both army and treasury, all talk of 'training troops' and 'balancing finances' will yield neither effective soldiers nor reliable wealth—hence, we must cultivate talent.”\n\n“What the Westerners excel in—mathematics, natural sciences, and the methods of engineering and manufacturing—are all meticulously documented in their untranslated books. Barely a tenth have been rendered into Chinese. To grasp their secrets, we must study these untranslated works, progressing from the rudimentary to the profound.\n\nAre we Chinese any less ingenious than Westerners? If we master their languages and teachings, we too can gradually comprehend their steamships, firearms, and other marvels—thereby aiding our nation’s path to self-strengthening.”"
 joi_flavor_chi.1.a: "The path to strength lies in self-reliance; the means to self-reliance begin with a modernized army."
 joi_flavor_chi.2.t: "Chinese Essence, Western Utility?"
 joi_flavor_chi.2.d: "As the Reform Movement gains momentum, the endless debate between 'Eastern tradition' and 'Western learning' has reached the ears of [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_chi.2.f: "In the halls of power—be it the mansions of high officials, the imperial court, or even before the Son of Heaven itself—the arguments rage ceaselessly. Most Self-Strengthening advocates argue that Western science and technology should serve only to reinforce [ROOT.GetCountry.GetName]’s political order, with no need for systemic reform. 'Chinese learning as the foundation, Western learning for practical use'—this, they claim, is sufficient. At most, we need only adopt military techniques to bolster our defenses.\n\nYet others demand broader assimilation of Western institutions alongside technology. A radical few even call for 'total Westernization,' urging a constitutional monarchy. What future awaits the Celestial Empire?"
 joi_flavor_chi.2.a: "Confucian tradition belongs to the past; our nation must Westernize entirely."
 joi_flavor_chi.2.b: "The wisdom of our ancestors remains the foundation of the Celestial Empire’s governance."
 joi_flavor_chi.3.t: "The End of the Self-Strengthening Movement"
 joi_flavor_chi.3.d: "With a slew of edicts repealing earlier reforms, the Self-Strengthening Movement collapses under conservative opposition."
 joi_flavor_chi.3.f: "In its early years, the movement flourished under wise regents and diligent ministers, fostering a spirit of renewal. But after the death of Grand Councillor Wenxiang, his successors—though earnest—lacked his vision. The Sino-French War (1884) and the First Sino-Japanese War (1894) brought foreign humiliation and domestic turmoil. As the Empress Dowager withdrew into the seclusion of her gardens, governance slackened. Factional strife between moderates like Weng Tonghe and hardliners like Li Hongzao paralyzed the court. The movement, once a beacon of hope, dissolved into petty rivalries—its promise unfulfilled."
 joi_flavor_chi.3.a: "Why mimic petty Western barbarians when our Celestial Empire lacks for nothing?"
 joi_flavor_chi.4.t: "Conservative Ministers Denounce Western Learning"
 joi_flavor_chi.4.d: "During a routine court assembly, a prominent official from the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] faction delivers a scathing critique of Western influence."
 joi_flavor_chi.4.f: "“I trust my colleagues here understand: every act of the Self-Strengthening clique is base; every deed of the Reformists, barbaric. Even a common peasant grasps the threat of foreign aggression—yet to let such traitors corrupt our court is to invite Heaven’s wrath.\n\nOur ancestors forged this realm through blood and iron, their laws unyielding as steel. Shall we now discard them? The Western barbarians’ fleeting victories owe nothing to virtue. Must we ape their stiff-legged arrogance? The Middle Kingdom, ordained by Heaven, must uphold its eternal principles. Let blood spill three feet deep—but a scholar’s dignity shall never waver!\n\nHis Majesty, wise and valiant, surely sees the truth. These jackals have clouded your vision. Open your eyes, O Emperor, and cast out these wolves in ministers’ robes!”"
 joi_flavor_chi.4.a: "How can the vulgar tricks of foreigners compare to the sacred wisdom of our Celestial Empire?"
 joi_flavor_chi.4.b: "We must still learn the practical arts of the West."
 joi_flavor_chi.4.c: "They cannot silence the growing voice of the prosperous masses!"

 joi_flavor_chi.5.t: "The Status of Confucian Doctrine"
 joi_flavor_chi.5.d: "As the reform movement progresses, voices within the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] begin questioning the official status of Confucianism."
 joi_flavor_chi.5.f: "In our pursuit of national revitalization, we have adopted Western methods where they complement our own, for both East and West share the fundamental purpose of governing for the people's welfare. Our scholar-officials, ignorant of foreign ways, claim Western governance lacks moral principles. Yet their systems excel at enlightening the people and enriching households - their most refined practices even cultivate virtue and prolong life, leaving no aspect of human prosperity neglected.\n\nDay and night We labor to reform countless institutions, not from fascination with novelty, but because Our people - entrusted by Heaven and our ancestors - deserve prosperity and harmony. Besieged by foreign powers, we must adopt others' strengths to preserve what is ours. Though Our intentions are earnest, the people remain misled by corrupt officials and conservative literati who spread rumors. Even now, villagers in remote mountains remain ignorant of these reforms. We hereby proclaim Our vision: that all subjects may understand their sovereign's dependable heart. Only through unity can we achieve renewal and strengthen China - this is Our profound hope."
 joi_flavor_chi.5.a: "This has long been Our wish, though We dared not demand it."
 joi_flavor_chi.5.b: "No! We cannot abandon our roots!"
 joi_flavor_chi.6.t: "The Conservatives Seize Power"
 joi_flavor_chi.6.d: "In the early hours this morning, the Empress Dowager abruptly returned from the Summer Palace to the Forbidden City, placing the reformist [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] under house arrest and issuing an edict resuming regency."
 joi_flavor_chi.6.f: ""Well if it isn't Second Uncle! What brings you to the marketplace today?"\n"Her Majesty the Dowager's holding executions - came to see the spectacle."\n"Those are the reformists? Look like regular men with one head and two arms to me."\n"Course they are - what'd you expect? Say, heard they're closing all those new schools too... But Third Uncle, why are you here?"\n"My boy's taken ill. The physician says we need blood from traitors on steamed buns - where else to find traitors but an execution? Couldn't miss this!""
 joi_flavor_chi.6.a: "Execute these reformists and display their heads!"
 joi_flavor_chi.7.t: "The End of the Imperial Examinations"
 joi_flavor_chi.7.d: "Under pressure from reformists, the millennium-old civil examination system is finally abolished during [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s reign."
 joi_flavor_chi.7.f: "In these trying times when self-strengthening is urgent, Our officials cling stubbornly to old ways despite repeated decrees urging practical statecraft, avoiding the failings of Song and Ming dynasties. But comprehensive reform requires broad consultation without empty appeals to classical dogma or selfish obstructionism. Should officials pay lip service while subverting Our will to modernize, they betray Our mandate.\n\nWith profound reluctance, We implement these sweeping changes. Let all ministers purify their hearts, remove obstructions, and unite sincerely - only thus can the state be secured and governance improved."
 joi_flavor_chi.7.a: "We must further modernize our bureaucratic systems."
 joi_flavor_chi.7.b: "True reform begins with enlightening the populace."
 joi_flavor_chi.8.t: "The Grand Council's Demise"
 joi_flavor_chi.8.d: "After reformists assist [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in reorganizing the cabinet, the Grand Council nominally persists but effectively ceases to function."
 joi_flavor_chi.8.f: "The Grand Council was established by Our ancestor the Yongzheng Emperor, yet now dies by Our hand. Gazing at its chamber doors, We recall that fateful night consulting with [SCOPE.sCharacter('chi_intelligentsia_leader_scope').GetFullName]. What would Our ancestors think? Have We become the 'foolish sovereign' Our childhood tutors warned against? How will the Empress Dowager react?\n\nMeanwhile, [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] leaders struggle to contain their excitement while planning next reforms. Through modernization, they whisper, [ROOT.GetCountry.GetName] shall endure eternally.""
 joi_flavor_chi.8.a: "The court must heed its emerging citizenry."
 joi_flavor_chi.8.b: "Your Majesty must avoid provoking the gentry."
 joi_flavor_chi.8.c: "Facing unprecedented changes, we must advance boldly!"

 joi_flavor_chi.9.t: "Treaty of Commerce Regulations"
 joi_flavor_chi.9.d: "[ROOT.GetCountry.GetName] and [SCOPE.sCountry('GBR_scope').GetName] have signed a new treaty granting preferential terms while inviting British officials to oversee customs administration through the Inspectorate General of Customs."
 joi_flavor_chi.9.f: ""Henceforth, goods paying import duties may circulate freely throughout [ROOT.GetCountry.GetName], with no additional transit taxes exceeding a few percent of value per tael. However, the exact transit tax rates remain unclear, and British merchants complain of arbitrary charges when moving goods between inland and treaty ports. \n\nThis treaty establishes that within four months of ratification, consuls and customs superintendents must publish standardized transit rates for all current and future treaty ports. Merchants may alternatively pay a single 2.5% transit tax (Likin) at either the first inland station for exports or the treaty port for imports, receiving a pass exempting further charges. These provisions supplement rather than replace existing treaty port tariffs, with detailed rates to be renegotiated in Shanghai.""
 joi_flavor_chi.9.a: "Only through institutional reform can we prosper."
 joi_flavor_chi.10.t: "Nine-Power Treaty Conference"
 joi_flavor_chi.10.d: "Several [concept_great_power] controlling [ROOT.GetCountry.GetName]'s treaty ports convene in [SCOPE.sCountry('USA_scope').GetName]'s capital to sign a multilateral agreement affirming their collective neutrality regarding China."
 joi_flavor_chi.10.f: "The Contracting Powers agree:\n\n1. To respect [ROOT.GetCountry.GetName]'s sovereignty, independence, and territorial integrity\n2. To provide full opportunity for China to develop stable government\n3. To maintain equal commercial/industrial opportunity for all nations\n4. To refrain from seeking special privileges impairing other nations' rights\n\n[ROOT.GetCountry.GetName] agrees:\n\n1. To enforce non-discriminatory railway rates regardless of passenger/cargo nationality\n2. That all signatories (except China) share equal obligations regarding railway concessions"
 joi_flavor_chi.10.a: "At least this ensures some security."
 joi_flavor_chi.10.b: "Open Door Policy will benefits all of us."
 joi_flavor_chi.11.t: "[SCOPE.sCountry('CHI_scope').GetName] Requests Customs Assistance"
 joi_flavor_chi.11.d: "[SCOPE.sCountry('CHI_scope').GetName]'s government seeks our experienced customs officers to help manage their maritime customs - offering profit-sharing incentives."
 joi_flavor_chi.11.f: ""The Chinese are an intelligent, cultivated race - diligent, methodical, and profoundly committed to their ancient civilization. These 400 million souls inhabit a land of unparalleled richness, with rivers and valleys yielding every necessity, and mineral wealth lying untouched beneath their feet. After millennia of splendid isolation, they were compelled by Western superiority to establish treaty relations they view as humiliating. Though currently obliged to endure foreign intercourse, they nurse dreams of future resurgence - when they might expel all alien influences and return to their accustomed seclusion...""
 joi_flavor_chi.11.a: "No, this would threaten our privileged position."
 joi_flavor_chi.11.b: "We must seize this opportunity to embed ourselves in China's customs."

 joi_flavor_chi.12.t: "The Emperor's Abdication"
 joi_flavor_chi.12.d: "This morning, unable to withstand Republican pressure, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] issued an abdication edict at [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 joi_flavor_chi.12.f: ""Whereas the revolutionary armies have risen with provincial support, plunging our realm into turmoil and our people into suffering; Whereas Our envoys have negotiated for two months without resolution while commerce halts and scholars wander homeless; \n\nNow observing the people's overwhelming desire for republicanism - supported by southern provinces and northern generals alike - how can We cling to dynastic privilege against the people's will? \n\nTherefore, after considering the situation and popular sentiment, We hereby transfer sovereignty to establish a constitutional republic, fulfilling the people's longing for peace and fulfilling the ancient ideal: 'All under Heaven belongs to the people.'""
 joi_flavor_chi.12.a: "The Republic's first task is establishing a parliament."
 joi_flavor_chi.12.b: "Proclaim a provisional constitution for the Republic!"
 joi_flavor_chi.13.t: "Pilgrimage to Ming Xiaoling"
 joi_flavor_chi.13.d: "At 11 AM today, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and government leaders visited the Ming Xiaoling Mausoleum, drawing parallels between Hongwu Emperor's expulsion of the Mongols and their own revolution."
 joi_flavor_chi.13.f: ""Alas! Foreign conquests have marked our history since ancient times. When the Mongols overthrew Song, our land suffered nearly a century of darkness - until the Hongwu Emperor arose to restore Chinese rule. \n\nFor 268 years our people groaned under Manchu tyranny, just as Hongwu's spirit lamented for 268 years. Now, eighty-seven days after the Wuchang Uprising, seventeen provinces have joined our Republic with its capital at Nanjing. \n\nThough unworthy, I was elected Provisional President. Yet before retiring, I must report to Hongwu's spirit: The Manchus have abdicated! China is reunited! Our people will enjoy eternal freedom - all made possible by Hongwu's righteous example. Only today dare we say: We have not failed our ancestors!""
 joi_flavor_chi.13.a: "Expel the Tartars and restore China!"
 joi_flavor_chi.14.t: "The Queue Army Enters Beijing"
 joi_flavor_chi.14.d: "Amid [ROOT.GetCountry.GetName]'s political chaos, former Qing general Zhang Xun staged a coup in Beijing, restoring the boy emperor Puyi to the throne."
 joi_flavor_chi.14.f: ""At 3 PM, fifty conspirators assembled - military men led by Zhang Xun, civilian officials by Kang Youwei. Only Zhang rode in a palanquin to the Hall of Central Harmony where Puyi awaited. \n\nThe twelve-year-old emperor, wearing yellow robes and a red-tasseled hat, personally helped Zhang (in blue official dress) descend. Then all performed the kowtow - three kneelings and nine prostrations - reviving imperial ritual after five republican years.""
 joi_flavor_chi.14.a: "Crush this rebellion!"
 joi_flavor_chi.15.t: "The Imperial Restoration"
 joi_flavor_chi.15.d: "Yuan Shikai, leader of the Beiyang Clique, accepted a petition to become emperor today, abolishing [ROOT.GetCountry.GetName]'s republican system."
 joi_flavor_chi.15.f: ""In 1912, we trusted Yuan Shikai to end civil war. What has he given us instead? Worse tyranny than the Qing! He dissolved parliament, jailed patriots, squandered public funds - all while feasting in his palaces as people starve. \n\nWe spilled blood for republicanism, not to trade Manchu emperors for a Han one! Yuan has betrayed his oath and become a traitor to the people. We who made the mistake of trusting him must now correct it - through arms if necessary. Let all patriots join us in overthrowing this usurper!""
 joi_flavor_chi.15.a: "Perhaps monarchy suits China better?"
 joi_flavor_chi.15.b: "We must defend the Republic our martyrs died for!"
 joi_flavor_chi.16.t: "Beiyang Mutiny"
 joi_flavor_chi.16.d: "What began as conflict between warlord brothers has escalated into national fragmentation."
 joi_flavor_chi.16.f: ""Recent years prove imperialists and warlords are obstacles to unification. Unless we destroy them, not only will national government remain impossible, but our revolutionary base areas face joint attack. \n\nWe must take up arms against these traitors regardless of cost. Let all who support our principles now support our military campaign - that we may swiftly overthrow the warlords, reunify the nation, and complete the revolution!""
 joi_flavor_chi.16.a: "We cannot tolerate national disunity!"

 joi_flavor_chi.17.t: "Founding Principles"
 joi_flavor_chi.17.d: "The millennia-old feudal dynasty has ended, and now begins [ROOT.GetCountry.GetName]'s history as a republic."
 joi_flavor_chi.17.f: ""No sooner had the revolution succeeded than my comrades began opposing my vision, claiming it too idealistic for China. Their doubts spread like wildfire, even among longtime allies. Thus my presidential proposals proved less effective than my revolutionary plans. Our reconstruction failed, leaving the nation worse than before. We overthrew Manchurian tyranny only to see it replaced by warlord despotism - more vicious than what came before. The people suffer more than ever!\n\nOur revolution began to save China and its people from misery. That we've instead deepened their suffering contradicts our founding purpose. The fault lies partly with my inability to guide comrades and lead the masses. Yet our party also bears responsibility - some lacked faith in our principles, others failed in execution. This came not from selfish ambition, but misguided thinking.""
 joi_flavor_chi.17.a: "Our nation's revival remains a long road ahead."

 joi_flavor_chi.18.t: "Military Officer Academy?"
 joi_flavor_chi.18.d: "The General Staff Officer returning from Western allies has reported to [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], who appointed him to establish the Army Officer Academy."
 joi_flavor_chi.18.f: "The reluctant general threw himself into the project after [ROOT.GetCountry.GetRuler.GetFirstName]'s reprimand. Today at the Guangzhou campus, the Commandant addressed the inaugural class. He may focus purely on military training as ordered, or politicize the curriculum to build personal loyalty among future officers."
 joi_flavor_chi.18.a: "Focus on professional military training."
 joi_flavor_chi.18.b: "Emphasize ideological indoctrination."
 joi_flavor_chi.19.t: "Outstanding Cadet"
 joi_flavor_chi.19.d: "An exceptional cadet has distinguished himself in recent exercises, recognized by [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] as future leadership material."
 joi_flavor_chi.19.f: ""Unless China escapes foreign encirclement, we risk either partition or annexation. The global tide may be turning - after centuries of oppression, our people awaken to progress. Shall we unite for war or peace? The militarists would Japanize China, risking another Boxer Rebellion. But our Republic was founded for peace. I believe my pen drafting peaceful plans may prove mightier than my sword that toppled the Qing.""
 joi_flavor_chi.19.a: "He should lead our armies to victory!"
 joi_flavor_chi.19.b: "He should rally our people to defend the homeland!"
 joi_flavor_chi.20.t: "Combat Training?"
 joi_flavor_chi.20.d: "Our generals insist Whampoa cadets need battlefield experience, lest they become mere armchair strategists."
 joi_flavor_chi.20.f: ""Oh students dear and true, with Three Principles our guide,\nRevolution's vanguard, carrying our martyrs' pride.\nComrades learning side by side, our academy's creed:\nBlood will bloom as flowers bright, this school our family's need.\nSleep on brush and taste the gall, rebuild our China's might!""
 joi_flavor_chi.20.a: "Only real combat forges true soldiers."
 joi_flavor_chi.20.b: "They should study harder instead of wasting resources!"

 joi_flavor_chi.21.t: "The New Agricultural System"
 joi_flavor_chi.21.d: "[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has promulgated and begun implementing [GetLawType('law_commercialized_agriculture').GetName] across [ROOT.GetCountry.GetName]."
 joi_flavor_chi.21.f: "\"What is first needed is that people should be free to produce, sell, and buy anything that can be produced or sold in the market. Crucially, opportunities in all trades must be open to all on equal terms. Any individual or group attempting to restrict this—whether through overt or covert force—shall be prohibited by law. Any attempt to control the price or quantity of a commodity will strip competition of its power to effectively coordinate human effort, for price fluctuations would then no longer reflect all relevant changes in objective conditions, nor provide reliable guidance for individual action.\""
 joi_flavor_chi.21.a: "May the new agricultural enterprises improve the countryside."
 joi_flavor_chi.22.t: "The People's Commune Movement"
 joi_flavor_chi.22.d: "[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has promulgated and begun implementing [GetLawType('law_collectivized_agriculture').GetName] across [ROOT.GetCountry.GetName]."
 joi_flavor_chi.22.f: "\"Members' land must be handed over to the agricultural cooperatives for unified use, as the fundamental condition for forming such cooperatives is the consolidation of individually managed plots into rationally and systematically cultivated land... Larger specialized plots—such as those for lotus ponds, fisheries, or reed beds—may also be collectively managed by the cooperative upon the owner's consent. To accommodate households growing vegetables or other horticultural crops, small private plots shall be permitted. The size of these plots shall be determined by household population and local land availability, but must not exceed 5% of the village's per capita land average.\""
 joi_flavor_chi.22.a: "The people will not tolerate reactionaries in the countryside!"

 joi_flavor_chi.23.t: "New Youth"
 joi_flavor_chi.23.d: "A student returned from Japan has founded a periodical titled 'Youth Magazine' at his residence."
 joi_flavor_chi.23.f: "After finishing what he considered a passable article, the young man stepped out to his usual café.\n\n'Greetings, Mr. Chen. I heard you recently started a magazine... Youth Magazine, was it?'\n\n'Yes, that's correct. Is there an issue?'\n\n'How are the sales?'\n\n'Just an obscure little journal—barely 1,000 copies distributed, including gratis exchanges.'\n\n'I see. We represent the Shanghai YMCA. Your publication shares its name with our magazines Youth and Shanghai Youth. Unless you rename it, we may pursue legal action.'\n\n'My apologies! I'll change the name in the next issue.'\n\nAfter the complainant left, the young man sat alone in the café, deep in thought. 'What should I rename it?'\n\n'Perhaps... New Youth.'"
 joi_flavor_chi.23.a: "\"To escape this age of ignorance, we must uphold both science and human rights.\""
 joi_flavor_chi.24.t: "A Modest Proposal for Literary Reform"
 joi_flavor_chi.24.d: "A Chinese student at Columbia University wrote an article for the 'Chinese Students' Quarterly,' then casually forwarded it to the 'New Youth' editorial office."
 joi_flavor_chi.24.f: "\"Many today discuss literary reform, and though I am but an unlearned journalist, unworthy to speak on the matter, I have pondered it repeatedly and debated with friends. My conclusions may yet hold value for discussion. Thus, I summarize my views into eight principles to share with those concerned with literary reform:\n\n1. Write with substance.\n2. Do not imitate the ancients.\n3. Emphasize grammar.\n4. Reject melancholy without cause.\n5. Eliminate stale clichés.\n6. Abandon literary allusions.\n7. Discard parallel prose.\n8. Do not shun vernacular language.\""
 joi_flavor_chi.24.a: "\"A great reformation is demanded.\""

 joi_flavor_chi.25.t: "Assassination of the Elected Premier"
 joi_flavor_chi.25.d: "The newly elected premier, who won the previous round of elections, has been assassinated by unknown assailants at Shanghai Railway Station, shocking the entire [ROOT.GetCountry.GetName]."
 joi_flavor_chi.25.f: "\"I was boarding the Shanghai-Nanjing night train to the capital to pay my respects to Your Excellency when at 10:45 PM, a traitorous villain fired upon me from behind. The bullet entered above my waist and exited below my abdomen - I know I must die. Throughout my life of learning, I have disciplined myself to virtue. Though I may not have been faultless, I have never made private enemies.\n\nOur corrupt Qing government compelled me to pursue reform, yet I have always valued human dignity and upheld justice, never acting for personal gain. Now our nation's foundations remain unsteady, our people's welfare unimproved - that I must depart now fills me with endless regret. I implore Your Excellency to govern with sincerity and fairness, to strive mightily to protect civil rights. Establish for our nation an unshakable Constitution, and though I die, it shall be as if I live. These dying words I beg you to consider.\""
 joi_flavor_chi.25.a: "The nation mourns as one!"
 joi_flavor_chi.26.t: "Oath Refusal"
 joi_flavor_chi.26.d: "Leaders of democratic parties attending the convention refuse to swear to the political ideology clause in the pre-session oath."
 joi_flavor_chi.26.f: "\"The ideology of mainstream parties does not represent our complete agreement, and we should not be bound by it. The constitutional draft's guarantees of freedom of belief and thought should be implemented immediately.\n\nWe respect our fellow party members' freedom of belief while maintaining our own freedom of thought. This is our reason for refusing to participate in the supplemental oath.\""
 joi_flavor_chi.26.a: "Then let them get out!"
 joi_flavor_chi.26.b: "Respect their political views."
 joi_flavor_chi.27.t: "Party Flag or National Flag?"
 joi_flavor_chi.27.d: "Democratic party leaders at the convention protest to [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], demanding removal of party flags hung at the convention hall entrance."
 joi_flavor_chi.27.f: "\"This is a national convention of all citizens, not a single-party assembly. If one party's flag is displayed, then all parties' flags should be displayed. We propose displaying only the national flag to demonstrate the majesty of law and uphold the principle that the state stands above any government.\""
 joi_flavor_chi.27.a: "The Party is the State!"
 joi_flavor_chi.27.b: "The nation must stand above parties."
 joi_flavor_chi.28.t: "Constitution of the Republic of China"
 joi_flavor_chi.28.d: "After lengthy convention debates, a new constitution has been adopted, replacing the Provisional Constitution as [ROOT.GetCountry.GetName]'s fundamental law."
 joi_flavor_chi.28.f: "\"Our new constitution's distinguishing feature is its guarantee to extend the basic elements of modern human rights - personal dignity and liberty - universally to all our compatriots. This constitution affirms our citizens' various freedoms, born from the spirit of free people under national unity.\n\nThe implementation of this constitution represents only the first step toward our ultimate goal of building a new China. Yet for our nation's 3,000-year history of autocratic rule and feudal society, this marks an epochal advancement. With loyalty and fervor, may we all march forward together.\""
 joi_flavor_chi.28.a: "A new day in republican history!"
 joi_flavor_chi.29.t: "Labor Contract with China"
 joi_flavor_chi.29.d: "With China's borders now open, their government has proposed a labor dispatch agreement to us."
 joi_flavor_chi.29.f: "\"Your Excellency the Ambassador surely knows the Chinese are invariably diligent and hardworking. These coolies - pardon me - these laborers will require far lower wages than your native workers. They will perform any task, even working entire days gratefully for mere sustenance rather than wages.\""
 joi_flavor_chi.29.a: "We need such workers."
 joi_flavor_chi.29.b: "We reject this agreement."

 joi_flavor_chi.30.t: "Treaty of Nanjing"
 joi_flavor_chi.30.d: "Following [ROOT.GetCountry.GetName]'s catastrophic defeat in the Opium War, we are compelled to sign this humiliating treaty with the victor: [SCOPE.sCountry('GBR_scope').GetName]."
 joi_flavor_chi.30.f: "\"Henceforth, His Majesty the Emperor of China agrees that British subjects with their families may reside at the five ports of Canton, Foochow, Amoy, Ningpo, and Shanghai for trade without hindrance. Her Majesty the Queen of Great Britain may appoint consuls and commercial agents at these ports to regulate commerce, corresponding with Chinese officials on equal terms. British merchants shall pay the fixed tariffs as specified in subsequent articles.\n\n\"As British vessels may require repairs after long voyages, China cedes in perpetuity the island of Hong Kong to Her Britannic Majesty, her heirs and successors, to be governed under British laws.\n\n\"For unjust actions by Chinese officials against British subjects, necessitating military redress, China agrees to pay twelve million silver dollars in reparations. Sums already paid for city ransoms since 15 June 1841 shall be deducted from this total by British authorities.\""
 joi_flavor_chi.30.a: "This could be our window to see the wider world."

 joi_flavor_chi.31.t: "The Breach at Tongwaxiang"
 joi_flavor_chi.31.d: "On [TimeKeeper.GetCurrentDate.Format('y MMM d')], in the fifth year of [ROOT.GetCountry.GetRuler.GetFirstName]’s reign, a great breach occurred at Tongwaxiang in Lanyi County, Kaifeng Prefecture, [SCOPE.sState('burst_state').GetStateRegion.GetName]. The Yellow River diverted its course northward, flowing through the provinces of [SCOPE.sState('thrace_1_scope').GetStateRegion.GetName], [SCOPE.sState('thrace_2_scope').GetStateRegion.GetName], and [SCOPE.sState('thrace_3_scope').GetStateRegion.GetName], leaving millions of people in disaster."
 joi_flavor_chi.31.f: "“In the fifth year, sixth month, at Tongwaxiang in Lanyang a breach opened, diverting the current through Changyuan, Dongming, and Zhangqiu, flowing into the Grand Canal and the Qing River to the sea, cutting off the old river’s course. The Emperor reflects that with military affairs unsettled and supplies scarce, if one could guide the waters advantageously and allow them to flow smoothly to the sea, the breach at Lanyang might be left unsealed for now.”\n\n“The river has turned north, and containment relies solely on earthen embankments built by the people, never yet considered for diversion. Fearing gradual silting and blockage at the mouth, matters would grow more difficult. In Puyang and Fan counties, there once stood golden levees. When I served as Eastern Inspector, I sought to repair them, but they were soon destroyed again. In Kaizhou upstream there are also breaches; if Kaizhou is left unrepaired, rebuilding at Puyang and Fan is of no use.”"
 joi_flavor_chi.31.a: "We can do nothing."
 joi_flavor_chi.31.b: "Immediately allocate funds to seal the breach!"
 joi_flavor_chi.32.t: "The Yellow River Reaches the Sea"
 joi_flavor_chi.32.d: "The calamity of the Yellow River’s course change has at last abated. The new course begins at [SCOPE.sState('yellow_1_scope').GetStateRegion.GetName], flows through [SCOPE.sState('yellow_2_scope').GetStateRegion.GetName] and [SCOPE.sState('yellow_3_scope').GetStateRegion.GetName], and empties into the sea. Yet the disasters left in its wake, and the dangers of future floods, remain grave."
 joi_flavor_chi.32.f: "“The principles of river control are none other than to assess the terrain, understand the water’s nature, measure the works, and weigh advantages against harms, but above all to heed the flow’s direction. At present the breach at Tongwaxiang is ten li wide, the drop too deep, the riverbed still several zhang lower when the waters recede. The old course stands higher, while below the breach the surface varies by two or three zhang. To restore the river to its former path would require dredging a diversion channel over three zhang deep, to draw the current eastward; yet to dig so deep is beyond human power. How could we now excavate to such depths?”\n\n“To attempt closure at such a mouth ten li wide is but a novelty. Since the founding of the dynasty, breaches of the Yellow River have been but three to four hundred zhang wide, and even then repeated efforts to block them failed for years. How could we now close and secure so vast a breach? To raise three zhang of water in the plain and carry it across a channel three zhang above ground is to await silting and sudden collapse, danger inevitable to any observer. Though repaired for a time, the levee will surely be breached again.”"
 joi_flavor_chi.32.a: "The task of controlling the Yellow River now falls upon our shoulders."
 joi_flavor_chi.33.t: "A Miracle in North China"
 joi_flavor_chi.33.d: "Through the long and arduous efforts of [ROOT.GetCountry.GetName], the Yellow River has at last been completely tamed, and [concept_yellow_river_flood_area] has vanished from the North China Plain. This #yellow Han#! nation’s nightmare of millennia has at last ended at the hands of [ROOT.GetCountry.GetRuler.GetFirstName] the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]: a five-thousand-year dream fulfilled, a truly magnificent achievement!"
 joi_flavor_chi.33.f: "“Just drank the waters of Changsha, and ate the fish of Wuchang. Crossing the great Yangtze, the vast skies of Chu open wide. However the winds blow and waves strike, it feels but like a stroll in the courtyard—today, a sense of ease is gained. The Master said by the river: ‘Time passes like this, flowing away unceasingly!’”\n\n“The sails stir, the tortoise and serpent lie still, a grand vision is raised. A bridge soars across north and south, the chasm turned thoroughfare; further, a wall rises in the western river, cutting off Wu Gorge’s clouds and rain, a great lake emerging between high cliffs. Surely the goddess is unharmed, astonished at a world transformed.”"
 joi_flavor_chi.33.a: "An unparalleled national miracle!"
 joi_flavor_chi.34.t: "[TimeKeeper.GetCurrentDate.Format('y')] Yellow River Flood"
 joi_flavor_chi.34.d: "The Yellow River shows signs of flooding once again, and on [TimeKeeper.GetCurrentDate.Format('MMM d')] it burst the embankments, inundating the entire [concept_yellow_river_flood_area], leaving countless people displaced."
 joi_flavor_chi.34.f: "“When waters from all breaches pour into the lakes, Jiangdu, Gao, and Bao each year must strengthen their embankments, rising with the waters. With thousands of li of fierce torrents assailing a lone high levee, should the west wind whip up waves, a single outpouring floods vast acres, and east of Jiang, Gao, Bao, and Tai no farmland remains, north of Xinghua no city or dwelling stands. Other lakes like Luyang and Pingwang are too shallow and narrow to hold the waters.”\n\n“Strict orders to open the sluices are given, but with works vast and aged, costs incalculable, and obstructed by illicit saltworks along the coast, nothing is accomplished. The waters meander to the northeast, entering the sea at Miaowan, submerging the fields and homes of seven counties for years at a time. As the old flood recedes, the new surge follows close behind.”"
 joi_flavor_chi.34.a: "Pray for Heaven’s mercy."
 joi_flavor_chi.34.b: "Funds must be allocated for relief!"

 joi_flavor_chi.35.t: "The Opium War"
 joi_flavor_chi.35.d: "The government of [SCOPE.sCountry('opium_wars_target_country').GetAdjectiveNoFormatting] has declared its determination to prohibit the trade of opium within [SCOPE.sCountry('opium_wars_target_country').GetName]. As [ROOT.GetCountry.GetName] is one of the principal exporters of opium, this has raised grave economic concerns."
 joi_flavor_chi.35.f: "“Some condemn opium merchants as moral degenerates; to them I say: what are you, that you would obstruct free trade and the consumer's freedom of choice? Where there is demand, we shall provide supply — and if not us, then some other nation will grow rich from the opium addiction of the [SCOPE.sCulture('opium_addicted_culture').GetNameNoFormatting] people. Shall the rights of all be denied merely because a handful of irresponsible fools abuse it? Shall every family in [ROOT.GetCountry.GetAdjectiveNoFormatting] be deprived of the wealth flowing into our nation through the opium trade?”"
 joi_flavor_chi.35.a: "Strike, and teach [SCOPE.sCountry('opium_wars_target_country').GetAdjectiveNoFormatting] a lesson!"
 joi_flavor_chi.35.b: "Oh, we cannot afford to offend [SCOPE.sCountry('opium_wars_target_country').GetAdjectiveNoFormatting]."
 joi_flavor_chi.36.t: "[TimeKeeper.GetCurrentDate.Format('Y')] Dangerous Drugs Act"
 joi_flavor_chi.36.d: "We have successfully broken the dependence of the [SCOPE.sCulture('addicted_culture').GetName] people upon opium. Not even the schemes of [SCOPE.sCountry('opium_wars_aggressor_country').GetName] can now prevent the people of [ROOT.GetCountry.GetName] from restoring their health and achieving national prosperity and strength."
 joi_flavor_chi.36.f: "“The government of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] holds that, although under exceptional circumstances the administration of morphine and heroin to addicts may be medically desirable, medical practitioners should take precautions against abuse when administering or prescribing such substances, and should adopt whatever measures are deemed appropriate to ensure compliance with these safeguards.”\n\n“Prescriptions for any such drug shall only be dispensed where the pharmacist is personally acquainted with the medical practitioner signing the prescription, or with the person for whose use the prescription is intended, and has no reason to suspect the prescription to be illegitimate.”"
 joi_flavor_chi.36.a: "The sovereignty of [ROOT.GetCountry.GetName] is absolute."
 joi_flavor_chi.36.b: "Opium addiction shall forever be banished from [ROOT.GetCountry.GetName]."
 joi_flavor_chi.37.t: "The Opium War: Defeat"
 joi_flavor_chi.37.d: "We have suffered a humiliating defeat at the hands of our enemies and have been forced to legalize opium. Not only have we failed to halt its continued circulation within our country, but our sovereignty has also been violated, provoking immense anger among the people."
 joi_flavor_chi.37.f: "“Where is the nation that ruled in peace and harmony for centuries? We are slaves to opium, dependent upon the scant mercy of greedy foreigners. We cannot control our own ports, foreigners show no respect toward our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and the whispers of discontent among the common people grow louder by the day. A dark age has descended upon us; perhaps our rule approaches its end.”"
 joi_flavor_chi.37.a: "Perhaps they are the heralds of [ROOT.GetCountry.GetName]'s doom."
 joi_flavor_chi.38.t: "The Opium War: Victory"
 joi_flavor_chi.38.d: "We have compelled [SCOPE.sCountry('opium_wars_target_country').GetName] to open its markets, ensuring the continuation of the opium trade for years to come."
 joi_flavor_chi.38.f: "“It is over, Ambassador. Inform your [SCOPE.sCountry('opium_wars_target_country').GetRuler.GetPrimaryRoleTitle] to sign this treaty, or the consequences shall be severe. You will open your ports to us, consult with our officials on all matters of trade, and compensate the soldiers who have brought devastation upon your lands and people in this conflict. You will submit.”"
 joi_flavor_chi.38.a: "[ROOT.GetCountry.GetName] rules the waves!"
 joi_flavor_chi.38.b: "Open the gates — free trade!"
