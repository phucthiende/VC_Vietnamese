 beijing_and_state_var_progress_bar_16_progress:0 "The capital is located in Beijing or Nanjing, and [concept_government] [concept_legitimacy] is at least 75"

 foreign_china_trade_power:0 "China's Trade Privileges"
 foreign_china_trade_power_reason:0 "The vast [concept_market] of [SCOPE.sCountry('CHI_scope').GetName] has bowed beneath the military might of our great [ROOT.GetCountry.GetName]. The immeasurable wealth of a land holding half the world's population now lies #bold bare before us#!.\n\nYet every power at this feast knows that [SCOPE.sCountry('CHI_scope').GetName] cannot be claimed by one alone. To safeguard shared interests—and prevent any single nation from dominating—we must gather as one. Let us then proceed in the #B manner of civilized men#!, seated at the negotiating table to #V carve up this prize#!."
 nine_power_treaty:0 "Nine-Power Treaty"
 nine_power_treaty_reason:0 "The #bold Celestial Empire's#! pride lies shattered, the Mandate's glory drowned. Our great nation is now shackled by the so-called '[GetLawType('law_free_trade').GetName]' extolled in the #variable Nine-Power Treaty#!; [ROOT.GetCountry.GetName]'s sovereignty and people are trampled as foreigners bicker over the negotiating table. We, the defeated, await fate's judgment—these are the darkest days in our millennia of history.\n\nYet the foreigners are no monolith. Their mutual distrust has minimized our losses. Hope remains: these foreign devils cannot control [ROOT.GetCountry.GetName] forever. They #italic will#! be expelled. Every generation of Chinese shall strive to restore [ROOT.GetCountry.GetName] to its rightful glory."
 nine_power_treaty_possible_tt:0 "Five or more [concept_great_power] or [concept_major_power] hold [concept_treaty_port] in our country."
 nine_power_treaty_complete_tt:0 "No more than two [concept_great_power] or [concept_major_power]s hold [concept_treaty_port] in our lands."
 nine_power_china_treaty_signed_1_tt:0 "The [concept_great_power] and [concept_major_power]s holding [concept_treaty_port] in our country will jointly sign an agreement to guarantee our independence."
 nine_power_china_treaty_signed_2_tt:0 "We will sign a treaty with all [concept_great_power] and [concept_major_power]s holding [concept_treaty_port] in China to guarantee China's independence."

 xinhai_revolution:0 "China Revolution"
 xinhai_revolution_reason:0 "The progress bar tracks how long [ROOT.GetCountry.GetName]'s #bold republican system#! has endured.\n\nA single gunshot in the night marked the collapse of the #variable Qing imperial house's#! power, beginning in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. The [GetLawType('law_monarchy').GetName] that ruled China for millennia lay broken. All knew this day would come—but none foresaw its swiftness. Under the #bold Qing government's#! despised rule, rebellions erupted everywhere. In the blink of an eye, the entire south fell to revolutionary forces. With court officials coerced, the imperial family recognized resistance as futile and #bold hastily abdicated#!.\n\nFrom destruction comes rebirth. Yet the #bold revolutionaries#! lack a unifying voice. #bold Monarchists#! secretly agitate within the military, while #bold Yuan Shikai#!, commanding a formidable New Army, reveals his ambitions. Distant [concept_great_power]s watch this nascent nation—if the revolutionary regime cannot swiftly establish [concept_legitimacy] and control, this #bold powder keg will explode#!. [ROOT.GetCountry.GetName] may plunge into a devastating [concept_war], perhaps even irreversible collapse.\n\nAmidst these clashing forces, [ROOT.GetCountry.GetName] drifts like an autumn leaf—where will the winds of history carry it?"
 xinhai_revolution_possible_1_tt:0 "Failed both the #variable Self-Strengthening Movement#! and #variable Hundred Days' Reform#!, with #variable autonomy#! of at least 400."
 xinhai_revolution_possible_2_tt:0 "Republicans seized power by force."
 xinhai_revolution_possible_3_tt:0 "[concept_capital_state] has over 50% [concept_turmoil] and any #variable republican#! leader's [concept_interest_group] is influential."
 xinhai_revolution_complete_tt:0 "The republican system has endured for over 10 years."
 xinhai_revolution_fail_tt:0 "The ruling government has fractured.\nIf [concept_government] [concept_legitimacy] falls below 90, anti-republican factions and warlords will rise in rebellion, threatening to splinter the republic."
 allow_national_constituent_assembly:0 "This will enable the republic to begin new political reforms once stabilized."
 xinhai_revolution_fail_2_tt:0 "The ruling government is unstable."
 old_qing_loyalists_tt:0 "The 'Queue Army' will crown the Qing Emperor in Beijing, restoring the monarchy!"
 war_of_huguo:0 "National Protection War"
 war_of_huguo_reason:0 "The Beiyang warlords, led by #variable Yuan Shikai#!, overthrew the republic and violated the #variable Provisional Constitution#!, sparking a monarchist restoration civil war. These traitors must be crushed to defend republican institutions."
 war_of_huguo_tt:0 "Restorationists suppressed; seceded provinces reclaimed."
 war_of_huguo_event_1_tt:0 "The Empire will launch a unification war to end the republic!"
 war_of_huguo_event_2_tt:0 "The Republic will launch a National Protection War to reunify China!"

 northern_expedition:0 "Northern Expedition"
 northern_expedition_reason:0 "The #bold fragmentation of the Beiyang Government#! has plunged [ROOT.GetCountry.GetName] into a devastating warlord era. Now, revolutionary forces rally in Guangdong, pledging to march north—to reclaim territories torn apart by warlords, unify the Chinese nation, and end this age of bloodshed."
 china_become_broken_tt:0 "Warlords will secede from central authority.\nWe must launch the Northern Expedition to crush these traitorous militarists!"
 war_of_northern_expedition_tt:0 "Warlords suppressed; seceded provinces reintegrated."
 war_of_northern_expedition_fail_tt:0 "Warlords have broken free from the Nationalist Government's control."

 roc_military_academy:0 "Whampoa Military Academy"
 roc_military_academy_reason:0 "With the [GetLawType('law_monarchy').GetName] toppled, we realize [ROOT.GetCountry.GetName] is like a child clutching treasure—surrounded by hungry [concept_great_power]s. A strong nation needs a strong army; without one, our [concept_revolution] gains cannot be defended. This must be addressed #bold at once#!.\n\nWe shall seek foreign expertise to establish a #bold modern military academy#!, breaking free from outdated doctrines. Only then can we forge a force capable of defending [concept_country] and its people on the world stage."
 roc_military_academy_tt:0 "The National Revolutionary Army is tempered in the Northern Expedition's fires."
 roc_military_academy_2_tt:0 "Relations with any European [concept_great_power] must be at least 40."
 chi_land_reform:0 "Land Reform"
 chi_land_reform_reason:0 "In the Qing countryside, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] monopolized land, reducing the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] to destitute tenant farmers. Archaic techniques stifled harvests, and this festering system threatens to rot [ROOT.GetCountry.GetName] from within unless excised #bold immediately#!.\n\n#variable Land reform#! is urgent. To achieve 'land to the tiller' and equitable rights, we must emancipate peasants from oppression—only then can our dream of national strength take root."
 chi_land_reform_tt:0 "Landowners suffer heavy losses during the Northern Expedition."
 chi_land_reform_complete_tt:0 "Different reform approaches will yield different outcomes."
 new_culture_movement:0 "New Culture Movement"
 new_culture_movement_reason:0 "Progress bar tracks [ROOT.GetCountry.GetName]'s #variable cultural reform progress#!.\nProgress increases when the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] is [concept_powerful] and [concept_in_government].\n\nWith the Qing's [GetLawType('law_monarchy').GetName] overthrown, new ideas flood [ROOT.GetCountry.GetName]'s intellectual landscape. The rallying cry for #bold Mr. Democracy and Mr. Science#! echoes nationwide—a rejection of feudal shackles and embrace of modernity.\n\nAs new literature and ethics purge #bold the dregs of autocracy#!, faith grows that long-denied rights and democracy can build a Western-style society. #bold A strong people forge a strong nation—soon, [ROOT.GetCountry.GetName] shall stand mighty among the world!#!"
 new_culture_movement_complete_tt:0 "Cultural reform progress reaches 180."
 new_culture_movement_status:0 "#bold #U Replacing Confucian classics with vernacular prose and enlightened thought#!#!"

 national_constituent_assembly:0 "National Constituent Assembly"
 national_constituent_assembly_reason:0 "Progress bar tracks #variable constitutional drafting progress#!.\n\n*'For forty years, I have devoted myself to the revolution, seeking China's freedom and equality. I know now that to succeed, we must awaken the masses and unite with all nations treating us as equals. The revolution remains unfinished—comrades, fight on!'*\n\n[ROOT.GetCountry.GetName] has survived imperial collapse and civil war to emerge as a republic. Yet debates rage as the #variable Provisional Constitution#! expires. [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] convenes political leaders in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to draft a permanent constitution."
 national_constituent_assembly_tt:0 "The Assembly has finalized the constitution draft."
 national_constituent_assembly_possible_tt:0 "Completed #variable 1911 Revolution#! or #variable Northern Expedition#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 national_constituent_assembly_status:0 "Assembly deliberations ongoing"
 national_constituent_assembly_fail_tt:0 "The Assembly is halted by potential coup."
 national_constituent_assembly_event_yes_tt:0 "Progress decreases by 10."
 national_constituent_assembly_event_no_tt:0 "Progress increases by 10."

 chinese_labor_go_out:0 "Labor Export Program"
 chinese_labor_go_out_reason:0 "Our nation possesses #bold cheap labor#!—a strategic advantage. By exporting workers abroad, we can earn foreign currency while solving domestic unemployment. A perfect solution.\n\nThough these laborers will endure the dirtiest, most dangerous jobs with high mortality, history shall remember them. Their sacrifice today builds tomorrow's [ROOT.GetCountry.GetName]."
 chinese_labor_go_out_gbr_button:0 "British Labor Contract"
 chinese_labor_go_out_gbr_button_desc:0 "With rising labor demands in Britain, Whitehall won't refuse our proposal to supply workers."
 chinese_labor_go_out_fra_button:0 "French Labor Contract"
 chinese_labor_go_out_fra_button_desc:0 "France's chronic labor shortage makes Paris an ideal destination for our workers to earn wages."
 chinese_labor_go_out_ger_button:0 "German Labor Contract"
 chinese_labor_go_out_ger_button_desc:0 "Germany urgently needs laborers for infrastructure projects—they'll welcome our skilled workforce."
 chinese_labor_go_out_usa_button:0 "American Labor Contract"
 chinese_labor_go_out_usa_button_desc:0 "America's 'land of opportunity' needs railroad builders—our first step to economic gains abroad."
 chinese_labor_go_out_aus_button:0 "Austrian Labor Contract"
 chinese_labor_go_out_aus_button_desc:0 "Vienna's artistic splendor awaits our laborers in this grand empire."
 chinese_labor_go_out_rus_button:0 "Russian Labor Contract"
 chinese_labor_go_out_rus_button_desc:0 "Though Russia lacks no manpower, Siberia's vastness still needs our workers."
 chinese_labor_go_out_ita_button:0 "Italian Labor Contract"
 chinese_labor_go_out_ita_button_desc:0 "Italy's booming economy will gladly accept our quality labor."
 chinese_labor_go_out_spa_button:0 "Spanish Labor Contract"
 chinese_labor_go_out_spa_button_desc:0 "Spain's mining sector faces shortages—a perfect opportunity for us."
 chinese_labor_go_out_bel_button:0 "Belgian Labor Contract"
 chinese_labor_go_out_bel_button_desc:0 "Belgium's superior working conditions will welcome our laborers."
 chinese_labor_go_out_tur_button:0 "Ottoman Labor Contract"
 chinese_labor_go_out_tur_button_desc:0 "The Ottoman economic rise promises good jobs for our workers."
 chinese_labor_go_out_jap_button:0 "Japanese Labour Contract"
 chinese_labor_go_out_jap_button_desc:0 "As our neighbour, Japan is in urgent need of labourers for work in its towns and cities. Let us offer them this contract."
 chinese_labor_go_out_brz_button:0 "Brazilian Labour Contract"
 chinese_labor_go_out_brz_button_desc:0 "Brazil possesses abundant natural resources, yet lacks a sufficient workforce to exploit them. Surely we can take advantage of this demand."
 accept_labor_agreement_tt:0 "We will accept China's labor export proposal"
 refuse_labor_agreement_tt:0 "We will reject China's labor export proposal"
 chinese_labor_go_gbr_tt:0 "No #Y British#! contract submitted in 5 years"
 chinese_labor_go_fra_tt:0 "No #Y French#! contract submitted in 5 years"
 chinese_labor_go_ger_tt:0 "No #Y German#! contract submitted in 5 years"
 chinese_labor_go_usa_tt:0 "No #Y American#! contract submitted in 5 years"
 chinese_labor_go_aus_tt:0 "No #Y Austrian#! contract submitted in 5 years"
 chinese_labor_go_rus_tt:0 "No #Y Russian#! contract submitted in 5 years"
 chinese_labor_go_ita_tt:0 "No #Y Italian#! contract submitted in 5 years"
 chinese_labor_go_spa_tt:0 "No #Y Spanish#! contract submitted in 5 years"
 chinese_labor_go_bel_tt:0 "No #Y Belgian#! contract submitted in 5 years"
 chinese_labor_go_tur_tt:0 "No #Y Ottoman#! contract submitted in 5 years"
 chinese_labor_go_jap_tt:0 "No #Y Japanese#! contract submitted in 5 years"
 chinese_labor_go_brz_tt:0 "No #Y Brazilian#! contract submitted in 5 years"

 way_of_neisheng:0 "The Path of Sagely Virtue"
 way_of_neisheng_reason:0 "*'In war, formations matter but courage is fundamental; in mourning, rites matter but grief is fundamental; in governance, knowledge matters but virtue is fundamental. Without strong foundations, one cannot lead others—and without leadership, all endeavors fail.'*\n\n#bold The Great Learning's Way#! illuminates illustrious virtue, renovates the people, and rests in supreme goodness. #variable Confucian essence#! lies in inner cultivation, not outward displays. The Son of Heaven rules by the Mandate—thus we must #bold uphold Heaven's decree#!, reforming governance through moral example rather than territorial expansion.\n\nOnly when rulers embody virtue through ritual can social harmony flourish, elevating [ROOT.GetCountry.GetName] to the golden age of the Three Sovereigns. By following #bold the Sage's teachings#!—governing through wuwei while benefiting the world—we shall realize the #bold Great Unity Society#! for millennia to come."
 way_of_neisheng_1_tt:0 "Completed #variable Self-Strengthening Movement#! and #variable Hundred Days' Reform#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 way_of_neisheng_2_tt:0 "Completed #variable 1911 Revolution#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 way_of_neisheng_3_tt:0 "Completed #variable Northern Expedition#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"

 china_defend_korea:0 "Defend Korea"
 china_defend_korea_reason:0 "As the Celestial Empire, we must protect our closest tributary: [SCOPE.sCountry('KOR_scope').GetName]. Though modern diplomacy sees no benefit, this upholds our #variable Mandate#! and deters aggressors—while allowing future cultural assimilation.\n\nTo ignore barbarian invasions would devastate our [concept_government] [concept_legitimacy] and [concept_influence]."
 keep_korea_interest_tt:0 "We maintain suzerainty over Korea"
 lose_korea_interest_1_tt:0 "Korea no longer exists"
 lose_korea_interest_2_tt:0 "We've lost Korean suzerainty"
 china_defend_vietnam:0 "Defend Vietnam"
 china_defend_vietnam_reason:0 "Though less favored than Korea, [SCOPE.sCountry('DAI_scope').GetName] guards our southern flank. [concept_great_power] expansion in Southeast Asia demands vigilance—especially against colluding local officials.\n\nWe must prevent Westerners from touching our borders, preserving both security and the crumbling #variable tributary system#!."
 keep_vietnam_interest_tt:0 "We maintain suzerainty over Vietnam"
 lose_vietnam_interest_1_tt:0 "Vietnam no longer exists"
 lose_vietnam_interest_2_tt:0 "We've lost Vietnamese suzerainty"

 china_company_jingdezhen_character:0 "Jingdezhen Imperial Kilns"
 china_company_jingdezhen_character_reason:0 "@porcelain!#V Porcelain#!—#B this exquisite treasure born of our civilization#!—has symbolized [SCOPE.sCulture('han_scope').GetName] achievement since Han dynasty aristocrats prized it. Some foreigners even call our nation 'China' after it.\n\nSince the #B early Ming#!, Jingdezhen's #V Imperial Kilns#! marked wares with reign periods under strict oversight from the Censorate and Ministry of Works. The kilns' #B hereditary craftsmen#! and #V imperial privileges#! gathered China's finest artisans, perfecting @porcelain!#V porcelain#! techniques.\n\nYet this monopoly left provincial kilns inferior to #V Jingdezhen's masterpieces#!. #B Still, the system fills state coffers—for now, its benefits seem undeniable?#!"

 yangtze_delta_industrialize:0 "Yangtze Delta Urbanization"
 yangtze_delta_industrialize_reason:0 "Since antiquity, the #V Jiangnan waterways#! have been [ROOT.GetCountry.GetName]'s richest lands—#B 'When Suzhou and Huzhou prosper, all under heaven are fed'#!. Now, with #B railways, ports, and cranes#!, the #V Yangtze Delta#! transforms from rural idyll to #B electric-lit metropolis#!.\n\n#B Treaty ports#! connect it globally, while #V natural harbors#! and #V river transport#! fuel growth. To industrialize, [concept_government] must accelerate urbanization, securing its status as #V Gateway to the Orient#!."
 yangtze_delta_industrialize_status:0 "Developing the Yangtze Delta's ports into a modern megalopolis"
 hanyeping_industrialize:0 "Industrialization of Hanyeping"
 hanyeping_industrialize_reason:0 "Located in Hubei and Jiangxi, the Hanyeping Corridor is actually a collective term for the Hanyang Iron Works, Daye Iron Mine, and Pingxiang Coal Mine. Since the Self-Strengthening Movement, the factories formed based on the abundant local mineral resources have gradually become the focal point of [ROOT.GetCountry.GetName]'s emerging industries. However, compared to those foreign great powers, these industrial facilities are still inefficient, poorly managed, and their production capacity is far from meeting the industrial demands of [ROOT.GetCountry.GetName].\n\nTo catch up with the other great powers of the world, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has ordered a complete transformation of the Hanyeping industrial system through government supervision and merchant management: we will build modern steel plants and lay railways connecting the mining areas with other provinces to provide steel and raw materials for other industries and military needs, making the Hanyeping Corridor truly the core of heavy industry for the southern provinces of [ROOT.GetCountry.GetName]."
 hanyeping_industrialize_status:0 "Build the core industrial zone of China in the Hanyeping Corridor"

 xinfeng_yellow_river_diversion:0 "The Great Yellow River Course Change of 1855"
 xinfeng_yellow_river_diversion_reason:0 "Since the #V second year of the Southern Song Jianyan era#! and the #R diversion into the Huai River to reach the sea#!, the Yellow River had maintained a relatively stable course. However, a #B recent levee breach has drastically altered the river’s flow#!: this fearsome river is now attempting to veer north and re-enter the East China Sea through #yellow Shandong#!.\n\n#R Current River Course#!: turns at [SCOPE.sState('burst_state').GetStateRegion.GetName], flows through [SCOPE.sState('thrace_1_scope').GetStateRegion.GetName], and enters the sea at [SCOPE.sState('thrace_2_scope').GetStateRegion.GetName].\n\n#P Projected Future Course#!: turns at [SCOPE.sState('burst_state').GetStateRegion.GetName], flows through [SCOPE.sState('thrace_4_scope').GetStateRegion.GetName], and enters the sea at [SCOPE.sState('thrace_3_scope').GetStateRegion.GetName]."
 xinfeng_yellow_river_diversion_its_time_tt:0 "The Yellow River has begun to change course"
 control_the_yellow_flood:0 "Tame the Yellow River"
 control_the_yellow_flood_reason:0 "Provinces #R that will be severely affected#! during #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_3_effects_tt $yellowriver_great_flood$#!#!: [SCOPE.sState('burst_state').GetStateRegion.GetName], [SCOPE.sState('thrace_1_scope').GetStateRegion.GetName], and [SCOPE.sState('thrace_3_scope').GetStateRegion.GetName].\n\nSince the #V 1855 Course Change of the Yellow River#!, the #yellow Yellow River#! has shifted and now enters the sea from [SCOPE.sState('thrace_3_scope').GetStateRegion.GetName], toppling thousands of li of levees and #B destroying countless towns and fields#!. With #R devastating force#! the river has swept across the #I North China Plain#!, bringing [concept_famine], #O disease#!, and #O waves of displaced people#!.\n\nIn truth, the #yellow Yellow River#! has never been a docile river: since the days of #V Yu the Great taming the floods#! it has been #B notorious for frequent course changes and repeated breaches#!. Dynasties of the Central Plains have poured immeasurable manpower and resources into its control, yet have never permanently cured this silt-laden river. As [ROOT.GetCountry.GetName] now controls the #yellow Yellow River#!’s key levees, we have #V inherited this heavy burden#!: #B whether we wish it or not, managing the Yellow River has become an unavoidable responsibility of the [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [concept_government]#!.\n\nThis is a #R long and nearly impossible undertaking#!: yet if left unchecked, the Yellow River #B will sooner or later surge again, bringing calamities worse than before#!. We can only commit more manpower and resources, seize the opportunities granted by new [concept_technology], and #V do everything in our power to tame this unruly great river—even knowing it will rise up again#!."
 control_the_yellow_flood_complete_tt:0 "The progress bar is full; the #yellow Yellow River#! has been fully pacified."
 control_the_yellow_flood_status:0 "#O Completely pacify the Yellow River disaster that has plagued North China for millennia—even if it is nearly impossible#!"
 control_the_yellow_flood_progress_desc_integer:0 "#V The progress bar shows the current completion of Yellow River control; the higher the progress, the lower the threat when #R the Yellow River floods#!.#!"
 event_effects_joi_flavor_chi.33_tt:0 "Gain the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_1_effects_tt $control_the_yellow_flood_success_modifier$#! modifier\nThe ruler gains the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_2_effects_tt $control_the_yellow_flood_leader_modifier$#! modifier\nThe Yellow River’s floods will vanish forever; [concept_yellow_river_flood_area] will be removed and no longer affect us."
 yellow_river_modifier_1_effects_tt:0 "[GetStaticModifier('control_the_yellow_flood_success_modifier').GetName|v]\n[GetStaticModifier('control_the_yellow_flood_success_modifier').GetDesc]"
 yellow_river_modifier_2_effects_tt:0 "[GetStaticModifier('control_the_yellow_flood_leader_modifier').GetName|v]\n[GetStaticModifier('control_the_yellow_flood_leader_modifier').GetDesc]"
 yellow_river_modifier_3_effects_tt:0 "[GetStaticModifier('yellowriver_great_flood').GetName|v]\n[GetStaticModifier('yellowriver_great_flood').GetDesc]"
 control_the_yellow_flood_goal:0 "Although fully pacifying the Yellow River may be impossible, as control progress increases, the #R frequency and severity of #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_3_effects_tt $yellowriver_great_flood$#!#! will be #G greatly reduced#!. #V Reinforced concrete and steam engine technologies#! will each increase our control efficiency by 60%."
 control_the_yellow_flood_1_button:0 "Commence Water-Control Works"
 control_the_yellow_flood_1_button_desc:0 "Controlling the Yellow River is destined to be a long and arduous project: a journey of a thousand li begins beneath one’s feet—let us once again embark on this endeavor that has been undertaken for millennia."
 control_the_yellow_flood_button_stop_tt:0 "Have not #V halted the water-control works#! in the past 2 years"
 control_the_yellow_flood_1_button_effect_tt:0 "Each [concept_yellow_river_flood_area] province will gain at least 10 and at most 20 [concept_arable_land] annually based on control efficiency.\nDepending on efficiency, yearly #V control progress#! will increase by at least 30 and at most 70."
 control_the_yellow_flood_2_button:0 "Suspend Water-Control Works"
 control_the_yellow_flood_2_button_desc:0 "Our finances can no longer bear the costs required to control the Yellow River. We must pause the works and revisit them another day."
 control_the_yellow_flood_button_timer_tt:0 "Have not #V commenced the water-control works#! in the past 1 year"
 control_the_yellow_flood_3_button:0 "Build the Huayuankou Dam"
 control_the_yellow_flood_3_button_desc:0 "Huayuankou is a key dam outlet on the south bank of the Yellow River north of Zhengzhou, Henan. Past dynasties built low-efficiency dams here, but with our new technologies we can renovate these critical levees to provide strong support for Yellow River control."
 control_the_yellow_flood_3_button_possible:0 "The Huayuankou Dam has not yet been built, or was destroyed"
 control_the_yellow_flood_3_button_possible_1_tt:0 "Have not used #V Breach the Huayuankou Levee#! in the past 5 years"
 control_the_yellow_flood_4_button:0 "Breach the Huayuankou Dam"
 control_the_yellow_flood_4_button_desc:0 "Huayuankou is a key dam restraining Yellow River floods. By demolishing it, we can effectively block enemies attempting to advance into the heartland of the Central Plains—but it will bring immense disaster to the local people."
 control_the_yellow_flood_4_button_war_tt:0 "Any enemy frontline has reached #yellow Henan#!, #yellow Shandong#!, #yellow Northern Anhui#!, or #yellow Jiangsu#!."
 control_the_yellow_flood_4_button_possible:0 "The Huayuankou Dam has been completed"
 control_the_yellow_flood_4_button_possible_1_tt:0 "The Huayuankou Dam was not completed within the past 1 year"
 increase_yellow_flood_progress_tt:0 "#P Increase by 1000#! #V control progress#!"
 decrease_yellow_flood_progress_tt:0 "#R Decrease by 1000#! #V control progress#!"
 china_warlord_explosion_joi_decrease_tt:0 "#V Fragile Unity#! progress bar decreases by 1"
 china_warlord_explosion_joi_increase_tt:0 "#V Fragile Unity#! progress bar increases by 1"

 common_opium_war:0 "The Opium Question"
 common_opium_war_reason:0 "Although opium was previously used primarily as a medicinal narcotic, the habit of opium consumption is now spreading among the people of [ROOT.GetCountry.GetName], greatly increasing demand and causing many users to fall into addiction. As a result, countless people across our society have become opium addicts. This is a national disgrace and must be resolved immediately."
 common_opium_war_goal:0 "The following conditions must be met for 5 years (interruption allowed):"
 common_opium_war_aggressor:0 "Opium War"
 common_opium_war_aggressor_reason:0 "The wicked government of [SCOPE.sCountry('opium_target').GetAdjective] is attempting to prohibit opium within their country, severely harming our economic interests. We must ensure that the opium trade remains unrestricted — by force if necessary."
