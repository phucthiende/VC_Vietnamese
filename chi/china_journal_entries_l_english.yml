l_english:

 western_affairs_movement:0 "Self-Strengthening Movement"
 western_affairs_movement_reason:0 "Our defeat in the #variable Opium War#! has shocked the imperial court: Not long ago, we were the most advanced and powerful nation among our neighbors. Now we find ourselves surrounded by foreign barbarians of unknown origin, wielding #bold advanced weaponry#! against which our brave and loyal soldiers cannot withstand even a single engagement - utterly helpless before the British barbarians.\n\nShould we continue ignoring reality, the destruction of our state and the fall of [ROOT.GetCountry.GetName] will be imminent. Now the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] leaders demand reform - that we learn Western technology and methods. The Celestial Empire must first seek self-strengthening, then prosperity.\n\nWe must set aside our pride to master their techniques, achieving the #bold goal of 'learning barbarian skills to control barbarians'#!."
 western_affairs_movement_tt:0 "Complete 6 #bold Self-Strengthening#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 western_affairs_movement_status:0 "#bold #U Modernizing China through Western technology#!#!"
 western_diplomatic_affairs_movement:0 "Self-Strengthening: Diplomatic Reform"
 western_diplomatic_affairs_movement_reason:0 "Since [ROOT.GetCountry.GetName]'s defeat in the #variable Opium War#!, our increasing contact with foreigners has forced humiliating compromises before their #bold superior weapons and military power#!. The Celestial Empire's traditional #variable tributary system#! crumbles daily.\n\nThough foreigners have seized many privileges, their ultimate aim isn't to overthrow [ROOT.GetCountry.GetName]'s imperial rule. This paradoxically allows cooperation - using them to suppress domestic dissent against our dynasty, or playing their mutual rivalries against each other. Yet our antiquated #bold barbarian affairs institutions#! no longer suit modern diplomacy with Western nations. Our foreign relations system requires urgent reform."
 western_diplomatic_affairs_movement_complete_tt:0 "Maintain abolished [GetLawType('law_closed_borders').GetName] for 10 years."
 western_diplomatic_affairs_movement_tt:0 "The Zongli Yamen (Office for General Management) will be established."
 western_diplomatic_affairs_movement_button:0 "Lift Maritime Ban"
 western_diplomatic_affairs_movement_button_desc:0 "The maritime prohibition enacted in #bold 1655#! under the Shunzhi Emperor has become untenable with our coastal defenses under constant threat. Yet scholar-officials profit enormously from smuggling under the ban - repealing this ancestral law will undoubtedly enrage them."
 western_industry_affairs_movement:0 "Self-Strengthening: Industrial Development"
 western_industry_affairs_movement_reason:0 "\"To strengthen [ROOT.GetCountry.GetName], we must first develop industry. Without industrial capacity, self-strengthening is impossible.\"\n\nWestern firearms themselves hold no particular terror - our Celestial Empire has used guns and cannons for centuries. What makes Western arms formidable is their precision craftsmanship and unmatched production speed. Therefore, to defeat Western nations, we must establish an #bold industrial system capable of manufacturing advanced weaponry#!."
 western_industry_affairs_movement_tt:0 "New industrialists will become staunch supporters of the Movement!"
 western_railway_affairs_movement:0 "Self-Strengthening: Railway Construction"
 western_railway_affairs_movement_reason:0 "Railways themselves are no marvel - merely iron roads. But the trains that run upon them are truly practical 'clever tricks and wasteful crafts' (奇技淫巧). Yet trains cannot run without tracks. As Western nations race to build railways, [ROOT.GetCountry.GetName] must likewise prioritize #bold railway construction#! if we are to modernize."
 western_railway_affairs_movement_tt:0 "Railways will significantly improve internal communications."
 western_army_affairs_movement:0 "Self-Strengthening: New Army Training"
 western_army_affairs_movement_reason:0 "Consider our imperial #variable examination system#! - for a thousand years it produced generations of military heroes. Yet today, not a single #bold military examination laureate#! or #bold Banner Division warrior#! in all [ROOT.GetCountry.GetName] has mastered Western arms or surpassed European tactics. Yet Western firearms and strategies ultimately derive from Chinese origins. Since they've improved upon our teachings, we should humbly follow Confucius' example - 'When walking with two others, I will surely find a teacher among them' - and reluctantly train a Western-style New Army."
 western_army_affairs_movement_tt:0 "The New Army will advance the Self-Strengthening agenda."
 western_navy_affairs_movement:0 "Self-Strengthening: Naval Modernization"
 western_navy_affairs_movement_reason:0 "The #variable Opium War#! taught us that a navy capable of #bold coastal defense#! is essential. Recall how the Ming dynasty's fleets once dominated the seas unchallenged. Though [ROOT.GetCountry.GetName]'s current navy surpasses the Ming's, it remains inadequate against powers like [SCOPE.sCountry('GBR_scope').GetName]. Since Western threats come by sea, we must build a [concept_fleet] surpassing all foreign navies to defend the Celestial Empire."
 western_navy_affairs_movement_tt:0 "The modernized navy will further the Movement's progress."
 western_education_affairs_movement:0 "Self-Strengthening: Educational Reform"
 western_education_affairs_movement_reason:0 "#bold The Sage said: 'Learning without thought is labor lost; thought without learning is perilous.'#! Since our dynasty's founding, we've valued the examination system and scholarly education. Yet recently the #variable imperial examinations#! produce fewer genuine #bold statecraft talents#!, leaving us bereft of technical expertise. Europe's universities and public education systems excel at producing capable graduates. We should adapt their methods, establishing new-style schools."
 western_education_affairs_movement_tt:0 "Western-educated graduates will become key supporters of the Movement."

 imperial_examination_system:0 "Imperial Examination System"
 imperial_examination_system_reason:0 "Governance is like the bulrush - it requires proper cultivation to flourish. Thus, good governance depends on finding capable men. With such men, governance prospers; without them, it declines. The #variable Imperial Examination System#! traces its origins to the #bold Sui and Tang dynasties#! a millennium ago. Established during Sui-Tang, developed in Song, and perfected in Ming-Qing, this system selects officials through tiered examinations that draw talent from commoners. While evolving over centuries, its core has remained unchanged - emphasizing the #bold Four Books and Five Classics#! while breaking aristocratic monopolies on office.\n\nFor commoners, the #variable examinations#! represent a ladder to high office and a proving ground for serving the state. Every dynasty has recruited countless talents through these #bold civil service exams#!, men who shone brightly in history's long river. [ROOT.GetCountry.GetName] is no exception.\n\nSince the #bold Manchu conquest#!, we've perfectly blended Manchu and Han cultures within this system, producing clear-sighted governance. Yet as Western learning spreads eastward, will the examinations meet their end or be reborn to lead anew? That remains unknown."
 imperial_examination_system_status:0 "#bold Court officials are selected through imperial examinations#!"

 grand_council:0 "Grand Council"
 grand_council_reason:0 "When established by the #bold Yongzheng Emperor#! to manage the Dzungar campaigns, the #variable Grand Council#! was but a small office within the Forbidden City. Under the #bold Qianlong Emperor's#! reorganization, its purview expanded beyond military affairs to encompass all governance of [ROOT.GetCountry.GetName] - from the Six Ministries and Nine Gates Commanders to the Imperial Household Department's eunuchs, from the fifteen provinces to Manchuria's generals, and from Xinjiang's frontier commanders to tributary states' affairs. All matters eventually converge here.\n\nYet the #variable Grand Council#! cannot compare to the #bold Three Departments of Tang#!. #bold Grand Councilors#! are not chancellors - not even ministers - merely the #bold Emperor's personal secretariat#!. Should the Emperor wish its abolition, councilors can only #bold obey the imperial will#!.\n\nWith changing times, perhaps the Council will eventually be reorganized anew?"

 hundred_days_reform:0 "[ROOT.GetCountry.GetRuler.GetFirstName]'s Reformation"
 hundred_days_reform_reason:0 "The strength of European powers lies not only in #bold advanced technology, but also in their reliable institutions#!. Though [ROOT.GetCountry.GetName] holds the Mandate of Heaven, we cannot escape the #bold rot of bureaucracy#! and #bold autocracy of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!.\n\nHistory teaches us reform's power: Shang Yang abolished the well-field system and military reforms unified China under Qin; Wang Anshi's New Policies enriched Song through production and meritocracy; Zhang Juzheng's Single Whip Reform saved the Ming. To govern well, we must emulate these predecessors and #bold revolutionize our institutions#!.\n\nFor the empire's survival, we must follow these examples - cutting away corrupt practices, ending millennia of autocracy, and answering our people's hopes by establishing #bold new democratic and scientific institutions#! to replace the old order."
 hundred_days_reform_tt:0 "Complete 3 #variable Reformist#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 hundred_days_reform_status:0 "#bold Implement reforms swiftly before conservatives counterattack#!"
 at_least_finish_3_western_affairs:0 "Completed at least 3 #variable Self-Strengthening#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 hundred_days_reform_examination:0 "Reform: Abolish Imperial Examinations"
 hundred_days_reform_examination_reason:0 "[ROOT.GetCountry.GetName] continues the Song-Ming tradition of selecting officials through #bold eight-legged essays#!. The Kangxi Emperor once abolished this format for policy essays, but soon restored it. Now standards decline daily - the examination content grows increasingly divorced from reality. Officials emerging from this rigid system cannot govern effectively in our new domestic and international situation.\n\nTrue talent reform requires #bold abolishing the obsolete examination system#!, replacing it with #variable Western-style testing#!."
 hundred_days_reform_examination_tt:0 "We have decreed the abolition of the #variable Imperial Examination System#!."
 hundred_days_reform_examination_button:0 "Issue Examination Abolition Edict"
 hundred_days_reform_examination_button_desc:0 "After a millennium of service, the examination system has decayed beyond usefulness for producing reform-minded officials. By imperial decree, we abolish it - our court needs new blood!"
 hundred_days_reform_council:0 "Reform: Abolish Grand Council"
 hundred_days_reform_council_reason:0 "\"The virtue of constitutional government lies in clearly defining each institution's organization and authority, preventing overlap, allowing smooth operation, and making each responsible for its own success or failure. China's greatest ill today is the tangled, undefined boundaries between institutions - superficially all have power, actually none take responsibility.\"\n\nThe #variable Grand Council#! lacks clear authority. Its #bold councilors#! are numerous yet disordered, serving merely as tools for the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s autocratic will. This fossilized institution must be abolished and replaced with a #bold constitutional cabinet system#! modeled after #bold Western nations#!."
 hundred_days_reform_council_tt:0 "We have decreed the abolition of the #variable Grand Council#!."
 hundred_days_reform_council_button:0 "Issue Grand Council Abolition Edict"
 hundred_days_reform_council_button_desc:0 "Established by the Yongzheng Emperor, the Grand Council has become our greatest reform obstacle - a den of monsters interfering in governance and enabling harem politics. We must end its meddling in state affairs."
 hundred_days_advisory_council:0 "Reform: Establish Advisory Council"
 hundred_days_advisory_council_reason:0 "Western powers grew strong through superior institutions - before reform, they were no match for the Celestial Empire. Their systems unite monarch and people in joint governance, strengthening the state and winning popular support.\n\nOur reformation requires an Advisory Council to unite the people, ensuring [ROOT.GetCountry.GetName]'s prosperity."
 hundred_days_reform_on_complete_tt:0 "Upon completing 5 #V Self-Strengthening#! [Concept('concept_journal_entry', '$concept_journal_entries$')], we will gain recognition as a modern nation."

 advisory_council:0 "Advisory Council"
 advisory_council_reason:0 "The #variable Advisory Council#! represents [ROOT.GetCountry.GetName]'s constitutional monarchy parliament. Two hundred delegates from across the realm gather here to debate state affairs, standing above all bureaucracies with authority over budgets and military command.\n\nAs compromise between constitutionalists and republicans, the Council shares #bold lawmaking power#! with the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], serving as the theoretical #bold supreme authority#! that fulfills the #bold ideal of joint monarch-people governance#! - strengthening the nation and securing loyalty."
 advisory_council_1_button:0 "Dismiss Controversial Cabinet"
 advisory_council_1_button_desc:0 "The current cabinet fails imperial needs. His Majesty may follow popular will to dismiss them and call new elections."
 advisory_council_1_button_tt:0 "Cabinet not dismissed in 5 years"
 advisory_council_2_button:0 "Convene Advisory Council"
 advisory_council_2_button_desc:0 "The constitution requires His Majesty to consult the Council - we should seek their wise counsel."
 advisory_council_2_button_tt:0 "Council not convened in 1 year"

 isolationist_policies:0 "Closed Door Policy"
 isolationist_policies_reason:0 "Since the Ming Dynasty, our nation has maintained strict isolationist policies: #bold The Celestial Empire possesses all things in prolific abundance and lacks no products within its borders - there is no need to import barbarian goods#!. Moreover, the insidious doctrines of foreign missionaries poison our people's minds and threaten [ROOT.GetCountry.GetName]'s stability.\n\nDuring the reign of #variable Emperor Shunzhi#!, three successive maritime prohibitions forced coastal residents inland and banned foreign trade to prevent repeats of the Wakou pirate raids. Later, #variable Emperor Qianlong#! strengthened these policies, restricting foreign merchants exclusively to #bold Canton (Guangzhou)#! under supervision of the #bold Cohong merchant guild#!.\n\nThough these edicts effectively isolated [ROOT.GetCountry.GetName], smuggling persisted. Now the #variable Closed Door Policy#! remains entangled with court officials' and merchants' interests. The shackles of #bold maritime prohibition and ancestral law#! weigh heavily upon [ROOT.GetCountry.GetName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], appearing destined to endure eternally."
 open_market_policies:0 "Open Door Policy"
 open_market_policies_reason:0 "#B #N During the validity of this journal entry, the trade law will be forcibly locked to [GetLawType('law_free_trade').GetName].#!#!\n\nThe old #variable Closed Door Policy#! has collapsed alongside our #bold frontier controls#!. Now [GetLawType('law_free_trade').GetName] replaces ancestral law as [ROOT.GetCountry.GetName]'s trade policy.\n\nWithout proper customs, we suffer foreign dumping that weakens domestic markets and stifles industrialization. We must cast off the #bold unequal treaties#! imposed by foreign powers, establish new reliable customs, and use [GetLawType('law_protectionism').GetName] to protect our goods."
 open_market_policies_tt:0 "Completed #bold Customs Reform#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 reform_chinese_customs:0 "Customs System Reform"
 reform_chinese_customs_reason:0 "Our antiquated customs system, established along Jiangnan and Fujian coasts by #variable Emperor Kangxi#!, has after centuries become riddled with #bold bureaucratic corruption#!. Western [concept_great_power] goods flood [ROOT.GetCountry.GetName]'s markets tariff-free, rendering our customs effectively nominal.\n\nCustoms revenue should become a pillar of [ROOT.GetCountry.GetName]'s finances. To restore fiscal health, we must purge corrupt elements and establish new protective mechanisms through #variable Customs Reform#!."
 can_reform_chinese_customs_tt:0 "Requires #bold Open Door Policy#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 finish_reform_chinese_customs_tt:0 "The customs system has been reformed with foreign assistance."
 reform_chinese_customs_1_button:0 "Hire British Experts"
 reform_chinese_customs_1_button_desc:0 "While the British precipitated the Opium War, they undeniably possess the world's most sophisticated customs service. Through improved relations, we might request experienced personnel to oversee our customs, combat corruption, and establish proper systems."
 reform_chinese_customs_1_button_tt:0 "No British customs personnel hired yet."
 reform_chinese_customs_2_button:0 "Hire French Experts"
 reform_chinese_customs_2_button_desc:0 "Despite frequent domestic turmoil, the French maintain well-organized customs controls. Through diplomatic channels, we might request their experienced personnel to reform our customs administration."
 reform_chinese_customs_2_button_tt:0 "No French customs personnel hired yet."
 reform_chinese_customs_3_button:0 "Hire American Experts"
 reform_chinese_customs_3_button_desc:0 "Americans advocate equal opportunity in China and have expressed willingness to assist our economic reconstruction. Through friendly negotiations, we might secure their experienced customs officials to establish modern systems."
 reform_chinese_customs_3_button_tt:0 "No American customs personnel hired yet."
 reform_chinese_customs_4_button:0 "Hire German Experts"
 reform_chinese_customs_4_button_desc:0 "Germany successfully revitalized its economy through protectionist policies - we should learn from them. By lobbying the German legation in Beijing, we might obtain their experienced customs administrators."
 reform_chinese_customs_4_button_tt:0 "No German customs personnel hired yet."
 reform_chinese_customs_1_monthly_tt:0 "Customs reform progress increases by 1 monthly after securing foreign support"
 reform_chinese_customs_2_monthly_tt:0 "Customs reform progress increases by 0.5 monthly after securing foreign support"

 chinsese_royal_court:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Imperial Court"
 chinsese_royal_court_reason:0 "The progress bar displays the influence of the current #bold dominant faction in court politics#!.\n\n#bold Outer Court Influence#! (Civil Bureaucracy): #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_bureaucrat_var').GetValue|0]#!; changes weekly based on #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_1_tooltip_advance conditions#!.\n\n#bold Inner Court Influence#! (Emperor's Household): #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_emperor_var').GetValue|0]#!; changes weekly based on #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_2_tooltip_advance conditions#!.\n\n#bold Eunuch Influence#!: #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_eunuch_var').GetValue|0]#!; changes weekly based on #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_3_tooltip_advance conditions#!.\n\n#bold Eight Banners Influence#! (Manchu Military Elite): #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_woman_var').GetValue|0]#!; changes weekly based on #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_4_tooltip_advance conditions#!.\n\nThe imperial capital at [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] maintains governance through an uneasy Manchu-Han alliance established after the Qing conquest. Persistent #bold mutual distrust and inequality#! between Manchu and Han officials forces an #bold unwilling cooperation#! - beneath the court's placid surface, undercurrents of tension swirl.\n\nPower struggles extend beyond ethnic divisions. Since Ming times, the #variable 'Emperor and Scholar-Officials Jointly Govern'#! tradition has bred conflicts between aristocratic and common-born officials, and between #bold rival court factions#!. These cliques jostle for advantage while collectively resisting [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s attempts to balance or diminish their power.\n\nAfter centuries, [ROOT.GetCountry.GetName]'s bureaucracy resembles an ornate octagonal table - each leg supports independently, yet removing any would topple the entire structure. Previous dynasties' failures teach us how to maintain central authority. To preserve [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s #variable Mandate of Heaven#!, we must employ new measures to control these competing forces..."
 status_chinsese_royal_court_bureaucrat:0 "#I Civil Bureaucracy Dominates#!"
 status_chinsese_royal_court_emperor:0 "#U Imperial Household Dominates#!"
 status_chinsese_royal_court_eunuch:0 "#N Eunuch Faction Dominates#!"
 status_chinsese_royal_court_woman:0 "#O Eight Banners Dominates#!"
 status_chinsese_royal_court_always:0 "#P Court in Balance#!"
 chinsese_royal_court_1_tooltip_advance:0 "#variable Government [Concept('concept_building_level', '$concept_building_levels$')] generates [Country.MakeScope.Var('chinsese_royal_court_bureaucrat_progress').GetValue|+=] points#!"
 chinsese_royal_court_2_tooltip_advance:0 "#variable [concept_government][concept_legitimacy] generates [Country.MakeScope.Var('chinsese_royal_court_emperor_progress').GetValue|+=] points#!"
 chinsese_royal_court_3_tooltip_advance:0 "#variable Monarch's [concept_popularity] generates [Country.MakeScope.Var('chinsese_royal_court_eunuch_progress').GetValue|+=] points#!"
 chinsese_royal_court_4_tooltip_advance:0 "#variable [concept_country][concept_budget_income_taxes] generates [Country.MakeScope.Var('chinsese_royal_court_woman_progress').GetValue|+=] points#!"
 chinsese_royal_court_1_button:0 "Purge Officials"
 chinsese_royal_court_1_button_desc:0 "The civil bureaucracy's influence grows dangerously. To restore balance, we should systematically demote problematic officials."
 chinsese_royal_court_1_button_tt:0 "Requires ≥300 Outer Court Influence"
 chinsese_royal_court_1_button_effect_tt:0 "Reduces Outer Court Influence by 250."
 chinsese_royal_court_2_button:0 "Restrict Inner Court"
 chinsese_royal_court_2_button_desc:0 "Ancestral law forbids imperial household interference in governance. We must reinforce this prohibition."
 chinsese_royal_court_2_button_tt:0 "Requires ≥300 Inner Court Influence"
 chinsese_royal_court_2_button_effect_tt:0 "Reduces Inner Court Influence by 250."
 chinsese_royal_court_3_button:0 "Curb Eunuchs"
 chinsese_royal_court_3_button_desc:0 "Eunuch political meddling proved disastrous for the Ming. We cannot repeat their mistakes."
 chinsese_royal_court_3_button_tt:0 "Requires ≥300 Eunuch Influence"
 chinsese_royal_court_3_button_effect_tt:0 "Reduces Eunuch Influence by 250."
 chinsese_royal_court_4_button:0 "Discipline the Banners"
 chinsese_royal_court_4_button_desc:0 "The Eight Banners conquered our empire but cannot govern it. We must punish corrupt Manchu elites."
 chinsese_royal_court_4_button_tt:0 "Requires ≥300 Eight Banners Influence"
 chinsese_royal_court_4_button_effect_tt:0 "Reduces Eight Banners Influence by 250."

 beijing_and_state:0 "Provinces and [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 beijing_and_state_reason:0 "The progress bar displays the current #bold autonomy level#! of local governments under [ROOT.GetCountry.GetName].\n\n#variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! has stood as the imperial capital for centuries—a mighty fortress of #bold military and economic power#!. Strategically positioned and politically pivotal, this ancient city remains the natural heart of our great [concept_country], embodying both the authority of the [concept_government] and the #bold eternal struggle between central power and regional ambitions#!.\n\nThe provinces of China do not naturally bow to #variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!. As the ancients said, #bold “The land is vast, its customs diverse; each region governs itself, each holds its own power.”#! Without the weight of imperial authority, the provinces would not submit. Like all dynasties before, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] now faces this age-old challenge—for millennia, Chinese [concept_government] relied on #bold centralized institutions#! and #bold mighty armies#! to keep the provinces in check. Yet time and again, corruption and military decay have weakened the throne, leading to #bold collapse when regional defiance overpowers the center#!.\n\nIn modern times, [ROOT.GetCountry.GetName]’s reforms initially curbed provincial and gentry influence. But as authority wanes and local power grows, the provinces now display #bold alarming independence#!. They increasingly challenge #bold [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!’s supremacy as the [concept_capital_state], expanding their sway across [ROOT.GetCountry.GetName]..."
 status_beijing_and_state_1:0 "#P #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] maintains firm control#!#!"
 status_beijing_and_state_2:0 "#O #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]’s authority weakens with distance#!#!"
 status_beijing_and_state_3:0 "#O #B Local officials feign compliance with [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]’s decrees#!#!"
 status_beijing_and_state_4:0 "#N #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]’s authority reaches a historic low#!#!"
 status_beijing_and_state_5:0 "#N #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] nears total loss of provincial control#!#!"
 status_beijing_and_state_always:0 "#V #P #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]’s authority stands unshaken#!#!"
 chinese_central_government_callpes_tt:0 "Provinces will gain significant autonomy.\nMay eventually reject even nominal central rule!"
 chinese_central_government_will_callpes_tt:0 "Provincial autonomy has reached 1000."
 beijing_and_state_1_button:0 "Empower Provincial Governors"
 beijing_and_state_1_button_desc:0 "Provincial officials have long been the backbone of imperial governance. Granting them greater powers may secure their loyalty—for now."
 beijing_and_state_1_button_tt:0 "Autonomy below 300"
 beijing_and_state_1_button_effect_tt:0 "Monthly autonomy +2"
 beijing_and_state_2_button:0 "Allow Regional Recruitment"
 beijing_and_state_2_button_desc:0 "Central conscription orders often become mere quotas—poorly enforced by disloyal officials. Delegating military recruitment may strengthen our armies, but at what cost?"
 beijing_and_state_2_button_tt:0 "Autonomy below 500"
 beijing_and_state_2_button_effect_tt:0 "Monthly autonomy +4"
 beijing_and_state_3_button:0 "Relax Censorship"
 beijing_and_state_3_button_desc:0 "Our rule has long relied on suppressing dissent—recall the Literary Inquisition of old. Yet loosening these restraints may foster intellectual growth."
 beijing_and_state_3_button_tt:0 "Autonomy below 750"
 beijing_and_state_3_button_effect_tt:0 "Monthly autonomy +2"
 beijing_and_state_4_button:0 "Investigate Corrupt Officials"
 beijing_and_state_4_button_desc:0 "For millennia, our bloated bureaucracy has bred corruption. A purge may restore discipline—if the inspectors themselves remain uncorrupted."
 beijing_and_state_4_button_tt:0 "Autonomy below 750"
 beijing_and_state_4_button_effect_tt:0 "Monthly autonomy -1"
 beijing_and_state_var_progress_bar:0 "Local Autonomy"
 beijing_and_state_var_progress_bar_desc:0 "Autonomy: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/1000)"
 beijing_and_state_var_progress_bar_1_progress:0 "Currently #V Authorizing Provincial Governors#!"
 beijing_and_state_var_progress_bar_2_progress:0 "Currently #V Allowing Local Recruitment#!"
 beijing_and_state_var_progress_bar_3_progress:0 "Currently #V Relaxing Speech Restrictions#!"
 beijing_and_state_var_progress_bar_4_progress:0 "Any [concept_incorporated_state] in the country is experiencing [concept_tax_waste]"
 beijing_and_state_var_progress_bar_5_progress:0 "[concept_government] [concept_legitimacy] is below 50"
 beijing_and_state_var_progress_bar_6_progress:0 "[concept_authority] generation is below 500"
 beijing_and_state_var_progress_bar_7_progress:0 "Possesses the #B #L “Lost the Opium War”#!#! modifier"
 beijing_and_state_var_progress_bar_8_progress:0 "Researched the Central Archives [concept_technology]"
 beijing_and_state_var_progress_bar_9_progress:0 "Researched Central Planning [concept_technology]"
 beijing_and_state_var_progress_bar_10_progress:0 "[concept_government] [concept_legitimacy] is above 75"
 beijing_and_state_var_progress_bar_11_progress:0 "[concept_authority] generation is positive"
 beijing_and_state_var_progress_bar_12_progress:0 "[concept_authority] generation is above 300"
 beijing_and_state_var_progress_bar_13_progress:0 "Currently #V Thoroughly Investigating Corrupt Bureaucrats#!"
 beijing_and_state_var_progress_bar_14_progress:0 "[concept_in_government] and a satisfied [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] interest group"
