l_english:

 verfassung_des_deutschen:0 "Imperial Constitution"
 verfassung_des_deutschen_reason:0 "With [ROOT.GetCountry.GetName] having achieved the unification of the German territories, the nascent Empire has brought the southern states under the rule of the #variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] government#!. However, these states are far from obedient vassals—in fact, their former monarchs and administrations #bold continue to operate#!, particularly in the south, where they have merely adopted new titles while paying nominal allegiance to the #bold 'German Emperor'#!: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName].\n\nThis trend cannot be tolerated. To ensure our great [ROOT.GetCountry.GetName] does not repeat the mistakes of the #bold Holy Roman Empire#! and fracture once more, the central government and Reichstag must enforce a definitive #bold Constitution#! across the realm, legally binding these states to the imperial authority. Simultaneously, this constitution will shape the Empire's #bold future political system#!.\n\nThe new imperial government must first #bold solidify#! its control over the realm before pursuing further reforms."
 verfassung_des_deutschen_1_tt:0 "We must ensure no significant [concept_revolution] threatens the constitution within 1 year."
 verfassung_des_deutschen_2_tt:0 "If we adopt the #bold Bismarck Constitution#! or a #bold Liberal Constitution#!, the #bold Reichstag#! will become a permanent institution."
 verfassung_event_1_tt:0 "This will #bold prohibit#! the future establishment of a permanent Reichstag."
 verfassung_event_2_tt:0 "This will #bold allow#! the future establishment of a permanent Reichstag."

 kontinentalpolitik_des_deutschen:0 "Kontinentalpolitik"
 kontinentalpolitik_des_deutschen_reason:0 "“The study of the forces that shape, sustain, and alter states is the foundation of all political insight, revealing that the laws of power govern the world of nations just as gravity governs the material world. Ancient statecraft recognized this truth but drew a false and dangerous conclusion—the right of the strong. Modern thought has corrected this immoral fallacy, yet in rejecting the so-called 'right' of the strong, it often neglects the reality of their power and its political inevitability.”\n\nSince unification, [ROOT.GetCountry.GetName]'s influence has been anchored in Europe. Positioned at the continent’s crossroads and commanding the fertile German heartland, even the naval hegemon [SCOPE.sCountry('GBR_scope').GetName] or the once-dominant [SCOPE.sCountry('FRA_scope').GetName] must now defer to our authority in European affairs.\n\nWith our paramount interests lying in Europe rather than overseas, [ROOT.GetCountry.GetName] must diplomatically isolate potential continental rivals, preventing their alignment against us, while avoiding antagonizing the United Kingdom at the cost of colonial ambitions. Thus, we secure the most favorable diplomatic landscape for our European interests.\n\nFor now, Germany is content with power on the continent."
 change_ger_dip_1_tt:0 "If we hold more than 17 territories outside Europe, the Continental Policy will end.\nWe will shift to Weltpolitik!"
 kontinentalpolitik_des_deutschen_status:0 "#V #O Germany's power status, focused on European interests.#!#!"
 ger_event_1_1_tt:0 "If conditions are unmet, we will be forced to adopt Weltpolitik."

 weltpolitik_des_deutschen:0 "Weltpolitik"
 weltpolitik_des_deutschen_reason:0 "“Germany faces the specter of a #bold two-front war#!: The Balkan conflicts have exposed the futility of mere peacekeeping. ‘Bulgaria—that small state between the Danube and the Balkans—was scarcely a significant enough prize… yet it dragged Europe from Moscow to the Pyrenees, from the North Sea to Palermo, into a war whose consequences none could foresee. By its end, few remembered why they had fought.’\n\nThe world's [concept_great_power] scramble for #bold overseas colonies#! cannot exclude [ROOT.GetCountry.GetName]. Bismarck’s old #bold Continental Policy#! is obsolete; our booming industry demands foreign markets for its goods, while industrial magnates clamor for raw materials. \n\nGermany’s march of conquest will not halt. Even if our enemies unite, we must wield the German sword to win #bold our place in the sun#!—land for the German plough!"
 change_ger_dip_2_tt:0 "If we hold fewer than 17 overseas territories, Weltpolitik will end.\nWe will revert to Continental Policy!"
 weltpolitik_des_deutschen_status:0 "#V #U Germany's colonial expansion, prioritizing overseas interests.#!#!"
 ger_event_1_2_tt:0 "If conditions are unmet, we will revert to Continental Policy."
 region_west_africa_state_tt:0 "[concept_strategic_region]是[SCOPE.sStrategicRegion('platz_an_der_sonne_scope').GetName]"
 indonesia_or_indochina_state_tt:0 "[concept_strategic_region]是[SCOPE.sStrategicRegion('region_indochina_scope').GetName]或[SCOPE.sStrategicRegion('region_indonesia_scope').GetName]"

 dip_zweibund:0 "The Zweibund"
 dip_zweibund_reason:0 "The Empire was forged in the iron and blood of [concept_war]. Though [ROOT.GetCountry.GetName] and [SCOPE.sCountry('AUS_scope').GetName] briefly clashed for dominance over the German world, Chancellor Bismarck overrode objections to #bold abandon#! the #bold Greater Germany#! vision, offering Austria a lenient peace and treating it as a #bold potential ally#!.\n\nAs Europe’s [concept_great_power] seek alliances to reshape the world—from Russia in the east to France in the west—our homeland risks encirclement. To break this isolation, we turn to our southern neighbor: [SCOPE.sCountry('AUS_scope').GetName], though weakened, boasts vast lands, manpower, and resources. With our guidance, it may yet become a steadfast partner.\n\n#bold Shared blood and the cultural bonds of Germanness#! unite us. Though separate states, the #bold Rhine#! and #bold Danube#! shall stand together, as they did against Napoleon!"
 dip_zweibund_possible_tt:0 "Chose the #bold Lesser Germany Solution#! during #bold German Unification#!."
 refuse_zweibund_tt:0 "This will revoke the Dual Alliance [concept_journal_entry] for both nations."
 dip_zweibund_status:0 "#bold #P Shared heritage may forge an [concept_alliance] between our nation and Austria.#!#!"
 dip_zweibund_1_button:0 "Dispatch Military Advisors"
 dip_zweibund_1_button_desc:0 "The War Ministry reports Austria’s forces suffer from incoordination and outdated command structures. Their officers lack strategic vision, their troops are poorly trained, and language barriers compound these flaws. Yet our seasoned officers can remedy this—by deploying elite personnel to train and lead Austrian units, we can mold their army into a capable ally."
 dip_zweibund_1_button_tt:0 "Grants 25 #bold trust#!.\nLimit: 1 advisory mission per 5 years!"
 dip_zweibund_2_button:0 "Sell Industrial Machinery"
 dip_zweibund_2_button_desc:0 "Austria’s industrial base lags behind ours, but our magnates are eager to sell them modern machinery—for a profit, of course."
 dip_zweibund_2_button_tt:0 "Grants 25 #bold trust#!.\nLimit: 1 sale per 5 years!"
 dip_zweibund_3_button:0 "Propose State Visit"
 dip_zweibund_3_button_desc:0 "Though German-Austrian friendship is sturdy, personal diplomacy strengthens ties. A royal visit to Vienna would resonate deeply."
 dip_zweibund_3_button_tt:0 "Grants 5 #bold trust#!.\nLimit: 1 visit per year!"
 dip_zweibund_4_button:0 "Negotiate Trade Pact"
 dip_zweibund_4_button_desc:0 "Since the days of the German Confederation, Austria has been a vital trade partner. A mutually beneficial tariff agreement would further bind our economies."
 dip_zweibund_4_button_tt:0 "Costs 50 #bold trust#!.\nLimit: 1 pact per 5 years!"
 dip_zweibund_5_button:0 "Request Financial Aid"
 dip_zweibund_5_button_desc:0 "Our treasury’s emptiness is no secret, but Austria—among Europe’s wealthiest after Britain and France—may extend credit to an ally."
 dip_zweibund_5_button_tt:0 "Costs 50 #bold trust#!.\nLimit: 1 request per 5 years!"
 dip_zweibund_6_button:0 "Renew Alliance Treaty"
 dip_zweibund_6_button_desc:0 "With tensions rising, the Dual Alliance must be reaffirmed. Let us remind Vienna of its military obligations!"
 dip_zweibund_6_button_tt:0 "Limit: 1 renewal per 5 years."
 dip_zweibund_need_50_tt:0 "Minimum 50 trust required."

 der_reichstag:0 "Imperial Reichstag"
 der_reichstag_reason:0 "The progress bar displays the number of seats held by the current #bold majority party#!.\n#bold Liberal Party seats#! are influenced by multiple #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_liberalism_tooltip_advance positive#! or #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_liberalism_tooltip_delete negative#! conditions.\n#bold Conservative Party seats#! are influenced by multiple #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_conservatism_tooltip_advance positive#! or #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_conservatism_tooltip_delete negative#! conditions.\n#bold Social Democratic Party seats#! are influenced by multiple #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_socialism_tooltip_advance positive#! or #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_socialism_tooltip_delete negative#! conditions.\n\nThe #variable Imperial Reichstag#! and the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName] symbolize imperial unity. Administratively, the Reichstag shares legislative power with the Bundesrat, proposing and drafting bills while serving as the de facto supreme authority of [ROOT.GetCountry.GetName], with joint budgetary authority.\n\nThe Reichstag comprises #variable 382 members#!, dominated by three parties: the liberal #bold Free Conservative Party#!, the traditionalist #bold German Conservative Party#!, and the socialist #bold Social Democratic Party (SPD)#!. Members are elected through #bold direct [concept_election]#!, serving as representatives of the entire empire with parliamentary immunity, free from constituent mandates.\n\nAs the heart of [ROOT.GetCountry.GetName], all domestic legislation originates and is debated within these halls."
 reichstag_liberalism_tooltip_advance:0 "These conditions #bold increase seats by 1 monthly#!:\n•Promoting the #bold Liberal Party#!\n•Having [GetLawType('law_right_of_assembly').GetName] or [GetLawType('law_protected_speech').GetName]\n•Having [GetLawType('law_elected_bureaucrats').GetName]\n•Having [GetLawType('law_laissez_faire').GetName]"
 reichstag_liberalism_tooltip_delete:0 "These conditions #bold decrease seats by 1 monthly#!:\n•Promoting the #bold SPD#!\n•Having [GetLawType('law_censorship').GetName] or [GetLawType('law_outlawed_dissent').GetName]\n•Having [GetLawType('law_regulatory_bodies').GetName] or [GetLawType('law_worker_protections').GetName]\n•Having [GetLawType('law_wage_subsidies').GetName] or [GetLawType('law_old_age_pension').GetName]"
 reichstag_conservatism_tooltip_advance:0 "These conditions #bold increase seats by 1 monthly#!:\n•Promoting the #bold Conservative Party#!\n•Having [GetLawType('law_appointed_bureaucrats').GetName]\n•Having [GetLawType('law_censorship').GetName] or [GetLawType('law_outlawed_dissent').GetName]\n•Having [GetLawType('law_dedicated_police').GetName] or [GetLawType('law_militarized_police').GetName]"
 reichstag_conservatism_tooltip_delete:0 "These conditions #bold decrease seats by 1 monthly#!:\n•Promoting the #bold Liberal Party#!\n•Having [GetLawType('law_interventionism').GetName] or [GetLawType('law_cooperative_ownership').GetName]\n•Having [GetLawType('law_elected_bureaucrats').GetName]\n•Having [GetLawType('law_right_of_assembly').GetName] or [GetLawType('law_protected_speech').GetName]"
 reichstag_socialism_tooltip_advance:0 "These conditions #bold increase seats by 1 monthly#!:\n•Promoting the #bold SPD#!\n•Having [GetLawType('law_interventionism').GetName] or [GetLawType('law_cooperative_ownership').GetName]\n•Having [GetLawType('law_regulatory_bodies').GetName] or [GetLawType('law_worker_protections').GetName]\n•Having [GetLawType('law_wage_subsidies').GetName] or [GetLawType('law_old_age_pension').GetName]"
 reichstag_socialism_tooltip_delete:0 "These conditions #bold decrease seats by 1 monthly#!:\n•Promoting the #bold Conservative Party#!\n•Having [GetLawType('law_appointed_bureaucrats').GetName]\n•Having [GetLawType('law_dedicated_police').GetName] or [GetLawType('law_militarized_police').GetName]\n•Having [GetLawType('law_laissez_faire').GetName]"
 der_reichstag_complete_tt:0 "The majority party will exert unique influence across national constituencies."
 status_der_reichstag_liberalism:0 "#U #B Liberals currently hold a majority.#!#!"
 status_der_reichstag_conservatism:0 "#O #B Conservatives currently hold a majority.#!#!"
 status_der_reichstag_socialism:0 "#N #B Social Democrats currently hold a majority.#!#!"
 status_der_reichstag_nobody:0 "#I #B No party currently holds a majority.#!#!"
 der_reichstag_encourage_liberalism_button:0 "Promote Liberals: #variable [ROOT.GetCountry.MakeScope.Var('liberalism_progress').GetValue|0]#! seats"
 der_reichstag_encourage_liberalism_button_desc:0 "Liberal ideals are worthy of pursuit for democracy's sake - only a free Germany can shine brightest!"
 not_already_encourage_liberalism:0 "Not currently promoting Liberals"
 liberalism_progress_increase_5_tt:0 "Liberal seats will gain +1 monthly\nConservative seats will lose -1 monthly"
 der_reichstag_encourage_conservatism_button:0 "Promote Conservatives: #variable [ROOT.GetCountry.MakeScope.Var('conservatism_progress').GetValue|0]#! seats"
 der_reichstag_encourage_conservatism_button_desc:0 "The German spirit is profound, steadfast, and conservative - a bulwark against radicalism's dangers."
 not_already_encourage_conservatism:0 "Not currently promoting Conservatives"
 conservatism_progress_increase_5_tt:0 "Conservative seats will gain +1 monthly\nSPD seats will lose -1 monthly"
 der_reichstag_encourage_socialism_button:0 "Promote SPD: #variable [ROOT.GetCountry.MakeScope.Var('socialism_progress').GetValue|0]#! seats"
 der_reichstag_encourage_socialism_button_desc:0 "A government should serve the people's needs - democratic socialism's egalitarian vision deserves encouragement."
 not_already_encourage_socialism:0 "Not currently promoting SPD"
 socialism_progress_increase_5_tt:0 "SPD seats will gain +1 monthly\nLiberal seats will lose -1 monthly"
 der_reichstag_1_button:0 "Advance Liberal Reforms"
 der_reichstag_1_button_desc:0 "The Liberals' dissatisfaction with our economic policies is well-known. Their proposals for tax reform and trade liberalization await parliamentary review."
 der_reichstag_1_1_button_tt:0 "Liberals must hold majority"
 der_reichstag_1_2_button_tt:0 "No new bills reviewed in 10 years"
 der_reichstag_2_button:0 "Strengthen State Controls"
 der_reichstag_2_button_desc:0 "Conservatives demand traditional governance. Their nationalist and protectionist trade policies stand ready for deliberation."
 der_reichstag_2_1_button_tt:0 "Conservatives must hold majority"
 der_reichstag_2_2_button_tt:0 "No new bills reviewed in 10 years"
 der_reichstag_3_button:0 "Expand Welfare Budget"
 der_reichstag_3_button_desc:0 "The SPD's campaign for social justice has gained momentum. Their welfare equalization proposals now require parliamentary attention."
 der_reichstag_3_1_button_tt:0 "SPD must hold majority"
 der_reichstag_3_2_button_tt:0 "No new bills reviewed in 10 years"

 deutsch_reich:0 "A Global Empire"
 deutsch_reich_reason:0 "#variable Count Bismarck#! once feared global entanglements, but his caution is now obsolete. As the world changes, [ROOT.GetCountry.GetName] must claim its share - or be left behind in this grand competition.\n\nWe should #bold never have excluded Germany from competing for fertile lands abroad#!: The era when others divided earth and sea while we ruled only the skies is over! Protecting our shipping, trade, and industrial interests - especially in the East and Africa - is paramount. We cannot tolerate the notion that freedom applies selectively among [concept_great_power]:\n\nWe demand that German #bold merchants, goods, flags and vessels#! receive equal respect worldwide!\n\nWe seek our #bold place in the sun#!, upholding diplomatic tradition while expanding [ROOT.GetCountry.GetName]'s global interests through all means necessary."
 deutsch_reich_1_tt:0 "Currently or previously adopted $weltpolitik_des_deutschen$ [concept_journal_entry]"
 deutsch_reich_2_tt:0 "Secured #bold all#! German Empire #bold claims#!"
 deutsch_reich_3_tt:0 "Overseas expansion creates new opportunities."

 claim_cameroon:0 "Claim West Africa"
 claim_cameroon_reason:0 "As our nation progresses, Germany's strategy has entered a new phase - acquiring colonies to sustain our industrial growth. In this era when all great powers rush to the 'Dark Continent', our German fatherland must not fall behind. Among West African territories, Togo and Kamerun present ideal starting points for our expansion. [SCOPE.sCountry('FRA_scope').GetName] and [SCOPE.sCountry('GBR_scope').GetName], preoccupied with the fiercely contested Niger Delta, consider these regions strategically insignificant.\n\nThough mineral resources here are limited, the land is perfect for rubber plantations and timber production to fuel our heavy industry. Securing these territories would be effortless for [ROOT.GetCountry.GetName]. The time has come to advance and secure new Lebensraum!"
 claim_cameroon_tt:0 "West African expansion may offend French interests...but who cares about France?"

 claim_namibia:0 "Claim Namibia"
 claim_namibia_reason:0 "Namibia may appear as mere mountains and desert, but our expeditions reveal rich mineral deposits beneath its surface. Located in southwest Africa with Atlantic coastline, bordering Angola to the north and [SCOPE.sCountry('GBR_scope').GetName]'s South Africa to the south, this region offers strategic value with minimal political risks.\n\nWhile harsh climate and malaria threaten our colonists, controlling this territory could let us profit from the lucrative Cape Route. The diamond fields discovered in 1908 prove this wasteland's hidden worth."
 claim_namibia_tt:0 "Southwest African expansion may displease Britain...but what can they do?"

 claim_tanzania:0 "Claim Tanzania"
 claim_tanzania_reason:0 "#bold Tanzania#!, accessible through Zanzibar's coastline, boasts fertile East African farmlands surrounded by mineral-rich regions, with #bold Lake Victoria#! to its north. The territory's agricultural potential is legendary, and [ROOT.GetCountry.GetName]'s industrialists crave its lands to #bold supply dyes and cotton#! for our textile mills.\n\nZanzibar, formerly Omani territory, #bold commands vital Indian Ocean trade routes#!. Our early trading posts here have established infrastructure and networks. While competitors remain distracted, we must seize this opportunity to claim what will become the #bold crown jewel#! of our African possessions!"
 claim_tanzania_tt:0 "Conquering Tanzania will provide significant economic benefits to the Empire."

 claim_new_guinea:0 "Claim New Guinea"
 claim_new_guinea_reason:0 "New Guinea's vast landmass stands inversely proportional to its sparse population. This island offers valuable minerals, timber, and fisheries. Though remote, it could serve as an excellent plantation zone and naval base, becoming [ROOT.GetCountry.GetName]'s #bold forward operating base#! in Indochina and Indonesia.\n\nProximity to [SCOPE.sCountry('NET_scope').GetName] and [SCOPE.sCountry('GBR_scope').GetName]'s colonies means we must #bold act swiftly#! to claim our share before they dominate the region!"
 claim_new_guinea_tt:0 "Though sparsely populated, New Guinea can support our East Asian expansion."

 claim_malaya:0 "Claim Southeast Asia"
 claim_malaya_reason:0 "The resource-rich Southeast Asian region encompassing Indochina and Indonesia offers immense value despite its tropical climate: dense jungles yielding premium teak, vast arable lands suitable for any cash crop.\n\nControl here would enable large-scale opium and silk cultivation, greatly benefiting our manufacturing sector. The Red River Delta could become breadbasket for [ROOT.GetCountry.GetName], supplying cheap grain. Meanwhile, Malaya's strategic position along the Straits commands history's wealthiest shipping lane.\n\nHowever, claiming this prize won't be easy. [SCOPE.sCountry('FRA_scope').GetName] guards its Indochinese interests jealously, while [SCOPE.sCountry('GBR_scope').GetName] dominates Malaya from Singapore. They may unite against our intervention. Yet realizing this vision of #bold 'German East Asia'#! would create the brightest jewel in the imperial crown..."
 claim_malaya_tt:0 "Britain and France highly value their East Asian interests - our involvement may provoke them."

 schlesien_industrialize:0 "Industrialize Silesia"
 schlesien_industrialize_reason:0 "#variable Silesia#! has been German since the #bold Holy Roman Empire#! era under the #bold Elector of Bohemia#!. After #bold Frederick the Great#!'s conquest in the Seven Years' War, cities like #bold Breslau#! flourished into Eastern Europe's premier textile and commercial centers.\n\nNow, the #bold Industrial Revolution#! makes economic development vital for [ROOT.GetCountry.GetName]. Silesia's rich mineral deposits attract imperial attention, while the Oder River's waterways sustain thriving industries and urban growth. Textile manufacturing expands steadily as resource extraction advances.\n\n#bold Yet this progress remains insufficient!# The government must intervene, channeling resources to accelerate Silesia's industrialization, transforming it into the mighty #bold industrial heart#! of [ROOT.GetCountry.GetName]'s economic body."
 schlesien_industrialize_status:0 "Transform prosperous Silesia into a curcible of german industrial might!"

 bavaria_industrialize:0 "Industrialize Bavaria"
 bavaria_industrialize_reason:0 "Famed for its #bold beer#! [concept_good_production], #bold Bavaria#! since unification has been a patchwork of scattered towns and #bold semi-autonomous nobility#!. Though cities like Munich, Nuremberg and Augsburg grew rapidly during industrialization, they lack cohesive industrial capacity to support imperial ambitions.\n\nAs [ROOT.GetCountry.GetName]'s primary southern territory, Bavaria suffers from resource scarcity and poor infrastructure. The former #bold King of Bavaria#! retains considerable influence here, while #bold [concept_pop] growth#! and #bold agricultural reforms#! lag behind established industrial regions like Prussia.\n\nFacing these challenges, the cabinet has presented [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] with an ambitious plan to rapidly develop #bold Franconia#! and #bold Palatinate#! into a #bold new industrial core#! for southern Germany."
 bavaria_industrialize_status:0 "Transform the Freistaat into an industrial powerhouse!"

 deutsch_hochseeflotte:0 "The Hochseeflotten-Programm"
 deutsch_hochseeflotte_reason:0 ""The trident of Neptune symbolizes our new mission...Wherever in the world a German citizen requires protection, wherever German honor must be upheld!"\n\nAs [ROOT.GetCountry.GetName]'s maritime trade and overseas interests expand, we increasingly require a powerful fleet to safeguard our national interests. Furthermore, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s pursuit of #bold Weltpolitik#! demands a formidable navy - for all know that [concept_fleet] remains the ultimate guarantor of overseas dominion.\n\nThough [SCOPE.sCountry('GBR_scope').GetName]'s #bold Royal Navy#! maintains overwhelming superiority, the advent of #bold dreadnoughts#! and other technological advances allow us to leverage our #bold industrial might#! to potentially surpass British naval power.\n\nThis will undoubtedly irritate Britain's #bold sensitive nerves#!, but for Germany's glory, we must advance this program!"
 deutsch_hochseeflotte_tt:0 "A mighty fleet shall become the iron guarantor of our overseas interests!"
 deutsch_hochseeflotte_complete_tt:0 "Our fleet must at least match the Royal Navy in strength."

 dip_stahlpakt:0 "Pact of Steel"
 dip_stahlpakt_reason:0 "#bold Greatness often begins humbly#!. Though our allies show unlimited potential, they currently pale before our enemies. As a European power, securing #bold favorable conditions#! for our allies could catalyze their domestic reforms.\n\n[SCOPE.sCountry('AUS_scope').GetName] now clashes with [SCOPE.sCountry('RUS_scope').GetName] over Balkan influence - Russia's Pan-Slavic pretensions encroach on Austria's backyard. By contrast, our mutual interests face fewer obstacles. A #bold defensive pact#! redirecting both nations' focus #bold overseas#! would multiply our strength. Long-term cooperation promises significant benefits."
 dip_stahlpakt_possible_tt:0 "Germany has adopted $kontinentalpolitik_des_deutschen$ [concept_journal_entry]"
 dip_stahlpakt_fail_tt:0 "Either signatory has abandoned the #bold Pact of Steel#!"
 dip_stahlpakt_fail_2_tt:0 "Our nation is at war with Italy"
 dip_stahlpakt_fail_3_tt:0 "Our nation is at war with Germany"
 refuse_stahlpakt_tt:0 "This will revoke the Pact of Steel [concept_journal_entry] for both nations."
 dip_stahlpakt_1_button:0 "Renew Defensive Pact"
 dip_stahlpakt_1_button_desc:0 "Our alliance nears expiration - perhaps renewal would be prudent."
 stahlpakt_1_possibel_tt:0 "Limit: 1 renewal per 10 years"
 dip_stahlpakt_2_button:0 "Conduct Joint Military Exercises"
 dip_stahlpakt_2_button_desc:0 "Our proximity enables combined operations. Joint exercises would improve future coordination."
 stahlpakt_2_possibel_tt:0 "Limit: 1 exercise per 5 years"
 dip_stahlpakt_3_button:0 "Withdraw from the Aliiance"
 dip_stahlpakt_3_button_desc:0 "This alliance serves no practical purpose. Per the original treaty's clauses, we shall terminate our participation."
 stahlpakt_3_possibel_tt:0 "Requires current membership\nThis action will remove the Pact of Steel [concept_journal_entry] from both signatories"

 lander_der_krone_government:0 "Imperial Crown Governance"
 lander_der_krone_government_reason:0 "#B #P By the Grace of God, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], Emperor of all Germans and Apostolic King of [ROOT.GetCountry.GetNameNoFlag], reigns as sovereign.#!#!\n\nSince the #V Paulskirche Constitution#!, #B the Frankfurt Parliament's resolutions made us subjects under His Imperial Majesty of [SCOPE.sCountry('GER_scope').GetName]#!, ending direct rule while #V granting autonomy#!. Residing permanently in Frankfurt, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is represented ceremonially in [ROOT.GetCountry.GetNameNoFlag] by an Imperial Governor, with provincial governors acting regionally.\n\nThough the Emperor has decentralized power under Frankfurt's constitutional #B [GetLawType('law_monarchy').GetName]#!, in our lands #B His Majesty's authority remains theoretically absolute#!. While defying imperial governance proves nearly impossible, pursuing greater autonomy may yet serve our #B great nation's independence and shared liberal ideals#!."

 berlin_industrialize:0 "Hobrecht Plan"
 berlin_industrialize_reason:0 "Since the unification of Germany, Berlin has become the capital and cultural symbol of [ROOT.GetCountry.GetName]. Despite the renovations and reconstructions during the era of Frederick the Great, the rapid development of the industrial age and the surge in population have once again made the city increasingly crowded, with outdated infrastructure and low administrative efficiency, failing to reflect the grandeur and glory of the nation.\n\nThe [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has approved the large-scale expansion of Berlin under the 'Hobrecht Plan': we will expand the urban area, construct several ring roads completely encircling Berlin and Charlottenburg, and introduce new urban drainage systems and electrical facilities. Ultimately, we will create a well-structured, orderly, and brightly lit metropolis of [ROOT.GetCountry.GetName], allowing Berlin to truly stand among the greatest cities in the world."
 berlin_industrialize_status:0 "Expand Berlin into the most prestigious city in Germany"


