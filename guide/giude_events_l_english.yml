 rule_invest_existing_buildings_only:0 "私人投资规则"
 setting_enable_invest_existing_buildings_only:0 "只投资已存在建筑"
 setting_enable_invest_existing_buildings_only_desc:0 "[concept_investment_pool]将只能投资已经存在的[concept_building]，这意味着如果一个省份不存在某种[concept_building]，私人投资将永远不会在该省份投资该[concept_building]（铁路，发电厂和码头等基础设施不受影响）。"
 setting_disable_invest_existing_buildings_only:0 "无特殊约束"
 setting_disable_invest_existing_buildings_only_desc:0 "[concept_investment_pool]将根据原版规则工作。"
 rule_flavor_functional_decisions_rules:0 "功能性决议"
 setting_enable_flavor_functional_decisions:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_flavor_functional_decisions_tooltip_tt #high 启用功能性决议#!#!#!"
 setting_enable_flavor_functional_decisions_tooltip_tt:0 "这将启用几项功能性的决议，如限制私人投资等（#O 多人游戏#!建议设为关闭）"
 setting_enable_flavor_functional_decisions_desc:0 "禁用私人投资等功能性决议将在局内可用。#O 多人游戏#!建议将此规则设为关闭。"
 setting_disable_flavor_functional_decisions:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_disable_flavor_functional_decisions_desc #high 禁用功能性决议#!#!#!"
 setting_disable_flavor_functional_decisions_desc:0 "这将禁用如限制私人投资等几项功能性的决议。"

 rule_victorian_century_ai_enhancement_rules:0 "AI Enhancement"
 setting_enable_ordinary_victorian_century_ai_enhancement:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_ordinary_victorian_century_ai_enhancement_tooltip #high Enable Basic AI Enhancement#!#!#!"
 setting_enable_ordinary_victorian_century_ai_enhancement_desc:0 "AI countries will receive bonuses whose strength scales with their [concept_rank].\nAI under Basic Enhancement will #O receive only half of the listed bonuses.#!"
 setting_enable_ordinary_victorian_century_ai_enhancement_tooltip:0 "List of enhancement modifiers (AI under Basic Enhancement receives only half of the following effects):\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_great_power_tt $great_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_major_power_tt $major_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_minor_power_tt $minor_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_insignificant_power_tt $insignificant_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_unrecognized_power_tt $unrecognized_major_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_regional_power_tt $unrecognized_regional_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_small_power_tt $unrecognized_power_ai_buff$#!"
 advanced_great_power_tt:0 "[GetStaticModifier('great_power_ai_buff').GetName|v]\n[GetStaticModifier('great_power_ai_buff').GetDesc]"
 advanced_major_power_tt:0 "[GetStaticModifier('major_power_ai_buff').GetName|v]\n[GetStaticModifier('major_power_ai_buff').GetDesc]"
 advanced_minor_power_tt:0 "[GetStaticModifier('minor_power_ai_buff').GetName|v]\n[GetStaticModifier('minor_power_ai_buff').GetDesc]"
 advanced_insignificant_power_tt:0 "[GetStaticModifier('insignificant_power_ai_buff').GetName|v]\n[GetStaticModifier('insignificant_power_ai_buff').GetDesc]"
 advanced_unrecognized_power_tt:0 "[GetStaticModifier('unrecognized_major_power_ai_buff').GetName|v]\n[GetStaticModifier('unrecognized_major_power_ai_buff').GetDesc]"
 setting_disable_victorian_century_ai_enhancement:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_disable_victorian_century_ai_enhancement_desc #high Disable AI Enhancement#!#!#!"
 setting_disable_victorian_century_ai_enhancement_desc:0 "This disables all forms of AI enhancement, keeping AI behaviour identical to vanilla.\n#O Multiplayer#! games with many participants are recommended to disable these bonuses to avoid desynchronisation."
 setting_enable_advanced_victorian_century_ai_enhancement:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_advanced_victorian_century_ai_enhancement_tooltip #high Enable Advanced AI Enhancement#!#!#!"
 setting_enable_advanced_victorian_century_ai_enhancement_desc:0 "AI countries will receive bonuses whose strength scales with their [concept_rank].\nAI under Advanced Enhancement will #O receive the full effects of these bonuses.#!"
 setting_enable_advanced_victorian_century_ai_enhancement_tooltip:0 "List of enhancement modifiers (AI under Advanced Enhancement receives the full effects of the following modifiers):\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_great_power_tt $great_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_major_power_tt $major_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_minor_power_tt $minor_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_insignificant_power_tt $insignificant_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_unrecognized_power_tt $unrecognized_major_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_regional_power_tt $unrecognized_regional_power_ai_buff$#!\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],advanced_small_power_tt $unrecognized_power_ai_buff$#!"
 rule_economic_crisis_rules: "经济危机"
 setting_enable_economic_crisis: "Enable Economic Crisis"
 setting_enable_economic_crisis_desc: "Allows the #V Economic Crisis#! [concept_journal_entry] and its associated event chain to trigger."
 setting_disable_economic_crisis: "Disable Economic Crisis"
 setting_disable_economic_crisis_desc: "Prevents all #V Economic Crisis#! [concept_journal_entry]s from triggering, except for the first crisis caused by #B Railway Mania#!."
 advanced_insignificant_power_tt:0 "[GetStaticModifier('insignificant_power_ai_buff').GetName|v]\n[GetStaticModifier('insignificant_power_ai_buff').GetDesc]"
 advanced_unrecognized_power_tt:0 "[GetStaticModifier('unrecognized_major_power_ai_buff').GetName|v]\n[GetStaticModifier('unrecognized_major_power_ai_buff').GetDesc]"
 advanced_regional_power_tt:0 "[GetStaticModifier('unrecognized_regional_power_ai_buff').GetName|v]\n[GetStaticModifier('unrecognized_regional_power_ai_buff').GetDesc]"
 advanced_small_power_tt:0 "[GetStaticModifier('unrecognized_power_ai_buff').GetName|v]\n[GetStaticModifier('unrecognized_power_ai_buff').GetDesc]"
 ai_unique_buff_modifier_get_again_decision:0 "Acquire AI Enhancement Modifier"
 ai_unique_buff_modifier_get_again_decision_desc:0 "nan"
 allow_enable_ottoman_public_debt:0 "Issue Public Debt"
 allow_enable_ottoman_public_debt_desc:0 "The Sublime Porte has been facing financial difficulties for some time. In order to resolve the Empire’s fiscal deficit, the Minister of Finance suggests that we might attempt to raise funds by issuing government bonds on the international market. However, should we accumulate excessive debt, this burden may in fact deepen our deficit..."
 allow_enable_ottoman_public_debt_tt:0 "We will issue government bonds on the international market, enabling the #V $ottoman_public_debt$#! [concept_journal_entry].\n@information!#lore This journal entry allows us to clear all domestic debt, convert it into foreign debt, and pay interest to other countries.#!"

 stabilize_british_empire_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe British Empire stands in its golden age: from the plains of North America to the tea gardens of China, from the coffee fields of the Caribbean to the mines of Australia, Britannia's wealth and glory dominate this era. Moreover, her civilization, morals, and strength ought to continue to shine!"
 gbr_corn_law_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Corn Laws, once the economic cornerstone of Britain, are now contested — calls to repeal their protective tariffs are rising in Westminster. His Majesty's government must make a choice."
 england_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe wheels of progress are thriving across the English countryside and rapidly transforming the nation. We should increase every investment that advances industry, let those vast factories roar to life, and let towering chimneys breathe vigorous smoke into the sky."
 scotland_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n苏格兰拥有着丰富的煤炭储备和优越的港口条件，毫无疑问，这里的经济潜力不容低估。然而，吃水过浅的克莱德河与崎岖的山谷却构成了阻碍经济发展的障碍：我们当然不能向环境服输，我们将用工业的伟力改造自然，让苏格兰成为世界上最伟大的造船业与制造业中心！"
 rn_naval_defence_act_lobby: "#v Unlocked by this MOD: Victorian Century#!\nA great navy is key to keeping Britain's sea lanes secure and free. Whatever maritime challenges any enemy may pose, Britannia must meet them head on and ensure the Royal Navy's undisputed command of the seas."
 english_afternoon_tea_lobby: "#v Unlocked by this MOD: Victorian Century#!\nA pot of strong Assam tea with a splash of milk, accompanied by scones spread with clotted cream and jam — a delightful hour spent in a refined tearoom, the most elegant of gentlemanly customs — should naturally become the world's most fashionable English style!"
 anglo_american_special_relationship_lobby: "#v Unlocked by this MOD: Victorian Century#!\nExtraordinary ideas and aims have fostered our unity; shared ideals and blood have strengthened our friendship. United free nations shall never fail — blood is thicker than water!"
 chartism_movement_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe spread of the People's Charter has sparked a nationwide radical movement; protesters demand the exercise of political rights through universal suffrage. This movement now threatens the authority of Parliament, and the government should consider taking measures."
 railway_mania_lobby: "#v Unlocked by this MOD: Victorian Century#!\nWith industry reviving and interest rates falling, railway company shares are soaring; the newly wealthy from industrialization are pouring their savings into this pound-making frenzy. Clearly, this is a foolproof investment... or is it?"
 poor_law_act_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe 1834 Poor Law Amendment, enacted under the vigorous push of the Malthusians, was met with widespread social protest. Perhaps it did succeed in checking idleness and dependency, but are these prison-like workhouses truly suitable places of relief for British citizens?"
 joi_imperial_fortress_lobby: "#v Unlocked by this mod: Victorian Century#!\nWith the development of powerful ocean-going warships and artillery, it has become necessary to upgrade the fortifications and military installations at key strategic nodes. These locations form the very backbone of our global empire and must be rigorously defended."

 paris_politic_lobby: "#v Unlocked by this MOD: Victorian Century#!\nParis is the political heart of France, but it has long been famed for its chaos and lack of restraint. If the current government wishes to secure the seat of power, its first task must be to tame these troublesome, unkempt Parisians!"
 paris_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nIndustrialization is changing our nation; old quarters of Paris are no longer reliable. France needs a more splendid, greater Paris rising upon the banks of the Seine."
 french_birthrate_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSince the end of the Napoleonic Wars, France's birth rate has steadily declined — a trend that endangers the nation. The government is obligated to heed the people's needs and steer society back on course."
 fra_aferican_empire_lobby: "#v Unlocked by this MOD: Victorian Century#!\nWith the conquest of Algiers complete, the gates of the dark continent have opened to France's embrace. We shall become the dominant power in Africa and build new homes for the French nation there."
 fra_conqueror_indochina_lobby: "#v Unlocked by this MOD: Victorian Century#!\nBy the call of the Faith we must march into distant Indochina, rescue our countrymen and punish the barbarians for their outrages against the Lord's flock. Forward, to Indochina!"
 russian_franco_alliance_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThough many unpleasant episodes have marked our past relations, the great changes on the Continent urge us to bury old grudges and jointly face the enemies of Central Europe."
 entente_cordiale_lobby: "#v Unlocked by this MOD: Victorian Century#!\nWe on either side of the Channel were enemies for centuries, but shifting geopolitics forces both of us to reassess our continental posture. Perhaps forging an alliance with the cunning frogs across the Channel is worth considering?"
 je_the_paris_commune_display_lobby: "#v Unlocked by this MOD: Victorian Century#!\nRed forces are rising in Paris; the capital's institutions have been forced to relocate to Versailles. Will the communists' ambition come to fruition?"
 second_napoleon_empire_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe legend of Emperor Napoleon belongs to a distant past, yet the Bonaparte name still stirs the French people. A new Bonaparte has taken the throne won by his illustrious ancestor through glory and arms — might a new epic begin with him?"
 french_provisional_republic_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe July monarchy has fallen and a new republican government stands once more on the Champ de Mars. Can the youthful, passionate, proud, generous, and sincere France of the Revolution return and lead the nation to its destiny?"
 defensive_line_in_alsace_lorraine_lobby: "#v 由该MOD解锁：Victorian Century#!\n精心构筑的防御堑壕的威力已经得到了充分证明：几个士兵在一个机枪阵地就能杀死数百名开阔地带的敌人。因此，建造一条巨大的防线，并修建地下混凝土工事，毫无疑问是应对陆上威胁和保护我国关键领土的最合理方式。"
 offensive_a_outrance_lobby: "#v Unlocked by this mod: Victorian Century#!\nThere is no victory without the offensive: victory demands blood, and war is but barbarity and brutality. It recognises only one means of achieving its ends—that of bloodshed."

 way_to_germany_lobby: "#v Unlocked by this MOD: Victorian Century#!\nFor centuries the German peoples lacked a strong central government. Yet that did not prevent our homeland's prosperity: the Hanseatic League of hundreds of North German towns was vital to our flourishing, and rising knowledge plus sea and land trade helped Germany become a wealthy manufacturing center. Now unity is no longer a dream; Germany shall rule mankind's fate."
 rhineland_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nAfter the Congress of Vienna the Rhineland was assigned to Prussia, yet none foresaw its potential as a coal-rich region. With this advantage the Rhineland can be built into a brand-new, principal pillar of industry."
 peussia_education_lobby: "#v Unlocked by this MOD: Victorian Century#!\nEducation reforms advanced by Wilhelm von Humboldt have raised the nation's quality and laid a strong foundation for Prussia. Still, the current system has shortcomings; the government should continue to promote a comprehensive, free public education that ultimately benefits everyone."
 deutsch_bundestag_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe German Confederation created at the 1815 Congress of Vienna aimed to protect the German principalities left after French aggression, with Prussia and Austria exerting the greatest influence. How much effect can this loose organization of states truly achieve?"
 belgium_interest_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSince gaining independence from the Netherlands, the Kingdom of Belgium has been a major trade hub and strategic prize in Western Europe, coveted by ambitious powers around it. Can Belgium maintain its independence?"
 holy_league_main_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe French Revolution and many other events warn us: the Christian, formerly stable and prosperous order is under assault. As guardians of the old, true, just, and sacred European order, we must ensure the glorious and benevolent rule of the sovereigns is not undermined by petty conspirators or saboteurs."
 deutsch_frankfurter_nationalversammlung_lobby: "#v Unlocked by this MOD: Victorian Century#!\nNationalist revolutionary fervor burns across the lands of the German Confederation. Under the banners of liberty, law, and justice, can Germany unite and realize the liberal ideal of national unity?"
 peussia_army_reform_lobby: "#v Unlocked by this MOD: Victorian Century#!\nOnly iron and blood can achieve German unity. For this national aspiration, a modern, invincible army will be of the greatest use."
 rheinische_homerule_lobby: "#v 由该MOD解锁：Victorian Century#!\n市政当局与国家在宪法上的融合长期以来都是争论的焦点：尤其是在继承了法国民法典式的现代化法律、经济和宪政结构的莱茵兰地区。如果政府想要确立在该地区的权威，或希望在这里建立更稳固的宪法关系，那么就必须起草一部新的市政法典。"
 conservative_order_prussia_lobby: "#v 由该MOD解锁：Victorian Century#!\n后拿破仑时代的反动浪潮呼吁在欧洲范围内恢复那些来自于神圣罗马帝国时代，古老神圣的法律与习俗：在王室和政府的支持下，这必将成功。"
 deutsche_gemeindeordnung_lobby: "#v 由该MOD解锁：Victorian Century#!\n组成德意志国家的各个邦国几乎都拥有着自己的法律，并不受中央政府的约束。我们应该加强对这些自治机构的管制，并将各地的习惯法整合为一部成文的统一市政法典。"

 house_of_habsburg_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Habsburg dynasty has ruled the Austrian Empire for nearly seven centuries; though the sun-set of empires has passed, the royal power remains firm. Undoubtedly, through the storms of nationalism and liberalism, Austria shall laugh last!"
 austrian_crown_lobby: "#v Unlocked by this MOD: Victorian Century#!\nAs we bring crown lands under Vienna's direct rule, it is time for sweeping reforms of these territories. Without centralization, fanatical nationalists will threaten the Empire's rule."
 marching_through_budapest_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThat the Magyar nobility would rise against imperial rule is not surprising. These ossified old men cannot be governed by gentle means; only sabre and cannon will make them obey."
 wind_of_liberalism_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe spirit of liberalism sweeps across Europe. Radicals besiege our capital — will we yield to their demands and let a free Austria emerge, or will the iron fist of autocracy prevail?"
 aus_zweibund_lobby: "#v Unlocked by this MOD: Victorian Century#!\nAs brothers of the German family, resolving past enmities and forging a genuine, blood-based alliance is the most valuable course. Let us unite sincerely!"
 wien_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nVienna's growth can no longer be confined within ancient walls; the government should merge the old capital with its new suburbs and rebuild it by industrial might as the true heart of the Austrian Empire."
 bohemia_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nBohemia has been a Central European center of trade and industry since the Middle Ages, rich in mineral resources, aided by Elbe river navigation. The government should strengthen investment in Bohemia and create an effective industrial district there."
 memories_of_the_old_lobby: "#v 由该MOD解锁：Victorian Century#!\n不忠之人的罪恶必将得到报还。为了收回哈布斯堡家族在过去的王冠，我们必须挺身而出，英勇无畏：鲜血将洗净他们的暴政，并从他们手中救出成千上万被俘的弟兄，使基督之名在我们的时代得以彰显，使我们举世闻名的荣耀历史得以保持完好无损。"

 alexander_reform_display_lobby: "#v Unlocked by this MOD: Victorian Century#!\nAlexander II has ascended the Russian throne, and many reformers view this as an opportunity to thoroughly remake our great state's archaic systems."
 alexander_reform_display: "Alexander II Reforms"
 alexander_reform_display_reason: "nan"
 peter_instruction_lobby: "#v Unlocked by this MOD: Victorian Century#!\nEndless conquest lies in the blood of the Russian nation: Russia is a sea that fertilizes poor Europe, and a truly great Tsar will guide this tide to break through any embankment that stands in its way."
 peter_instruction_constantinople_lobby: "#v Unlocked by this MOD: Victorian Century#!\nTwo Romes have fallen; the third has risen, and there shall be no fourth: none can replace Russia's fidelity to Christ. The Queen of Cities was ravaged by the Turks for centuries — it is time to liberate this coveted city from barbarian rule!"
 peter_instruction_yellowrussia_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe fertile lands of China attract our gaze: Manchuria should become a new homeland for the Russian people and a base for expansion across the Far East!"
 peter_instruction_vladivostok_lobby: "#v Unlocked by this MOD: Victorian Century#!\nVladivostok — 'Conquer the East' — bears witness to our great achievements of territorial expansion; if developed, this excellent port will provide us with a superb Pacific military base."
 bolshevik_rebellion_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Bolsheviks have raised the red banner and seized the capital, even occupying the empire's heartlands. The Tsar is missing; the vast Russian Empire fragments into parts — who will win the final victory?"
 reform_obshchina_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe village commune, rooted in Eastern European soil since ancient times, is a unique way of life formed by kinship ties that has fostered regional prosperity. Yet urban growth calls more peasants into factories — does the commune system require reform?"
 ukraine_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nUkraine has long been the fertile granary of our southern lands and conceals rich mineral veins. By promoting industrial expansion here, Ukraine can surely become the most developed and vital center of Russia's industrial economy."

 supreme_court_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Supreme Court is the strongest guarantor of the separation of powers in the United States. The current Chief Justice, Roger Brooke Taney, was appointed by President Jackson in 1835. Can he remain impartial and uphold the Union's liberty and unity?"
 westward_movement_lobby: "#v Unlocked by this MOD: Victorian Century#!\nGod has made covenant with us in the New World, promising vast open lands; we are a city on a hill, watched by the world, and should spread civilization to the ignorant natives. Westward, brothers, grow with the nation!"
 us_bank_war_lobby: "#v Unlocked by this MOD: Victorian Century#!\nControversy around the Second Bank has provoked too much dispute — even an assassination over it in 1835. The federal government must choose whether to abolish the central bank founded under Madison or to preserve it."
 american_gilded_age_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe tide of industrial revolution sweeps the Union. In this great golden age, the old must pass and bow beneath our feet; a free nation should stride toward unprecedented progress and prosperity."
 road_to_civil_rights_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSevere racial discrimination stains the ideals of liberty we proclaimed in 1776. Is our nation equal for all except Black people, devoid of slums except where Black people live? It is time for this country to fulfill its promise: 'all men are created equal' with certain unalienable rights, including life, liberty, and the pursuit of happiness!"
 manifest_destiny_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe expansion of the Union is our manifest destiny; a great nation has the right to seek our realms of freedom toward the Pacific. From sea to shining sea!"
 free_beacon_lobby: "#v Unlocked by this MOD: Victorian Century#!\nIn this dark world only our hearts beat in tune with liberty. We are the lighthouse of democracy and freedom in an abyss, the city on a hill that shines for ship and sea travelers, offering light and hope."
 greatlakes_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Great Lakes' developed waterways create conditions for industrial growth; we must harness the abundant natural resources there to forge an everlasting industrial heart of wealth."

 western_affairs_movement_lobby: "#v Unlocked by this MOD: Victorian Century#!\nWesterners possess advanced technology; if we do not emulate them, the danger of national ruin is at hand. We must learn their techniques to 'use the barbarians' methods to control the barbarians.'"
 isolationist_policies_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSince the Ming the strict isolation policy has effectively blocked the poisonous doctrines of foreign missionaries and the incursions of wakō pirates. Clearly, this ancestral policy deserves continued imperial investment."
 reform_chinese_customs_lobby: "#v Unlocked by this MOD: Victorian Century#!\nOur old customs administration, established by Emperor Kangxi along the Jiangnan and Fujian coasts, is rife with corruption. With Western assistance we can root out these parasites and build a truly modern customs service."
 xinhai_revolution_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Qing government's rule has long lost the people's hearts; how could a band of barbarous outsiders govern a great nation? It is time to smash the rule of these usurpers — long live the revolution!"
 chi_land_reform_lobby: "#v Unlocked by this MOD: Victorian Century#!\nUnder landlord control the tenants live miserable, painful lives. The backward land system is a festering sore; the government must cure this toxin immediately and rescue peasants from awful oppression."
 new_culture_movement_lobby: "#v Unlocked by this MOD: Victorian Century#!\nConfucius's decayed doctrines are full of hateful hierarchies. New ideas — specifically science and democracy — should be spread throughout society. If successful, this movement could become the nation's enlightenment."
 control_the_yellow_flood_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Yellow River's great change of course caused severe famine and disaster. Although dynasties have failed to master this tempestuous river, with new technology and our firm investment this may no longer be an endless task."
 china_defend_korea_lobby: "#v Unlocked by this MOD: Victorian Century#!\nAs the Celestial Empire, we have a duty to protect the northern vassal nearest to us. If we stand idle while they are invaded by uncivilized foes, the persuasiveness and influence of our mandate will suffer grievously."

 meiji_restoration_display_lobby: "#v Unlocked by this MOD: Victorian Century#!\nFor centuries isolated and stagnant under the Shogunate, Japan must return power to the legitimate Emperor if we are to secure a place in this rapidly modernizing world."
 meiji_restoration_display: "Meiji Restoration"
 meiji_restoration_display_reason: "nan"
 edo_rangaku_lobby: "#v Unlocked by this MOD: Victorian Century#!\nRangaku is the body of Western knowledge studied by scholars through Dutch; the spread of this science stirs debate within the court between nationalists and advocates of Western learning. The court should consider taking action."
 tenpo_famine_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSince Tenpō 4 a famine on the scale of Kyōhō and Tenmei has swept the Japanese isles. The famine inflicts immeasurable suffering on the people, and they appeal to the Shogun for extraordinary relief measures."
 meiji_boshin_war_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe daimyōs who once controlled the nation and their scattered supporters will not easily surrender power; for the Emperor, they must be suppressed."
 shogunate_restoration_display_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThose self-styled 'restoration men' attempt to coerce the Emperor into making the nation a puppet of the West, yet their evil designs have not prevailed. Under the wise leadership of the Shogun, the court will reform to meet the times and ensure the continuity of Yamato morality and order."
 shogunate_restoration_display: "Shogunate Reforms"
 shogunate_restoration_display_reason: "nan"
 japanese_sanbo_honbu_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe mere existence of a General Staff marks our greatest achievement in the Restoration. However, friction between navy and army weakens our combat power; the General Staff should play a coordinating role."
 anglo_japanese_alliance_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe East faces dramatic changes; through an alliance with Britain we can gain advantage amid these upheavals."
 kenseiyougoundo_movement_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe so-called military cabinet has unconstitutionally seized the sacred Imperial Diet, trampling the constitution in the most brutal manner. Democracy must be saved: these odious officers must be ousted from government!"
 seikanron_conqueror_korea_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Korean Peninsula has long been our prime target for conquest; the isolationist Joseon dynasty now presents a perfect opportunity. Act, and Korea shall belong to the Emperor."
 jap_conqueror_manchuria_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Qing royal house's hold over its homeland grows fragile and Russian influence seeps in. We cannot stand idly by while they reap all the benefits — the destiny of the Empire is at stake in this struggle!"
 taisho_roman_display_lobby: "#v Unlocked by this MOD: Victorian Century#!\nA breeze of Romanticism is blowing from the heart of Ginza across Japan: an atmosphere of freedom, openness, and vibrant ideas is spreading, and people's love for imported goods, new arts, and consumer culture is flourishing. This may be the finest era the Land of the Rising Sun has seen in a thousand years — can the sunlight of liberty pierce the clouds of autocracy and authoritarianism to shine upon a renewed Yamato nation?"
 taisho_roman_display: "Taisho Romanticism"
 taisho_roman_display_reason: "nan"


 company_equity_lobby: "#v Unlocked by this MOD: Victorian Century#!\nControversy over the Company spreads through the boardrooms on Leadenhall Street: profits fall year after year while debts climb. Many investors have lost confidence; if the Company cannot be revived, nationalization may become inevitable."
 bic_company_debts_lobby: "#v Unlocked by this MOD: Victorian Century#!\nSince the latter half of the 18th century the Company's debts have grown, many incurred via parliamentary acts borrowing from the Bank of England. In short, the Company has handed Whitehall a massive IOU — and Whitehall grows impatient."
 unified_subcontinent_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Company already rules much of the subcontinent, yet some states remain outside our benevolent governance. By command of His Majesty and Parliament, we should conquer them."
 reform_east_india_lobby: "#v Unlocked by this MOD: Victorian Century#!\nGoverning the subcontinent is troublesome: without proper institutions our rule grows inefficient. We must thoroughly reform existing economic and political systems and further invest in Indian provinces via private enterprise."
 ganges_irrigation_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe Ganges basin's agricultural conditions do not reliably support cash crops. But by an ambitious plan the government will lay an efficient irrigation system across northern India, turning once parched and barren land into fertile new fields."
 bombay_industrialize_lobby: "#v Unlocked by this MOD: Victorian Century#!\nBombay has India's finest port and many companies headquarter there. By continuing Governor William Hobson's land reclamation projects we can unite Bombay's scattered isles and build a prosperous metropolis."
 raj_indian_major_railway_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe subcontinent teems with value but is vast and rugged; transport is poor. Unless we effectively utilize it, India's wealth is wasted. A railway linking the entire subcontinent would provide enormous convenience for interprovincial transport."
 indian_home_rule_lobby: "#v Unlocked by this MOD: Victorian Century#!\nNative Indian national consciousness is rising. Educated and employed by the colonial administration, local Indians begin to demand equal status within the Empire, greater economic opportunity, and ultimately self-government for all India."
 raj_towards_independence_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThough Whitehall and militant Indian nationalists have temporarily reached an accommodation, independence seems an inevitable future. We must, after full preparation and ensuring British interests and prestige are preserved, grant them independence."
 bic_conqueror_all_afk_lobby: "#v Unlocked by this MOD: Victorian Century#!\nThe rightful heir of the Durrani Empire has come under our control. Using his prestige and claim, if we can seize Kabul in one stroke, Afghanistan's tribes will surely submit."


 peter_the_great_of_turkey_lobby: "#v Unlocked by this mod: Victorian Century#!\nA great Padishah who inaugurated a new era: Mahmud II has fallen ill, and it seems his days of rule are drawing to a close. In his remaining time, how shall he continue the reforms of the past decades and lay a foundation for his successor?"
 tanzimat_main_lobby: "#v Unlocked by this mod: Victorian Century#!\nThe Ottoman Empire, once spanning three continents, has fallen into decline—but she may yet rise again. With the assistance of the Tanzimatist viziers and pashas, the new Padishah must act swiftly to modernise and revive the Empire, restoring her prestige among the Great Powers."
 ottoman_constitutional_era_lobby: "#v Unlocked by this mod: Victorian Century#!\nSupported by revolutionary-minded intellectuals and the politicians and bureaucrats sympathetic to them, constitutionalists are attempting to seize control of the Sublime Porte through an armed coup and proclaim a constitution, establishing responsible government in the Ottoman Empire. Will the ideals of constitutionalism prevail, will autocracy return once more, or... will something unexpected emerge?"
 baghdad_railway_lobby: "#v Unlocked by this mod: Victorian Century#!\nOur rising capitalists and engineers have proposed a grand design: to construct an iron artery stretching from the Mediterranean to Baghdad and onward to the Persian Gulf. Many believe this great undertaking will strengthen the authority of the Sublime Porte in Iraq and serve our strategic interests in the Near East."
 ottoman_conquest_lobby: "#v Unlocked by this mod: Victorian Century#!\nThe revival of the Empire must be achieved on every front. If the Ottomans are to stand once more at the summit of world power, they must resume the path of conquest—perhaps even surpassing the achievements of the greatest conquerors of old and seizing new territories."
 mesopotamia_management_lobby: "#v Unlocked by this mod: Victorian Century#!\nThe floodplains of Mesopotamia have long suffered from the destructive floods of the Euphrates and the Tigris. Yet these lands could become immensely fertile and prosperous—if only we undertake measures to control the floods, reclaim saline soils, and restore abandoned farmland."
 istanbul_industrialize_lobby: "#v Unlocked by this mod: Victorian Century#!\nOnce hailed as the City of the World's Desire and the Queen of Cities, Kostantiniyye has declined in this new industrial age. As the foremost capital of the Empire—the great city conquered by the Fatih—it must be transformed and restored to its former glory as one of the most renowned metropolises of the world."
 armenian_massacre_issue_lobby: "#v Unlocked by this mod: Victorian Century#!\nArmenians living across the Empire have long endured hostility from the Turks, and such sentiments have recently intensified. If decisive action is not taken, this animosity may well escalate into a dreadful act of genocide."
 great_ottomanism_lobby: "#v Unlocked by this mod: Victorian Century#!\nAn idea known as Great Ottomanism is rising among the bureaucrats and the army. Its supporters believe it can forge national unity and thereby prevent the Empire from being torn apart by the religious divisions of the millet system."
 caliph_and_ummah_lobby: "#v Unlocked by this mod: Victorian Century#!\nAn Islamic revivalist movement known as the Salafi movement is emerging within our state. Its adherents seek to cleanse the corruption brought by modernity by restoring the pure traditions of Islam as practised by the Prophet Muhammad and his Companions."
 the_unruly_arabs_lobby: "#v Unlocked by this mod: Victorian Century#!\nNew nationalist ideas are flourishing across the Arabian Peninsula under Ottoman rule. Western-educated intellectual elites abroad and local notables resentful of Ottoman authority are joining forces—often with the assistance of foreign powers hostile to the Empire—to incite the Bedouin tribes to overthrow Turkish rule in Arabia."


