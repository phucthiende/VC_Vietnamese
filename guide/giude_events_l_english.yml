l_english:

 joi_flavor_guide.1.t: "French Journal Guide"
 joi_flavor_guide.1.d: "Latest France update as of 6/15/2025: #V Second Republic, Bonaparte Dynasty content, Government of National Defense, Third Republic, Entente Cordiale, etc.#!"
 joi_flavor_guide.1.f: "Q: How to play the Bonaparte Dynasty path?\nA: Fail the 'Divided Monarchists' journal to enter the 'Second Republic' journal. During this period, ensure monarchist factions outweigh republicans to trigger the failure event 'Operation Rubicon' - crowning Napoleon III and establishing the Bonaparte Dynasty.\n\nQ: How to play the 'Third Republic' path?\nA: Either: 1) Lose any metropolitan territory while the 'Bonaparte Dynasty' journal is active, triggering a special event to restore the Republic, or 2) Enact republican laws during the Bonaparte period."
 joi_flavor_guide.1.a: "Merci."
 special_character_god_save_the_queen: "God Save the Queen"
 special_character_god_save_the_queen_desc: "A symbol of a glorious era: Her Majesty Queen Victoria of the United Kingdom of Great Britain and Ireland, Defender of the Faith, blessed by God Almighty. God save the Queen, Long may she reign!"
 special_character_emperor_of_india: "Emperor of India"
 special_character_emperor_of_india_desc: "The jewel in the crown, Majesty the Emperor of India at the Delhi Durbar, Sovereign of the Indian Subcontinent."
 special_character_second_world_conqueror: "World Conqueror"
 special_character_second_world_conqueror_desc: "The heir of Emperor Napoleon, who fulfilled the dream of 1815, surpassing the deeds of his forebear, and forging an unparalleled legend in glory and blood."
 special_character_abraham_lincoln_popularity: "The Great Emancipator"
 special_character_abraham_lincoln_popularity_desc: "With steadfast devotion to liberty and extraordinary political skill, he abolished slavery, defeated the Confederate South, and preserved the Union."
 special_character_old_marshal: "The Last Marshal"
 special_character_old_marshal_desc: "One of the last surviving figures of the Napoleonic age, who witnessed the wars since the Great Revolution. From fire and blood he emerged, tempered into a commander of keen talent and enduring renown."
 special_iron_duke: "Iron Duke"
 special_iron_duke_desc: "Arthur Wellesley, Duke of Wellington — the Conqueror of the Conqueror, the Saviour of Europe — who, through masterful command and ingenious design, defeated Emperor Napoleon at the Battle of Waterloo, ending the Napoleonic Wars. This epic achievement earned him unparalleled admiration and renown."
 special_young_officers: "Young Officer"
 special_young_officers_desc: "A young and promising officer, educated in the finest military traditions, bearing innovative ideas, and having already served in important staff and command positions."
 special_chief_of_general_staff: "Chief of the General Staff"
 special_chief_of_general_staff_desc: "Renowned for distinguished service and pioneering reforms of his nation’s army, and celebrated for great achievements in war. As head of the General Staff, he was hailed by his enemies as a genius of organization and tactics, and revered at home with the highest esteem."
 special_bloody_baron: "Bloody Baron"
 special_bloody_baron_desc: "A self-proclaimed descendant of Genghis Khan, obsessed with Vajrayana Buddhism, and notorious for treating both enemies and his own men with the most brutal and eccentric methods. Many of his Tatar followers revered him as Bagatur for his skill in commanding cavalry."
 special_ottoman_fatih: "法提赫"
 special_ottoman_fatih_desc: "一名真正的征服者帕迪沙，两海与两陆的苏丹。他带领军队重现了其祖先——法提赫穆罕默德二世——的辉煌功绩，征服了继君士坦丁堡之后又一座最神圣的城市：罗马。"
 special_prince_governor: "奥斯曼之子"
 special_prince_governor_desc: "一名经验丰富的指挥官和统治者，依据奥斯曼王朝的传统在他的少年与青年时代完成了严苛的军事生涯和总督经历。他从中获得了许多管理政府和指挥军队的经验，同时，他在其曾经指挥的部队和管理的省份中也有着不错的声望和爱戴。"
 special_yellow_flood_leader: "治水英雄"
 special_yellow_flood_leader_desc: "一名饱受爱戴的杰出领袖，以非凡的毅力重现了神话传说中大禹治水的辉煌成就，带领汉民族彻底治理了中国王朝数千年来未曾平定的黄河水患。"

