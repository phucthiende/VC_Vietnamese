l_english:

 peter_instruction:0 "The Will of Peter the Great"
 peter_instruction_reason:0 "#variable We, Peter the First, #!variable Emperor and Sovereign of all the Russias, #variable in the name of the Most Holy and Indivisible Trinity, declare to all successors of the Russian throne and [concept_government]#!:\n\nThe Almighty God, who gave us life, has convinced us that the people of #bold [ROOT.GetCountry.GetName] are destined to become the ruling nation of the world,#! guided and supported by divine light.\n\nWe hold this belief because we have observed that most nations of the world have reached #bold the decrepit age of old age, or are rapidly approaching it#!. From this, we conclude that a young empire, upon reaching their strength, should easily and necessarily conquer them.\n\nWe believe that the impending northern invasion of western and eastern countries is a #bold divinely ordained and designed periodic movement, just as God once arranged the invasions of barbarians to renew the Roman nation#!. This movement from north to south, like the #bold reflux of the Nile River, periodically fertilizes the western lands of Egypt with its silt#!. We find that [ROOT.GetCountry.GetName] is such a river, and it remains so at our passing. Our successors will turn Russia into a great sea that fertilizes poor Europe, and if our descendants know how to guide this tide, its waves will break through any embankment that stands in the way:\n\n#variable For this, we will be able to conquer the world, and we should be able to conquer the world!#!"
 peter_instruction_1_tt:0 "Complete 7 #bold Peter Instructions#[Concept('concept_journal_entry', '$concept_journal_entries$')]"
 peter_instruction_2_tt:0 "Russia's greatest ambition will be realized; we will become the Roman Empire of a new era!"
 peter_instruction_3_tt:0 "Peter the Great's grand strategy ultimately turns to nothing, perhaps this era is not where our glory lies..."
 peter_instruction_status:0 "#bold #O Turn Peter the Great's will of a great empire into reality.#!#!"
 form_third_rome_tt:0 "#variable 如果拥有君主制，则我国将改名为罗马帝国！#!"

 peter_instruction_cenasia:0 "Peter Instruction: Pacify the Steppe"
 peter_instruction_cenasia_reason:0 "Since 1582, when the bold Cossack explorer Yermak crossed the Ural Mountains with a few hundred men and attacked the weakening Siberian Khanate, establishing the empire's first foothold in Siberia, Russians, fueled by the anger of being enslaved by the Tatars, have relentlessly advanced eastward.\n\nOver two hundred years have passed, and the descendants of Rurik who rule Russia have become the Romanovs. Our eastern territories now extend to America, and the conquest of Siberia and Kazakhstan has transformed Russia from a secondary kingdom on the edge of Europe into the largest continental empire in the world.\n\nNow, our rule over the steppe is as solid as a rock, and it is time to prepare to incorporate the Central Asian region into our territory.\n\nIf God is with us, who can be against us?"
 peter_instruction_cenasia_1_tt:0 "After seizing the great grasslands of Central Asia, the territory of our great empire will extend directly to Afghanistan, just one step away from India..."
 peter_instruction_cenasia_2_tt:0 "The secession of the Central Asian khanates will deal a heavy blow to the empire."
 abolition_of_kazakh_khanate_button:0 "Abolish the Kazakh Khanate"
 abolition_of_kazakh_khanate_button_desc:0 "It has been a long time since the Kazakh Khanate split into three and submitted to us. In the past, we allowed these nomads to act freely due to our inability to control them effectively, but not anymore! For the interests of Mother Russia in Central Asia, the lands of the Kazakh Khanate must be fully integrated into the empire to ensure they can serve as outposts for further expansion of our Central Asian interests; of course, we will consider giving some compensation to the Khan who obediently steps down for us."
 abolition_of_kazakh_khanate_button_possible_tt:0 "The decree to abolish the khanate has not yet been issued."
 march_into_turkestan_button:0 "March into Turkestan"
 march_into_turkestan_button_desc:0 "Previous expeditions to conquer Central Asia have all failed. Despite the long journey, with technological advancements, we are now able to organize a powerful army to completely crush the remaining khanates in Central Asia; let us organize and send an army down the Seven Rivers and Kyrgyzstan, taking the route through Tokmak to strike directly at Samarkand!"
 march_into_turkestan_button_possible_1_tt:0 "A decree has been issued to abolish the Kazakh Khanate."
 march_into_turkestan_button_possible_2_tt:0 "No large-scale action has been taken against Turkestan yet."
 march_into_turkestan_button_effect_tt:0 "We will launch an immediate raid."

 peter_instruction_neareast:0 "Peter Instruction: Near East Ambition"
 peter_instruction_neareast_reason:0 "As early as 1676, our [ROOT.GetCountry.GetName] empire was in a state of hostility with our southern neighbor [SCOPE.sCountry('TUR_scope').GetName]. Over the next hundred years, the wars with this strongest Muslim nation witnessed the rise of our great empire, from the Treaty of Belgrade in 1739, which secured Azov, to the Treaty of Jassy in 1792, which brought the sovereignty of the Crimean Peninsula, Zaporozhye, and the Caucasus. In the eighth Russo-Turkish War just six years ago, as our army advanced almost to Constantinople, the Sultan surrendered again, signing the Treaty of Adrianople, further advancing our territories in the Caucasus to Armenia, while our European borders reached the banks of the Danube.\n\nWhether it is the Tsar himself or the marshals of the imperial army, they are all convinced of the weakness of [SCOPE.sCountry('TUR_scope').GetName]. Despite the possible intervention of [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('FRA_scope').GetName], if we take the risk, perhaps now is the time to complete the great mission of eliminating these infidels and expanding our territory to the entire Near East?"
 peter_instruction_neareast_1_tt:0 "Ensuring control over Anatolia will provide strong support for realizing the great ideals of generations of tsars and retaking the city desired by the world."
 peter_instruction_neareast_2_tt:0 "Perhaps the Ottomans will be able to prove that they are not as weak as believed."

 peter_instruction_persia:0 "Peter Instruction: Persian Campaign"
 peter_instruction_persia_reason:0 "In 1826, we seized the lands of Azerbaijan from Persia in our [concept_war]. Despite some insignificant resistance from the Persians, the declining Qajar dynasty still crumbled before the mighty Cossack cavalry, and the pearl of Zagros, Tabriz, now stands just a hundred miles away from the empire.\n\nPeter the Great explicitly noted the importance of Persia's central position in the world in his will. Perhaps continuing the war that began ten years ago and sending troops to capture more Persian territory would be a good choice.\n\nHowever, it is undeniable that with the gradual expansion of [SCOPE.sCountry('GBR_scope').GetName] in India, they are highly likely to participate in our conquest of Persia. Whether through diplomacy or war, we must triumph in this contest with the British!"
 peter_instruction_persia_1_tt:0 "The lands of Persia are an excellent base for further plans to seize the Mashriq. Ensuring control over Persia will play a crucial role in our influence in the Middle East."
 peter_instruction_persia_2_tt:0 "Failure in Persia will further diminish our prestige..."

 peter_instruction_fareast:0 "Peter Instruction: Conquest of the East"
 peter_instruction_fareast_reason:0 "The ambitions of Peter the Great to become a Pacific naval power and our expansion plans in Central Asia have led us to face the powerful [SCOPE.sCountry('CHI_scope').GetName] after the conquest of Siberia. We once attempted to challenge the authority of this empire and, in a series of struggles, had to compromise and sign the humiliating Treaty of Nerchinsk.\n\nHowever, times have changed, and our position in the Far East is now unassailable. It is time to realize the will of Peter the Great and Empress Catherine, to seize this land while [SCOPE.sCountry('CHI_scope').GetName] is weak, and to incorporate the East Asian region into our territory."
 peter_instruction_fareast_1_tt:0 "Rumors of the weakness of [SCOPE.sCountry('CHI_scope').GetName] have been confirmed by our army and spread throughout the entire court. It is time to draft a plan to pull this empire from its undeserved position and turn the fertile lands of China into a paradise for the Russian people!"
 peter_instruction_fareast_2_tt:0 "The interests of the Pacific will not be secured..."

 peter_instruction_easteurope:0 "Peter Instruction: Eastern Europe Gendarme"
 peter_instruction_easteurope_reason:0 "The lands of Eastern Europe have always been a paradise for the Slavs. With the decisive victory of the [ROOT.GetCountry.GetName] Empire in the Napoleonic Wars, European nations, out of gratitude and fear, bestowed upon us the title of 'Gendarme of Europe.' Although this title may be an exaggeration, our status as the 'gendarme' of Eastern Europe is beyond question.\n\nThe Polish territories conquered by Frederick the Great have been embraced by Mother Russia following the Congress of Vienna. Nevertheless, many Slavic brothers in Eastern Europe are still under the yoke of [SCOPE.sCountry('AUS_scope').GetName], suffering and eagerly seeking to join our embrace.\n\nAlthough this empire seems to be at its peak, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] believes that its strength will soon weaken, and liberating the Slavic brothers will become a mission bestowed upon us by God!"
 peter_instruction_easteurope_1_tt:0 "Poland under [SCOPE.sCountry('AUS_scope').GetName] will help us consolidate our absolute position in Slavic civilization and provide opportunities for further interference in German affairs."
 peter_instruction_easteurope_2_tt:0 "[SCOPE.sCountry('AUS_scope').GetName] is not an easy opponent. Nevertheless, such a failure will still shake our image in the eyes of the Slavs..."
 peter_instruction_easteurope_status:0 "Drive the Habsburgs out of Eastern Europe and establish our military presence there."
 peter_instruction_easteurope_complete_tt:0 "#O Poland#![concept_hq] Any [concept_army] has more than #variable 500#![Concept('concept_unit','$concept_units$')]"

 peter_instruction_northeurope:0 "Peter Instruction: Northern Europe Expansion"
 peter_instruction_northeurope_reason:0 "'This is the country I conquered with my army; I annex it to the Russian Empire from now until forever.'\n\nHis Sacred Majesty Alexander I's conquest of [SCOPE.sCountry('FIN_scope').GetName] ensured our dominance over the Baltic, this important trade hub. Nevertheless, in the lands of Northern Europe, [SCOPE.sCountry('SWE_scope').GetName] still postures on its throne. Undoubtedly, from a position of strength, it is inappropriate for [SCOPE.sCountry('SWE_scope').GetName], the loser of the Northern Wars, to still rule over such vast territories. If they ally with continental European nations, they could still pose a significant threat to us.\n\nAlong with the crown of [SCOPE.sCountry('NOR_scope').GetName], for the security of the empire, all of Scandinavia should be under the benevolent rule of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 peter_instruction_northeurope_1_tt:0 "Conquer Northern Europe to establish a system of governance by the governor-general, or force Northern Europe to submit and directly confiscate their territories."
 peter_instruction_northeurope_2_tt:0 "The prosperity of Baltic trade is our lifeline. If not secured, the empire's northern cities will be under direct threat!"
 peter_instruction_northeurope_status:0 "Achieve complete conquest of the Scandinavian Peninsula."

 peter_instruction_constantinople:0 "Peter Instruction: Conquest of Tsargrad"
 peter_instruction_constantinople_reason:0 "'I give them an empire without end...' Two Romes have fallen, the third stands, and there will never be a fourth: no one can replace [ROOT.GetCountry.GetName]'s loyalty to Christ.\n\nIt has been nearly four hundred years since the fall of the Byzantine Empire, and the glory of the Roman Empire has been trampled under the iron hooves of [SCOPE.sCountry('TUR_scope').GetName]. The Queen of Cities is in lament, and the people of the Balkans are praying for liberation from the tyranny of the enemy. Undoubtedly, as the only country in the world with a legitimate claim to the 'Third Rome,' our great motherland is best suited to be the protector of these brethren.\n\nBut unless we can retake the city desired by the world, Constantinople, our claims and prestige among the Balkan brothers will be meaningless."
 peter_instruction_constantinople_1_tt:0 "Constantinople will become Tsargrad of the empire; our claim to the Third Rome will become absolute orthodoxy!"
 peter_instruction_constantinople_status:0 "Recover the city desired by the world, lost from the Christian world in 1453."

 peter_instruction_euphrates:0 "Rule Mesopotamia"
 peter_instruction_euphrates_reason:0 "Mesopotamia, the legendary site of the Garden of Eden, the place that nurtured the ancestors of all mankind, is now in the hands of uncivilized infidels, which is unacceptable to the entire Christian world. But those shameful heretics have done nothing, so let us, as the Orthodox Church of the East, take action.\n\nPeter the Great's lifelong ambition was to gain an outlet to the Indian Ocean and thereby influence the rich India. Despite the complex religious environment that might strain our already limited administrative capabilities, Russians have always believed that every war we wage will be the final one to utterly destroy the enemy.\n\nIn the name of the Tsar, advance!"
 peter_instruction_euphrates_1_tt:0 "The conquest of Basra will bring great benefits to our country in the Persian Gulf."

 peter_instruction_threatindia:0 "Threat to India"
 peter_instruction_threatindia_reason:0 "Afghanistan, this barren and useless land of infidels, would indeed be so if it were not for its rich southern neighbor, India.\n\nThe geographical location of this land has made it a contested object between us and the British. We must admit that the conquest of Turkestan was indeed too hasty. The British cannot accept any possibility of our contact with what they call the 'Jewel in the Crown.' But this does not mean we need to consider their opinions: once we take Afghanistan, we can boldly drive our 'steam roller' into this land that even Alexander the Great failed to conquer."
 peter_instruction_threatindia_1_tt:0 "Let them hate, as long as they fear!"
 peter_instruction_threatindia_2_tt:0 "A failed conquest plan may invite British retaliation..."

 peter_instruction_yellowrussia:0 "Yellow Russia Plan"
 peter_instruction_yellowrussia_reason:0 "The rich Asia has begun its decline again, with dynasties rising and falling. But this time, there will be no joke like the tribute book received in Moscow a hundred years ago:\n\nOur explorers sent to [SCOPE.sCountry('CHI_scope').GetName] have submitted to the empire a plan to thoroughly advance and occupy our conquest front in Manchuria, aiming to incorporate the vast and rich lands of northern China into the empire's rule.\n\nVladivostok is just the beginning; the territory of [ROOT.GetCountry.GetName] will expand to the farthest reaches of Asia. We will encompass the entire Orient within the borders of the Motherland!"
 peter_instruction_yellowrussia_1_tt:0 "We will have the opportunity to further Russify the lands of northern China in the future."
 peter_instruction_yellowrussia_complete_tt:0 "#O North China#![concept_hq] Any [concept_army] has more than #variable 300#![Concept('concept_unit','$concept_units$')]"

 peter_instruction_conqueror_mongolia:0 "Conquest of Mongolia"
 peter_instruction_conqueror_mongolia_reason:0 "Since the Mongol conquest of 1242, we have never been as close to the homeland of the Mongols as we are today. Ögedei once led his army from here to campaign as far west as the Volga River. However, their empire has long since declined and even fallen under the rule of [SCOPE.sCountry('CHI_scope').GetName].\n\nWe have received many requests from Mongolian nobles and people, hoping that the great [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] will liberate them from the cruel rule of Beijing. This gives us a completely legitimate reason to send troops to Mongolia.\n\nThe conquest of the Mongols shaped our early empire, and now the glory of [ROOT.GetCountry.GetName] will put a perfect end to Mongolia. It is time to complete the final revenge of destiny!"
 peter_instruction_conqueror_mongolia_tt:0 "We will have the opportunity to decide whether to directly rule the Mongolian steppe."

 peter_instruction_vladivostok:0 "Vladivostok City Construction"
 peter_instruction_vladivostok_reason:0 "We have been trying to cross the ice-covered Ural Mountains for centuries, but all we have found is endless snowfields.\n\nBut with our conquest of the East, the ice-free port of the Far East, Vladivostok, is already in our pocket.\n\nThe rich resources of the Pacific and the strategic interests of the Far East make the cold Siberia no longer just a logging site for exiled criminals and prisoners of war, but a place from which we can transport symbols of wealth, such as soft gold and minerals, from the distant eastern lands back to the treasury of Moscow!"
 peter_instruction_vladivostok_1_tt:0 "Vladivostok will become a key stronghold of the empire in the East."
 peter_instruction_vladivostok_status:0 "Turn the barren Port May into the ice-free port of Vladivostok belonging to Russia."
 peter_instruction_vladivostok_2_tt:0 "We will lose the opportunity to build a Far Eastern port."

 peter_instruction_germanproblem:0 "German Question"
 peter_instruction_germanproblem_reason:0 "The German region has always had a profound impact on Russia. Catherine the Great was a German princess who became one of the most influential tsarinas in Russian history.\n\nNot only are there connections between the royal families, but Russia also has significant interests in Germany: the German coast guards the Skagerrak Strait, controlling the junction of the North Sea and the Baltic Sea, where our trade lifeline lies. The states in the German region are also an important buffer for our Western European powers. Although the Ministry of Land Warfare has drafted an ambitious plan they call 'offensive defense,' no one wants the Seven Years' War to repeat itself. The lesson of Peter III is still carved at the gate of the Winter Palace; however, we also do not want a complete German power to emerge.\n\nAt present, we can either use diplomatic means to prevent its unification or resort to force. In any case, the German question will determine our hegemony in continental Europe..."
 peter_instruction_germanproblem_1_tt:0 "Whether through the pen or the sword, our policy to solve the German question will determine our next decision..."
 peter_instruction_germanproblem_status:0 "Change our interests in the German region to ensure that this neighboring land brings benefits rather than threats to our country."

 alexander_reform:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] Reforms"
 alexander_reform_status:0 "#V #U #B We need to reform our motherland into a modern true [concept_great_power] within 30 years of the new monarch's ascension to the throne.#!#!#!"
 alexander_reform_reason:0 "'Society calls for the execution of one of the most formidable tasks that an autocratic ruler may face: the thorough transformation of the vast country entrusted to his care, the abolition of the ancient order based on slavery, and its replacement with the dignity and freedom of citizens, the establishment of justice in a country that has never known the meaning of legality, the redesign of the entire government, the introduction of press freedom against the backdrop of unconstrained authority, the summoning of new forces at every turning point, and the laying of a solid legal foundation for them... allowing a suppressed and humiliated society to rise again and giving it the opportunity to demonstrate its strength.'\n\n[ROOT.GetCountry.GetName] is now like a giant in chains, every move is a burden, while countries like England and France have already taken the fast lane with the head start of the Industrial Revolution. We are still arguing over the methods of serf farming:\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] has determined that the time for reform has come! We must build a new, civilized Russian motherland to gain an advantage in the increasingly fierce global competition."
 alexander_reform_1_tt:0 "Complete four #V reforms#[Concept('concept_journal_entry', '$concept_journal_entries$')]"
 alexander_reform_2_tt:0 "A successful reform will greatly strengthen our great motherland."
 alexander_reform_3_tt:0 "A failed reform will only make His Majesty lose face..."

 alexander_reform_army:0 "Reform the Imperial Army"
 alexander_reform_army_reason:0 "'Turn right! ... Fool, that's left, can't you tell left from right?'\n\nPeter the Great left us with an advanced and disciplined army, but it has become increasingly corrupt over time, to the point where other nations call our army 'gray cattle,' only good for filling trenches with serfs in uniform.\n\nIt is time to change this stereotype. To match Russia's expansion and its ambitions, we must reorganize our army and abolish the backward system of using armed serfs as soldiers: only a strictly trained standing army can satisfy our ambitions of conquest."
 alexander_reform_army_1_tt:0 "Three months ago, they were just farmers, craftsmen, and students; now, they have the courage of the Archangel Michael!"
 alexander_reform_army_2_tt:0 "Such an ignorant and foolish army is bound to cause trouble sooner or later!"

 alexander_reform_slave:0 "Reform the Serfdom System"
 alexander_reform_slave_reason:0 "Although after the fall of Poland in 1795, we found that most Polish serfs lived much better under Russian rule, it was only relatively speaking. A good tsar cannot tolerate his subjects going hungry. We possess the fertile Ukrainian plains, but the wheat and potatoes grown there cannot feed those who sow them.\n\nIn every aspect, serfs should not be bound to the manor; they should have their own land and freedom:\n\nThe only question is whether to quickly distribute the land to the serfs or whether some appropriate redemption will make the reform progress faster."
 alexander_reform_slave_1_tt:0 "Serfs freed from their shackles will contribute greatly to the motherland. However, this will also cause dissatisfaction among the nobility..."
 alexander_reform_slave_2_tt:0 "The serfdom system must not be sustained indefinitely..."

 alexander_reform_bera:0 "Reform the Bureaucratic System"
 alexander_reform_bera_reason:0 "If we apply to open an account at the London Stock Exchange, it can be done quickly. But if you want to open an account in Moscow, it might take three or four days... oh no, Moscow can't open an account; there is no stock exchange here.\n\nThe hereditary Boyar nobles have monopolized the bureaucratic institutions for too long, and sometimes even the tsar's decrees are seen as empty words in their eyes. If we want the motherland to be reborn, we must pull out these rotten worms and greedy devils!"
 alexander_reform_bera_1_tt:0 "The new bureaucratic system will help our country achieve more efficient governance."
 alexander_reform_bera_2_tt:0 "Those nobles will continue to dominate the empire's administrative institutions..."

 alexander_reform_noble:0 "Reform the Assembly of the Nobility"
 alexander_reform_noble_reason:0 "Many of the powerful nations in Western Europe have already implemented the so-called system of constitutional monarchy, and Russia cannot remain isolated. Although the tsar is the divinely anointed ruler of Russia, we still need to establish a set of laws to balance Russian politics.\n\nRedraft and establish a complete constitution, ensuring the support of the Boyar nobles while also beginning to disperse the tsar's power. The old politics of court ministers is rotten to the core, and the party parliament of England is far from perfect. We may be able to create a new political system that is best suited to Russia."
 alexander_reform_noble_1_tt:0 "Establishing a new 'election' system may further optimize our politics..."
 alexander_reform_noble_2_tt:0 "Our great Russia has its own national conditions..."

 siberian_penal_land:0 "Siberian Penal Land"
 siberian_penal_land_reason:0 "#variable Siberia#!, this vast prison without a roof, is a land filled with wealth and yet a world of ice and snow. It is a land of free [concept_migration] and yet a place of exile for the unfree.\n\nThe development of Siberia began during the era of #variable Ivan the Terrible#!. Initially, the exploration east of the Urals was marked only by Cossack fur traders and a few [concept_migration] settlers establishing outposts. Over several decades, we successfully extended our basic rule across all of Siberia through these outposts. However, Siberia, compared to the warm southern Russian plains, held little attraction. The wealth hidden beneath the coniferous forests and snow lacked sufficient manpower for development, which was unacceptable to the Motherland. Thus, the exile system was born under the joint rule of #variable Peter the Great and his brother Ivan V#!. \n\nTo prevent societal decay, we must remove harmful elements, just as we cleanse toxins from our bodies. Countless individuals who have committed heinous crimes have been mercifully spared the death penalty by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], on the condition that they contribute their remaining years to the Motherland in Siberian towns.\n\nThe industrialization of [ROOT.GetCountry.GetName] makes us increasingly reliant on [concept_resource_potential] from east of the Urals. However, the existing convicts alone are insufficient to develop this vast and empty wilderness. We must employ every means possible, whether honorable or...dishonorable.\n\n#bold For [ROOT.GetCountry.GetName]#!, this is a necessary sacrifice."
 siberian_penal_land_tt_1:0 "By spending #bold Exile Points#, we can focus on exiling to various industries in Siberia."
 siberian_penal_land_tt_2:0 "#bold Exile to mining areas, exile to potato fields, exile to manufacturing plants, exile to logging camps#! will each cost us 25 #bold Exile Points#. \n#bold Enacting harsh laws#! will increase our Exile Points by 100. \n#bold Selling [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] pardons#! will cost us 50 Exile Points in exchange for a substantial redemption fee."
 siberian_1_button:0 "Exile to Mining Areas"
 siberian_1_button_desc:0 "These irredeemable criminals, even if spared from death, must dedicate their remaining lives to the Nerchinsk mines!"
 siberian_1_button_tt:0 "Decrease 25 Exile Points\nCan only be implemented once every 3 years!"
 siberian_2_button:0 "Exile to Potato Fields"
 siberian_2_button_desc:0 "Food is scarce in Siberia, and the territories of Eastern Europe cannot transport enough supplies. However, we can exile some prisoners to cultivate crops like potatoes to feed themselves."
 siberian_2_button_tt:0 "Decrease 25 Exile Points\nCan only be implemented once every 3 years!"
 siberian_3_button:0 "Exile to Manufacturing Plants"
 siberian_3_button_desc:0 "Labor has always been a challenge for our fragile industry. The harsh climate and unfortunate geography leave our Siberian factories perpetually short of workers. However, we can find an alternative by exiling some hardworking prisoners who require no wages."
 siberian_3_button_tt:0 "Decrease 25 Exile Points\nCan only be implemented once every 3 years!"
 siberian_4_button:0 "Exile to Logging Camps"
 siberian_4_button_desc:0 "The tall trees growing in the Siberian wilderness are excellent materials. They are our country's leading export products and the top choice for building warships and furniture. Exiling some prisoners to work as loggers should increase our timber production."
 siberian_4_button_tt:0 "Decrease 25 Exile Points\nCan only be implemented once every 3 years!"
 siberian_5_button:0 "Enact Harsh Laws"
 siberian_5_button_desc:0 "Even the wisest scholars would not have imagined that a country could be troubled by having too few criminals. Whether they are vagabonds, wayward women, or the unwanted, we will use our methods to send them where they are needed, despite some inconsequential criticism..."
 siberian_5_button_tt:0 "Increase 100 Exile Points\nCan only enact laws once every 5 years!"
 siberian_6_button:0 "Sell Tsar's Pardons"
 siberian_6_button_desc:0 "Anyone can reach the borders of Europe and the Dark Continent, just as anyone can obtain a pardon to send someone else to Siberia in their place, even revolutionaries and traitors..."
 siberian_6_button_tt:0 "Decrease 50 Exile Points\nCan only sell pardons once every 5 years!\n#bold This action is only available under a monarchy!#!"
 panel_event_tt_1:0 "Gain 25 #bold Exile Points#!"
 panel_event_tt_2:0 "Decrease 25 #bold Exile Points#!"
 panal_russia_tt:0 "Exile non-local cultural populations from some Eastern European provinces to designated Siberian provinces"
 siberian_penal_land_status:0 "#V #bold #N Inhumane exile systems may invite criticism.#!#!#!"
 siberian_need_25_tt:0 "Exile Points must be at least 25"
 siberian_need_50_tt:0 "Exile Points must be at least 50"

 franco_russian_alliance:0 "Franco-Russian Alliance"
 franco_russian_alliance_status:0 "#bold Common interests in Germany can serve as an effective [concept_alliance] bond between France and Russia.#!"
 franco_russian_alliance_reason:0 "Our [ROOT.GetCountry.GetName] and [SCOPE.sCountry('FRA_scope').GetName] are the most geographically distant countries in Europe, and our political systems also differ greatly. Historically, the French Emperor Napoleon even marched into the heart of our country, forcing Emperor Alexander I to burn down Moscow.\n\nHowever, with the changing world situation and for the sake of realistic political interests, [SCOPE.sCountry('FRA_scope').GetName] has shown a willingness to eliminate long-standing grudges with our country and even to jointly address threats from Central Europe. Moreover, due to our urgent need for capital and advanced technology for industrialization, a friendly France can also become a good partner to help us develop economically.\n\nA diplomatic delegation from [SCOPE.sCountry('FRA_scope').GetName] visited Kronstadt with French warships in the month when they expressed friendly intentions in our country. At the Peterhof Palace on the shores of the Gulf of Finland, the Tsar held a grand luncheon for the French guests. At the luncheon, the [SCOPE.sCountry('FRA_scope').GetName] orchestra played the French national anthem, La Marseillaise. Although this song was filled with reactionary overtones at the time, His Majesty the Tsar present specially stood up to listen, to show solemnity.\n\nThe ice between our two countries has been broken, and we believe that our friendship will last for thousands of years and face all enemies together.\n\n#variable United we stand, strong as steel!#!"
 franco_russian_alliance_tt:0 "#bold Providing diplomatic support to France and providing military support to France#! will each increase the cooperation value by 25 points.\n#bold Requesting financial loans from France and requesting technological exchanges with France#! will each cost 50 cooperation points.\nIf the situation requires, we can seek to #bold sign the Joint Alliance Treaty#! to solidify our military alliance with France, or #bold tear up the Franco-Russian Alliance Treaty#! to directly terminate any relationship with the Franco-Russian Alliance."
 franco_russian_alliance_2_tt:0 "Either party to the alliance has executed #bold tear up the Franco-Russian Alliance Treaty#!"
 rus_alliance_1_button:0 "Provide Diplomatic Support to France"
 rus_alliance_1_button_desc:0 "France is always in an awkward isolation on the international stage. However, as an ally, we believe that providing some diplomatic support will be very helpful to them."
 rus_alliance_1_button_tt:0 "Increase 25 cooperation points\nCan only support once every 5 years!"
 rus_alliance_2_button:0 "Provide Military Support to France"
 rus_alliance_2_button_desc:0 "The French army is indeed strong, but it seems inadequate when facing multiple powerful enemies simultaneously. Providing some reliable soldiers to their foreign legion would be very helpful."
 rus_alliance_2_button_tt:0 "Increase 25 cooperation points\nCan only support once every 5 years!\nMust have a professional army or mass conscription laws to execute this action."
 rus_alliance_3_button:0 "Request Financial Loans from France"
 rus_alliance_3_button_desc:0 "Our industrialization is in urgent need of financial support, and our good ally France has a well-developed financial system. For political considerations, obtaining some low-interest loans from the French government and banks will be extremely easy."
 rus_alliance_3_button_tt:0 "Decrease 50 cooperation points\nCan only request once every 5 years!"
 rus_alliance_4_button:0 "Request Technological Exchanges with France"
 rus_alliance_4_button_desc:0 "Our scientific research has always lagged behind the world's powers, but France does not. We believe that to defend against common enemies, the French government will be very willing to send some expert professors from the French Academy of Sciences and universities to visit and exchange with us."
 rus_alliance_4_button_tt:0 "Decrease 50 cooperation points\nCan only request once every 5 years!"
 rus_alliance_5_button:0 "Renew the Joint Alliance Treaty"
 rus_alliance_5_button_desc:0 "The world situation is extremely tense for us. It is time to remind the French to fulfill their military obligations under the alliance and come to help us fight!"
 rus_alliance_5_button_tt:0 "Can only renew once every 10 years."
 rus_alliance_6_button:0 "Tear Up the Franco-Russian Alliance Treaty"
 rus_alliance_6_button_desc:0 "The alliance between our country and France has come to an end. It is time to end this alliance of convenience. Let the French leave!"
 frarusallience_event_tt_1:0 "Gain 25 #bold Cooperation Points#!"
 rus_alliance_button_need_50_tt:0 "Cooperation Points must be at least 50"

 moscow_patriarchate:0 "Russian Orthodox Church"
 moscow_patriarchate_reason:0 "The history of the #variable Russian Orthodox Church#! in [ROOT.GetCountry.GetName] dates back to the time of Grand Prince Vladimir of Kiev. It has witnessed the rise and fall of Kievan Rus', endured the dark ages of the Mongol invasion, and survived through Moscow's unification of Russia and our expansion and transformation into today's [ROOT.GetCountry.GetName]. It is not only the spiritual pillar of the Russian people but also a symbol of our national unity.\n\nDespite the Reformation and Enlightenment that have led to the fading of religion in many European countries, where traditions and beliefs have been desecrated, the status of the Eastern Orthodox Church in the East remains unshaken. Since the establishment of the Most Holy Synod by Peter the Great in 1721, the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] has been integrated as part of our government's administration. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is the supreme leader of the church, binding the authority of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] firmly together, ruling and defending not only [ROOT.GetCountry.GetName] but also the vast number of believers worldwide in the name of the Lord.\n\nEveryone believes that our country will undoubtedly, under the leadership of the anointed one chosen by God, lead us to defeat all enemies. Amidst the whirlwinds of power and intrigue, the #variable Russian Orthodox Church#! and the #bold [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#! will stand as firm as the Ural Mountains, unyielding forever!"
 moscow_patriarchate_status:0 "#I #B Maintain the status of Eastern Orthodoxy in our country.#!#!"

 bolshevik_rebellion:0 "October Revolution"
 bolshevik_rebellion_reason:0 "#bold [concept_war] and [concept_revolution] are sweeping across all of [ROOT.GetCountry.GetName]: from the plains of Eastern Europe to the polar regions of the Far East, from the Gulf of Finland in Petrograd to Sevastopol#!. Countless enemies opposed to the [concept_revolution] have united to overthrow the institutions established by the #bold soldiers, laborers, and farmers of [ROOT.GetCountry.GetName]#! and proclaimed to the world: [GetLawType('law_council_republic').GetName].\n\nThe representatives of the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] are making a desperate last stand. In their view, this is the final struggle. As long as they can destroy the Soviet regime, they will stop at nothing to eradicate our entire socialist history. When the laboring masses seize power for themselves, and when the issue concerns protecting the money bags of the ruling class, the ruling class will engage in unprecedented criminal activities and massacres. However, despite the difficulty of achieving a quick victory in this struggle, which may extend into a cruel civil [concept_war], we must completely destroy the past bourgeois system and begin building a new socialist society on its ruins!\n\n#bold Comrades#!, we have begun and are conducting a [concept_war] against the exploiters: the bourgeoisie's attempt to prevent the goals of this [concept_revolution] is impossible to succeed. Our #variable Socialist Soviet Republic#! will stand firm as an international socialist beacon, as an example for the laboring masses of all countries.\n\n#variable [concept_revolution] is invincible!#!"
 is_at_civil_war_with_trade_unions:0 "In a civil war with the ruling trade unions"
 trade_unions_steel_power:0 "#bold Communists have seized power through violent means#!"
 rus_civil_war_begin:0 "The independence armies of Poland, Estonia, Latvia, Lithuania, Ukraine, Central Asia, and the Caucasus will launch wars of independence!\nThe monarchist armies in Siberia will launch a civil war to overthrow the Soviet regime!\nThe republican armies in southern Russia will launch a civil war to overthrow the Soviet regime!"
 complete_july_revolution:0 "The civil war has ended, and the Soviet regime has consolidated its rule.\nAt least all anti-Soviet forces except Poland, Estonia, Lithuania, and Latvia have been defeated."
 rus_civil_war_start_tt:0 "The civil war has begun"

 first_five_years_plan:0 "First Five-Year Plan"
 first_five_years_plan_reason:0 "Although our agricultural technology level remains low, agriculture still holds a paramount position in the entire economy of [ROOT.GetCountry.GetName].\n\nThe duration of agriculture's dominant position in the [concept_country] economy depends not only on domestic economic achievements but also on the development progress abroad. Therefore, in assessing each step, we must not forget or ignore the fact that agriculture occupies a dominant position for even a minute.\n\nIn our overall economic structure, the recovery of [concept_country] industry must be closely linked with agricultural development! Before the industry can make decisive progress, the necessary working capital must be obtained from agriculture, from the surplus agricultural products that exceed rural needs. Therefore, we must complete the reform of agriculture and thoroughly socialize the agriculture of [ROOT.GetCountry.GetName]."
 first_five_years_plan_gdp_tt:0 "GDP of at least 300M"
 first_five_years_plan_tt:0 "#bold Simultaneously be the main producer of #![SCOPE.sGoods('fertilizer_scope').GetName], [SCOPE.sGoods('tools_scope').GetName], and [SCOPE.sGoods('grain_scope').GetName]"
 first_five_years_status:0 "#bold Implement comprehensive reforms in agricultural production for the Soviet Motherland#!"
 first_five_years_plan_goal:0 "nan"
 second_five_years_plan:0 "Second Five-Year Plan"
 second_five_years_plan_reason:0 "Only with the true development of industrial enterprises, the restoration of heavy industry as the sole solid foundation of the [GetLawType('law_council_republic').GetName], and the actual completion of railway construction work, can the proportion of agriculture in the entire [concept_country] economy change, and it must change, with the center of gravity shifting from agriculture to industry.\n\nThe party should systematically, resolutely, and with all efforts and sacrifices, strive to develop industry and heavy industry as quickly as possible and accelerate this process. Only an industry that produces more than it consumes can be victorious. Relying on the budget, that is, an industry that depends on agriculture for survival, cannot establish a long-term stable pillar for the proletarian dictatorship.\n\nTherefore, the issue of creating surplus value in the national industry is a matter of the fate of [ROOT.GetCountry.GetName] and the fate of the proletariat. Thus, we must develop the domestic industry."
 second_five_years_plan_gdp_tt:0 "GDP of at least 600M"
 second_five_years_plan_tt:0 "#bold Simultaneously be the main producer of #![SCOPE.sGoods('steel_scope').GetName], [SCOPE.sGoods('coal_scope').GetName], and [SCOPE.sGoods('iron_scope').GetName]"
 second_five_years_status:0 "#bold Achieve the transformation of the Soviet Motherland from an agricultural country to an industrial country#!"
 second_five_years_plan_goal:0 "nan"
 third_five_years_plan:0 "Third Five-Year Plan"
 third_five_years_plan_reason:0 "The necessary conditions for the revitalization and development of industry, especially heavy industry, are the proper reorganization of [concept_country] [concept_tax] to align with the actual reserves of the state and the implementation of planned expenditures.\n\nThe success of the first two five-year plans has demonstrated one thing: there is no fortress that the Bolsheviks cannot conquer! We must continue to implement plans to significantly increase industrial production. Only through continuous struggle can we achieve a communist society.\n\nIf we do not completely end economic backwardness, advanced countries will crush us. We must achieve a thorough dominant position in industrial production!"
 third_five_years_plan_gdp_tt:0 "GDP of at least 1B"
 third_five_years_plan_tt:0 "#bold Simultaneously be the main producer of #![SCOPE.sGoods('ammunition_scope').GetName], [SCOPE.sGoods('artillery_scope').GetName], [SCOPE.sGoods('small_arms_scope').GetName], and [SCOPE.sGoods('electricity_scope').GetName]"
 third_five_years_status:0 "#bold Build the Soviet Union into a powerful industrial nation#!"
 third_five_years_plan_goal:0 "nan"
 reform_red_army:0 "Reform the Soviet Red Army"
 reform_red_army_reason:0 "The sacred mission of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] is to defend the poor people from oppression by the rich; this is what sets our army apart from all others in the world. However, not everyone understands this. There are still many backward, ignorant, and oppressed people who do not know what the Red Army is or why it exists.\n\nNow, the most important task for our #v $soldiers$#! comrades is to make everyone understand this and, more importantly, to prove it in practice: every poor peasant, every worker, every housewife, every homeless elderly person, and every helpless orphan will regard the Red Army as their own defender.\n\nAll honest working people are one big family, regardless of the language they speak or where their fathers worship. All oppressors, exploiters, parasites, and aggressors, regardless of nationality, are enemies of the working people and the revolutionary Red Army!\n\nThe [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] must bravely and gloriously defend the rights of the poor and become the most reliable red revolutionary force of the proletarian dictatorship."
 reform_red_army_status:0 "Reform the Red Army into a force absolutely loyal to the Party"
 ukrian_holodomor:0 "Ukrainian Holodomor"
 ukrian_holodomor_reason:0 "The harsh surplus appropriation policies of [GetLawType('law_collectivized_agriculture').GetName] and the drought sweeping across [ROOT.GetCountry.GetName] ultimately destroyed agricultural production in Ukraine. Terrible crop failures and severe famines spread across the most fertile black soil regions of [ROOT.GetCountry.GetName], with famine, cold, and terror filling both banks of the Dnieper River.\n\nThe General Secretary of Ukraine and people's representatives have petitioned the central [concept_government] in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], hoping that the Party Central Committee will take special measures to address this issue."
 angry_ukriane_tt:0 "Ukraine will henceforth become an enemy of the Soviets!"
 better_ukriane_famine:0 "Ukraine will receive better relief and avoid anger towards the Soviets."
 new_economy_policy:0 "New Economic Policy"
 new_economy_policy_reason:0 "We have not yet reached the stage of entering socialism. All past experiences have proven that the ideal [GetLawType('law_command_economy').GetName] cannot be subjectively designed through reasoning or bureaucratic methods.\n\nThe true socialist [GetLawType('law_command_economy').GetName], which includes all industrial sectors and the interrelationships between different industrial sectors as well as the relationship between the entire industry and the entire agriculture, can only be determined on the basis of nationalization, with continuous efforts to practically coordinate the work of various economic sectors and correctly evaluate their results, after long-term preparation and management experience.\n\nThe lack of regulation in economic chaos and difficulties has seriously harmed [ROOT.GetCountry.GetName]. We still need to maintain a certain level of free market and capitalist economic policies controlled by the [concept_country], allowing private enterprises and private profits to recover.\n\nTo achieve socialism, we must create the material prerequisites for modernization and industrial development that are lacking, and establish a [concept_country] capitalist plan under central supervision and market influence to ensure the healthy economic development of our country."
 new_economy_policy_status:0 "Controversy over the current economic policy still exists"

 reform_obshchina:0 "Mir System"
 reform_obshchina_reason:0 "The #variable Mir system#!, rooted in the lands of Eastern Europe since ancient times, is a unique way of life in [ROOT.GetCountry.GetName]: #v $farmers$#! form united communities based on blood and geographical ties. A community can include multiple villages, and land ownership belongs to the Mir rather than individuals. #v $farmers$#! have the right to use the land but cannot freely dispose of it.\n\nOver a long period, God's lambs have worked diligently in their homelands in this ancient and traditional way to serve the #v $aristocrats$#! and the lords of all [ROOT.GetCountry.GetName]: #variable [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] Your Majesty#!.\n\nHowever, the #v $farmers$#! in the Mir system lack the economic ability to leave the old land. The family-based collective ownership gives too much authority to the controllers in the Mir, which further hinders the governance of the local areas by the #V [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] [concept_government]#!. At the same time, the primitive communal system has led to a continuous growth of radical sentiments among the #v $farmers$#!, who seek to freely control their own land.\n\nMeanwhile, the development of our cities is also seeking more new [concept_pop] to work in new workshops and factories rather than continuing to stay in inefficient land. Perhaps at some necessary moment in the future, the Mir system will have to be abolished by us?"
 reform_obshchina_on_complete_tt:0 "All #O states#! with #tooltippable;tooltip:[GetPlayer.GetTooltipTag],reform_obshchina_modifier_1_effect_tt $is_reforming_obshchina$#! will undergo reform and establish #tooltippable;tooltip:[GetPlayer.GetTooltipTag],reform_obshchina_modifier_2_effect_tt $reformed_obshchina$#!."
 reform_obshchina_modifier_1_effect_tt:0 "[GetStaticModifier('is_reforming_obshchina').GetName|v]\n[GetStaticModifier('is_reforming_obshchina').GetDesc]"
 reform_obshchina_modifier_2_effect_tt:0 "[GetStaticModifier('reformed_obshchina').GetName|v]\n[GetStaticModifier('reformed_obshchina').GetDesc]"

 russia_company_vodka_monopoly_character:0 "State-Owned Vodka"
 russia_company_vodka_monopoly_character_reason:0 "@liquor!#V Vodka#!#B has been the most popular and essential alcoholic beverage of the [SCOPE.sCulture('russian_scope').GetName] people since the 15th century#!: It is strong and burning, yet it brings warmth to the people; it is colorless and transparent, yet it brings courage to the people. In fact, #B the enthusiasm for @liquor!#V Vodka#! itself is a manifestation of the unique lifestyle and resilient national character of [ROOT.GetCountry.GetName]#!.\n\n#B In the mid-16th century#!, #V Tsar Ivan IV [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#! established a decree for the #V state monopoly on vodka#! sales throughout Russia. It was included in the tax code and a special 'drunkard tax' was levied. It was listed as a state-run enterprise and became an extension of the power of the #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName][concept_government]#! among the people. To this day, with the long rule of the [ROOT.GetCountry.GetRuler.GetLastName], this official monopoly system has been increasingly perfected, creating considerable profits for the state.\n\nHowever, this measure undoubtedly also #B harms the efficiency and interests of more private [concept_company] in conducting alcohol sales within our borders, and even further hinders the free circulation of the [ROOT.GetCountry.GetName] market: If economic policies shift, this monopoly may very well have to be abolished.#!"

 moscow_industrialize:0 "The Greatest of Cities"
 moscow_industrialize_reason:0 "Since #B Napoleon’s Grande Armée#! was forced into retreat from #V Moscow#! and nearly annihilated by our harsh winter, the city had already undergone reconstruction by 1815. Yet now, the #B filth and stench of refuse, alongside the squalor and chaos of [ROOT.GetCountry.GetName]’s lower classes, coming fresh from their farms, threaten to tarnish the city’s prestige#!. Meanwhile, as new technologies flourish and European cities prosper, Moscow’s outdated layout and once-protective walls have become obsolete, even #B stifling its growth#!.\n\nWe must rebuild and expand #V Moscow#!, integrating it with its hinterlands through #V grand boulevards and squares#! to impose order upon its streets and citizens. With #B electrified districts, streamlined administration, and a web of railways and roads#!, we shall forge a truly prosperous, orderly, and sleepless metropolis—one that will cement #V Moscow#! as #B Europe’s, if not the world’s, most illustrious capital#!."
 moscow_industrialize_status:0 "Transform Moscow into Europe’s most illustrious metropolis"
 petersburg_industrialize:0 "Expand St. Petersburg"
 petersburg_industrialize_reason:0 "Ever since #B Peter the Great#! founded #V St. Petersburg#! on the banks of the Neva, this Baltic port has served as [ROOT.GetCountry.GetName]’s gateway to Western trade and modernity. Now, with the abolition of [GetLawType('law_serfdom').GetName], waves of former serfs flood into the city, spawning slums on its outskirts and leaving #B its infrastructure strained beyond capacity#!.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] decrees that we must radically expand #V St. Petersburg#!: widening its #B port and riverfront#!, erecting #B modern factories#! to replace backward workshops, and weaving #B railways and canals#! into its fabric. The slums must be cleared and absorbed into a new urban core, ensuring the city remains the engine of [ROOT.GetCountry.GetName]’s industrial and commercial ascent."
 petersburg_industrialize_status:0 "Forge St. Petersburg into a modern industrial hub"
 ukraine_industrialize:0 "Industrialize Ukraine"
 ukraine_industrialize_reason:0 "#V Ukraine#! has long been the fertile breadbasket of [ROOT.GetCountry.GetName]’s south. Prospectors have now revealed the #B Donets Basin#!’s coal and the #B Kryvyi Rih#! iron deposits, uncovering the land’s #V untapped industrial might#!. Still, these riches remain scattered, unable to rival the industrial heartlands of Europe’s [concept_great_power]s.\n\nThus, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the [concept_government] have resolved to thrust #V Ukraine#! into the industrial age: #B linking mines and cities by rail, replacing archaic agrarian communes with steel mills and mining towns#!. Let this #V black earth of the East#! become the #V crown jewel of [ROOT.GetCountry.GetName]’s industrial might#!."
 ukraine_industrialize_status:0 "Make Ukraine the empire’s workshop"
 je_circassian_expulsions_filter_tt:0 "[concept_strategic_region]是#O 高加索#!"
