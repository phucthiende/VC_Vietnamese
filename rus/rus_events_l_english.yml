l_english:

 russia_monarchy.1.b: "愿他长久统治！"
 joi_flavor_rus.1.t: "The Testament of Peter the Great"
 joi_flavor_rus.1.d: "A legacy from [ROOT.GetCountry.GetName]'s greatest emperor, #variable Peter I#, now passes into the hands of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]..."
 joi_flavor_rus.1.f: ""Keep [ROOT.GetCountry.GetName] in constant readiness for war, maintain a standing army, and perpetually strive to strengthen the state treasury and improve our military forces. Choose the most opportune moments to strike, securing Russia's interests, expansion, and prosperity... Employ all means to recruit Europe's brightest minds to serve our cause, benefiting Russia while weakening others without detriment to ourselves."\n\n"Seize as much territory from [SCOPE.sCountry('SWE_scope').GetName] as possible, provoking them to attack us and thus justify our conquest of Sweden. To this end, we must isolate Denmark from Sweden and foment discord between them... Prioritize alliances and trade with [SCOPE.sCountry('GBR_scope').GetName], establishing continuous exchange of goods and seamen to benefit our navigation and commerce... while expanding northward along the Baltic and southward along the Black Sea."\n\n"Press as close as possible to Constantinople and India - whoever rules these lands shall be the true master of the world. Therefore, instigate border conflicts not only with the Turks but also with Persia."\n\n"And when #bold Sweden is dismembered, Persia crushed, Poland destroyed, and Turkey conquered#, when our armies have joined forces and our fleets guard both the Black and Baltic Seas - then we must secretly propose to Versailles first, then to Vienna, that we divide the global empire between us."\n\n"We must #bold incite them to quarrel and weaken each other#, then [ROOT.GetCountry.GetName] shall seize the decisive moment to invade France from one side and Germany from the other. With these two powers subdued, the rest of Europe will fall effortlessly under our dominion.#!""
 joi_flavor_rus.1.a: "In obedience to our late Emperor's will, we shall dominate the world!"

 joi_flavor_rus.2.t: "The Third Rome"
 joi_flavor_rus.2.d: "In the year 467 AD, the great Roman Empire transferred its seat to Constantinople; now the imperial mantle passes again, and a new sovereign shall be crowned in Tsargrad as Emperor of the Roman People and Senate."
 joi_flavor_rus.2.f: ""I wish to address our most eminent and exalted ruler of the Orthodox Empire...\nAll who love Christ and God know that all Christian empires must perish, and then our state shall inherit their mantle, as prophesied: that empire is the Russian Empire."\n"Two Romes have fallen, but the third stands, and there shall be no fourth - this shall be the eternal Rome... She shall replace the chaotic struggle of nations with a new Pax Romana across the world.""
 joi_flavor_rus.2.a: "We are the true heirs of Rome!"

 joi_flavor_rus.3.t: "The Burned Testament"
 joi_flavor_rus.3.d: "The fireplace crackled as documents were fed into the flames, wisps of dark smoke curling upwards..."
 joi_flavor_rus.3.f: "#bold From 1724 onward#, his decline became evident. His ceaseless toil, burning the midnight oil, worsened his condition and hastened his demise.\nHis deteriorating health seemed destined to claim him soon. Feverish delirium gripped him almost continuously. In rare moments of lucidity, he attempted to #bold write something#! But his hand could only produce illegible scrawls. Among them, one could barely discern the Russian words: #bold 'Give everything to...'#!\nHe summoned #bold Princess Anna Petrovna# to take dictation, but when she arrived at his bedside, speech had abandoned him.\nFor sixteen hours he lingered. #bold Empress Catherine# kept vigil at his bedside for three days and nights without rest. #bold At approximately 4 AM on January 28th, he expired in her arms.#!"
 joi_flavor_rus.3.a: "Testament? What testament?"

 joi_flavor_rus.4.t: "[ROOT.GetCountry.GetName]'s Great Steppe"
 joi_flavor_rus.4.d: "With the conquest of Central Asian khanates and new border treaties signed with [SCOPE.sCountry('CHI_scope').GetName], we have finally eliminated our nomadic foes of centuries past..."
 joi_flavor_rus.4.f: "Our troops deployed along the frontier send [SCOPE.sCountry('CHI_scope').GetName] an unmistakable message: we stand ready to enforce our demands by arms if necessary. This deployment violates no international law - all forces remain on lands inhabited by Kyrgyz subjects of [ROOT.GetCountry.GetName], under strict orders to be prepared to cross demarcation lines at any moment."
 joi_flavor_rus.4.a: "The steppe shall submit to imperial rule."
 joi_flavor_rus.4.b: "Perhaps appointing a reliable Viceroy would better govern Central Asia."

 joi_flavor_rus.5.t: "Tatar Resurgence"
 joi_flavor_rus.5.d: "The Tatars' seizure of former [ROOT.GetCountry.GetName] territories in Kazakhstan has awakened ancestral fears among our people..."
 joi_flavor_rus.5.f: ""Then he sent the fierce Dorbei to attack Merv, conquering peoples between Iraq and the Indus. The brave Subutai marched north, defeating eleven kingdoms and tribes, crossing the Volga and Ural rivers, until finally making war on Kiev..."\n"As before, those vampiric envoys came saying 'Make peace with us.' But he refused, for as the prophet said: 'Glorious war surpasses shameful peace.' These heathens and their deceitful peace would bring great terror to our lands, for they have already wrought much evil here...""
 joi_flavor_rus.5.a: "Again?!"

 joi_flavor_rus.6.t: "[ROOT.GetCountry.GetName]'s Anatolia"
 joi_flavor_rus.6.d: "With [ROOT.GetCountry.GetName]'s conquests in Anatolia, the Black Sea has become our inland sea."
 joi_flavor_rus.6.f: "Our great Slavic people have triumphed against [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('FRA_scope').GetName]'s interference. Through our loyal, brave, and disciplined soldiers, we've conquered vast Turkish territories. Now we shall purify these lands, expelling the inferior Turkic infidels from this fertile soil.\nMore importantly, we advance our sacred mission to restore Orthodox Rome while completing our dominion over the Black Sea. The next objective: Tsargrad!"
 joi_flavor_rus.6.a: "The Turkish lands are ours!"

 joi_flavor_rus.7.t: "Treaty of Paris"
 joi_flavor_rus.7.d: "The sovereigns of belligerent nations... desiring to end the calamities of war... have agreed with His Majesty... [SCOPE.sCountry('GBR_scope').GetName]'s monarch establishes this foundation to rebuild peace, guaranteeing [SCOPE.sCountry('TUR_scope').GetName]'s independence and territorial integrity..."
 joi_flavor_rus.7.f: "VII. The Sublime Porte acknowledges the advantages of participating in public law and the European concert, with all parties pledging to respect [SCOPE.sCountry('TUR_scope').GetName]'s independence and territorial integrity...\nXI. The Black Sea is neutralized: open to all commercial vessels, its waters and ports permanently closed to warships of coastal or other nations...\nXIII. As per Article XI, maintaining naval arsenals along the neutral Black Sea becomes unnecessary. Therefore [ROOT.GetCountry.GetName] and His Sultanic Majesty undertake to establish no such military installations...\nXXX. [ROOT.GetCountry.GetName]'s [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and His Sultanic Majesty maintain their Asian territories as before the conflict...\nXXXIV. This treaty shall be ratified within four weeks or sooner, with ratifications exchanged in Paris.\nDone at Paris, signed and sealed by the plenipotentiaries."
 joi_flavor_rus.7.a: "God have mercy!"

 joi_flavor_rus.8.t: "Triumph in Persia"
 joi_flavor_rus.8.d: "Through successive campaigns by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], Persia has been incorporated into our great motherland [ROOT.GetCountry.GetName]."
 joi_flavor_rus.8.f: "Since hostilities began, countless [ROOT.GetCountry.GetName] sons have watered Persian soil with their blood. Now we shall dispatch our brave soldiers to Mashriq, extending our influence in the Middle East. More crucially, Persia's conquest threatens Britain's crown jewel - India.\nOnce we strengthen our forces, we shall march into India, liberating its people from [SCOPE.sCountry('GBR_scope').GetName]'s hypocritical yoke."
 joi_flavor_rus.8.a: "The first to scale the Zagros Mountains shall be made Count!"

 joi_flavor_rus.9.t: "Persian Debacle"
 joi_flavor_rus.9.d: "Facing threats from European powers, [ROOT.GetCountry.GetName] must withdraw from Persia to focus on European conflicts..."
 joi_flavor_rus.9.f: "Peter's coffin trembles with rage! That such a feeble enemy could rout the great Russian army? Shame! Utter shame! But we shall regroup - the Cossack cavalry will ride across the Iranian plateau again!"
 joi_flavor_rus.9.a: "Persia, how beautiful you are..."

 joi_flavor_rus.10.t: "Far Eastern Frontier"
 joi_flavor_rus.10.d: "After grueling campaigns, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has led his people to claim long-coveted northern Chinese territories"
 joi_flavor_rus.10.f: ""I, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], proudly declare to Peter the Great and Catherine the Great:\nI have fulfilled our ancestors' will - the shameful Treaty of Nerchinsk is but scrap paper!\nHenceforth Russian ships shall sail unimpeded on the Amur, our navy shall gaze eastward from Vladivostok, and ultimately upon the world!""
 joi_flavor_rus.10.a: "Onward march!"

 joi_flavor_rus.11.t: "Treaty of Transbaikalia"
 joi_flavor_rus.11.d: "As [ROOT.GetCountry.GetName] declines on the world stage, our Far Eastern interests are gradually supplanted..."
 joi_flavor_rus.11.f: "Our defeat has cost us control over Far Eastern territories. Reports flood [ROOT.GetCountry.GetRuler.GetFirstName]'s desk - Chinese troops prowl near our remaining strongholds. The Siberian Governor, fearing for his safety, has resigned. Panic grips all Siberia..."
 joi_flavor_rus.11.a: "I, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], shall return!"

 joi_flavor_rus.12.t: "Victory Parade in Kraków"
 joi_flavor_rus.12.d: "In the name of the Most Holy and Indivisible Trinity, I, [ROOT.GetCountry.GetRuler.GetFirstName], Autocrat of All Russia, salute our descendants, heirs, and the Russian government"
 joi_flavor_rus.12.f: "Troops parade through Kraków's streets celebrating their great victory. The Vienna Congress' restrictions on [ROOT.GetCountry.GetName] lie broken. Lands Empress Maria Theresa once took from Poland now return to their rightful owner: Mother [ROOT.GetCountry.GetName].\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] vows this marks the beginning of a Greater Slavic Empire - the dream of Russian rulers past."
 joi_flavor_rus.12.a: "For Mother [ROOT.GetCountry.GetName] - Hurrah!"

 joi_flavor_rus.13.t: "The Treaty of Kiev"
 joi_flavor_rus.13.d: "Militarily indefensible, economically unsustainable... such is the humiliation borne by this accord."
 joi_flavor_rus.13.f: "Article I: [ROOT.GetCountry.GetRuler.GetFirstName] renounces all rights and claims to territories west of the boundary defined in Article II...\nArticle IV: Likewise, Ukraine and White Ruthenia renounce all rights and claims to territories east of said boundary...\nArticle IX: The signatory powers pledge to respect each other's political sovereignty in all matters, abstaining from interference in internal affairs—particularly agitation, propaganda, or subversion—and shall discourage such acts by third parties.\nSigned and sealed by plenipotentiaries at Kiev."
 joi_flavor_rus.13.a: "Cursed imperialist expansion, ruining our Eastern European homeland!"

 joi_flavor_rus.14.t: "The Throne of the North"
 joi_flavor_rus.14.d: "In a continuation of the Great Northern War, [ROOT.GetCountry.GetName] has replicated Peter the Great's victories—surpassing them by securing dominion over all Scandinavia."
 joi_flavor_rus.14.f: "Raise our voice, and the Nordics may yield. If they resist, fire a shot—they will surely raise their hands in surrender... So we believed. We did not anticipate war, only their submission to our demands...\n#bold Some ask#!, do we have legal or moral justification for action against the North? Legally, none. But morally, from our perspective, self-preservation justifies all.#!"
 joi_flavor_rus.14.a: "Another glorious triumph for the Motherland!"

 joi_flavor_rus.15.t: "Treaty of Moscow"
 joi_flavor_rus.15.d: "Defeat in the northern war has compelled the belligerents to sign a peace treaty in the old capital..."
 joi_flavor_rus.15.f: "The governments of the Nordic kingdoms and the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName], desiring to end hostilities and establish lasting peace while securing mutual guarantees, hereby agree:\nThe security of St. Petersburg, Murmansk, and its railway is declared a shared interest, necessitating this treaty...\nHostilities shall cease immediately per the annexed protocol...\nA joint commission shall delineate borders within ten days of signing."
 joi_flavor_rus.15.a: "Who cares about Finland?"

 joi_flavor_rus.16.t: "Tsargrad"
 joi_flavor_rus.16.d: "Constantinople—the city once craved by the world—now belongs to [ROOT.GetCountry.GetName] as Tsargrad."
 joi_flavor_rus.16.f: "You shall return like lightning, while the nation feasts,\nSea, land, and sky ablaze beneath your strike.\nClad in white, I’ll touch you once more—\nYour light, my heart, how I adore!\nKing of Kings, aid our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle],\nShow mercy, Heaven’s God, to [ROOT.GetCountry.GetRuler.GetFirstName],\nBy God’s grace, Emperor of the Romans!\nAt Saint Romanus’ Gate, Queen of Cities stands,\nA saber, a spear, the key to Rome’s domains...\nThe Virgin fell silent, shedding no tears,\nYet someday, this city shall again be yours."
 joi_flavor_rus.16.a: "One crown, one [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], one Rome!"

 joi_flavor_rus.17.t: "Gardens of Babylon"
 joi_flavor_rus.17.d: "The capture of Babylon has sent [ROOT.GetCountry.GetName]’s archaeologists into a frenzy..."
 joi_flavor_rus.17.f: "He uncovered treasures, pierced the veiled dark,\nRaised Uruk’s walls with ramparts ringed.\nEanna’s vault? A lesser work—\nBehold the outer sheen, bright as copper!\nThe inner walls, beyond compare.\nStep past its ancient threshold, worn by time,\nTo Ishtar’s Eanna, peerless in its prime.\nClimb Uruk’s battlements, walk its length,\nTest the bricks—forged in fire’s strength!\nThe foundations? Laid by the Seven Sages’ hand."
 joi_flavor_rus.17.a: "The myths, it seems, were somewhat exaggerated."

 joi_flavor_rus.18.t: "At the Gates of India"
 joi_flavor_rus.18.d: "With Afghanistan and Persia fallen, India now lies within [ROOT.GetCountry.GetName]’s grasp."
 joi_flavor_rus.18.f: "India... jewel of the crown. Your fertile soil,廉价 labor, spices, and gems haunt the dreams of our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\nNow, our Cossacks will ford the Indus, seizing Britain’s riches. With blood and steel, we’ll pluck the pearl from the English crown!"
 joi_flavor_rus.18.a: "Onward, onward!"

 joi_flavor_rus.19.t: "Chinese Administration"
 joi_flavor_rus.19.d: "Across the Amur, over the Greater Khingan—our conquests at last bring us to the long-coveted warmth of China."
 joi_flavor_rus.19.f: "For centuries, since we crossed the frozen Urals, this ancient land grew nearer through our explorers’ daring.\nNow, northern China’s cities fall under our rule. We Russians shall govern with Mongol fury, squeezing every drop of value from this land—as they once did to us!"
 joi_flavor_rus.19.a: "Direct rule over China!"
 joi_flavor_rus.19.b: "Perhaps a viceroy in Peking would suffice."

 joi_flavor_rus.20.t: "Pacific Port"
 joi_flavor_rus.20.d: "A generation’s toil has transformed the Far East into a land of promise."
 joi_flavor_rus.20.f: "When we arrived, this was a desolate fishing village—no proper port, no shipyard, not a single warship.\nNow? Behold! The finest harbor in the Orient, the largest fleet, the busiest trade hub in Northeast Asia. What glory!\nFrom here, [ROOT.GetCountry.GetName] will conquer Asia... and one day, the world!"
 joi_flavor_rus.20.a: "Its name shall be Vladivostok—'Rule the East'!"

 joi_flavor_rus.21.t: "The Great Reformer"
 joi_flavor_rus.21.d: "Through the modernization reforms spearheaded by [ROOT.GetCountry.GetRuler.GetFirstName], [ROOT.GetCountry.GetName] grows stronger daily - Russia may once again dictate the world order."
 joi_flavor_rus.21.f: "Before [ROOT.GetCountry.GetRuler.GetFirstName]'s reign, [ROOT.GetCountry.GetName] was but a feeble giant: its army equipped with outdated arms, its soldiers illiterate; its fields worked by serfs crushed under feudal oppression; its government paralyzed by archaic institutions, bringing the empire to the brink of collapse.\n\nYet through sweeping reforms, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s army has been reborn as Europe's gendarme; millions of serfs liberated to fuel industrial growth; the bureaucracy streamlined to execute the sovereign's will with newfound efficiency."
 joi_flavor_rus.21.a: "God save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName]!"

 joi_flavor_rus.22.t: "The Russian Menace Grows"
 joi_flavor_rus.22.d: "Britain's Indian interests erode before the Russian onslaught..."
 joi_flavor_rus.22.f: ""Were Russia to sincerely accept our right to peaceful possession of Asian territories, no British government would oppose Russian policy in Europe. Indeed, we urgently need to reestablish Russia's proper place in the European concert...""
 joi_flavor_rus.22.a: "Terrifying!"

 joi_flavor_rus.23.t: "Government Collapse"
 joi_flavor_rus.23.d: "Despite the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s efforts, [ROOT.GetCountry.GetName]'s reforms have crumbled to dust."
 joi_flavor_rus.23.f: "Abroad, Swedish revanchism stirs in the North; Ottoman forces match our armies in the Near East; our Far Eastern troops cannot best even the Chinese.\nAt home, Ukrainian serfs cry for emancipation; the #v $bureaucrats$#! wallow in corruption; the army neglects its duty for debauchery...\nWhen will our Slavic motherland regain her former glory?"
 joi_flavor_rus.23.a: "Nothing to report today..."

 joi_flavor_rus.24.t: "First Duma Assembly"
 joi_flavor_rus.24.d: "Through sweeping reforms, [ROOT.GetCountry.GetName]'s legal system now rivals advanced nations, establishing a new political order."
 joi_flavor_rus.24.f: ""Order! This assembly desires power-sharing and administrative reform—our party leaders recently convened in Moscow to..."\n"Mr. Speaker! Does not the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s sanctioned public will demand we follow the Constitutional Manifesto?"\n"Sir, the political reality means tremendous pressure from within and without..."\n"Would you then agree dismantling institutions is our best defense?"\n"Gentlemen! Our duty lies not in debate but legislation—only through proper governance may we resolve the nation's affairs!""
 joi_flavor_rus.24.a: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall form a loyal Duma!"
 joi_flavor_rus.24.b: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall authorize a constitutional Duma!"
 joi_flavor_rus.24.c: "Clearly, there still exists a third path among them..."

 joi_flavor_rus.25.t: "The Russian Threat Recedes"
 joi_flavor_rus.25.d: "With Russia's South Asian ambitions broken, the Great Game reaches its conclusion..."
 joi_flavor_rus.25.f: "Had London exercised its power wisely—helping Russia secure her due in Persia, obtaining Uzbek reparations, compelling the Bukhara Emir to justice—why then, we might have played the noble role befitting Christendom's eldest daughter!\nInstead we snarl like beasts, hating yet fearing war."
 joi_flavor_rus.25.a: "Rule, Britannia!"

 joi_flavor_rus.26.t: "Condemnation of the Exile System"
 joi_flavor_rus.26.d: "Publications exposing the exile system's brutality have stirred public outrage across [ROOT.GetCountry.GetName]."
 joi_flavor_rus.26.f: ""Beyond these walls lies freedom's light—but within, men deem it fantasy.\nThis is a world apart, governed by its own vile laws. I shall document this Dead House where:\nSummer brings unbearable heat; winter, unbearable cold. Floors rot under centimeters of filth.\nFrosted windows block all light for reading. Ceilings drip, smoke chokes. We pack like herrings in barrels...""
 joi_flavor_rus.26.a: "Arrest these rabble-rousers for Siberian exile!"
 joi_flavor_rus.26.b: "Our merciful [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] acknowledges: the exile system requires reform."

 joi_flavor_rus.27.t: "French Delegation Arrives"
 joi_flavor_rus.27.d: "Marking Franco-Russian friendship, a diplomatic mission from [SCOPE.sCountry('FRA_scope').GetName] arrives at Paris's behest."
 joi_flavor_rus.27.f: ""The European situation necessitates renewed consultation between our governments regarding:\nMutual defensive measures should either face aggression.\nJoint commitment to peace through combined strength.""
 joi_flavor_rus.27.a: "Welcome our French friends!"

 joi_flavor_rus.28.t: "The German Question"
 joi_flavor_rus.28.d: "Proposals regarding Germany flood the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s desk."
 joi_flavor_rus.28.f: ""Political geography knows no true Germany—only German-speaking principalities ruled by sovereigns with full state apparatus. Yet beneath flows a current toward national unity under one banner.\nThe dichotomy is clear: progressive national interests versus reactionary dynastic ones. Prussia embodies the German spirit; Austria cannot.\nThis is no constitutional matter, but one of raw power.""
 joi_flavor_rus.28.a: "Hail the victor's laurels!"
 joi_flavor_rus.28.b: "A toast to friendship!"

 joi_flavor_rus.29.t: "Russian Civil War!"
 joi_flavor_rus.29.d: "Years of turmoil culminate on [TimeKeeper.GetCurrentDate.Format('d, m, y')], as #R Bolshevik Red Guards#! storm the Winter Palace, abolish the monarchy, and proclaim a #R Soviet Republic#!."
 joi_flavor_rus.29.f: ""#bold Comrades!#! Look around you—see the peasant revolts the Tsar sends troops to crush! See the alliance of crown, landlords, and officers!\nSoviet power will declare all land public property!\n\nThe Tsar begs your 'patience'—#bold patience while he massacres peasants!#!\nRemember his 'promise' of a Constituent Assembly? #bold Another lie!#!\nWho trusts the Tsar #bold betrays the people!#!\n\n#bold Down with the exploiter regime! All power to the Soviets!#!""
 joi_flavor_rus.29.a: "Long live the revolution!"
 joi_flavor_rus.30.t: "Whites Defeated"
 joi_flavor_rus.30.d: "With the Siberian and Southern anti-communist governments crushed, anarchist allies destroyed, and Central Asian separatists eliminated, the monarchists finally surrender at the Amur."
 joi_flavor_rus.30.f: ""Comrades! We've secured peace—harsh and unstable—to focus on socialism's great work: organizing planned production and distribution for millions.\nThis revolution requires the majority's creative participation. Only through the proletariat's consciousness, resolve, and sacrifice can victory be assured.""
 joi_flavor_rus.30.a: "Spare them for socialist reconstruction."
 joi_flavor_rus.30.b: "We must purge these traitors to secure Soviet rule!"

 joi_flavor_rus.31.t: "Holodomor!"
 joi_flavor_rus.31.d: "Collectivization's brutal quotas and drought have devastated Ukraine's agriculture, triggering catastrophic famine while Moscow continues grain requisitions."
 joi_flavor_rus.31.f: "Starvation grips [ROOT.GetCountry.GetName]'s fertile black earth region. Despite crop failures, armed requisition squads confiscate everything—grain, livestock, even pots and buckets—brandishing resistance as 'anti-socialist sabotage'.\nTransport links are severed; starving peasants attempting to flee are arrested as 'class enemies'. Ukraine's plea for reduced quotas is denied by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_rus.31.a: "What counter-revolutionary nonsense is this?!"

 joi_flavor_rus.32.t: "Lenin Returns"
 joi_flavor_rus.32.d: "Bolshevik leader Vladimir Lenin, arriving via German train, assumes revolutionary command."
 joi_flavor_rus.32.f: ""I hold a note: 'Your regime won't last—your skin will cover drums.'\nThe coward who wrote this dares not show his face!\nUnlike a dying man, a dying class leaves a rotting corpse—the bourgeoisie's stench infects us all!\nWe must ruthlessly eliminate these condemned traitors!\nLet the bourgeoisie rave! Let weaklings weep!\nWorkers—triple your vigilance! Remember:\n#bold Victory or death—no third path!#!""
 joi_flavor_rus.32.a: "Death to the class enemy!"

 joi_flavor_rus.33.t: "End of the Obshchina"
 joi_flavor_rus.33.d: "The #variable obshchina#! system is abolished under [ROOT.GetCountry.GetRuler.GetFirstName], with land redistribution sparking ownership debates."
 joi_flavor_rus.33.f: ""'By sweat shall you eat bread... till you return to the earth.'\nWe've slain the centuries-old obshchina that choked our people—a Goliath felled!\nNow [ROOT.GetCountry.GetName]'s fields may thrive. Will we:\nEncourage kulaks to consolidate advanced farms?\nOr redistribute land cheaply to impoverished peasants?""
 joi_flavor_rus.33.a: "Restore land to the peasants!"
 joi_flavor_rus.33.b: "Full privatization now!"

 joi_flavor_rus.34.t: "Mongolian Plebiscite"
 joi_flavor_rus.34.d: "The world watches as [ROOT.GetCountry.GetRuler.GetFirstName] deliberates over Mongolia's fate following its referendum."
 joi_flavor_rus.34.f: ""We hold Mongolia solely for strategic defense.\nOur people would never forgive its surrender.\nMight makes right—since you lack strength to resist, your protests are meaningless!\n[SCOPE.sCountry('CHI_scope').GetName] pledges to recognize Mongolian independence if the vote confirms this desire.""
 joi_flavor_rus.34.a: "With 88.48% voting to join, Mongolia is Russian!"
 joi_flavor_rus.34.b: "With 97% for independence, Mongolia shall be free!"
