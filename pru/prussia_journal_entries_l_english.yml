l_english:

 general_staff:0 "General Staff"
 general_staff_reason:0 "#bold Command Points#! are influenced by various #tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_advance positive#! and #tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_delete negative#! conditions.\n\n#variable The General Staff#! is the senior military institution in [ROOT.GetCountry.GetName][GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant], responsible for #bold planning and decision-making for [concept_war]#!. It serves as the model for contemporary General Staffs globally. The #bold rise#! and #bold development#! of the General Staff is #bold our army's greatest advantage#! against its opponents and the #variable primary reason our forces are formidable#! on the battlefield.\n\nFounded in #bold 1806#! by #bold General Scharnhorst#! and #bold Field Marshal Gneisenau#!, the #bold Prussian Staff#! was designed as the heart of the [concept_army], overseeing research into [concept_war], planning force mobility and campaigns, and drafting battle and [concept_mobilize_army] strategies. In #bold 1821#!, the appointment of #bold Baron Carl von Müffling#! as the first #bold Chief of the General Staff#! marked the formal establishment of the #bold General Staff#!.\n\nThe #bold training system of the General Staff#! isn't merely about producing competent officers—it's about powering [ROOT.GetCountry.GetName]'s war machine to ensure its army remains invincible.\n\nI am Prussian—do you know my colors?\nThe Prussian flag waves gallantly,\nThe Prussian eagle soars through the sky;\nThe Prussian flag leads to unmatched glory,\nThe Prussian sword points the path to victory;\nAnd under Prussia's brilliance,\nI shall stand steadfast like a rock and oak!"
 general_staff_status:0 "#bold The Chief of the General Staff and the Quartermaster-General command the General Staff.#!"
 general_staff_1_button:0 "Officer Rotation"
 general_staff_1_button_desc:0 "While staff officers theoretically serve for life, relying solely on those within the General Staff is insufficient to ensure our army acquires the latest tactical innovations and battle experiences. In our system, staff officers can rotate between field units and the General Staff, with their replacements promoted as junior officers gaining staff experience before becoming exceptional field commanders. Increasing this activity's frequency will further strengthen our army."
 general_staff_1_button_tt:0 "Cost: 25 #bold Command Points#!\nOne #bold Officer Rotation#! lasts for 5 years.\nCan only execute if no current #bold Officer Rotation#! is ongoing."
 general_staff_2_button:0 "Staff Plans"
 general_staff_2_button_desc:0 "Macro-level war planning is critical to victory. Departments within the General Staff possess ample geographical and operational data. They can be instructed to draft a viable plan addressing the current situation, capable of adapting to contingencies. To ensure execution, the General Staff will allocate resources nationally while also refining operational plans submitted by field commanders."
 general_staff_2_button_tt:0 "Cost: 50 #bold Command Points#!\nOne #bold Staff Plan#! lasts for 2 years.\nCan only execute if no current #bold Staff Plan#! is ongoing."
 general_staff_3_button:0 "Steadfast Defense"
 general_staff_3_button_desc:0 "When circumstances demand our army firmly hold frontline positions, the General Staff must draft a feasible defense plan and disseminate it to all commanders and soldiers, enabling them to execute steadfast orders strategically. Simultaneously, the General Staff will allocate resources to the frontline, stabilizing the defense."
 general_staff_3_button_tt:0 "Cost: 50 #bold Command Points#!\nOne #bold Steadfast Defense#! lasts for 12 months.\nCan only execute if no current #bold Steadfast Defense#! is ongoing."
 general_staff_4_button:0 "Forced Offensive"
 general_staff_4_button_desc:0 "When circumstances demand rapid advancement to seize advantages, the General Staff must draft a feasible offensive plan and disseminate it to all commanders and soldiers, enabling them to execute strategic breakthroughs. Simultaneously, the General Staff will allocate resources to sustain consecutive assaults."
 general_staff_4_button_tt:0 "Cost: 50 #bold Command Points#!\nOne #bold Forced Offensive#! lasts for 12 months.\nCan only execute if no current #bold Forced Offensive#! is ongoing."
 general_staff_5_button:0 "Total Mobilization"
 general_staff_5_button_desc:0 "The war has reached its most critical juncture. Any hesitation or restraint risks the interests of our great nation. For victory, the General Staff will be directed to mobilize the nation's full strength in service of the army—sparing no effort to secure triumph!"
 general_staff_5_button_tt:0 "Cost: 50 #bold Command Points#!\nOne #bold Total Mobilization#! lasts for 5 years.\nCan only execute if no current #bold Total Mobilization#! is ongoing.\nExcessive total mobilization disrupts our economic order!"
 general_staff_6_button:0 "War Authorization"
 general_staff_6_button_desc:0 "The ongoing war is grim. The General Staff has submitted a detailed document outlining concerns over the enemy and our strength balance, requesting the cabinet temporarily enact special authorization, transferring political powers to the Chief of the General Staff and the Quartermaster-General to maximize national potential for victory."
 general_staff_6_button_tt:0 "Cost: 100 #bold Command Points#!\nOne #bold War Authorization#! lasts for 5 years.\nCan only execute if no current #bold War Authorization#! is in effect.\nExcessive militarization undermines our political stability!"
 general_staff_tt_1:0 "The General Staff is the soul and core of our army, and maintaining a strong army is key to safeguarding our interests."
 general_staff_tt_2:0 "#bold Officer Rotation#! costs 25 #bold Command Points#!\n#bold Staff Plans#! costs 25 #bold Command Points#!\n#bold Steadfast Defense#! and #bold Forced Offensive#! each cost 50 #bold Command Points#!\n#bold Total Mobilization#! costs 50 #bold Command Points#!\n#bold War Authorization#! costs 100 #bold Command Points#!."
 general_staff_unlock_button_tt:0 "Complete the #bold Moltke Military Reform#! Journal."
 general_staff_tooltip_advance:0 "#bold The following situations increase 1 Command Point monthly#!:\n•#variable At war#!\n•#variable Enacting [GetLawType('law_professional_army').GetName]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_approval] >= 5#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_clout] = [concept_powerful]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] in the government#!\n•#variable Researched #bold Telegraph#!#!\n•#variable Engaging in Officer Rotation#!"
 general_staff_tooltip_delete:0 "#bold The following situations decrease 5 Command Points monthly#!:\n•#variable [concept_rank] < [concept_great_power]#!\n•#variable Not enacting [GetLawType('law_professional_army').GetName] or [GetLawType('law_mass_conscription').GetName]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_clout] = [concept_marginalized]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_approval] <= -5#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] not in the government#!"

 rhineland_industrialize:0 "Rhineland Industrialization"
 rhineland_industrialize_status:0 "Transform the resource-rich Rhineland into a true industrial area."
 rhineland_industrialize_reason:0 "The Rhineland, this territory allocated to [ROOT.GetCountry.GetName] after the Congress of Vienna, despite not bordering the core of our nation, has shown immense potential for industrial development due to the natural resources gradually extracted here.\n\nUnder the leadership of #bold Alfred Krupp#!, enterprises have submitted a proposal to the Berlin government, aiming to establish this area as a new industrial zone for our nation: however, this requires central support.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has instructed the government to prioritize this proposal to make the envisioned industrial district in the Rhineland a reality. The slowly flowing Rhine will become a new major economic pillar of our nation."
 rhineland_indu_tt_1:0 "Development in the Rhineland will bring us numerous benefits..."

 peussia_education:0 "Prussian Education Act"
 peussia_education_reason:0 "“While every student might not prove themselves to become an excellent craftsman, merchant, soldier, politician, they are still an honest individual and a good citizen. They should not disregard their personal occupation while seeking essential training, through which special skills for work can easily be acquired, always maintaining freedom.”\n\nThe Prussian education system is currently one of the most advanced in Europe and the world, thanks to the reforms driven by #bold Wilhelm von Humboldt#! in #bold 1810#!.\n\nImplemented for over a decade, the #bold 'Prussian Education Act'#! mandates that all citizens must undergo basic elementary education to prepare them for their future professions: technical education began being promoted, grammar schools offered classical secondary education, graduation exams were introduced between high schools and universities, and #variable Berlin University#! received substantial funding from the state treasury to advance academic research, attracting distinguished professors and scholars to serve her.\n\nHowever, the existing education system has its shortcomings, such as the lack of vocational technical training and financial assurances for students pursuing further studies. Advancing educational reform to create a #variable universal and mandatory#! system, accessible for all and promoting further education for all, is believed to bring tremendous benefits to our nation."
 peussia_education_tt_1:0 "New educational legislation will be enacted."

 peussia_army_reform:0 "Moltke Military Reforms"
 peussia_army_reform_status:0 "Military reforms led by #bold Helmuth von Moltke#! aim to eliminate certain obsolete aspects within [ROOT.GetCountry.GetName]'s army to make our nation stronger."
 peussia_army_reform_reason:0 "#variable Helmuth von Moltke#!, a disciple of #variable General Clausewitz#!, has presented a comprehensive set of reform ideas for [ROOT.GetCountry.GetName]'s army:\n\n1: #bold Reform the General Staff#!, greatly expanding its range of authority. During times of war, the General Staff should act as the supreme command's “sole advisor,” #bold devising strategies and tactics, coordinating military and material forces#!, and ensuring unified command over military actions.\n\n2: #bold Introduce new wartime technologies#!. Update military equipment on a large scale, #bold develop new powerful artillery, and incorporate railways and telegraphs for warfare#!. Expand railway construction extensively to accelerate army mobilization and deployment, ensuring efficient troop movement and support. Moltke believes: “Railways and telegraphs not only overcome past limitations of supply, season, and communication but also enable massive deployments of manpower and equipment to a battlefield in a short period, creating advantageous forces for strategic deployments.”\n\n3: #bold Train General Staff officers#! to execute new wartime plans. The command only prescribes strategic objectives to the army leaders, and the method of achieving these goals is left to their discretion, encouraging them to fully demonstrate initiative.\n\n4: #bold Intensify offensive tactics#!, “proactively considering politics, geography, and all aspects of the nation before action,” meticulously planning strategies in advance of wars, and adopting aggressive maneuvers once war commences.\n\nTo realize our ambitions, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] has made the decisive choice to adopt #bold Moltke#!'s suggestions and implement reforms as per his proposals."
 peussia_army_reform_tt_1:0 "Successful military reforms will unlock new #bold General Staff#! actions! Meanwhile, our army will also be strengthened."

 way_to_germany:0 "The Way to Germany"
 way_to_germany_reason:0 "“[ROOT.GetCountry.GetName]'s position in Germany depends not on its liberalism but on its strength... Prussia must concentrate its power and preserve it for the appropriate moment. This moment has come and gone several times. Since the treaties of Vienna, our boundaries have been poorly defined, undermining sound politics. Contemporary major issues cannot be resolved through speeches and majority resolutions but require #variable iron and blood#!.”\n\nThe ideal of German unification currently seems not far off: as long as victory in [concept_war] is achieved and we defeat our greatest obstacle [SCOPE.sCountry('AUS_scope').GetName], we can become the sole [concept_unification_candidate] and dissolve the German Confederation to truly unify Germany as a whole.\n\nHowever, Germany is not a fixed and unchanging territory—some argue that Germany should be enough with borders extending from Maas to Memel, while others insist on #variable military unification of the entire German Confederation#!.\n\nThe future path for [ROOT.GetCountry.GetName] remains obscured—what road should we ultimately take?"
 big_germany_tt:0 "We will gain claims to the entire German Confederation.\nBut this will ruin our future alliance possibilities with Austria."
 little_germany_tt_1:0 "We will gain claims to the German Confederation excluding Austria."
 little_germany_tt_2:0 "The Austro-German alliance will be available once we establish the German Empire."
 way_to_germany_1_tt:0 "Must exclude German [Concept('concept_unification_candidate', '$concept_unification_candidates$')] other than [GetPlayer.GetName]."
 way_to_germany_complete_tt:0 "奥地利不存在"


 prussian_union_of_churches:0 "Reform the Prussian Protestant Church"
 prussian_union_of_churches_reason:0 "The legacy of the Elector #V John Sigismund#! brought a substantial number of #B Calvinist#! adherents into the #yellow Margraviate of Brandenburg#!. Although they had long coexisted peacefully, since the Reformation the two [GetReligion('protestant').GetName] denominations of [ROOT.GetCountry.GetName]—#B Calvinists and Lutherans#!—have maintained separate ecclesiastical administrations. Following the #V Napoleonic Wars#!, #yellow Frederick William III#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], merged these institutions into the #B Ministry of Religious Affairs#! within the [concept_government], yet royal control over these confessions remains rather weak, particularly in regions distant from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nThe #V reforms of 1829#! abolished the distinct ecclesiastical titles of the #B Lutheran#! and #B Calvinist#! churches, renaming them collectively as [GetInterestGroupVariant('ig_devout',GetPlayer).GetName]. However, dissenters known as the #yellow \"Old Lutherans\"#! continue to persist across [ROOT.GetCountry.GetName], establishing their own clandestine Lutheran congregations, refusing to adopt the new liturgy mandated by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and #B openly defying the authority of the government in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!.\n\nIf the [concept_government] is to strengthen its control over the followers of [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], we must take measures to ensure their #B continued surveillance and arrest#!."
 event_joi_pru_6_b_tt:0 "1000 [GetCulture('north_german').GetName] [GetReligion('protestant').GetName] pops will migrate to #yellow Missouri#!\n1000 [GetCulture('north_german').GetName] [GetReligion('protestant').GetName] pops will migrate to #yellow South Australia#!"

 rheinische_homerule:0 "Rhenish Municipal Autonomy"
 rheinische_homerule_reason:0 "Since the #v Enlightenment Era#!, the constitutional relationship between municipal authorities and the state has long been a subject of debate. Many prevailing views among the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] hold that municipal authorities are not truly part of the central government, but rather a social phenomenon in their own right.\n\nThis divergence is particularly pronounced in #yellow the Rhineland#! under the rule of [ROOT.GetCountry.GetName]: #yellow the Rhineland#! possesses modern [concept_law], an advanced #O economy#!, and #O constitutional structures#!—legacies inherited from the period of rule by [SCOPE.sCountry('FRA_scope').GetName]—while the eastern provinces remain predominantly agrarian and estate-based. Although the #V Prussian Municipal Code of 1831#! formally incorporated the region into the judicial framework of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], in practice, #yellow the Rhineland#! has continued to retain a high degree of judicial and administrative autonomy.\n\nAs a vital industrial and urban center of [ROOT.GetCountry.GetName], [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] must now redefine the relationship between the municipal authorities of #yellow the Rhineland#! and the central government—whether by granting them #B statutory autonomy#! or by imposing #B stronger central control#!."
 rheinische_homerule_complete_tt:0 "The drafting of the new Code has been completed"
 rheinische_homerule_complete_3_tt:0 "Is experiencing or has experienced the #V Springtime of the Peoples#!"
 rheinische_homerule_complete_2_tt:0 "The #V Springtime of the Peoples#! has ended in #B Counter-Revolutionary Victory#!"
 rheinische_homerule_button:0 "Begin Drafting the Rheinische Städteordnung"
 rheinische_homerule_button_desc:0 "With the assistance of our cabinet ministers, we are now fully capable of drafting a new, dedicated code for the municipal authorities of the Rhineland to replace the outdated provisions of the Prussian Municipal Code of 1831. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] hopes to preserve certain traditional and reliable elements of social order within it, while ensuring that the region does not become a breeding ground for radicalism."
 rheinische_homerule_button_tt:0 "The drafting process has not yet begun\nThis project is expected to take 5 years to complete"
 deutsche_gemeindeordnung:0 "Unified Gemeindeordnung"
 deutsche_gemeindeordnung_reason:0 "Although the #B German states#! under [ROOT.GetCountry.GetName] have long since formed a unified nation, many traditions inherited from the eras of the #V Holy Roman Empire#! and the #V German Confederation#! continue to exert their influence—particularly in matters of the #B #L municipal codes#!#!. Much like the municipal delegates of the Confederation period, councillors still derive their authority from parties or local elections, leaving municipal governance in many regions operating outside the direct reach of the government in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nThe expansion of [ROOT.GetCountry.GetName]’s institutions and the demands of this age require us to thoroughly overhaul all #O municipal legislation#!, establish a #V unified administrative structure#!, clearly define the responsibilities of local authorities within their jurisdictions, and incorporate them into a single #V Imperial Code#! that shall apply across the entire [concept_country]."
 deutsche_gemeindeordnung_complete_tt:0 "Completed #V Integration of Municipal Laws across the German States#!"
 deutsche_gemeindeordnung_button:0 "Begin Integration of Municipal Laws"
 deutsche_gemeindeordnung_button_desc:0 "Within Germany there exist over 51,000 municipalities and countless inhabitants, governed by 66 distinct city and municipal codes enforced throughout the Empire. We can no longer tolerate such disunity—we must consolidate their customs into a single, unified legal framework."
 deutsche_gemeindeordnung_button_tt:0 "Integration has not yet begun\nThis process is expected to take 5 years"

 conservative_order_prussia:0 "The Conservative Order of Prussia"
 conservative_order_prussia_reason:0 "Although the #yellow Holy Roman Empire#! collapsed in #V 1806#! under the domination of #B Napoleon#!, the #O ancient laws#! and #o social customs#! of that imperial age—and the frameworks they created—continue to exert profound influence across the states of the #V German Confederation#!. The reactionary tide of the #B post-Napoleonic era#! calls for the restoration of these #B ancient and sacred traditions#! across 欧洲, and within [ROOT.GetCountry.GetName], such sentiments enjoy widespread support.\n\n[ROOT.GetCountry.GetRuler.GetFullName]—the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName]—seeks to restore the conservative order of the [concept_country] within what he perceives as a historically #O legitimate#! framework, opposing German liberalisation and ultimately re-establishing a medieval #V feudal bond of loyalty#! between monarch and people—whether through #B moderate reform#! or through #B an unyielding iron hand#!."
 conservative_order_prussia_complete_1_tt:0 "Completed 3 #V Conservative Order#! [concept_journal_entry]"
 conservative_order_prussia_pulse_tt:0 "Advances the progress of #V Prussian Conservative Order#! (Bar 1)"
 conservative_order_prussia_1_button:0 "Institute the Order for Science and Art"
 conservative_order_prussia_1_button_desc:0 "Our eminent scientist and explorer—#yellow Alexander von Humboldt#!—has proposed to [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that a new decoration for scientific and artistic merit be added to the military honours established by Frederick the Great, to recognise those who have made outstanding contributions to our society and culture."
 conservative_order_prussia_1_button_tt:0 "It is #yellow Alexander von Humboldt#!"
 conservative_order_prussia_2_button:0 "Issue an Amnesty for Political Prisoners"
 conservative_order_prussia_2_button_desc:0 "Many liberals and nationalists place great hope in our new [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. We may choose to meet their expectations and demonstrate royal clemency and enlightenment—for instance, by pardoning certain prominent political dissidents."
 buttton_not_been_used_tt:0 "This action has not yet been taken"
 conservative_order_prussia_religious:0 "Conservative Order: Pietism"
 conservative_order_prussia_religious_reason:0 "#V Romanticism#! is flourishing across the #yellow German#! states, accompanied by a #B nostalgia for the Middle Ages#!—a movement that believes only a life more #B pleasing to God#! can restore a #V righteous and harmonious#! [concept_country]. This sentiment is thriving within [ROOT.GetCountry.GetName].\n\n[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] likewise views the rising #V Pietist movement#! as a #L #B crusade#!#! against the ideas of the #B Enlightenment#! and the #B French Revolution#!. It is evident that if we are to strengthen the #V traditional conservative order#!, the #B will of God#! and the traditions of #B [GetReligion('protestant').GetName]#! must be emphasised and upheld."
 conservative_order_prussia_religious_complete_1_tt:0 "Completed #V Restoration of Cologne Cathedral#! [concept_journal_entry]"
 conservative_order_prussia_constitution:0 "Conservative Order: The Constitutional Question"
 conservative_order_prussia_constitution_reason:0 "“The only enduring constitution is that of a hierarchical monarchy, balanced by clergy and nobility—it is also the oldest and the best.”\n\nAs part of our policy of #V reconciliation#! with subjects adhering to the emerging [GetIdeology('ideology_liberal').GetName], His Majesty [ROOT.GetCountry.GetRuler.GetFullName] is seeking a resolution to the #B constitutional question#! of [ROOT.GetCountry.GetName]. He aims to #V strike a balance#! between #B radicalism and reaction#!, maintaining the authority of [GetLawType('law_monarchy').GetName] and #yellow royal power#! while once again #B securing the broad support of his subjects#!."
 conservative_order_prussia_constitution_complete_1_tt:0 "Maintain [GetLawType('law_autocracy').GetName] or [GetLawType('law_oligarchy').GetName] [concept_law] for 10 years"
 conservative_order_prussia_constitution_complete_2_tt:0 "Has enacted #B Electoral Compromise#!"
 conservative_order_prussia_constitution_button:0 "Make Electoral Compromises"
 conservative_order_prussia_constitution_button_desc:0 "The people’s demand for suffrage can no longer be resisted; stubborn refusal may bring far graver consequences—we must compromise. Yet this must be done while safeguarding the interests of the government and the Crown."
 conservative_order_prussia_constitution_button_tt:0 "We shall enact a constitution granting suffrage, immediately completing this journal.\nAt the same time, we will introduce the #yellow Three-Class Franchise#! to ensure continued governmental influence over the elected assembly.\nHowever, this #O reform#! will have negative consequences for our democratic system."
 conservative_order_prussia_industy:0 "Conservative Order: Industrialisation"
 conservative_order_prussia_industy_reason:0 "#V The Industrial Revolution#! is transforming our nation. In the face of this sweeping #B wave of industrialisation#!, [ROOT.GetCountry.GetName] must ensure it does not fall behind. Only a #V strong, prosperous, and wealthy#! state can secure greater support for the sacred order of [GetLawType('law_monarchy').GetName].\n\nPublic opinion demands #B swift and decisive action#!, and circumstances compel us likewise: if we are to restore [ROOT.GetCountry.GetName] to prosperity, we must act without hesitation—commit fully, and ensure that all subjects share in the #B benefits of industrialisation#!!"
 conservative_order_prussia_industy_1_tt:0 "Completed #V Industrialisation of the Rhineland#! [concept_journal_entry]"
 conservative_order_prussia_industy_2_tt:0 "Completed #V Industrialisation of Silesia#! [concept_journal_entry]"
 restore_cologne_cathedral:0 "Restore Cologne Cathedral"
 restore_cologne_cathedral_reason:0 "#V An unfinished project since the Middle Ages#!—the #B Cologne Cathedral#! standing upon the banks of the #yellow Rhine#!—still looms incomplete over the cities and people of [ROOT.GetCountry.GetName]; its towers remain unfinished, its stones weathered, as though a forgotten relic of faith and time.\n\nYet under the inspiration of #B Romanticism and national spirit#!, this ancient cathedral has been endowed with new meaning: it belongs not only to the Church, but to the #yellow German nation#! itself. Though the #B financial cost, construction time, and social mobilisation#! required for this endeavour will surpass any previous undertaking, we #B must complete this great work#!—so that this monument of #yellow German spirit#! may pass from the hands of our forebears to ours, and from ours stand complete before the world."
 restore_cologne_cathedral_tt:0 "Completed #V Construction#!"
 restore_cologne_cathedral_button:0 "Begin Construction"
 restore_cologne_cathedral_button_desc:0 "For a rising [ROOT.GetCountry.GetName], this is not merely an architectural project—#B it is a declaration of history, faith, and national destiny#!. Having come this far, is it not our fate to see it completed?"

 prussian_state_railways:0 "State Railways"
 prussian_state_railways_reason:0 "#yellow Railways#! are the arteries of our [ROOT.GetCountry.GetName]—and such a #B vital network#! must remain under the control of the [concept_government] led by our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. We should establish a #B dedicated railway administration#!, fund the construction of key lines across the land, and bring various #O railway#! [concept_company] under our authority—through annexation, direct acquisition, or financial support. Moreover, #V railway operations#! may prove a #B remarkably profitable enterprise#!, even becoming a #B primary source of state revenue#!."
 prussian_virtues:0 "Prussian Virtues"
 prussian_virtues_reason:0 "Since the reigns of the #V Soldier King#! and #V Frederick the Great#!, the principles of order, diligence, humility, and reverence for God—combined with the rationality and tolerance of #B Pietism#! and the #B Enlightenment#!—have shaped a new character among the people of [ROOT.GetCountry.GetName]: one grounded in #B chivalric virtue#! and embodied in #O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_1_effects_tt $prussia_strong_army$#!#!. It is this moral and social code that has driven [ROOT.GetCountry.GetName] from a Baroque state under the Great Elector #yellow Frederick William#! into a modern 欧洲 [concept_great_power].\n\n[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] believes that by inheriting and advancing these proud Prussian traditions—#B sincerity, humility, diligence, integrity, duty, loyalty, order, thrift, restraint, and devotion#!—we shall forge a #V Prussian state#! both powerful and feared across the world, and a #V German nation#! noble and disciplined."
 prussian_virtues_tt:0 "Completed #V Moltke Military Reforms#! [concept_journal_entry]"
 event_effects_joi_flavor_pru.15_tt:0 "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_1_effects_tt $prussia_strong_army$#! will receive #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_2_effects_tt #G enhanced#!#!."
 prussian_virtues_modifier_1_effects_tt:0 "[GetStaticModifier('prussia_strong_army').GetName|v]\n[GetStaticModifier('prussia_strong_army').GetDesc]"
 prussian_virtues_modifier_2_effects_tt:0 "[GetStaticModifier('prussia_superstrong_army').GetName|v]\n[GetStaticModifier('prussia_superstrong_army').GetDesc]"
