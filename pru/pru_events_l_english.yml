l_english:

 joi_flavor_pru.1.t: "German Unification Plan"
 joi_flavor_pru.1.d: "With the victory over [SCOPE.sCountry('AUS_scope').GetName], the fervent idea of German unification has swept through [ROOT.GetCountry.GetName], prompting the government to deliberate on the direction of the unification strategy."
 joi_flavor_pru.1.f: "\"If Austria and Bohemia were to be included within the scope of the German Empire, this would undoubtedly isolate our nation in an unfavorable position in Europe... From [SCOPE.sCountry('GBR_scope').GetName] to [SCOPE.sCountry('RUS_scope').GetName], our dominance would trigger alarm among nations worldwide, and this is not a burden the nascent German Empire could bear.\"\n\"Traitor! What nonsense are you spouting! Prussia cannot forgo the opportunity to fully unite the German nation, leaving Austria behind simply because of abstract fears! Doing so would tarnish our legacy, and we would be scorned by all Germans who expect us to bring unity!\"\n\"[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], if you do not adopt my proposal, I have no choice but to resign.\""
 joi_flavor_pru.1.a: "Adopt the Great German Plan!"
 joi_flavor_pru.1.b: "The Lesser German Plan is more pragmatic."

 joi_flavor_pru.2.t: "Industrial Giants"
 joi_flavor_pru.2.d: "As the Rhineland develops, the ambitious plan to create a great industrial hub has come to fruition, with roaring machines energizing the lifeblood of [ROOT.GetCountry.GetName]."
 joi_flavor_pru.2.f: "\"The Rhineland is the most vital industrial area of our nation... The government consistently encourages enterprises to establish new factories here and introduce advanced technologies into the industry.\"\n\"Indeed, sir! I have a brilliant idea... Listen! We have a groundbreaking steelmaking method. We believe this technology will enable us to establish a new steel factory in the Rhineland and, in the future, outperform our competitors in [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName], and [SCOPE.sCountry('USA_scope').GetName]! I’ve already chosen the location in Dusseldorf-Drendorf, Ruhr—an ideal geographical environment, and I have acquired the land!\"\n\"Sounds promising, sir. Why share this with me?\"\n\"Well, my factory lacks funding. I hope the government can provide subsidies to help establish it. In return, I’m willing to offer shares to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]... Believe me! This would be a highly profitable venture!\""
 joi_flavor_pru.2.a: "Steel? Rhineland already has enough steel factories! Better allocate funds to other industries."
 joi_flavor_pru.2.b: "A steel factory that can outshine competitors? Sounds great—let’s invest quickly!"

 joi_flavor_pru.3.t: "Compulsory Education Law"
 joi_flavor_pru.3.d: "New schools have been established, and [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has already approved the new compulsory education law of [ROOT.GetCountry.GetName]."
 joi_flavor_pru.3.f: "\"Firstly, we #bold expect all citizens responsible for the education of young people#!, whether parents, guardians, or rulers, to #bold have their children#!, whether boys or girls... as well as those entrusted under their care.\"\n\n\"If not sooner, then send them to school from the age of #bold five#!, ensuring they #bold remain in school#! until the age of fourteen. By then, they should have mastered basic knowledge in physics, chemistry, and political economy, as well as being able to read and write correctly, possessing fundamental mathematical skills. Everything that ought to be taught must #bold adhere to textbooks approved by the government#!, allowing students to fully grasp the curriculum and undergo exams assessing their readiness for graduation.\"\n\n\"For students who excel in these exams, local governments should #bold allocate annual funding#! to ensure they can pursue further studies at the nation’s #bold higher institutions#!, ultimately maximizing their wisdom to contribute to our country.\""
 joi_flavor_pru.3.a: "Education for everyone!"

 joi_flavor_pru.4.t: "Great Military Reform"
 joi_flavor_pru.4.d: "The recent measures for military reform have been completed. Helmuth von Moltke confidently reports to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that [ROOT.GetCountry.GetName]'s army is now considered Europe’s finest."
 joi_flavor_pru.4.f: "\"The General Staff is the soul of [ROOT.GetCountry.GetName]'s army. Thus, I’ve expanded the General Staff and established new departments... Most proudly, we now have: #bold The Railway Division#!! It will directly control the nation’s railways during wartime, bypassing the government to rapidly mobilize our forces.\"\n\n\"Additionally, historically, monarchs have commanded their nation's armies. However, this is no longer suitable in modern times. From now on, the #bold Chief of the General Staff#! shall take over these duties, holding supreme command over the nation’s army.\"\n\n\"New weapons have been introduced to our army, an achievement unmatched by any other European country! Many claim these weapons are unreliable, impractical, and costly, but we disregard those claims. Instead, [ROOT.GetCountry.GetName] must adopt a mindset rooted in its government and military, prioritizing #bold military budget#! and allocating it towards #bold weapon upgrades#!.\""
 joi_flavor_pru.4.a: "From now on, orders for mobilized troops and their independent components shall be relayed to the Chief of the General Staff."

 joi_flavor_pru.5.t: "Wacht am Rhein"
 joi_flavor_pru.5.d: "[SCOPE.sCountry('FRA_scope').GetName]'s advocacy for the 'natural borders' of the Rhineland has sparked widespread anger among the German people. A poet named Becker composed a poem titled 'Watch on the Rhine,' igniting strong anti-French sentiment across Germany."
 joi_flavor_pru.5.f: "“Es braust ein Ruf wie Donnerhall, wie Brandung tost, wie Schwerterklang;\nWer zieht zum Rhein, wer zieht zum Rhein, ihn zu schützen vor Feindesdrang?!\n#bold Liebes Vaterland, sei ohne Sorgen: wir stehen fest und treu am Rhein!#!\n\nDer Ruf erschallt in alle Welt, unzähl’ge Augen leuchten hell,\nDie treuen, tapferen deutschen Jünglinge zieh’n aus, die heil’ge Grenze zu schützen!\n#bold Liebes Vaterland, sei ohne Sorgen: wir stehen fest und treu am Rhein!#!\n\nDen Blick erhoben zum weiten Himmel, das Herz voll Mut, der Geist voll Glut,\nO Rhein, ich schwör dir feierlich: du bleibst deutsch wie mein eigenes Herz!\n#bold Liebes Vaterland, sei ohne Sorgen: wir stehen fest und treu am Rhein!#!\n\nDer Schwur erklingt, die Wogen rollen, die Fahnen wehen stolz im Wind,\nZum Rhein! Zum Rhein! Zum deutschen Rhein! ihn zu schützen vor Feindesdrang!\n#bold Liebes Vaterland, sei ohne Sorgen: wir stehen fest und treu am Rhein!#!”"
 joi_flavor_pru.5.a: "Rhine, I swear to you: you belong to Germany, just like my heart!"
 joi_flavor_pru.5.b: "Beloved homeland, rest assured: we will defend the Rhine!"

 joi_flavor_pru.6.t: "Leading Bishop"
 joi_flavor_pru.6.d: "Through the efforts of His Majesty [ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the government has significantly strengthened its control over the various [GetReligion('protestant').GetName] denominations within [ROOT.GetCountry.GetName]—particularly the Calvinists and Lutherans. They are now required to enforce the new liturgy and comply with government directives. Yet [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself seeks to go further: following the example of the Anglican Church, he intends to proclaim himself the Supreme Bishop of the Prussian Church."
 joi_flavor_pru.6.f: "“The entire ecclesiastical structure of [ROOT.GetCountry.GetName] rests upon a foundation that is uncertain, ambiguous, and unstable... sustained only by the persecution of our Calvinist and Lutheran brethren. Thus, I question whether our local church can truly be called a Christian church, and whether our ministry truly serves the will of God.”\n\n“Brother, the Lord will show you that, despite certain Stephanist errors, the Word of God still endures. We remain Christians among ourselves, and thus the Church still lives within us. God bless the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].”"
 joi_flavor_pru.6.a: "It is time for reconciliation—grant the Old Lutherans greater freedom."
 joi_flavor_pru.6.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] should become the Leading Bishop of the Evangelical State Church!"

 joi_flavor_pru.7.t: "Rheinische Städteordnung"
 joi_flavor_pru.7.d: "After several years of drafting, and under the influence of the #V Springtime of the Peoples#!, a new code—one concerning the municipal authorities of #yellow the Rhineland#!—has been completed through the efforts of figures such as [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName]. Yet, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] appears unwilling to grant greater statutory autonomy to the municipalities, and instead intends to incorporate special royal decree provisions into the text."
 joi_flavor_pru.7.f: "“The municipal district comprises all immovable property within its boundaries; any alteration of these boundaries must receive the approval of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and be conducted with due consultation of the municipal representative bodies. Where adjustments concern relations between multiple municipal districts, such matters shall be resolved by the competent authorities through administrative procedures after hearing all parties concerned; private legal relations shall not be impaired by such changes.”\n\n“All inhabitants of the municipal district shall have the right to make use of public institutions of the city, and shall be obligated to contribute to municipal burdens in accordance with the provisions of this law. Special funds associated with municipal institutions shall remain governed by their existing legal provisions and shall not be affected by this law; those who do not reside within the municipal district but possess property or conduct business therein shall likewise be required to contribute taxes according to the income derived therefrom; furthermore, by royal decree, this Municipal Code may also be extended upon application to other municipalities within the Rhineland represented in the provincial estates.”"
 joi_flavor_pru.7.a: "Grant the Code to all municipalities represented in the Rhenish Provincial Assembly."
 joi_flavor_pru.7.b: "Instruct the Minister of the Interior to take all necessary measures to enforce the Royal Decree."
 joi_flavor_pru.8.t: "Deutsche Gemeindeordnung"
 joi_flavor_pru.8.d: "Through the efforts of figures such as [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetLeader.GetFullName] and [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetLeader.GetFullName], our government has successfully unified the previously fragmented and numerous municipal codes enacted across [ROOT.GetCountry.GetName], and now stands ready to bring them into force upon receiving the approval of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_pru.8.f: "“Within an order shaped by the will of the nation, municipalities must not only serve the whole of the state, but also exist independently—guided by the finest energies of the people—to contribute to the formation of a true national community, in which the people ultimately discover a sense of belonging. In this, municipalities gather the strength of local life to fulfil public duties within the narrower sphere of their homeland. They administer their affairs under their own responsibility. Their actions must align with the law and with the objectives set by the state.”\n\n“Within their jurisdiction, municipalities shall carry out all public affairs under their own responsibility, unless explicitly prohibited by law or assigned to other institutions. They may regulate their own matters through statutes, insofar as the law permits or does not provide otherwise. The state may entrust national tasks to municipalities by law, and new obligations may only be imposed upon them through legislation; any interference with their rights must likewise be grounded in law. Regulations issued for the execution of such laws require the approval of the Imperial Minister of the Interior.”"
 joi_flavor_pru.8.a: "The Führerprinzip must be enforced."
 joi_flavor_pru.8.b: "Municipal autonomy is the most precious inheritance of our state."

 joi_flavor_pru.9.t: "Romanticist on the throne"
 joi_flavor_pru.9.d: "The conservative efforts of His Majesty [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] have borne fruit. As a traditional monarch devoted to the divine right of kings and a devout Christian, he has pursued relatively moderate policies while successfully containing the threats of revolution and radicalism. His ideals have come to define the character of [ROOT.GetCountry.GetName] in this age."
 joi_flavor_pru.9.f: "“I am profoundly conscious that I am king solely by the grace of God, and I shall hold this belief until the end of my days. I harbour no envy; I leave glory and pretence to those so-called constitutional monarchs, who are but abstractions in the eyes of the people.”\n\n“I possess a sacred insight into the needs of my subjects. Any limitation upon my effective authority is an irresponsible hindrance to this divine mission. Your duty is not to represent opinions nor to parade the spirit of the age—such notions are alien to the German character and wholly impractical.”"
 joi_flavor_pru.9.a: "His Majesty rules in accordance with the will of God."
 joi_flavor_pru.9.b: "His Majesty is the champion of progress and justice."
 joi_flavor_pru.10.t: "Abdication"
 joi_flavor_pru.10.d: "The forces of conservatism have been dealt a devastating blow by unrest organised by revolutionaries and radicals in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. The reactionary [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has been forced to abdicate, and a new [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ascends the throne under the shadow of revolutionary arms."
 joi_flavor_pru.10.f: "“At two in the afternoon, disturbances erupted throughout the city. We first became aware of them when shots were fired at the sentry before the Franz Regiment barracks, which stood adjacent to the cadet corps. Soon came word that the cadet corps—this supposed stronghold of reaction—was to be swept away entirely. This placed our superior officers in a most awkward position: all communication with the outside world had been severed, and the Franz Regiment stationed nearby had been withdrawn. We were left to determine our course alone.”\n\n“We received the alarm, donned our cloaks, took up our arms, and by order of General von Prittwitz marched towards the royal palace in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. We set out at dawn. Along the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]straße, we passed three or four abandoned barricades; most windows along the street were shattered, and every building bore the marks of gunfire.”"
 joi_flavor_pru.10.a: "Long live [ROOT.GetCountry.GetHeir.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_pru.11.t: "Christian State"
 joi_flavor_pru.11.d: "The efforts of [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to promote Christian values have been widely welcomed. Through the revival of sacred values and religious art, the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] Church has become a powerful pillar of the [GetLawType('law_monarchy').GetName] in [ROOT.GetCountry.GetName]."
 joi_flavor_pru.11.f: "“The state, entrusted with the lofty moral purpose we have set for [ROOT.GetCountry.GetName]—the elevation of mankind—bears a dual obligation: to foster this religious faith, thereby guiding its subjects towards greater happiness. In doing so, it shall exert a powerful influence, spreading and entrenching this spirit.”\n\n“A struggle in which justice triumphs over evil, true and noble liberty over servitude, faith over hypocrisy, and moral virtue over greedy despotism—such a struggle shall be the most uplifting of all, and it shall surely end in glorious victory. The monarch who leads it must become a true spiritual leader, a benefactor of mankind.”"
 joi_flavor_pru.11.a: "[GetInterestGroupVariant('ig_devout',GetPlayer).GetName] reveals the sacred order to us."
 joi_flavor_pru.11.b: "Only Christianity can shield our subjects from revolution!"
 joi_flavor_pru.12.t: "[TimeKeeper.GetCurrentDate.Format('y')] Royal Decree"
 joi_flavor_pru.12.d: "Through decisive political measures and timely compromises, despite repeated shocks from revolution and the looming threat of radicalism, the sacred order of [GetLawType('law_monarchy').GetName] in [ROOT.GetCountry.GetName] has endured in accordance with the will of God."
 joi_flavor_pru.12.f: "“All the dykes raised to stem the tide of revolution have proven insufficient, for weakness, self-interest, and error have at times rendered them incoherent, and at others dangerously undermined them—allowing the destructive flood to spread. The illusion that the safest defence against revolution lies in clinging to old forms while strictly adhering to revolutionary principles has only hastened its expansion.”\n\n“Thus, a true revolution—whose ultimate aim is the advancement of mankind through the wisdom of government, rather than through violent impulses from within or without—must guide us. To incorporate democratic principles within a monarchical government: this, in my view, is the proper form for our age. Pure democracy, if ever it is to suit mankind, must wait until the year 2440.”"
 joi_flavor_pru.12.a: "The rule of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is as steadfast and wise as that of Frederick the Great."
 joi_flavor_pru.12.b: "The strongest bulwark against revolution is democracy itself."
 joi_flavor_pru.13.t: "Prussian Industrial Code"
 joi_flavor_pru.13.d: "Under the rule of His Majesty [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the Rhineland, Silesia, and [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] have emerged as centres of industrialisation. The Crown has embraced the technological progress of the Industrial Revolution, particularly by expanding the railway network through the issuance of government bonds, advancing the development of [ROOT.GetCountry.GetName]. Yet the rise of the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] has also introduced new challenges."
 joi_flavor_pru.13.f: "“Socialism is a movement that seeks to overturn the existing order of state and society: we must treat it as an enemy of [ROOT.GetCountry.GetName]. Against such a force, repression is the only course; every victory it achieves is a defeat for the state. We cannot confront it with the rules of civil law, but only with those of war.”\n\n“The workers, the impoverished, and all those without capital have every right to demand that the state direct its efforts towards alleviating their hardship, and to explore all means of assisting those whose labour has created the wealth upon which our civilisation prides itself. Without them, society would collapse under its own weight; thus it is the duty of the state to secure them fair wages, access to education, and ultimately a life of dignity.”"
 joi_flavor_pru.13.a: "The labour movement must be closely monitored."
 joi_flavor_pru.13.b: "Socialism is tantamount to treason!"
 joi_flavor_pru.13.c: "Calm yourselves—workers merely voice their grievances."

 joi_flavor_pru.14.t: "Echoes of 1248"
 joi_flavor_pru.14.d: "With the patronage of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the government, and countless enthusiastic nationalists, the #yellow Cologne Cathedral#! has today been completed. His Majesty [ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] attended the celebration, as the entire #yellow German nation#! rejoiced in the completion of this great artistic and national achievement!"
 joi_flavor_pru.14.f: "“Standing before it, I was overcome with awe. A complete and grand impression filled my soul—composed of countless harmonious details that I could savour, yet neither fully grasp nor explain. They say this is the joy of Heaven, and I have returned here many times to experience that unity between man and the divine, to embrace the profound wisdom embodied in the works of our forebears.”\n\n“You stand there, overwhelmed, unable to reconcile the contradictions stirring within your soul. You feel the irresistible force of the whole, yet you mock me as a dreamer because I see beauty where you see only strength and roughness. They would have you believe that art arises merely from our desire to embellish our surroundings—but this is false. Even if it were true in some sense, such notions belong only to common folk and craftsmen, not to philosophers.”"
 joi_flavor_pru.14.a: "Across six centuries, we are united with the will of our forebears!"

 joi_flavor_pru.15.t: "Prussian Virtues"
 joi_flavor_pru.15.d: "Through the vigorous promotion of #yellow Prussian Virtues#!, their influence has spread across both our society and our military. The people now strive towards ideals of loyalty, self-sacrifice, and devotion to the welfare of the state and [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], earning widespread respect for [ROOT.GetCountry.GetName] and the #yellow German nation#! alike."
 joi_flavor_pru.15.f: "“Service above all, while elegance is but empty display... The truly noble man obeys not a ruler, but a sense of duty. What we bear is not pleasure, nor even love, but responsibility—and this is the essence of Prussia. It is by this that we distinguish ourselves from other nations; even those who misunderstand us, or bear us ill will, will in time recognise that our superiority lies herein.”"
 joi_flavor_pru.15.a: "Remain ever loyal and upright, until your cold grave; never stray from God’s path, not even by a finger’s breadth."
