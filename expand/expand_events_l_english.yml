l_english:

 joi_flavor_expand.1.t: "The Conference of Schönbrunn"
 joi_flavor_expand.1.d: "A conference convenes at Schönbrunn Palace to negotiate a new alliance agreement between Germany, Austria, and Russia..."
 joi_flavor_expand.1.f: "[SCOPE.sCountry('GER_scope').GetName], [SCOPE.sCountry('RUS_scope').GetName], and [SCOPE.sCountry('AUS_scope').GetName], equally animated by the desire to strengthen general peace through an understanding destined to assure the defensive position of their respective states, have resolved to confirm by a special agreement the understanding established between the three courts, with His Majesty the Emperor of [SCOPE.sCountry('RUS_scope').GetName], His Majesty the Emperor of [SCOPE.sCountry('GER_scope').GetName], and His Majesty's plenipotentiary ambassador of [SCOPE.sCountry('AUS_scope').GetName] agreeing to the following articles:\n\nI. If one of the High Contracting Parties should find itself at war with a third Great Power, the other two shall maintain a benevolent neutrality and shall devote their efforts to the localization of the conflict. Should any of the Contracting Parties be engaged in a defensive war, the other Parties shall be bound to join in and assist the invaded party.\n\nII. Germany recognizes Russia's historically acquired rights in the Balkan Peninsula, particularly the legitimacy of her preponderant and decisive influence in Bulgaria and Eastern Rumelia... Both Powers undertake to introduce no modification into the territorial status quo of the said Peninsula without a previous agreement between them, and to oppose any attempt to disturb or modify this status quo without their consent.\n\nIII: The present Treaty shall remain in force for twenty years from the exchange of ratifications.\n\nIV: The High Contracting Parties mutually promise secrecy as to the contents and existence of the present Treaty and of the Protocol annexed thereto, and ratification shall be exchanged within a fortnight or sooner if possible.\n\nIn witness whereof the respective Plenipotentiaries have signed the present Treaty and have affixed thereto the seal of their arms."
 joi_flavor_expand.1.a: "Let us revive the friendship of the Holy Alliance era!"
 joi_flavor_expand.1.b: "Reject this agreement."

 joi_flavor_expand.2.t: "Wilberforce's Legacy"
 joi_flavor_expand.2.d: "Many years after our suzerain [SCOPE.sCountry('GBR_scope').GetName] passed the Slavery Abolition Act, under the witness of Prime Minister [SCOPE.sCharacter('prinimister_leader').GetFirstName], the slaves of [ROOT.GetCountry.GetName] are emancipated and granted freedom under the authority of the 1833 Abolition Act."
 joi_flavor_expand.2.f: "Whereas divers persons are holden in slavery within His Majesty's [SCOPE.sCharacter('gbr_king_ruler').GetPrimaryRoleTitle] dominions, and it is just and expedient that all such persons should be manumitted and set free, and that a reasonable compensation should be made to the persons hitherto entitled to the services of such slaves for the loss which they will incur by being deprived of their right to such services;\n\nAnd whereas it is also expedient that measures should be taken for promoting the industry and securing the good conduct of the persons so to be manumitted, during a limited period after their emancipation; and that the laws now in force in the said colonies should forthwith be adapted to the new state and relations of society therein which will follow upon such general emancipation;\n\nBe it therefore enacted by the King's most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons, in this present Parliament assembled, and by the authority of the same:\n\nAll slaves who have been or shall be brought by consent of their owners into [SCOPE.sCountry('GBR_scope').GetName] and [ROOT.GetCountry.GetName], shall from and after the passing of this Act, #bold be absolutely and entirely free to all intents and purposes whatsoever.#!"
 joi_flavor_expand.2.a: "Wilberforce's vision is finally realized."
 joi_flavor_expand.2.b: "Glory to the [SCOPE.sCharacter('gbr_king_ruler').GetPrimaryRoleTitle]!"

 joi_flavor_expand.3.t: "The March Revolution"
 joi_flavor_expand.3.d: "As liberal revolutions spread across Europe, radical sentiment within the German Confederation grows unprecedentedly strong. The [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], fervently inspired by nationalism and organized by the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] alongside the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], have today launched massive demonstrations demanding unity and freedom. Protests and riots have swept through [ROOT.GetCountry.GetName], with [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] nearly overrun by protesters, while many major cities have lost contact with the government. In the current situation, even conservatives fear this may be a repeat of the French Revolution—including [SCOPE.sCharacter('frankfurter_ruler').GetFirstName] [SCOPE.sCharacter('frankfurter_ruler').GetLastName] himself."
 joi_flavor_expand.3.f: "News of foreign revolutions reached [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Despite strict censorship, unofficial reports spread through all levels of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] society: unity, justice, and freedom. Many citizens gathered in the streets under mild and sunny weather, ideal for outdoor assemblies where political meetings could be organized—particularly in cafés, which became hubs for the educated bourgeoisie. Distant revolutionary events merged with concrete hopes for reform in [ROOT.GetCountry.GetName].\n\nLast week, a small group of students assembled on the outskirts of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Like revolutionaries abroad, they sought to compile the people's demands into a petition to present directly to the [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle]. Their meeting ended inconclusively, yet it attracted many [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]—even sympathetic [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] who sponsored them.\n\nThe situation escalated when [SCOPE.sCharacter('frankfurter_ruler').GetFirstName] [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] refused to receive the people's delegation. Enraged crowds armed themselves and barricaded the streets, filling gaps with cobblestones, wool sacks, and beams. Though soldiers managed to dismantle some barricades, the sight of mutilated corpses only hardened the revolutionaries' resolve. Church bells rang across the city, calling more citizens to resistance. The unrest spiraled out of control, spreading nationwide. The [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] and his government retreated to the city center, still held by the army, as police began defecting. Finally, [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] yielded, declaring #bold 'to place himself and his people beneath the ancient banner of the German Empire, and to merge [ROOT.GetCountry.GetName] into Germany.'#!"
 joi_flavor_expand.3.a: "Germany awakens—all for the restoration of German unity: Demand all Confederation members send representatives to the assembly!"
 joi_flavor_expand.3.b: "We have no choice but to accept the revolutionaries' demands. Let [SCOPE.sCharacter('frankfurter_leader').GetFirstName] represent our nation."

 joi_flavor_expand.4.t: "The Paulskirche Constitution"
 joi_flavor_expand.4.d: "After prolonged debate and resolutions—and [ROOT.GetCountry.GetName]'s decisive victories on the battlefield—the Confederation's opponents have capitulated. The Frankfurt Parliament has officially crowned [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], in Aachen Cathedral as Emperor. A unified constitution has been drafted, signed, and enacted. Today, the parliament proclaims to the world: The German nation, divided for centuries, is reunited. The ancient crown once borne by #variable the King of Germany and Emperor of the Romans#! now rests upon [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s head as he ascends the throne of Charlemagne. All Germany rejoices at the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s coronation!"
 joi_flavor_expand.4.f: "'[ROOT.GetCountry.GetName] shall comprise the territories of the former German Confederation. Only German citizens may be appointed to state governments and administrative offices. Imperial constitution and laws shall have equal force in all states. Within the limits of the imperial constitution, the German states retain their autonomy, their monarchs their dignity, while territorial sovereignty is transferred to the imperial government.'\n\n'The power to declare war and make peace resides solely with the Empire. All armed forces are placed under imperial authority. The Emperor holds exclusive power over military legislation and organization. Oaths of allegiance must first pledge loyalty to the imperial sovereign and constitution.'\n\n'The German Empire shall establish a unified customs and trade territory enclosed by common borders, abolishing all internal tariffs. States may not levy duties on goods crossing German borders. The Empire shall legislate on trade, shipping, and industry. Patents may only be granted by imperial authority under imperial law.'\n\n'The imperial government may regulate banking and currency issuance through imperial legislation. Expenses for imperial measures and institutions shall be borne by the Empire. The government is duty-bound to uphold the rights granted to all Germans by the imperial constitution. The Emperor shall preserve the Empire's peace and take necessary measures to maintain internal security and order.'"
 joi_flavor_expand.4.a: "Einigkeit und Recht und Freiheit: Für das Deutsche Vaterland!"
 joi_flavor_expand.4.b: "Deutschland, Deutschland, über alles!"
 joi_flavor_expand.5.t: "Dissolution of the Frankfurt Parliament"
 joi_flavor_expand.5.d: "The struggle for German unity and freedom has ended in failure. Traditional order is restored to Germany. The revolutionary Frankfurt National Assembly dissolves. After troops storm the Paulskirche, the previously dissolved German Confederation reorganizes, with monarchical authority reaffirmed. Surviving parliamentarians scatter—some to our nation, others into exile abroad."
 joi_flavor_expand.5.f: "'The Imperial Regent has repeatedly expressed his desire to relinquish his dignity and return the powers conferred upon him by federal decree to the collective members of the German Confederation... By agreement, to preserve the Confederation as an international union of German princes and free cities, to uphold the independence and inviolability of its states, and to ensure Germany's internal and external security, it is resolved to annul the provisional constitution's validity.'\n\n'All matters hitherto administered by the provisional central government, insofar as they fall under the Confederate Diet's jurisdiction per federal law, shall be transferred to the Diet during this transitional period... Upon approval and receipt of the Imperial Regent's consent, the Regent shall resign, transferring his rights and duties to His Majesty the Emperor of [SCOPE.sCountry('AUS_scope').GetName] and His Majesty the King of [SCOPE.sCountry('PRU_scope').GetName].'"
 joi_flavor_expand.5.a: "Drive these rebels from Germany!"
 joi_flavor_expand.5.b: "They fought for Germany—let us shelter them."

 joi_flavor_expand.6.t: "To My People and the German Nation"
 joi_flavor_expand.6.d: "Faced with rising nationalist fervor, the conservative [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], begins to doubt his hold on the throne. Meanwhile, the legitimate heir [SCOPE.sCharacter('heir_1848_scope').GetFirstName] delivers a rousing speech to an enthusiastic crowd outside the palace today, compelling the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to consider abdicating in favor of this more popular successor to secure the dynasty's future."
 joi_flavor_expand.6.f: "\"In the days of Napoleon's invasion, during our darkest hours, I spoke to my people with confidence—and that confidence was not betrayed. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], united with his people, saved [ROOT.GetCountry.GetName] and all Germany from shame and humiliation. Today, as our fatherland faces its greatest peril, I once more address the German nation with that same conviction:\n\nOur great German homeland is torn by internal strife and threatened by external dangers from all sides. Only under unified leadership can we overcome this twin peril. Therefore I—[SCOPE.sCharacter('heir_1848_scope').GetFirstName] [SCOPE.sCharacter('heir_1848_scope').GetLastName]—now assume the office of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in these troubled times, to aid the German nation I have loved and fought for all my life.\"\n\n\"The National Assembly recently convened in Frankfurt shall serve as the legal instrument through which my people and I shall jointly rescue and stabilize Germany. I intend to provide Germany's princes and nobility the opportunity to confer with this Assembly... Today, I take up the ancient banner of Germany, placing myself and my people beneath the venerable standard of the German Empire.\""
 joi_flavor_expand.6.a: "Long live His Majesty [SCOPE.sCharacter('heir_1848_scope').GetFirstName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_expand.6.b: "Our current [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has served Germany well enough."

 joi_flavor_expand.7.t: "The Seventeen Drafts"
 joi_flavor_expand.7.d: "To create a unified constitution for a future German Empire, parliamentary representatives have appointed a committee of seventeen renowned scholars, statesmen, and clergymen. Their proposed draft constitution has been submitted to the Assembly for vote today."
 joi_flavor_expand.7.f: "\"Germany has endured centuries of division as punishment. Now, before this second century since the end of our humiliating peace concludes, national unity must be achieved without delay. No power on earth can prevent forty million people from determining their own destiny.\"\n\n\"The temptation of power resides in every heart—some would eliminate all manifestations of greatness as obstacles to liberty. Yet our princely houses are bound by ancient customs of allegiance that cannot be lightly transferred elsewhere.\"\n\n\"If our national existence depends fundamentally on the continuity of German dynasties, then the imperial sovereign who governs the nation must derive legitimacy from hereditary right. Should mankind abandon this foundation of all legitimate authority, we would discard the very principle that obliges noble houses to subordinate their inherited privileges to the sovereign will for the common good.\""
 joi_flavor_expand.7.a: "The Seventeen Committee's work holds no relevance for an Imperial Constitution."
 joi_flavor_expand.7.b: "This sets an excellent precedent for the future Imperial Constitution."

 joi_flavor_expand.8.t: "Federal Electoral Law"
 joi_flavor_expand.8.d: "Today the Assembly passed legislation addressing suffrage and parliamentary representation, requiring all German Confederation members to organize elections where every adult independent male may vote for delegates to be sent to Frankfurt."
 joi_flavor_expand.8.f: "\"To expedite foundational work for a new federal constitution, the Federal Assembly has commenced preparatory efforts with trusted public figures... Furthering this vital endeavor, the federal government decrees that all states within the German national system shall elect national representatives through constitutional means.\"\n\n\"Given present necessities, representatives shall be elected based on population—each state guaranteeing one delegate per 70,000 adult independent males, including smaller states falling below this threshold.\"\n\n\"These representatives shall convene at the Federal Assembly's seat on an appointed date to collaborate with the government on Germany's constitutional framework.\""
 joi_flavor_expand.8.a: "This so-called electoral decree holds no authority over [ROOT.GetCountry.GetName]."
 joi_flavor_expand.8.b: "From this day forward, suffrage shall extend to all adult men!"

 joi_flavor_expand.9.t: "A Provisional German Government?"
 joi_flavor_expand.9.d: "With a provisional constitution proposed to replace the 1815 German Federal Act, the Assembly has declared the establishment of a provisional central government in Frankfurt to administer German affairs until a final constitution is drafted. Yet fierce debate persists—particularly between leftists and right-wing liberals—regarding the government's name and the future state's political form."
 joi_flavor_expand.9.f: "\"Pending the establishment of definitive German governmental authority, a provisional central power shall administer all common affairs of the German nation... It shall exercise executive authority over matters concerning the federal states' collective security and welfare; hold supreme command over all armed forces, including appointment of commanders; and represent Germany in international law and commerce through appointed ambassadors and consuls.\"\n\n\"Constitutional drafting remains outside the central power's purview. The provisional government shall coordinate implementation measures with state governments' authorized representatives. Its mandate shall terminate upon the constitution's completion and enactment.\""
 joi_flavor_expand.9.a: "The German Emperor's glorious legitimacy must derive directly from the Holy Roman Empire."
 joi_flavor_expand.9.b: "Germany should become a federal republic of states and free cities."

 joi_flavor_expand.10.t: "Uniform Bills of Exchange Act"
 joi_flavor_expand.10.d: "Bills of exchange - versatile promissory notes used for international remittances, currency exchange, and even as substitute currency - currently lack standardized recognition across the German Confederation, being governed instead by individual state and free city laws. Recognizing this impediment to economic unity, the Assembly yesterday passed a standardized civil code regulating acceptance, issuance, collateralization, and exchange of bills."
 joi_flavor_expand.10.f: "\"Any person capable of entering contractual agreements may engage in bill transactions... The drawee bears personal liability with all assets for payment obligations, while the drawer assumes responsibility for acceptance and payment.\"\n\n\"The bill holder may immediately demand acceptance from the payer; if refused, a formal protest may be lodged. For bills payable after sight, failure to secure acceptance obligates the holder to file protest within the prescribed period.\"\n\n\"When specifying a fixed payment date, maturity occurs on the designated day. For mid-month payments, settlement shall fall on the 15th day, duly recorded by notary or court officer.\""
 joi_flavor_expand.10.a: "Inform the Assembly that due to our economic circumstances, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must postpone implementation."
 joi_flavor_expand.10.b: "The new exchange law shall be enacted immediately!"

 joi_flavor_expand.11.t: "The Simon-Gagern Pact"
 joi_flavor_expand.11.d: "Austria's potential inclusion in a German nation-state has become a deeply divisive constitutional issue. Provisional Minister President #variable Heinrich von Gagern#! has brokered an interim agreement among parliamentary factions to table the Großdeutschland question, allowing continued work on other constitutional provisions."
 joi_flavor_expand.11.f: "\"Through consultation with the Imperial Regent, the Confederate Government establishes this provisional accord: Until constitutional promulgation, Austria and Prussia shall jointly exercise central authority in the Confederation's name unless earlier transferred to a definitive governing body.\"\n\n\"Federal Council members shall administer delegated affairs per existing federal law—particularly the Federal War Constitution—either autonomously or under joint supervision by His Majesty the Emperor of [SCOPE.sCountry('AUS_scope').GetName] and His Majesty the King of [SCOPE.sCountry('PRU_scope').GetName].\""
 joi_flavor_expand.11.a: "Crowning a German Emperor takes precedence—the Austrian question can wait."
 joi_flavor_expand.11.b: "Austria's inclusion requires federal concessions we must now make."

 joi_flavor_expand.12.t: "The Communist Manifesto"
 joi_flavor_expand.12.d: "A radical pamphlet titled 'The Communist Manifesto,' published in London, capital of [SCOPE.sCountry('GBR_scope').GetName], has circulated through the German Confederation. Even within the Frankfurt Parliament, its doctrines find sympathy among left-wing radicals. Most delegates, however, express alarm at its proposed 'collectivist society,' urging [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], to suppress this threat to [ROOT.GetCountry.GetName]'s social order."
 joi_flavor_expand.12.f: "\"A spectre is haunting Europe—the spectre of communism. All the powers of old Europe have entered into a holy alliance to exorcise this spectre: Pope and Tsar, Metternich and Guizot, French radicals and German police-spies.\"\n\n\"The history of all hitherto existing society is the history of class struggles: Freeman and slave, patrician and plebeian, lord and serf, guild-master and journeyman—in a word, oppressor and oppressed—stood in constant opposition to one another.\"\n\n\"Let the ruling classes tremble at a communist revolution. The proletarians have nothing to lose but their chains. They have a world to win!\""
 joi_flavor_expand.12.a: "Social equity is the best defense against communism."
 joi_flavor_expand.12.b: "Ban this seditious pamphlet immediately!"

 joi_flavor_expand.13.t: "The Reichsflotte"
 joi_flavor_expand.13.d: "To safeguard German commercial and territorial waters against [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('DEN_scope').GetName], the Assembly has authorized creation of a pan-German Imperial Fleet, with its role, command structure, and funding to be constitutionally enshrined."
 joi_flavor_expand.13.f: "\"The first German warship now anchored at the Weser estuary demonstrates to our people that they rely not on despotic whims, but on forty million countrymen... Establishing our national fleet transcends military or commercial concerns—it is foremost a matter of statehood.\"\n\n\"Naval power resides solely with the Empire; no state may maintain warships or issue letters of marque... The Imperial Government alone appoints naval officers, while forthcoming laws shall determine harbor construction, eminent domain, and related authorities.\""
 joi_flavor_expand.13.a: "This fleet shall bear the proud name 'Reichsflotte!'"
 joi_flavor_expand.13.b: "Expecting us to fund this? Impossible!"

 joi_flavor_expand.14.t: "Basic Law of Human Rights"
 joi_flavor_expand.14.d: "The Parliament has enacted a new bill concerning the political and civil rights of German citizens, to be incorporated into the future constitution. This document has been delivered to [ROOT.GetCountry.GetName], sparking jubilant crowds demanding its immediate implementation."
 joi_flavor_expand.14.f: "\"The German people shall enjoy the following fundamental rights, which shall serve as constitutional standards for all German states. No state constitution or legislation may abridge or limit these rights:\n\nGerman nationals consist of citizens from all states comprising the German Empire... Every German possesses imperial citizenship, entitling them to exercise their rights in any German state, reside or settle anywhere in German territory, and pursue any lawful livelihood.\n\nAll Germans are equal before the law. All titles unrelated to public office are abolished and may not be reinstated... Qualified persons shall have equal access to public offices and must equally fulfill conscription obligations.\n\nPersonal freedom is inviolable. Arrests require judicial warrants stating reasons, except in cases of flagrante delicto... Police must release detainees within 24 hours or transfer them to judicial authorities. Capital punishment, along with corporal punishments like branding and pillory, are abolished except under martial law.\n\nPrivate property is inviolable. Seizure of correspondence requires judicial warrants specifying reasons, which must be served immediately or within twenty-four hours to affected parties.\""
 joi_flavor_expand.14.a: "[ROOT.GetCountry.GetName] shall unquestionably uphold the Parliament's decision!"
 joi_flavor_expand.14.b: "We must consider opposition voices within the government."

 joi_flavor_expand.15.t: "The Imperial Regent"
 joi_flavor_expand.15.d: "The Provisional Government Act originally designated a 'Regent' to serve as head of the interim government, but disputes among states have delayed the appointment. As constitutional drafting progresses, this unresolved issue has become Parliament's newest battleground."
 joi_flavor_expand.15.f: "\"Provisional central authority shall vest in a Regent elected by the National Assembly... The Regent exercises power through ministers accountable to Parliament. All executive orders require countersignature by at least one responsible minister... The Regent bears no actual responsibility—legislative power resides with Parliament, executive power with the cabinet.\n\nMinisters may attend parliamentary deliberations and must provide information when summoned... Voting rights require parliamentary membership, making the Regent's office incompatible with being an Assembly delegate.\""
 joi_flavor_expand.15.a: "This honor belongs to His Majesty the King of [SCOPE.sCountry('PRU_scope').GetName]!"
 joi_flavor_expand.15.b: "This honor belongs to His Imperial Majesty the Emperor of [SCOPE.sCountry('AUS_scope').GetName]!"
 joi_flavor_expand.15.c: "This honor belongs to the truly glorious [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName]!"

 joi_flavor_expand.16.t: "Confederation Integrity"
 joi_flavor_expand.16.d: "Debate over the new imperial institutions' authority—championed by [SCOPE.sCountry('PRU_scope').GetName] and [SCOPE.sCountry('AUS_scope').GetName]—has reached Parliament. The great powers' intransigence regarding their German privileges has deadlocked proceedings."
 joi_flavor_expand.16.f: "\"To whom does the German Empire belong? Specifically, which nation? The Emperor of [SCOPE.sCountry('AUS_scope').GetName]? The King of [SCOPE.sCountry('PRU_scope').GetName]? Other sovereigns? Even if this sovereignty were merely symbolic?\n\nWhat constitutes the German Confederation? East Prussia? The Crownlands of Hungary? Italian territories? Vienna desires this, but confederates won't raise armies to defend the Emperor's personal domains. Should Vienna revolt, what concern is that to Berlin, Munich, or Frankfurt? Vienna is imperial property, just as Schönbrunn Palace remains closed to its citizens.\n\nWho controls Parliament? Kings and dukes crave more voting power; the Emperor is no different. How shall committees and cabinets form? The great powers seek only to extend their influence through another instrument no different from the Confederation—not a governance tool for the German nation.\""
 joi_flavor_expand.16.a: "The Confederation must remain intact—we can compromise on authority."
 joi_flavor_expand.16.b: "Without concessions from obstinate [SCOPE.sCountry('AUS_scope').GetName], no pan-confederal institution can exist!"
 joi_flavor_expand.16.c: "Without concessions from obstinate [SCOPE.sCountry('PRU_scope').GetName], no pan-confederal institution can exist!"
 joi_flavor_expand.16.e: "Without concessions from both [SCOPE.sCountry('PRU_scope').GetName] AND [SCOPE.sCountry('AUS_scope').GetName], no pan-confederal institution can exist!"

 joi_flavor_expand.17.t: "The Song of the Germans"
 joi_flavor_expand.17.d: "Amid rising German nationalism, the Frankfurt Parliament has moved to adopt a national anthem for a unified Germany. The #variable 'Deutschlandlied'#!, composed by #variable August Heinrich Hoffmann von Fallersleben#! to the melody of #variable Joseph Haydn's 'Emperor's Quartet'#!, was unanimously approved as the anthem of the German Confederation."
 joi_flavor_expand.17.f: "\"#bold Germany, Germany above all, above all in the world#!,\nWhen, for protection and defense, brothers stand together!\nFrom the Meuse to the Memel, from the Adige to the Belt,\n#bold Germany, Germany above all, above all in the world!#!\"\n\n\"German women, German loyalty,\nGerman wine and German song;\nShall retain, throughout the world,\nTheir old beloved fame;\n#bold To inspire us to noble deeds#!\nFor the length of all our lives.\"\n\n\"Unity and justice and freedom\nFor the German fatherland!\nLet us all strive to this goal\nBrotherly with heart and hand!\nUnity and justice and freedom\nAre the pledge of happiness;\n#bold Flourish in this blessing's glory,#!\nFlourish, German fatherland!\""
 joi_flavor_expand.17.a: "Germany above all in the world! Unity, justice, and freedom for the German fatherland!"
 joi_flavor_expand.17.b: "Our royal house's anthem would be more fitting."

 joi_flavor_expand.18.t: "Greater Germany?"
 joi_flavor_expand.18.d: "#variable Hermann von Beckerath#!, Finance Minister appointed by the Frankfurt Parliament, publicly advocated for #bold 'the inclusion of both Austria and Prussia within a unified German Empire'#!. This galvanized the Großdeutschland faction, with interim president #variable Eduard von Simson#! declaring support. The left-wing (led by the Donnersberg and Württemberg court parties) and right-wing (Café Milani faction) united to demand all German states merge into a single empire, rejecting protections for minor monarchs."

 joi_flavor_expand.18.a: "That is it! The brave German's fatherland!"
 joi_flavor_expand.18.b: "Only the ancient crowns of princes represent true Germany."

 joi_flavor_expand.19.t: "A Crown from the Gutter"
 joi_flavor_expand.19.d: "After prolonged debate, the Frankfurt Parliament has resolved to offer the crown of #variable 'Emperor of All Germans'#! to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]. #bold The proposed empire would encompass the entire German Confederation, including Austria#!. The invitation arrived today at [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], though the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] hesitates to accept this \"crown offered by revolutionaries.\""
 joi_flavor_expand.19.f: "\"We, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName], by Grace of God [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName], responding to the call of German princes and free cities to restore the imperial dignity dormant since 1806, hereby declare:\n\nWe deem it our duty to accept the ancient imperial dignity as responsibility to the fatherland. Henceforth, We and Our successors shall bear the title Emperor in all affairs of the German Empire, trusting God to guide our nation toward prosperity under this venerable symbol.\"\n\n\"We pledge to uphold the Empire's laws, defend its independence through German unity, and secure the peace so our people may reap the rewards of their sacrifices. May God grant Our successors the wisdom to expand the Empire not by conquest, but through welfare, liberty, and moral leadership!\""
 joi_flavor_expand.19.a: "In the name of the German people, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] is crowned Emperor of All Germans! Long live united Germany!"
 joi_flavor_expand.19.b: "We shall not accept a crown picked from the gutter!"

 joi_flavor_expand.20.t: "Emperor of All Germans?"
 joi_flavor_expand.20.d: "The Frankfurt Parliament has proclaimed the [SCOPE.sCountry('crossdeutsche_crown_country').GetName] monarch as #variable 'Emperor of All Germans'#!, claiming sovereignty over our German territories. When news reached [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] furiously vowed to defend [ROOT.GetCountry.GetName]'s independence against this usurpation."
 joi_flavor_expand.20.f: "\"No German noble bearing cross or fess upon his coat-of-arms would accept this crown forged from revolution, perfidy and treason...\"\n\n\"The ancient imperial crown, dormant since 1806, is the only legitimate symbol of German unity - bestowed by God alone, commanding obedience by divine right. None may wear it save by consent of [ROOT.GetCountry.GetRuler.GetFirstName] and his peers.\"\n\n\"Woe unto who would seize this crown without Our sanction!\""
 joi_flavor_expand.20.a: "[SCOPE.sCountry('crossdeutsche_crown_country').GetName] dreams! Alert the Great Powers!"

 joi_flavor_expand.21.t: "A Crown from the Gutter"
 joi_flavor_expand.21.d: "After prolonged debate, the Frankfurt Parliament has resolved to offer [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] the crown of #variable 'Emperor of the Germans'#!. #bold This proposed Kleindeutschland would exclude Austria from the German Confederation#!. The invitation arrived at [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], though the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] hesitates to accept this \"crown offered by revolutionaries.\""
 joi_flavor_expand.21.f: "\"We, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName], by Grace of God [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of [ROOT.GetCountry.GetName], responding to the call of German princes and free cities to restore imperial dignity dormant since 1806, hereby declare:\n\nWe accept this responsibility to the fatherland. Henceforth, We and Our successors shall bear the imperial title, trusting God to guide our nation toward prosperity under this venerable symbol.\"\n\n\"We pledge to uphold the Empire's laws, defend German independence through unity, and secure lasting peace. May God grant Our successors wisdom to expand the Empire through welfare and liberty - not conquest!\""
 joi_flavor_expand.21.a: "In the name of the German people, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] is crowned Emperor of the Germans! Long live the Reich!"
 joi_flavor_expand.21.b: "We shall not accept a crown picked from the gutter!"

 joi_flavor_expand.22.t: "Emperor of the Germans?"
 joi_flavor_expand.22.d: "The Frankfurt Parliament has proclaimed [SCOPE.sCountry('kleindeutsche_crown_country').GetName]'s monarch as #variable 'Emperor of the Germans'#!, claiming sovereignty over German lands excluding Austria. When news reached [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] furiously vowed to defend both [ROOT.GetCountry.GetName]'s authority and the German Confederation's existence."
 joi_flavor_expand.22.f: "\"No German noble bearing cross or fess upon his escutcheon would accept this crown forged from revolution and treason...\"\n\n\"The true imperial crown, dormant since 1806, is bestowed by God alone - commanding obedience by divine right. None may wear it save through Habsburg consent.\"\n\n\"Woe unto who would seize this crown without Our sanction! The Reich shall not be stolen like common silverware!\""
 joi_flavor_expand.22.a: "[SCOPE.sCountry('kleindeutsche_crown_country').GetName] dreams in daylight!"

 joi_flavor_expand.23.t: "The German Question"
 joi_flavor_expand.23.d: "[SCOPE.sCountry('crossdeutsche_crown_country').GetName]'s monarch has been proclaimed #variable 'Emperor of All Germans'#! by the Frankfurt Parliament, threatening the Vienna Order. [ROOT.GetCountry.GetName]'s cabinet has resolved to issue an ultimatum: accept naval restrictions mirroring the 1815 balance of power, or face war."
 joi_flavor_expand.23.f: "\"Article I: The 35:100 tonnage ratio shall be perpetual - [SCOPE.sCountry('crossdeutsche_crown_country').GetName]'s fleet never exceeding 35% of [SCOPE.sCountry('GBR_scope').GetName]'s strength...\"\n\n\"Article III: Should future naval treaties abandon ratio systems, Germany shall maintain this proportion through alternative means...\"\n\n\"His Majesty's Government considers this agreement permanent and essential to any future European settlement.\""
 joi_flavor_expand.23.a: "Sign or face the Royal Navy's guns!"

 joi_flavor_expand.24.t: "Le Rhin Allemand"
 joi_flavor_expand.24.d: "The Frankfurt Parliament's coronation of [SCOPE.sCountry('crossdeutsche_crown_country').GetName]'s monarch as #variable 'Emperor of All Germans'#! threatens [ROOT.GetCountry.GetName]'s eastern frontier. The Cabinet agrees: unless the Rhineland is ceded immediately, we shall crush this illegitimate unification."
 joi_flavor_expand.24.f: "\"France's natural frontiers lie at the Rhine's edge, the ocean's brink, the Pyrenees' crest - there our soldiers shall plant the tricolor!\"\n\n\"Some say burying French ideals beneath German soil serves peace. But when thousands of our brothers languish under foreign rule, how can I stay my hand? My conscience rebels!\""
 joi_flavor_expand.24.a: "The Rhineland or war - let their new emperor choose!"

 joi_flavor_expand.25.t: "A Teutonic Nightmare"
 joi_flavor_expand.25.d: "The Frankfurt Parliament's audacious coronation of [SCOPE.sCountry('crossdeutsche_crown_country').GetName]'s monarch as #variable 'Emperor of All Germans'#! has reached [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] has ordered full mobilization, declaring: \"We shall reduce their Paulskirche to rubble!\""
 joi_flavor_expand.25.f: "\"German unity is a pretty dream - and like all dreams, it must dissolve before reality. The Russian steamroller shall awaken these revolutionaries!\"\n\n\"The Paulskirche offers no crown - only a dog collar with which to leash Europe to radicalism. Let them learn what tsarist cannon teach!\""
 joi_flavor_expand.25.a: "Let Berlin await the Russian winter!"

 joi_flavor_expand.26.t: "[SCOPE.sCountry('GBR_scope').GetName] Demands Naval Limitations"
 joi_flavor_expand.26.d: "The [SCOPE.sCountry('GBR_scope').GetName] government, alarmed by our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s new title of #variable 'Emperor of All Germans'#! and its threat to European equilibrium, has delivered an ultimatum through their embassy in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]: #bold Accept permanent naval restrictions or face immediate war.#!"
 joi_flavor_expand.26.f: "\"Article I: The 35:100 tonnage ratio shall remain perpetual - the German fleet never exceeding 35% of [SCOPE.sCountry('GBR_scope').GetName]'s total strength...\"\n\n\"Article III: Should future naval agreements abandon ratio systems, Germany shall maintain this proportion through alternative constraints...\"\n\n\"His Majesty's Government considers these terms essential for preserving European peace and the balance of power established at Vienna.\""
 joi_flavor_expand.26.a: "[ROOT.GetCountry.GetName] will not suffer such humiliation!"
 joi_flavor_expand.26.b: "Sign the treaty - we cannot challenge [SCOPE.sCountry('GBR_scope').GetName]'s naval supremacy."

 joi_flavor_expand.27.t: "[SCOPE.sCountry('FRA_scope').GetName] Demands the Rhineland"
 joi_flavor_expand.27.d: "Exploiting our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s coronation as #variable 'Emperor of All Germans'#! as pretext, [SCOPE.sCountry('FRA_scope').GetName] has demanded cession of the Rhineland, claiming this 'revolutionary title' threatens their border security."
 joi_flavor_expand.27.f: "\"France's natural frontiers lie at the Rhine's edge - where Roman eagles once stood guard!\"\n\n\"Some argue we should bury our ambitions west of the Rhine. But when millions of French souls yearn for liberation, how can I, in good conscience, abandon them to German rule?\""
 joi_flavor_expand.27.a: "Let them try to take German soil by force!"
 joi_flavor_expand.27.b: "Cede the territory - we cannot risk war with [SCOPE.sCountry('FRA_scope').GetName] now."

 joi_flavor_expand.28.t: "[SCOPE.sCountry('RUS_scope').GetName] Declares Intervention"
 joi_flavor_expand.28.d: "The Tsar, fearing revolutionary nationalism after our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s coronation as #variable 'Emperor of All Germans'#!, has mobilized armies to uphold the Vienna Settlement - proving Russia remains 'Europe's Gendarme'."
 joi_flavor_expand.28.f: "\"German unification is a poet's fantasy - dangerous to all monarchs. The Russian bear shall crush this revolutionary serpent!\"\n\n\"The Paulskirche offers no legitimate crown - only a revolutionary noose! Let these Frankfurt lawyers learn what Russian bayonets teach about imperial legitimacy!\""
 joi_flavor_expand.28.a: "Let them come! [ROOT.GetCountry.GetName] fears no northern barbarians!"

 joi_flavor_expand.29.t: "The Erfurt Union"
 joi_flavor_expand.29.d: "Despite the Frankfurt Parliament's failure, the dream of German unification still captivates many in [ROOT.GetCountry.GetName] - even [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]. At Gotha, northern German states have proposed a new federation to carry the Frankfurt ideals. However, disturbing reports from Vienna suggest [SCOPE.sCountry('AUS_scope').GetName] may intervene militarily against this 'illegal association'."
 joi_flavor_expand.29.f: "\"Per the 1815 German Federal Act and subsequent accords, reorganization of German states requires unanimous consent - not unilateral action by any single power. [ROOT.GetCountry.GetName]'s Erfurt proposal blatantly violates these treaties, threatening both the Confederation's structure and European peace.\"\n\n\"Should [ROOT.GetCountry.GetName] persist in granting this Union sovereign authority, [SCOPE.sCountry('AUS_scope').GetName] reserves the right to take all necessary measures to preserve the Federal order.\""
 joi_flavor_expand.29.a: "Perhaps we could sound out Austria's position?"
 joi_flavor_expand.29.b: "Better to avoid provoking Vienna."

 joi_flavor_expand.30.t: "The Erfurt Crisis"
 joi_flavor_expand.30.d: "Under [SCOPE.sCountry('erfurter_scope').GetName]'s coercion, northern German states have formed the so-called 'Erfurt Union', continuing their illegitimate unification scheme. In [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], ministers urge [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] to authorize military mobilization to defend the German Confederation's authority."
 joi_flavor_expand.30.f: "\"Article I: States sharing a sovereign with non-German territories shall maintain separate constitutions and administrations...\"\n\n\"Article III: Member states retain all sovereign rights not expressly delegated to the Union. They may conclude treaties, provided these don't conflict with Union interests...\""
 joi_flavor_expand.30.a: "We have enough troubles without this crisis."
 joi_flavor_expand.30.b: "Damn those [SCOPE.sCountry('erfurter_scope').GetName]ns! The Union must dissolve - or face war!"

 joi_flavor_expand.31.t: "The Erfurt Constitution"
 joi_flavor_expand.31.d: "With [SCOPE.sCountry('AUS_scope').GetName]'s reluctant acceptance, a conservative constitution modeled after the Paulskirche document has been proclaimed. Many Germans now see [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]'s coronation as a crucial step toward unification."
 joi_flavor_expand.31.f: "\"The Union shall be governed by a Federal Council under Prussian presidency... The Bundespräsidium is vested in the [ROOT.GetCountry.GetName] crown...\"\n\n\"Member states may conduct foreign relations, provided these don't conflict with Union interests. All treaties affecting the Union require Federal approval...\""
 joi_flavor_expand.31.a: "Long live [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]!"

 joi_flavor_expand.32.t: "The Capitulation at Olmütz"
 joi_flavor_expand.32.d: "Under overwhelming Austrian pressure, Erfurt Union members are defecting. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] has reluctantly accepted [SCOPE.sCountry('AUS_scope').GetName]'s terms, dissolving the Union in what nationalists decry as 'The Humiliation of Olmütz' - a shameful surrender to Habsburg dominance."
 joi_flavor_expand.32.f: "\"1. [ROOT.GetCountry.GetName] and [SCOPE.sCountry('AUS_scope').GetName] shall jointly resolve the Hessian and Holstein questions through the Federal Diet...\"\n\n\"2. [ROOT.GetCountry.GetName] agrees to: a) Dissolve the Erfurt Union; b) Restore the German Confederation; c) Accept Austrian leadership in Federal military reforms...\""
 joi_flavor_expand.32.a: "National humiliation! We must build a stronger army!"
 joi_flavor_expand.32.b: "National humiliation! We must industrialize to surpass Austria!"

 joi_flavor_expand.33.t: "[SCOPE.sCountry('RUS_scope').GetName] Demands Jerusalem!"
 joi_flavor_expand.33.d: "Tsar Nicholas I has delivered an ultimatum to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]: Surrender control of the Holy City #V Jerusalem#! to Russian protection by week's end, citing alleged persecution of Orthodox Christians. The Tsar threatens military action if we refuse."
 joi_flavor_expand.33.f: "\"We hold in our hands a sick man - gravely ill. Should he slip away prematurely, especially before necessary arrangements are made, it would be a great misfortune.\"\n\n\"Your Majesty is most kind. Permit me to add that while the patient is indeed sick, is it not the duty of strong and generous nations to treat the infirm with compassion?\""
 joi_flavor_expand.33.a: "We must swallow this humiliation."
 joi_flavor_expand.33.b: "Declare jihad! Appeal to the Great Powers for aid!"

 joi_flavor_expand.34.t: "The Holy Land Crisis!"
 joi_flavor_expand.34.d: "Russian claims on Jerusalem have ignited war with [SCOPE.sCountry('TUR_scope').GetName]. With Tsarist threats growing in the Near East, the Sultan's emissaries urge [ROOT.GetCountry.GetName] to join the fight against Russian aggression."
 joi_flavor_expand.34.f: "\"The Holy Places dispute has taken new character - the injustices the Greek Church sought to prevent have occurred, and remedies must now be found. [ROOT.GetCountry.GetName]'s diplomatic 'success' at Constantinople was achieved through intrigue and violence - the very tools the Tsar's government employs as first resort, not last.\""
 joi_flavor_expand.34.a: "[SCOPE.sCountry('RUS_scope').GetName] is too powerful to challenge."
 joi_flavor_expand.34.b: "A golden chance to expel Russia from the Mediterranean! To the Balkans!"

 joi_flavor_expand.35.t: "Guardian of the Holy Sites"
 joi_flavor_expand.35.d: "With Jerusalem restored to Orthodox care, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName] reaches new heights of prestige. The Moscow Patriarch proclaims him \"Protector of Saints and Holy Places,\" sparking nationwide celebration. A new national holiday is declared to commemorate both the sacred victory and the army's glory."
 joi_flavor_expand.35.f: "\"And He said: Take now thy son, thine only son Isaac, whom thou lovest, and get thee into the land of Moriah; and offer him there for a burnt offering upon one of the mountains which I will tell thee of...\"\n\n\"And Abraham lifted up his eyes, and looked, and behold behind him a ram caught in a thicket by his horns: and Abraham went and took the ram, and offered him up for a burnt offering in the stead of his son. And Abraham called the name of that place Jehovah-jireh: as it is said to this day, In the mount of the Lord it shall be seen.\""
 joi_flavor_expand.35.a: "God save [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]!"

 joi_flavor_expand.36.t: "Treaty of Paris: Humiliation"
 joi_flavor_expand.36.d: "The Paris peace treaty ends our war with [SCOPE.sCountry('TUR_scope').GetName] and her allies in bitter defeat. Jerusalem remains beyond our grasp. Court physicians claim [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] succumbed to pneumonia - though rumors persist he took his own life, unable to bear the disgrace."
 joi_flavor_expand.36.f: "\"Article VII: The Sublime Porte is admitted to participate in the advantages of the European concert and public law...\"\n\n\"Article XI: The Black Sea is neutralized; its waters and ports thrown open to commercial shipping and forever closed to warships...\"\n\n\"Article XXX: The Tsar and Sultan maintain their Asiatic possessions in status quo ante bellum...\"\n\nDone at Paris, this thirtieth day of March, 1856."
 joi_flavor_expand.36.a: "A national catastrophe!"

 joi_flavor_expand.37.t: "Treaty of Paris: Triumph"
 joi_flavor_expand.37.d: "The Paris peace treaty seals our glorious victory over [SCOPE.sCountry('RUS_scope').GetName]. The humiliated Tsar - some say literally dying of rage in his Winter Palace - has accepted all terms. Russian ambitions in the Near East lie in ruins."
 joi_flavor_expand.37.f: "\"Article VII: The Sublime Porte is admitted to participate in the advantages of the European concert and public law...\"\n\n\"Article XI: The Black Sea is neutralized; its waters and ports thrown open to commercial shipping and forever closed to warships...\"\n\n\"Article XXX: The Tsar and Sultan maintain their Asiatic possessions in status quo ante bellum...\"\n\nDone at Paris, this thirtieth day of March, 1856."
 joi_flavor_expand.37.a: "The bear is dead! Break out the champagne!"

 joi_flavor_expand.38.t: "[TimeKeeper.GetCurrentDate.Format('y年')]新闻管制法"
 joi_flavor_expand.38.d: "通过对卡尔斯巴德法令坚定不移的执行，激进主义，社会主义和自由主义在[ROOT.GetCountry.GetName]社会中逐渐消亡，成功稳定了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]政府希冀的反动秩序。"
 joi_flavor_expand.38.f: "“德意志邦联所有成员国郑重承诺，将以高度警惕和认真的态度监督本国出版的报纸、期刊和小册子，并确保以一切可能的方式进行监督，以防止相互抱怨和不愉快的争论。”\n\n“他们的意见在某种程度的自由主义和强硬手段之间摇摆不定，然而，一旦原始群体爆发出现在某个州，就不能保证它们不会在任何时候、针对任何其他对象再次出现。”\n\n——克莱门斯·冯·梅特涅"
 joi_flavor_expand.38.a: "政府必须严格执行对社会各界的监察制度！"
 joi_flavor_expand.39.t: "吕佐夫军团的继承人"
 joi_flavor_expand.39.d: "新的自由化政策废除了反动的邦联所制定的言论管制法令，而颁布新法令的[ROOT.GetCountry.GetName]政府则从中得到了学术界和众多社会阶层的一致支持，他们在首都升起了源自吕佐夫自由军团的黑红金三色旗，赞扬[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]为“德意志民族的解放者”。"
 joi_flavor_expand.39.f: "“我们发誓要做一个真正的兄弟之国，无论在危险还是死亡面前，都永不分离；我们发誓要像我们的先辈一样获得自由，宁死不屈，绝不苟活于奴役之中：曾经激昂的竖琴所赢得的，如今已由自由的剑所夺回！”\n\n———弗里德里希·席勒"
 joi_flavor_expand.39.a: "为了言论自由欢呼吧！"
 joi_flavor_expand.39.b: "自由的学术将引领国家繁荣！"
