 war_of_german_unification_frankfurter_crossdeutsche:0 "The War of German Unification"
 war_of_german_unification_frankfurter_crossdeutsche_reason:0 "The Frankfurt National Assembly has proclaimed our monarch, the great [ROOT.GetCountry.GetName][ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], as #variable 'Emperor of All Germans'#!, declaring his sovereignty over the entire German Confederation.\n\nYet, many opponents—both within the Confederation and abroad—fear the loss of their own power. They have denounced the legitimacy of the Frankfurt National Assembly and rejected our unification. War is upon us; only a glorious victory can lay the foundation for our great #variable German Empire#!. Defeat would spell utter ruin."
 war_of_german_unification_frankfurter_crossdeutsche_tt:0 "The Frankfurt National Assembly will triumph, and our nation shall establish sovereignty over the German Confederation."
 war_of_german_unification_frankfurter_crossdeutsche_fail_tt:0 "The Frankfurt National Assembly's authority will collapse, dissolving in disgrace. The dream of a unified Germany will fade for decades."
 war_of_german_unification_frankfurter_crossdeutsche_status:0 "#bold Crush all enemies of German unity under the Parliament's mandate!#!"
 war_of_german_unification_frankfurter_kleindeutsche:0 "The War of German Unification"
 war_of_german_unification_frankfurter_kleindeutsche_reason:0 "The Frankfurt National Assembly has proclaimed our monarch, the great [ROOT.GetCountry.GetName][ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], as #variable 'Emperor of the Germans'#!, asserting his rule over a #variable 'Lesser Germany'#! (excluding Austria).\n\nSome within the Confederation, fearing their privileges, reject this decree. Victory alone can forge our empire; failure is oblivion."
 war_of_german_unification_frankfurter_kleindeutsche_tt:0 "The Frankfurt National Assembly will prevail, securing our dominance over a Prussian-led Germany."
 war_of_german_unification_frankfurter_kleindeutsche_fail_tt:0 "The Frankfurt National Assembly will disband in disgrace, silencing unification cries for a generation."
 war_of_german_unification_frankfurter_kleindeutsche_status:0 "#bold Defeat all foes of unification under the Parliament's banner!#!"
