 end_belgium_interest:0 "The #V Gateway to the Continent#! [concept_journal_entry] will be removed from all participating countries.\nIf [SCOPE.sCountry('BEL_scope').GetName] does not exist, this Journal Entry will be invalidated!\nIf a participating country is not the victor of this [concept_journal_entry], it will receive a negative modifier with the following effects:"
