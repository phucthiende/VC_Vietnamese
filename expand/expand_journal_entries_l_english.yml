 dreikaiserabkommen_3_effect_tt:0 "We will #bold leave the League#!.\nThis removes the [Concept('concept_journal_entry', '$concept_journal_entries$')] for #bold all members#!."

 holy_league_main:0 "Holy Alliance"
 holy_league_main_reason:0 "“#variable In the name of the Holy and Indivisible Trinity#!: The Emperors of [SCOPE.sCountry('AUS_scope').GetName], [SCOPE.sCountry('PRU_scope').GetName], and [SCOPE.sCountry('RUS_scope').GetName], moved by the upheavals of our age, solemnly declare their resolve to base relations upon the immutable truths of Christian doctrine... #bold To uphold faith, peace, and justice in Europe#!, we establish this sacred covenant.”\n\nThe #variable French Revolution#! has shown how the old Christian order crumbles before radicalism. As guardians of the #variable Congress of Vienna#!'s legacy, we must unite to preserve #bold monarchical rule#! against conspirators and rebels."
 holy_league_fail_tt:0 "Two or more members have abandoned the #bold Holy Alliance#!."
 holy_league_fail_2_tt:0 "#bold Germany#! has unified."
 holy_league_fail_3_tt:0 "We have left the #bold Holy Alliance#!."
 equal_leave_holy_league_tt:0 "We shall withdraw from the #bold Holy Alliance#!."
 holy_league_status:0 "Defending Europe's ancient order under [GetLawType('law_monarchy').GetName]."
 holy_league_1_button:0 "Reignite the Anti-French Coalition"
 holy_league_1_button_desc:0 "History repeats: republicanism has overthrown France’s rightful monarchy. We must intervene to restore the Bourbons!"
 holy_league_2_button:0 "Crush Prussian Revolutionaries"
 holy_league_2_button_desc:0 "Prussia, our ally, faces Jacobin revolt. By the Alliance’s terms, we must aid the Hohenzollerns!"
 holy_league_3_button:0 "Crush Austrian Revolutionaries"
 holy_league_3_button_desc:0 "Austria’s Habsburgs are besieged by radicals. We march to save our brother monarchy!"
 holy_league_4_button:0 "Crush Russian Revolutionaries"
 holy_league_4_button_desc:0 "Even Russia, the Alliance’s pillar, is threatened. The Tsar calls for our swords!"
 holy_league_5_button:0 "Leave the Holy Alliance"
 holy_league_5_button_desc:0 "This antiquated pact no longer serves Realpolitik. Let us abandon it."
 holy_league_1_tt:0 "May only target France once per decade."
 holy_league_10_tt:0 "May only intervene once per decade."
 holy_league_5_button_tt:0 "We will quit the Holy Alliance."
 holy_league_5_button_2_tt:0 "Must be an Alliance member."

 law_of_railway:0 "Railway Act"
 law_of_railway_reason:0 "#bold In 1814, George Stephenson’s ‘Rocket’#! inaugurated the railway age—the crowning achievement of the Industrial Revolution. Nations now race to lay tracks, and [ROOT.GetName] must not lag behind.\n\nOur [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] protest that private capital alone cannot blanket the nation with rails. The [concept_government] must pass this act to #bold subsidize and regulate#! this vital industry."
 law_of_railway_possible_tt:0 "Requires an existing #bold railway#! [concept_company] or prior enactment."
 law_of_railway_fail_tt:0 "No #bold railway#! [concept_building] companies exist."

 abolition_of_slavery_act:0 "Imperial Abolition Decree"
 abolition_of_slavery_act_reason:0 "Under the #variable Slavery Abolition Act of 1833#! passed by our suzerain [SCOPE.sCountry('GBR_scope').GetName], #bold slavery is illegal throughout the British Empire#!, and all imperial subjects held in bondage #bold shall be granted freedom by law#!. Yet due to unique circumstances, slavery persists in [ROOT.GetCountry.GetName].\n\nWhitehall has issued stern warnings to the #variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] government#! for flouting imperial decree. The Prime Minister declares: unless we comply with the Supreme Court's ruling and abolish slavery, #bold [SCOPE.sCountry('GBR_scope').GetName] reserves the right to use force against slaveholders under imperial jurisdiction.#!"
 abolition_of_slavery_act_button:0 "Enforce the 1833 Abolition Act"
 abolition_of_slavery_act_button_desc:0 "For moral justice and human liberty, we must obey Parliament and Whitehall by implementing the Slavery Abolition Act within our borders."

