 defend_the_holy_city:0 "Defend the Holy City"
 defend_the_holy_city_reason:0 "The Tsar of [SCOPE.sCountry('RUS_scope').GetName], self-styled #B 'Protector of Orthodoxy'#!, has launched a full-scale invasion. His armies cross the Danube, his fleets enter the Bosphorus—all to seize #V Jerusalem, the holy city of Islam#!.\n\nSince #V Selim the Grim#! took Jerusalem from the Mamluks in 1517, its guardianship has been ours. Here, #V Prophet Muhammad#! received Allah's commandments; here, [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] bears the title #B 'Custodian of the Holy Cities'#!. We #B cannot permit#! our ancient foe to defile this sanctity!"
 defend_the_holy_city_status:0 "#B #O Defend our sovereignty over Jerusalem!#!"
 protect_the_holy_city:0 "Reclaim the Holy City"
 protect_the_holy_city_reason:0 "#B The hour of glory is at hand#!. After centuries of weakening [SCOPE.sCountry('TUR_scope').GetName], our southern foe lies prostrate. [ROOT.GetCountry.GetName] now claims guardianship of Jerusalem—and with it, dominance over the Mediterranean.\n\nBy decree of #B [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], Autocrat of All Russia, Grand Duke of Finland, King of Poland, and Protector of Orthodoxy#!, our armies shall revive the #B spirit of the Crusades#! and #V restore the Promised Land to God's fold#!."
 protect_the_holy_city_status:0 "#B #P Seize Jerusalem, the Promised Land!#!"
 holy_city_crisis:0 "Holy Land Crisis"
 holy_city_crisis_reason:0 "[SCOPE.sCountry('RUS_scope').GetName]'s claim to #v Jerusalem#! has ignited a European war. Since the #v Napoleonic Wars#!, the Tsar—that so-called #v 'Gendarme of Europe'#!—has meddled in our affairs while coveting the East.\n\nNow is the time to show #b who rules the Continent#!. We must aid [SCOPE.sCountry('TUR_scope').GetName] and #b teach the Russians their place#!—lest their power reach the Mediterranean unchallenged."
 holy_city_crisis_status:0 "#B #P Curb Russian influence in the Near East!#!"
 claiming_the_right_of_holy_places_possible_tt:0 "Completed #V 'Peter the Great's Testament: Pacify the Steppe'#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."
 claiming_the_right_of_holy_places_taken_tt:0 "We shall claim guardianship of Jerusalem from the Ottomans.\nWarning: This may provoke Great Power intervention!"

 establish_national_academy:0 "Establish a National Academy"
 establish_national_academy_reason:0 "#B Progress bar shows current #V construction status#!; funding adds #V +1 monthly progress#!.#!\n\nThe #V Industrial Revolution#! has propelled [ROOT.GetCountry.GetName] to breakthroughs in [concept_technology]. Yet sustained [concept_innovation] requires more than lone geniuses—it demands a #B state-sponsored institution#!.\n\nOur finest #v $academics$#! petition [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to fund a #V National Academy#!, a #B grand scholarly citadel#! for [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]."
 establish_national_academy_complete_tt:0 "Construction is complete."
 start_national_academy_project_button:0 "Fund the National Academy"
 start_national_academy_project_button_desc:0 "Establishing a premier academy requires sustained investment in facilities and scholars—a price worthy of our nation's scientific and philosophical ascent."
 establish_national_academy_goal:0 "nan"


 carlsbad_decrees_journal:0 "卡尔斯巴德法令"
 carlsbad_decrees_journal_reason:0 "[SCOPE.sCountry('RUS_scope').GetName]驻#V 德意志邦联#!总领事#yellow 奥古斯特·冯·科策布#!在1819年3月23日的遇刺身亡向德意志邦联内的各级宫廷传递了一个明显的信号：邦联内有一些团体明确且蓄意地追求将德意志转变为共和国的目标，即通过蛊惑青年和人民，必要时甚至通过流血和暴力，来摧毁现有的[ROOT.GetCountry.GetName]政府。\n\n在[SCOPE.sCountry('AUS_scope').GetName]和#yellow 梅特涅#!首相的努力下，邦联议会在当年的8月颁布了#B #L 卡尔斯巴德法令#!#!，旨在镇压一切#B 自由主义和民族主义#!的诉求，并确保与之相关的人士被#V 禁止传播其言论#!，或#V 驱逐出国#!。\n\n毫无疑问，为了防止[GetIdeology('ideology_radical').GetName]对我国王室和政府的进一步威胁，我们必须遵守#B #L 卡尔斯巴德法令#!#!的要求以确保这些暴徒#B 不会以任何方式冒头#!。"
 carlsbad_decrees_journal_tt:0 "#B 德意志#!已经统一"
 carlsbad_decrees_journal_1_button:0 "废除卡尔斯巴德法令"
 carlsbad_decrees_journal_1_button_desc:0 "这份法令所代表的对即将爆发革命的妄想恐惧是完全没有理由的，这种恐惧正是被蓄意煽动起来的——是时候向我们的人民开放一定的言论自由了，这才是真正巩固现有秩序——包括政府和王室的方法。"
 carlsbad_decrees_journal_2_button:0 "执行处决条例"
 carlsbad_decrees_journal_2_button_desc:0 "一些秘密或者半公开的民主派正活跃于我国的政治界和社会，他们毫无疑问正试图积极推进反对[ROOT.GetCountry.GetName]王位的阴谋——为了我国的安定，政府必须采取行动。"
