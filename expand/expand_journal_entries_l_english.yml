 deutsch_frankfurter_nationalversammlung:0 "Frankfurt National Assembly"
 deutsch_frankfurter_nationalversammlung_reason:0 "Since the #variable Napoleonic Wars#!, #bold nationalist currents#! have resurged across the German Confederation. Revolutionaries cry for #variable unity, justice, and freedom!#!\n\nThe #bold March Revolution#! saw rebels seize half of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], forcing [ROOT.GetCountry.GetName]'s [concept_government] and [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] to accept their demands. [SCOPE.sCharacter('frankfurter_leader').GetFirstName] now represents us in Frankfurt, debating #bold German unification and constitutionalism#!.\n\nFor #bold radicals and liberals#!, this assembly marks their triumph. But for #bold conservatives and [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, it spells danger: liberal delegates dominate discussions of the #variable Imperial Constitution#!, which may strip monarchs of power—or even emulate [SCOPE.sCountry('USA_scope').GetName] by #bold abolishing all German thrones to establish a republic#!.\n\nYet nothing is decided. Through influence, we may yet steer the assembly toward #bold outcomes favorable to our cause.#!"
 deutsch_frankfurter_nationalversammlung_status:0 "#O The Parliament deliberates—its resolutions on constitution and unification loom. Greater German states wield decisive influence.#!"
 deutsch_frankfurter_nationalversammlung_complete_1_tt:0 "Liberals achieved overwhelming dominance (≥70%)"
 deutsch_frankfurter_nationalversammlung_complete_2_tt:0 "A German major power accepted coronation, unifying Germany"
