 dip_dreikaiserabkommen:0 "League of the Three Emperors"
 dip_dreikaiserabkommen_reason:0 "The balance of power in Europe has shifted with the rise of a unified [SCOPE.sCountry('GER_scope').GetName]. Though the Holy Alliance is now but a memory, shared conservative interests between #variable Germany, Austria, and Russia#! may yet forge a new pact to mediate geopolitical tensions and secure our eastern frontiers.\n\nOur contested borders in Eastern Europe have long bred instability, with no effective framework to resolve disputes. Yet through the #bold Treaty of Vienna#!, we may reconcile our differences, rekindling mutual trust to uphold the #variable old Holy Alliance's vision of a monarchical European order#!."
 dip_dreikaiserabkommen_tt:0 "Maintain the League to preserve peace in Eastern Europe."
 refuse_dreikaiserabkommen_tt:0 "This will initiate the League for your nation.\nIf any party refuses, this [Concept('concept_journal_entry', '$concept_journal_entries$')] ends!"
 dip_dreikaiserabkommen_possible_tt:0 "All #bold Holy Alliance#! [Concept('concept_journal_entry', '$concept_journal_entries$')] entries must be concluded."
 dip_dreikaiserabkommen_fail_tt:0 "A #bold signatory#! has withdrawn from the League."
 dip_dreikaiserabkommen_fail_rus_tt:0 "At [concept_war] with Russia"
 dip_dreikaiserabkommen_fail_aus_tt:0 "At [concept_war] with Austria"
 dip_dreikaiserabkommen_fail_ger_tt:0 "At [concept_war] with Germany"
 dip_dreikaiserabkommen_possible_1_tt:0 "[concept_relations] with Germany ≥ 60"
 dip_dreikaiserabkommen_possible_2_tt:0 "[concept_relations] with Austria ≥ 60"
 dip_dreikaiserabkommen_possible_3_tt:0 "[concept_relations] with Russia ≥ 60"
 dip_dreikaiserabkommen_1_button:0 "Renew the Reinsurance Treaty"
 dip_dreikaiserabkommen_1_button_desc:0 "Our last [concept_diplomatic_pact] ensuring peace has expired. To reaffirm trust, we propose renewing this agreement—a symbol of goodwill among monarchies."
 dreikaiserabkommen_1_possibel_tt:0 "Must wait 10 years since last renewal."
 dip_dreikaiserabkommen_2_button:0 "Invoke Alliance Obligations"
 dip_dreikaiserabkommen_2_button_desc:0 "By the League's terms, our defensive war entitles us to demand military aid from our allies!"
 dreikaiserabkommen_2_possibel_tt:0 "May only be invoked once per decade."
 dip_dreikaiserabkommen_2_effect_tt:0 "All signatories will owe the defender an [concept_obligation]"
 dip_dreikaiserabkommen_3_button:0 "Withdraw from the League"
 dip_dreikaiserabkommen_3_button_desc:0 "This pact no longer serves our geopolitical interests. It is time to depart."
