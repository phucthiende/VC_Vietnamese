l_english:

 deutsch_bundestag:0 "German Confederation"
 deutsch_bundestag_status:0 "#bold A German state that has researched #variable Nationalism#! technology and is experiencing the #variable Spring of Nations#! may face revolution, replacing the Confederation with a National Assembly seeking German unification!#!"
 deutsch_bundestag_frankfurter_status:0 "#N #B The revolutionary Frankfurt National Assembly has temporarily assumed all functions of the Confederate Diet#!#!"
 deutsch_bundestag_rebuild_status:0 "#bold The German Confederate Diet continues nominal operations after reconstruction#!"
 deutsch_bundestag_reason:0 "When the #O German Confederation#! exists, the #variable Frankfurt National Assembly#! may be convened if any #yellow German State#! meets the following conditions:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_nationalism_tech_researched_checkbox')] Researched #v Nationalism#![concept_technology]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_spring_time_of_people_checkbox')]Has Experienced #v Springtime of the Peoples#! [concept_journal_entry]\n\n#bold Established by the 1815 Congress of Vienna#!, the#variable German Confederation#! aimed to protect the remaining German principalities after [SCOPE.sCountry('FRA_scope').GetName]'s invasions. Far looser than the Holy Roman Empire or Rhine Confederation, its members formed neither a#bold military alliance#! nor#bold trade union#!, bound by no enforceable laws.\n\nThough not a true nation, the#B Federal Convention in Frankfurt#! held some authority. However, its decisions were heavily influenced by two#B dominant powers#!: the#bold Permanent President#! [SCOPE.sCountry('AUS_scope').GetName] and#bold Permanent Vice-President#! [SCOPE.sCountry('PRU_scope').GetName].\n\n#V The Frankfurt Federal Assembly#! remains active, allowing German states to seek aid from its presidents during defensive [concept_war]."
 deutsch_bundestag_tt_1:0 "Should any nation achieve#bold German unification#!, the Confederation will dissolve, and its Diet cease."
 deutsch_bundestag_1_button:0 "Invoke Article XI of the Federal Act"
 deutsch_bundestag_1_button_desc:0 "The Congress of Vienna obligated its presidents to defend German principalities' freedom and independence. As we are in a defensive war, Article XI compels Austria and Prussia to intervene."
 deutsch_bundestag_1_button_tt:0 "    #bold Requirements#!:\n• Engaged in defensive war\n• Not opposing Prussia or Austria\n• You are a minor German state"
 deutsch_bundestag_1_2_button_tt:0 "#bold Diplomatic Neutrality#!:\nMust not oppose Prussia/Austria in any [concept_diplomatic_play]"
 deutsch_bundestag_1_3_button_tt:0 "  #bold Non-Leader Requirement#!:\nOnly minor German states may invoke this—not Prussia or Austria"
 deutsch_bundestag_1_effect_tt:0 "[SCOPE.sCountry('PRU_scope').GetName] and [SCOPE.sCountry('AUS_scope').GetName] will owe the defender an [concept_obligation]"
 deutsch_bundestag_2_button:0 "Propose Favorable Motion"
 deutsch_bundestag_2_button_desc:0 "The Confederation exists for powerful German states to assert dominance. Let us push the Frankfurt Assembly to debate motions benefiting our interests."
 deutsch_bundestag_2_button_tt:0 "May only propose once every 5 years"
 deutsch_bundestag_1_button_tt_2:0 "Has not#bold invoked this article#! in 5 years"
 deutsch_bundestag_2_button_tt_2:0 "Has not#bold proposed a motion#! in 5 years"

 dream_of_germany:0 "The German Dream"
 dream_of_germany_reason:0 "“#variable The first, original, and only natural borders#! are those of language. Those who speak the same tongue are joined by invisible bonds predating human artifice; they understand one another and may unite more closely. They belong together and are one indivisible whole.”\n\n#bold The Holy Roman Empire#! is long gone. For centuries, our people thrived without centralized rule—the#bold Hanseatic League#! of northern cities fostered prosperity through trade and knowledge, transforming Germany into a wealthy manufacturing hub.\n\nNow, the age of#bold Nationalism#! dawns. Railways and the Zollverein strengthen our bonds. The#bold destiny#! of unification burns in German hearts. [ROOT.GetCountry.GetName] must seize this glory!\n\n#variable Forward! For the German Fatherland!#!"
 dream_of_germany_1_tt:0 "Our nation has unified Germany"
 dream_of_germany_status:0 "#bold #U Germany's destiny approaches.#!#!"
 dream_of_germany_2_tt:0 "Germany was unified by another"

 belgium_interest:0 "Gateway to Europe"
 belgium_interest_reason:0 "Progress tracks the [concept_country] with influence in Belgium.\n\nStrategically wedged between#bold the Low Countries#! and#bold France-Germany#!, [SCOPE.sCountry('BEL_scope').GetName] became Europe's commercial crossroads after independence. Antwerp and Brussels—where#bold Atlantic#! and#bold Rhine#! trade routes meet—thrived on#bold low tariffs#! and#bold prime location#!, handling British goods and Franco-German exchanges.\n\nYet Belgium's political fate hangs in the balance. France covets it for#bold “natural borders”#!, Britain blocks French expansion, and German powers eye the Low Countries for military security. [SCOPE.sCountry('BEL_scope').GetName]’s future rests on [concept_great_power] rivalry."
