 deutsch_frankfurter_nationalversammlung_fail_3_tt:0 "All major powers rejected coronation"
 deutsch_frankfurter_nationalversammlung_1_button:0 "Withdraw from the Parliament"
 deutsch_frankfurter_nationalversammlung_1_button_desc:0 "The Parliament's radicalism threatens our government. Even at the cost of domestic unrest, we must recall our delegates!"
 deutsch_frankfurter_nationalversammlung_1_button_tt:0 "We withdraw from deliberations—but if major powers agree on unification, they may still impose it by force."
 deutsch_frankfurter_nationalversammlung_2_button:0 "Defy the Parliament"
 deutsch_frankfurter_nationalversammlung_2_button_desc:0 "The Parliament's radicalism is irreconcilable with our interests. Let the delegates storm out—even if it collapses the assembly and sparks revolts!"
 deutsch_frankfurter_nationalversammlung_2_button_tt:0 "Our withdrawal may dissolve the Parliament, triggering pan-German revolutionary unrest."
