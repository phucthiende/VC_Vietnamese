l_english:

 joi_flavor_colony.1.t: "The Congress of Berlin"
 joi_flavor_colony.1.d: "To determine a 'rational' division of African territories and spheres of influence, the world's foremost colonial powers gather in Berlin: [SCOPE.sCountry('berlin_conference_gbr_power').GetName], [SCOPE.sCountry('berlin_conference_fra_power').GetName], [SCOPE.sCountry('berlin_conference_bel_power').GetName], [SCOPE.sCountry('berlin_conference_ger_power').GetName], [SCOPE.sCountry('berlin_conference_por_power').GetName], [SCOPE.sCountry('berlin_conference_spa_power').GetName], [SCOPE.sCountry('berlin_conference_1_power').GetName], [SCOPE.sCountry('berlin_conference_2_power').GetName], [SCOPE.sCountry('berlin_conference_3_power').GetName], [SCOPE.sCountry('berlin_conference_4_power').GetName], [SCOPE.sCountry('berlin_conference_5_power').GetName], [SCOPE.sCountry('berlin_conference_6_power').GetName], [SCOPE.sCountry('berlin_conference_8_power').GetName], [SCOPE.sCountry('berlin_conference_7_power').GetName], and [SCOPE.sCountry('berlin_conference_9_power').GetName]. Under the guise of 'civilizing missions,' they seek to legitimize their scramble for Africa—without consulting a single African ruler."
 joi_flavor_colony.1.f: "§Y\"The interest of civilized nations in Africa’s material development ensures their cooperation in regulating trade relations, just as the suppression of commercial rivalry through 'equitable competition' proved effective in Asia.\"\n\n\"We are convinced all invited governments share the desire to bring African natives into the fold of civilization: to open the interior to commerce, and to furnish its inhabitants with the means of education and enlightenment.\"\n\n\"The sovereign powers of the Congo Basin pledge to protect missions and institutions that 'uplift' the natives, teaching them to appreciate the benefits of civilization—a task guaranteed by the sacrifices of explorers, merchants, and the very nations now carving the continent.\"§!"
 joi_flavor_colony.1.a: "Africa is a splendid cake, and we must claim our slice."
 joi_flavor_colony.1.b: "With a stroke of the pen, new borders shall rise!"

 joi_flavor_colony.2.t: "The Berlin Act"
 joi_flavor_colony.2.d: "The delegates of [SCOPE.sCountry('berlin_conference_gbr_power').GetName], [SCOPE.sCountry('berlin_conference_fra_power').GetName], [SCOPE.sCountry('berlin_conference_bel_power').GetName], [SCOPE.sCountry('berlin_conference_ger_power').GetName], and others sign a treaty formalizing Africa’s partition. It enshrines 'free trade' in the Congo, mandates the abolition of slavery (in theory), and declares 'effective occupation' as the legal basis for colonial claims—ignoring millennia of indigenous sovereignty."
 joi_flavor_colony.2.f: "§Y\"In the name of Almighty God, the signatory powers resolve to secure favorable conditions for commerce and 'civilization' in Africa, ensuring free navigation on its rivers and preventing disputes over territorial acquisitions.\"\n\n\"No monopoly on trade shall exist in territories under sovereign rule; foreigners shall enjoy equal rights to property and enterprise.\"\n\n\"The neutrality of the Congo Basin is hereby recognized, and all parties pledge to uphold the sovereign rights of states—as defined by European powers.\"§!"
 joi_flavor_colony.2.a: "The sun of [ROOT.GetCountry.GetName] now shines upon the Dark Continent—and shall never set!"

 joi_flavor_colony.3.t: "The Algiers Protocol"
 joi_flavor_colony.3.d: "Following the Berlin Conference, the borders of Algeria’s provinces are codified in a supplementary treaty, signed and sealed by the attending powers—a mere footnote in the larger scramble."
 joi_flavor_colony.3.f: "§Y\"The demarcation of Algeria shall extend from 36°45'N along the Mediterranean coast, eastward via the northern slopes of the Atlas Mountains to the Bougzare Valley; its eastern boundary follows the Djurdjura Range to Tunisia, while the southern limit traces the Saharan oases of Touggourt and Ouargla.\"§!"
 joi_flavor_colony.3.a: "A fitting treaty."
 joi_flavor_colony.3.b: "This is [ROOT.GetCountry.GetName]’s triumph!"

 joi_flavor_colony.4.t: "The West Africa Protocol"
 joi_flavor_colony.4.d: "Following the Berlin Conference, the colonial powers formally demarcate West Africa's borders with pens rather than swords—imposing artificial divisions upon ethnic groups and kingdoms that had existed for centuries."
 joi_flavor_colony.4.f: "§Y\"The boundaries of the West African coast shall extend: from the Guinea coast at 1°00'E eastward to 3°15'E, then north along the Volta River basin to 10°10'N; the northern border follows the Bilinga River's southern highlands eastward to the Bentu Valley; the eastern limit traces the Niger-Koffi confluence at 5°30'E back to the coast.\"§!\n\n§!(Historical Note: These arbitrary lines split the Ashanti Empire and Yoruba lands between British, French, and German spheres.)§!"
 joi_flavor_colony.4.a: "A suitably European arrangement."
 joi_flavor_colony.4.b: "The [ROOT.GetCountry.GetName] flag now flies over ancestral lands we've never seen!"

 joi_flavor_colony.5.t: "The Congo Basin Act"
 joi_flavor_colony.5.d: "The heart of Africa is dissected by European cartographers, with Leopold II's 'Congo Free State' grotesquely enlarged—its rubber-rich borders drawn to appease Brussels while ignoring the Luba and Lunda kingdoms."
 joi_flavor_colony.5.f: "§Y\"Central Africa's borders: from 8°20'N along the Chari River west to Logone Valley; east along the Nile-Congo watershed at 28°10'E; south via the Ubangi-Mbomou rivers to 16°30'E; west along the Sangha River basin.\"§!\n\n§!(The Act tacitly endorsed Leopold's forced labor system—soon to kill millions.)§!"
 joi_flavor_colony.5.a: "Another paper conquest."
 joi_flavor_colony.5.b: "[ROOT.GetCountry.GetName]'s 'civilizing mission' begins with a map!"

 joi_flavor_colony.6.t: "The Kamerun Accord"
 joi_flavor_colony.6.d: "Germany secures its West African foothold as the Duala people's sovereignty is erased by a treaty signed 4,000 miles away. The borders enclose 25 distinct ethnic groups under Berlin's rule."
 joi_flavor_colony.6.f: "§Y\"Kamerun's territory: from 8°50'E on the Guinea coast north to Victoria Bay; bounded by the Adamawa Plateau (9°20'N), the Mbam River watershed eastward, and the Nyong-Wouri highlands southward.\"§!\n\n§!(The Duala kings' 1884 treaties with Germany were ignored in this partition.)§!"
 joi_flavor_colony.6.a: "Efficient, if unethical."
 joi_flavor_colony.6.b: "A tropical plantation for [ROOT.GetCountry.GetName]!"

 joi_flavor_colony.7.t: "The Niger Basin Treaty"
 joi_flavor_colony.7.d: "France and Britain carve up the Niger River's wealth, dividing the Sokoto Caliphate and Mossi kingdoms with geometric precision—and no regard for trans-Saharan trade routes dating back to Timbuktu's golden age."
 joi_flavor_colony.7.f: "§Y\"The Niger territories: bounded by the Aïr Mountains (14°20'N), east along 10°10'-10°50'E to the Niger's headwaters, south to 10°00'N, then southwest via tributaries back to 1°20'E.\"§!\n\n§!(This split the Hausa states between French Niger and British Nigeria.)§!"
 joi_flavor_colony.7.a: "A river divided."
 joi_flavor_colony.7.b: "The [ROOT.GetCountry.GetName] now controls Africa's lifeline!"

 joi_flavor_colony.8.t: "The Togoland Partition"
 joi_flavor_colony.8.d: "A 56,785 km² German protectorate is ratified, stretching inland from the Slave Coast. The Ewe people awake to find themselves split between three empires overnight."
 joi_flavor_colony.8.f: "§Y\"Togoland's borders: coastal frontage from 0°30'E to 1°50'E; westward along the Mono River to 6°00'N; north to 10°30'N across the Atakora Mountains; east via the Oti River watershed.\"§!\n\n§!(Britain and France would later annex these lands in 1914.)§!"
 joi_flavor_colony.8.a: "Neatly packaged."
 joi_flavor_colony.8.b: "[ROOT.GetCountry.GetName]'s 'model colony' is born!"

 joi_flavor_colony.9.t: "The Congo Basin Treaty"
 joi_flavor_colony.9.d: "The Berlin Conference legitimizes Leopold II's personal fiefdom - an area 80 times larger than Belgium. The 'Congo Free State' is born, its borders drawn to maximize rubber extraction while dividing the Luba and Kongo kingdoms."
 joi_flavor_colony.9.f: "§Y\"The Congo Basin is defined as all territories drained by the Congo River and its tributaries, bounded by: the Nile-Ogooué watersheds (2°30'N), Lake Tanganyika's eastern ridges, and the Zambezi-Logé highlands. This includes all lands flowing into Lake Tanganyika's eastern tributaries.\"§!\n\n§!(This geographic fiction ignored that 95% of the basin's inhabitants had never seen a European.)§!"
 joi_flavor_colony.9.a: "A king's private playground."
 joi_flavor_colony.9.b: "The [ROOT.GetCountry.GetName] shall 'civilize' these lands with forced labor!"

 joi_flavor_colony.10.t: "The Angola Partition"
 joi_flavor_colony.10.d: "Portugal secures its 400-year-old claim, extending inland to the Bié Plateau. The Mbundu and Ovimbundu peoples now face intensified slave raids under 'legal' colonial administration."
 joi_flavor_colony.10.f: "§Y\"Angola's borders: Atlantic coast (5°30'S to 17°40'S); north along the Congo-Cuango rivers (13°20'E-16°00'E); east following the Bié Plateau watershed to Cunene River headwaters; south along the Cunene to Namib Desert.\"§!\n\n§!(The 1886 Treaty of Simulambuco would later 'confirm' local chiefs' 'voluntary' submission.)§!"
 joi_flavor_colony.10.a: "Lisbon's dusty heirloom."
 joi_flavor_colony.10.b: "[ROOT.GetCountry.GetName]'s African crown jewel!"

 joi_flavor_colony.11.t: "The Mozambique Accord"
 joi_flavor_colony.11.d: "Portugal's 'Pink Map' dreams collapse as Britain secures the Zambezi Valley. The Gaza Empire and Swahili city-states are partitioned without consultation."
 joi_flavor_colony.11.f: "§Y\"Mozambique's territory extends: along the Indian Ocean (10°40'S to 23°10'S); north via the Rovuma River (11°00'N); west along Lake Nyasa and Shire-Zambezi watersheds; south to Limpopo River (33°00'E).\"§!\n\n§!(This created the British 'Rhodesia' corridor, dooming Portuguese transcontinental ambitions.)§!"
 joi_flavor_colony.11.a: "A coastal strip remains."
 joi_flavor_colony.11.b: "The [ROOT.GetCountry.GetName] flag still flies over Lourenço Marques!"

 joi_flavor_colony.12.t: "The Southwest Africa Act"
 joi_flavor_colony.12.d: "Germany claims the Namib Desert, disregarding Herero and Nama grazing lands. The treaty's straight-line borders presage the coming genocide (1904-1908)."
 joi_flavor_colony.12.f: "§Y\"German Southwest Africa: Atlantic coast (17°40'S-29°30'S); north along Kunene-Okavango watersheds; east via Kalahari's western ridges (20°S-27°S); south along Orange River to 18°50'E.\"§!\n\n§!(The 1894 Witbooi 'protection treaty' was signed under cannon threat.)§!"
 joi_flavor_colony.12.a: "Sand and suffering."
 joi_flavor_colony.12.b: "[ROOT.GetCountry.GetName]'s desert dominion!"

 joi_flavor_colony.13.t: "The East Africa Partition"
 joi_flavor_colony.13.d: "Germany and Britain carve up the Swahili coast, slicing through Masai grazing lands and the Zanzibar Sultanate's mainland territories with geometric precision."
 joi_flavor_colony.13.f: "§Y\"East Africa's borders: Indian Ocean coast (4°50'N to 10°20'S); north via Kilimanjaro foothills to Lake Victoria; west along Tanganyika's eastern shores; south following Ruvuma River watersheds.\"§!\n\n§!(This created the 'Heligoland-Zanzibar Treaty' line that still divides Tanzania/Kenya.)§!"
 joi_flavor_colony.13.a: "A surveyor's fantasy."
 joi_flavor_colony.13.b: "[ROOT.GetCountry.GetName]'s new East African empire!"

 joi_flavor_colony.14.t: "The Kenya-Uganda Accord"
 joi_flavor_colony.14.d: "Britain secures the 'Lunatic Express' railway route to Lake Victoria, disregarding Kikuyu land rights and Bunyoro's sovereignty."
 joi_flavor_colony.14.f: "§Y\"Kenya-Uganda territory: Indian Ocean coast (3°50'N-5°20'N); north via Turkana Lake rift valley; west to Victoria-Nzoia watershed; south along Ngong Hills.\"§!\n\n§!(The 1900 Buganda Agreement would later 'legalize' this land grab.)§!"
 joi_flavor_colony.14.a: "Another railway blueprint."
 joi_flavor_colony.14.b: "The [ROOT.GetCountry.GetName] sun never sets on our highlands!"

 joi_flavor_colony.15.t: "The South Africa Convention"
 joi_flavor_colony.15.d: "Britain consolidates its Cape-to-Cairo dream, formalizing borders that trap the Zulu, Xhosa and Sotho peoples between colonial states and Boer republics."
 joi_flavor_colony.15.f: "§Y\"South Africa's borders: Cape coast (17°00'E-33°30'E); west along Orange River headwaters; north via Kalahari escarpment; east following Drakensberg peaks.\"§!\n\n§!(The 1910 Union would later cement these artificial divisions.)§!"
 joi_flavor_colony.15.a: "A miner's map."
 joi_flavor_colony.15.b: "Diamonds and dominion for [ROOT.GetCountry.GetName]!"

 joi_flavor_colony.16.t: "The Northern Rhodesia Protocol"
 joi_flavor_colony.16.d: "Cecil Rhodes' BSAC claims the copper-rich lands of the Bemba and Lozi kingdoms, drawing borders that will later feed Zambia's liberation struggle."
 joi_flavor_colony.16.f: "§Y\"Northern Rhodesia: bounded by Tanganyika's southern shores (30°00'E westwards); east via Luapula tributaries; south along Zambezi River (14°30'N-23°00'E); west to Kasai headwaters.\"§!\n\n§!(The 1890 Lochner Treaty with Lewanika was signed under false pretenses.)§!"
 joi_flavor_colony.16.a: "Copper-colored borders."
 joi_flavor_colony.16.b: "[ROOT.GetCountry.GetName]'s African Eldorado!"

 joi_flavor_colony.17.t: "The Libya Agreement"
 joi_flavor_colony.17.d: "Italy's 'Fourth Shore' ambitions are recognized, drawing Ottoman Tripolitania's borders through Senussi heartlands without consultation."
 joi_flavor_colony.17.f: "§Y\"Libya's territory: Mediterranean coast (10°10'E-25°30'E); west via Jufra oases (30°40'N-25°00'N); east along Cyrenaican highlands; south across Fezzan watersheds.\"§!\n\n§!(These borders ignored the 1912 Treaty of Lausanne's nominal Ottoman sovereignty.)§!"
 joi_flavor_colony.17.a: "A desert mirage."
 joi_flavor_colony.17.b: "[ROOT.GetCountry.GetName] plants its flag in Roman sands!"
