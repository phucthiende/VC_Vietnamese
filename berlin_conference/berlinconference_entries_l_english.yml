l_english:
 rule_berlin_conference_rules: "Scramble for Africa"
 setting_berlin_conference_enable_event: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_berlin_conference_enable_event_desc #high Enable the Berlin Conference#!#!#!"
 setting_berlin_conference_enable_event_desc: "#V Scramble for Africa#![Concept('concept_journal_entry', '$concept_journal_entries$')] will convene an #O international conference#! upon completion, where a voting mechanism will #O re-partition Africa#![Concept('concept_state_region','$concept_state_regions$')], eliminating most [concept_split_state]."
 setting_berlin_conference_disable_event: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_berlin_conference_disable_event_desc #high Disable the Berlin Conference#!#!#!"
 setting_berlin_conference_disable_event_desc: "This will disable the #V Berlin Conference#![Concept('concept_journal_entry', '$concept_journal_entries$')]."

 berlin_conference_begin_1_tt:0 "The nations participating in the Partition of Africa will convene a formal conference to establish protocols for demarcating African territorial boundaries."
 scramble_for_africa_complete_3_tt:0 "Africa#header 75%#! [Concept('concept_state_region','$concept_state_regions$')] must be fully controlled by either: 1) Any nation with its capital outside Africa, 2) A [concept_subject] of such nation, or 3) An African [concept_recognized_power]."
 scramble_for_africa_has_start:0 "The Scramble for Africa has commenced"

 berlin_conference:0 "The Berlin Conference (1884-85)"
 berlin_conference_reason:0 "#variable Each session will last 2 months, during which all participating nations may vote to influence the territorial division.#!\n\n#V #P Nations will typically vote: 1) For themselves in regions of vital interest, 2) For allies in regions of lesser interest,#!#! and #V #N Refuse to vote for rivals or nations with high infamy!#!#!\n\nAs explorers, trading companies, and colonial administrations penetrate deeper into Africa,#variable the Scramble for Africa#! reaches its climax, with few territories remaining unclaimed on this so-called 'Dark Continent'.\n\nTo hasten the division of these#variable 'final frontiers'#! while maintaining diplomatic coordination, plenipotentiaries from [SCOPE.sCountry('berlin_conference_gbr_power').GetName] (United Kingdom), [SCOPE.sCountry('berlin_conference_fra_power').GetName] (France), [SCOPE.sCountry('berlin_conference_bel_power').GetName] (Belgium), [SCOPE.sCountry('berlin_conference_ger_power').GetName] (Germany), [SCOPE.sCountry('berlin_conference_por_power').GetName] (Portugal), [SCOPE.sCountry('berlin_conference_spa_power').GetName] (Spain), and other invited powers have gathered in Berlin. Their mission:#bold to establish binding international agreements on African territorial boundaries that will theoretically maintain colonial peace for generations to come.#!"
 berlin_conference_complete_tt:0 "Successfully reached agreements on the division of#V #P Algeria, West Africa, Equatorial Africa, Kamerun, Niger-Gold Coast, Togoland, Congo Basin, Angola, Northern Rhodesia, Mozambique, German Southwest Africa, East Africa, Kenya, Cape Colony, and Tripolitania#!#!."
 berlin_conference_15_states:0 "Next session will deliberate on#V #P West Africa#!#!"
 berlin_conference_14_states:0 "Next session will deliberate on#V #P Tripolitania#!#!"
 berlin_conference_13_states:0 "Next session will deliberate on#V #P Northern Rhodesia#!#!"
 berlin_conference_12_states:0 "Next session will deliberate on#V #P Cape Colony#!#!"
 berlin_conference_11_states:0 "Next session will deliberate on#V #P Kenya#!#!"
 berlin_conference_10_states:0 "Next session will deliberate on#V #P East Africa#!#!"
 berlin_conference_9_states:0 "Next session will deliberate on#V #P German Southwest Africa#!#!"
 berlin_conference_8_states:0 "Next session will deliberate on#V #P Mozambique#!#!"
 berlin_conference_7_states:0 "Next session will deliberate on#V #P Angola#!#!"
 berlin_conference_6_states:0 "Next session will deliberate on#V #P Congo Basin#!#!"
 berlin_conference_4_states:0 "Next session will deliberate on#V #P Togoland#!#!"
 berlin_conference_3_states:0 "Next session will deliberate on#V #P Niger-Gold Coast#!#!"
 berlin_conference_2_states:0 "Next session will deliberate on#V #P Kamerun#!#!"
 berlin_conference_1_states:0 "Next session will deliberate on#V #P Equatorial Africa#!#!"
 berlin_conference_0_states:0 "#bold This concluding session will formally adjourn the Berlin Conference#!"
 berlin_conference_some_journal_complete_tt:0 "#V #N When deliberation time expires, the region will be awarded to the participating power with the most votes!#!#!"
 finish_berlin_conference_tt:0 "Completed the#V Berlin Conference#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"

 berlin_conference_proposal_possible_tt:0 "No votes have yet been cast for this session's agenda"
 berlin_conference_proposal_1:0 "Support [SCOPE.sCountry('berlin_conference_gbr_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_gbr_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_1_desc:0 "[SCOPE.sCountry('berlin_conference_gbr_power').GetNameNoFlag] presents the most legitimate claim to this territory. Their Royal Navy guarantees security for native populations while advancing civilization through lawful commerce and Anglican missions."
 berlin_conference_proposal_2:0 "Support [SCOPE.sCountry('berlin_conference_fra_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_fra_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_2_desc:0 "[SCOPE.sCountry('berlin_conference_fra_power').GetNameNoFlag]'s claim derives from established military presence and the mission civilisatrice. Their colonial troops already maintain order throughout the region."
 berlin_conference_proposal_3:0 "Support [SCOPE.sCountry('berlin_conference_bel_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_bel_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_3_desc:0 "Leopold's International African Association promises free trade and development. [SCOPE.sCountry('berlin_conference_bel_power').GetNameNoFlag] will transform this land into a profitable venture for all civilized nations."
 berlin_conference_proposal_4:0 "Support [SCOPE.sCountry('berlin_conference_spa_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_spa_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_4_desc:0 "[SCOPE.sCountry('berlin_conference_spa_power').GetNameNoFlag]'s historical ties through the Canary Islands and centuries of missionary work create natural cultural affinity with this territory."
 berlin_conference_proposal_5:0 "Support [SCOPE.sCountry('berlin_conference_por_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_por_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_5_desc:0 "As the first European power in Africa since 1415, [SCOPE.sCountry('berlin_conference_por_power').GetNameNoFlag] holds ancient trading rights and fortifications along this coast that predate all other claims."
 berlin_conference_proposal_6:0 "Endorse [SCOPE.sCountry('berlin_conference_1_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_1_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_6_desc:0 "As a neutral party, [SCOPE.sCountry('berlin_conference_1_power').GetNameNoFlag] offers balanced administration that prevents any single power from dominating this strategic region."
 berlin_conference_proposal_7:0 "Endorse [SCOPE.sCountry('berlin_conference_2_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_2_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_7_desc:0 "[SCOPE.sCountry('berlin_conference_2_power').GetNameNoFlag]'s modest colonial ambitions provide a stabilizing counterweight to more expansionist powers in this sector."
 berlin_conference_proposal_8:0 "Endorse [SCOPE.sCountry('berlin_conference_3_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_3_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_8_desc:0 "This claim by [SCOPE.sCountry('berlin_conference_3_power').GetNameNoFlag] creates a beneficial neutral buffer zone between competing spheres of influence."
 berlin_conference_proposal_9:0 "Endorse [SCOPE.sCountry('berlin_conference_4_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_4_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_9_desc:0 "[SCOPE.sCountry('berlin_conference_4_power').GetNameNoFlag] offers shared commercial access and coaling stations to all treaty signatories under their administration."
 berlin_conference_proposal_10:0 "Endorse [SCOPE.sCountry('berlin_conference_5_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_5_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_10_desc:0 "Approval of [SCOPE.sCountry('berlin_conference_5_power').GetNameNoFlag]'s claim would honor prior treaties with local rulers while maintaining the continental balance of power."
 berlin_conference_proposal_11:0 "Endorse [SCOPE.sCountry('berlin_conference_6_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_6_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_11_desc:0 "[SCOPE.sCountry('berlin_conference_6_power').GetNameNoFlag]'s proposal includes guarantees for missionary access from all Christian denominations."
 berlin_conference_proposal_12:0 "Endorse [SCOPE.sCountry('berlin_conference_7_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_7_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_12_desc:0 "This measured claim by [SCOPE.sCountry('berlin_conference_7_power').GetNameNoFlag] prevents territorial overreach while securing essential trade routes."
 berlin_conference_proposal_13:0 "Support [SCOPE.sCountry('berlin_conference_ger_power').GetName]'s claim:#V #P [GetGlobalVariable('berilin_conference_support_ger_proposal').GetValue]#!#! votes"
 berlin_conference_proposal_13_desc:0 "Germany's efficient colonial administration in [SCOPE.sCountry('berlin_conference_ger_power').GetNameNoFlag] has demonstrated remarkable success in resource extraction while maintaining native welfare - a model for modern colonialism."
 berlin_conference_proposal_14:0 "Endorse [SCOPE.sCountry('berlin_conference_8_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_ger_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_14_desc:0 "[SCOPE.sCountry('berlin_conference_8_power').GetNameNoFlag]'s limited territorial request demonstrates appropriate colonial restraint worthy of support."
 berlin_conference_proposal_15:0 "Endorse [SCOPE.sCountry('berlin_conference_9_power').GetName]'s Claim: #V #P [GetGlobalVariable('berilin_conference_support_ger_proposal').GetValue]#!#! Votes"
 berlin_conference_proposal_15_desc:0 "The conference should recognize [SCOPE.sCountry('berlin_conference_9_power').GetNameNoFlag]'s existing commercial treaties with native authorities in this region."
 every_nation_has_sign_last_treaty_tt:0 "All participating powers have ratified the previous protocol."
 not_winner_of_wf_or_nf_tt:0 "This nation cannot claim Niger-Gold Coast without prior concessions in Algeria or West Africa - the conference maintains regional spheres of influence."
 not_winner_of_wf_or_cf_tt:0 "Congo Basin claims require demonstrated interests in either West Africa or Equatorial Africa per conference guidelines."
 not_winner_of_con_or_cf_or_wf_tt:0 "Angola shall only be granted to powers already established in West Africa, Equatorial Africa or the Congo Basin."
 not_winner_of_con_tt:0 "Mozambique allocation requires prior Congo Basin holdings as per colonial adjacency principles."
 not_winner_of_con_2_tt:0 "East African claims demand existing Congo Basin territories to ensure contiguous administration."
 not_winner_of_an_or_moz_or_con_tt:0 "The Cape Colony shall be reserved for powers with existing southern African possessions in Angola, Mozambique or Congo."
 winner_of_an_or_moz_or_sf_or_ef_tt:0 "Northern Rhodesia naturally extends the colonial systems of Angola, Mozambique, Cape Colony or East Africa."
 any_country_has_finish_the_journal_tt:0 "This session has concluded with unanimous consent of the attending powers"

 berlin_conference_north_africa:0 "Agenda: Partition of Algeria"
 berlin_conference_north_africa_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Algerian Coast#! has been the Mediterranean's strategic gateway since Phoenician traders established Carthage. These fertile coastal plains and Saharan access routes contain Roman ruins, Ottoman fortresses, and - since the 1830 Fan Affair - French military outposts. With its wheat fields, iron deposits, and control over trans-Saharan trade routes:#bold The fate of the Maghreb hangs on this decision.#!"
 berlin_conference_north_africa_states:0 "This session will determine sovereignty over#V #P Constantine, Algiers, Oran, Sahara, Eastern Sahara#!#!"
 berlin_conference_west_africa:0 "Agenda: Partition of West Africa"
 berlin_conference_west_africa_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Gold and Ivory Coasts#! built the medieval Mali Empire and later fueled the transatlantic slave trade. Abandoned Portuguese forts dot these shores where palm oil now flows instead of human chattel. The Niger River's fertile delta and rumored mineral wealth make this prize worth fighting for:#bold Control here commands both Atlantic commerce and access to Timbuktu's legendary markets.#!"
 berlin_conference_west_africa_states:0 "This session will determine sovereignty over#V #P Mauritania, Inner Mauritania, Timbuktu, Senegal, Gambia, Western Mali, Eastern Mali, Volta, Outer Hausaland, Guinea, Windward Coast, Ivory Coast, Dahomey#!#!"

 berlin_conference_equatorial_africa:0 "Agenda: Partition of Equatorial Africa"
 berlin_conference_equatorial_africa_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Sahelian Gateway#! connects the Congo Basin to Islamic North Africa via the Ubangi and Chari river systems. Arab slavers once marched captives through these savannahs, while German explorers now chart its waterways. Controlling this ecological transition zone means:#bold Commanding the crossroads between desert, jungle, and the continent's mineral heartland.#!"
 berlin_conference_equatorial_africa_states:0 "This session will determine sovereignty over#V #P Chad, Wadai, Ubangi-Shari, Congo, Gabon#!#!"

 berlin_conference_cameroon:0 "Agenda: Partition of Kamerun"
 berlin_conference_cameroon_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The 'Shrimp Coast'#! rises from mangrove swamps to Mount Cameroon's 4,040-meter peak. British traders dominate Douala's harbor, while German botanists catalog unique flora. This biological treasure chest produces rubber, coffee, and the finest ivory in Africa:#bold Whoever plants their flag here controls the Bight of Biafra's commerce.#!"
 berlin_conference_cameroon_states:0 "This session will determine sovereignty over#V #P Southern Kamerun, Northern Kamerun#!#!"

 berlin_conference_niger:0 "Agenda: Partition of Niger-Gold Coast"
 berlin_conference_niger_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\nSince the era of Slave Castles and Gold Coast fortifications,#bold the Niger Delta#! has been the crucible of African-European commerce. The river serves as a liquid highway through palm oil plantations and potential goldfields, while coastal ports like Lagos anchor Atlantic trade routes. Though these waters once carried human cargo, they now present an opportunity:#bold To replace the slave trade with 'legitimate commerce' through colonial administration.#!"
 berlin_conference_niger_states:0 "This session will determine sovereignty over#V #P Niger Delta, Benin, Nigeria, Bornu, Eastern Hausaland, Hausaland, Yorubaland, Gold Coast#!#!"

 berlin_conference_togo:0 "Agenda: Partition of Togoland"
 berlin_conference_togo_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Togo Strip#! represents the Gold Coast's most contested corridor - a slender 50km-wide territory where Danish, British, and German traders jostle beneath the walls of abandoned Ashanti forts. Its volcanic soil grows premium cocoa, while the natural harbor at Lomé offers shelter from Atlantic storms. As the last unclaimed stretch between British and French spheres:#bold This land could tip the balance of West African influence.#!"
 berlin_conference_togo_states:0 "This session will determine sovereignty over#V #P Togoland#!#!"

 berlin_conference_congo:0 "Agenda: Partition of Congo Basin"
 berlin_conference_congo_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Congo River's 4,700km artery#! pulses through Africa's equatorial heart, draining a basin of unimaginable rubber and mineral wealth. Stanley's expeditions revealed its navigable potential, while Leopold's propaganda masks brutal extraction. With Portuguese claims from Angola, French from Brazzaville, and British commercial interests:#bold This is the chessboard where empires either checkmate or get checkmated.#!"
 berlin_conference_congo_states:0 "This session will determine sovereignty over#V #P Lower Congo, Equatorial Congo, Kasai, Eastern Congo, Katanga#!#!"

 berlin_conference_angola:0 "Agenda: Partition of Angola"
 berlin_conference_angola_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold Portugal's African Crown Jewel#! since 1575, Angola's Luanda was the slave trade's busiest port - 3 million souls shipped across the Atlantic. Now its deepwater harbors export coffee and cotton, while the Benguela Railway project promises access to Katanga's copper. Though Lisbon claims 'historical rights', the territory's mineral wealth and strategic position between Congo and Namibia make it:#bold The keystone to southern Africa's colonial architecture.#!"
 berlin_conference_angola_states:0 "This session will determine sovereignty over#V #P Northern Angola, Eastern Angola, Southern Angola#!#!"

 berlin_conference_mozambique:0 "Agenda: Partition of Mozambique"
 berlin_conference_mozambique_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Swahili Coast's Southern Gateway#! has served as Africa's portal to the Indian Ocean since Sofala's 10th-century gold trade with Great Zimbabwe. The Zambezi River's navigable reaches penetrate deep into the interior, while Portuguese forts at Ilha de Moçambique testify to 400 years of Lusophone influence. With its monsoon trade winds linking Arabia to Madagascar:#bold This is where continental Africa meets the maritime Silk Road.#!"
 berlin_conference_mozambique_states:0 "This session will determine sovereignty over#V #P Mozambique, Zambesia, Lourenço Marques#!#!"

 berlin_conference_namibia:0 "Agenda: Partition of German Southwest Africa"
 berlin_conference_namibia_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Skeleton Coast's#! freezing Benguela Current creates impenetrable fog banks that hide Walvis Bay's natural harbor - the only deepwater port between Luanda and Cape Town. Though the Namib Desert appears barren, German geologists confirm diamond deposits beneath its sands, while the Herero and Nama peoples' grazing lands could support vast ranches:#bold This territory may yet become the Prussia of Africa.#!"
 berlin_conference_namibia_states:0 "This session will determine sovereignty over#V #P Hereroland, Namaqualand#!#!"

 berlin_conference_east_africa:0 "Agenda: Partition of German East Africa"
 berlin_conference_east_africa_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Spice Islands of the Mainland#! where Zanzibar's Omani sultans once monopolized the clove trade. Kilwa's ruined coral mosques testify to medieval Swahili prosperity, while modern Bagamoyo serves as the terminus for Arab slave caravans. With the proposed Uganda Railway promising access to Lake Victoria's fertile highlands:#bold This is where the 'Lunatic Express' begins its climb into Africa's interior.#!"
 berlin_conference_east_africa_states:0 "This session will determine sovereignty over#V #P Zanzibar, Lindi, Tanganyika#!#!"

 berlin_conference_kenya:0 "Agenda: Partition of British East Africa"
 berlin_conference_kenya_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The White Highlands#! offer Europe's closest approximation to African paradise - cool plateaus perfect for coffee plantations, snow-capped Mount Kenya providing fresh water, and Mombasa's natural harbor anchoring trade routes to Bombay. Though Maasai pastoralists and Kikuyu farmers dominate these lands, their resistance to colonial settlement is weakening:#bold Here lies the future breadbasket of British Africa.#!"
 berlin_conference_kenya_states:0 "This session will determine sovereignty over#V #P Kenya, Great Rift Valley, Uganda#!#!"

 berlin_conference_south_africa:0 "Agenda: Partition of Cape Colony and Boer Republics"
 berlin_conference_south_africa_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Tavern of Two Oceans#! where Dutch East India Company's vegetable gardens at Table Bay became the British Empire's strategic linchpin. The Witwatersrand gold reefs remain untapped, while Kimberley's diamond pipes already reshape global finance. With the Boers' Great Trek having created independent republics beyond British control:#bold This is where mineral wealth and Afrikaner defiance collide.#!"
 berlin_conference_south_africa_states:0 "This session will determine sovereignty over#V #P Cape Colony, Northern Cape, Eastern Cape, Natal, Orange Free State, Transvaal, Bechuanaland, Zambesia#!#!"

 berlin_conference_zambia:0 "Agenda: Partition of Northern Rhodesia"
 berlin_conference_zambia_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Copperbelt Crossroads#! where the Zambezi and Luapula rivers converge, creating natural highways between the Luba and Kazembe kingdoms. British explorer David Livingstone documented these waterways in 1855, while Belgian concessionaires now eye its coal deposits for steam transport. With Cecil Rhodes' British South Africa Company pushing northward:#bold This land could become either the keystone or stumbling block of Cape-to-Cairo ambitions.#!"
 berlin_conference_zambia_states:0 "This session will determine sovereignty over#V #P Zambia, Kazembe#!#!"

 berlin_conference_libya:0 "Agenda: Partition of Tripolitania"
 berlin_conference_libya_reason:0 "#variable #bold Under the Principle of Effective Occupation, any power controlling over 60% of this region's provinces shall receive 100 voting rights.#!#!\n\n#variable [concept_great_power] participants default to 2 votes, others to 1 vote. Powers with multiple [concept_claim] gain +1 vote. Ties favor the highest-ranked power.#!\n\n#bold The Barbary Coast's Eastern Frontier#! where Ottoman pashas have ruled since the 1551 capture of Tripoli from the Knights of St. John. Though nominally a vilayet, the Senussi Order controls the interior oases along ancient trans-Saharan routes. Italy covets this territory for its Roman ruins and potential farmland, but:#bold Any power claiming these shores must reckon with both Istanbul's fury and desert warriors' resistance.#!"
 berlin_conference_libya_states:0 "This session will determine sovereignty over#V #P Libya, Tripoli, Libyan Desert#!#!"
