l_english:
 concept_lander_der_krone: "Crownland Autonomy"
 concept_lander_der_krone_desc: "A semi-sovereign territory bound solely through personal union with the [concept_ruler]. These entities maintain:& Local legislatures for domestic affairs& Royal veto power over legislation& Shared monarchical institutions.\nWhile required to:& Surrender #v 50%#! of [concept_treasury] revenue& Follow imperial foreign policy& Provide military levies; This arrangement dissolves automatically if the suzerain abandons [GetLawType('law_monarchy').GetName] governance."

 concept_british_dominion: "Imperial Dominion"
 concept_british_dominion_desc: "A self-governing colony under the Colonial Laws Validity Act, featuring:Control over domestic policy& Limited treaty making capacity& Obligatory military cooperation\nWhile retaining: Judicial appeals to Privy Council& #v 20%#! [concept_treasury] contributions& Symbolic allegiance to the Crown; More autonomous than $concept_puppet$ states but less than sovereign realms."

 concept_commonwealth_realm: "Commonwealth Sovereignty"
 concept_commonwealth_realm_desc: "A fully independent state voluntarily maintaining:&Shared monarchy through personal union&Cultural ties to Westminster tradition&Optional defense cooperation\nWith complete:&International treaty rights& Fiscal independence&Military autonomy; This symbolic association continues only while both nations retain [GetLawType('law_monarchy').GetName] systems."

 concept_franco_state: "Garrisons State"
 concept_franco_state_desc: "A $concept_franco_state$ is an extension of the power of the French Empire in Europe. The leader of the Bonaparte family acts as its protector and assumes military responsibilities within its governed regions. These entities maintain:& Control over domestic policy& Limited treaty-making capacity& Obligatory military cooperation\nWhile retaining:& Follow French foreign policy& #v 30%#! [concept_treasury] contributions& Provide military levies; This relationship is automatically dissolved if the $concept_overlord$ abolishes the [GetLawType('law_monarchy').GetName]."

 concept_westminster_england: "English MPs"
 concept_westminster_england_desc: "England is the core and seat of power in the House of Commons, presiding over national affairs at Westminster since the Middle Ages. In most cases, English MPs represent the majority of the United Kingdom’s population and press the government to prioritize English interests."
 concept_westminster_wales: "Welsh MPs"
 concept_westminster_wales_desc: "Wales was incorporated into Westminster by the Laws in Wales Acts of the 16th century, yet its seats were not clearly allocated until the Reform Act of 1832. Though limited in number, Welsh MPs still wield influence in the Commons on many issues."
 concept_westminster_scotland: "Scottish MPs"
 concept_westminster_scotland_desc: "The Scottish Parliament was merged into Westminster with the Act of Union in 1707. Although the number of Scottish MPs has usually been fewer than those of England, they remain a significant part of the Commons."
 concept_westminster_ireland: "Irish MPs"
 concept_westminster_ireland_desc: "Since the Act of Union of 1801 brought the Irish Parliament into Westminster, Ireland has held a guaranteed minimum number of seats. However, Irish MPs often find themselves at odds with the majority in the Commons over issues of land, religion, and autonomy."
 concept_indian_subcontinent: "Indian Subcontinent"
 concept_indian_subcontinent_short: "Subcontinent"
 concept_indian_subcontinent_desc: "The $concept_indian_subcontinent$ is a [concept_georegion] located south of the Himalayas in Asia, often simply referred to as the $concept_indian_subcontinent_short$. It extends southward to the Indian Ocean, bordered by the Bay of Bengal to the east and the Arabian Sea to the west. The $concept_indian_subcontinent_short$ comprises multiple [concept_state_region]s. ([concept_province]s along the coasts of [GetStateRegion('STATE_BOMBAY').GetName] and [GetStateRegion('STATE_MADRAS').GetName] owned by foreign powers are not counted as part of the required $concept_indian_subcontinent_short$ territory.)\n\n#B Eastern India#!:\n[GetStateRegion('STATE_BIHAR').GetName], [GetStateRegion('STATE_ORISSA').GetName], [GetStateRegion('STATE_WEST_BENGAL').GetName], [GetStateRegion('STATE_EAST_BENGAL').GetName], and [GetStateRegion('STATE_ASSAM').GetName].\n\n#B Southern India#!:\n[GetStateRegion('STATE_BOMBAY').GetName], [GetStateRegion('STATE_HYDERABAD').GetName], [GetStateRegion('STATE_CIRCARS').GetName], [GetStateRegion('STATE_KURNOOL').GetName], [GetStateRegion('STATE_MYSORE').GetName], [GetStateRegion('STATE_TRAVANCORE').GetName], [GetStateRegion('STATE_MADRAS').GetName], and [GetStateRegion('STATE_CEYLON').GetName].\n\n#B Western India#!:\n[GetStateRegion('STATE_GUJARAT').GetName], [GetStateRegion('STATE_SINDH').GetName], and [GetStateRegion('STATE_BALUCHISTAN').GetName].\n\n#B Central India#!:\n[GetStateRegion('STATE_AWADH').GetName], [GetStateRegion('STATE_CENTRAL_PROVINCES').GetName], [GetStateRegion('STATE_BUNDELKHAND').GetName], [GetStateRegion('STATE_AGRA').GetName], [GetStateRegion('STATE_DELHI').GetName], [GetStateRegion('STATE_MALWA').GetName], and [GetStateRegion('STATE_RAJPUTANA').GetName].\n\n#B Northern India#!:\n[GetStateRegion('STATE_PUNJAB').GetName], [GetStateRegion('STATE_HILL_PUNJAB').GetName], [GetStateRegion('STATE_KASHMIR').GetName], [GetStateRegion('STATE_PASHTUNISTAN').GetName], and [GetStateRegion('STATE_QUETTA').GetName].\n\n#B Burma#!:\n[GetStateRegion('STATE_ARAKAN').GetName], [GetStateRegion('STATE_PEGU').GetName], [GetStateRegion('STATE_MANDALAY').GetName], [GetStateRegion('STATE_KACHIN').GetName], and [GetStateRegion('STATE_SHAN_STATES').GetName]."

 concept_yellow_river_flood_area: "Yellow River Flood Zone"
 concept_yellow_river_flood_area_desc: "The Yellow River Flood Zone refers to the regions affected after the river’s course change, usually the directly impacted provinces of #yellow Henan#!, #yellow Shandong#!, and #yellow Northern Anhui#!, along with #yellow Jiangsu#!, indirectly affected by high water levels. All provinces in the flood zone except #yellow Jiangsu#! will suffer severe negative effects during floods, but may also gain [concept_arable_land] as Yellow River control progresses."

 concept_caretaker_government: "Caretaker Government"
 concept_caretaker_government_desc: "A caretaker government is a temporary [concept_government] formed during an [concept_election] period to maintain operations until a new administration is established. Lacking the legitimate [concept_election] mandate to exercise legislative authority, caretaker governments usually have limited powers, tasked with maintaining the status quo rather than truly governing the [concept_country] or enacting new [concept_law]."

 concept_sublime_court_dissatisfaction: "Court Dissatisfaction"
 concept_sublime_court_dissatisfaction_short: "Dissatisfaction"
 concept_sublime_court_dissatisfaction_desc: "$concept_sublime_court_dissatisfaction$ represents the progress of various conspiracies dissatisfied with the $RULER_TITLE_PADISAH$ ([concept_ruler]) and seeking to overthrow him. $concept_sublime_court_dissatisfaction_short$ can be tracked in the #Y $tur_sublime_porte$#! [concept_journal_entry].\n\nIf $concept_sublime_court_dissatisfaction_short$ reaches #v 100%#!, the $RULER_TITLE_PADISAH$ ($concept_ruler$) will be forced to abdicate by a coup. [concept_sublime_porte_authority] will be #bold reset#! to #v 0#!, $concept_sublime_court_dissatisfaction_short$ will decrease, and a new candidate will ascend the throne.\n\n#title The following conditions#g #b decrease#!#! $concept_sublime_court_dissatisfaction$:#!#indent_newline:3 \n•The $RULER_TITLE_PADISAH$ ([concept_ruler]) is #yellow Mahmud II#!\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses the [GetCharacterTrait('special_prince_governor').GetName] [concept_character_trait]\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses the [GetCharacterTrait('special_ottoman_fatih').GetName] [concept_character_trait]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('experienced_political_operator').GetName] or [GetCharacterTrait('expert_political_operator').GetName]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('celebrity_commander').GetName], [GetCharacterTrait('expert_offensive_planner').GetName], or [GetCharacterTrait('master_bureaucrat').GetName]\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] above #G 5#!\n•The [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] above #G 5#!\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_powerful]\n•[concept_legitimacy] is #G at least 90#!\n•[concept_sublime_porte_authority] reaches #G 500#!\n•Events and other effects#!\n\n#title The following conditions#r #b increase#!#! $concept_sublime_court_dissatisfaction$:#!#indent_newline:3 \n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('reckless').GetName], [GetCharacterTrait('bigoted').GetName], or [GetCharacterTrait('cruel').GetName]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('trait_child').GetName]，[GetCharacterTrait('sickly').GetName]，[GetCharacterTrait('kidney_stones').GetName]，[GetCharacterTrait('cancer').GetName]，[GetCharacterTrait('tuberculosis').GetName] or [GetCharacterTrait('senile').GetName]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('alcoholic').GetName], [GetCharacterTrait('opium_addiction').GetName], or [GetCharacterTrait('expensive_tastes').GetName]\n•The [concept_ruler] has low [concept_popularity]\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] below #R 0#!\n•The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] below #R -5#!\n•The [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] below #R -5#!\n•The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_marginalized]\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_marginalized]\n•[concept_sublime_porte_authority] is below #R 300#!\n•[concept_legitimacy] is #R below 50#!\n•Events and other effects#!"
 concept_sublime_porte_authority: "Sublime Porte Authority"
 concept_sublime_porte_authority_short: "Authority"
 concept_sublime_porte_authority_desc: "$concept_sublime_porte_authority$ represents the power of the $RULER_TITLE_PADISAH$ ([concept_ruler]). [Concept('concept_sublime_porte_authority','$concept_sublime_porte_authority_short$')] can be tracked in the #Y $tur_sublime_porte$#! [concept_journal_entry].\n\nLegitimacy must be above #v 50#! for $concept_sublime_porte_authority_short$ to increase. If [concept_sublime_court_dissatisfaction] reaches #v 100%#!, the $RULER_TITLE_PADISAH$ ($concept_ruler$) will be forced to abdicate by a coup, $concept_sublime_porte_authority_short$ will be #bold reset#! to #v 0#!, $concept_sublime_court_dissatisfaction_short$ will decrease, and the $RULER_TITLE_SEHZADE$ ([concept_heir]) will ascend the throne.\n\n#title The following conditions#g #b increase#!#! $concept_sublime_porte_authority$:#!#indent_newline:3 \n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses the [GetCharacterTrait('special_prince_governor').GetName] [concept_character_trait]\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses the [GetCharacterTrait('special_ottoman_fatih').GetName] [concept_character_trait]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('experienced_political_operator').GetName] or [GetCharacterTrait('expert_political_operator').GetName]\n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('celebrity_commander').GetName], [GetCharacterTrait('expert_offensive_planner').GetName], or [GetCharacterTrait('master_bureaucrat').GetName]\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_in_government]\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_powerful] and has [concept_approval] at least #G 5#!\n•The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_in_government] and has [concept_approval] at least #G 5#!\n•[GetReligion('sunni').GetName] is the [concept_state_religion] and [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_millet_system').GetName] [concept_law]\n•[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_professional_army').GetName] or [GetLawType('law_mass_conscription').GetName] [concept_law]\n•[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_autocracy').GetName] [concept_law] and [concept_legitimacy] #G at least 90#!\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] is the most legitimate heir in the line of succession\n•Events and other effects#!\n\n#title The following conditions#r #b decrease#!#! $concept_sublime_porte_authority$:#!#indent_newline:3 \n•The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] possesses [GetCharacterTrait('trait_child').GetName]\n•Has not [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_subjecthood').GetName] or [GetLawType('law_ethnostate').GetName] [concept_law]\n•Has not [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_outlawed_dissent').GetName] or [GetLawType('law_censorship').GetName] [concept_law]\n•The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] has [concept_approval] below #R -5#!\n•The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is not [concept_in_government]\n•[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_autocracy').GetName] [concept_law] and [concept_legitimacy] #R below 75#!\n•[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_autocracy').GetName] [concept_law] and [concept_legitimacy] #R below 50#!\n•Does not have [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] [GetLawType('law_autocracy').GetName] [concept_law] and [concept_legitimacy] #R below 30#!\n•[concept_sublime_court_dissatisfaction] reaches #R 200#!\n•[concept_sublime_court_dissatisfaction] reaches #R 400#!\n•Events and other effects#!"
 concept_unruly_arabs_progress: "Arab National Fervour"
 concept_unruly_arabs_progress_short: "Fervour"
 concept_unruly_arabs_progress_desc: "$concept_unruly_arabs_progress$ represents the unity and cohesion of Arab nationalism under the rule of $dyn_c_ottoman_empire$. If $concept_unruly_arabs_progress$ reaches 500, the Arab Revolt will erupt, aiming to overthrow $dyn_c_ottoman_empire$'s rule over the Arabian Peninsula. [Concept('concept_unruly_arabs_progress','$concept_unruly_arabs_progress_short$')] can be tracked in the #b $the_unruly_arabs$#! [concept_journal_entry].\n\n#title The following conditions#r #b increase#!#! $concept_unruly_arabs_progress$:#!#indent_newline:3 \n•$dyn_c_ottoman_empire$ has [concept_legitimacy] below #v 50#!\n•$dyn_c_ottoman_empire$ is at [concept_war]\n•$dyn_c_ottoman_empire$ #r #b has#!#! any ongoing [Concept('concept_secession','$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')]\n•[GetCulture('bedouin').GetName] [concept_culture] has [concept_fervor] at least 50 or 75\n•[GetCulture('mashriqi').GetName] [concept_culture] has [concept_fervor] at least 50 or 75\n•Support from foreign [concept_great_power]s or other Arab states\n•Completed the #b $caliph_and_ummah$#! [concept_journal_entry]\n•$dyn_c_ottoman_empire$ has an international rank below [concept_great_power]\n•$dyn_c_ottoman_empire$ controls at least 50%, 70%, or 90% of the provinces in [GetStrategicRegion('region_arabia').GetName]\n•Events, decisions, and other effects\n\n#title The following conditions#g #b decrease#!#! $concept_unruly_arabs_progress$:#!#indent_newline:3 \n•$dyn_c_ottoman_empire$ has [concept_legitimacy] at least #v 90#!\n•[GetCulture('bedouin').GetName] [concept_culture] has [concept_fervor] at most 25\n•[GetCulture('mashriqi').GetName] [concept_culture] has [concept_fervor] at most 25\n•Completed the #b $great_ottomanism$#! [concept_journal_entry]\n•Completed the #b $ottoman_conquest$#! [concept_journal_entry]\n•Completed the #b $hejaz_railway$#! [concept_journal_entry]\n•$dyn_c_ottoman_empire$ has at least the rank of [concept_great_power]\n•$dyn_c_ottoman_empire$ controls no more than 33% of the provinces in [GetStrategicRegion('region_arabia').GetName]\n•Events, decisions, and other effects"
 concept_unruly_arabs_timer: "Arab Stability"
 concept_unruly_arabs_timer_desc: "$concept_unruly_arabs_timer$ represents the degree of control exercised by $dyn_c_ottoman_empire$ over the Arabian Peninsula and the obedience of the local population. The lower $concept_unruly_arabs_timer$ becomes, the more likely negative Arab events are to occur, and the easier it becomes for foreign powers to intervene in Arab affairs. When [Concept('concept_unruly_arabs_progress','$concept_unruly_arabs_progress_short$')] equals #G 0#!, $concept_unruly_arabs_timer$ will #G increase by 1%#! each month. [concept_unruly_arabs_timer] can be tracked in the #b $the_unruly_arabs$#! [concept_journal_entry]."
