l_english:
 first_economic_crisis:0 "Economic Crisis"
 first_economic_crisis_reason:0 "[ROOT.GetCountry.GetName] has plunged into a #R grave economic crisis#!. The prosperity of its [concept_market] has collapsed overnight — #B factories are shutting down, trade is paralyzed, and banks are failing#!. Countless [concept_pop] have lost their jobs and livelihoods; #B the unemployed and starving families crowding the streets#! have become the most visible sight across the nation, breeding resentment and unrest.\n\nIf left unchecked, #R even the machinery of the state may begin to falter#!. To restore both the economy and the public’s faith, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the [concept_government] must act decisively: #B only through firm and effective policy can the #V nation emerge from the shadow of crisis and return to a path of growth and prosperity#!#!."
 first_economic_crisis_status:0 "#B #R Securities panic and bankruptcy waves are triggering a severe financial crisis#!#!"
 first_economic_crisis_goal:0 "You must raise your GDP to 101% of its pre-crisis level to overcome the economic crisis as quickly as possible. During this period, #V Interventionism and Protectionism laws#! will unlock #P favorable event options#!."
 economic_crisis_compete_tt:0 "Restored GDP to 101% of its pre-crisis level, stabilizing market confidence"
