l_english:

 victoria.1.b: "这将是一个时代的开始。"
 joi_flavor_gbr.1.t: "Pax Britannica"
 joi_flavor_gbr.1.d: "This is [ROOT.GetCountry.GetName]'s epoch: The sun hangs eternally over an empire where it truly never sets."
 joi_flavor_gbr.1.f: "#bold When Britain first, at Heaven's command,#!\n\nArose from out the azure main,\n\n This was the charter, the charter of the land,\n\nAnd guardian angels sang this strain:\n\n#bold  Rule, Britannia!#!\n\nBritannia rule the waves!\n\n#bold Britons never will be slaves!#!"
 joi_flavor_gbr.1.a: "The Spanish boasted their empire saw no sunset, but ours makes theirs seem provincial by comparison."

 joi_flavor_gbr.2.t: "Imperial Federation Act"
 joi_flavor_gbr.2.d: "The Imperial Council replaces colonial conferences as [ROOT.GetCountry.GetName]'s permanent governing body, with dominion delegates swearing allegiance at Westminster—marking the empire's evolution toward federal unity."
 joi_flavor_gbr.2.f: "With all #bold self-governing colonies#! now integrated, [ROOT.GetCountry.GetName]'s global dominance reaches its #bold historical zenith#!. The golden lion surveys a #bold British-led world order#!:\n\nNo nation surpasses our glory; no ruler matches [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s majesty. #bold Our empire spans latitudes where the sun never sets; our Royal Navy tames every ocean#!. History will remember this as Britain's century!\n\nNorth American steppes and Russian plains—our granaries;\nChicago and Odessa—our mines;\nCanadian pines and Scandinavian fjords—our timberlands;\nAustralia—our pasture;\nThe Pampas—our cattle range;\nPeru yields silver, the Rand its gold;\nIndia and China cultivate our tea, the Mediterranean our orchards;\nCotton spreads from Dixie to all warm climes.\n\n#bold Now we proclaim our superpower status: Rule, Britannia!#!"
 joi_flavor_gbr.2.a: "Rule, Britannia!"

 joi_flavor_gbr.3.t: "Statute of Westminster"
 joi_flavor_gbr.3.d: "Under dominion pressure, London enacts legislation defining [ROOT.GetCountry.GetName]'s relationship with its dominions, ending metropolitan interference in their affairs."
 joi_flavor_gbr.3.f: "Be it enacted by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]'s Most Excellent Majesty:\nI: Canada, Australia, and South Africa are constituted as Dominions.\n\nII: No dominion law shall be void for contradicting future UK statutes. Dominions may repeal or amend imperial legislation.\n\nIII: Dominion parliaments may enact extraterritorial laws.\n\nIV: No UK law shall apply to any dominion without its explicit consent."
 joi_flavor_gbr.3.a: "God Save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]..."

 joi_flavor_gbr.4.t: "Northern Frontier"
 joi_flavor_gbr.4.d: "As Canada joins [ROOT.GetCountry.GetName], a frenzy of northern exploration begins."
 joi_flavor_gbr.4.f: "Why Canada? Behold—#bold Hudson Bay's waters#! outshine the sky, endless forests whisper in #bold prairie winds#!, while cities offer #bold all London's comforts#! with better prospects! Why toil in sooty alleys when virgin lands promise fortunes?"
 joi_flavor_gbr.4.a: "Canada calls!"
 joi_flavor_gbr.5.t: "Canadian Confederation"
 joi_flavor_gbr.5.d: "Canada moves toward unified self-government..."
 joi_flavor_gbr.5.f: "Each signed document brings nationhood nearer. Though colonies disagree, Canadian resolve prevails. Soon—with Colonial Office approval and popular will—a new dominion shall rise."
 joi_flavor_gbr.5.a: "Very well then."

 joi_flavor_gbr.6.t: "Gold Rush Down Under"
 joi_flavor_gbr.6.d: "News of Australian iron discoveries electrifies [ROOT.GetCountry.GetName]."
 joi_flavor_gbr.6.f: "You think they emigrate for wages? Open your eyes! #bold Surface iron deposits#! glitter for the taking! What's here but smoke and drudgery? In Australia, any pauper can stake a claim and die a tycoon! Empire's glory? Pfah—pounds sterling rule!"
 joi_flavor_gbr.6.a: "Strike it rich!"
 joi_flavor_gbr.7.t: "Australian Federation"
 joi_flavor_gbr.7.d: "Australia advances toward unified self-government..."
 joi_flavor_gbr.7.f: "Each proclamation tightens colonial bonds. Despite bickering, Australians unite. With imperial assent and Antipodean grit, a southern dominion emerges."
 joi_flavor_gbr.7.a: "So be it."

 joi_flavor_gbr.8.t: "Westminster Conference"
 joi_flavor_gbr.8.d: "Though intended to secure Cape航线, South African gold discoveries become [ROOT.GetCountry.GetName]'s windfall."
 joi_flavor_gbr.8.f: "“Sir Peel never imagined this when establishing the gold standard in 1816.”\n\n“Now the world's gold sits in Threadneedle Street's vaults.”\n\n“Who foresaw it? Sterling becoming synoymous with gold! Francs, marks, dollars, rubles—all pegged to our pound! What power this brings!”\n\n“Perhaps a ‘Westminster System’ for finance... and limitless influence?”"
 joi_flavor_gbr.8.a: "Like the electoral system?"
 joi_flavor_gbr.9.t: "Boer Commando Rising"
 joi_flavor_gbr.9.d: "[ROOT.GetCountry.GetName]'s designs on South Africa's whites are no secret..."
 joi_flavor_gbr.9.f: "“Every able man is a soldier-farmer—training seasonally, mustering by district when war comes. We'll mobilize everything: hang defectors as traitors, expose British aggression to the world! This isn't an era where empires crush small nations unchallenged!”"
 joi_flavor_gbr.9.a: "Those backwater farmers?"

 joi_flavor_gbr.10.t: "Hunger's End"
 joi_flavor_gbr.10.d: "[ROOT.GetCountry.GetName]'s intervention ends Ireland's famine, earning gratitude through English largesse."
 joi_flavor_gbr.10.f: "“Potatoes? Antiquated fare! In this mighty empire, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s benevolence sends English beef and grain. Leave blighted crops—the Crown provides! God Save [ROOT.GetCountry.GetName]!”"
 joi_flavor_gbr.10.a: "Hear, hear!"
 joi_flavor_gbr.11.t: "An Gorta Mór!"
 joi_flavor_gbr.11.d: "Famine again grips Ireland while [ROOT.GetCountry.GetName] turns a blind eye..."
 joi_flavor_gbr.11.f: "1739's horror returns. A blight withers potatoes—families' winter sustenance. Peasants flee to Dublin, Derry, Belfast—finding only starving crowds and English carriages smelling of roasted meats..."
 joi_flavor_gbr.11.a: "Tch—who cares for potato-eaters?"

 joi_flavor_gbr.12.t: "The Government of India Act"
 joi_flavor_gbr.12.d: "With the enactment of the Government of India Act, the rule of the East India Company has come to an irrevocable end. All of India now falls under the direct dominion of the Crown, administered by the Secretary of State for India—a cabinet minister appointed by [ROOT.GetCountry.GetName]."

 joi_flavor_gbr.12.a: "We need a Secretary of State for India!"
 joi_flavor_gbr.12.b: "Let us reappoint a Viceroy instead."
 joi_flavor_gbr.12.c: "Onward to India’s reorganization!"
 joi_flavor_gbr.13.t: "Indian Councils Act"
 joi_flavor_gbr.13.d: "Amid mounting unrest among the native populace, Parliament has reluctantly passed reforms granting limited self-governance to India—a measure aimed at reducing the Empire’s administrative burdens."
 joi_flavor_gbr.13.f: "An Act to extend provisions made in the previous parliamentary session, permitting [ROOT.GetCountry.GetName] merchants trading with the East India Company additional time to settle outstanding debts. Further, it authorizes deferred payments to the public treasury and advances to said Company under specified terms, funded through loans or exchequer bills:\n\nThe Chancellor of the Exchequer, or any three of its officers, may lawfully postpone the sum of £644,743 17s 2d owed to the Customs Office, as stipulated in prior agreements. The deferred amount, originally due on the first of December, shall be paid in full within twelve months of the default date.\n\nShould the East India Company fulfill these postponed payments, it shall be absolved of all penalties, interest, or losses incurred by the delay, enjoying the same allowances as if payment had been made punctually."
 joi_flavor_gbr.13.a: "Very well then..."

 joi_flavor_gbr.14.t: "Recovery from the Famine"
 joi_flavor_gbr.14.d: "The horrors of the famine have ended, but Ireland lies broken—its people decimated, its fields barren."
 joi_flavor_gbr.14.f: "Nothing but despair remains. Corpses litter the streets, the starving cling to life in ditches. Rats scurry where crops once grew; the farmers who tilled these lands are gone—dead or fled. Though [ROOT.GetCountry.GetName]’s government belatedly acknowledged the catastrophe, the vanished will never return to this graveyard of a nation..."
 joi_flavor_gbr.14.a: "Dear God..."
 joi_flavor_gbr.15.t: "The Famine Ends"
 joi_flavor_gbr.15.d: "The famine has abated, leaving Ireland a land of grief and simmering rage against [ROOT.GetCountry.GetName]’s neglect."
 joi_flavor_gbr.15.f: "A wasteland of death. The starving crawl like ghosts, skeletal hands clutching empty bowls. Not a blade of grass survives; the once-lush countryside is a tomb. [ROOT.GetCountry.GetName]’s officials turned away, even blocking foreign aid—as if Ireland were not a kingdom of the Crown, but an enemy to be starved into submission..."
 joi_flavor_gbr.15.a: "I’m a [ROOT.GetCountry.GetName] citizen—how was I never told of this famine?"

 joi_flavor_gbr.16.t: "Victory in Burma"
 joi_flavor_gbr.16.d: "[ROOT.GetCountry.GetName]’s triumph is complete. Burma bows to the Empire, its sovereignty extinguished."
 joi_flavor_gbr.16.f: "Treaty between [ROOT.GetCountry.GetName] and the Emperor of China, regarding the submission of the King of Burma:\n1. China recognizes British sovereignty over all administrative powers in Burma.\n2. In lieu of the traditional decadal tribute missions sent by Burma to China, Britain shall permit a Burmese noble to dispatch such envoys every ten years, provided they are of Burmese birth.\n3. This treaty shall be ratified in Peking by plenipotentiaries of both nations, signed in triplicate (English and Chinese), and exchanged at London with all due ceremony."
 joi_flavor_gbr.16.a: "Rule, Britannia!"
 joi_flavor_gbr.16.b: "Burma shall be a province of British India!"

 joi_flavor_gbr.17.t: "Egypt Under the Empire"
 joi_flavor_gbr.17.d: "The Union Jack flies over the Nile and Suez. Egypt—jewel of antiquity—is now a gem in [ROOT.GetCountry.GetName]’s imperial crown."
 joi_flavor_gbr.17.f: "The Nile Delta: breadbasket of empires. Caesar claimed it for Rome; Selim I for the Ottomans. Now, [ROOT.GetCountry.GetName] plants its flag upon the pyramids. But Egypt is more than a symbol—it is the keystone of global strategy. Shall we cultivate its fertile lands for trade, or forge it into a military bulwark to secure our dominance?"
 joi_flavor_gbr.17.a: "Invest in Egypt’s economy!"
 joi_flavor_gbr.17.b: "Fortify Egypt as a garrison!"

 joi_flavor_gbr.18.t: "The Red Ribbon Plan"
 joi_flavor_gbr.18.d: "Half of Africa answers to [ROOT.GetCountry.GetName]. From Cairo to the Cape, the continent is stitched with imperial red."
 joi_flavor_gbr.18.f: "Behold the map! None in history have achieved what we now proclaim: a scarlet ribbon of dominion stretching across Africa’s heart. Our enemies lie buried in the sands; the continent’s riches are ours. Long live the Empire!"
 joi_flavor_gbr.18.a: "God Save the Empire!"

 joi_flavor_gbr.19.t: "The Great Indian Peninsula Railway"
 joi_flavor_gbr.19.d: "The subcontinent-spanning Great Indian Peninsula Railway is finally complete.\nThis monumental infrastructure project breathes new life into India's economic development."
 joi_flavor_gbr.19.f: "O wild-eyed steel goddess of progress!\nPour forth thy lawless melodies, let thy signal lamps dance through my verses;\nThy whistle's reckless laughter quakes like thunder, rousing all from slumber;\nThou makest thine own laws, gripping iron tracks with sovereign might;\nThy shrieking steam echoes through mountain passes,\nSoaring over lakes and boundless plains,\nUntamed,\nExultant,\nTitanic,\nCharging toward freedom's horizon!"
 joi_flavor_gbr.19.a: "Through storm and calm alike - thou art the modern pulse of this continent!"

 joi_flavor_gbr.20.t: "Anglo-American Alliance!"
 joi_flavor_gbr.20.d: "As global dynamics shift, relations between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('USA_scope').GetName] show remarkable improvement..."
 joi_flavor_gbr.20.f: "Though our nations were once adversaries, shared threats and common interests dissolve old enmities. Bound by language, law, and blood, this 'Special Relationship' shall endure.\nAccordingly, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s Prime Minister and Foreign Secretary have conducted successful talks in Washington, proposing an 'unbreakable' military-economic alliance between our peoples."
 joi_flavor_gbr.20.a: "Let us cement this bond with a comprehensive permanent alliance!"
 joi_flavor_gbr.20.b: "Military ties can wait - prioritize economic agreements first!"
 joi_flavor_gbr.21.t: "Spectacular Success in American Investments"
 joi_flavor_gbr.21.d: "[ROOT.GetCountry.GetName]'s foremost industrialists report unprecedented gains..."
 joi_flavor_gbr.21.f: ""Capital news! Our ventures in America flourish beyond expectation - factories hum with activity, our partners reap dividends, and the Treasury overflows. Truly this demonstrates British financial acumen at its finest!""
 joi_flavor_gbr.21.a: "Capital work all around!"
 joi_flavor_gbr.22.t: "American Investments in Crisis"
 joi_flavor_gbr.22.d: "[ROOT.GetCountry.GetName]'s industrialists bring grim tidings..."
 joi_flavor_gbr.22.f: ""Disaster! Despite our best efforts, the American market's collapse has ruined our enterprises. Factories stand idle, fortunes evaporate - would that we'd repatriated these assets sooner! Damnation take this wretched downturn!""
 joi_flavor_gbr.22.a: "Bloody hell!"
 joi_flavor_gbr.23.t: "[SCOPE.sCountry('GBR_scope').GetName] Requests Loans!"
 joi_flavor_gbr.23.d: "With the Royal Treasury in distress, Britain turns to us for financial salvation..."
 joi_flavor_gbr.23.f: "Britain's fiscal woes are no secret. Their Chancellor now beseeches Congress for aid, promising political concessions in exchange. The debate rages: should America play banker to the Empire that once taxed us without representation?"
 joi_flavor_gbr.23.a: "Grant their request - let us be magnanimous victors!"
 joi_flavor_gbr.23.b: "We've no obligation to subsidize our former oppressors!"

 joi_flavor_gbr.24.t: "Sepoy Protest Over Cartridges"
 joi_flavor_gbr.24.d: "The new Enfield rifle's grease配方—containing beef and pork fat—sparks religious outrage among Hindu troops."
 joi_flavor_gbr.24.f: ""I tasted it when biting the cartridge. That the Company would defile our faith in battle's heat - this betrayal stings worse than any wound. Were the architects of this sacrilege before me now, my rifle would speak its mind.""
 joi_flavor_gbr.24.a: "Who do they think they are? Execute the mutineers!"
 joi_flavor_gbr.24.b: "We must respect native religious sensibilities."
 joi_flavor_gbr.25.t: "Princely States Petition the Crown"
 joi_flavor_gbr.25.d: "Indian princes protest London's revocation of their legislative authority before [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]."
 joi_flavor_gbr.25.f: ""While policy formulation remains the Council's prerogative, and administration the officials' duty, overlapping competencies create confusion—particularly when executive actions contravene traditional prerogatives...\nIn essence, implementing these recommendations may reveal that alternative approaches, when judiciously modified, could facilitate reassessment of initial disagreements and foster compromise.""
 joi_flavor_gbr.25.a: "Ensure the honorable princes' voices are heard."
 joi_flavor_gbr.25.b: "Let these natives remember their proper place!"
 joi_flavor_gbr.26.t: "An Exceptional Indian Civil Servant"
 joi_flavor_gbr.26.d: "A brilliant administrator in the India Office has achieved remarkable success."
 joi_flavor_gbr.26.f: ""Having surveyed the circumstances holistically, analyzed precedents, and compared departmental benchmarks, one might provisionally conclude—subject to reconsideration—that while potentially disagreeable, the current paradigm remains optimal... though as mere vessel for Cabinet's wisdom, I merely present these deliberations.""
 joi_flavor_gbr.26.a: "Promote him within the local administration."
 joi_flavor_gbr.26.b: "Such talent belongs in the Home Civil Service."
 joi_flavor_gbr.27.t: "Severe Famine Crisis"
 joi_flavor_gbr.27.d: "Prolonged drought plunges millions into starvation across the subcontinent."
 joi_flavor_gbr.27.f: ""Heard about the famine situation?"\n\n"That business? Hardly significant."\n\n"But if they request aid?"\n\n"Standard procedure: First, we deny anything's amiss. Second, admit something might be wrong but insist we shouldn't act. Third, agree we should act but claim impotence. Fourth, concede we could have acted earlier—but now it's too late.""
 joi_flavor_gbr.27.a: "Yes, Minister!"
 joi_flavor_gbr.27.b: "This is preposterous!"
 joi_flavor_gbr.28.t: "Government of India Reorganized"
 joi_flavor_gbr.28.d: "The India Office experiment fails spectacularly; unrest forces London to restore authority to a Viceroy in Delhi."
 joi_flavor_gbr.28.f: ""This government exists to manage the nation, not merely rule as before."\n\n"And how would the PM have us proceed?"\n\n"When an empire declines, someone must take the wheel—and stomp the accelerator.""
 joi_flavor_gbr.28.a: "The enemy's in Whitehall, by God!"
 joi_flavor_gbr.29.t: "Secretary of State for India Appointed"
 joi_flavor_gbr.29.d: "By Grace of God, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] appoints a new cabinet minister."
 joi_flavor_gbr.29.f: "A Secretary has three functions: First, to sell departmental actions to Parliament and public—our salesman. Second, to secure legislative passage—our lobbyist. Third, to fund our operations—our beggar before Treasury. He must never meddle in departmental procedures or bypass permanent staff."
 joi_flavor_gbr.29.a: "Quite. I've just come from the Commons."

 joi_flavor_gbr.30.t: "Anglo-American Alliance?"
 joi_flavor_gbr.30.d: "Changing global dynamics soften relations between [ROOT.GetCountry.GetName] and our former British foes..."
 joi_flavor_gbr.30.f: "Though former enemies, shared threats and Anglo-Saxon bonds make reconciliation inevitable. Britain's PM now proposes a 'Permanent Special Relationship' encompassing military and economic ties—with alleged mutual benefits."
 joi_flavor_gbr.30.a: "Politely decline the British overture."
 joi_flavor_gbr.30.b: "The Union shall embrace this partnership!"

 joi_flavor_gbr.31.t: "First Imperial Conference"
 joi_flavor_gbr.31.d: "London hosts an unprecedented gathering of delegates from all imperial dominions. The spectacle awes: 400 million subjects represented, 165 Royal Navy ships stretching miles for review."
 joi_flavor_gbr.31.f: ""This weary Titan struggles beneath global burdens borne too long. Must not our children help shoulder them?"\n\n""[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must accept parliamentary democracy's consequences—including ministries enjoying the Commons' confidence... Colonial allegiance depends on benefits outweighing subordination. Meddling in local affairs only weakens imperial bonds."\n\n""Clutching outdated economic doctrines forfeits chances for closer union.""
 joi_flavor_gbr.31.a: "Forge an unbreakable Imperial Federation!"
 joi_flavor_gbr.31.b: "Champion decentralized autonomy through a Commonwealth!"

 joi_flavor_gbr.32.t: "The Royal Henley Regatta"
 joi_flavor_gbr.32.d: "Rowing's popularity in [ROOT.GetCountry.GetName] has made it a national passion. Under [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s patronage, the first international rowing competition commences on the Thames."
 joi_flavor_gbr.32.f: "Portsmouth leads by 100 yards—but Berkshire surges! They're gaining! \nThe finish line approaches, stroke by powerful stroke! Two seats gained! The rate increases! They overtake! \nFinal 200 meters! Every muscle strains! Fifty meters left—GO BERKSHIRE! \nGlorious Berkshire! They embody England's sporting tradition today—not merely a crew, but the very spirit of competition itself! Two seats clear at the line! VICTORY!!!"
 joi_flavor_gbr.32.a: "Blast that commentator—he's clearly Berkshire-born!"

 joi_flavor_gbr.33.t: "British North America Act"
 joi_flavor_gbr.33.d: "With [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s royal assent, the Canadian Confederation emerges as an equal [concept_dominion] within the Empire."
 joi_flavor_gbr.33.f: "#bold Whereas the Provinces of New Brunswick, Quebec, Manitoba, Saskatchewan, Alberta, British Columbia, Nunavut, and Rupert's Land#! desire union under the Crown of [ROOT.GetCountry.GetName] as one [concept_dominion] with a constitution similar in principle to Britain's; and whereas such union would conduce to provincial welfare and imperial strength: Be it enacted that:#! \n\n1. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] may proclaim within six months that said provinces shall unite as the Dominion of Canada\n2. The Governor-General may exercise all necessary powers, subject to Parliament's constitutional oversight\n3. Senate and Commons privileges shall be defined by Canadian statute, though Westminster retains veto power\n\nThis Act #bold shall take effect upon Canada's first parliamentary [concept_election]#!."
 joi_flavor_gbr.33.a: "God Save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_gbr.34.t: "Commonwealth of Australia Act"
 joi_flavor_gbr.34.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s signature establishes Australia as a self-governing [concept_dominion] within the Empire."
 joi_flavor_gbr.34.f: "#bold Whereas New South Wales, Tasmania, Victoria, Western Australia, South Australia, Northern Territory, and New Zealand#! seek federal union under [ROOT.GetCountry.GetName]'s Crown: Be it enacted that:#! \n\n1. All male British subjects aged 21+ may vote in [concept_election]s after six months' residence\n2. A Legislative Council shall be established, with members appointed by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] after popular election\n3. Electoral districts shall be drawn to ensure #bold orderly and impartial elections#!\n\nThis Act #bold shall govern Australia upon the Legislative Council's first sitting#!."
 joi_flavor_gbr.34.a: "God Save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_gbr.35.t: "South Africa Act"
 joi_flavor_gbr.35.d: "The Union of South Africa is born as [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] signs this [concept_dominion] into existence."
 joi_flavor_gbr.35.f: "#bold Whereas the Cape Colony, Natal, Transvaal, and Orange River Colony#! desire legislative union: Be it enacted that:#! \n\n1. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] may proclaim their unification as the Union of South Africa within one year\n2. Executive power resides in the Governor-General as [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s representative\n3. A Supreme Court shall demarcate electoral districts before the first parliamentary [concept_election]\n4. All laws remain subject to Westminster's review\n\nThis Act #bold shall take effect three months after passage#!."
 joi_flavor_gbr.35.a: "God Save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_gbr.36.t: "Government of India Act"
 joi_flavor_gbr.36.d: "This Act terminates East India Company rule, bringing India under direct Crown governance through a Viceroy."
 joi_flavor_gbr.36.f: "#bold Whereas territories administered by the East India Company were held in trust for [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, be it enacted that:#! \n\n1. All Company [concept_colony] and governmental powers revert to the Crown\n2. A 15-member Council of India advises the Viceroy, with 7 seats reserved for former Company directors\n3. Parliament may appoint or dismiss Viceroys without Council approval\n4. The Company's [concept_army] and [concept_fleet] become royal forces\n\nThe Viceroy shall proclaim this Act throughout India immediately."
 joi_flavor_gbr.36.a: "God Save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_gbr.36.b: "The Company falls, but the Empire endures!"

 joi_flavor_gbr.37.t: "Statute of Westminster"
 joi_flavor_gbr.37.d: "Representatives from [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('AST_scope').GetName], [SCOPE.sCountry('SAF_scope').GetName], [SCOPE.sCountry('CAN_scope').GetName], India and Ireland gather at Westminster to discuss imperial autonomy. History may mark this as the British Empire's first steps toward transformation."
 joi_flavor_gbr.37.f: "#bold Whereas the governments of the United Kingdom, Canada, Australia, South Africa, and Ireland have convened at Imperial Conferences#!, hereby declare:\n\n1. The [GetLawType('law_monarchy').GetName] remains #bold the symbol of free association#! within the Commonwealth\n2. Any changes to royal succession require #bold consent from all dominion parliaments#!\n3. No UK law shall extend to any [concept_british_dominion] without their request and consent\n4. Existing dominion constitutions (#bold British North America Act, Commonwealth of Australia Act, etc.#!) remain in force\n5. The term '[concept_colony]' shall no longer apply to self-governing dominions"
 joi_flavor_gbr.37.a: "They've proven themselves worthy of the Empire!"

 joi_flavor_gbr.38.t: "Easter Rising!"
 joi_flavor_gbr.38.d: "Years of resentment against [ROOT.GetCountry.GetName]'s rule have erupted - Irish rebels have proclaimed independence in Dublin!"
 joi_flavor_gbr.38.f: "Young Kevin Barry met his fate. Blind vengeance compounds tragedy - his death showcases not just courage, but Christian forbearance.\nHad he named comrades, he might have lived. The offer stayed his execution. Even with the noose around his neck, he refused. Yet he prayed for his hangman. At that age when hearts brim with nobility,\nsuch lads form a nation's backbone, the very spine of civilization..."
 joi_flavor_gbr.38.a: "Terrorist propaganda!"

 joi_flavor_gbr.39.t: "Restoration of Order in Ireland Act"
 joi_flavor_gbr.39.d: "[ROOT.GetCountry.GetName]'s forces have crushed the IRA rebellion, reasserting London's control over a chastened Ireland."
 joi_flavor_gbr.39.f: "By [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s command:\n1. A Civil Guard shall form in Dublin within one month\n2. Garrison commanders may convene military tribunals\n3. Suspected rebels face summary justice"
 joi_flavor_gbr.39.a: "Order is restored."

 joi_flavor_gbr.40.t: "A Truly United Kingdom?"
 joi_flavor_gbr.40.d: "With Ireland pacified, perhaps the time has come to fully integrate it into the Union."
 joi_flavor_gbr.40.f: ""Whereas [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has graciously proposed measures to strengthen ties between Great Britain and Ireland through parliamentary union; and whereas both kingdoms recognize the imperial benefits of incorporating Irish subjects as full British citizens...""
 joi_flavor_gbr.40.a: "Grant Ireland greater autonomy."
 joi_flavor_gbr.40.b: "Ireland is British soil!"

 joi_flavor_gbr.41.t: "Sir William Perkin's Discovery"
 joi_flavor_gbr.41.d: "Young Royal College of Chemistry student William Henry Perkin has accidentally synthesized mauveine while attempting to produce quinine."
 joi_flavor_gbr.41.f: ""I'm calling it 'aniline purple'! This stuff won't fade - perfect for dyes! Just yesterday in Hofmann's lab, I noticed treating aniline produced this gorgeous purple sludge. Sneaked some home, and after tinkering - eureka! We're filing patents immediately. Fortune awaits!""
 joi_flavor_gbr.41.a: "You'll revolutionize the textile industry!"

 joi_flavor_gbr.42.t: "The King's Birthday"
 joi_flavor_gbr.42.d: "The annual #V Sovereign's Birthday#! celebrations commence across [ROOT.GetCountry.GetName], with honors lists published and festivities underway."
 joi_flavor_gbr.42.f: "Since George III's reign, the monarch's birthday (fixed in June regardless of actual date) has been celebrated throughout the Empire. From Toronto to Sydney, streets decked with royal banners witness parades and revelry. For loyalists, a chance to demonstrate fealty; for others, simply a welcome holiday.\n\nGod Save [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_gbr.42.a: "God save [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], happy and glorious!"
 joi_flavor_gbr.42.b: "Long may [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] reign!"
 joi_flavor_gbr.43.t: "Empire Day"
 joi_flavor_gbr.43.d: "The #V Empire Day#! celebrations see patriotic displays across [ROOT.GetCountry.GetName], with military parades and fireworks honoring imperial unity."
 joi_flavor_gbr.43.f: "Established by the Royal Colonial Institute to foster imperial identity, this holiday (May 24th, Queen Victoria's birthday) sees Union Jacks displayed from Gibraltar to Hong Kong. Veterans march, schoolchildren sing patriotic hymns, and beacons are lit atop empire-spanning telegraph lines - tangible proof of Britain's global reach.\n\nToday, we remember the peace and prosperity wrought by imperial unity!"
 joi_flavor_gbr.43.a: "This day belongs to all subjects of the Crown!"

 joi_flavor_gbr.44.t: "Palace of Westminster"
 joi_flavor_gbr.44.d: "After the old palace was destroyed by the Fire of 1834, today in [TimeKeeper.GetCurrentDate.Format('y')], a new Palace of Parliament has finally been completed under #V Sir Charles Barry#! and #V Mr. Augustus Pugin#!. Roughly rectangular with its long axis parallel to the Thames, it is arranged around the Central Hall with a broad corridor that leads north to the Commons and south to the Lords; on the east side lie the committee rooms and the library, where marble statues of distinguished Members are carved."
 joi_flavor_gbr.44.f: "“Your Majesty, this is a sandy magnesian limestone from the village of Anston in South Yorkshire and Mansfield Woodhouse in Nottinghamshire; shipped via the Chesterfield Canal, the North Sea, and the Trent and Thames, it supplies us with blocks up to four feet thick, suitable for fine carving.”\n\n“This is the Central Tower, the lowest of the three principal towers. I have turned it into a spire so that, together with the chimneys, it can draw the smoke; this is the first time our mechanical services have truly influenced the architecture.”\n\n“Your Majesty, the palace is wholly Greek; and yet upon its classical body are strewn Tudor details.”"
 joi_flavor_gbr.44.a: "It shall be an unrivalled emblem of [ROOT.GetCountry.GetName]!"
 joi_flavor_gbr.45.t: "The Stonemasons’ Strike"
 joi_flavor_gbr.45.d: "On the Westminster site, stonemasons have struck over a labour dispute, demanding better wages and conditions; for a time the rebuilding of Parliament ground to a halt."
 joi_flavor_gbr.45.f: "“It later emerged that these gentlemen, fearful their secrets might leak, decided after heated discussion that no member of their trade society should open for business until ‘Mr. Barry’s men cease to strike’; this point was soon accommodated, for not long ago Mr. Charles Barry met with the masons and solemnly averred that the accusations against him arose entirely from a misunderstanding.”"
 joi_flavor_gbr.45.a: "If they won’t work, others will!"
 joi_flavor_gbr.45.b: "Raise their pay."

 joi_flavor_gbr.46.t: "The [TimeKeeper.GetCurrentDate.Format('y')] Budget Debate"
 joi_flavor_gbr.46.d: "By the fiscal calendar, the [SCOPE.sParty('ruling_party').GetName] Government must lay a new Budget before the Commons, defining public spending and sources of revenue. The debate touches not only appropriations, but also ministerial priorities and Parliament’s scrutiny of [ROOT.GetCountry.GetName]’s fiscal course."
 joi_flavor_gbr.46.f: "“This Budget sets new long-term aims for [ROOT.GetCountry.GetName] and addresses the principal challenges facing the economy. It ensures stability, rewards work, encourages enterprise, and promotes fairness.”\n\n“This Budget extends this [SCOPE.sParty('ruling_party').GetName] Government’s programme—through thoroughgoing tax and welfare reform and a skills package—to boost employment and make work pay.”\n\n“Fairness measures will support families with children, tackle in-work poverty, improve public services and the environment, and ensure individuals and businesses pay their fair share by clamping down on evasion.”"
 joi_flavor_gbr.46.a: "The Government should fund manufacturing."
 joi_flavor_gbr.46.b: "Our farmers need support from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 joi_flavor_gbr.46.c: "Better infrastructure for the taxpayer!"
 joi_flavor_gbr.46.e: "Propose a new programme of civic welfare."
 joi_flavor_gbr.46.h: "Our army must receive the lion’s share!"
 joi_flavor_gbr.47.t: "Emergency Parliament"
 joi_flavor_gbr.47.d: "Confronted with exceptional circumstances, the [SCOPE.sParty('ruling_party').GetName] Government has advised [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to summon an emergency sitting outside the statutory session. [ROOT.GetCountry.GetRuler.GetHerHis] Majesty has approved the request this morning—yet the benches at Westminster are not quite full."
 joi_flavor_gbr.47.f: "“I move that this House address [ROOT.GetCountry.GetRuler.GetHerHis] Majesty in response to the gracious speech we have just heard, delivered this morning by the Royal messenger to the newly assembled Parliament.”\n\n“We, like [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, believe that the principal Powers acting together in matters of great European concern will afford a solid guarantee for peace; and the [SCOPE.sParty('ruling_party').GetName] Cabinet continues to receive satisfactory assurances from foreign Powers of their desire to maintain the most friendly relations with our country.”\n\n“As a man of business, I rejoice that in the Speech from the Throne [ROOT.GetCountry.GetRuler.GetHerHis] Majesty congratulated [ROOT.GetCountry.GetName]—not upon diplomatic triumphs or the martial glories of our army—but upon a new treaty of free commerce with a commercial nation; for it is by such means we must maintain our greatness, not by the mere weight of our fleets.”"
 joi_flavor_gbr.47.a: "Parliament must drive a Mobilisation Bill for war."
 joi_flavor_gbr.47.b: "Parliament must grant the Government stronger powers of suppression!"
 joi_flavor_gbr.47.c: "A special select committee is needed on the present bill."
 joi_flavor_gbr.47.e: "Request a supplementary budget for the Government."
 joi_flavor_gbr.48.t: "Vote of No Confidence"
 joi_flavor_gbr.48.d: "As the authority of the ministry ebbs and its fortunes worsen in the Commons, Members have concluded that the [SCOPE.sParty('ruling_party').GetName] Government can no longer command a majority. Today a motion of no confidence has been tabled against [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government, rallying #yellow #B [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Most Loyal Opposition#!#! and others to overthrow [SCOPE.sParty('ruling_party').GetName]’s rule."
 joi_flavor_gbr.48.f: "“We humbly address [ROOT.GetCountry.GetRuler.GetHerHis] Majesty as follows:\n\nMost Gracious Sovereign,\n\nWe, Your Majesty’s most dutiful and loyal subjects, the #O #B Commons of the United Kingdom of Great Britain and Ireland#!#!, assembled in Parliament, beg leave to return our humble thanks for the gracious Speech Your Majesty has addressed to both Houses.\n\nBut we feel bound respectfully to submit to Your Majesty that #B Your Majesty’s present advisers do not possess the confidence of this House.#!”"
 joi_flavor_gbr.48.a: "The governing party must rally to defeat the motion."
 joi_flavor_gbr.48.b: "Carried—the Cabinet must resign!"
 joi_flavor_gbr.49.t: "Royal Proclamation"
 joi_flavor_gbr.49.d: "The Prime Minister may advise [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to dissolve Parliament and begin a new general election. Judging the moment favourable, the [SCOPE.sParty('ruling_party').GetName] Government has waited upon [ROOT.GetCountry.GetRuler.GetHerHis] Majesty and secured the exercise of the prerogative: Parliament is dissolved and the [concept_election] begins."
 joi_flavor_gbr.49.f: "“Whereas, by and with the advice of Our Privy Council, We deem it expedient that the present Parliament be dissolved, and that its functions cease: We therefore issue this Our Royal Proclamation, and accordingly dissolve the said Parliament. The Lords Spiritual and Temporal and the Members of the House of Commons are not to sit any longer in Parliament.”\n\n“[ROOT.GetCountry.GetRuler.GetHerHis] Majesty desires and is resolved to meet the People as soon as may be, and to hear their counsel in Parliament; We therefore make known to all Our loving subjects that it is Our Royal Will and pleasure to call a new Parliament; and We further declare that, by and with the advice aforesaid, We have directed Our [SCOPE.sParty('ruling_party').GetName] Prime Minister forthwith to issue Writs for calling a new Parliament according to law and due form.”\n\n“By Royal Proclamation under Our Great Seal We likewise require the Prime Minister and Our Secretaries of State forthwith to issue Writs for the return of the Lords Spiritual and Temporal and the Knights, Citizens and Burgesses to serve in the said Parliament; which Writs are to be duly returned according to law.”"
 joi_flavor_gbr.49.a: "The [SCOPE.sParty('ruling_party').GetName] ministers may soon be honourable backbenchers."
 joi_flavor_gbr.49.b: "The public can see the [SCOPE.sParty('ruling_party').GetName] record for themselves."
 joi_flavor_gbr.49.c: "We trust [SCOPE.sParty('ruling_party').GetName] will retain the confidence of the electors!"
 joi_flavor_gbr.50.t: "Colonial Policy"
 joi_flavor_gbr.50.d: "In routine debate, #O #B colonial policy#!#! once more commands the attention of both Houses. Expansionists insist the Empire’s overseas presence safeguards strategy and sustains commerce; opponents warn that overreach burdens the Exchequer and provokes political friction with the subjects overseas. How shall [ROOT.GetCountry.GetName] balance dominion, development, and deference to self-government?"
 joi_flavor_gbr.50.f: "“I concur with the honourable Member for [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName], that this is among the most important questions to be submitted to Parliament. When I read these things, I cannot account for the rash assertion that we have shamefully neglected our obligations in the colonies—especially from those who, by their knowledge, ought to have better understood the matter.”\n\n“The [SCOPE.sParty('ruling_party').GetName] Government fully admits that, despite all these improvements, the existing governments in our colonies are not the best conceivable; yet if we judge them by their administration under the conditions of the time, there is no warrant to condemn them as neglectful or inefficient.”\n\n“Am I to understand that you speak for many able servants engaged upon that duty overseas?—Without doubt.”"
 joi_flavor_gbr.50.a: "We must press new colonial expansion."
 joi_flavor_gbr.50.b: "The Government is bound to carry true civilisation into the colonies."
 joi_flavor_gbr.50.c: "Overseas subjects must bear a share of Imperial defence."
 joi_flavor_gbr.50.e: "What they need most is better self-government!"
 joi_flavor_gbr.50.h: "Colonialism has run its course; we should begin an independence agenda."
 joi_flavor_gbr.51.t: "The Imperial War Cabinet"
 joi_flavor_gbr.51.d: "As [ROOT.GetCountry.GetName] becomes embroiled in an ever fiercer global conflict, the [SCOPE.sParty('ruling_party').GetName] ministry faces unprecedented strain: [SCOPE.sCharacter('westminster_general_scope').GetFullName], a prominent [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle], has resigned from the Cabinet and, upon departing, issued sharp criticisms of two ministers’ decisions—bringing the fitness of the [SCOPE.sParty('ruling_party').GetName] Cabinet to wage war into open question."
 joi_flavor_gbr.51.f: "“Mr. Speaker, the demand in the motion you have read from the Chair is, so far as I know, without precedent in the history of this House: [SCOPE.sCharacter('westminster_general_scope').GetLastName], a distinguished [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle], has, for good or ill, resigned his post of two years, and after resignation challenges statements by two ministers made during his tenure?”\n\n“I say I have been unfairly treated: I imagine [SCOPE.sCharacter('westminster_general_scope').GetLastName] may not have spoken to me because he deemed he should first speak to his superiors—either the Secretary of State for War or the Chief of the Imperial General Staff; perhaps he thought I was not the man to be spoken to.”\n\n“Now [SCOPE.sCountry('enemy_country_scope').GetName] is preparing, silently and under cover of fog, perhaps the most momentous blow of the war. Our fighting men ask us for greater help: for our common country, for its fate now and in the weeks ahead, I earnestly beg the House to cease these attacks and bend its energies to supporting our generals and soldiers.”"
 joi_flavor_gbr.51.a: "The War Cabinet must prepare for home and continental defence."
 joi_flavor_gbr.51.b: "We need a command capable of global defence!"

 joi_flavor_gbr.52.t: "Royalist Rising"
 joi_flavor_gbr.52.d: "With [GetLawType('law_monarchy').GetName] abolished, supporters of the Crown rally across the realm and take up arms to #V defend the sacred constitution#!. To the [GetIdeology('ideology_royalist').GetName], the present government of [ROOT.GetCountry.GetName] are usurpers; the nation is sliding into a full civil war over the constitution and the seat of power."
 joi_flavor_gbr.52.f: "“The King’s authority derives from the divine right committed to him by God at his anointing, and by the traditions and laws of [ROOT.GetCountry.GetName]; the power exercised by those who would overthrow him is mere force… No learned lawyer will affirm that an impeachment can lie against the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]: one of their maxims is that the King can do no wrong.”\n\n“I must tell you: their liberty lies in having a government, but not in sharing its administration; that does not concern them. Subjects and the King are things quite distinct!”"
 joi_flavor_gbr.52.a: "The descent of a dark age."
 joi_flavor_gbr.53.t: "Parliamentarians Depose [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]"
 joi_flavor_gbr.53.d: "Amid bloody clashes and escalating political crisis, the [GetIdeology('ideology_constitutionalist').GetName] have at last declared the throne of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] illegitimate for #B treason and tyranny#! and abolished [GetLawType('law_monarchy').GetName], leading their forces in armed rebellion against [ROOT.GetCountry.GetRuler.GetHerHis] Majesty. For the first time since the #V English Civil War of 1642#!, [ROOT.GetCountry.GetName] is again hurled toward a struggle that will decide its future polity."
 joi_flavor_gbr.53.f: "“[ROOT.GetCountry.GetRuler.GetFullName], King of Britain, with evil intent sought to establish and maintain unlimited tyrannical power at his pleasure; to overturn the rights and liberties of the people, and to subvert all remedies of misgovernment which by the fundamental constitution of [ROOT.GetCountry.GetName] are reserved for the people in Parliaments or national councils frequently held. To secure this wicked design and shield his adherents, the said [ROOT.GetCountry.GetRuler.GetFullName] traitorously and maliciously levied war against the present Parliament and those whom it represents.”\n\n“Wherefore the said [ROOT.GetCountry.GetRuler.GetFullName], being the instigator, author, and continuer of these unnatural, cruel, and bloody wars, and guilty of all treasons, murders, burnings, plunderings, devastations, damages, and injuries committed therein against this nation, ought to suffer death!”"
 joi_flavor_gbr.53.a: "Monstrous impiety!"

 joi_flavor_gbr.54.t: "The Reform Act of [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.54.d: "After years of clamour and fierce debate, Parliament’s recommended Reform Bill of [TimeKeeper.GetCurrentDate.Format('y')] has, in [TimeKeeper.GetCurrentDate.Format('y m')], received the Royal Assent of [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. It broadens the franchise in [ROOT.GetCountry.GetName], enabling a wider male public to register; though property qualifications remain, many townsfolk of [ROOT.GetCountry.GetNameNoFlag] cheer this step."
 joi_flavor_gbr.54.f: "“Whereas it is expedient to amend the laws relating to the representation of the People in England and Wales, be it enacted by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons, in Parliament assembled, and by the authority of the same, that:\n\nFrom [TimeKeeper.GetCurrentDate.Format('y m')] every man shall be entitled to be registered and, being registered, to vote for one or more Members to serve in Parliament for any borough, provided he be of full age, not subject to any legal incapacity, and during the previous twelve calendar months, as owner or tenant, an inhabitant or occupier of any dwelling within the borough, and shall, before [TimeKeeper.GetCurrentDate.Format('m d')], have in good faith paid the rates equivalent to the poor rate then due.\n\nOn the last day of July in any year, any owner or tenant occupying lands or tenements within any county of the taxable annual value of twelve pounds or upwards during the preceding twelve months, and the said premises having been rated to the relief of the poor during such occupation, shall be qualified.”"
 joi_flavor_gbr.54.a: "The [SCOPE.sParty('ruling_party').GetName] Government will profit thereby."
 joi_flavor_gbr.54.b: "Millions of new electors will thank [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName]!"
 joi_flavor_gbr.55.t: "Representation of the People Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.55.d: "After a long struggle, the [SCOPE.sParty('ruling_party').GetName] position has prevailed: the Representation of the People Act of [TimeKeeper.GetCurrentDate.Format('y')], driven by [SCOPE.sCharacter('ig_intelligentsia_leader').GetFullName], has received Royal Assent from [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], granting universal suffrage to all adult male citizens of [ROOT.GetCountry.GetName], and admitting women into public politics on specified terms. Many hail this as a decisive stroke in the constitutional democracy of [ROOT.GetCountry.GetNameNoFlag]."
 joi_flavor_gbr.55.f: "“Whereas it is expedient to amend the laws relating to Parliamentary and local government franchises, the registration of electors, the conduct of elections, and the redistribution of seats, and for other purposes connected therewith, be it enacted by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons, in this present Parliament assembled, and by the authority of the same, as follows:\n\nAny man of full age, not subject to any legal incapacity, occupying as owner or tenant any land or tenement within the area, shall be entitled to be registered as a local government elector or candidate.\n\nAny woman who is the wife of a man registered in respect of the house in which they both reside, or who has obtained a qualification equivalent to a bachelor’s degree, being aged thirty years or over, shall be entitled to be registered as a local government elector.\n\nAny naval or military voter who, but for his service, would have acquired a residential qualification for registration, shall be deemed to reside for the purpose of such qualification.”"
 joi_flavor_gbr.55.a: "The Commons is the best representative of popular sovereignty!"
 joi_flavor_gbr.55.b: "The ideas of [GetIdeology('ideology_feminist').GetName] will carry us forward."
 joi_flavor_gbr.56.t: "Representation of the People Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.56.d: "After a long movement for [GetIdeology('ideology_feminist').GetName] and many Parliamentary debates, [ROOT.GetCountry.GetName] has at last taken a decisive step: on [TimeKeeper.GetCurrentDate.Format('y m d')], the Representation of the People Act of [TimeKeeper.GetCurrentDate.Format('y')], assented to by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], abolished restrictions on women’s age and marital status, granting equal suffrage to all citizens—men and women—aged twenty-one and above. From now on the vote knows no sex; countless women of [ROOT.GetCountry.GetNameNoFlag] hail the [SCOPE.sParty('ruling_party').GetName] Government’s great reform!"
 joi_flavor_gbr.56.f: "“Whereas it is expedient to equalise the franchise for men and women at Parliamentary and local elections and for purposes consequential thereon, be it enacted by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons, as follows:\n\nAny person registered as an elector for any constituency shall, during the continuance of that registration, if a woman, be entitled to vote at an election of a Member to serve in Parliament for that constituency, notwithstanding sex or marital status; but no person may vote for more than one candidate at a general election.\n\nThe husband or wife of any person entitled to be registered as a local government elector in any local government area, being of full age and not subject to any legal incapacity, shall be entitled to be registered as a local government elector in that area.”"
 joi_flavor_gbr.56.a: "Power belongs equally to all the people of [ROOT.GetCountry.GetName]!"

 joi_flavor_gbr.57.t: "The Importation Act of [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.57.d: "After a split within the [SCOPE.sParty('ruling_party').GetName] and the cooperation of [SCOPE.sCharacter('corbden_leader').GetFullName] with [SCOPE.sCharacter('peel_leader').GetFullName], the #V Corn Laws#!—which since 1815 have protected the interests of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]—have at last been ended by the #V Importation Act [TimeKeeper.GetCurrentDate.Format('y')]#!, assented to yesterday by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], a thorough victory for [GetLawType('law_free_trade').GetName]."
 joi_flavor_gbr.57.f: "“As to the merit for introducing these measures, I mean to rob no man of his due; but I say that neither the gentlemen upon the opposite benches, nor I, nor those about me—in strict party sense—are entitled to the credit. It was a union of parties, aided by the influence of the [SCOPE.sParty('ruling_party').GetName] Government, that secured their success.”\n\n“But, Sir, one name ought to be linked with that success: it is not that of the noble Lord in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], nor mine; the name which ought, and will, be associated with these measures is that of a man called [SCOPE.sCharacter('corbden_leader').GetFullName].”\n\n“I believe he has, from motives purely disinterested, with untiring zeal and by the force of reason, urged these principles; and his eloquence is the more admirable for its simplicity. I do not hesitate to ascribe the success of these measures to [SCOPE.sCharacter('corbden_leader').GetFullName].”"
 joi_flavor_gbr.57.a: "The interests of the farmer still require attention."
 joi_flavor_gbr.57.b: "[GetLawType('law_free_trade').GetName] will lead us to new prosperity!"
 joi_flavor_gbr.58.t: "The Navigation Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.58.d: "At the insistence of [SCOPE.sParty('ruling_party').GetName], Parliament has passed a new #V Navigation Act#!. Reviving the tradition of [GetLawType('law_mercantilism').GetName] from the seventeenth century, it restricts colonial trade and tightens requirements on flag and crew to secure [ROOT.GetCountry.GetNameNoFlag]’s economic interests. Industrialists, rural folk, and overseas [concept_subject]s grumble loudly."
 joi_flavor_gbr.58.f: "“Every ship truly belonging to [ROOT.GetCountry.GetName], whereof the master shall be an Englishman, navigated during her voyage by at least one half English mariners and by a single English captain, carrying commodities of the growth of any country not in Europe, shall not incur additional duties.”\n\n“If any officer of [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s customs shall grant any licence, or permit the carrying of any sugar, tobacco, ginger, cotton wool, timber, or other goods of the growth of any foreign territory, island, colony, plantation, dominion, or place, to any other country or place until the same be first unladen and brought into some port or haven of [ROOT.GetCountry.GetNameNoFlag], every such officer shall, for such offence, forfeit his office.”\n\n“If any person or persons resist or by force oppose the said Act, he shall be severely punished; and, besides the penalties therein contained, shall be committed to the county wherein such offence shall be committed, without bail or mainprize, until he give sufficient security to the heirs and successors of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in a fine of one-tenth the value of the goods, not to offend again.”"
 joi_flavor_gbr.58.a: "Our overseas [concept_subject]s must yield greater benefit to [ROOT.GetCountry.GetNameNoFlag]!"
 joi_flavor_gbr.58.b: "Adam Smith’s [GetLawType('law_mercantilism').GetName] is ours to inherit!"
 joi_flavor_gbr.59.t: "The Anti–Corn Law League"
 joi_flavor_gbr.59.d: "Debate over grain duties has grown into a national struggle. Backed by the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] and supported by the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], a noted [GetIdeology('ideology_market_liberal').GetName] orator has formed a new pressure group: the #V Anti–Corn Law League#!, urging [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government to advance [GetLawType('law_free_trade').GetName]."
 joi_flavor_gbr.59.f: "“When @grain!#V grain#! is dear, people cannot afford food and have little left for @clothes!#V clothing#!; when they have little for clothing, clothes go unsold; when @clothes!#V clothing#! goes unsold, there is too much to sell and prices fall; when @clothes!#V clothing#! is very cheap, the income for making it is too low: wages fall, mills shut, trade languishes, and distress becomes general.”\n\n“But when, as now, the workman has 25 shillings left in his pocket, he buys more @clothes!#V clothing#!; demand rises, higher prices follow, and higher prices give better wages and profits. Thus I prove that dear @grain!#V grain#! lowers wages, while cheap @grain!#V grain#! raises them.”"
 joi_flavor_gbr.59.a: "The Corn Laws must be repealed!"
 joi_flavor_gbr.59.b: "[ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government reserves its position."
 joi_flavor_gbr.60.t: "Central Agricultural Protection Society"
 joi_flavor_gbr.60.d: "As the #V Anti–Corn Law movement#! grows, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], and Conservative Members—fearing for their interests—form a political alliance, the #V Central Agricultural Protection Society#!, to defend the Corn Laws and pressure [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government."
 joi_flavor_gbr.60.f: "“Your Lordships have a duty to weigh all measures laid before you; you have a right to vote as you see fit, and particularly to vote against measures that seem rash and reckless. But I implore you to consider the consequences of any vote you now cast—consider in what position you would place this House.”\n\n“Survey the bill you are this night to decide—see how it is presented, and reflect upon the consequences should you pass it. My noble friend says the vote would be at odds with that of the Commons on the same question, and with the supposed opinions of those who elected them.”"
 joi_flavor_gbr.60.a: "This will surely split the [SCOPE.sParty('ruling_party').GetName]."
 joi_flavor_gbr.60.b: "A sop to pacify the tenantry, nothing more."

 joi_flavor_gbr.61.t: "Royal Navy Review [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.61.d: "One by one, new #O #B capital ships#!#! and #B #O cruisers#!#! have slid down the ways with the support of #V the First Lord [SCOPE.sCharacter('lord_high_admiral').GetFullName] and Parliament#!. In #V Portsmouth#! the magnificent [concept_fleet] forms in line: a sea of warships to the horizon, the very waves subdued beneath their keels—#B even Poseidon pales before Britannia#!. The band strikes up; the herald boasts to the shaken officers of [SCOPE.sCountry('great_power_2nd').GetName] and [SCOPE.sCountry('great_power_3rd').GetName] that behind this great [concept_fleet] stands [ROOT.GetCountry.GetName]’s global shipping lane borne by mighty convoys, #V and most of all, a great Empire.#!"
 joi_flavor_gbr.61.f: "#B “Rule, Britannia! rule the waves! Britannias never will be slaves!”#!\n\n#B Land of hope and glory, mother of the free;#!\n\nHow shall we extol thee, who are born of thee?\n\n Thy laws are justly guarded by the power of the free,\n\n#B Thy bounds are set more wide; God made thee mightier yet;#!\n\nHear the nation’s answer, hearts with pride elate!\n\n#B My heart is steadfast, my spirit free; we crown our king!#!"
 joi_flavor_gbr.61.a: "Land of hope and glory—how shall we praise thee?"
 joi_flavor_gbr.61.b: "Rule, Britannia! Britannia rule the waves!"

 joi_flavor_gbr.62.t: "The Duke of Wellington’s Funeral"
 joi_flavor_gbr.62.d: "On [TimeKeeper.GetCurrentDate.Format('y m d')], #V Field Marshal, former Prime Minister, victor of Waterloo, conqueror of the world’s conqueror, His Grace the Most Noble Duke of Wellington [SCOPE.sCharacter('duke_of_wellington_scope').GetFullName]#! died of a stroke. One of the most revered figures in [ROOT.GetCountry.GetName]’s political and military life, his death plunged the nation into mourning. [ROOT.GetCountry.GetRuler.GetHerHis] Majesty ordered a state funeral; tens of thousands thronged the streets of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to watch the greatest of captains make his last march along the Thames to his resting place in St Paul’s Cathedral. That very day, rain poured upon the city—as if God Himself mourned the man."
 joi_flavor_gbr.62.f: "“This night the Commons are summoned to a sad yet noble duty—to show a Senate in mourning for a hero: the funeral of [ROOT.GetCountry.GetName]’s glory, Field Marshal His Grace the Duke of Wellington [SCOPE.sCharacter('duke_of_wellington_scope').GetFullName]. He was not only a great man, but a light in a turbulent age and a Briton’s hero; the legacy he leaves his country is greater than his fame—an exemplar of character, splendour of achievement, simplicity of life, and purity of motive.”\n\n“[SCOPE.sCharacter('duke_of_wellington_scope').GetFullName] was, in truth, the model of the English gentleman and the British nation: he expressed their sentiments, displayed their temper, guarded their honour, and upheld their renown. In his victories the whole country seemed to triumph; and in his fall the sorrow of Britannia found its voice.”"
 joi_flavor_gbr.62.a: "May he rest, and rise in the glory of the Lord."

 joi_flavor_gbr.63.t: "Elementary Education Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.63.d: "After long debate, Parliament has passed a landmark Act: a universal system of public elementary schools throughout [ROOT.GetCountry.GetName], so that no child is denied learning for want of parents’ means, and with a more secular setting for instruction. [ROOT.GetCountry.GetNameNoFlag] enters the era of compulsory education."
 joi_flavor_gbr.63.f: "“Whereas it is expedient to make provision for public elementary education in England, Wales, Scotland and Ireland, be it enacted by the Queen’s/King’s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons:\n\nNo child shall be refused admission to, or continuance in, a school upon the condition of attending or not attending any Sunday school or place of religious worship, nor upon the condition of attending any religious observance or instruction in any religious subject in school or elsewhere.\n\nSchool Boards shall, under the authority of [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Inspectors, pay the whole or part of the fees of any child resident in their district whose parents, by reason of poverty, cannot pay the fees of any public elementary school.”"
 joi_flavor_gbr.63.a: "Ensure the state does not drown in administration."
 joi_flavor_gbr.63.b: "This Act will bless the next generation of [ROOT.GetCountry.GetNameNoFlag]."
 joi_flavor_gbr.64.t: "National Assistance Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.64.d: "[GetLawType('law_poor_laws').GetName] and its Malthusian spirit once underpinned relief in [ROOT.GetCountry.GetName], but mounting criticism deemed it antiquated, harsh, and shaming. Under a new Act of Parliament, [GetLawType('law_old_age_pension').GetName] supersedes the old Poor Law, funded by the Exchequer and local authorities, to provide humane relief to the poorest."
 joi_flavor_gbr.64.f: "“The existing Poor Law shall cease to have effect and shall be replaced by the provisions of Part II of this Act relating to assistance out of moneys provided by Parliament, Part III relating to accommodation and other services to be provided by local authorities, and the related provisions of Part IV of this Act.”\n\n“The Board shall, in accordance with this Act, assist persons in Great Britain who are unable to meet their needs or whose resources must be supplemented in order to do so; and special provision shall be made for the blind and for those whose incomes are impaired by treatment for pulmonary tuberculosis.”\n\n“Where the Board considers it expedient, for the protection of the interests of an applicant for assistance or his dependants, to pay the whole or part of a grant to some person other than the applicant, it may do so; any receipt for assistance shall be exempt from stamp duty.”"
 joi_flavor_gbr.64.a: "A victory for progress and humanity."
 joi_flavor_gbr.64.b: "Begone, Poor Law!"

 joi_flavor_gbr.65.t: "Employers’ and Workmen’s Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.65.d: "After years of strikes, meetings, and union struggle, the #O #b $movement_labor$#!#! has won Parliament’s attention. Frequent factory accidents and countless worker injuries swayed opinion toward labour. Under rising pressure, the Government yielded and enacted new [GetLawType('law_worker_protections').GetName], for the first time recognising employer liability for industrial injuries and a minimum wage."
 joi_flavor_gbr.65.f: "“Whereas it is expedient to make provision for compensation to workmen for injuries by accident arising out of and in the course of their employment, be it enacted by the Queen’s/King’s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons:\n\nIn any employment, where a workman is injured by accident, his employer shall be liable to pay compensation in accordance with the First Schedule to this Act, subject to the following conditions; provided that where the injury occurs whilst the workman is engaged in a strike and continues to receive full wages, the employer shall not be liable.”\n\n“Where the injury is caused by the negligence or wilful act of the employer, the workman may elect to claim compensation under this Act or to sue as herein provided; but where it is proved that the injury was wholly due to the serious and wilful misconduct of the workman, no compensation shall be payable.”\n\n“No workman’s weekly earnings shall fall below the minimum fixed by a Wages Board; any employer paying less shall be liable to a fine and to make good arrears, and in case of repeated offence may, by order of the court, be shut down.”"
 joi_flavor_gbr.65.a: "The unions should now show restraint."
 joi_flavor_gbr.65.b: "Justice begins here!"
 joi_flavor_gbr.66.t: "[ROOT.GetCountry.GetName] Labour Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.66.d: "After years of strikes, meetings, and union struggle, the #O #b $movement_labor$#!#! finally won the ear of the Government; widespread factory accidents and mounting casualties turned public sentiment toward the workers. Under relentless pressure, [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government yielded and promulgated new [GetLawType('law_worker_protections').GetName], recognising employer liability and minimum wages."
 joi_flavor_gbr.66.f: "“Where in any employment a workman is injured by accident, his employer shall be liable to pay compensation in accordance with the First Schedule hereto, subject to the following conditions; provided that where the injury occurs while the workman is on strike and he continues to receive full wages, the employer shall not be liable.”\n\n“Where the injury is due to the employer’s negligence or wilful act, the workman may elect to claim under this Act or sue as provided herein; but if it be proved that the injury was wholly due to the workman’s serious and wilful misconduct, no claim shall lie.”\n\n“The weekly earnings of a workman shall not be less than the minimum determined by the Wages Board; any employer employing at less shall be fined and compelled to make good the deficiency; on repeated offence the court may order closure.”"
 joi_flavor_gbr.66.a: "The unions should show some restraint."
 joi_flavor_gbr.66.b: "Justice begins here!"
 joi_flavor_gbr.67.t: "Match-Girls’ Strike in [SCOPE.sState('labor_law_strike_scope').GetCityHubName]"
 joi_flavor_gbr.67.d: "In the match factories of [SCOPE.sState('labor_law_strike_scope').GetCityHubName], young women have had enough: fined for the smallest fault and poisoned by white phosphorus that rots their jaws, they have declared a strike, demanding fair treatment and safer work."
 joi_flavor_gbr.67.f: "“Dirty feet—fine; seat not straight—fine; talking—fine; the net snags the machine—fine.”\n\n“Many ills spring from women being shut out of public life. The world is well enough, not worse than before. Trade unionists must help all, not for self, but for the common good. But they must persevere—no momentary fury; they must stand firm together, for everyone.”\n\n“We urge workers in all match-making countries, for the sake of health, to press their governments to ban poisonous phosphorus; until then, we call on all men and women to buy only non-toxic matches.”"
 joi_flavor_gbr.67.a: "The blame lies with vile employers in [SCOPE.sState('labor_law_strike_scope').GetCityHubName]!"
 joi_flavor_gbr.67.b: "Arrest the ringleaders!"
 joi_flavor_gbr.68.t: "Dock Strike in [SCOPE.sState('labor_law_strike_scope').GetCityHubName]"
 joi_flavor_gbr.68.d: "At the busy docks of [SCOPE.sState('labor_law_strike_scope').GetCityHubName], thousands of unskilled labourers—ragged and hungry—have downed tools. They demand a higher daily rate and relief from harsh conditions; as the strike spreads and the port ceases to function, [SCOPE.sState('labor_law_strike_scope').GetCityHubName] is near paralysis."
 joi_flavor_gbr.68.f: "“These poor fellows are in rags, scarcely a boot to their feet—piteous beyond words… They come to the docks unfed, perhaps since the day before. They work an hour for sixpence; hunger forbids more. They take the sixpence for food—perhaps their first meal in twenty-four hours.”\n\n“Sing a sixpence song—the dockers are out; the guinea-pig is ravenous, like the greedy pike; till the docks are opened, Burns will speak for you; lads, take heart—you shall win within the week!”"
 joi_flavor_gbr.68.a: "Capital needs labour, and labour needs capital."
 joi_flavor_gbr.68.b: "Send in the cavalry to quell this rabble!"
 joi_flavor_gbr.69.t: "Sit-In Strike at [SCOPE.sState('labor_law_strike_scope').GetCityHubName]"
 joi_flavor_gbr.69.d: "In [SCOPE.sState('labor_law_strike_scope').GetCityHubName], workers have not left the works at the bell; they have occupied the machines and boilers, sitting at the benches and refusing production. The move has nearly halted the factories of the whole city."
 joi_flavor_gbr.69.f: "“They sat by the machines, the vats, the boilers, and the benches, talking; some for the first time grasped their importance in production at [SCOPE.sState('labor_law_strike_scope').GetCityHubName]. A dozen men nearly stopped the whole plant! Activity spread across departments; ordinary workers, active and union-minded, said, ‘We must stand with them!’ And so they all did—union and non-union alike.”"
 joi_flavor_gbr.69.a: "A foretaste of syndicalism—leftist ambition must be stopped!"
 joi_flavor_gbr.69.b: "Factory occupation is plainly unlawful."
 joi_flavor_gbr.69.c: "Let owners learn they cannot do without their workers."
 joi_flavor_gbr.70.t: "Bloody Sunday"
 joi_flavor_gbr.70.d: "On [TimeKeeper.GetCurrentDate.Format('m d')], masses of workers in [SCOPE.sState('labor_law_strike_scope').GetCityHubName] gathered in the square with banners, crying for liberty and bread, to present a petition to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the Government urging [GetLawType('law_worker_protections').GetName]. The situation deteriorated swiftly; fearing a general riot, the authorities of [SCOPE.sState('labor_law_strike_scope').GetCityHubName] prepared to act."
 joi_flavor_gbr.70.f: "“Grant these demands and swear to them, and you will make [ROOT.GetCountry.GetName] happy and glorious, and your name shall be graven for ever upon our hearts and those of our children; refuse them, and we will die here in this square—there is nowhere else to go. Two roads lie before us—freedom and happiness, or the grave!”\n\n“Comrades, is it not so? Let our lives be given for suffering [ROOT.GetCountry.GetNameNoFlag]. We do not repent the sacrifice; it is voluntary!”\n\n“So be it! No pieties now… Let us die for [ROOT.GetCountry.GetNameNoFlag]! We must save [ROOT.GetCountry.GetNameNoFlag] from the bureaucrats, and I will be in the front rank!”"
 joi_flavor_gbr.70.a: "Order the garrison to open fire at once!"
 joi_flavor_gbr.70.b: "Have the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] leave [SCOPE.sState('labor_law_strike_scope').GetCityHubName] first."
 joi_flavor_gbr.70.c: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] will speak to the people in person!"
 joi_flavor_gbr.71.t: "Haymarket Riot"
 joi_flavor_gbr.71.d: "On [TimeKeeper.GetCurrentDate.Format('m d')], in [SCOPE.sState('labor_law_strike_scope').GetCityHubName], a rally calling for the #O #B eight-hour day#!#! descended into #R violent clashes#!. Speeches by [GetIdeology('ideology_anarchist').GetName]s intertwined with police orders to disperse, and at last an explosion shook the city."
 joi_flavor_gbr.71.f: "“The evil doctrines of the [GetIdeology('ideology_anarchist').GetName] have borne bloody fruit tonight in [SCOPE.sState('labor_law_strike_scope').GetCityHubName]; before dawn a dozen steadfast souls will likely have given their lives in this riot and bloodshed, as a grim memorial to that creed.”\n\n“I tell you first this meeting was not convened for any such purpose. Its object was to explain the general situation of the #O #B eight-hour movement#!#! and the events bound up with it.”\n\n“In the name of the law, I order you to desist and disperse!”\n\n“Eight hours for work, eight for rest, eight for what we will; workers, arm and give your all!”"
 joi_flavor_gbr.71.a: "We cannot forbid citizens’ right to strike."
 joi_flavor_gbr.71.b: "In the name of the law—fire!"
 joi_flavor_gbr.72.t: "[ROOT.GetCountry.GetName] Railway Strike"
 joi_flavor_gbr.72.d: "From the platforms of [SCOPE.sState('labor_law_strike_scope').GetCityHubName], pickets now choke the lines of [ROOT.GetCountry.GetName]. The railway union demands higher pay and shorter hours; the employers refuse. The great strike spreads, and the nation’s transport lies in dreadful paralysis."
 joi_flavor_gbr.72.f: "“The masters say, ‘To hell with the men!’ and we answer, ‘Service to the labourer is his due!’ Our struggle is not for ourselves alone, but for the rights of those who will toil hereafter.”\n\n“When the strength of labour is gathered it is irresistible. It will shatter the system that oppresses it as lightning splits the oak; one day our silence will be stronger than the voices you stifle today!”"
 joi_flavor_gbr.72.a: "Oh dear!"
 joi_flavor_gbr.72.b: "Deploy the police at once."

 joi_flavor_gbr.73.t: "Report on Workhouse Conditions"
 joi_flavor_gbr.73.d: "The operation of [GetLawType('law_poor_laws').GetName] has drawn fierce criticism in recent years. Yesterday a #V Report on Workhouse Conditions#!, commissioned by the [SCOPE.sParty('ruling_party').GetName] Government and produced by the #B Commissioners for Poor Law Affairs at Whitehall#! after rigorous inquiry, was read to Parliament. It bluntly exposed the evils and dangers of the system, confirming the public’s charges of inhumanity."
 joi_flavor_gbr.73.f: "“It neither fosters the growth of intellect nor cultivates manliness and independence. Its influence dries up the last impulses of social life; it destroys self-respect and leaves the inmates scarcely capable of sympathy—whether with their equals or their betters—which is innate to human nature.”\n\n“Repulsion and discomfort are the sole means by which the [GetLawType('law_poor_laws').GetName] test can operate; therefore, to make it operate, the workhouse must be carefully maintained in this inhuman state of repulsion and discomfort.”"
 joi_flavor_gbr.73.a: "Shocking! [GetLawType('law_poor_laws').GetName] must be reformed root and branch."
 joi_flavor_gbr.74.t: "Report on Workhouse Conditions"
 joi_flavor_gbr.74.d: "Despite years of criticism, a #V Report on Workhouse Conditions#! published yesterday by the #B Commissioners for Poor Law Affairs at Whitehall#!—after a supposedly “rigorous” inquiry—commended the present state of the workhouses. Many left-wing Members and sympathisers within [SCOPE.sParty('ruling_party').GetName] are incensed."
 joi_flavor_gbr.74.f: "“What government would not hesitate before dealing at once with a question springing from centuries of custom, intertwined with people’s habits and rooted in their prejudices? Of all matters unfitted for rough or hasty legislation, until the national temper be understood—if it can—[GetLawType('law_poor_laws').GetName] is foremost.”\n\n“Presently, their prison-like aspect and their intention to deter the poor excite a wholesome dread; and the generous allowance for bastards fosters illegitimacy—depriving women of chastity as a shortcut to a husband or to maintenance, and encouraging extortion and perjury.”"
 joi_flavor_gbr.74.a: "Oh, is that so?"

 joi_flavor_gbr.75.t: "The People’s Charter"
 joi_flavor_gbr.75.d: "Yesterday six MPs and six working men held a meeting in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], styling it a “Chartist Convention”, and published six points demanding universal suffrage in a “People’s Charter”. The call resonates with labour across [ROOT.GetCountry.GetName]; a political storm brews."
 joi_flavor_gbr.75.f: "“Whereas the Commons of the Realm now exercise, in the name of the people and as their supposed representatives, the power of making laws, and whereas to discharge wisely and faithfully that great duty they must truly represent the wishes, feelings, and interests of the people, be it ordained:\n\nFrom the passing of this instrument every male inhabitant of [ROOT.GetCountry.GetNameNoFlag] shall, under the conditions herein, have the right to elect Members to serve in the Commons; and [ROOT.GetCountry.GetNameNoFlag] shall be divided into three hundred districts, that the people may enjoy equal representation in the House.”\n\n“Each district returning officer shall appoint a deputy to preside at the several polling places on election day, answerable to and acting within the powers of this ordinance. At the close of each session every Member of the House shall be entitled to a Treasury warrant as salary for his legislative service to the public, fixed at twenty pounds per annum.”"
 joi_flavor_gbr.75.a: "Watch the Chartists closely."
 joi_flavor_gbr.76.t: "National Chartist Convention"
 joi_flavor_gbr.76.d: "In [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], with the backing of [SCOPE.sCharacter('labor_leader_scope').GetFullName], millions of working people support the six points of the People’s Charter and present a mass petition through a National Convention. The march is orderly and largely peaceful. Though the leaders claim 3.5 million signatures, #O #B Westminster#!#! remains deeply divided over receiving the petition."
 joi_flavor_gbr.76.f: "“Three million and a half men calmly, orderly, and peaceably demand justice; and rulers stop their ears. Three million and a half pray to be heard to state their wrongs and assert their rights; ‘Parliament’ resolves that they shall not speak!”\n\n“The slave class hold out the olive branch to the privileged electors, seeking a firm union on equality before the law; the privileged refuse the compact! The same class remains slaves; the stigma endures, and the people are not free.”"
 joi_flavor_gbr.76.a: "Reject the petition."
 joi_flavor_gbr.76.b: "Parliament will consider their petition."
 joi_flavor_gbr.76.c: "Send the police to disperse them!"
 joi_flavor_gbr.77.t: "Bull Ring Riots in [SCOPE.sState('chartism_movement_state').GetCityHubName]"
 joi_flavor_gbr.77.d: "In [SCOPE.sState('chartism_movement_state').GetCityHubName], a mass meeting linked to the #O #B Chartist movement#!#! has turned into serious disorder. Locals have clashed with police and buildings have been set alight. Reports speak of casualties among civilians and police; the city is in turmoil."
 joi_flavor_gbr.77.f: "“The people of [SCOPE.sState('chartism_movement_state').GetCityHubName] took the London police for outsiders; some madmen set houses aflame in revenge. Soldiers were brought out; a neighbour of mine, unarmed, stood at the corner of Edgbaston Street and had his nose cut off… Though we went alone through the Bull Ring, the soldiers charged and tried to cut me down.”"
 joi_flavor_gbr.77.a: "Tolerate them."
 joi_flavor_gbr.77.b: "Read the Riot Act and disperse the mob!"
 joi_flavor_gbr.78.t: "Rising at [SCOPE.sState('chartism_movement_state').GetCityHubName]"
 joi_flavor_gbr.78.d: "In [SCOPE.sState('chartism_movement_state').GetCityHubName], the #yellow #B Chartist#!#! leader [SCOPE.sCharacter('john_frost_scope').GetFullName] has called the people to arms, claiming tens of thousands respond nationwide. In truth the muster falls far short, yet the affair provokes fierce debate within #O #B Westminster#!#!."
 joi_flavor_gbr.78.f: "“He told the people of [SCOPE.sState('chartism_movement_state').GetCityHubName] that the men of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] were up and arming; yet, shamefaced, he asked those with weapons to hold them up, and at that, amid loud laughter, a single hand was raised.”\n\n“[SCOPE.sCharacter('john_frost_scope').GetFullName] declared there were six thousand Chartists in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], all good and true, fully armed, awaiting the word. He knew the claim was overblown, but did not gainsay it—thinking the rumour might help, might stir others to act.”"
 joi_flavor_gbr.78.a: "Parliament must consider their petition."
 joi_flavor_gbr.78.b: "Send the police to secure order in [SCOPE.sState('chartism_movement_state').GetCityHubName]."
 joi_flavor_gbr.78.c: "Suppress the riot and arrest the wicked [SCOPE.sCharacter('john_frost_scope').GetFullName] for trial!"
 joi_flavor_gbr.79.t: "General Strike of [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.79.d: "Inspired by the #O #B Chartist movement#!#!, a great strike has erupted in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] and neighbouring towns. Workers demand shorter hours and higher pay, proclaiming the Charter their path to prosperity. With the support of [SCOPE.sCharacter('labor_leader_scope').GetFullName], the strike spreads across [ROOT.GetCountry.GetName]."
 joi_flavor_gbr.79.f: "“Out of the jumble of buildings there spring countless courts, back lanes, and hidden corners… with filth so shocking that, despite the lovely setting, Stalybridge is a revolting place to breathe.”\n\n“Friends! Chartism is not chiefly a political movement for votes; it is a knife-and-fork question. The Charter means decent homes, abundant food and drink, prosperity, and shorter hours! With the Charter we can win them all!”"
 joi_flavor_gbr.79.a: "The Government is powerless."
 joi_flavor_gbr.79.b: "Send in the Grenadier Guards to crush the strikers!"
 joi_flavor_gbr.80.t: "Kennington Common Meeting"
 joi_flavor_gbr.80.d: "In [TimeKeeper.GetCurrentDate.Format('y')], Chartists led by [SCOPE.sCharacter('labor_leader_scope').GetFullName] again gathered in London’s Kennington Common, claiming to carry a petition with millions of signatures. Many urge the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to regard this outrage in the capital as a prelude to a coup by [SCOPE.sCharacter('labor_leader_scope').GetLastName]."
 joi_flavor_gbr.80.f: "“There are Chartist associations everywhere, but no cohesion; some want the vote, some adult suffrage, and so on… The Radicals’ aims and methods lack unity, and there seems little hope of achievement.”\n\n“Yet when the ‘People’s Charter’ was drafted, setting out the urgent claims of the working class, we found a true bond of union; the Radical clubs must therefore be turned into local Chartist centres!”"
 joi_flavor_gbr.80.a: "The right of assembly shall not be impaired."
 joi_flavor_gbr.80.b: "Tell them [ROOT.GetCountry.GetRuler.GetHerHis] Majesty does not desire violence."
 joi_flavor_gbr.81.t: "The Chartist Bill [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_gbr.81.d: "With the #yellow #B Chartists#!#! mounting repeated mass meetings and petitions, calls for electoral reform grow. Long-standing complaints over narrow franchises, unpaid Members, and malapportionment have stung. Under Chartist pressure, Parliament now moves to reform the electoral system."
 joi_flavor_gbr.81.f: "“Whereas it is beneficial to amend the laws touching Parliamentary and local franchises, the registration of electors, and the conduct of elections in answer to the petitioners, be it enacted by the Queen’s/King’s most Excellent Majesty, by and with the advice and consent of the Lords Spiritual and Temporal, and Commons:\n\nEvery male inhabitant of [ROOT.GetCountry.GetNameNoFlag], under the conditions herein, shall have the right to vote for Members of Parliament; and [ROOT.GetCountry.GetNameNoFlag] shall be divided into three hundred constituencies for equal representation.”\n\n“Each returning officer shall appoint a deputy to preside at polling places on election day, responsible under this Act; at the end of each session, every Member shall be entitled to a Treasury payment voucher as salary for public service, fixed at twenty pounds per annum.”"
 joi_flavor_gbr.81.a: "A victory for the people of [ROOT.GetCountry.GetName]!"
 joi_flavor_gbr.82.t: "The Northern Star Ceases Publication"
 joi_flavor_gbr.82.d: "As attention to the #O #B Chartist movement#!#! wanes, a disillusioned [SCOPE.sCharacter('labor_leader_scope').GetFullName] has sold the movement’s flagship paper, the “Northern Star”. The Chartist era has ended; [ROOT.GetCountry.GetName] has weathered the storm and [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government stands firm."
 joi_flavor_gbr.82.f: "“I have heard him swear every oath for pay—any oath at all. Can I trust such a man? I have heard him read the Scriptures and, when he came to Christ or the Apostles, tear out the leaves, saying, ‘Burn this cursed thing. These Apostles are the greatest rogues I ever heard of.’ Once, reading Judas, he said, ‘He was a capital fellow; got a fine price. Give me half and I would do the same.’”"
 joi_flavor_gbr.82.a: "Good riddance to those pestilent agitators."
 joi_flavor_gbr.82.b: "In time, some will remember their work."

 joi_flavor_gbr.83.t: "The Week of Terror"
 joi_flavor_gbr.83.d: "With railway fever and expanded credit, the markets swelled rapidly; but the bubble burst, banks and firms fell, and once-glorious railway shares plunged almost straight down. Panic swept the Exchange in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. The wailing #v $capitalists$#! call it the #R ‘Week of Terror’#!."
 joi_flavor_gbr.83.f: "“From 1840 credit revived in [ROOT.GetCountry.GetName] and spread to [SCOPE.sCountry('railway_1_power').GetName] and [SCOPE.sCountry('railway_2_power').GetName]; thousands of miles of railway were laid, the stock market rose unceasingly, and railway scrip in particular prospered. Deposits and loans quintupled in two years, igniting a speculation that ended in crisis in [TimeKeeper.GetCurrentDate.Format('y')] in [ROOT.GetCountry.GetNameNoFlag].”"
 joi_flavor_gbr.83.a: "We told those fools not to overdo it!"
 joi_flavor_gbr.84.t: "Black Monday"
 joi_flavor_gbr.84.d: "Beginning with a #R devastating crash in [SCOPE.sCountry('first_rank_power').GetName]#!, a #R terrifying stock collapse, financial panic, and gross misallocation#! have brought deep depression to [ROOT.GetCountry.GetName]: soaring rates, expected deflation, and an aversion to borrowing cut consumption and investment in tandem; prices collapse, farms and factories fail, and every soul cries out."
 joi_flavor_gbr.84.f: "“At the year’s outset the outlook was fair; markets seemed to rise. In mid-[TimeKeeper.GetCurrentDate.Format('m')] heavy selling began; at last, on [TimeKeeper.GetCurrentDate.Format('m d')], Black Monday, the market fell 11% at the open; measures to steady it failed, and it dropped another 12% in the afternoon. Thousands were ruined; many issues would not sell at any price; banks could not meet all claimants and stood on the brink.”"
 joi_flavor_gbr.84.a: "Oh, God!"
 joi_flavor_gbr.84.b: "Bloody hell!"
 joi_flavor_gbr.84.c: "O Almighty Allah!"
 joi_flavor_gbr.84.e: "Why are foreigners’ affairs always so dire?"
 joi_flavor_gbr.84.h: "It’s the economy, stupid!"
 joi_flavor_gbr.85.t: "The Tariff Question"
 joi_flavor_gbr.85.d: "Under the shock of crisis, tariff policy returns to the agenda. Some Ministers argue for [GetLawType('law_free_trade').GetName] to keep markets fluid; others call for [GetLawType('law_protectionism').GetName] to shield domestic industry. [ROOT.GetCountry.GetName] must choose among interests and ideologies."
 joi_flavor_gbr.85.f: "“The political cycle shows no tie between tariffs and the trade cycle: prosperity swells revenue and brings tariff cuts; recession brings pressure to raise them. Recovery then follows, giving the impression that reductions caused the crash and increases restored growth.”\n\n“In some sectors tariffs may hasten development by a few years; but true growth owes more to abundant resources and openness to talent and ideas.”"
 joi_flavor_gbr.85.a: "The market will adjust itself."
 joi_flavor_gbr.85.b: "We must adopt protection."
 joi_flavor_gbr.85.c: "Intervene—lightly."
 joi_flavor_gbr.86.t: "Crisis of Credit"
 joi_flavor_gbr.86.d: "Mounting deficits have ignited a sovereign debt crisis: [ROOT.GetCountry.GetName] bonds have lost investor confidence, subscriptions fail, and yields soar. Capitalists at home and abroad dump the debt; the Exchequer totters. Panic seizes private institutions as well; the public demands action to restore credit."
 joi_flavor_gbr.86.f: "“The rulers of human exchange, through obstinacy and incompetence, have confessed failure and abandoned power. The practices of ruthless money-changers stand indicted at the bar of public opinion and are rejected by the hearts of men.”\n\n“The money-changers have fled from their high seats in our temple of civilisation. We may now restore that temple to ancient truths—measured by our devotion to social values nobler than mere monetary profit.”\n\n“Recognising the falsity of wealth as the sole standard of success, we must reject the error that public office and high station are to be measured only by dignity or private gain; in banking and business the sacred trust must no longer be treated as licence for cold cruelty and selfish wrongdoing.”"
 joi_flavor_gbr.86.a: "We have no gold—no more redemptions!"
 joi_flavor_gbr.86.b: "Proclaim a guarantee of our exchange rate."
 joi_flavor_gbr.86.c: "Strip bad assets from the financial houses."
 joi_flavor_gbr.86.e: "Levy a temporary requisition on overseas gold!"
 joi_flavor_gbr.87.t: "Bank Failures"
 joi_flavor_gbr.87.d: "Severe financial convulsions sweep [ROOT.GetCountry.GetName]: panicked runs and frozen dealings spread, banks unable to redeem shutter one after another, investors stampede for the exits, and a vicious circle of runs and capital flight takes hold."
 joi_flavor_gbr.87.f: "“By mid-[TimeKeeper.GetCurrentDate.Format('y')] the crisis slipped control; first came the collapse of the [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Credit Bank in [TimeKeeper.GetCurrentDate.Format('m')]. Unnerved by the Government’s severe fiscal stance and spiralling loss of confidence, short-term funds fled [ROOT.GetCountry.GetName]—£150m in the first week of [TimeKeeper.GetCurrentDate.Format('m')], £540m in the second, and £150m more on [TimeKeeper.GetCurrentDate.Format('m d')], in a single day.”"
 joi_flavor_gbr.87.a: "Provide emergency loans to stop the runs!"
 joi_flavor_gbr.87.b: "We can scarcely save ourselves, let alone them."
 joi_flavor_gbr.87.c: "Place private banks under temporary state control."
 joi_flavor_gbr.88.t: "Deficit Emergency"
 joi_flavor_gbr.88.d: "Years of red ink have sapped the economy. Torn between debt and outlays, the Government faces rancorous debate in Parliament and the country. Economists warn the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that without swift action [ROOT.GetCountry.GetName] will forfeit the markets’ trust."
 joi_flavor_gbr.88.f: "“For years the nation has suffered from a government that hears nothing and does nothing: the country looks to it and it looks away. We have had to fight the quiet foes of peace—monopoly in business and finance, speculation, reckless banking, class rancour, tribalism, war profiteering—who now regard the Government as their appendage.”\n\n“We now know that government by organised money is as dangerous as government by organised mob. Never before in our history have these forces so united against one candidate. They are unanimous in their hate for me—and I welcome their hatred.”"
 joi_flavor_gbr.88.a: "Raise taxes and expand public spending to save the economy!"
 joi_flavor_gbr.88.b: "Raise taxes and cut public spending."
 joi_flavor_gbr.88.c: "A foreign enemy can distract from these woes!"
 joi_flavor_gbr.89.t: "The Unemployed and the Farmer’s Plight"
 joi_flavor_gbr.89.d: "The crisis ripples deep into town and country: urban workers are thrown out as factories shut; rural harvests go unsold. More families fall into poverty; panic and charges of Government inaction grow. Ministers must decide how to answer this nationwide distress."
 joi_flavor_gbr.89.f: "“In industry, dead leaves everywhere; on the farms, produce without a market. Thousands of families’ savings are swept away. Worse, vast numbers of unemployed citizens of [ROOT.GetCountry.GetName] face stark want, and as many toil without reward. Only the foolish optimist can deny the dark reality.”\n\n“Our first task is to put people to work. Faced wisely and bravely, this is not insoluble. There are many ways to do it, but talk alone will never suffice. We must act—and act swiftly!”"
 joi_flavor_gbr.89.a: "We cannot help them."
 joi_flavor_gbr.89.b: "Relief for the destitute."
 joi_flavor_gbr.89.c: "Expand public works and hire them."
 joi_flavor_gbr.90.t: "Beerhall Riot in [SCOPE.sState('economic_crisis_state').GetCityHubName]"
 joi_flavor_gbr.90.d: "Amid hardship and mass unemployment, the beerhalls of [SCOPE.sState('economic_crisis_state').GetCityHubName] have become a breeding ground for embittered workers, ruined farmers, and radicals. Led by a [GetIdeology('ideology_fascist').GetName], they have begun rioting."
 joi_flavor_gbr.90.f: "“You can see our motive is neither vanity nor gain, but the fierce desire to throw ourselves into this fight for the fatherland of [ROOT.GetCountry.GetNameNoFlag]. I say this: either the revolution breaks tonight, or at dawn we shall all be dead!”"
 joi_flavor_gbr.90.a: "Perhaps they alone can ‘save’ [ROOT.GetCountry.GetName]?"
 joi_flavor_gbr.90.b: "Crush these [GetIdeology('ideology_fascist').GetName] thugs."
 joi_flavor_gbr.90.c: "The right of assembly is not a right to riot—disperse them!"

 joi_flavor_gbr.91.t: "Ambitious Railway Promoters"
 joi_flavor_gbr.91.d: "As railways boom across [ROOT.GetCountry.GetName], speculation runs white-hot. In [SCOPE.sState('railway_mania_state').GetCityHubName], a company launches a public issue of mortgage-backed shares, promising that every mile of rail will mint gold."
 joi_flavor_gbr.91.f: "“Gentlemen! Railways are a fail-safe investment: they spur demand for building materials, coal, iron, later steel; they fuel furnaces and hearths and set in motion millions who never travelled before—railways are civilisation itself!”\n\n“Our company now opens investment to the public: pay a deposit of only ten percent… Our freight and passenger numbers are ever rising; put in £10 today—tomorrow it is £12, the next day £15, in a week £20, and in a month you shall have £50!”"
 joi_flavor_gbr.91.a: "Rail is wealth; rail is the future!"
 joi_flavor_gbr.91.b: "Absurd—this has gone too far!"

 joi_flavor_gbr.92.t: "Royal Navy Evacuation"
 joi_flavor_gbr.92.d: "Since [TimeKeeper.GetCurrentDate.Format('y')], #R communist#! mobs have stormed [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. The Crown and Government, under the #U Royal Navy#!’s protection, have evacuated the homeland to dominions still loyal. In a final broadcast, Prime Minister [SCOPE.sCharacter('red_pm').GetFullName] tells the people that though resistance ceases for now, #V in time His Majesty’s Government will return and restore order to the #yellow #B United Kingdom#!#!.#!"
 joi_flavor_gbr.92.f: "“The war dragged on; the front stagnated; with urgent transfers south, the weakened line let the syndicalists launch their planned assault in [TimeKeeper.GetCurrentDate.Format('m')]. Combined blows broke through at Peterborough and Luton and took Bristol the same day. Chaos seized [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]; the last civil servants left, and on [TimeKeeper.GetCurrentDate.Format('m d')] the Government abandoned the city. In the hurried flight the Treasury and a trove of documents—secret and public—were left to the rebels. Units left behind lost contact and were drawn into savage street-fighting; red flags flew in the streets.”"
 joi_flavor_gbr.92.a: "Vive la révolution!"
 joi_flavor_gbr.92.b: "All aboard—Ottawa!"
 joi_flavor_gbr.92.c: "All aboard—Melbourne!"
 joi_flavor_gbr.92.e: "All aboard—Delhi!"
 joi_flavor_gbr.92.h: "Just run—destination be damned."
 joi_flavor_gbr.93.t: "Arrival of the Royalists"
 joi_flavor_gbr.93.d: "Since the #yellow #B United Kingdom of Great Britain and Ireland#!#! collapsed in [TimeKeeper.GetCurrentDate.Format('y')], the exiles have lived with a long, bitter memory: in that time the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the remnants of Government, and over a million of the Imperial elite fled to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]…"
 joi_flavor_gbr.93.f: "Loyalists hoped to land and retake the homeland from the #R communist#! parvenus; but they soon found the [GetIdeology('ideology_communist').GetName] more entrenched than expected. Early attempts failed, and the #R Union of Britain#! grew stronger.\n\nWith the dream of London fading, the remnant Empire reappraised its fate. They realised their stay in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] might not be temporary: Governors became Royal appointees, Senates became Lords, the Red Ensign was blued to avoid confusion with [GetIdeology('ideology_communist').GetName]. Locals called them the #U #B ‘Exiles’#!#!. They tried to make a home—but the culture of old Britain sat uneasily beside that of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]; to many, the #G #B ‘King of Britain’#!#! was but a distant cousin.\n\n#B The wandering exiles swore to regain their country; #V yet they faced a cruel political truth: they might never do so.#!#!"
 joi_flavor_gbr.93.a: "From a band of islanders we build a home in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]…"
 joi_flavor_gbr.93.b: "Union flag snapping, lions roaring—back to the Highlands and the Straits!"

 joi_flavor_gbr.94.t: "An Age of Improvement"
 joi_flavor_gbr.94.d: "With the accession of [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], new moral values and etiquette spread in [ROOT.GetCountry.GetName]. Outward dignity and restraint are prized; yet how to live this morality is contested. Pious [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] #v $clergymen$#! establish societies to police conduct and urge Government to enshrine religious morals in social life."
 joi_flavor_gbr.94.f: "“Between 1780 and [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.GetCountry.GetAdjective]s ceased to be among the most aggressive, savage, loud, blunt, choleric, cruel, and bloodthirsty peoples—and became among the most reserved, polite, orderly, gentle, prim, and—hypocritical.”\n\n“This turn diminished cruelty to animals, criminals, the insane, and children; it abolished brutal sports like bull- and cock-fighting, and many harmless fairs and wakes.”\n\n“Government repealed some two hundred capital offences, ended transportation to Australia, reformed the prisons; Sunday became a day of prayer for some—and of abstinence for all.”"
 joi_flavor_gbr.94.a: "The [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] uphold lofty morals."
 joi_flavor_gbr.94.b: "The [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] and [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] shall live them too."
 joi_flavor_gbr.95.t: "The Morality of Abolition"
 joi_flavor_gbr.95.d: "Led by [SCOPE.sCharacter('devout_leader').GetFullName], [GetIdeology('ideology_abolitionist').GetName]s form a national network of local societies and lay a petition before Westminster condemning the shame of slavery in [SCOPE.sCountry('slave_state').GetName], urging [ROOT.GetCountry.GetName] to fulfil its abolitionist mission and strike at the traffickers."
 joi_flavor_gbr.95.f: "We have no slaves at home—why abroad?\nThey crossed our tides for liberty and freedom.\n\nA slave cannot breathe in Britain; if their lungs\nDraw in our air, that moment they are free!\nThey set foot on our soil and their chains fall.\n\n’Tis noble, and a nation may be proud;\nSpread it through the veins of your Empire, let them feel:\nWhere Britain’s power goes forth, there too her mercy."
 joi_flavor_gbr.95.a: "Publicly denounce their immoral slavery."
 joi_flavor_gbr.95.b: "The Royal Navy will show [SCOPE.sCountry('slave_state').GetName] how we deal with slavers."
 joi_flavor_gbr.95.c: "Best not to provoke [SCOPE.sCountry('slave_state').GetName]."
 joi_flavor_gbr.96.t: "Cruelty to Animals"
 joi_flavor_gbr.96.d: "A shocking case of animal abuse in [SCOPE.sState('animal_scope').GetCityHubName] has stirred the nation. The anti-cruelty society—backed by the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] and the [GetIdeology('ideology_utilitarian_millian').GetName]—urges Parliament to criminalise cruelty."
 joi_flavor_gbr.96.f: "“Any person who cruelly beats, ill-uses, overdrives, abuses, or tortures any animal, thereby causing harm or injury to that animal, or thereby causing harm or injury to any person or property, shall on conviction pay to the owner of the animal or the person injured compensation not exceeding ten pounds.”\n\n“To cruelly beat, ill-use, overdrive, abuse, or torture any animal, or to cause or procure the same, shall be punishable by forfeiture and a fine not exceeding five pounds for each offence.”"
 joi_flavor_gbr.96.a: "Severely punish the abusers in [SCOPE.sState('animal_scope').GetCityHubName]."
 joi_flavor_gbr.96.b: "Fines as the law provides will suffice."
 joi_flavor_gbr.97.t: "Living in Sin"
 joi_flavor_gbr.97.d: "With urban growth, biblical morals face challenge: cohabitation and licentious “pleasures” abound; many lose themselves to the flesh—to the grief of pious [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] #v $clergymen$#!."
 joi_flavor_gbr.97.f: "“This is the will of God, even your sanctification, that ye should abstain from fornication; that every one of you should know how to possess his vessel in sanctification and honour; not in the lust of concupiscence, even as the Gentiles which know not God.”\n\n“Marriage is honourable in all, and the bed undefiled; but whoremongers and adulterers God will judge. If a man entice a maid that is not betrothed, and lie with her, he shall surely endow her to be his wife.”"
 joi_flavor_gbr.97.a: "Let men follow the Lord’s teaching and shun cohabitation."
 joi_flavor_gbr.97.b: "This is the people’s private affair—what’s Government to do with it?"
 joi_flavor_gbr.98.t: "A Nation of Vice"
 joi_flavor_gbr.98.d: "A report from the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] claims over 8,600 prostitutes in [SCOPE.sState('prostitution_scope').GetCityHubName] alone. They argue that anonymity has swelled prostitution and illicit relations, corroding [ROOT.GetCountry.GetName]’s moral values."
 joi_flavor_gbr.98.f: "“She feels with the heart, sees with the eye; she is the crown and the essence of things;\nShe is what she pursues, and their image;\nSo simple and so subtly sweet, my deepest ecstasy fails her.”\n\n“Yet now I choose my task—to sing her virtues as maid and wife;\nNo happier lot than this: to chant her praise for life.”"
 joi_flavor_gbr.98.a: "Crack down on these wicked women."
 joi_flavor_gbr.98.b: "What they need is care from the state."
 joi_flavor_gbr.99.t: "The English Gentleman"
 joi_flavor_gbr.99.d: "Courtly pursuit and manners become the emblem of [ROOT.GetCountry.GetName]: #B black coat, tall hat, walking-cane and monocle; chivalric spirit, learned wisdom, and the precepts of the ancients—chiefly to remove obstacles to the free action of those around him#!. The #V ‘English Gentleman’#! is a moral impression in himself."
 joi_flavor_gbr.99.f: "“A true Victorian gentleman stands in the street: a closely cut frock coat moulded to his frame; a silver watch-chain glinting on sombre cloth; gloved hand upon his cane; a tall black hat on his brow; a shining monocle making his gaze keen—scrutinising, almost judicial.”\n\n“He shuns slander and gossip; he infers motives charitably; he never stoops in argument, never takes advantage, never mistakes personal abuse for a point, nor hints at evils he dares not speak.”\n\n“He has sense enough not to be affronted by insult; he is too busy to remember injuries; too severe to indulge malice. He holds philosophical principles—patient, gentle, resigned; he endures pain as inevitable, bereavement as irreparable, and death as his lot.”"
 joi_flavor_gbr.99.a: "Gentlemanly conduct touches us all."
 joi_flavor_gbr.99.b: "True gentility is a society’s grace, composure, and wisdom."

 joi_flavor_gbr.100.t: "Afternoon Tea"
 joi_flavor_gbr.100.d: "@tea!#V Afternoon tea#! has become fashionable in [ROOT.GetCountry.GetName]—once merely a way for the upper classes to bridge luncheon and dinner, now part of our culture and way of life."
 joi_flavor_gbr.100.f: "“Ladies of fashion change into gowns, don gloves and hats, and take @tea!#V afternoon tea#! in the drawing room at four or five: delicate sandwiches, scones with clotted cream and jam; cakes and pastries besides; teas from India or Ceylon poured from silver pots into fine bone china.”\n\n“Debate rages on the proper order in a cream tea—most fiercely between Devon and Cornwall. When the warm scone is split, does the clotted cream or the strawberry jam go first? For our part… cream first!”"
 joi_flavor_gbr.100.a: "Come, take a cup!"

 joi_flavor_gbr.101.t: "The Sin of Child Labour"
 joi_flavor_gbr.101.d: "Child labour spreads in [ROOT.GetCountry.GetAdjective] society: children are driven to work young to help keep their families. The [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], and [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] agree it gravely harms body, mind, society, and morals."
 joi_flavor_gbr.101.f: "“It was a ruinous old house by the river, rats everywhere; panelled rooms, rotten floors and stairs, the squeaking and scuffling at all hours, and all the dirt and decay rise before me as if I were there again.”\n\n“Below were two or three boys putting caps on blacking pots for much the same wage; on the first Monday a boy in a torn apron and paper cap came up to show me how to tie the knots. His name was Bob Fagin.”"
 joi_flavor_gbr.101.a: "We cannot stop the wheels of industry."
 joi_flavor_gbr.101.b: "Child labour is Britain’s shame!"

 joi_flavor_gbr.102.t: "[ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Civil Service"
 joi_flavor_gbr.102.d: "The principles of [GetIdeology('ideology_utilitarian_millian').GetName] have taken root at the heart of policy-making in [ROOT.GetCountry.GetAdjective]: the civil service is reorganised and made more efficient; the creed spreads."
 joi_flavor_gbr.102.f: "[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]’s contribution to utilitarianism grows with [ROOT.GetCountry.GetNameNoFormatting]’s success. Though some still doubt its value to [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Service, the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] champion its maxims: a permanent, unified, politically neutral service; recruitment by merit; clear lines for daily administration.\n\nIt has purged corruption, delivered services even under war’s strain, and managed political change—motivated by public interest and ready to execute the policies determined by Ministers."
 joi_flavor_gbr.102.a: "A reliable civil service is the backbone of [ROOT.GetCountry.GetName]."

 joi_flavor_gbr.103.t: "The Koala Member"
 joi_flavor_gbr.103.d: "A [concept_westminster_england] was found yesterday apparently asleep during a sensitive debate on [SCOPE.sLaw('current_law_scope').GetName]. He first insisted he had merely been ‘resting his eyes’—to no public conviction. He is hardly the first caught napping at work; many are furious."
 joi_flavor_gbr.103.f: "“Sir, aged sixty-two, slept through a debate on [SCOPE.sLaw('current_law_scope').GetName]—not merely with eyes closed; he was near horizontal! At last he opened them, realised he had been in full view of the Gallery reporters, and sat up quickly, somewhat abashed.”\n\n“This is an insult to the people: how dare they so slight their office and matters central to our lives?”"
 joi_flavor_gbr.103.a: "Dozing on duty is never a good idea."
 joi_flavor_gbr.103.b: "If they dislike the job, they can resign!"
 joi_flavor_gbr.104.t: "Ritual Absurdity"
 joi_flavor_gbr.104.d: "The #O #B Westminster#!#! rigmarole tries many a patience: a popular satirical paper declares the grand, solemn, sacred, and pivotal Commons to be ‘a heap of prolix, hollow, trivial drivel’."
 joi_flavor_gbr.104.f: "“See that huge, hoarse fellow in a blue coat, with odd hat and broad brim, white corduroys and heavy boots, who has droned on for half an hour; strangers laugh at his importance. He is the ‘great conservator of the peace of Westminster’.”\n\n“He is an oracle on precedent; in his cups he’ll tell you how Sir So-and-So once roused four men to carry a majority, three of whom died on their way home; how the House divided on whether to send for new candles; how the Speaker, at adjournment, was accidentally left in the Chair for three hours—and much else of the kind.”"
 joi_flavor_gbr.104.a: "We must improve efficiency and focus on [SCOPE.sLaw('current_law_scope').GetName]."
 joi_flavor_gbr.104.b: "Very well—let them submit proposals to the Independent Commission next door."
 joi_flavor_gbr.105.t: "The Speculation Scandal"
 joi_flavor_gbr.105.d: "A charismatic speculator—an MP of the [SCOPE.sParty('par_party').GetName] and the [SCOPE.gsInterestGroup('par_interest_group').GetName]—has been exposed in a grave fraud: profiting from insider knowledge of [SCOPE.sLaw('current_law_scope').GetName] and cloaking it with his respectable political standing."
 joi_flavor_gbr.105.f: "“He traded on his family’s reputation for Nonconformity and Liberalism. He took small folk’s savings to build some of London’s finest hotels and founded other companies; he cooked the books, robbed Peter to pay Paul, and shifted assets round and round.”\n\n“He contrived inter-company transfers to pay dividends out of imaginary profits; the auditors looked away. He then vanished without telling a soul—rumoured to have boarded a ship for [SCOPE.sCountry('corrupt_state').GetName].”"
 joi_flavor_gbr.105.a: "Demand his extradition from [SCOPE.sCountry('corrupt_state').GetName] for trial!"
 joi_flavor_gbr.105.b: "We are powerless—issue a warrant."
 joi_flavor_gbr.106.t: "Fools’ Committee"
 joi_flavor_gbr.106.d: "After passing the First and Second Readings, [SCOPE.sLaw('current_law_scope').GetName] has entered the Committee of the Whole. However, the ill-intentioned [SCOPE.sParty('par_party').GetName] and [SCOPE.sCharacter('shit_ig_leader').GetFullName], a well-known opponent of the bill, have made common cause, attempting to slow the legislative process by engaging in tediously repetitive debate over minutiae and even tabling hundreds of utterly farcical amendments."
 joi_flavor_gbr.106.f: "“The amendments from [SCOPE.sParty('par_party').GetName] are peculiar in substance and still more peculiar in style; the structure is chaotic, the repetition endless, and the tone wholly out of season. Instead of that rhetorical art proper to scientific writing—saying plainly, precisely, and concisely what one means—they indulge themselves in ambiguity and bombast, festooned with the sort of claptrap a fifteen-year-old boy admires.”\n\n“As for [SCOPE.gsInterestGroup('shit_ig').GetName] and its committee—or, more precisely, Mr. [SCOPE.sCharacter('shit_ig_leader').GetFullName]’s conduct therein—it is a perfect burlesque of a Committee of the Whole: careless in gathering facts; incapable of reasoning upon the facts once gathered; ignorant of the simplest terms yet pronouncing a proposition whose meaning he himself does not know; and the proposition he seeks to pronounce and prove is precisely what has led to all our present mischief.”"
 joi_flavor_gbr.106.a: "Unlimited amendments are disgusting!"
 joi_flavor_gbr.106.b: "Damn those [SCOPE.sParty('par_party').GetName] old Tories!"
 joi_flavor_gbr.107.t: "Collective Walkout"
 joi_flavor_gbr.107.d: "Incensed by [SCOPE.sParty('wid_party').GetName]’s futile opposition to [SCOPE.sLaw('current_law_scope').GetName], MPs of [SCOPE.sParty('wid_party').GetName] have decided to stage a collective strike—absenting themselves from a key division on the bill—in order to force the [SCOPE.sParty('par_party').GetName]-controlled Commons to suspend the vote."
 joi_flavor_gbr.107.f: "“Yesterday, on behalf of the [SCOPE.sParty('par_party').GetName] Government, I laid before the House a departmental minute giving notice of all matters related to this intervention; regrettably, since the balloting occurred during the recess, we were unable to observe the usual notice period of fourteen sitting days.”\n\n“On these matters we of course wish to treat Parliament as honestly, openly, and transparently as possible: we hope to report to the House at the earliest opportunity. However, for the past few months certain people have been on holiday—we intend to reverse this. In our view, this vigorous institution has been needlessly languid.”"
 joi_flavor_gbr.107.a: "[SCOPE.sParty('par_party').GetName] will force the division through."
 joi_flavor_gbr.107.b: "Irresponsibility is [SCOPE.sParty('wid_party').GetName]’s disgrace!"
 joi_flavor_gbr.108.t: "The Detestable Upper House"
 joi_flavor_gbr.108.d: "Astonishingly, the [SCOPE.sLaw('current_law_scope').GetName] bill that passed the Commons has been rejected in the Lords against convention. Outraged members of the public deem the hereditary peers of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and the spiritual lords of the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], led by [SCOPE.sParty('wid_party').GetName], to be the architects of this conspiracy."
 joi_flavor_gbr.108.f: "“Without the freedom to express its own views, [SCOPE.sParty('wid_party').GetName] could not possibly bear the responsibility of laying this report before His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Whatever the ultimate course of this dreadful calamity, one thing is certain: all parties in England and Ireland—from the highest ministers of the Crown to the humblest members of society—are bound to unite and exert their utmost strength, sacrificing private interests if need be, to do all that can be done to arrest the fearful spread of so great a disaster.”"
 joi_flavor_gbr.108.a: "A bunch of dozing old men—petrified god-botherers!"
 joi_flavor_gbr.108.b: "If they won’t assent, then His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] will create more [SCOPE.sParty('par_party').GetName] peers to force it through!"
 joi_flavor_gbr.109.t: "Order!"
 joi_flavor_gbr.109.d: "Debate on [SCOPE.sLaw('current_law_scope').GetName] in the Commons has erupted into fierce quarrels, with many Members even breaching the rules of order. The Speaker has therefore suspended proceedings and issued a Speaker’s Statement."
 joi_flavor_gbr.109.f: "“I have received a submission from the honourable Member for [SCOPE.sState('british_state').GetCityHubName]shire seeking leave to raise a matter of privilege in precedence. It concerns a legal case that may prevent the Parliamentary Commissioner for Administration from laying before this House reports required under the Parliamentary Commissioner Act, which assigns to the Public Administration and Constitutional Affairs Committee the task of scrutinising such reports.”\n\n“Any attempt to obstruct the transmission of information to this House or its committees is a contempt of Parliament. Accordingly, I determine that this matter should indeed have precedence as one of privilege. The honourable Member may therefore table a motion to be debated on Thursday; it will be taken after any urgent questions or statements and before Government business.”"
 joi_flavor_gbr.109.a: "Are these Members drinking in the tavern?!"
 joi_flavor_gbr.109.b: "The Speaker has no hold over this rabble."

 joi_flavor_gbr.110.t: "Reform Without Progress"
 joi_flavor_gbr.110.d: "Though His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s Government once adopted [GetIdeology('ideology_utilitarian_millian').GetName] policies with high hopes, the reformist initiative has ultimately failed to take root in [ROOT.GetCountry.GetName]."
 joi_flavor_gbr.110.f: "[ROOT.GetCountry.GetName]’s promise of utilitarianism has wavered as the programme lost momentum; even the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] no longer treat it as a priority.\n\nIn a quiet moment, the Right Honourable the Prime Minister reflected on the lessons of the effort. “Perhaps we must be more practical in the way principles guide policy-making,” he mused."
 joi_flavor_gbr.110.a: "God bless [ROOT.GetCountry.GetName]."
 joi_flavor_gbr.110.b: "Our government is losing the efficiency it once had."

 joi_flavor_gbr.111.t: "Transparent Government?"
 joi_flavor_gbr.111.d: "The new Minister, [SCOPE.sCharacter('ypm_scope').GetFullName], is determined to throw open the windows of his department with a plan he calls “transparent government.” His first obstacle, however, is the loyal and dependable Civil Service of His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and the seemingly trifling Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]."
 joi_flavor_gbr.111.f: "“Frankly, this department must thoroughly clear out the musty bureaucracy of Whitehall: open the windows, let in some fresh air, cut the red tape, streamline this creaking old machine—”\n“Very good, Minister. Here are the methods for implementing that policy and a draft White Paper for your approval; we could entitle it ‘Open Government.’”\n\n“Listen, we must stop him wittering on about open government. We’ll call the White Paper ‘Open Government’ and remove everything more comprehensible than the title! The less you intend to do, the more you should talk about it.”\n“Either openness or government; in a democracy the citizen certainly has a right to know, but he has an even greater right not to know. Knowledge implies complicity and guilt; ignorance possesses a certain dignity.”"
 joi_flavor_gbr.111.a: "Sir [SCOPE.sCharacter('sir_humphrey_scope').GetLastName] has no desire for the Cabinet to know the truth."
 joi_flavor_gbr.111.b: "Ignorance does carry a certain dignity."
 joi_flavor_gbr.112.t: "Economy Drive"
 joi_flavor_gbr.112.d: "Our great Prime Minister, [SCOPE.sCharacter('ypm_scope').GetFullName], plans to slim down His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s Civil Service, but Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] would prefer him to begin by slimming down his own expenses, leaving the PM in two minds."
 joi_flavor_gbr.112.f: "“How many people realise the Inland Revenue has more staff than the Royal Navy? A classic sign of Whitehall overmanning. Sit down, Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName’], we must prune the Service—at least one or two tea-ladies!”\n“Tea-ladies! I need specifics: who works where, what they do, which buildings, what’s done in them—then we’ll know where to cut costs, reduce staff, simplify procedure.”\n\n“Then, Prime Minister, we could set up an Anti-Bureaucracy Unit and hire 400 civil servants; they will in turn recruit 400 more; then we close the Unit and issue a press release saying the Right Honourable [SCOPE.sCharacter('ypm_scope').GetLastName] has cut 800 posts, saving the taxpayer money.”\n“But that’s hypocrisy—cheating—dishonest—pulling the wool over people’s eyes!”\n“Not at all, Prime Minister. That is precisely what government press releases are for.”"
 joi_flavor_gbr.112.a: "Excellent—we’ve now cut 800 civil servants. A tremendous success!"
 joi_flavor_gbr.112.b: "At least we secured a reliable press release."
 joi_flavor_gbr.113.t: "School-Leaving Age"
 joi_flavor_gbr.113.d: "Minister [SCOPE.sCharacter('ypm_scope').GetFullName] and Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] discuss plans to reform national education provision. The Minister wants a special committee to produce an “independent” report, while Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName] seeks a heavier hand in the process."
 joi_flavor_gbr.113.f: "“Education in this country is a disaster! We’re supposed to prepare children for working life, and they’re bored out of their minds three-quarters of the time!”\n“Raising the school-leaving age to sixteen was meant to make them learn more; in fact, they learned less!”\n“In truth, Minister, we didn’t raise it to make them learn more. We raised it to keep teenagers out of the labour market and control unemployment.”\n\n“So you’re saying education isn’t the problem?”\n“No, of course not, Minister! The education system is a joke—always has been! Put things in the hands of local councillors and it will remain a joke forever. Half of them are your enemies, and the other half are the sort of friends who make you wish for your enemies.”"
 joi_flavor_gbr.113.a: "How very reassuring."
 joi_flavor_gbr.113.b: "Honesty may give you an unexpected edge at the despatch box?"
 joi_flavor_gbr.114.t: "The PM’s Grand Design"
 joi_flavor_gbr.114.d: "The leader of [ROOT.GetCountry.GetName], our great Prime Minister [SCOPE.sCharacter('ypm_scope').GetFullName], has had another brilliant notion and insists on implementing his “Grand Design” for [ROOT.GetCountry.GetNameNoFlag]’s security—or as much of it as possible. Yet the plan appears hampered by press-office concerns and ministers who have dramatically changed their tune."
 joi_flavor_gbr.114.f: "“We introduce conscription: that solves defence and unemployment; we teach trades and skills—perhaps even literacy! A comprehensive education to make up for their ‘education’—with a single policy we solve defence, education, and unemployment!”\n\n“Magnificent! A New Deal for [ROOT.GetCountry.GetName]—the [SCOPE.sCharacter('ypm_scope').GetLastName] Grand Design. In our island story there are moments when a single man must lead his people out of the valley of shadow into the sunlit uplands of peace and prosperity!”\n\n“The trouble is the PM’s catastrophic new defence idea. Grand Design, he calls it. Will it reduce unemployment? No, no, no. The purpose of defence policy is not to defend Britain, but to make the British people believe they are defended! Not foreigners—Britons! The foreigners know they aren’t.”\n“Does the PM intend to rule [ROOT.GetCountry.GetName]? Then stop him!”"
 joi_flavor_gbr.114.a: "The main thing is to make Britons believe they are defended."
 joi_flavor_gbr.114.b: "No—the PM’s Grand Design must be carried out."
 joi_flavor_gbr.115.t: "Who Reads the Papers?"
 joi_flavor_gbr.115.d: "The Right Honourable Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] raises a concern about press coverage with Prime Minister [SCOPE.sCharacter('ypm_scope').GetFullName], who seems unbothered and professes expert knowledge of those “beastly media.”"
 joi_flavor_gbr.115.f: "“Don’t talk to me about the press. I know exactly who reads which paper. Readers of the Daily Mirror think they run the country; readers of the Guardian think they ought to run the country; readers of The Times actually do run the country; readers of the Daily Mail are the wives of the men who run the country; readers of the Financial Times own the country; readers of the Morning Star think the country should be run by another country; and readers of the Daily Telegraph think it already is.”\n\n“Prime Minister, what about readers of the Sun?”\n\n“Sun readers don’t care who runs the country, so long as she’s got big tits.”"
 joi_flavor_gbr.115.a: "Then the PM must be adept at handling the media."
 joi_flavor_gbr.115.b: "Er… so why read newspapers at all?"
 joi_flavor_gbr.116.t: "Champion the Weak"
 joi_flavor_gbr.116.d: "Our Prime Minister, [SCOPE.sCharacter('ypm_scope').GetFullName], finds it hard to tell whether the Foreign Office exists to carry out the Government’s policy—or vice versa. Irritated, he blames the wily Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName], who refuses to accept responsibility."
 joi_flavor_gbr.116.f: "“The PM is a problem—he’s started distrusting our advice. He even questions the policy of the Foreign Office! The Cabinet might try to conduct its own foreign policy—that’s absurd. A country cannot have two foreign policies.”\n\n“Obviously, we at the F.O. wash our hands of it. We’d rather not offend either [SCOPE.sCountry('strong_country').GetName] or [SCOPE.sCountry('weak_country').GetName]. The moment you interfere in someone else’s domestic quarrel, you embark on a very dangerous course. The PM must understand that, in foreign affairs, his job is purely ceremonial and hospitable.”\n\n“Are you saying, Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName], that [ROOT.GetCountry.GetNameNoFlag] should not support law and justice? Not promote peace, harmony, and goodwill? We must fight for the weak against the strong!”\n\n“Then why not send troops to help [SCOPE.sCountry('major_power').GetName] against [SCOPE.sCountry('super_power').GetName]?”\n“Er… [SCOPE.sCountry('super_power').GetNameNoFlag] is too strong.”"
 joi_flavor_gbr.116.a: "[SCOPE.sCountry('super_power').GetNameNoFlag] is too strong."
 joi_flavor_gbr.116.b: "[SCOPE.sCharacter('ypm_scope').GetFullName]’s job is merely ceremonial."
 joi_flavor_gbr.116.c: "Do not fear [SCOPE.sCountry('super_power').GetNameNoFlag]; they’re feeble!"
 joi_flavor_gbr.117.t: "Four-Stage Diplomacy"
 joi_flavor_gbr.117.d: "With an uncontrollable war breaking out between [SCOPE.sCountry('strong_country').GetName] and [SCOPE.sCountry('weak_country').GetName], Prime Minister [SCOPE.sCharacter('ypm_scope').GetFullName] grows furious at the Foreign Office’s irresponsibility. Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName], however, is unmoved."
 joi_flavor_gbr.117.f: "“Prime Minister, if you insist upon plain speaking, I can only say that at present, taking the long view, surveying antiquity and modern precedent, allowing for departmental averages, and analysing the summaries, it may be concluded, broadly speaking, that you will find—though it may be unwelcome—that the outlook is delicate.”\n\n“So is it yes or no?—Oh, Prime Minister, at the appropriate juncture, when the time is ripe, when opportunity presents and conditions are propitious—What are we going to do, Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]? Please, directly.”\n\n“Very well. We follow the usual four-stage strategy: Stage One, we say nothing is happening; Stage Two, we say something may be happening, but we should do nothing; Stage Three, we say maybe something should be done, but nothing can be done; Stage Four, we say perhaps something could have been done, but it’s too late now.”"
 joi_flavor_gbr.117.a: "It seems we truly can do nothing."
 joi_flavor_gbr.117.b: "These bureaucratic tricks are infuriating!"
 joi_flavor_gbr.118.t: "A Fine Plan—But Not Yet"
 joi_flavor_gbr.118.d: "Our great Prime Minister, [SCOPE.sCharacter('ypm_scope').GetFullName], has had a fresh brainwave and proposed a new scheme. His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s faithful Civil Service and Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName], however, say the plan still requires careful study."
 joi_flavor_gbr.118.f: "“Plainly the Committee considers your new policy excellent; but, given certain voices of concern, I take the Committee’s meaning to be that after mature reflection—though the programme is widely welcomed and certain principles are, in principle, practicable—some aspects are too complex and require delicate balance in practice.”\n\n“So in principle this is wise and prudent, provided it is subjected to more detailed consideration, strengthened by continuity with existing principles, and that the principled debate on principles be, in principle, approved as proposed by the proposer.”\n\n“You’re not advising me to drop it, are you?”\n“Heavens, no! Perish the thought! It is an exceedingly fine policy! The key point is that, before you say anything, Prime Minister, we should conduct further studies.”"
 joi_flavor_gbr.118.a: "So what exactly are you saying?"
 joi_flavor_gbr.118.b: "Oh… oh… very well, do it that way."
 joi_flavor_gbr.119.t: "Benefactors of the Nation"
 joi_flavor_gbr.119.d: "Our morally earnest Prime Minister, [SCOPE.sCharacter('ypm_scope').GetFullName], has lately taken inspiration from the Health Secretary and is trying to persuade the Cabinet to adopt a “great plan to ban [SCOPE.sGoods('tax_goods_scope').GetName].” The Treasury and many officials—including Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]—oppose it."
 joi_flavor_gbr.119.f: "“I propose government action to eliminate [SCOPE.sGoods('tax_goods_scope').GetName]: an outright ban on all [SCOPE.sGoods('tax_goods_scope').GetName] sponsorship and advertising, £500,000 for anti-[SCOPE.sGoods('tax_goods_scope').GetName] publicity, prohibition of smoking in all public places, and progressive tax rises over five years until a pack of twenty [SCOPE.sGoods('tax_goods_scope').GetName] costs about as much as a bottle of whisky.”\n“The only difficulty is that [SCOPE.sGoods('tax_goods_scope').GetName] duty is a principal source of government revenue!”\n“[SCOPE.sGoods('tax_goods_scope').GetName] claims 100,000 lives a year. What do we gain? This is a moral question!”\n“Indeed—but has a clear causal link ever been proven? Statistics—statistics can prove anything, even the truth.”\n\n“The [SCOPE.sGoods('tax_goods_scope').GetName] industry creates 25,000 jobs; booming [SCOPE.sGoods('tax_goods_scope').GetName] exports help our balance of trade; 250,000 ancillary jobs—newsagents, packaging, haulage; [SCOPE.sGoods('tax_goods_scope').GetName] duty pays a third of the health service!”\n“Precisely because those smokers willingly give their lives for their friends, we save more lives than we otherwise could. Smokers are benefactors of the nation—provided they remain alive, of course.”"
 joi_flavor_gbr.119.a: "[SCOPE.sGoods('tax_goods_scope').GetName] is continually harming the British people."
 joi_flavor_gbr.119.b: "Smokers of [SCOPE.sGoods('tax_goods_scope').GetName] are benefactors of the nation!"
 joi_flavor_gbr.120.t: "One of Us"
 joi_flavor_gbr.120.d: "A prominent [SCOPE.sCharacter('traitor_scope').GetPrimaryRoleTitle], [SCOPE.sCharacter('traitor_scope').GetFullName], has been accused in a recent secret inquiry of being an agent of [SCOPE.sCountry('russian_scope').GetName]—despite having been cleared months earlier by a government security investigation conducted by Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]."
 joi_flavor_gbr.120.f: "“Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]! I need to speak to you about something highly confidential. Some months ago there was a security inquiry—about Sir [SCOPE.sCharacter('traitor_scope').GetFirstName]—in fact you conducted it yourself. You found no evidence?”\n“Certainly not. Sir [SCOPE.sCharacter('traitor_scope').GetFirstName] is one of us; we’ve been friends for years. The whole story is a press fabrication. The purpose of the internal security inquiry was precisely to find no evidence so that the Prime Minister could announce in the House: ‘These allegations are unproven.’”\n\n“I’m afraid I must tell you he has been a [SCOPE.sCountry('russian_scope').GetName] spy for most of his career. He left documents with the Government, including a detailed confession—everything checks out.”\n“Good Lord! A [SCOPE.sCountry('russian_scope').GetName] agent? You might have conducted a proper investigation—but you never followed up! Why did the inquiry clear him so quickly, Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]?”\n\n“Heavens! You can’t investigate everything—you never know what you’ll uncover! He gave me his word—a gentleman’s word! Prime Minister, I assure you this is not collusion! I don’t speak a word of [SCOPE.sCountry('russian_scope').GetNameNoFlag]! I couldn’t be—I wasn’t at Cambridge—I’m not one of them—I’m married—I’m one of us—I’m innocent!”"
 joi_flavor_gbr.120.a: "If [SCOPE.sCharacter('traitor_scope').GetFullName] is a spy, Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] can hardly be above suspicion!"
 joi_flavor_gbr.120.b: "No, no, no—Sir [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] is one of us!"

 joi_flavor_gbr.121.t: "The Common Interest"
 joi_flavor_gbr.121.d: "A political leader devoted to [GetIdeology('ideology_utilitarian_leader').GetName] has proposed an ambitious reform of the excessively bloated #V Civil Service#! to rationalise [ROOT.GetCountry.GetAdjective] administration from top to bottom. Critics claim this is a device for [SCOPE.sParty('ruling_party').GetName] to harvest political advantage."
 joi_flavor_gbr.121.f: "The civil service evolved in England and later in [ROOT.GetCountry.GetAdjective] around Whitehall, whence it takes its name. Officers are appointed by His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] on the advice of the Prime Minister, and typically replaced when the Prime Minister’s party loses influence.\n\nYet as the Empire widened, the bureaucracy widened with it—every branch with its own system, officers bought or recommended by peers in the Lords—and it became ever clearer that such arrangements did not work.\n\nTo fashion a better order for this country, we must ensure the civil service is not used by the party in office to gain advantage, but remains politically neutral."
 joi_flavor_gbr.121.a: "We must build a neutral civil service."
 joi_flavor_gbr.121.b: "The bureaucracy should be reformed from within."

 joi_flavor_gbr.122.t: "Imperial Preference"
 joi_flavor_gbr.122.d: "At the Imperial Economic Conference in #yellow Ottawa#!, after complex and arduous negotiations, the delegates—including [ROOT.GetCountry.GetName]—have agreed to sign a preferential trade accord granting favours and tariff exemptions for commerce within the British Empire. At the same time, the #yellow Prime Minister of the United Kingdom#! has announced increased duties on foreign goods to protect the industries of the imperial family—even at the expense of the home country."
 joi_flavor_gbr.122.f: "In Ottawa, the solemn Lord Bessborough sits upon the ‘Crown Throne.’ At Rideau Hall he holds a Governor-General’s reception attended by governors and prime ministers from across the Empire; a symbolic flag is hung—blue field, a golden crown.”\n\n“The difficulty is this: no one knows better than Lord Bessborough that the mother country is a relatively small, densely populated manufacturing land; by contrast, the Dominions are broad and rural, sparsely peopled but proud and hopeful with ‘infant industries.’ Such is, in essence, the complex and arduous problem of the Imperial Economic Conference.”\n\n“He reflected, time and the misfortunes of the country have brought conviction to many who did not feel that they could agree with that gentleman then. Would that gentleman have found consolation for the bitterness of his disappointment if he could have foreseen that these proposals, which are the direct and legitimate descendants of his own conception, would be laid before the House of Commons, which he loved, in the presence of one, and by the lips of the other, of the two immediate successors to his name and blood.”"
 joi_flavor_gbr.122.a: "Tariffs! They are the politics of the future, and of the present!"

 joi_flavor_gbr.123.t: "His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s Marriage?"
 joi_flavor_gbr.123.d: "[SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFullName] has reached a suitable age for marriage. With her consent and by God’s grace, His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must now choose a consort of noble birth."
 joi_flavor_gbr.123.f: "“Dear Albert has brought me boundless happiness… He possesses every quality I could wish for my perfect felicity.”\n\n“He is very handsome; his hair is much the same colour as mine; his eyes are large and blue, his nose beautiful, his mouth sweet, his teeth even. But the charm of his countenance lies in its expression—most pleasing to behold.”"
 joi_flavor_gbr.123.a: "#yellow Prince Albert#! of the #O House of Saxe-Coburg and Gotha#! is the best choice; he dearly loves His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_gbr.123.b: "A member of the [SCOPE.sCountry('marriage_country_1').GetAdjective] [SCOPE.sCharacter('foreign_ruler_1').GetLastName] family would be most suitable."
 joi_flavor_gbr.123.c: "A relative of the [SCOPE.sCharacter('foreign_ruler_2').GetPrimaryRoleTitle] of [SCOPE.sCountry('marriage_country_2').GetName] would suit well."

 joi_flavor_gbr.124.t: "[SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] Visits [SCOPE.sCountry('GBR_scope').GetName]"
 joi_flavor_gbr.124.d_1: "[SCOPE.sCharacter('prince_scope').GetFirstName], the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] from [SCOPE.sCountry('RUS_scope').GetName], arrived in London today and was received by [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]. Their meeting was cordial, and Her Majesty promised to accompany him to visit certain sights."
 joi_flavor_gbr.124.d_2: "[SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] has arrived in London and enjoyed a friendly meeting with [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]. The Queen promised him the freedom to tour Britain and to join him when time permits."
 joi_flavor_gbr.124.f: "“[SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] is tall and slender, and seems resolute; yet his features are kindly. It is easy to see he is good and warm-hearted; when he removes his hat, there is in his expression a very noble air.”"
 joi_flavor_gbr.124.a: "May he learn much in [SCOPE.sCountry('GBR_scope').GetName]!"
 joi_flavor_gbr.124.b: "Welcome to the Prince."

 joi_flavor_gbr.125.t: "The Curious Adventures of [SCOPE.sCharacter('prince_scope').GetFirstName]"
 joi_flavor_gbr.125.d_1: "Keeping her promise, Her Majesty [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] yesterday accompanied [SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] on a private tour of many London sights. On her return, however, Her Majesty blushed and told the Prime Minister she wished to take [SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] for her husband…"
 joi_flavor_gbr.125.d_2: "Keeping his promise, [SCOPE.sCharacter('prince_scope').GetFirstName] the [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] yesterday privately toured many London sights with Her Majesty [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]. Upon his return he told members of the visiting delegation that he wished to be the husband of [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle], and Her Majesty appeared not ill-disposed to the idea…"
 joi_flavor_gbr.125.f: "“They said nothing and asked nothing, only walked hand in hand. At times they paused and looked at one another, as if to make sure it was real. He gazed at her profile; a breeze passed. He did not know what he expected—perhaps only that time would halt and leave her thus forever.\n\nShe walked beside him and sometimes smiled gently. He could not hear her words, only the melody of her voice, and felt as though his heart were struck. He suddenly bent to kiss that hand. She drew it back lightly, yet did not leave; the air seemed to tremble with a shining film.\n\nHe reached to keep her; his eyes fell on her like a flame. He drew out a pencil and wrote a letter; she understood at once, her eyes bright, her cheeks aflame, her whole body wrapped in a shiver of joy.\nHe wrote: ‘Will you be my wife?’\nShe read it, paused, took up the pencil, and wrote: ‘Yes.’”"
 joi_flavor_gbr.125.a: "“You must allow me to tell you how ardently I admire and love you.”"
 joi_flavor_gbr.125.b: "“You must allow me to tell you how ardently I admire and love you.”"
 joi_flavor_gbr.125.c: "Impossible! He is heir to the throne!"
 joi_flavor_gbr.125.e: "A consort from the House of [SCOPE.sCharacter('prince_scope').GetLastName]? Unthinkable!"

 joi_flavor_gbr.126.t: "The Wedding of the Century"
 joi_flavor_gbr.126.d_1: "Though unimaginable to both sides, the visiting [SCOPE.sCountry('RUS_scope').GetName] prince [SCOPE.sCharacter('prince_scope').GetFirstName] and [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] fell in love at first sight. With the Tsar’s and Cabinet’s assent, a grand wedding of the century has been held today in London, and it has been agreed that the Queen will visit [SCOPE.sCountry('RUS_scope').GetName] in due course."
 joi_flavor_gbr.126.d_2: "Jaw-dropping news from London: the visiting [SCOPE.sCountry('RUS_scope').GetName] prince [SCOPE.sCharacter('prince_scope').GetFirstName] and [SCOPE.sCharacter('queen_scope').GetFirstName] the [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] have held a grand and extraordinary wedding. No one foresaw such a stunning development between two nations of such mutual hostility."
 joi_flavor_gbr.126.f: "“That night was all light—flowers and candles interlaced, music and laughter lingering long. The couple’s eyes met through the glow, as if the world held only the two of them. At last their hands clasped tightly. She wore white, her head modestly bowed, yet her hand trembled.\n\nBefore God they spoke their vows. He looked at her and felt a heat through all his being, as though his life gathered itself into the sanctity of that instant. Candlelight fluttered upon her veil; he scarcely dared to breathe, lest he disturb it.\n\nThe city slept beneath the stars; only their wedding kept its vigil. Torches lit smiling faces; the night itself grew warm. Starlight shone over their heads, as if it were blessing them.”"
 joi_flavor_gbr.126.a: "God save… the Tsar?"
 joi_flavor_gbr.126.b: "God save… the Queen?"
 joi_flavor_gbr.126.c: "???"

 joi_flavor_gbr.127.t: "The Coronation of George V"
 joi_flavor_gbr.127.d: "The King is dead. His son, [SCOPE.sCharacter('george_v_relevant_ruler').GetFirstName], succeeds to the throne. The nation rejoices. Long may he reign!"
 joi_flavor_gbr.127.f: "“I have lost the best of friends and the most loving of fathers…”\n“Never in my life did I exchange a single cross word with him.”\n“My heart is broken and I am in deep sorrow; but God will help me to do my duty, and dear May will comfort me as always.”\n“May God grant me strength and guidance to bear the burden laid upon me.”"
 joi_flavor_gbr.127.a: "God save the King!"
 joi_flavor_gbr.128.t: "The Accession of Constantine I"
 joi_flavor_gbr.128.d: "With the end of Nicholas I’s reign, [SCOPE.sCharacter('tsar_scope').GetFullName] ascends the [ROOT.GetCountry.GetAdjective] throne as Tsar and Autocrat of All the Russias: Constantine I. Many liberal officials hope that [SCOPE.sCharacter('tsar_scope').GetHerHis|U] rule will inaugurate a new era of reform."
 joi_flavor_gbr.128.f: "“In the presence of the unseen Lord who is with Us, We take a sacred oath ever to set the welfare of Our Fatherland as Our aim.\n\nYea, by the guidance and protection of the Lord who has called Us to this great task, We shall build Russia in the highest power and glory, praying that the eternal wishes and purposes of Our gloriously remembered forebear may be fulfilled through Us.”"
 joi_flavor_gbr.128.a: "God save the Tsar!"
 joi_flavor_gbr.129.t: "Funeral of Prince Alexander"
 joi_flavor_gbr.129.d: "Prince [SCOPE.sCharacter('prince_scope').GetFirstName], who lived and ruled alongside Her Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] for decades, has passed away. They met by accident, and at last one of them has reached the end of life’s journey. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is not grief-stricken; she remains silent, as if she were still not far from him."
 joi_flavor_gbr.129.f: "“He felt life slowly ebbing away, like the flame of a candle dimming bit by bit; he closed his eyes. He saw an evening of his youth: the mist was slowly rising, and he and the Queen were walking hand in hand along the riverbank. They gazed at each other; he picked up a pencil, and his wife, cheeks flushed, looked at him. A smile appeared at the corner of his lips—a smile that did not belong to this world, but to that sky infinitely high and perfectly serene.\n\nHe saw a tall, gaunt figure step from a gray corner to the window and turn around, wearing a military dress uniform and Catherine the Great’s grand crown, silently staring at him. The Prince knew who he was; he smiled, as if already reconciled with fate. The radiance gradually faded from his face, a gentle fading, like dusk taking the place of day.\n\nSuddenly his breathing grew rapid and broken, his eyes shut tight, his face turned ashen. The church bells tolled heavily, echoing beneath the gray sky. London and Petersburg were both in tears.”"
 joi_flavor_gbr.129.a: "His story will be told forever."
 joi_flavor_gbr.130.t: "Funeral of Prince Albert"
 joi_flavor_gbr.130.d: "Prince [SCOPE.sCharacter('prince_scope').GetFirstName], who lived and ruled alongside Her Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] for decades, has passed away. They met at a banquet, and at last one of them has reached the end of life’s journey. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is not grief-stricken; she remains silent, as if she were still not far from him."
 joi_flavor_gbr.130.f: "“The air at dusk was so still, as if the whole earth were holding its breath. Only the afterglow on the distant hills still flickered, making him feel as though everything were drawing toward an eternal calm.”\n\n“In the twilight, the sea breeze blew; he felt some power calling in the darkness, his breathing in his chest growing ever lighter. He reached out his hands to her, as if to hand over his life.”\n\n“The candle was about to go out; the light merely quivered by his side and then went completely dark. The room was very quiet; only the Queen still held his hand.”"
 joi_flavor_gbr.130.a: "Amen."
