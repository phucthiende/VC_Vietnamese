 british_empire_complete_3_tt:0 "Completed the #V Pacify Canada#!, #V Pacify Australia#!, and #V Pacify South Africa#! [concept_journal_entry]"
 solving_quebec_complete_tt:0 "This journal has been active for at least a month"
 pacification_of_canada:0 "Pacify Canada"
 pacification_of_canada_reason:0 "Since [ROOT.GetCountry.GetName] reasserted control over the #yellow Canadian self-government#!, the presence of #I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#! has grown stronger. Yet formal integration does not guarantee peace in practice: many #V local elites long used to autonomy#! resent the loss of their privileges and grumble at direct rule from [ROOT.GetCountry.GetName]; tensions between [SCOPE.sCulture('anglo_canadian_scope').GetName] and [SCOPE.sCulture('franco_canadian_scope').GetName] communities have deepened.\n\nTo maintain order in #yellow Canada#!, we need stability: we must #b soothe local communities and rebuild unified imperial institutions#! so that this vast northern land returns to the system of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], thereby #V consolidating the #yellow British Empire#!’s prestige and power in North America#!."
 pacification_of_canada_complete_1_tt:0 "Completed the #V Canadian Pacific Railway#! [concept_journal_entry]"
 pacification_of_canada_complete_2_tt:0 "Completed #V Settle Quebec#! and #V Develop Ontario#! [concept_journal_entry]"
 pacification_of_canada_on_complete_tt:0 "All Canadian provinces will gain a modifier, with sample effects as follows:"
 pacification_of_canada_status:0 "Ensure both [SCOPE.sCulture('anglo_canadian_scope').GetName] and [SCOPE.sCulture('franco_canadian_scope').GetName] accept our rule"
 solving_quebec:0 "Settle Quebec"
 solving_quebec_reason:0 "Quebec was once a colony of [SCOPE.sCountry('FRA_scope').GetName], hence the large [SCOPE.sCulture('franco_canadian_scope').GetName] community.\n\nBut mounting tensions between [SCOPE.sCulture('anglo_canadian_scope').GetName] and [SCOPE.sCulture('franco_canadian_scope').GetName] are eroding our authority in #yellow Canada#!. #B We cannot permit Quebec’s dissenters to further disturb the province — the time has come to restore peace#!."
 pacification_of_canada_pulse_tt:0 "Advance progress in #V Pacify Canada#! [concept_journal_entry] by 1"
 developing_upper_canada:0 "Develop Ontario"
 developing_upper_canada_reason:0 "[SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName] is one of our valuable Canadian holdings: #B broad and sparsely peopled, webbed with lakes, with forests and fields stretching out of sight; vast tracts remain untilled; its resources and timber are abundant#!. Yet a lack of [concept_reinvestment] and [concept_migration] still hinders effective development.\n\n#I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#! should commit more resources and energy to [SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName]: encourage #v $farmers$#! and #v $laborers$#! to settle, open farms and factories, build sound infrastructure, and turn this land into #V a jewel of North America#!."
 pacification_of_canada_goal:0 "nan"

 pacification_of_australia:0 "Pacify Australia"
 pacification_of_australia_reason:0 "Since [ROOT.GetCountry.GetName] reasserted control over the #yellow Australian self-government#!, the presence of #I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#! has grown stronger. Yet formal integration does not guarantee peace in practice: many #V local elites long used to autonomy#! resent the loss of their privileges and grumble at direct rule from [ROOT.GetCountry.GetName]; at the same time, resistance by the local [SCOPE.sCulture('aborigine_scope').GetName] is rising and institutional fragmentation hinders our governance.\n\nTo maintain order in #yellow Australia#!, we need stability: we must #b soothe local communities and rebuild unified imperial institutions#! so this vast southern continent returns to the system of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], thereby #V consolidating the #yellow British Empire#!’s prestige and power in the Pacific#!."
 pacification_of_australia_complete_tt:0 "Completed the #V Appease the Aborigines#! and #V Develop the East Coast#! [concept_journal_entry]"
 pacification_of_australia_on_complete_tt:0 "All Australian provinces will gain a modifier, with sample effects as follows:"
 pacification_of_australia_status:0 "Ensure both [SCOPE.sCulture('australian_scope').GetName] and [SCOPE.sCulture('aborigine_scope').GetName] accept our rule"
 appeasing_the_aborigine:0 "Appease the Aborigines"
 appeasing_the_aborigine_reason:0 "Across the vast interior and frontiers of #yellow Australia#!, conflicts between [SCOPE.sCulture('australian_scope').GetName] [concept_migration] and #yellow Aboriginal tribes#! occur continually: #B the spread of settlements and the opening of ranches#! force the [SCOPE.sCulture('aborigine_scope').GetName] to move, and their resistance in turn sparks further clashes and reprisals — #I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#!’s rule is imperilled.\n\n[ROOT.GetCountry.GetName] must adopt more #B practical measures of governance#!: #B provide protection and relief where needed, institute rules to limit violence and disorder#!, and gradually #V integrate the #yellow Aboriginal communities#! into our [SCOPE.sCulture('australian_scope').GetName] [concept_culture].#!"
 pacification_of_australia_pulse_tt:0 "Advance progress in #V Pacify Australia#! [concept_journal_entry] by 1"
 develop_the_east_nsw:0 "Develop the East Coast"
 develop_the_east_nsw_reason:0 "The #yellow east coast of Australia#! was [ROOT.GetCountry.GetName]’s earliest foothold in the southern hemisphere. Since its beginnings as penal colonies and ports, many mid-sized towns have been founded under #O early#! #O governors#! such as #O Macquarie#! and #O Brisbane#!; yet #B large tracts remain wild and the transport and port facilities are poor#!, too weak to sustain the [concept_migration] and #yellow administrative power#! our rule requires.\n\n#I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#! should continue the policy of successive #O governors#!, #B prospering local towns and encouraging native #v $capitalists$#! and #v $aristocrats$#! to take root#!, #V turning the #yellow east coast#! into [ROOT.GetCountry.GetName]’s new economic hub#!."
 pacification_of_australia_goal:0 "nan"

 pacification_of_south_africa:0 "Pacify the Boers"
 pacification_of_south_africa_reason:0 "#B The progress bar records how long [SCOPE.sCulture('boer_scope').GetName] provinces have remained stable.#!\n\nSince [ROOT.GetCountry.GetName] established direct rule in South Africa, the #yellow [SCOPE.sCulture('boer_scope').GetName] community#! has remained the stiffest challenge: claiming the Dutch boeren tradition, they keep independent arms, #B resist [concept_law] and [concept_taxes] from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!, and even trek deeper inland to escape our authority.\n\nTo keep #yellow South Africa#! calm we must be resolute: #B suppress disobedient [SCOPE.sCulture('boer_scope').GetName], comfort the [concept_loyalist], and consolidate their customs and lands#!, bringing them back under #I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s#! control and thereby #V strengthening the #yellow British Empire#!’s prestige and power on the Dark Continent#!."
 pacification_of_south_africa_complete_tt:0 "Keep turmoil below 25% in all [SCOPE.sCulture('boer_scope').GetName] provinces for 5 years."
 pacification_of_south_africa_on_complete_tt:0 "All South African provinces will gain a modifier, with sample effects as follows:"
 pacification_of_south_africa_status:0 "Ensure the [SCOPE.sCulture('boer_scope').GetName] accept our rule"
 pacification_of_south_africa_goal:0 "nan"

 amazing_trip_start_tt:0 "#yellow Prince Alexander#! begins his journey in Britain…"
 amazing_wedding_news_tt:0 "News likely to shock the world…"
 strange_wedding_1_tt:0 "#yellow Prince Alexander#! will become the Queen’s husband."
 amazing_wedding_rus_tt:0 "#yellow Prince Alexander#! will marry into Britain, greatly improving relations.\nThe Tsar’s second son, #yellow Grand Duke Konstantin#!, becomes the new heir."
 amazing_wedding_none_tt:0 "Nothing comes of it; the Prince will soon depart Britain."
 amazing_wedding_try_tt:0 "We shall sound out the British view of the match. If they agree, His Highness will marry #yellow Queen Victoria#! and become Prince Consort, and relations between us will greatly improve.\nBut the British may not agree. If they refuse, the Prince’s tour will continue."
 amazing_wedding_others_tt:0 "The Russian Tsarevich marries the British Queen? An unforeseen turn…"
 alexander_visit_western_europe:0 "Alexander’s Tour of Western Europe"
 alexander_visit_western_europe_reason:0 "The [concept_heir] of [ROOT.GetCountry.GetName], [ROOT.GetCountry.GetHeir.GetFullName] [ROOT.GetCountry.GetHeir.GetPrimaryRoleTitle], is visiting the countries of Western Europe, hoping to learn from these advanced [concept_great_power]s and bring lessons back to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Should he complete his tour and return, the future reign of [ROOT.GetCountry.GetHeir.GetFirstName] may become #B more open and progressive#!."
 alexander_visit_western_europe_goal:0 "nan"
 alexander_visit_western_europe_complete_tt:0 "The tour has concluded successfully"
 alexander_visit_western_europe_fail_tt:0 "The Prince meets misfortune or another event abroad and cannot return"
 alexander_visit_western_europe_on_fail_tt:0 "We may need to appoint a new heir."
 alexander_visit_western_europe_invalid_tt:0 "If threatened by revolution, the Prince will return at once and end the tour."
 konstantin_ii_enthroned_tt:0 "Konstantin I ascends the throne"

 rule_urbanization_limit_immigration_rules:0 "#yellow Immigration Limits#! under High Urbanisation"
 setting_enable_urbanization_limit_immigration:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_urbanization_tooltip_tt #high Enable Immigration Limits#!#!#!"
 setting_enable_urbanization_tooltip_tt:0 "When the #O Urban Centre#! level exceeds 1500, the #O immigration cap#! of that [concept_state_region] is reduced by 35%.\nWhen it exceeds 2000, the #O immigration cap#! is reduced by 55%.\nWhen it exceeds 2500, the #O immigration cap#! is reduced by 75%.\nWhen it exceeds 3500, the #O immigration cap#! is reduced by 95%."
 setting_enable_urbanization_limit_immigration_desc:0 "[concept_state_region]s that are #B highly urbanised and densely populated#! receive a modifier reducing their #O immigration cap#! to prevent any single [concept_state_region] from exceeding reasonable population bounds."
 setting_disable_urbanization_limit_immigration:0 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_disable_urbanization_limit_immigration_desc #high Disable Immigration Limits#!#!#!"
 setting_disable_urbanization_limit_immigration_desc:0 "This disables the #O immigration limit#! in highly urbanised regions; [concept_migration] will no longer be restricted in any [concept_state_region]."

