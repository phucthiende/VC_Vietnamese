 status_gbr_intelligentsia_pm:0 "#yellow #B The Right Honourable #italic Sir [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName]#! is the incumbent Prime Minister#!#!"
