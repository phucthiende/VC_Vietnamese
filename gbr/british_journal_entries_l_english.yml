 chartism_movement_1_button:0 "Deploy the Royal Cavalry"
 chartism_movement_1_button_desc:0 "The Chartists are without doubt a group with serious radical tendencies. If we leave them unchecked, they will threaten [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government. No more hesitation — strike hard!"
