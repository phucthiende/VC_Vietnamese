 uk_parliament_westminster_1_button:0 "Propose a Budget Debate"
 uk_parliament_westminster_1_button_desc:0 "The annual Finance Bill stands as both one of Parliament’s greatest rights and its foremost obligations. By urging the Chancellor of the Exchequer to promptly submit this year’s budget for parliamentary deliberation and approval, the government can better ensure financial continuity into the coming fiscal year."
 uk_parliament_westminster_1_button_possible_tt:0 "#V The previous budget has expired#!"
 uk_parliament_westminster_1_button_effect_tt:0 "Upon use, Parliament will immediately convene a budget debate.\nAfter the recess concludes, we may at any time initiate further debates to replace the currently active budget with a new one.\nBe mindful to follow the will of the majority when enacting legislation, lest you provoke the opposition of the Members!"
 uk_parliament_westminster_1_button_effect_2_tt:0 "The budget debate will be suspended."
 uk_parliament_westminster_1_button_2_possible_tt:0 "The budget debate is currently suspended"
 uk_parliament_westminster_2_button:0 "Convene an Emergency Parliament"
 uk_parliament_westminster_2_button_desc:0 "When the nation faces a sudden crisis, the government may advise His Majesty to summon a special session. Even during recess, Members must immediately return to Westminster to deliberate upon and authorise the government’s measures and bills."
 uk_parliament_westminster_2_button_effect_tt:0 "We shall summon Parliament to convene a special session addressing the current emergency."
 uk_parliament_westminster_2_button_possible_tt:0 "Has #variable Economic Crisis#! [concept_journal_entry]"
 uk_parliament_westminster_3_button:0 "Move a Vote of No Confidence"
 uk_parliament_westminster_3_button_desc:0 "It is evident that the present government is no longer capable of resolving the grave crisis now threatening the nation. Any further hesitation would be but weakness—we require firmer leadership to weather the coming storm. Parliament must fulfil its duty!"
 gbr_event_48_a_tt:0 "#P The motion of no confidence has failed; the current government remains in office.#!"
 gbr_event_48_b_tt:0 "#R The motion of no confidence has passed; the current government shall be forced to resign!#!"
 uk_parliament_westminster_3_button_possible_tt:0 "#V #R The current Prime Minister’s [concept_popularity] is below -50#!#!"
 uk_parliament_westminster_3_button_effect_tt:0 "Parliament will hold a vote of no confidence against the sitting Prime Minister and Cabinet; if passed, the Prime Minister shall be compelled to step down."
 uk_parliament_westminster_4_button:0 "Dissolve Parliament Early"
 uk_parliament_westminster_4_button_desc:0 "The deepening crisis is precisely why we must remain true to our principles. Whether to prolong our mandate or to seek release from the burdens of governance, we ought to dissolve Parliament early and call a general election, so that we may continue along the course charted in recent years."
 uk_parliament_westminster_4_button_possible_tt:0 "#V At least 2 years have passed since the last [concept_election]#!"
 uk_parliament_westminster_4_button_effect_tt:0 "The Prime Minister shall advise His Majesty to authorise an Order in Council to dissolve the present Parliament and call a new [concept_election]."
 uk_parliament_westminster_5_button:0 "Review Colonial Policy"
 uk_parliament_westminster_5_button_desc:0 "Our Empire spans vast territories, rich in resources and talent envied by many nations. Yet such breadth also brings increasing difficulty in governance and expansion. Parliament must confront this reality and conduct its regular deliberations on colonial policy."
 uk_parliament_westminster_5_button_effect_tt:0 "The Cabinet shall present a new bill on colonial affairs to Parliament and require an immediate debate.\nAfter the recess concludes, we may at any time convene debates to replace the currently active law."
 uk_parliament_westminster_5_button_possible_tt:0 "Colonial policy debate is suspended"
 gbr_event_50_b_tt:0 "#V All our [concept_colony], [concept_dominion], [concept_chartered_company] and [concept_british_dominion] shall reduce their [concept_liberty_desire] by 10 and receive a legislative modifier.#!"
 show_gbr_colonial_education_acts_tt:0 "#P The effects of the act are as follows (not applied in the metropole):#!"
 gbr_event_50_c_tt:0 "#V All our [concept_colony], [concept_dominion], [concept_chartered_company] and [concept_british_dominion] shall increase their [concept_liberty_desire] by 10!#!"
 gbr_event_50_e_tt:0 "#V All our [concept_colony] and [concept_dominion] shall receive an #O autonomous legislative modifier#! and gain 25 [concept_relations]#!"
 gbr_event_50_h_tt:0 "#V All our [concept_colony] and [concept_dominion] shall receive a #R pro-independence legislative modifier#! and gain 50 [concept_relations].#!"
 uk_parliament_westminster_6_button:0 "Reorganise the Wartime Cabinet"
 uk_parliament_westminster_6_button_desc:0 "The clouds of war gather over the British Isles and the Empire at large. Time is of the essence—we cannot stand idle while our enemies prepare to set our homeland aflame. The government must be reorganised at once, reconciling divisions between parties and dominions, and ensuring resolute leadership in wartime."
 uk_parliament_westminster_6_button_effect_tt:0 "The Prime Minister shall reorganise the Cabinet, forming a cross-party wartime government including our overseas possessions to confront the [concept_war]."
 gbr_event_51_a_tt:0 "#V All our [concept_subject] shall increase their [concept_liberty_desire] by 10 and receive a #R negative military modifier.#!#!"
 gbr_event_51_b_tt:0 "#V All our [concept_subject] shall reduce their [concept_liberty_desire] by 10 and receive a #P positive military modifier.#!#!"
 uk_parliament_westminster_on_complete_tt:0 "#V The anger of the [GetIdeology('ideology_royalist').GetName] will almost certainly drive our nation towards [concept_civil_war]!#!"
 uk_parliament_westminster_on_fail_tt:0 "#V The anger of the [GetIdeology('ideology_constitutionalist').GetName] will almost certainly drive our nation towards [concept_civil_war]!#!"
 reset_westminster_state_of_british_isles_tt:0 "Reset provincial influence of parliamentary seats"
 uk_parliament_westminster_7_button:0 "Suspend Budget Debate"
 uk_parliament_westminster_7_button_desc:0 "For certain reasons, Parliament must delay this year’s budget debate, though the government has little choice in the matter."
 uk_parliament_westminster_7_button_possible_tt:0 "Budget debate is currently ongoing"
 uk_parliament_westminster_7_button_effect_tt:0 "The Cabinet will suspend the budget debate, bringing severe negative consequences!"
 uk_parliament_westminster_8_button:0 "Suspend Colonial Debate"
 uk_parliament_westminster_8_button_desc:0 "For certain reasons, Parliament must delay this year’s colonial policy debate, though the government has little choice in the matter."
 uk_parliament_westminster_8_button_possible_tt:0 "Colonial policy debate is currently ongoing"
 uk_parliament_westminster_8_button_effect_tt:0 "The Cabinet will suspend the colonial policy debate."

 second_british_civil_war_display:0 "Royalist Unrest"
 second_british_civil_war_display_reason:0 "Since #bold [GetLawType('law_monarchy').GetName] was overthrown#! and the Republic established in [ROOT.GetCountry.GetName], the nation has fallen into unprecedented division: though the old regime is ended, the #V rancour and thirst for vengeance of the [GetIdeology('ideology_royalist').GetName]#! burns still. Many former loyalists among the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] have voiced their discontent, even gathering in secret to restore the former [GetLawType('law_monarchy').GetName].\n\nWe must maintain #V firm order and stability#! in the years ahead: the shadow of #B [concept_civil_war] must be averted. Only peace can prove the new Republic is no mere flash-in-the-pan like the Protectorate: whether through conciliation and reform, or by repression and trial, the #yellow Republic#! must secure its foundations."
 second_british_civil_war_display_complete_tt:0 "#B No [concept_revolution] for at least 5 years#!"
 second_british_civil_war_display_goal:0 "nan"
 gbr_event_52_a_tt:0 "The [GetIdeology('ideology_royalist').GetName] will not rest; brace for the coming storm!"
 second_british_civil_war:0 "British Civil War"
 second_british_civil_war_reason:0 "The conspiracy of the [GetIdeology('ideology_royalist').GetName] has at last burst into flame: #bold [concept_civil_war] has broken out in [ROOT.GetCountry.GetName]#!. Former loyalists of the Crown — nobles, landowners, guardians of the old order — have united with angry conservatives and zealous churchmen. In towns and countryside alike they raise rebellion under the banner of #V “Long live the King”#! against the Republic.\n\nThe Republic now faces a moment of life and death. Many provinces beyond [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] are in grave disorder; there is no room for compromise. Either the #yellow Republic#! survives this trial and crushes the remnants of the [GetIdeology('ideology_royalist').GetName], or history rolls backward and [ROOT.GetCountry.GetName] again becomes thrall to royal power."
 second_parliament_civil_war_display:0 "Parliamentarian Unrest"
 second_parliament_civil_war_display_reason:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has restored the sacred tradition of divine-right absolutism and dissolved the perfidious Parliament; the nation now bows once more to the will of [GetLawType('law_monarchy').GetName]. Yet the #V [GetIdeology('ideology_constitutionalist').GetName], long accustomed to parliamentary governance,#! will not bend so easily. Many devoted to #O constitutionalism#! and #O liberalism#! among the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] and [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] have voiced their discontent, even gathering in secret to restore the old parliamentary order.\n\n[ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must #B maintain order with a strong hand#! and avert [concept_civil_war], to prove that #V absolute monarchy can still secure national peace and unity#!."
 second_parliament_civil_war_display_goal:0 "nan"
 second_parliament_civil_war:0 "British Civil War"
 second_parliament_civil_war_reason:0 "The clamour of the [GetIdeology('ideology_constitutionalist').GetName] has turned to smoke and flame: #bold a [concept_revolution] has broken out across [ROOT.GetCountry.GetName]#!. They rally under the banner of #V restoring tradition#!. Towns of #v $clerks$#!, #v $shopkeepers$#!, #v $capitalists$#! and rebellious #v $laborers$#! alike have swung to the insurgents; many districts beyond [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] are in turmoil.\n\nNow #V the fate of the Crown hangs by a thread#!. [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must summon loyal #v $soldiers$#!, #v $aristocrats$#! and #v $clergymen$#! beneath the sacred banner of #yellow absolute monarchy#!, #V crush the rebellion utterly, and prevent the story of Charles I from repeating in [ROOT.GetCountry.GetName].#!"
 gbr_event_53_a_tt:0 "The [GetIdeology('ideology_constitutionalist').GetName] will not rest; prepare for the coming storm!"
 second_british_civil_war_complete_tt:0 "The [concept_civil_war] has ended in our victory."

 great_1867_parliament_reform:0 "Call for Borough Franchise"
 great_1867_parliament_reform_reason:0 "Since the #bold Magna Carta#! and the #bold Bill of Rights#!, Parliament has been the foundation of politics in [ROOT.GetCountry.GetName]. Yet with the rise of cities and the migrations wrought by the #V Industrial Revolution#!, the old [concept_election] order shows its cracks: #B rotten boroughs still hold seats while residents of new industrial and commercial towns have no proper voice#!.\n\nThousands of [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] contribute to [ROOT.GetCountry.GetName]’s [concept_wealth] and [concept_taxes], yet have no seat from which to speak: this imbalance has sparked petitions and assemblies without end. #B Townsfolk demand that their voices enter #O Westminster#!#!.\n\n#B [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#! must reform; otherwise #V the people will reach out and seize the vote for themselves#!#!."
 great_1918_parliament_reform:0 "Call for Universal Suffrage"
 great_1918_parliament_reform_reason:0 "Despite several reforms, #B many citizens remain excluded from [concept_election]#!: untold numbers of #v $laborers$#!, #v $soldiers$#! and #v $farmers$#! still cannot express their will in #B #O Westminster#!#! by ballot. #B This inequality has stirred fresh petitions and rallies nationwide, calling for universal [concept_election]#! and recognition of every adult citizen’s political status.\n\n[ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government must heed this demand: #V if we cannot advance a new reform bill, the void where the vote should be will be filled by protest and violence#!."
 great_1922_parliament_reform:0 "Call for Equal Suffrage"
 great_1922_parliament_reform_reason:0 "Although [ROOT.GetCountry.GetName] has enacted many reforms and concessions and placed ballots in the hands of the wider citizenry, #B our [GetLawType('law_universal_suffrage').GetName] remains incomplete#!: #V half the nation — women — are still absent from the electoral rolls#!.\n\nAs urbanisation quickens and the economy grows, the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] require those whom the past treated as dependants to enter the factories as new workers. [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government should follow the public voice, recognise the political standing of women, and build a truly equal [concept_election] system."
 new_act_influence_mps_tt:0 "#V This will begin to alter the distribution of seats belonging to [concept_westminster_england], [concept_westminster_wales], [concept_westminster_scotland] and [concept_westminster_ireland].#!"

 gbr_corn_law:0 "The Corn Laws"
 gbr_corn_law_reason:0 "Since the #V Napoleonic Wars#!, the #O Corn Laws#! — the system of [GetLawType('law_protectionism').GetName] — have been a cornerstone of [ROOT.GetCountry.GetName]’s economy: high [concept_tariffs] protect domestic @grain!#V grain#! production, secure the incomes of our loyal [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], and preserve agriculture’s favourable place in our economy.\n\nYet the new conditions wrought by the #B Industrial Revolution#! have put the #O Corn Laws#! under fire: surging urban populations have driven the [concept_market_price] of @grain!#V grain#! sharply upward. #v $laborers$#!, #v $shopkeepers$#! and the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] demand the repeal of protective [concept_tariffs] so that cheap imported @grain!#B grain#! can flow in, freeing more investment for their commercial empires.\n\nBut behind the #O Corn Laws#! stand the interests of our #v $aristocrats$#! and #v $farmers$#!. #B The dispute can no longer be avoided#!: #G [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government must choose between two roads#!."
 gbr_corn_law_on_complete_tt:0 "We will turn toward a more favourable policy of #yellow Free Trade#!."
 gbr_corn_law_on_fail_tt:0 "We will return to the #yellow Mercantilism#! of the last century."
 gbr_event_58_a_tt:0 "#V All our [concept_subject] will gain +10 [concept_liberty_desire] and receive the #U Navigation Acts modifier.#!#!"

 rn_naval_defence_act:0 "Naval Defence Act"
 rn_naval_defence_act_reason:0 "Since the #bold Battle of Trafalgar#!, [ROOT.GetCountry.GetName] has held the world’s sea-power by the advantage of the #U Royal Navy#!; yet now that advantage is challenged: #B new [concept_great_power]s led by [SCOPE.sCountry('navy_size_scope').GetName] are expanding their navies on a grand scale and making technical strides#!, so that their [concept_fleet]s’ size and fighting power are #B steadily nearing our own#!.\n\nWe must ensure the safety and freedom of the #V sea-lanes#! upon which the #yellow British Empire#! lives: from Indian Ocean #o convoys#! to Pacific [concept_colony], all depend upon our #B unquestioned command of the sea#!. Should [ROOT.GetCountry.GetName] slacken even a little, an enemy [concept_fleet] might sever our links with our overseas territories and leave the Home Isles isolated at a stroke.\n\n#O #B Westminster#!#! has approved the demands of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]. We shall allocate unprecedented funds, expand our sailors and shipyards, and keep the #U Royal Navy#! unrivalled."
 rn_naval_defence_act_possible_tt:0 "#V Any country’s [concept_fleet] size exceeds 400#!"
 rn_naval_defence_act_complete:0 "Our [concept_fleet] is at least:\n· Twice the size of the world’s second-largest [concept_fleet]\n· Equal to or greater than the combined total of the second and third largest [concept_fleet]s"
 rn_naval_defence_act_on_complete_tt:0 "We will hold the grandest fleet review and invite nations from across the world!"
 rn_naval_defence_act_immediate_tt:0 "Every eligible port will gain the #V Royal Navy Naval Base#! modifier, for example:"
 sms_deutsch_hochseeflotte_immediate_tt:0 "Every eligible port will gain the #V High Seas Fleet Naval Base#! modifier, for example:"
 ijn_combined_fleet_shipbuilding_plan_immediate_tt:0 "Every eligible port will gain the #V Combined Fleet Naval Base#! modifier, for example:"

 elementary_education_1870_act:0 "Compulsory Education in Britain"
 elementary_education_1870_act_reason:0 "Since the #V Enlightenment#!, reason and knowledge have been regarded as civilisation’s foundations. Yet in [ROOT.GetCountry.GetName], #B education remains the privilege of the wealthy and the noble#!; most children of the [concept_pop] cannot obtain #B even the rudiments of literacy and arithmetic#!, their lives trapped by #V ignorance and poverty#!.\n\nAs industrialisation and urbanisation advance, the need for educated workers and citizens grows by the day: #V a people who cannot read cannot comprehend law, take part in markets, or defend their country#!. Against this backdrop, the call to build a #B nationwide system of education#! is rising ever louder:\n\n[ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s Government must answer this demand and #V ensure every child receives a basic education#!."
 poor_law_act:0 "The Poor Laws"
 poor_law_act_reason:0 "Since the #V #tooltippable;tooltip:[GetPlayer.GetTooltipTag],poor_law_act_modifier_effects_tt $poor_law_act_je_modifier$#!#! were enacted, the [GetLawType('law_poor_laws').GetName] in [ROOT.GetCountry.GetName] has rested upon the ideas of the [GetIdeology('ideology_malthusian').GetName]: the poor must enter #B workhouses akin to prisons#! and under the strictest conditions receive only #B a bare subsistence#!. Though idleness and dependence have indeed been checked, this #V inhumane system#! has become the most reviled law in the [ROOT.GetCountry.GetAdjective] realm.\n\nIn truth, our #B poor citizens#! are losing their dignity in the #R workhouses#!: #V families are torn apart and inmates treated as convicts#!. Reform, however, is not easy: the public purse is already strained; to abolish [GetLawType('law_poor_laws').GetName] and build a new #G welfare system#! will require greater outlay of [concept_money]. Nor will the opposition of the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] be easily overcome.\n\n#B Perhaps the [GetLawType('law_poor_laws').GetName] is out of season — or perhaps it is precisely what [ROOT.GetCountry.GetName] truly needs?#!"
 poor_law_act_modifier_effects_tt:0 "[GetStaticModifier('poor_law_act_je_modifier').GetName|v]\n[GetStaticModifier('poor_law_act_je_modifier').GetDesc]"
 poor_law_act_status:0 "#B The [GetIdeology('ideology_malthusian').GetName] presently dominate the [GetLawType('law_poor_laws').GetName]#!"
 poor_law_act_complete_tt:0 "A satisfactory report on the workhouses has been issued."
 national_insurance_1911_act_button:0 "Establish Unemployment Assistance Boards"
 national_insurance_1911_act_button_desc:0 "Poverty in England and Wales remains high, especially in wartime. We must create a means-tested welfare system to widen eligibility for relief."
 national_insurance_1911_act_button_effect_tt:0 "We will establish a new body to replace some functions of the workhouses."
 poor_law_act_button:0 "Re-evaluate the Workhouses"
 poor_law_act_button_desc:0 "The Poor Laws have long been under attack. Given public opposition to the present system, Parliament must convene a special committee to assess the true condition of Britain’s workhouses."
 poor_law_act_button_effect_tt:0 "We will begin a survey of the workhouses across Britain to determine whether they provide the intended level of aid."
 national_insurance_1911_act_button_possible_tt:0 "No Unemployment Assistance Board yet established"
 poor_law_act_possible_tt:0 "No current workhouse inquiry"
 check_the_poor_law_act:0 "Investigate the Workhouses"
 check_the_poor_law_act_reason:0 "Since their enactment, the [GetLawType('law_poor_laws').GetName] have become a national controversy, and now #B the protests rising from street and factory can no longer be ignored#!. In this situation, Parliament has decided to create a #V special committee#! to conduct a thorough investigation into the actual implementation of the [GetLawType('law_poor_laws').GetName] across the country.\n\nThe commissioners will enter those chill wards, audit the books, and hear the testimony of the [concept_lower_strata]; they will face #B walls of poverty, sickness, and silence#!. Though the conclusion is uncertain, one thing is sure: #B this inquiry will decide the future of the [GetLawType('law_poor_laws').GetName]#! — how much longer can it stand the scrutiny?"
 check_the_poor_law_act_complete_tt:0 "Progress reaches 100; Whitehall completes the report."
 check_the_poor_law_act_on_complete_tt:0 "A solid report will aid Parliament’s #V social security#! legislation."
