 joi_imperial_fortress:0 "Imperial Fortress"
 joi_imperial_fortress_reason:0 "The #B development of ocean-going warships#! and the #B growing belligerence#! of other great powers demand that we expand certain territories of true strategic value: such as [GetStateRegion('STATE_MALTA').GetName], [GetStateRegion('STATE_CEYLON').GetName], [GetStateRegion('STATE_MALAYA').GetName], [GetStateRegion('STATE_BERMUDA').GetName], and [GetStateRegion('STATE_UPPER_ANDALUSIA').GetName]. Strictly speaking, these are not [concept_colony]ies, but imperial fortresses—military or naval bases established to sustain the rule of [ROOT.GetCountry.GetName].\n\nTo ensure that the #V global navy#! of [ROOT.GetCountry.GetName] is effectively omnipresent, our government must equip certain bases and coaling stations with coastal defences. This should include the #V invaluable imperial fortresses#! of #V Malta, Gibraltar, Bermuda, and Colombo#!."
 joi_imperial_fortress_malta_tt:0 "Construct at least 5 $building_naval_fortification$, 20 $building_arms_industry$, and 10 $building_artillery_foundry$ and $building_munition_plant$ in [GetStateRegion('STATE_MALTA').GetName]."
 joi_imperial_fortress_ceylon_tt:0 "Construct at least 5 $building_naval_fortification$, 20 $building_arms_industry$, and 10 $building_artillery_foundry$ and $building_munition_plant$ in [GetStateRegion('STATE_CEYLON').GetName]."
 joi_imperial_fortress_malaya_tt:0 "Construct at least 5 $building_naval_fortification$, 20 $building_arms_industry$, and 10 $building_artillery_foundry$ and $building_munition_plant$ in [GetStateRegion('STATE_MALAYA').GetName]."
 joi_imperial_fortress_bermuda_tt:0 "Construct at least 5 $building_naval_fortification$, 20 $building_arms_industry$, and 10 $building_artillery_foundry$ and $building_munition_plant$ in [GetStateRegion('STATE_BERMUDA').GetName]."
 joi_imperial_fortress_gibraltar_tt:0 "Construct at least 5 $building_naval_fortification$, 20 $building_arms_industry$, and 10 $building_artillery_foundry$ and $building_munition_plant$ in [GetStateRegion('STATE_UPPER_ANDALUSIA').GetName]."
 joi_imperial_fortress_malta_button:0 "Dispatch Logistics Personnel to Malta"
 joi_imperial_fortress_malta_button_desc:0 "Located in the central Mediterranean, Malta holds a superb strategic position and serves as a vital relay on our lifeline to India and the Far East via Egypt and the Suez Canal. Investing in the strengthening of its fortifications is by no means wasteful."
 joi_imperial_fortress_malta_button_tt:0 "We will randomly transfer no fewer than 100k and no more than 250k [concept_pop] from domestic #B military facilities#! to this fortress to meet its local military demands."
 joi_imperial_fortress_malaya_button:0 "Dispatch Logistics Personnel to Singapore"
 joi_imperial_fortress_malaya_button_desc:0 "As the key to all our eastern colonies, Singapore is of utmost importance to the Empire. Should any sea power seize it, our trade would be severely disrupted, if not entirely destroyed. Singapore must remain impregnable until the main fleet arrives and decisively defeats the enemy."
 joi_imperial_fortress_ceylon_button:0 "Dispatch Logistics Personnel to Colombo"
 joi_imperial_fortress_ceylon_button_desc:0 "The establishment of reliable military facilities requires manpower and logistical coordination; among them, the needs of the imperial fortress at Colombo must take priority."
 joi_imperial_fortress_bermuda_button:0 "Dispatch Logistics Personnel to Bermuda"
 joi_imperial_fortress_bermuda_button_desc:0 "The patrol area of the North American and West Indies Station is vast, encompassing the North Atlantic, the West Indies, and the South Atlantic—from the Galápagos Islands to the Drake Passage. We must build up strength in Bermuda so as to accommodate operational forces when necessary."
 joi_imperial_fortress_gibraltar_button:0 "Dispatch Logistics Personnel to Gibraltar"
 joi_imperial_fortress_gibraltar_button_desc:0 "Gibraltar not only controls the entrance to the Mediterranean, but also possesses a heavily fortified harbour through which vessels may pass between the Atlantic and the Mediterranean. Strengthening the defence of this port is therefore of paramount importance."
 joi_imperial_fortress_status:0 "Strengthen Military Installations at Key Strategic Nodes of Our Global Empire"
