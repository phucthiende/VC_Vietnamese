 joi_imperial_preference:0 "Imperial Economic Conference"
 joi_imperial_preference_reason:0 "With new #yellow high [concept_tariffs]#! and #yellow trade barriers#! imposed by rising [concept_great_power]s such as [SCOPE.sCountry('threat_country_1').GetName] and [SCOPE.sCountry('threat_country_2').GetName], current trade laws no longer suffice to protect and extend [ROOT.GetCountry.GetName]’s interests. We have therefore invited delegates from across the British Empire to #O Ottawa#! to hold an economic conference and #B advance #V reciprocal tariffs and preference#! among our [concept_dominion]s and [concept_colony] across the Empire#!.\n\nOnly by realising [GetLawType('law_imperial_preference').GetName] within the [ROOT.GetCountry.GetAdjective] [concept_market] — protecting internal flows while presenting a united external #yellow tariff#! wall — can the #yellow British Empire#! #B keep the initiative#! amid the rapids of world trade and #V maintain our [concept_market] as the strongest economic force on earth#!."
 joi_imperial_preference_leader_tt:0 "Any [concept_politician] has the [GetIdeology('ideology_utilitarian_leader').GetName], [GetIdeology('ideology_imperial_reformer_leader').GetName] or [GetIdeology('ideology_jingoist_leader').GetName] [concept_ideology]"
 joi_imperial_preference_decition_tt:0 "The #V Institutionalise Imperial Conferences#! decision has been passed"
 joi_imperial_preference_on_complete_tt:0 "All our [concept_subject] will receive the #V Imperial Preference#! event."
 event_effects_joi_flavor_gbr.122_tt:0 "Replace the #O Trade Laws#! with [GetLawType('law_imperial_preference').GetName]."
 imperial_preference_possible_can_tt:0 "#B All of Canada lies within the imperial system; hold all Canadian provinces#!"
 imperial_preference_possible_ast_tt:0 "#B All of Australia lies within the imperial system; hold all Australian provinces#!"
 imperial_preference_possible_saf_tt:0 "#B All of South Africa lies within the imperial system; hold all Boer provinces#!"
 imperial_preference_possible_raj_tt:0 "#B All of India lies within the imperial system; princely states abolished#!"
 imperial_preference_can_complete_tt:0 "The Canadian delegation agrees to the proposal"
 imperial_preference_ast_complete_tt:0 "The Australian delegation agrees to the proposal"
 imperial_preference_saf_complete_tt:0 "The South African delegation agrees to the proposal"
 imperial_preference_raj_complete_tt:0 "The Indian delegation agrees to the proposal"
 imperial_preference_can_button:0 "Concede to Canada"
 imperial_preference_can_button_desc:0 "Our economic ties with Canada have weakened compared with the past, and other powers have begun to influence them. Yet their loyalty to us remains. We should make use of it to strengthen our bonds."
 imperial_preference_can_button_possible_tt:0 "No agreement yet with the Canadian delegation"
 imperial_preference_saf_button:0 "Negotiate with South Africa"
 imperial_preference_saf_button_desc:0 "South Africa is rich in minerals and supplies half the Empire’s gold; we must secure the best terms to ensure our economic ties."
 imperial_preference_saf_button_possible_tt:0 "No agreement yet with the South African delegation"
 imperial_preference_ast_button:0 "Concede to Australia"
 imperial_preference_ast_button_desc:0 "Australians have a deep affection for us — they are our direct descendants. Some concessions admitting their goods to our market will strengthen that bond."
 imperial_preference_ast_button_possible_tt:0 "No agreement yet with the Australian delegation"
 imperial_preference_raj_button:0 "Deal with India"
 imperial_preference_raj_button_desc:0 "Though India is but a colony, its place in the Empire is pivotal. It receives goods from across the Empire and supplies raw materials in return. We must ensure tight links in imports and exports, avoiding decoupling, while also attending to Indian economic interests."
 imperial_preference_raj_button_possible_tt:0 "No agreement yet with the Indian delegation"
 imperial_preference_button_possible_tt:0 "At least 3 months since our last imperial negotiation"
 imperial_preference_enable_tt:0 "Britain has completed the #V Imperial Economic Conference#! [concept_journal_entry] and enacted Imperial Preference"
