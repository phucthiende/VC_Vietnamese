 railway_mania_crisis_event_tt:0 "#R The collapse of Railway Mania will bring a securities panic nationwide and trigger a global financial crisis!#!"
 railway_mania_immediate_tt:0 "All countries with railways will experience a railway boom with effects as follows:"
 railway_mania_possible_tt:0 "Railway stocks are booming"
