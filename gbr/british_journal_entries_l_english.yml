 england_industrialize:0 "England's Industrial Revolution"
 england_industrialize_reason:0 "#bold Centuries of colonial wealth#! fueled this transformation. While [SCOPE.sCountry('FRA_scope').GetName] squandered riches on armies and [SCOPE.sCountry('SPA_scope').GetName] on luxuries, we invested in #variable industry#!.\n\n#bold Watt's steam engine (1769)#! and #bold Stephenson's railways (1825)#! shattered pre-industrial constraints. Our abundant [SCOPE.sGoods('coal_scope').GetName] powered factories that reshaped the landscape—replacing rural idylls with #bold 'dark satanic mills'#!.\n\nLet us cement [ROOT.GetCountry.GetName] as the world's first industrial [concept_country]!"
 england_industrialize_status:0 "Forge England into the world's first industrial heartland"
 scotland_industrialize:0 "苏格兰工业化"
 scotland_industrialize_reason:0 "进度条展示当前上克莱德河的#V 疏浚进度#!。\n\n#yellow 苏格兰#!是[ROOT.GetCountry.GetName]最重要的组成部分之一。然而，这里工业化的脚步却相比我们的许多其他地方都显得迟缓：尽管#B 格拉斯哥#!拥有着面向美洲的优越港口位置，并凭借着[SCOPE.sGoods('fabric_scope').GetName]和[SCOPE.sGoods('tobacco_scope').GetName]贸易一度形成了繁荣的经济中心，然而，进一步经济增长的障碍很快显现：#blue #B #L 克莱德河#!#!#!水浅，大型远洋船舶无法驶入，因此货物必须在格里诺克转运到小型船舶中。#B 高地和山谷的崎岖地形#!则阻碍了运输与商业的发展，这些都使得曾经繁荣的#yellow 苏格兰#!陷入了如今的衰落之中。\n\n[ROOT.GetCountry.GetName]所享有的繁荣与辉煌当然应该分享给北方的[GetCulture('scottish').GetName]兄弟们：我们的#v $engineers$#!提议对#blue #B #L 克莱德河#!#!#!进行大规模的疏浚，清除数百万立方英尺的堆积淤泥，并炸毁横亘在克莱德河口巨大的的#v 埃尔德斯利岩石#!，以加深和拓宽这条潜力非凡的河道，并进一步发掘苏格兰山谷中丰富的[SCOPE.sGoods('coal_scope').GetName]潜力。如果这些能够完成，#blue #B #L 克莱德河#!#!#!将很有机会成为#b 世界上最伟大的造船业与制造业中心之一#!。"
 finish_scotland_industrialize_tt:0 "完成了#V 苏格兰工业化#![concept_journal_entry]"
 scotland_industrialize_status:0 "将克莱德河口与资源丰富的苏格兰内陆转变成工业中心"
 scotland_industrialize_complete_tt:0 "成功#V 疏浚了上克莱德河#!，并已经执行了#V 宣布格里诺克-格拉斯哥航道通航#!"
 scotland_industrialize_1_button:0 "开始疏浚上克莱德河"
 scotland_industrialize_1_button_desc:0 "早在1768年我们的工程师就尝试过疏浚上克莱德河的沙洲与碎石，1769年詹姆斯·瓦特的报告则促使人们在当地建立起了一些防波堤，以阻断南侧航道，将邓巴克浅滩处分成两条的浅水航道合并，但事实证明，这些都不足以解决问题。\n\n然而这些难题在光明的今天，都已经不再是困难！技术的进步允许我们利用炸药和钢铁的力量迫使河流改道，摧毁阻拦在河道中的一切巨石和沙砾，加深整个河道，让自然俯首于[ROOT.GetCountry.GetAdjectiveNoFormatting]人的脚下：就让这项工程见证我们工业与科学的伟大力量吧！"
 scotland_industrialize_1_button_tt:0 "尚未执行#V 宣布格里诺克-格拉斯哥航道通航#!"
 scotland_industrialize_2_button:0 "宣布格里诺克-格拉斯哥航道通航"
 scotland_industrialize_2_button_desc:0 "格拉斯哥的工业正在蓬勃发展，就让我们乘着这个恰逢其时的好机会，宣布这项疏浚工程的伟大成功，并重新开放里诺克-格拉斯哥之间的克莱德河航道吧！毫无疑问，这将促使我们的造船巨头迅速落户这个拥有着良好条件的好地方：人造的全新克莱德河口！"
 scotland_industrialize_2_button_tt:0 "#V 疏浚进度#!达到了60"

 rebuild_westminster:0 "Rebuild the seat of Parliament"
 rebuild_westminster_reason:0 "#V The Great Fire of 1834#! consumed most of the buildings of the #B old Palace of Westminster#!, leaving only shattered walls and ashes; even so, our loyal MPs continue to debate and legislate in a temporary hall.\n\nAs the symbol of parliamentary sovereignty in [ROOT.GetCountry.GetName], our Parliament cannot remain so shabby forever: we #B must rebuild a new Palace of Parliament worthy of the #yellow splendour Britannia#! now enjoys#!. According to the plans of #V Sir Charles Barry#!, the new palace will adopt the now-fashionable #V Gothic Revival#! style and stand proudly on the banks of the Thames.\n\nYet this is only the beginning of a long endeavour: #B both the funding and the time required will be a heavy burden#!. But for the great [ROOT.GetCountry.GetName], is this not a mere trifle?"
 rebuild_westminster_goal:0 "nan"
 rebuild_westminster_complete_tt:0 "The rebuilding has been completed."
 rebuild_westminster_button:0 "Approve the rebuilding plan"
 rebuild_westminster_button_desc:0 "Sir Charles Barry’s proposal has won the favour of the MPs. All we need do is begin appropriations as he requests, and trust he will return to Britain a new Palace of Parliament without precedent!"
 rebuild_westminster_button_possible_tt:0 "The rebuilding plan has not yet been approved"
 rebuild_westminster_button_effect_tt:0 "We will approve the rebuilding plan and commence the works, causing the rebuilding progress bar to increase by 1 each month."
 rebuild_westminster_event_1_tt:0 "This will reduce rebuilding progress by 10"
 rebuild_westminster_event_2_tt:0 "This will increase rebuilding progress by 10"
 event_effects_joi_flavor_gbr.44_tt:0 "Add the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rebuild_westminster_modifier_effects_tt $new_westminster_palace_modifier$#! modifier to the [GetStateRegion('STATE_HOME_COUNTIES').GetName]."
 rebuild_westminster_modifier_effects_tt:0 "[GetStaticModifier('new_westminster_palace_modifier').GetName|v]\n[GetStaticModifier('new_westminster_palace_modifier').GetDesc]"

 je_group_british_imperial_affairs:0 "Imperial Affairs"
 uk_parliament_westminster:0 "Westminster"
 uk_parliament_westminster_reason:0 "#U #B Westminster#!#! — this ancient palace is not only the political heart of [ROOT.GetCountry.GetName], but the emblem of our #O constitutional tradition#! and #O parliamentary sovereignty#!. Since the #bold Magna Carta of 1215#! established the contractual relationship between the #v $aristocrats$#! and the Crown, #U #B Westminster#!#! has gradually grown into the core of [GetIdeology('ideology_british_conservatism').GetName] [concept_ideology]; after the #bold Glorious Revolution#! and the #bold Bill of Rights#!, the system was firmly established, binding the power of [ROOT.GetCountry.GetRuler.GetHerHis] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to the #V consent of Parliament#!, making the ideal of #yellow parliamentary sovereignty#! the centre of our #B great and glorious #I [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government#!#!.\n\nToday #U #B Westminster#!#! is more than a palace: it represents #V the consent of our people#! and #V the tradition of parliamentary governance#!. In the Lords, the representatives of the #v $aristocrats$#! and #v $clergymen$#! sit, while in the Commons the #v $clerks$#!, #v $shopkeepers$#! and #v $capitalists$#! assemble — together the supreme legislative and judicial authorities of [ROOT.GetCountry.GetName]. From the oldest manors to the busiest towns, every MP speaking for the people makes their voice heard here, allowing the present [concept_government] to function through debate and compromise.\n\n#yellow #B Parliamentary sovereignty#!#! is not merely words on parchment; it is a conviction held in the hearts of all [ROOT.GetCountry.GetAdjective] people: any [concept_law] must be debated, voted upon, and passed here; any power must derive its legitimacy here. Whether [concept_taxes], [concept_war], or the administration of [concept_colony], #U #B Westminster#!#! is the finest emblem of our democratic tradition.\n\n#U #B Westminster#!#! is the foundation upon which our #yellow [ROOT.GetCountry.GetAdjective]-way of life#! endures — a creed in institutions of which we may be #B most proud in this turbulent world#!: #V God bless our soldiers and sailors, and our Members of Parliament and our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!#!"
 westminster_england_progress_bar:0 "[concept_westminster_england]"
