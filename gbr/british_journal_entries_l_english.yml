 create_fascist_leader_during_crisis_tt:0 "A [GetIdeology('ideology_fascist').GetName] will become leader of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]"

 her_majestys_government_complete_tt:0 "[ROOT.GetCountry.GetNameNoFlag] has #B not#! enacted [GetLawType('law_monarchy').GetName]"
 event_effects_joi_flavor_gbr.92_tt:0 "[GetIdeology('ideology_communist').GetName] will rapidly seize the Home Isles, but [ROOT.GetCountry.GetRuler.GetHerHis] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] will withdraw overseas with the #B #U Royal Navy#!#!, #B forcing you to choose between staying in the #R British Isles#! or #P sailing abroad.#!#!"
 royal_navy_run_event_1_tt:0 "The Royal Navy loyal to the Crown will evacuate [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, the Royal Family, and loyal ministers and officers to our faithful Canada, but the Home Isles will temporarily fall to the Reds…"
 royal_navy_run_event_2_tt:0 "The Royal Navy loyal to the Crown will evacuate [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, the Royal Family, and loyal ministers and officers to our faithful Australia, but the Home Isles will temporarily fall to the Reds…"
 royal_navy_run_event_3_tt:0 "The Royal Navy loyal to the Crown will evacuate [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, the Royal Family, and loyal ministers and officers to our faithful British India, but the Home Isles will temporarily fall to the Reds…"
 royal_navy_run_event_4_tt:0 "The Royal Navy loyal to the Crown will evacuate [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, the Royal Family, and loyal ministers and officers at once, but the Home Isles will temporarily fall to the Reds…"
 royal_navy_run_event_0_tt:0 "The Navy still loyal to the old dynasty will spirit them away to the overseas colonies."
 royal_navy_je_fail_tt:0 "The #U Royal Navy#! [concept_journal_entry] will #R fail#! due to the Navy’s flight"
 long_way_to_home:0 "A Long Road Home"
 long_way_to_home_reason:0 "#B The Crown has fallen in London; [GetIdeology('ideology_communist').GetName] mobs have overthrown the order and tradition of our homeland#!: flame and red flag shroud #yellow Great Britain#!, and [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and loyal MPs can only cross the seas under the #V protection of the Royal Navy#! into those territories that remain faithful to the Empire.\n\nYet though broad swathes of the homeland — and many ancient, storied cities — have fallen under the control of the [GetIdeology('ideology_communist').GetName] bandits and their dictatorship, and all their hateful institutions, we shall not flag or fail. Overseas the Empire fights on under the arms and guard of the #U Royal Navy#!.\n\nWith growing confidence and gathering strength we shall prepare for our return; at whatever cost we shall take back our [concept_homeland]!"
 long_way_to_home_button:0 "Prepare for Homecoming"
 long_way_to_home_button_desc:0 "The Reds at home are weakened and at one another’s throats. We must organise a mighty force and prepare the greatest amphibious operation in human history, drive the communists from our shores, and reclaim our mother country!"
 long_way_to_home_status:0 "#G #B We must retake the Home Isles from the [GetIdeology('ideology_communist').GetName] rabble!#!#!"

 victorian_morality:0 "Victorian Decorum"
 victorian_morality_reason:0 "[ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName]’s #yellow [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s coronation#! heralds a new age of prosperity for [ROOT.GetCountry.GetName]. Yet while the city’s sprawl and the factories’ roar have sharply increased [concept_wealth], #B social unease and moral slippage#! — a #B turning from our nation’s traditional [concept_religion] ethics#! — are rising as well:\n\n#B #V Drunkenness, gambling, and prostitution#! spread; amid the smoke of factories violence and poverty accumulate, and the old social morals and family bonds tremble#!. The devout #v $clergymen$#! of the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] say [ROOT.GetCountry.GetName] is straying from God’s will.\n\n#V Sodom’s sins#! cannot be allowed to fester. As [ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] stands in our society as the exemplar of #B purity, modesty, and family virtue#!, so must we take her as the #V new standard of [ROOT.GetCountry.GetAdjective] life#! — ensuring our citizens again practise those ancient, God-disciplined #V great virtues: temperance, humility, probity, and duty to the family#!."
 queen_vitoria_review_tt:0 "#yellow Queen Victoria#! has ascended"
 victorian_morality_complete_1_tt:0 "The [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] have governed for at least 25 years"
 victorian_morality_complete_2_tt:0 "#yellow Queen Victoria#! is not on the throne"
 victorian_morality_status:0 "#B Set strict moral standards for #yellow Britain#!’s society#!"
 victorian_morality_goal:0 "nan"
 english_afternoon_tea:0 "English Afternoon Tea"
 english_afternoon_tea_reason:0 "Though the [SCOPE.sCulture('han_scope').GetName] #yellow people#! had been drinking tea since before the Common Era, it was only in the 17th century that [ROOT.GetCountry.GetName] embraced it — thanks to #B #V King Charles II#! and his wife, #yellow the Portuguese#! princess Catherine of Braganza#!. Even then, for the #O early#! [ROOT.GetCountry.GetAdjectiveNoFlag], @tea!#V tea#! remained the luxury of the rich; but with the growth of our [concept_market], @tea!#V tea#! carried from India and the Far East has fallen greatly in [concept_market_price].\n\nMany #B hungry #v $laborers$#!, home from a day’s hard work#!, needed more than a #G cup of tea#! — they needed #G a heartier bite#!. Whether a simple #O fish-and-chips#! supper or a spread of #O lovely cakes#! and scones with #O clotted cream and jam#!, a pot of @tea!#V strong, invigorating tea#!#! is ever essential and is becoming the fashion of our society.\n\n@tea!#V Afternoon tea#! stands for the #B pleasant hours in refined tearooms#! and the #B distinctive [ROOT.GetCountry.GetAdjectiveNoFlag] way of life — graceful and comfortable#!. We should vigorously promote this #V gentlemanly custom#! and #V make it the emblem of our #yellow English civilisation#!."
 english_afternoon_tea_complete_tt:0 "Maintain the following conditions for at least five years"
 english_afternoon_tea_fail_tt:0 "Capital occupied during war"
 english_afternoon_tea_goal:0 "nan"

 finish_rule_bri_je_tt:0 "Completed the #V Rule, Britannia!#! [concept_journal_entry]"
 conqueror_niger:0 "Command the Niger"
 conqueror_niger_reason:0 "Since the #V 1807 Act for the Abolition of the Slave Trade#!, the #U Royal Navy#! has patrolled the West African coast to suppress illegal slaving. Now the trade routes around the Niger have shifted to palm oil, groundnuts and cocoa; yet such wealth stirs #concept_civil_war among local warlords and religious emirs.\n\nThe #V Niger Delta#! yields not only palm oil and rubber; it is also #B the gateway to the West African interior and the Sahel#!. Without orderly administration and a tariff regime, [ROOT.GetCountry.GetAdjective] investment and shipping here will be in peril.\n\nChaos serves neither commerce nor true civilisation. The Niger — and the #yellow Sokoto Sultan#! — must submit to [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s authority: #B only thus can we secure the Empire’s future interests in Africa and bring enlightenment to the natives.#!"
 conqueror_niger_tt:0 "Provinces of the Niger under our rule will gain benefits as follows:"
 conqueror_ghana:0 "Subdue the Gold Coast"
 conqueror_ghana_reason:0 "Since the #yellow Portuguese#! first raised fortresses along this shore centuries ago, the Gold Coast has tempted Europe’s powers. In the #V First Anglo-Ashanti War of 1824#! we defeated the #yellow Ashanti Kingdom#! and gradually enlarged our footholds; today, Ashanti has effectively lost control of the littoral.\n\nBut mere trading forts no longer suffice to protect [ROOT.GetCountry.GetAdjective] interests. The rich profits of gold, ivory, and cocoa — and the coast’s #B strategic role as the portal to the West African interior#! — demand more decisive measures: #V [ROOT.GetCountry.GetName] must bring all of Ghana under its hand and end the rule of the natives and of rival powers once and for all#!."
 conqueror_ghana_tt:0 "Provinces of Ghana under our rule will gain benefits as follows:"
 conqueror_ghana_button:0 "Purchase Dutch Ghana"
 conqueror_ghana_button_desc:0 "Centred on Elmina Castle, Dutch Ghana is among sub-Saharan Africa’s earliest European strongholds, long yielding profits to the Netherlands. With our rise in Africa and their shifting priorities, we may reach a peaceful bargain: for a sum of money and recognition of their claim to Aceh, they will transfer the territory to us."
 conqueror_malaya:0 "Intervene in Malaya"
 conqueror_malaya_reason:0 "Since the #yellow East India Company#! obtained Penang by treaty with the Sultan of Kedah and the #V Anglo-Dutch Treaty of 1824#! compelled [SCOPE.sCountry('NET_scope').GetName] to withdraw from the Malay Peninsula, the sultanates of the peninsula and Brunei have remained nominally independent — but their economies, politics and trade have been riven by strife and faction.\n\nLocal riches of tin and rubber beckon us: if [ROOT.GetCountry.GetName] can #B intervene as arbiter and defender of commerce#! and persuade the sultans to accept the benevolent governance of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], we shall secure advantage at this vital strait — #V perhaps even by peaceful means.#!"
 conqueror_malaya_complete_tt:0 "All Malayan sultanates have submitted to us or been eliminated"
 conqueror_malaya_tt:0 "Provinces of the Straits Settlements under our rule will gain benefits as follows:"
 state_conqueror_benifits_tt:0 "Each journal province gains benefits as follows:"
 conqueror_malaya_button:0 "Pressure the Malay Sultans"
 conqueror_malaya_button_desc:0 "Our forces are garrisoned locally, and the weak sultans cannot resist. Through cordial persuasion we can, without abolishing their thrones, govern their administrations and finances by means of advisers — laying a foundation for our long-term interests in Malaya."
 conqueror_malaya_button_possible_tt:0 "Any [concept_army] in the #O Indonesia#! [concept_hq] has more than #variable 30#! [Concept('concept_unit','$concept_units$')]"
 conqueror_malaya_button_effect_tt:0 "We will coerce the Malayan sultanates by force to accept our advisers."
 integrate_malaya_button:0 "Unify the Straits Settlements"
 integrate_malaya_button_desc:0 "The #yellow Straits Settlements#! sultanates are fragmented, hindering resource development and sea-lane security. In the interests of the Empire in the Indies, we might persuade them to abandon independence and join a federation of our making — in return for the permanent honour of their houses."
 integrate_malaya_button_possible_tt:0 "Any [concept_army] in the #O Indonesia#! [concept_hq] has more than #variable 50#! [Concept('concept_unit','$concept_units$')]"
 integrate_malaya_button_2_possible_tt:0 "Action not yet taken"
 integrate_malaya_button_effect_tt:0 "We will promise hereditary rights and autonomy to the sultanly houses and persuade our protectorates in Malaya to join our new federation, establishing Resident Councils in each."
 annex_malaya_button:0 "Invite the Sultan of Brunei into the Federation"
 annex_malaya_button_desc:0 "The #yellow Sultanate of Brunei#! is in decline, yet we can still cultivate good relations. With sufficient financial aid and guarantees of the Sultan’s succession, we may persuade him to accede to the Straits Federation, so that its ports and resources may be more effectively used."
 annex_malaya_button_possible_tt:0 "The Straits Federation has been formed and the Malayan sultanates have joined it."
 annex_malaya_button_effect_tt:0 "We will, while safeguarding his rights, persuade the Sultan of Brunei to join our new Straits Federation and station a Resident Council there."

 british_shipbuilding_industry_character:0 "Britain’s Shipbuilding Industry"
 british_shipbuilding_industry_character_reason:0 "Since the #B #L Bounties Act of 1640#!#!, [ROOT.GetCountry.GetName]’s #V regulation and subsidy of shipbuilding#! has been the firm basis of our #yellow international#! [concept_trade] and of colonial [concept_colonial_growth]. With victory in the #V Napoleonic Wars#!, we mastered #B almost all liner routes and trade flows#! between our [concept_colony], letting our mighty [concept_convoys] grow under the shelter of the #yellow great [concept_fleet]#! and a #yellow perfected [concept_tariffs] regime#!.\n\nToday [ROOT.GetCountry.GetName] possesses the #U #B most complete shipbuilding industry in the world#!#!: #V our #yellow shipbuilding#! is vast in scale#!, with a full ecosystem and great numbers of skilled craftsmen; #V our economy is unassailable#!, able to supply every material and demand for shipbuilding; #V our sea trade yields rich profits#!, feeding constant orders to our yards; #V our technology is advanced#!, turning out #B the finest ships in the world#! — stronger, better, more efficient. All this has made [ROOT.GetCountry.GetName] the #O leading power#! of the #yellow global shipbuilding#! industry.\n\nThough many provinces’ over-reliance on #yellow shipbuilding#! concentrates capital and labour in docks and ports and makes new industries hard to grow, our great #U shipbuilding sector#! still #V symbolises the [ROOT.GetCountry.GetAdjectiveNoFlag] nation’s seaborne heritage and stands as the stout guarantee of our #G maritime supremacy#!."

 british_utility_principle:0 "A Bright Future for Utilitarianism"
 british_utility_principle_reason:0 "For too long, #V the sale of offices and cronyism#! in the [ROOT.GetCountry.GetAdjective] state have turned the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! into the preserve of a few [concept_upper_strata]. The #B confusion and inefficiency#! of government #v $bureaucrats$#! have become almost a tradition — and faced with the ever more complex administration of industrialisation and empire, #B the old apparatus can no longer cope#!.\n\nBy adopting the methods of [GetIdeology('ideology_utilitarian_leader').GetName], instituting #V efficient civil-service examinations#! and a #V politically neutral corps of officials#!, we can ensure that every cog of [ROOT.GetCountry.GetName]’s machine #B serves the common good of all citizens#! — thereby #B raising the efficiency of governance, restoring public trust#! and #G becoming a powerful force for progress worldwide#!."
 british_utility_principle_status:0 "Promote adoption of [GetIdeology('ideology_utilitarian_leader').GetName] methods across [ROOT.GetCountry.GetName]’s civil service"
 event_effects_joi_flavor_gbr.110_tt:0 "If [GetLawType('law_compulsory_primary_school').GetName], [GetLawType('law_public_schools').GetName], and [GetLawType('law_appointed_bureaucrats').GetName] are enacted, the current #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! will be reformed into the more reliable #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_1_modifier_effects_tt $civil_service_system_1$#!.\nOtherwise the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! modifier will be removed and the [GetIdeology('ideology_utilitarian_leader').GetName] [concept_leader] will resign."
 event_effects_joi_flavor_gbr.102_tt:0 "The current #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! will be reformed into the more reliable #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_1_modifier_effects_tt $civil_service_system_1$#!.\n[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] will adopt the [GetIdeology('ideology_utilitarian_millian').GetName] ideology in place of [GetIdeology('ideology_malthusian').GetName]."
 british_utility_principle_possible_tt:0 "Any [concept_leader] has the [GetIdeology('ideology_utilitarian_leader').GetName] [concept_ideology]"
 event_effects_joi_flavor_gbr.110_fail_tt:0 "The #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! modifier will be removed and the [GetIdeology('ideology_utilitarian_leader').GetName] [concept_leader] will resign."
 finish_british_utility_principle_tt:0 "Completed the #V Bright Future for Utilitarianism#! [concept_journal_entry]"
