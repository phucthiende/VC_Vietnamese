 workmen_compensation_1897_act:0 "Call for Labour Laws"
 workmen_compensation_1897_act_reason:0 "Workers in [ROOT.GetCountry.GetName] have had enough of #R the harshness of their lot#!: #B from dawn till dusk they are kept beside roaring machines, the air thick with coal-smoke and iron filings, scarcely able to breathe; deep in the mines it is damp and dark year-round, with cave-ins and explosions claiming the lives of many #v $laborers$#!#!; there is no rest, no protection — their lives #V consumed by exhaustion, danger, and disease#!.\n\nThe #v $laborers$#! claim our [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] hold sway over [concept_government] and have legalised their exactions, whilst #B those who work hardest and produce most receive the least#!. Thus they have joined with the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] to launch a #V nationwide strike#! across [ROOT.GetCountry.GetName].\n\n[ROOT.GetCountry.GetRuler.GetHerHis] Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s Government must enter serious talks with the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] [concept_leader] and take measures to #V end this [concept_political_movement] that is gravely harming [ROOT.GetCountry.GetAdjective] economic growth#!."
 common_labor_laws:0 "Call for Labour Laws"
 common_labor_laws_reason:0 "Workers in [ROOT.GetCountry.GetName] have had enough of #R the harshness of their lot#!: #B from dawn till dusk they are kept beside roaring machines, the air thick with coal-smoke and iron filings, scarcely able to breathe; deep in the mines it is damp and dark year-round, with cave-ins and explosions claiming the lives of many #v $laborers$#!#!; there is no rest, no protection — their lives #V consumed by exhaustion, danger, and disease#!.\n\nThe #v $laborers$#! claim our [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] hold sway over [concept_government] and have legalised their exactions, whilst #B those who work hardest and produce most receive the least#!. Thus they have joined with the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] to launch a #V nationwide strike#! across [ROOT.GetCountry.GetName].\n\nWe must enter serious talks with the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] [concept_leader] and take measures to #V end this [concept_political_movement] that is gravely harming [ROOT.GetCountry.GetAdjective] economic growth#!."
 common_labor_laws_1_button:0 "Suppress the Labour Movement"
 common_labor_laws_1_button_desc:0 "The labour movement is escalating. Clearly this is a communist conspiracy to overthrow our Government; we must stop these thugs with force!"
 common_labor_laws_2_button:0 "Encourage the Labour Movement"
 common_labor_laws_2_button_desc:0 "It is the Government’s duty to achieve social justice; on this point we must support the workers’ demands."
 common_labor_laws_status:0 "#R A protest demanding [GetLawType('law_worker_protections').GetName] is sweeping the nation#!"
 great_railroad_strike:0 "Great Railway Strike"
 great_railroad_strike_reason:0 "In response to the [concept_political_movement] led by the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] calling for labour laws, railway workers in [ROOT.GetCountry.GetName] have organised a #V nationwide strike#! of unprecedented scale.\n\nThe suspension of #yellow railways#! has #B gravely disrupted the economic links of the entire country#!; we must #V take measures to get the railwaymen back to work#!."
 great_railroad_strike_complete_tt:0 "Wait for the strike to end on its own."

 chartism_movement:0 "Chartist Movement"
 chartism_movement_reason:0 "The spread of the #V People’s Charter#! has unleashed a serious [concept_political_movement] across [ROOT.GetCountry.GetName]: from #v $laborers$#! in the factories to #v $clerks$#! in the streets, protesters across the Isles are crying #B liberty, equality, and fraternity#!!\n\nIn #B #O Westminster#!#! and in [concept_government], however, these demands are deemed dangerous: #I the House of Lords#! declares they will destroy the nation’s order and lead to endless turmoil; #G the House of Commons#! fears that rash, hasty reform will collapse [concept_government] entirely. Meanwhile, the #v $laborers$#! themselves are divided: some insist on #B peaceful petition#!; others turn to #B radicalism and violence#!, seeking to #V force Parliament’s hand#! through [concept_turmoil].\n\nWhatever the case, #V [ROOT.GetCountry.GetRuler.GetHerHis] Majesty’s Government must act and weather this perilous storm.#!"
 chartism_movement_fail_tt:0 "#V Movement Radicalism#! reaches 300; the Government is forced to crush Chartism by force."
 chartism_movement_status:0 "#R Radical Chartists are stirring unrest nationwide#!"
