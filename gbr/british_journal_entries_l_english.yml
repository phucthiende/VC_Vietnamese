l_english:
 dlc_vc:0 "Victorian Century"
 dlc_vc_desc:0 "The coronation of Queen Victoria marked the dawn of a truly resplendent age. Beneath the radiant brilliance of the Pax Britannica, the First Industrial Revolution was drawing to its close, ushering in an era of unprecedented urban prosperity. On the European Continent, the venerable Austrian statesman Metternich had carefully fashioned the Congress of Vienna, a bastion of the old order, striving to hold back the surging tides of revolution.\nThe anguish wrought by the Napoleonic Wars had at last subsided, and through compromise the great powers secured for war-weary Europe a fleeting season of peace. Yet though the flames of revolution were, for a time, subdued, the ideals of nationalism and liberalism remained vibrantly alive. In this age of unparalleled scientific advance, men and women alike began to question the inherited certainties of their forebears, and to forge new creeds for a changing world.\n\n@green_checkmark!Victorian Century #G Enabled#!\n\n@information!This is an enabled #blue Mod#!\n\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"
 MDF_MOD_DLC_BUTTON_TOOLTIP:0 "#V Victorian Century#!\nThe coronation of Queen Victoria marked the dawn of a truly resplendent age. Beneath the radiant brilliance of the Pax Britannica, the First Industrial Revolution was drawing to its close, ushering in an era of unprecedented urban prosperity. On the European Continent, the venerable Austrian statesman Metternich had carefully fashioned the Congress of Vienna, a bastion of the old order, striving to hold back the surging tides of revolution.\nThe anguish wrought by the Napoleonic Wars had at last subsided, and through compromise the great powers secured for war-weary Europe a fleeting season of peace. Yet though the flames of revolution were, for a time, subdued, the ideals of nationalism and liberalism remained vibrantly alive. In this age of unparalleled scientific advance, men and women alike began to question the inherited certainties of their forebears, and to forge new creeds for a changing world.\n\n@green_checkmark!Victorian Century #G Enabled#!\n\n@information!This is an enabled #blue Mod#!\n\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"

 stabilize_british_empire:0 "Rule, Britannia!"
 stabilize_british_empire_reason:0 "Since the #bold Congress of Vienna in 1815#!, [ROOT.GetCountry.GetName] has flourished as a global power, and today, she stands unchallenged as the #bold mightiest empire#! the world has ever seen. Her influence stretches across continents, shaping the #bold world order#! to serve imperial ambitions.\n\nBeneath the radiant glow of the #bold Pax Britannica#!, our once-formidable rivals—from [SCOPE.sCountry('FRA_scope').GetName] to [SCOPE.sCountry('SPA_scope').GetName] and even [SCOPE.sCountry('NET_scope').GetName]—have faded into obscurity, bowing before the #bold sun that never sets#!. Though shadows of exploitation linger in the Empire’s corners, what of it? #bold Even the poorest laborers of London’s East End#! swell with pride at Britain’s industrial might; the world is bound together by our [concept_market], from the #bold plains of North America to the tea gardens of China#!, from the #bold coffee plantations of the Caribbean to the goldfields of Australia#!. Our #bold wealth and glory#! define this era.\n\nYet complacency is folly. To safeguard our [concept_colony] and borders, #bold further expansion is imperative#!. The Empire remains a patchwork of local interests, [concept_company] ventures, and restless [concept_dominion]s—its future uncertain. To secure our supremacy, #bold a combination of diplomacy and force must be employed#!.\n\nWith dominion over vast lands and peoples comes the duty to govern. #variable Rule, Britannia!#!"
 stabilize_british_empire_complete_1_tt:0 "Achieve at least 50 [concept_relations] with 5 Canadian [concept_subject]s.\nIf insufficient subjects exist, this cannot be completed!"
 stabilize_british_empire_complete_2_tt:0 "Achieve at least 50 [concept_relations] with 3 Australian [concept_subject]s.\nIf insufficient subjects exist, this cannot be completed!"
 stabilize_british_empire_complete_5_tt:0 "Achieve at least 50 [concept_relations] with 1 Boer [concept_subject].\nIf no Boer subjects exist, this cannot be completed!"
 stabilize_british_empire_complete_3_tt:0 "Achieve at least 50 [concept_relations] with Indian #bold princely states or chartered companies#!."
 stabilize_british_empire_complete_3_india_tt:0 "The entire [concept_indian_subcontinent] must be under your control or ruled by #bold princely [concept_subject]s#!."
 stabilize_british_empire_complete_4_tt:0 "Complete three #variable Unify the Subcontinent#! [Concept('concept_journal_entry', '$concept_journal_entries$')] objectives."
 stabilize_british_empire_on_complete_tt:0 "This will convene an Imperial Conference in London to debate the Empire’s future."
 stabilize_british_empire_on_complete_2_tt:0 "You and each of your [concept_subject]s of [GetCulture('british').GetName], [GetCulture('anglo_canadian').GetName], [GetCulture('franco_canadian').GetName], [GetCulture('australian').GetName], and [GetCulture('boer').GetName] will receive the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#! modifier."
 stabilize_british_empire_modifier_effects_tt:0 "[GetStaticModifier('gbr_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('gbr_achievement_of_the_empire').GetDesc]"
 stabilize_british_empire_status:0 "#bold Secure the Stability of the British Empire#!"
 choose_british_empire_act_event_1_tt:0 "We shall adopt the Imperial Federation as the future of the British Empire."
 choose_british_empire_act_event_2_tt:0 "We shall adopt the Dominion Autonomy model for the British Empire."

 conqueror_burma:0 "Unify the Subcontinent: Conquer Burma"
 conqueror_burma_reason:0 "“The question is not how much you will cede, but how much we will deign to leave you... We shall inform your people that the territories once ruled by your king now belong to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s dominions. Henceforth, governors and officials shall be appointed at [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s pleasure—and you have no choice but to comply.”\n\nAfter the #bold Treaty of Yandabo (1826)#!, [SCOPE.sCountry('BUR_scope').GetName] ceded Arakan to the East India Company. Yet Burma remains unconquered. To secure [ROOT.GetCountry.GetName]’s interests in Indochina, we must annex its lands in full."
 gbr_burma_disappear_tt:0 "Burma no longer exists or is now our subject."
 conqueror_punjab:0 "Unify the Subcontinent: The River Valleys"
 conqueror_punjab_reason:0 "Since the #bold Anglo-Maratha Wars (1803–1818)#!, our frontier has edged toward the #bold Indus Valley#!—a breadbasket of the subcontinent. The [SCOPE.sCountry('PAN_scope').GetName] boasts a vast but ill-disciplined army, while their aging Maharaja’s court drowns in intrigue. As for [SCOPE.sCountry('SND_scope').GetName], their weakness is manifest. Now is the time to march into Sindh and Punjab!"
 gbr_punjab_disappear_tt:0 "The Sikh Empire no longer exist."
 british_empire_conqueror_punjab_button:0 "Enforce the Doctrine of Lapse in Punjab"
 british_empire_conqueror_punjab_button_desc:0 "We shall establish administrative control over Punjab’s borderlands, integrating them with Delhi. The local princely states are obstacles—but isolated. Let us dispatch commissioners to annex their lands outright."
 conqueror_baluchistan:0 "Unify the Subcontinent: The Afghan Frontier"
 conqueror_baluchistan_reason:0 "The arid mountains of #bold Baluchistan#! offer little economic value, yet their strategic position as the #bold gateway to India#! is undeniable. Rumors suggest the #variable Emirs of Afghanistan#! seek to reclaim these lands as part of the defunct #variable Durrani Empire#!. We cannot allow this—the Khan of Kalat must submit to British authority!"
 gbr_baluchistan_disappear_tt:0 "Kalat and Makran no longer exist."

 british_empire:0 "Imperial Federation"
 british_empire_reason:0 "The bonds linking [ROOT.GetCountry.GetName]’s territories extend beyond geography—they are ties of shared [concept_culture] and [concept_religion]. Yet our potential is squandered by the Empire’s #bold fractured governance#!: no unified policy, no central direction, and no #bold permanent cohesion#!.\n\nThis cannot endure. As rival [concept_great_power]s rise and [concept_dominion]s develop #bold troubling national identities#!, we must consolidate. Advances in [concept_technology] make a global superstate feasible.\n\nThe #bold Imperial Federation#! would unite the Empire under a shared parliament, while regional legislatures preserve local autonomy. Westminster would evolve into a purely imperial [concept_institution]. Only through such unity can we maintain hegemony.#variable Rule, Britannia!#!"
 british_empire_possible_tt:0 "#bold The Imperial Federation proposal has passed in Parliament#!"
 rise_of_empire_tt:0 "Complete 4 #variable British Empire#! [Concept('concept_journal_entry', '$concept_journal_entries$')] objectives."
 rise_of_empire_2_tt:0 "We shall unite our colonies into a singular Imperial Federation."
 rise_of_empire_3_tt:0 "If you and all your [concept_subject]s have the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#! modifier, it will be upgraded to #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_modifier_effects_tt $imp_achievement_of_the_empire$#!."
 rise_of_empire_modifier_effects_tt:0 "[GetStaticModifier('imp_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('imp_achievement_of_the_empire').GetDesc]"
 rise_of_empire_4_tt:0 "If you and all your [concept_subject]s have the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#! modifier, it will be upgraded to #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_2_modifier_effects_tt $wsm_achievement_of_the_empire$#!."
 rise_of_empire_2_modifier_effects_tt:0 "[GetStaticModifier('wsm_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('wsm_achievement_of_the_empire').GetDesc]"
 rise_of_dominition_tt:0 "If we fail to centralize the Empire, we must grant greater autonomy to the dominions."
 british_empire_status:0 "#V #O #B Unify all overseas territories under London’s direct authority#!#!#!"
 allow_to_form_imp_tt:0 "#bold We may now form the Imperial Federation#!"
 british_empire_complete_2_tt:0 "Completed the #variable Irish Question#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."

 british_dominion_act:0 "Dominion Autonomy"
 british_dominion_act_reason:0 "What made the #bold British Empire mighty#! was never territorial control alone, but the #bold civilizing mission, daring, and strength#! of imperial rule. Our Empire thrives on #bold diversity#!—its unity forged by shared [concept_culture]. Yet as our borders expanded to unprecedented glory, the #bold administrative chaos#! within grew dire: Canada splintered into disjointed provinces, Australia governed by the whims of local [concept_bureaucrats], South Africa indifferent to imperial authority, and the East India Company’s grip on the [concept_indian_subcontinent] weakening by the day. Each flaw threatens to unravel the Empire.\n\nThis cannot continue. As rival [concept_great_power]s rise and [concept_colony]s develop #bold national identities#!, we must redesign the imperial system—to reap maximum gains at minimal cost.\n\nThe #bold Dominion Autonomy#! model offers a solution: fragmented [concept_colony]s will unite as self-governing [concept_dominion]s under imperial leadership. They will benefit from our [concept_market] while fueling British industry, raise their own armies to defend imperial interests, and stand firm when [concept_war] comes.\n\nOnly a #bold free people#! can unleash their full potential. By heeding calls for autonomy, we forge a #bold shared imperial identity#! to maintain global supremacy. #variable Rule, Britannia!#!"
 british_dominion_act_possible_tt:0 "#bold The Dominion Autonomy proposal has passed in Parliament#!"
 british_dominion_act_complete_tt:0 "Complete 4 #variable Autonomy Acts#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."
 british_dominion_act_on_complete_tt:0 "The Dominions shall emerge as cohesive entities, bound closer to the Crown."
 british_dominion_act_complete_2_tt:0 "Resolved the #variable Irish Question#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."
 british_dominion_act_status:0 "#V #U #B Integrate all overseas territories as self-governing Dominions#!#!#!"
 british_dominion_act_complete_3_tt:0 "#bold Canada, Australia, and South Africa#! exist as unified states."
 british_dominion_country_unify_1_tt:0 "Canada has been established and exists."
 british_dominion_country_unify_2_tt:0 "Australia has been established and exists."
 british_dominion_country_unify_3_tt:0 "South Africa has been established and exists."

 british_dominion_canada:0 "Autonomy Act: Canadian Confederation"
 british_dominion_canada_reason:0 "Since #bold Sir Humphrey Gilbert claimed Newfoundland in 1583#!, Canada has been [ROOT.GetCountry.GetName]’s oldest overseas possession. The #bold Constitutional Act of 1791#! divided British North America into fractured provinces, with the vast Hudson’s Bay Company ([SCOPE.sCountry('HBC_scope').GetName]) ruling under royal charter. Other territories answer to separate governors, lacking unity or cooperation.\n\nNow, as our southern neighbor [SCOPE.sCountry('USA_scope').GetName] grows ever stronger, Canadian nationalists urge London to unite the colonies into a loyal [concept_dominion]—to safeguard prosperity and imperial interests in North America.\n\nA unified Canada would serve the Empire far better than this patchwork of dependencies. We must heed their call and forge a true federal Dominion under the Crown."
 british_dominion_canada_tt:0 "Canada shall adopt a new autonomous constitution."

 british_dominion_australia:0 "Autonomy Act: Australian Federation"
 british_dominion_australia_reason:0 "Decades have passed since #bold Captain Cook#! planted the Union Jack on Australian shores from the #bold HMS Endeavour#!. Though #bold Governor Arthur Phillip#! and the #bold First Fleet#! envisioned #bold New South Wales#! as a land of boundless wealth, much of Australia remains untamed—a #bold distant penal colony#! known more for its kangaroos than its resources. Yet these lands are vital to imperial strategy in the Pacific.\n\nNow, as a distinct Australian identity emerges, reformers demand unification of the scattered [concept_colony]s into a single [concept_dominion], loyal to the Empire but self-governing. A federated Australia could transform this colonial backwater into an asset.\n\nWe must act, lest disunity weaken our Pacific stronghold."
 british_dominion_australia_tt:0 "Australia shall adopt a new autonomous constitution."

 british_dominion_aferica:0 "自治法案：南非联邦"
 british_dominion_aferica_reason:0 "The #bold Anglo-Dutch Treaty of 1814#! cemented [ROOT.GetCountry.GetName]’s control over the Cape Colony, forcing [SCOPE.sCountry('NET_scope').GetName] to surrender its southern African holdings. Today, [SCOPE.sCountry('SAF_scope').GetName] is the linchpin of imperial trade between Europe and Asia—yet Dutch settlers, fleeing British rule, have established the rogue republics of [SCOPE.sCountry('ORA_scope').GetName] and [SCOPE.sCountry('TRN_scope').GetName] inland.\n\nTo secure our shipping lanes and enable further expansion, we must crush these Boer states and unify South Africa’s fractured colonies into a single [concept_dominion]. Only then can we resolve the #bold racial tensions#! festering in this strategic jewel."
 british_dominion_aferica_tt:0 "South Africa shall adopt a new autonomous constitution."

 british_dominion_india:0 "Autonomy Act: British India"
 british_dominion_india_reason:0 "From the #bold Battle of Plassey#!—where [SCOPE.sCountry('BIC_scope').GetName] began its conquest—to the near-total subjugation of the [concept_indian_subcontinent] under [ROOT.GetCountry.GetName]’s crown, India has become the Empire’s most prized possession. It fuels our economy and garrisons our armies.\n\nYet the East India Company’s rule is rotten: #bold incompetent administration#! and #bold greedy shareholders#! tarnish this jewel. Left unchecked, their misrule may spark rebellion.\n\nWe must dismantle Company authority, purge its corruption, and appoint a Viceroy to govern through loyal princely states and provincial councils. India must remain shackled to the imperial system—for without it, we would be but a #bold third-rate power#!.\n\n#bold Only through autocracy can we extract what Britain demands!#!"
 british_dominion_india_tt:0 "If the #variable East India Stock Redemption#! is enacted via the *Dividend Redemption Act*, India may become a [concept_puppet].\nOtherwise, it will be reorganized as a [concept_british_dominion]."
 british_dominion_india_1_tt:0 "Completed the #variable East India Stock Redemption#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."

 british_empire_canada:0 "British Empire: Canadian Administration"
 british_empire_canada_reason:0 "Since #bold Sir Humphrey Gilbert established St. John's in Newfoundland in 1583#!, Canada has been [ROOT.GetCountry.GetName]'s oldest overseas possession. The #bold Constitutional Act of 1791#! divided British North America into multiple provinces, with the vast Hudson's Bay territories administered under #bold Royal Charter#! by [SCOPE.sCountry('HBC_scope').GetName]. Other regions remain under separate governors, united only by their #bold extensive autonomy#!.\n\nNow, as our southern neighbor [SCOPE.sCountry('USA_scope').GetName] grows increasingly powerful, imperial federalists in Canada urge London to integrate them into a unified sovereign state—to bolster imperial defense and trade.\n\nCanada's growing agricultural and economic importance demands stronger ties. Only shared #bold British culture and values#! can cement imperial unity. We must eliminate nationalist tendencies and truly make Canada #bold part of the British Empire#!."
 adm_canada_tt:0 "We will have to advance Canadian autonomy and eventually transfer power to self-government."
 gbr_strong_1_tt:0 "Canadian lands will come under London's direct rule."

 british_empire_australia:0 "British Empire: Australian Administration"
 british_empire_australia_reason:0 "Decades have passed since #bold Captain Cook#! claimed Australia from the decks of #bold HMS Endeavour#!. Though #bold Governor Arthur Phillip#! and the #bold First Fleet#! envisioned #bold New South Wales#! as a land of boundless wealth, much of Australia remains a #bold distant penal colony#!—known more for its guano and kangaroos than prosperity. Yet these territories are vital to our Pacific strategy.\n\nDespite emerging #bold nationalist#! murmurs, Australians still value [ROOT.GetCountry.GetName]'s military protection, cultural ties, and economic opportunities as keys to their #bold security and prosperity#!. This grants us a chance to forge a stronger political and economic union.\n\nWe must reinforce these bonds to ensure Australia's #bold continued loyalty#! to the Empire."
 adm_australia_tt:0 "We will have to advance Australian autonomy and eventually transfer power to self-government."
 gbr_strong_2_tt:0 "Australian lands will come under London's direct rule."

 british_empire_ireland:0 "The Irish Question"
 british_empire_ireland_reason:0 "Since #bold King Henry VIII#! imposed direct rule in 1542, these so-called #bold 'His Majesty's Irish'#! have resisted [ROOT.GetCountry.GetName]'s authority. [concept_religion] and [concept_discrimination] have fractured relations—even the #bold Act of Union 1800#! failed to fully integrate Ireland into the United Kingdom.\n\nSome in [concept_government] argue force cannot solve this ancient problem. As Ireland is legally part of the Union, concessions may better secure this land that lies at [ROOT.GetCountry.GetName]'s very doorstep.\n\nYet any such compromise will inevitably be paid for by England itself."
 adm_ireland_tt:0 "If unresolved, Ireland may seek independence in the future."
 gbr_strong_4_tt:0 "By securing Ireland's status, it will be fully incorporated into the Union with no further separatist movements."
 british_empire_ireland_complete_tt:0 "#bold Successfully resolved#! either the #bold Irish Famine Threat#! or #bold Great Irish Famine#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 british_empire_ireland_complete_2_tt:0 "Crushed Ireland's independence movement."
 loss_irish_rebellion_tt:0 "Ireland has won its war for independence."

 british_empire_aferica:0 "大英帝国：南非行政"
 british_empire_aferica_reason:0 "The #bold Anglo-Dutch Treaty of 1814#! secured [ROOT.GetCountry.GetName]'s control over the Cape Colony, forcing [SCOPE.sCountry('NET_scope').GetName] to surrender its southern African holdings. Today, [SCOPE.sCountry('SAF_scope').GetName] is vital to imperial shipping routes between Asia and Europe.\n\nYet Dutch settlers have fled inland, establishing the rogue republics of [SCOPE.sCountry('ORA_scope').GetName] and [SCOPE.sCountry('TRN_scope').GetName]. To safeguard our trade lanes and enable further African expansion, we must eliminate these threats—abolishing local autonomy and transforming South Africa into a directly ruled imperial territory."
 adm_aferica_tt:0 "We will lose opportunities to leverage South Africa for imperial finance."
 gbr_strong_3_tt:0 "South Africa's resources will fuel the Empire's economic prosperity."

 british_empire_india:0 "British Empire: Jewel in the Crown"
 british_empire_india_reason:0 "From the #bold Battle of Plassey (1757)#!—where [SCOPE.sCountry('BIC_scope').GetName] began its conquest—to the near-total subjugation of the [concept_indian_subcontinent], India has become the Empire's most valuable possession, crucial to both military strategy and economic might.\n\nYet the East India Company's rule is plagued by #bold administrative chaos#! and #bold shortsighted shareholders#!. Left unchecked, this misrule may spark catastrophe.\n\nWe must reform India's governance, crush all dissent, and transform this rich land into a directly administered, stable cornerstone of the Empire.\n\nWith India, we rule the world; without it, we become a #bold third-rate power#!. #bold Only autocracy can extract what Britain demands!#!"
 adm_india_tt:0 "Granting India freedom will only fuel demands for greater privileges."
 gbr_strong_5_tt:0 "If directly controlled when completed, the #variable India Office#! may be established.\nIf controlled by a [concept_subject], it will become a [concept_british_dominion]."
 british_empire_india_complete_1_tt:0 "You or your Indian #bold [concept_colony_subject] or [concept_chartered_company]#! [concept_subject] rule the entire [concept_indian_subcontinent]."
 british_empire_india_complete_2_tt:0 "Your Indian [concept_subject] has completed #variable Consolidating Imperial Rule#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 british_empire_india_fail_tt:0 "Your Indian [concept_subject] failed in #variable Consolidating Imperial Rule#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 gbr_strong_5_complete_tt:0 "Resolved the #variable East India Stock Redemption#! [Concept('concept_journal_entry', '$concept_journal_entries$')].\nIf completed via the *Dividend Redemption Act*, we may bypass Company interests to rule India directly."
 british_empire_india_button:0 "Doctrine of Lapse"
 british_empire_india_button_desc:0 "Under this principle, we may annex lands of incompetent or heirless native rulers—an opportunity to expand direct control."
 british_empire_india_button_tt:0 "No #bold Doctrine of Lapse#! enacted in the past 6 months."
 british_india_populaion_growth_tt:0 "We will further promote population growth in India."
 bic_annex_princely_states_tt:0 "We will order #yellow India#! to revoke the administrative autonomy of all Princely States and annex them into the Indian administration; however, the privileges of each state will still be preserved."
 gbr_annex_princely_states_tt:0 "We will request #B Whitehall#! to revoke the administrative autonomy of all Indian Princely States and annex them into the central administration; however, the privileges of each state will still be preserved."

 ireland_food_problem:0 "Irish Famine Threat"
 ireland_food_problem_reason:0 "Despite the #bold Catholic Emancipation Act of 1829#! ending religious [concept_discrimination], most Irish Catholics remain impoverished, dependent on #bold potato monoculture#!.\n\nOur census officials report a #bold new blight#! observed since 1821—likely Phytophthora infestans—already causing #bold sporadic crop failures#!. The 1834 outbreaks of dry rot and leaf curl in Ulster prove potatoes are #bold dangerously unreliable#!. Should famine strike, Ireland's #v $peasants$#! face devastation.\n\nWe must prepare contingency measures to ensure food security."
 ireland_food_problem_1_tt:0 "This will ensure Ireland is prepared for agricultural crises!\nIf averted, Ireland may #bold truly integrate into the Union.#!"
 ireland_food_problem_2_tt:0 "This will leave Ireland defenseless against crop failures!\nIf famine occurs, it may #bold trigger catastrophic unrest.#!"

 ireland_major_famine:0 "The Great Irish Famine"
 ireland_major_famine_status:0 "#N #B A terrible famine ravages Ireland#!#!"
 ireland_major_famine_reason:0 "Due to governmental neglect, a new [concept_famine] has struck Ireland - the worst since the #bold 1739-41 famine#!. A mysterious blight causes potatoes to rot in the fields, bringing unspeakable suffering to the Irish people. They beg [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s government for extraordinary relief measures."
 ireland_famine_solved_tt:0 "Implement any necessary relief measures to swiftly end the famine"
 ireland_famine_fail_tt:0 "Though the famine may eventually pass, its scars upon Ireland will never heal..."

 irish_rebellion:0 "Irish Rebellion"
 irish_rebellion_reason:0 "Despite being [ROOT.GetCountry.GetName]'s nearest neighbor and part of the Union, Ireland has long been treated as little more than a [concept_colony]. The lingering trauma of famine combined with growing nationalist sentiment has finally boiled over into open rebellion. We cannot compromise - we must #bold crush this threat on our very doorstep#! once and for all."
 end_irish_rebellion_tt:0 "Military suppression is our final chance to stabilize Ireland.\nThe Imperial Federation will require us to successfully quell this rebellion."

 conqueror_egypt:0 "Conquest of Egypt"
 conqueror_egypt_reason:0 ""Control of Egypt would undoubtedly serve our interests by advancing two immediate objectives: the dissolution of Muslim power and the expulsion of [SCOPE.sCountry('TUR_scope').GetName] from North Africa."\n\n"#bold Muhammad Ali#!'s breakaway state threatens [ROOT.GetCountry.GetName]'s Mediterranean and Indian positions... while disrupting our trade routes. These Arabs prove #bold even more unstable#! than the Turks. Yet with other powers circling, we might strike first - reducing the Egyptian Sultan to a London-controlled puppet, his realm carved into harmless governorates."\n\nEgypt is the #bold vital link between Mediterranean and Red Sea#!. The weak [SCOPE.sCountry('EGY_scope').GetName] regime misrules here, while [SCOPE.sCountry('TUR_scope').GetName] absurdly claims sovereignty. This error must be corrected by bringing Egypt under [ROOT.GetCountry.GetName]'s direct rule."
 conqueror_egypt_tt:0 "Egypt's strategic position would greatly benefit our global empire."
 conqueror_egypt_status:0 "Incorporate Suez and Egypt into our Mediterranean assets."

 conqueror_aferica:0 "From Cairo to Cape Town"
 conqueror_aferica_reason:0 ""Mr. Rhodes declares his intention to push north from #bold Pretoria#! - crossing the Zambezi, through Nyasaland, past Lake Tanganyika to Uganda. But this is merely the beginning... His grand expedition would traverse Sudan... completing an overland route from Cape Town to Cairo - all to be claimed for [ROOT.GetCountry.GetName]'s African dominions."\n\nWith our South African position secured, #bold Dr. Rhodes#! - Oxford-educated diamond magnate - has proposed this audacious plan to Whitehall: #bold a vertical conquest of Africa from Egypt to the Cape#!, uniting our continental holdings in Africa.\n\nThe challenges are immense - not just native resistance but rival [concept_great_power]s coveting these lands. Yet if achieved, it would provide [ROOT.GetCountry.GetName] with unparalleled strategic advantages..."
 conqueror_aferica_tt:0 "Complete the #bold Conquest of Egypt#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 conqueror_aferica_status:0 "Connect Britain's African territories into one continuous domain."

 indian_major_railway:0 "Great Indian Peninsula Railway"
 indian_major_railway_reason:0 "The #bold [concept_indian_subcontinent]#!'s vast size and difficult terrain make transportation notoriously inefficient. Without proper infrastructure, India's wealth remains locked away.\n\nThe #variable India Office#! has submitted an ambitious proposal to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s [concept_government] and [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]: a #bold trans-subcontinental railway#! that would revolutionize Indian transport. Though engineering challenges abound, its completion would provide #bold unprecedented economic benefits#!."
 indian_major_railway_tt:0 "The railway's completion will dramatically boost India's economy..."
 indian_major_railway_status:0 "Construct a subcontinent-spanning railway to transform Indian transportation."

 anglo_american_special_relationship:0 "The Anglo-American Special Relationship"
 anglo_american_special_relationship_status:0 "#bold #U Blood is Thicker Than Water: The Bond of Anglo-American Cooperation.#!#!"
 anglo_american_special_relationship_reason:0 "Since the Thirteen Colonies gained independence as [SCOPE.sCountry('USA_scope').GetName], [ROOT.GetCountry.GetName] and [SCOPE.sCountry('USA_scope').GetName] have shared a complex relationship. Though our nations were once locked in prolonged rivalry—from the War of 1812 to economic competition—the #variable Great Rapprochement of the late 19th century#! has turned the page. Today, we collaborate closely in trade, industry, and academia, forging the unique partnership we now enjoy.\n\nIn this unpredictable world, one truth remains: #bold the closest and most reliable kinship#!—rooted in shared [concept_culture], common ancestry, and the legacy of English law. As Prime Minister Salisbury remarked in 1895, '#variable Two nations divided by a common language, united by a common destiny.#!' Our peoples are bound by ideals and purpose, making this alliance truly exceptional. Let us stand as one:\n\nAs General #bold Joseph Taylor#! declared during the Oregon Crisis:\n\n#variable Blood is thicker than water!#!"
 has_usa_gbr_treaty:0 "Our nations have signed the amicable Oregon Treaty."
 anglo_investment_1_button:0 "Increase Investments in America"
 anglo_investment_1_button_desc:0 "[SCOPE.sCountry('USA_scope').GetName] has proven a land of immense potential. Our industrialists argue that targeted investments could spur their economic growth—and secure future profits for [ROOT.GetCountry.GetName]."
 anglo_investment_1_button_tt:0 "No US investments/divestments in 5 years\nGains 25 Investment Points"
 anglo_investment_2_button:0 "Plan Divestment from America"
 anglo_investment_2_button_desc:0 "Some industrialists dismiss [SCOPE.sCountry('USA_scope').GetName]'s prospects. They urge repatriating capital to [ROOT.GetCountry.GetName], claiming domestic ventures offer steadier returns."
 anglo_investment_2_button_tt:0 "No divestments/investments in 5 years, and ≥25 Investment Points\nLoses 25 Investment Points"
 anglo_help_1_button:0 "Request American Industrial Aid"
 anglo_help_1_button_desc:0 "Our industries face temporary shortfalls, while [SCOPE.sCountry('USA_scope').GetName] thrives. Given our leverage there, persuading their magnates to share machinery or expertise should be feasible."
 anglo_help_1_button_tt:0 "No industrial/military aid requests in 5 years, and ≥50 Investment Points\nLoses 50 Investment Points"
 anglo_help_2_button:0 "Request American Military Supplies"
 anglo_help_2_button_desc:0 "Our armaments cannot meet wartime demands, but [SCOPE.sCountry('USA_scope').GetName]'s stockpiles overflow. They propose leasing equipment in exchange for liquidating some [ROOT.GetCountry.GetName] assets abroad."
 anglo_help_2_button_tt:0 "No military/industrial aid requests in 5 years, and ≥50 Investment Points\nLoses 50 Investment Points"
 anglo_help_3_button:0 "Draft a Lend-Lease Act"
 anglo_help_3_button_desc:0 "The empire teeters on the brink. With enemies advancing, we must sacrifice all foreign holdings to secure immediate aid from [SCOPE.sCountry('USA_scope').GetName]—even if it means bankrupting our overseas interests."
 anglo_help_3_button_tt:0 "The Lend-Lease Act is a last resort! Usable once per 25 years, and requires 100 Investment Points\nLoses 100 Investment Points"
 anglo_american_special_relationship_tt:0 "Investing in America accumulates #bold Investment Points#!, unlocking critical support later. Divestment yields short-term gains at long-term cost. At sufficient investment levels, we may trade assets for wartime aid."
 anglo_american_special_relationship_2_tt:0 "#bold Increase Investments#!: +25 Investment Points.\n#bold Divest#!: -25 Points.\n#bold Request Industrial Aid#! or #bold Military Supplies#!: -50 Points.\n#bold Lend-Lease Act#!: -100 Points (powerful but with consequences).\nCurrent points shown in the log."
 anglo_cash_1_button:0 "Request American Loans"
 anglo_cash_1_button_desc:0 "With our treasury strained, we might secure an interest-free—or even forgiven—'loan' from our allies. Wall Street, however, will grumble."
 anglo_cash_1_button_tt:0 "The Americans may refuse...\nOnly once per 5 years."
 invest_in_us_1_tt:0 "#bold Gain 25 Investment Points#!"
 invest_in_us_2_tt:0 "#bold Lose 25 Investment Points#!"
 usa_refuse_relation:0 "We reject Britain's overtures, closing the door on the #bold Anglo-American Special Relationship#!."
 usa_accpet_relation:0 "We accept Britain's proposal, unlocking #bold Special Relationship#! mechanics."
 anglo_help_need_25_tt:0 "Requires ≥25 Investment Points"
 anglo_help_need_50_tt:0 "Requires ≥50 Investment Points"
 anglo_help_need_100_tt:0 "Requires ≥100 Investment Points"

 oak_loyal:0 "Royal Navy"
 oak_loyal_status:0 "#V #U #B The First Lord of the Admiralty decrees through the Naval Council.#!#!#!"
 oak_loyal_reason:0 "#bold Naval Budget#! is shaped by #tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_advance positive#! and #tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_delete negative#! factors.\n\n#variable The Royal Navy#!—[ROOT.GetCountry.GetName]'s pride and the #variable 'Wooden Wall'#! defending the realm since Henry VII—has been the cornerstone of imperial power. At #bold the battle of Trafalgar in 1805#!, #bold Admiral Nelson#! shattered the Franco-Spanish fleet, securing Britain's #variable naval supremacy#! for a century.\n\nMaintaining this #bold cutting-edge fleet#! and its #bold veteran crews#! consumes vast budgets, but ensures global dominance. Directed by the #bold Admiralty Board#! under the #bold First Lord#!, it remains loyal to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s Government.\n\nYet new rivals emerge. To keep our [concept_fleet] unmatched, we must adapt—for as the saying goes, #variable 'The British Empire's borders lie at the Himalayas!'#!\n\nHail our glory, men!\nWe summon you to guard our free shores;\nHearts of oak, our ships of war,\nSailors bold, our swords ashore,\nWho dares match the sons of the waves?"
 oak_loyal_tt_1:0 "Naval supremacy underpins our empire. The Royal Navy must outmatch all rivals."
 oak_loyal_tt_2:0 "#bold Fleet Maneuvers#! or #bold Seek Battle#!: 25#bold Naval Budget#!.\n#bold New Capital Ships#! or #bold Two-Power Standard#!: 100#bold Budget#!.\n#bold Expand Dockyards#!: 50#bold Budget#!.\n#bold Sell Dockyards#!: +25#bold Budget#!."
 oak_loyal_1_button:0 "Conduct Fleet Maneuvers"
 oak_loyal_1_button_desc:0 "A navy rusts in port. To maintain readiness, exercises in the North Sea, Mediterranean, or distant Indies are essential—but where to deploy?"
 loyal_navy_1_tt:0 "Maneuvers are taxing! Once per 5 years."
 oak_loyal_2_button:0 "Seek Decisive Battle"
 oak_loyal_2_button_desc:0 "Our dreadnoughts are mighty, but strategy wins wars. Order the Admiralty to plot a crushing strike—when conditions favor us, we'll hunt the enemy fleet and destroy it!"
 loyal_navy_2_tt:0 "The fleet needs resupply. No repeat orders for 1 year."
 oak_loyal_3_button:0 "Commission Capital Ships"
 oak_loyal_3_button_desc:0 "Out with the old! Our sailors deserve modern vessels. Allocate funds to launch new battleships—the Admiralty already has names prepared."
 loyal_navy_3_tt:0 "Shipbuilding takes time. Once per 5 years."
 oak_loyal_4_button:0 "Enforce Two-Power Standard"
 oak_loyal_4_button_desc:0 "Parliament's Naval Defence Act (1889) demands our fleet exceed the next two largest navies combined. Meeting this requires dockyards at full capacity."
 loyal_navy_4_tt:0 "Parliamentary patience wears thin. Once per 10 years."
 oak_loyal_5_button:0 "Expand Royal Dockyards"
 oak_loyal_5_button_desc:0 "Our shipyards groan under expansion plans. New drydocks at Portsmouth or Devonport could ease the strain."
 loyal_navy_5_tt:0 "#yellow Armstrong-Whitworth#! will expand facilities. No sales for 2 years."
 oak_loyal_6_button:0 "Sell Royal Dockyards"
 oak_loyal_6_button_desc:0 "Surplus dockyards drain resources. Privatizing some may streamline operations."
 loyal_navy_6_tt:0 "#yellow Armstrong-Whitworth#! will sell assets. No expansions for 1 years."
 loyal_navy_tooltip_advance:0 "#bold Monthly Naval Budget Gains#!:\n•#variable At War#!\n•#variable [GetLawType('law_professional_army').GetName]#!\n•#variable [GetLawType('law_mass_conscription').GetName]#!\n•#variable [GetLawType('law_monarchy').GetName]#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName][concept_approval] ≥0#!\n•#variable Industrialists in Government#!\n•#variable Industrialists are [concept_powerful]#!"
 loyal_navy_tooltip_delete:0 "#bold Monthly Naval Budget Losses#!:\n•#variable Industrialist [concept_approval] ≤-5#!\n•#variable Industrialists [concept_marginalized]#!\n•#variable Industrialists not in Government#!\n•#variable Not a Monarchy#!\n•#variable [concept_rank] <[concept_great_power]#!"
 loyal_navy_earn_tt:0 "Gain 25#bold Naval Budget#!"
 loyal_navy_50_tt:0 "Lose 50#bold Naval Budget#!"
 loyal_navy_25_tt:0 "Lose 25#bold Naval Budget#!"
 loyal_navy_100_tt:0 "Lose 100#bold Naval Budget#!"
 loyal_navy_cash_tt_50:0 "Requires 50#bold Naval Budget#!"
 loyal_navy_cash_tt_25:0 "Requires 25#bold Naval Budget#!"
 loyal_navy_cash_tt_100:0 "Requires 100#bold Naval Budget#!"

 indian_office:0 "India Office"
 indian_office_reason:0 "India now falls under the direct rule of [ROOT.GetCountry.GetName], administered by the #bold Secretary of State for India#!—appointed by the Prime Minister—replacing the former Governors of Calcutta and Delhi. This office governs the [concept_indian_subcontinent] in the name of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s Government.\n\nUnder the #bold Government of India Act#!, local administration is divided between #bold nominally autonomous princely states#! and #bold loyal native officials#! supervised by the India Office, all appointed by the Cabinet Secretary. This system ensures London's #bold iron grip#! over the [concept_indian_subcontinent], though it complicates governance. Whitehall has assured full support for this imperial project.\n\n#bold May this prudent governance endure for generations!#!"
 indian_office_1_tt:0 "Governing India is fraught with challenges. Whether through diplomacy or force, maintaining #bold subcontinental stability#! and preempting threats remains the India Office's paramount duty."
 indian_office_2_tt:0 "#bold Deploying Administrators#! or #bold Suppressing Dissent#!: +10 Stability.\n#bold Imposing Mahalwari Land Tax#! or #bold Hastings' Salt Tax#!: -20 Stability.\nCurrent stability shown in the log."
 indian_office_3_tt:0 "If stability falls to 0, London must repeal the Government of India Act and reinstate a Viceroy."
 indian_office_1_button:0 "Deploy Additional Administrators"
 indian_office_1_button_desc:0 "The Indian bureaucracy is understaffed. Sending fresh civil servants from the Home Civil Service could improve efficiency."
 indian_office_1_button_tt:0 "+100 Indian Stability\nOnly once per 10 years!"
 indian_office_2_button:0 "Suppress Dissent"
 indian_office_2_button_desc:0 "Sedition lurks among the discontented masses. The Raj must act decisively—show them the cost of rebellion."
 indian_office_2_button_tt:0 "+50 Indian Stability\nOnly once per 5 years!"
 indian_office_2_button_effect_tt:0 "所有[concept_indian_subcontinent]的省份都将获得一个修正，效果展示如下："
 indian_office_3_button:0 "Impose Mahalwari Land Tax"
 indian_office_3_button_desc:0 "The 'Mahal' system taxes landholdings by village units—a legacy of the abolished zamindari system. Increasing this revenue stream will bolster imperial coffers."
 indian_office_3_button_tt:0 "-25 Indian Stability\nOnly once per 5 years!"
 indian_office_4_button:0 "Reinstate Hastings' Salt Tax"
 indian_office_4_button_desc:0 "First imposed by Warren Hastings in 1773, this salt monopoly once funded a third of Bengal's administration. Its revival could ease fiscal pressures."
 indian_office_4_button_tt:0 "-25 Indian Stability\nOnly once per 5 years!"
 indian_office_5_button:0 "Demand Princely State Tributes"
 indian_office_5_button_desc:0 "The princely states wield considerable influence. Persuading their rulers to collect taxes on our behalf would streamline revenue collection."
 indian_office_5_button_tt:0 "-50 Indian Stability\nOnly once per 10 years!"
 indian_office_6_button:0 "Support Local Labour"
 indian_office_6_button_desc:0 "India possesses an abundant labour force, yet it is not effectively utilised by our administration. We should further promote the development of local labour and expand their access to employment and education opportunities."
 indian_office_6_button_tt:0 "-50 Indian Stability\nOnly once per 10 years!"
 indian_rule_1_tt:0 "#bold +10 Indian Stability#!"
 indian_rule_2_tt:0 "#bold -10 Indian Stability#!"
 indian_minister_tt:0 "#bold +40 Indian Stability#!\nThe Secretary of State for India joins the Cabinet—ensure his office isn't abolished!"
 indian_office_status:0 "#bold The India Office rules the subcontinent from London.#!"
 indian_office_need_20_tt:0 "Requires ≥25 Indian Stability"
 indian_office_need_50_tt:0 "Requires ≥50 Indian Stability"

 her_majestys_government:0 "The Majesty's Government"
 her_majestys_government_reason:0 "#V #P #B [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of the United Kingdom of Great Britain and Ireland, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of Canada, Australia, and all other Dominions and Territories, Emperor/Empress of India, Defender of the Faith, by the Grace of God, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!#!#! #bold #V reigns as Sovereign.#!#!\n\n[ROOT.GetCountry.GetName]'s [GetLawType('law_monarchy').GetName] traces its lineage to #bold Alfred the Great in 871 AD#!. Each monarch's death immediately elevates the heir apparent, with coronation ceremonies affirming divine sanction.\n\nOurs is no absolutism, but a proud #bold constitutional monarchy#!: The #bold Magna Carta (1215)#! established parliamentary authority, the #bold Glorious Revolution (1688)#! yielded the Bill of Rights (1689), and the #bold Act of Settlement (1701)#! codified the separation of powers between #bold Crown, Parliament, and Courts#!—a covenant every monarch swears to uphold.\n\nTo outsiders, our monarchy embodies staid tradition; to Britons, it represents #bold stoic resilience#!, like oaks weathering storms. This is the essence of British conservatism—#bold proud yet pragmatic#!, as our motto declares:\n\n#variable Dieu et mon droit!#! (God and my right!)"
 her_majestys_government_status:0 "#V #I #B A Grand and Illustrious Institution#!#!#!"

 rowing_of_united_kingdom:0 "England's Rowing Tradition"
 rowing_of_united_kingdom_reason:0 "Aquatic sports have ancient roots, but modern rowing took shape in #bold 1815#! when Oxford University held its first bump races. Cambridge followed in #bold 1827#!, and the legendary #bold Oxford-Cambridge Boat Race#! debuted in #bold 1829#!. This noble pursuit has captivated even royalty—including [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\n\nYet the sport lacks funding for #bold international regattas#!. Wider ownership of skiffs and cutters might inspire the Crown to become its patron, spreading rowing across [ROOT.GetCountry.GetName]."

 commonwealth_council:0 "Imperial Council"
 commonwealth_council_reason:0 "The progress bar tracks seats held by each #bold Dominion#!:\n#bold British Seats#!: #variable [ROOT.GetCountry.MakeScope.Var('eng_commonwealth_council').GetValue|0]#!; influenced by #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_eng_tooltip_advance factors#!.\n#bold Canadian Seats#!: #variable [ROOT.GetCountry.MakeScope.Var('can_commonwealth_council').GetValue|0]#!; #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_can_tooltip_advance factors#!.\n#bold Australian Seats#!: #variable [ROOT.GetCountry.MakeScope.Var('ast_commonwealth_council').GetValue|0]#!; #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ast_tooltip_advance factors#!.\n#bold Irish Seats#!: #variable [ROOT.GetCountry.MakeScope.Var('ire_commonwealth_council').GetValue|0]#!; #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ire_tooltip_advance factors#!.\n#bold South African Seats#!: #variable [ROOT.GetCountry.MakeScope.Var('saf_commonwealth_council').GetValue|0]#!; #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_saf_tooltip_advance factors#!.\n\nThe #variable Imperial Council#!—meeting in #bold Westminster Hall#!—is the empire's #bold supreme legislative body#!, overseeing [concept_law], [concept_diplomatic_action], and [concept_war]. Its nine High Judges at #bold St. James's Palace#! hold final judicial authority.\n\nThis #variable Westminster Model#! unites delegates from across the empire to uphold our #bold shared ideals of liberty#!."
 commonwealth_council_eng_tooltip_advance:0 "#bold +4 Seats Monthly#! if:\n•#bold English-culture pops#! ≥5%\n•#bold English-culture pops#! ≥10%\n\n#bold -1 Seat Monthly#! if:\n•Another dominion gains seats"
 commonwealth_council_can_tooltip_advance:0 "#bold +4 Seats Monthly#! if:\n•#bold Anglo-Canadian#! or #bold Franco-Canadian pops#! ≥5%\n\n#bold -1 Seat Monthly#! if:\n•Another dominion gains seats"
 commonwealth_council_ast_tooltip_advance:0 "#bold +4 Seats Monthly#! if:\n•#bold Australian-culture pops#! ≥5%\n•#bold Australian-culture pops#! ≥10%\n\n#bold -1 Seat Monthly#! if:\n•Another dominion gains seats"
 commonwealth_council_ire_tooltip_advance:0 "#bold +4 Seats Monthly#! if:\n•#bold Irish-culture pops#! ≥5%\n•#bold Irish-culture pops#! ≥10%\n\n#bold -1 Seat Monthly#! if:\n•Another dominion gains seats"
 commonwealth_council_saf_tooltip_advance:0 "#bold +4 Seats Monthly#! if:\n•#bold Boer-culture pops#! ≥5%\n\n#bold -1 Seat Monthly#! if:\n•Another dominion gains seats"
 commonwealth_council_complete_tt:0 "Imperial policies affect member states differently based on their seat share."
 commonwealth_council_trade_button:0 "Strengthen Imperial Preference"
 commonwealth_council_trade_button_desc:0 "The Imperial Preference system ensures tariff-free trade within the empire. Let us enhance these commercial bonds further."
 commonwealth_council_health_button:0 "Fund Public Services"
 commonwealth_council_health_button_desc:0 "From Canadian winters to Indian monsoons, imperial subjects deserve equal access to sanitation and education."
 commonwealth_council_army_button:0 "Implement Conscription"
 commonwealth_council_army_button_desc:0 "The empire faces existential threats. We must tap into the martial potential of all dominions."
 commonwealth_council_migration_button:0 "Increase Policing"
 commonwealth_council_migration_button_desc:0 "Criminal elements exploit disparities between regions. A coordinated policing effort will restore order."
