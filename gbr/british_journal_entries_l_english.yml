 railway_mania:0 "Railway Mania"
 railway_mania_reason:0 "[ROOT.GetCountry.GetName] invented the #O railway#!, and the world’s first true inter-city line — the #V Liverpool & Manchester Railway#! — opened in the #yellow British Isles#! in 1830, proving a success in both passengers and freight. Though an economic slowdown in the previous years dampened our zeal for construction, with the recent #B revival of manufacturing and the fall in [concept_budget_interest]#!, the share prices of #O railway [concept_company]#! have surged: #B their volumes of goods and travellers climb without end, and people are ever more willing to invest in new lines#!.\n\nMeanwhile [ROOT.GetCountry.GetName]’s commercial [concept_reinvestment] is growing: the #V Industrial Revolution#! has created a new and increasingly prosperous [concept_middle_strata]; anyone can invest in new [concept_company] — especially #O railways#! — #B seemingly a sure thing#!.\n\nThis is a #B glorious age#! for us; let us invest boldly in the infrastructure of the #yellow British Isles#! and #V bind our home [concept_market] into a single connected whole#!"
 railway_mania_fail_tt:0 "Progress reaches 120; the railway bubble bursts."
 railway_mania_status:0 "#B Shining expectations are drawing wild investment in railway expansion#!"
 railway_mania_british_state_tt:0 "Is homeland of English culture"
