 second_napoleon_empire_je_before_tt:0 "#U #B If this journal is completed with a Bonapartist victory, House of Bonaparte will be restored in France.#!#!"
 second_napoleon_empire:0 "House of Bonaparte"
 second_napoleon_empire_reason:0 "#B The progress bar reflects the current #!#V Imperial Stability#! under Bonaparte rule.#!\n#B If we lose a war and cede our [concept_homeland] or #O Algiers#!, an event will trigger forcing the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to abdicate. This may #N end#!#U House of Bonaparte#! if #V Imperial Stability#! falls below 6 and the #V Liberal Empire#! [concept_journal_entry] remains incomplete.#!\n\n#V #P By the Grace of God and the Will of the People, Prince of Andorra, Protector of the Confederation of the Rhine, King of Italy, Mediator of the Swiss Confederation, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of the French: [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]#!#!#B #V The current head of the House of Bonaparte and sovereign ruler.#!#!\n\n#V France#! is a land of perpetual unrest. Since the #V Revolution of 1789#!, Paris has seen more governments rise and fall #B than most nations witness in centuries#!—including the crown seized by #V His Imperial Majesty Napoleon Bonaparte at Notre-Dame in 1804#!. After the defeat at Waterloo, Emperor Napoleon was forced to abdicate, exiled by the Coalition to St. Helena where he died in despair. The [GetIdeology('ideology_legitimist').GetName] Bourbons returned, only to be overthrown in 1830 by Parisian revolutionaries, who installed the Orléanist monarchy. Yet the [GetIdeology('ideology_orleanist').GetName] reign proved fleeting; the #V Second Republic#! briefly replaced France’s [GetLawType('law_monarchy').GetName], reviving the revolutionary republic. But loyal [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] and [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], nostalgic for #B the glories of Emperor Napoleon#!, paved the way for [ROOT.GetCountry.GetName]’s return and the restoration of imperial rule.#!\n\n#B Like all who have ruled France#!, its people remain #V capricious#! in their loyalties—alternately adoring or despising their sovereign. To preserve the Empire and #B the Bonaparte crown#!, [ROOT.GetCountry.GetRuler.GetLastName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must #V govern this mercurial nation with care#!, balancing factions, achieving new triumphs, and revitalizing the economy to prove the #V [GetIdeology('ideology_bonapartist').GetName] dynasty#! can deliver the #b stability and prosperity [ROOT.GetCountry.GetName] craves.#!"
 second_napoleon_empire_fail_tt:0 "#V Imperial Stability#! has fallen to 0"
 second_napoleon_empire_fail_2_tt:0 "Defeat in the #V Napoleonic Wars#! [concept_journal_entry]; the Coalition prevails"
 second_napoleon_empire_on_fail_tt:0 "The Empire will be overthrown, and a Republic restored in France."
 second_napoleon_empire_status:0 "#V #U #B [ROOT.GetCountry.GetRuler.GetFirstName] is the current Emperor of the French#!#!#!"
 second_napoleon_empire_fail_event_10_tt:0 "#V Imperial Stability#! decreases by 10\nThis will cause the #V Bonaparte Dynasty#! [concept_journal_entry] to fail, ending Bonapartist monarchy."
 second_napoleon_empire_fail_event_5_tt:0 "#V Imperial Stability#! decreases by 5"
 second_napoleon_empire_fail_event_1_tt:0 "#V Imperial Stability#! decreases by 1"
 second_napoleon_empire_complete_event_1_tt:0 "#V Imperial Stability#! increases by 1"
 second_napoleon_empire_operation_rubicon_happen_tt:0 "The House of Bonaparte rules France"

 extinction_du_pauperisme:0 "The Extinction of Pauperism"
 extinction_du_pauperisme_reason:0 "#B The progress bar tracks the duration of the Land Credit Bank's establishment and [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]'s tenure in government.#!\n\nThough the #V Industrial Revolution#! has transformed society, bringing urban prosperity, widespread poverty persists among [ROOT.GetCountry.GetName]'s [concept_lower_strata] due to #V insufficient agricultural subsidies and exploitative labor conditions#!—particularly afflicting the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], staunch supporters of [ROOT.GetCountry.GetRuler.GetLastName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\n\nLong before #B returning to France#!, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], during his exile in [SCOPE.sCountry('GBR_scope').GetName], gained popularity through his #B 'socialist' advocacy for state intervention and welfare policies#!. This acclaim propelled him to power in the Republic and ultimately to his coronation as #V Emperor of the French#!.\n\nNow, with the [GetIdeology('ideology_bonapartist').GetName] dynasty restored and imperial rule consolidated, it is time to #B fulfill these promises and eradicate poverty from French soil.#!"
 extinction_du_pauperisme_complete_tt:0 "#V Land Credit Bank#! established, and [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] has governed for at least 5 years."
 set_credit_foncier_de_france_button:0 "Establish the Crédit Foncier de France"
 set_credit_foncier_de_france_button_desc:0 "The root of rural poverty lies in insufficient agricultural credit, forcing peasants into usurious loans from greedy landlords. Wealthy landowners exploit this system to effectively reduce free farmers to serfdom—an intolerable injustice. The state shall collaborate with trusted bankers to create a national bank, offering affordable low-interest loans to liberate peasants from this oppression."
 set_credit_foncier_de_france_button_tt:0 "We will decree the establishment of the Land Credit Bank."

 expedition_du_mexique:0 "Mexican Intervention"
 expedition_du_mexique_reason:0 "[SCOPE.sCountry('MEX_scope').GetName]'s political fragmentation and pleas from its conservatives present an opportunity. Using overdue debt repayments as pretext, we may intervene in Mexico City to establish [ROOT.GetCountry.GetName]'s dominance over this former Spanish colony. Simultaneously, this campaign could revive #B Napoleon-era military glory#! under [GetIdeology('ideology_bonapartist').GetName] rule.\n\n[SCOPE.sCountry('MEX_scope').GetName]'s feeble forces stand no chance against our mighty imperial [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]. Let us dispatch an expeditionary force to reclaim #V France's colonial empire in the Americas#!."
 expedition_du_mexique_complete_tt:0 "A European royal shall be installed as Mexico's monarch."

 empire_liberal:0 "The Liberal Empire"
 empire_liberal_reason:0 "During his exile in [SCOPE.sCountry('GBR_scope').GetName] as a #B republican dissident#!, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] pledged liberal reforms. Yet upon ascending the throne, he imposed stricter [GetLawType('law_autocracy').GetName], suppressing parliaments, censoring press, and silencing workers. Now, waning imperial legitimacy and rising discontent have driven the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] to openly denounce the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]—a dire threat to the regime.\n\nTo secure the [ROOT.GetCountry.GetRuler.GetLastName] dynasty, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must initiate liberalization: devolve power to parliament, abolish [GetLawType('law_censorship').GetName] and [GetLawType('law_autocracy').GetName], and embrace democracy."
 empire_liberal_complete_tt:0 "All #V constitutional reforms#! [concept_journal_entry] completed."
 empire_liberal_on_complete_tt:0 "A stable constitutional system will solidify imperial legitimacy."
 empire_liberal_on_complete_2_tt:0 "Some Leaders will evolve into [GetIdeology('ideology_bonapartist').GetName]."
 empire_liberal_status:0 "#B End [GetIdeology('ideology_bonapartist').GetName]'s authoritarianism#!"
 empire_liberal_pluse_tt:0 "#V Liberal Empire#! [concept_journal_entry] advances by 1."
 empire_liberal_politic:0 "Constitutional Reform: Political Liberties"
 empire_liberal_politic_reason:0 "For too long, [ROOT.GetCountry.GetName]'s [GetLawType('law_monarchy').GetName] has relied on [GetLawType('law_censorship').GetName] and [GetLawType('law_autocracy').GetName] as twin pillars of control. This cannot continue.\n\nAmid rising unrest, #V sweeping political reforms#! are needed. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must relinquish power to guarantee #B press freedom, free speech, and universal suffrage#!."
 empire_liberal_social:0 "Constitutional Reform: Social Liberties"
 empire_liberal_social_reason:0 "Historically, [ROOT.GetCountry.GetName]'s [concept_government] treated #v $laborers$#! as cogs in a machine. [GetLawType('law_no_workers_rights').GetName] suppressed [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], while [GetLawType('law_no_social_security').GetName] left workers destitute.\n\nTo avert revolt—like the #V National Workshops uprising#!—the Empire must #B enact welfare protections#!."
 empire_liberal_social_complete_tt:0 "Completed #V The Extinction of Pauperism#! [concept_journal_entry]."
 empire_liberal_reform_button:0 "Hold a Constitutional Referendum"
 empire_liberal_reform_button_desc:0 "Reform cannot be decided by the Emperor or ministers alone. Let the people vote on whether to transform the political system."
 empire_liberal_reform_button_tt:0 "No constitutional referendum has been held."
 empire_liberal_politic_button:0 "Legalize Parliamentary Inquiry"
 empire_liberal_politic_button_desc:0 "Though a legislative body, parliament remains shackled. Granting it the right to question ministers and the Emperor begins true reform."
 empire_liberal_politic_button_tt:0 "Parliament lacks inquiry powers."
 empire_liberal_social_button:0 "Legalize Strike Rights"
 empire_liberal_social_button_desc:0 "Strikes—currently banned—must be recognized as a tool for fair wages. We shall protect lawful labor actions."
 empire_liberal_social_button_tt:0 "Strikes remain illegal."

 napoleonic_wars:0 "The Napoleonic Wars"
 napoleonic_wars_reason:0 "Decades have passed since #V Emperor Napoleon#! led [ROOT.GetCountry.GetName] to conquer Europe and achieve #B France's greatest historical glories#!. Since the #V Congress of Vienna in 1815#!, engineered by #B Metternich and the European powers#!, #V France#! has been confined within strict borders—hemmed in by the Netherlands and Britain to the north, the German Confederation and Prussia to the east, Sardinia and Italian states to the south, and Spain to the west. These chains once bound Paris like a prisoner.#!\n\nYet the #V Vienna System#! now decays. With [ROOT.GetCountry.GetName] resurgent, our [concept_army] surpasses all continental rivals, our [concept_fleet] can break #B Royal Navy blockades#!, and our industry expands relentlessly. Once more, [ROOT.GetCountry.GetName] stands as a world power.#!\n\nThe time has come to restore imperial glory. As Napoleon once did, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall mount his steed and lead the #V Grande Armée#! across the Rhine and Alps, beyond the Vistula and Pyrenees—#B until all enemies kneel, and the Imperial Eagle rules Europe again.#!"
 napoleonic_wars_possible_tt:0 "#V Imperial Stability#! is at least 6"
 napoleonic_wars_complete_1_tt:0 "All #V Napoleonic Wars#! [concept_journal_entry] objectives completed."
 napoleonic_wars_fail_tt:0 "An enemy [concept_front] has reached [SCOPE.sState('napoleonic_wars_state').GetCityHubName]"
 napoleonic_wars_refuse_tt:0 "#V #B The Napoleonic Wars [concept_journal_entry] will be removed!#!#!"
 napoleonic_wars_status:0 "#V #P Reforge the French Empire that once dominated Europe#!#!"
 napoleonic_wars_jouranls_on_complete_tt:0 "#V Napoleonic Wars#! [concept_journal_entry] advances by 1"
 event_fra_63_tt:0 "We shall redraw borders to reflect a new European balance of power."
 event_fra_63_2_tt:0 "The Empire will collapse, His Majesty will abdicate, and occupied territories will be partitioned."
 napoleonic_wars_swi_button:0 "Demand Swiss Submission"
 napoleonic_wars_swi_button_desc:0 "Switzerland—the heart of Europe—was once controlled during the Helvetic Republic and Mediation periods. By reviving these claims and applying military pressure, our marshals believe we can force Bern to yield."
 napoleonic_wars_swi_button_tt:0 "Any [concept_army] on the Swiss border must exceed #variable 200#! [Concept('concept_unit','$concept_units$')]"
 napoleonic_wars_on_fail_tt:0 "The Coalition powers will partition our non-core European territories."
 guerres_de_coalitions:0 "The Coalitions Rise"
 guerres_de_coalitions_reason:0 "#V Paris#! is again gripped by [GetIdeology('ideology_bonapartist').GetName] frenzy—its Emperor dons #V Napoleon I's cloak#! to unleash catastrophic [concept_war] upon Europe.#!\n\nAs [SCOPE.sCountry('FRA_scope').GetName] expands ruthlessly, #B the German Confederation trembles, Italy recoils, Spain burns, and Poland's borders darken#!. A #V new Napoleonic War#! dawns upon our age.#!\n\nNow is the hour for Europe's #B great powers to survive or perish#!. For #B independence, dignity, and freedom#!, all defenders of the old order must unite under the #V Coalition banner#!: #B Together we are invincible! Let us send Paris's warmonger back to St. Helena!#!"
 guerres_de_coalitions_tt:0 "A Coalition [concept_front] has reached [SCOPE.sCountry('FRA_scope').GetName]'s capital."
 guerres_de_coalitions_fail_tt:0 "[SCOPE.sCountry('FRA_scope').GetName] has completed all #V Napoleonic Wars#! [concept_journal_entry]."
 guerres_de_coalitions_1_button:0 "Muster the Coalition"
 guerres_de_coalitions_1_button_desc:0 "Napoleon's armies invade once more. By alliance terms, all Coalition members must mobilize against French aggression. Dispatch envoys immediately!"
 guerres_de_coalitions_1_button_possible_tt:0 "No Coalition mustered in the last 3 years"
 guerres_de_coalitions_1_button_possible_2_tt:0 "You are in a defensive diplomatic play against France"
 napoleonic_wars_germany:0 "Napoleonic Wars: Subjugate Germany"
 napoleonic_wars_germany_reason:0 "Germany—shattered by #V Napoleon I in 1806#! and reorganized as the #V Rhine Confederation#!—now reunifies under [SCOPE.sCountry('PRU_scope').GetName] and [SCOPE.sCountry('AUS_scope').GetName], becoming a bulwark against [ROOT.GetCountry.GetName]. This #B cannot stand#!.#!\n\nThe German states are the #B greatest obstacle to imperial ambition#!. We must annihilate the #V German Confederation#! and expand our borders to the North Sea!"
 no_north_german_great_powers_tt:0 "No [SCOPE.sCulture('north_german_scope').GetName] state holds [concept_rank] above [concept_major_power]"
 napoleonic_wars_spain:0 "Napoleonic Wars: Peninsular Campaign"
 napoleonic_wars_spain_reason:0 "Reactionary [SCOPE.sCountry('SPA_scope').GetName] has festered since the #V Bourbons returned in 1814#!. Their rule brought not order but #B civil war in 1836#!, scarring the land.#!\n\nWorse, aided by perfidious [SCOPE.sCountry('GBR_scope').GetName], Spain actively thwarts our colonial expansion, harasses our shipping, and joins Coalitions against us.#!\n\nNow, [ROOT.GetCountry.GetRuler.GetFirstName] shall fulfill #V Napoleon's unfinished work#!. #B Cross the Pyrenees again! March up the Ebro to strike Spain's heart!#!"
 napoleonic_wars_spain_complete_tt:0 "At war with [SCOPE.sCountry('SPA_scope').GetName]"
 napoleonic_wars_spain_toledo_tt:0 "Our [concept_front] has reached [SCOPE.sState('napoleonic_wars_spain_toledo').GetCityHubName]"
 napoleonic_wars_spain_castile_tt:0 "Our [concept_front] has reached [SCOPE.sState('napoleonic_wars_spain_castile').GetCityHubName]"
 napoleonic_wars_italy:0 "Napoleonic Wars: Pacify Italy"
 napoleonic_wars_italy_reason:0 "Italy has always been [ROOT.GetCountry.GetName]'s sphere—whether under Holy Roman interference or Napoleonic conquest. Yet the #V Congress of Vienna#! stripped our influence, leaving it divided among #B petty states, reactionaries, and Austrian puppets#!.#!\n\nWe cannot tolerate this #V Italy#! on our southern flank. As #V Napoleon did in 1805#!, we must #B reclaim this legacy and unite the peninsula!#!"
 napoleonic_wars_poland:0 "Napoleonic Wars: Liberate Poland"
 napoleonic_wars_poland_reason:0 "Since the #V Third Partition in 1795#!, Poland has groaned under foreign boots. After #B Napoleon's defeat at Leipzig#!, the #V Duchy of Warsaw#! fell, and [SCOPE.sCountry('RUS_scope').GetName], [SCOPE.sCountry('PRU_scope').GetName], and [SCOPE.sCountry('AUS_scope').GetName] continue their oppression.#!\n\nWe remember the #B Polish Legions#! who fought for Napoleon. As heirs to #V Dąbrowski's#! praise—#V 'Poland's Saviors'#!—we must #B break their chains!#!"
 finish_napoleonic_wars_poland_tt:0 "Completed #V Napoleonic Wars: Liberate Poland#! [concept_journal_entry]"
 napoleonic_wars_russia:0 "Napoleonic Wars: Crush Russia"
 napoleonic_wars_russia_reason:0 "[SCOPE.sCountry('RUS_scope').GetName]—the barbaric empire that escaped destruction in #V 1812#! through winter and scorched earth—now postures as Europe's #B 'Gendarme'#!, propping up反动秩序 under the #V 'Holy Alliance'#! while crushing liberties with #B gray masses#!.#!\n\nTo triumph, we must #B surpass Napoleon#!—march on Moscow, topple the Tsar, and end Russian hegemony!"
 napoleonic_wars_russia_complete_tt:0 "At war with [SCOPE.sCountry('RUS_scope').GetName]"
 napoleonic_wars_russia_moscow_tt:0 "Our [concept_front] has reached [SCOPE.sState('napoleonic_wars_russia_moscow').GetCityHubName]"
 napoleonic_wars_russia_petersburg_tt:0 "Our [concept_front] has reached [SCOPE.sState('napoleonic_wars_russia_petersburg').GetCityHubName]"
 napoleonic_wars_russia_tsaritsyn_tt:0 "Our [concept_front] has reached [SCOPE.sState('napoleonic_wars_russia_tsaritsyn').GetCityHubName]"
 nap_sign_peace_treaty_with_rus_tt:0 "#P #B 我们将直接获得目前在东欧的占领区，并在当地扶持3个附属国。#!#!"
 napoleonic_wars_austria:0 "Napoleonic Wars: Break Austria"
 napoleonic_wars_austria_reason:0 "In the #V Napoleonic Wars#!, [SCOPE.sCountry('AUS_scope').GetName] was our most stubborn foe—defeated at #V Marengo, Austerlitz#!, and #V Wagram#!, yet never eradicated. This #B Habsburg tumor#! still festers along the Danube.#!\n\nNow, with the #V Vienna System#! crumbling, we shall #B surpass Napoleon#! and fly the Imperial Eagle over Schönbrunn Palace!"
 napoleonic_wars_egypt:0 "Napoleonic Wars: Egyptian Expedition"
 napoleonic_wars_egypt_reason:0 "#V Egypt#! holds special meaning for [ROOT.GetCountry.GetName]. In #V 1798#!, Napoleon crushed the Mamluks, seized Cairo, and unearthed antiquities—though British [concept_fleet] forced his retreat.#!\n\nNow, as [SCOPE.sCountry('TUR_scope').GetName] weakens, this #B gateway between seas#! lies vulnerable. Defeat #V Muhammad Ali's successors#!, and Egypt will become #B France's crown jewel!#!"

 gouvernement_de_la_defense:0 "Government of National Defense"
 gouvernement_de_la_defense_reason:0 "[ROOT.GetCountry.GetName] faces catastrophe: Defeat in [concept_war] forced the Emperor's abdication, toppling both the #V Bonaparte Dynasty#! and [GetLawType('law_monarchy').GetName]. As [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] plunged into chaos, a provisional government emerged—led by the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName], and factions of [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]—#B proclaiming a Republic to restore order#!.#!\n\nYet the #V Government of National Defense#! stands on shaky ground. While mobilizing armies to defend [ROOT.GetCountry.GetName]'s borders, it must also confront #B rising working-class fury#!. Paris seethes with #v revolutionary fervor#!; the [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]-led #N Paris Commune#!, backed by National Guard mutineers, has seized the capital, forcing [ROOT.GetCountry.GetRuler.GetFirstName]'s government to flee to #V Versailles#!.#!\n\n#B The Republic hangs by a thread.#! Can [ROOT.GetCountry.GetName] recapture the #V revolutionary era's#! youthful idealism—that passionate, generous spirit that once guided her destiny?"
 gouvernement_de_la_defense_complete_tt:0 "The #V Paris Commune#! uprising has been crushed"
 troisieme_republique:0 "Third Republic"
 troisieme_republique_reason:0 "The #V Third Republic#! is [ROOT.GetCountry.GetName]'s #B third attempt at republican rule#! since the #V Revolution of 1789#!. Stitched together from the #V blood of the Commune#! and the #V ashes of imperial collapse#!, it lacks the #B revolutionary zeal of 1789 or the romantic fervor of 1848#!. Yet it endures—a fragile compromise where [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s [concept_interest_group] factions #B set aside differences to defend the nation#!.#!\n\nWith [GetIdeology('ideology_bonapartist').GetName] vanquished, power now rests between the [GetIdeology('ideology_revolutionism').GetName]-aligned [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] and the [GetIdeology('ideology_opportunistes').GetName] petty bourgeoisie and rural folk. Endless [concept_ideology] strife plagues its politics—#B born too late, reformed too little#!, it upholds the #V 'Liberty, Equality, Fraternity'#! ideal while stumbling through division and distrust.#!\n\n#B But whatever the future holds, [ROOT.GetCountry.GetName] is a Republic once more—her Declaration of Rights reinstated. This time, may it last forever.#!#variable Let Liberty lead the people!#!"
 troisieme_republique_status:0 "#B #U The [GetLawType('law_parliamentary_republic').GetName] is consolidated#!#!"
 troisieme_republique_fail_tt:0 "An enemy [concept_front] has reached [SCOPE.sState('troisieme_republique_state').GetCityHubName]"

 entente_cordiale:0 "Entente Cordiale"
 entente_cordiale_reason:0 "Centuries of rivalry—from the Hundred Years' War to #B Waterloo in 1815#!—once defined [ROOT.GetCountry.GetName]'s relations with the island across the Channel. But the #V rise of [SCOPE.sCountry('GER_scope').GetName]#! forces even ancient foes to #B bury grudges#!.#!\n\nIsolation can no longer #V safeguard our global empire#!. Through this understanding, we secure #B our civilizations against Germanic threats#!, preserve freedom of the seas, and #B shield our colonies from emerging powers#!.#!\n\n#B Ours are the world's greatest nations—shaping history, defining eras.#! #V Together, no force can withstand us!#!#!"
 entente_cordiale_status:0 "#B #P Strategic necessity makes allies of old enemies#!#!"
 entente_cordiale_event_tt:0 "We will reject the Entente, voiding its [concept_journal_entry]."
 entente_cordiale_event_2_tt:0 "We shall ratify the Entente, enabling its [concept_journal_entry]."
 entente_cordiale_fail_tt:0 "One signatory has withdrawn"
 entente_cordiale_possible_tt:0 "A unified Germany exists"
 entente_cordiale_possible_2_tt:0 "We accepted the Entente terms"
 entente_cordiale_1_button:0 "Request British Military Aid"
 entente_cordiale_1_button_desc:0 "While the Entente ensures long-term alignment, Britain isn't bound to every war. Still, we may petition London for discrete support."
 entente_cordiale_1_button_possible_tt:0 "No aid requested in 5 years"
 entente_cordiale_2_button:0 "Request French Military Aid"
 entente_cordiale_2_button_desc:0 "The Entente commits France to our defense, but not unconditionally. Through diplomatic channels, we may seek tailored assistance."
 entente_cordiale_3_button:0 "Renew Military Alliance"
 entente_cordiale_3_button_desc:0 "With strategic landscapes shifting, we must reactivate the Entente's dormant mutual defense clauses."
 entente_cordiale_3_button_possible_tt:0 "Treaty not renewed in 10 years"
 entente_cordiale_4_button:0 "Terminate the Entente"
 entente_cordiale_4_button_desc:0 "Our pact with the islanders has outlived its purpose. Notify them of its dissolution."
 entente_cordiale_4_button_possible_tt:0 "Entente remains active"
 entente_cordiale_4_button_effect_tt:0 "We will abandon the Entente, permanently removing its [concept_journal_entry]!"
 guide_event_tt:0 "结束指南。"
 aus_not_exists_tt:0 "实现了#B 大德意志方案#!"
 zweibund_exists_tt:0 "#B 德奥同盟#!已经缔结"

 france_company_cgv_character:0 "Viticultural Heritage"
 france_company_cgv_character_reason:0 "Since #V Roman Gaul#!, [ROOT.GetCountry.GetName]'s lands have never ceased producing @wine!#V wine#!. Though the #B Revolution#! devastated Champagne's vineyards, Bordeaux's @wine!industry thrived—especially after #V Count Chantelou's 1807 sugaring technique#! revolutionized global markets.\n\nHere, @wine!#V wine#! transcends commerce: #B It is tradition, craft, national identity—a testament to terroir and loyalty#!. The very term #V 'French @wine!Champagne'#! commands worldwide reverence.\n\nNow, as technology advances, [ROOT.GetCountry.GetName]'s @wine!viticulture evolves from agriculture into a #B national industrial system#!, intertwining [concept_government], [concept_company], and diplomacy. With proper policies, @wine!#V wine#! could become #B the emblem of French soft power#!."

 north_coast_industrialize:0 "Northern Industrialization"
 north_coast_industrialize_reason:0 "The northern coast of France has been a significant center of trade and handicrafts since the medieval guild era. Calais and Dunkirk guard the strait, and the textile industry in Lille-Roubaix-Tourcoing has flourished, with the convenient English Channel connecting this region to the global market.\n\nHowever, this is not enough. In this era where major global powers are competing in industrialization, northern France still lacks sufficient prosperity to fully unleash the potential of its plains and coastal areas. We must transform the ports and towns here, replacing past structures with steel frameworks, letting the winds of the strait drive wheels, the fires of coal layers light up furnaces, and forging northern France into the industrial heart of the great body of [ROOT.GetCountry.GetName]."
 north_coast_industrialize_status:0 "Develop the northern coast of France into a major industrial zone"
 rhone_industrialize:0 "Revive Lyon"
 rhone_industrialize_reason:0 "Lyon is the confluence of the Rhône and Saône rivers, where the intersection of the two rivers has brought about prosperous trade. Since the Middle Ages, it has been known as the silk capital of [ROOT.GetCountry.GetName] and even served as the capital for the exiled king during the Hundred Years' War.\n\nFor a long time, it has been the most prosperous city in Occitania. However, with the rise of Mediterranean ports, Lyon's status has declined. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s government has decided to allocate resources to rebuild Lyon's glory, re-dredge the ancient canals, expand docks and railway networks, and ultimately revive the city of Lyon as the brightest jewel in southern [ROOT.GetCountry.GetName]."
 rhone_industrialize_status:0 "Rebuild Lyon as the central city of the south"
 settled_in_algiers:0 "Settling in Algiers"
 settled_in_algiers_reason:0 "Since the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s army landed, the provinces of Algiers have been embraced by [ROOT.GetCountry.GetName]. However, in essence, it remains merely a distant outpost of the empire, a temporary military-administered colony, rather than a true [SCOPE.sCulture('french_culture_scope').GetName] territory with genuine [SCOPE.sCulture('french_culture_scope').GetName] civilization and government.\n\nNot only this, but the streets, ports, and official buildings here are in urgent need of thorough reconstruction. We need to root French industrial civilization, judicial administration, educational systems, and the entire [SCOPE.sCulture('french_culture_scope').GetName] culture in this land, and encourage migration from the mainland to settle here.\n\nOnly by completely eliminating resistance and tradition here can Algiers cease to be a distant overseas territory and truly become a natural extension of [ROOT.GetCountry.GetName] on the African continent, fully integrating into the map of France."
 settled_in_algiers_status:0 "Algiers should become a natural extension of [ROOT.GetCountry.GetNameNoFlag] in Africa"

 defensive_line_in_alsace_lorraine:0 "Construction of the Alsace–Lorraine Defensive Line"
 defensive_line_in_alsace_lorraine_reason:0 "The #B military threat#! posed by [SCOPE.sCountry('french_enemy_scope').GetName] to the core territories of [ROOT.GetCountry.GetName] remains a matter of grave concern. Yet the effectiveness of carefully constructed fortifications has been amply demonstrated in recent [concept_war]. Accordingly, our Minister of War, [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.GetFullName], has proposed that the government finance the construction of an extensive #V system of concrete fortifications#! in the region of [GetStateRegion('STATE_ALSACE_LORRAINE').GetName]. This line shall feature a #B robust and flexible defensive organisation#!, built upon the twin principles of #B exploiting terrain to the fullest#! and establishing continuous fields of fire across all positions#!.\n\nThrough this fortification, we shall compel [SCOPE.sCountry('french_enemy_scope').GetName] to shift the focus of its offensive in any future [concept_war], thereby buying precious time for mobilisation and preparing the ground for a prolonged war of attrition.\n\n@information!This project is expected to #V take 8 years#! to complete, and will add a #O state trait#! to [GetStateRegion('STATE_ALSACE_LORRAINE').GetName]."
 defensive_line_in_alsace_lorraine_tt:0 "Construction has been completed"
 offensive_a_outrance:0 "精神高于物质"
 offensive_a_outrance_reason:0 "“没有进攻就没有胜利：胜利的代价是鲜血，战争不过是野蛮和残酷。它只承认一种实现目标的手段，那就是流血。”\n\n尽管许多被认为具有#B 强大杀伤力#!的武器正在出现，但由于长久以来的冲锋传统，#V 进攻主义思想#!仍然在[ROOT.GetCountry.GetName]占有重要地位。支持进攻主义的军官们认为，敌军的防御性火力实际上不会致命，因为现代步枪非常轻便，子弹甚至无法穿透皮肤；因此，士兵们不会面临在战场上昂首挺胸、完全暴露的风险。不仅如此，根据总参谋部的计算，一名敌军步兵装填步枪、扛枪瞄准需要至少40秒，在这段时间里，足够作为进攻方的[ROOT.GetCountry.GetAdjective]士兵们跑出上百米，并攻占敌方阵地。\n\n由于这一理论的深入人心，几乎所有指挥部的高层军官都已经对#V 进攻主义#!深信不疑，并努力发展全面进攻的理论——然而这一理论是否能够在交战中生效，还有待#B 战争的检验#!。"
 offensive_a_outrance_status:0 "进攻主义思潮占据着法兰西陆军的主流"
 num_country_dead_least_1m_tt:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]在该战争中的总阵亡至少为#R 1M#!"
