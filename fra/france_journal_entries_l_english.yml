l_english:

 paris_politic:0 "Parisian Politics"
 paris_politic_reason:0 "The progress bar indicates the current political influence of the most dominant [concept_interest_group] in Paris.\n\n#variable Paris#!, the [concept_capital_state] of [ROOT.GetCountry.GetName], is not only the nation's most prosperous and renowned metropolis but also the beating heart of [ROOT.GetCountry.GetNameNoFormatting]'s politics.\n\nSituated along the Seine in #variable Île-de-France#!, Paris has served as France’s capital and symbol of supreme authority since #bold AD 987#!, when Hugh Capet of the Capetian dynasty was crowned #bold King of France#!. The splendor of #bold the Tuileries, Versailles, and Fontainebleau#! has endured across dynasties, standing as timeless witnesses to France’s storied history.\n\nYet Paris's true power lies in its #bold unparalleled political weight#!: even a flicker of [concept_turmoil] or [concept_revolution] here has toppled rulers. In the #variable 1789 French Revolution#!, riots by the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] destroyed the Bourbon monarchy and sent King Louis XVI to the guillotine, founding the #bold First French Republic#!. Though Napoleon Bonaparte transformed it into an empire—and though the #bold anti-French coalitions#! crushed that empire—Parisian citizens continued to shape the nation’s destiny. In the #variable July Revolution of 1830#!, Parisian uprisings elevated the House of Orléans to power, while the provinces, powerless to resist, had no choice but to accept whatever #bold government born of Paris#! dictated.\n\nNow, even in this modern age, Paris remains France’s supreme political stage. Rival [concept_interest_group] factions intrigue and maneuver here, knowing that control of Paris means influence over #variable all of [ROOT.GetCountry.GetName]...#!"
 paris_politic_complete_tt:0 "If any [concept_interest_group] reaches 5000 political influence, Paris will fall under the iron grip of a single faction!"
 status_paris_politic_intelligentsia:0 "#V #P #B [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] is gaining dominance.#!#!#!"
 status_paris_politic_landowners:0 "#V #P #B [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] is gaining dominance.#!#!#!"
 status_paris_politic_petty_bourgeoisie:0 "#V #U #B [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] is gaining dominance.#!#!#!"
 status_paris_politic_industrialists:0 "#V #O #B [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] is gaining dominance.#!#!#!"
 status_paris_politic_trade_unions:0 "#V #N #B [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] is gaining dominance.#!#!#!"
 status_paris_politic_always:0 "#V #P #B No [concept_interest_group] currently holds sway.#!#!#!"
 paris_politic_intelligentsia_button:0 "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_intelligentsia').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_intelligentsia_var_tooltip [ROOT.GetCountry.MakeScope.Var('intelligentsia_progress_next').GetValue|1+=]#!)"
 paris_politic_intelligentsia_var_tooltip:0 "Monthly increases from:\n#variable Total [concept_popularity] of radical, republican, and humanitarian characters: [Country.MakeScope.Var('intelligentsia_progress_from_characters').GetValue|+=]#!\n#variable [concept_government] [concept_legitimacy]: [Country.MakeScope.Var('intelligentsia_progress_from_legitimacy').GetValue|+=]#!"
 paris_politic_intelligentsia_button_tt:0 "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] has over 500 political influence."
 paris_politic_intelligentsia_button_desc:0 "As the influence of [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] grows in Paris, the government must adopt a more tolerant stance toward them and heed the counsel of intellectual elites on matters of statecraft."
 paris_politic_landowners_button:0 "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_landowners').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_landowners_var_tooltip [ROOT.GetCountry.MakeScope.Var('landowners_progress_next').GetValue|1+=]#!)"
 paris_politic_landowners_var_tooltip:0 "Monthly increases from:\n#variable [Concept('concept_interest_group', '$concept_interest_groups$')] clout of leaders espousing Legitimism, monarchism, or traditionalism: [Country.MakeScope.Var('landowners_progress_from_igs').GetValue|+=]#!\n#variable Profitable farms or plantations (+10 profit) contribute: [Country.MakeScope.Var('landowners_progress_from_farm').GetValue|+=]#!"
 paris_politic_landowners_button_1_tt:0 "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] has over 500 political influence."
 paris_politic_landowners_button_desc:0 "As [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]'s influence rises in Paris, the government must placate the nobility by honoring their past services."
 paris_politic_petty_bourgeoisie_button:0 "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_petty_bourgeoisie').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_petty_bourgeoisie_var_tooltip [ROOT.GetCountry.MakeScope.Var('petty_bourgeoisie_progress_next').GetValue|1+=]#!)"
 paris_politic_petty_bourgeoisie_var_tooltip:0 "Monthly increases from:\n#variable [Concept('concept_interest_group', '$concept_interest_groups$')] clout of Bonapartist, reformist, or social-democratic leaders: [Country.MakeScope.Var('petty_bourgeoisie_progress_from_igs').GetValue|+=]#!\n#variable Profitable service industries (+10 profit) contribute: [Country.MakeScope.Var('petty_bourgeoisie_progress_from_building').GetValue|+=]#!"
 paris_politic_petty_bourgeoisie_button_1_tt:0 "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] has over 500 political influence."
 paris_politic_petty_bourgeoisie_button_desc:0 "As [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] grows stronger in Paris, the cabinet must incorporate officials aligned with urban middle-class interests to maintain civic stability."
 paris_politic_industrialists_button:0 "[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_industrialists').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_industrialists_var_tooltip [ROOT.GetCountry.MakeScope.Var('industrialists_progress_next').GetValue|1+=]#!)"
 paris_politic_industrialists_var_tooltip:0 "Monthly increases from:\n#variable [Concept('concept_interest_group', '$concept_interest_groups$')] clout of Orléanist, free-market, or protectionist leaders: [Country.MakeScope.Var('industrialists_progress_from_igs').GetValue|+=]#!\n#variable Profitable manufacturing (+15 profit) contributes: [Country.MakeScope.Var('industrialists_progress_from_building').GetValue|+=]#!"
 paris_politic_industrialists_button_1_tt:0 "[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] has over 500 political influence."
 paris_politic_industrialists_button_desc:0 "With [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] exerting growing influence in Paris, the government can leverage their clout to enact pro-investment policies and spur economic growth."
 paris_politic_trade_unions_button:0 "[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_trade_unions').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_trade_unions_var_tooltip [ROOT.GetCountry.MakeScope.Var('trade_unions_progress_next').GetValue|1+=]#!)"
 paris_politic_trade_unions_var_tooltip:0 "Monthly increases from:\n#variable Total [concept_popularity] of communist, anarchist, or vanguardist leaders: [Country.MakeScope.Var('trade_unions_progress_from_characters').GetValue|+=]#!\n#variable [Concept('concept_interest_group', '$concept_interest_groups$')] clout of socialist factions: [Country.MakeScope.Var('trade_unions_progress_from_igs').GetValue|+=]#!"
 paris_politic_trade_unions_button_1_tt:0 "[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] has over 500 political influence."
 paris_politic_trade_unions_button_desc:0 "As [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] strengthens in Paris, only an open-handed approach—conceding to or dividing labor leaders—can stabilize the city's volatile politics."
 paris_politic_on_complete_tt:0 "The faction that seizes Paris will stage a coup, reshaping the government and seizing absolute control."

 french_birthrate:0 "French National Birthrate"
 french_birthrate_reason:0 "For centuries, [ROOT.GetCountry.GetName] has had the largest population in Western Europe: no other nation in Christendom could compare to the #bold warm and pleasant climate#! and #bold fertile and vast lands#! that nurtured the French people. This #bold massive population base#! fueled our nation's vitality.\n\nDuring the #bold Revolutionary Wars#!, the Jacobin government’s single #bold 'Decree of Total Mobilization'#! allowed a French army of merely tens of thousands to grow into a force of a million in just a few months, shocking the [concept_great_power]s of the anti-French coalition. By the time Emperor Napoleon marched on Russia, [ROOT.GetCountry.GetName]’s population had reached #bold over thirty million#!, the greatest in continental Europe.\n\nHowever, after the Napoleonic Wars, our #bold birthrate#! fell into #bold long-term stagnation#!. The elite of our [concept_government] grew deeply concerned by this abnormal demographic trend: some believed it stemmed from the decline of Catholic faith; others saw it as a side effect of industrialization and urbanization; still others blamed the spread of liberal ideas from the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] to the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName].\n\nWhatever the cause, no farsighted person can tolerate this situation continuing: if we fail to correct this shortage of births, the day will come when our [concept_army] lacks loyal soldiers, our [concept_building]s lack diligent workers, and our [concept_arable_land] lacks strong farmers. Our once-invincible army will weaken, our industrialization will stall, and our food supply will falter. The French nation will lose the dominant position in Western Europe it has held for centuries.\n\n[ROOT.GetCountry.GetName] needs children! As Napoleon once replied to Madame de Staël: 'The best woman is the one who can bear the most children!'"

 franch_national_assembly:0 "National Assembly"
 franch_national_assembly_reason:0 "The progress bar shows the number of seats held by the #bold ruling coalition#! currently in control of the Assembly.\n\nRadical Alliance: #variable [ROOT.GetCountry.MakeScope.Var('radicals_seat').GetValue|0]#! seats; changes during [concept_election] are influenced by several #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_radicals_tooltip_conditions conditions#!.\nOrder Front: #variable [ROOT.GetCountry.MakeScope.Var('conservative_seat').GetValue|0]#! seats; changes during [concept_election] are influenced by several #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_conservative_tooltip_conditions conditions#!.\nPeople’s Alliance: #variable [ROOT.GetCountry.MakeScope.Var('socialist_seat').GetValue|0]#! seats; changes during [concept_election] are influenced by several #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_socialist_tooltip_conditions conditions#!.\nCommunist Bloc: #variable [ROOT.GetCountry.MakeScope.Var('communist_seat').GetValue|0]#! seats; changes during [concept_election] are influenced by #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_communist_tooltip_conditions the following conditions#!.\n\nThe National Assembly is the core of [ROOT.GetCountry.GetName]'s democracy. It was born from the #variable Revolution of 1789#! and the pursuit of liberty and democracy. The #bold Coup of 18 Brumaire#! marked the end of the [concept_revolution]. Though Napoleon's Empire achieved many great feats, the Republic and its democracy were shelved for #bold half a century#!. The July [GetLawType('law_monarchy').GetName] proved illusory: #bold liberty was curtailed, and equality and fraternity remained mere slogans.#! The Chamber of Deputies claimed to represent the French citizenry, but in reality represented only a privileged few—far removed from the #variable ideals of 1789#!.\n\nYet the French desire for liberty never died: even after the monarchs consolidated power following the #bold Congress of Vienna#!, the reactionary #bold Charles X#! was overthrown in the July Revolution, the hesitant #bold Orléans Monarchy#! was swept aside, and the #bold Bonapartists#! disappeared from power. After decades of autocracy, the great principles of the #bold French Revolution#!—#bold Liberty, Equality, Fraternity#!—returned to [ROOT.GetCountry.GetName]. The republican Assembly adopted the historic name of the #bold National Assembly#! once proclaimed by the Third Estate, enabling every French citizen to [concept_election] their representatives and form a legislature truly #bold embodying the nation and its people#! to govern in their name.\n\n#variable Forward, children of the fatherland!#! The future of [ROOT.GetCountry.GetName] may be stormy, and its road uneven; but it matters not, for the ideals given to us by the #bold Enlightenment#! guide our steps. We are certain that before us lies the broad road of republican principle. #variable Liberty Leading the People!#!"
 franch_national_assembly_possible_tt:0 "The Republic is fully consolidated: complete either the #V Second Republic#! [Concept('concept_journal_entry', '$concept_journal_entries$')] or the #V Government of National Defense#! [Concept('concept_journal_entry', '$concept_journal_entries$')]."
 franch_national_assembly_complete_tt:0 "Different ruling coalitions will exert influence over our [concept_states] according to their seat share in the Assembly."
 status_franch_national_assembly_radicals:0 "#U #B The Radical Alliance dominates the Assembly#!#!"
 status_franch_national_assembly_conservatism:0 "#P #B The Order Front dominates the Assembly#!#!"
 status_franch_national_assembly_socialism:0 "#O #B The People’s Alliance dominates the Assembly#!#!"
 status_franch_national_assembly_communlism:0 "#N #B The Communist Bloc dominates the Assembly#!#!"
 status_franch_national_assembly_nobody:0 "#P #B No coalition currently dominates the Assembly#!#!"
 franch_national_assembly_untrust_button:0 "Vote of No Confidence"
 franch_national_assembly_untrust_button_desc:0 "Under the Assembly's regulations, it has the authority to initiate impeachment when the government is deemed unfit to rule or when it endangers the Republic. The current administration clearly meets these criteria. It is time to exercise this constitutional power: dissolve the government and call new elections!"
 franch_national_assembly_untrust_possible_tt:0 "No vote of no confidence has been held in the last 6 months"
 franch_national_assembly_election_button:0 "Call Legislative Elections"
 franch_national_assembly_election_button_desc:0 "Another legislative election begins. New deputies will enter the National Assembly to serve France. The constitution does not forbid deputies from assisting their parties’ campaigns—so why not grant them time to campaign vigorously for their ideals?"
 franch_national_assembly_testlaw_button:0 "Debate Draft Legislation"
 franch_national_assembly_testlaw_button_desc:0 "The Assembly’s most sacred duty is to debate and approve—or reject—laws proposed by the government. A draft law is currently under submission; given its urgency, we must press our deputies to work tirelessly in its review—for France!"
 franch_national_assembly_agro_button:0 "Promote Agricultural Subsidies"
 franch_national_assembly_agro_button_desc:0 "The ruling coalition shows great zeal for safeguarding farmers' interests, claiming agriculture must come before all else. Very well—let them implement their program."
 franch_national_assembly_help_button:0 "Expand Public Budget"
 franch_national_assembly_help_button_desc:0 "The ruling coalition is devoted to improving public welfare and equality. They insist that citizens' rights take precedence above all. Let them enact their vision."
 franch_national_assembly_indu_button:0 "Ease Market Restrictions"
 franch_national_assembly_indu_button_desc:0 "The ruling coalition champions economic growth and industrial progress. They argue that France’s greatness lies in industrial might, but current policies stifle market freedom. Let them see it through."
 franch_national_assembly_radicals_tooltip_conditions:0 "#bold The following add 30 seats monthly:#!\n•#variable A radical leader’s [Concept('concept_interest_group', '$concept_interest_groups$')] is in [concept_in_government]#!\n•#variable The [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] wields major [concept_clout].#!\n\n#bold The following remove 30 seats monthly:#!\n•#variable The Order Front gains seats.#!"
 franch_national_assembly_conservative_tooltip_conditions:0 "#bold The following add 30 seats monthly:#!\n•#variable A traditionalist leader’s [Concept('concept_interest_group', '$concept_interest_groups$')] is in [concept_in_government]#!\n•#variable The [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] wields major [concept_clout].#!\n\n#bold The following remove 30 seats monthly:#!\n•#variable The Radical Alliance gains seats.#!"
 franch_national_assembly_socialist_tooltip_conditions:0 "#bold The following add 30 seats monthly:#!\n•#variable A social democratic leader’s [Concept('concept_interest_group', '$concept_interest_groups$')] is in [concept_in_government]#!\n•#variable The [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] wields major [concept_clout].#!\n\n#bold The following remove 30 seats monthly:#!\n•#variable The Communist Bloc gains seats.#!"
 franch_national_assembly_communist_tooltip_conditions:0 "#bold The following add 30 seats monthly:#!\n•#variable A communist leader’s [Concept('concept_interest_group', '$concept_interest_groups$')] is in [concept_in_government].#!\n\n#bold The following remove 30 seats monthly:#!\n•#variable The People’s Alliance gains seats.#!"
 franch_national_assembly_untrust_effect_tt:0 "[concept_election] will be held in 3 months"
 franch_national_assembly_election_possible_tt:0 "No #bold Legislative Election#! called in the past 12 months"
 franch_national_assembly_election_effect_tt:0 "This grants [concept_momentum] to the [concept_party] of the dominant coalition in the Assembly."
 franch_national_assembly_testlaw_possible_tt:0 "No #bold Draft Legislation Debate#! in 30 months\nThe [concept_law] has not been previously debated"
 franch_national_assembly_policy_possible_tt:0 "No other National Assembly policy in progress"
 franch_national_assembly_agro_possible_tt:0 "No #bold Promote Agricultural Subsidies#! in the past 5 years"
 franch_national_assembly_help_possible_tt:0 "No #bold Expand Public Budget#! in the past 5 years"
 franch_national_assembly_indu_possible_tt:0 "No #bold Ease Market Restrictions#! in the past 5 years"
 franch_national_assembly_indu_2_possible_tt:0 "The Radical Alliance must dominate the Assembly"
 franch_national_assembly_help_3_possible_tt:0 "The Communist Bloc or People’s Alliance must dominate the Assembly"
 franch_national_assembly_help_2_possible_tt:0 "The People’s Alliance or Communist Bloc must dominate the Assembly"
 franch_national_assembly_agro_2_possible_tt:0 "The Order Front must dominate the Assembly"
 fra_untrust_argue_nothing_happen:0 "We found this note in his journal:\n'Nothing happened today.'"
 fra_untrust_argue_something_happen:0 "He will leave politics permanently."
 second_republic_national_assembly_open_1:0 "The conservative Order Front will receive more starting seats."
 second_republic_national_assembly_open_2:0 "The liberal Radical Alliance will receive more starting seats."

 fra_conqueror_alg:0 "Conquest of Algiers"
 fra_conqueror_alg_reason:0 "The coast of Algiers once belonged to the mighty [SCOPE.sCountry('TUR_scope').GetName], but this former ally has grown too feeble to maintain control.\n\nIn 1827, the infamous #bold Fan Affair#! led the #bold Bourbon monarchy#! to blockade the #bold Deylik of Algiers#!. Three years later, our armies landed on the Algerian coast, crushing the forces of #bold Dey Hussein#! at the Battle of Staouéli. The old Deylik collapsed with his defeat, but opportunists and warlords swiftly filled the void.\n\nOur conquest is unfinished. Only when the flag of [ROOT.GetCountry.GetName] flies over every village in Algeria, and every rebel lies buried in the sand, shall we rest.\n\n#variable Long live [ROOT.GetCountry.GetName]!#!"
 fra_conqueror_alg_complete_tt:0 "Victory in Algiers will open a gateway to Africa’s vast frontiers!"
 fra_conqueror_alg_status:0 "#P #B Complete the conquest of Algiers to advance into Africa#!#!"

 fra_aferican_empire:0 "The Veiled Continent"
 fra_aferican_empire_reason:0 "Ages have passed since [ROOT.GetCountry.GetName] last held a vast #bold colonial empire#!. From Quebec to Haiti, the lands once ruled by the #variable French Empire#! are now mere echoes of glory, preserved only in scattered remnants.\n\nYet [ROOT.GetCountry.GetName]’s imperial dreams endure. Our triumph in #bold Algiers#! secures a foothold in North Africa, while trading posts in #bold Senegal#! and #bold the Gambia#! beckon us deeper into #bold West Africa#!. With advances in medicine, we may yet tame the #bold equatorial wilderness#!, transforming it into a #bold civilized paradise#! for France.\n\nOur old rival, [SCOPE.sCountry('GBR_scope').GetName], now watches silently. Unlike their opposition in America and India, London does not contest our African ambitions—granting us rare peace to expand without diplomatic peril.\n\nThe road is long, but [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] knows: From Algiers’ plains to the Congo’s savannas, from the Gulf of Guinea to Lake Chad, the banner of [ROOT.GetCountry.GetName] shall one day fly across this dark continent. #variable Long live [ROOT.GetCountry.GetName]!#!"
 fra_aferican_empire_complete_tt:0 "Complete 9 #bold Veiled Continent#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_conqueror_alg_complete_2_tt:0 "Dominance in Africa will solidify our governance systems."
 fra_north_aferica_province_button_tt:0 "Any #bold French North African#! [concept_state] not [concept_incorporated_state]"
 fra_west_aferica_province_button_tt:0 "Any #bold French West African#! [concept_state] not [concept_incorporated_state]"
 fra_mid_aferica_province_button_tt:0 "Any #bold French Equatorial African#! [concept_state] not [concept_incorporated_state]"
 fra_conqueror_aferica_colony_button_possible:0 "30 months must pass before this action can be taken again."
 fra_aferican_empire_status:0 "#V #O #B Forge a permanent empire in Africa.#!#!#!"

 fra_foreign_legion:0 "French Foreign Legion"
 fra_foreign_legion_reason:0 "To #bold rule Africa#!, we must establish a #variable permanent military presence#! on the continent.\n\nOur forces there will be drawn from local recruits and desperate foreign volunteers. Yet a new legion—one blending ancient mercenary traditions with the discipline of [ROOT.GetCountry.GetName]’s regular army—could prove indispensable. Moreover, the #bold Foreign Legion#! will grant its soldiers French citizenship, ensuring their loyalty in battle."

 fra_conqueror_tun:0 "The Veiled Continent: Tunisia"
 fra_conqueror_tun_reason:0 "The Great Famine before the Revolution revealed [ROOT.GetCountry.GetName]’s fatal weakness: too little arable land. To feed our industries, we must seize fertile territories abroad.\n\nWith [SCOPE.sCountry('SPA_scope').GetName] in decline and [SCOPE.sCountry('TUR_scope').GetName]’s protection a hollow jest, our victory in #bold Algiers#! has left Tunisia defenseless. This land of three harvests per year glows like pirate’s gold, and the Bey’s unpaid debts give us every right to strike. Let us erase the #bold Barbary pirates#! from history once and for all."

 fra_conqueror_mor:0 "The Veiled Continent: Securing Morocco"
 fra_conqueror_mor_reason:0 "Centuries ago, the fearsome #bold Berbers#! and #bold Moors#! crossed the #bold Strait of Gibraltar#!, establishing the #bold Sultanate of Al-Andalus#! and raiding as far as #bold Bordeaux#!, nearly crushing Christendom. Now the tables have turned—Islamic stagnation is evident—yet we watch helplessly as [SCOPE.sCountry('GBR_scope').GetName] dominates the Mediterranean from Gibraltar.\n\nMorocco stands as our prime target to counter British influence. Its #bold fertile lands#! and #bold trade riches#! beckon irresistibly: the time for revenge has come. Let us conquer this land that once inflicted endless suffering upon Christendom."

 fra_conqueror_sahara:0 "The Veiled Continent: Taming the Sahara"
 fra_conqueror_sahara_reason:0 "The #bold Sahara Desert#! may seem a worthless expanse of sand, yet it remains a vital #bold land bridge#! between our North and West African holdings. The desert tribes are weak; only the harsh environment shields them. Once our soldiers adapt, this vast territory will fall effortlessly under our rule."
 fra_conqueror_sahara_button:0 "Launch Sahara Expedition"
 fra_conqueror_sahara_button_desc:0 "The Sahara's brutality deters most explorers and soldiers. But with proper funding and equipment, we may yet attract bold pioneers to claim these lands."
 fra_conqueror_sahara_complete_tt:0 "Completed #bold The Veiled Continent: Conquest of Tunisia#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_conqueror_sahara_status:0 "Expand our desert territories to unify North Africa."

 fra_north_aferica_province:0 "French North Africa: Overseas Department"
 fra_north_aferica_province_reason:0 "Progress will track the number of provinces converted to [concept_incorporated_state].\n\nOur military campaigns have pacified North Africa. With only the Mediterranean separating it from our homeland, many advocate for full integration under Parisian governance. However, lingering resentment from years of war demands an alternative solution: [concept_migration].\n\nState-sponsored resettlement of [concept_pop] from mainland France could transform this region within decades. Soon enough, there will be no Algerians, Berbers, or Tunisians—only Frenchmen of the desert!"
 fra_north_aferica_province_complete:0 "Complete the incorporation of French North Africa."
 fra_aferica_province_on_complete:0 "This marks a decisive step in Africa's integration."
 fra_north_aferica_province_button:0 "Consolidate North African Colonies"
 fra_north_aferica_province_button_desc:0 "North Africa was initially classified as colonial territory. Full integration would provoke nationalist backlash at home."
 fra_aferica_province_button_tt:0 "This action cannot be repeated within 3 months."

 fra_conqueror_westaferica:0 "The Veiled Continent: West African Dominion"
 fra_conqueror_westaferica_reason:0 "A legend persists in the Islamic world: pilgrims from Mali journeyed to Mecca, scattering #bold gold and gems#! like pebbles, their garments and steeds adorned with wealth beyond measure.\n\nWhile the tale may be fanciful, West Africa undeniably harbors vast #bold gold deposits#! and #bold arable land#!—riches that rightfully belong to [ROOT.GetCountry.GetName]. Moreover, control of these Atlantic trade routes would amplify our global influence.\n\nThe region's fertile coast could become a #bold resource hub#!, a vision strongly endorsed by the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]."
 fra_conqueror_westaferica_button:0 "Advance West African Campaign"
 fra_conqueror_westaferica_button_desc:0 "Recruiting troops for West Africa's harsh climate is difficult—but gold and glory will always find takers."

 fra_conqueror_mauritania:0 "The Veiled Continent: Mauritania"
 fra_conqueror_mauritania_reason:0 "To most, #bold Mauritania#! appears a barren wasteland, inhabited only by scattered #bold Berber tribes#! and #bold indigenous peoples#!. Yet geologists whisper of mineral wealth beneath its sands. While the British linger on the coast, we must strike inland to establish a #bold forward base#! for Africa's conquest.\n\nMauritania shall belong to [ROOT.GetCountry.GetName]!"
 fra_conqueror_niger_complete_tt:0 "Completed #bold The Veiled Continent: West African Dominion#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_conqueror_mauritania_button:0 "Fund Mauritanian Colonization"
 fra_conqueror_mauritania_button_desc:0 "Mauritania's deserts defy settlement—but sufficient investment may yet tame them."
 fra_conqueror_mauritania_status:0 "Secure Mauritania to advance toward Niger."

 fra_conqueror_niger:0 "The Veiled Continent: The Niger Campaign"
 fra_conqueror_niger_reason:0 "Our victories in West Africa and Mauritania unveil a new prize: the #bold African interior#!. Where the #bold Mali#! and #bold Songhai Empires#! once flourished, rumors now speak of #bold diamonds#!, #bold rubber#!, and #bold mineral wealth#! ripe for the taking.\n\nMalaria and brutal climates may test our resolve, but we cannot ignore this opportunity. Let us cross the desert and claim what is ours—every tribe subdued, every treasure seized, every inch of land under our banner. Long live [ROOT.GetCountry.GetName]!"
 fra_conqueror_niger_button:0 "Dispatch Niger Expedition"
 fra_conqueror_niger_button_desc:0 "The Sahel's unforgiving terrain has deterred explorers—but generous funding will overcome all obstacles."
 fra_conqueror_niger_status:0 "Conquer Niger to unify West Africa."

 fra_west_aferica_province:0 "French West Africa: Overseas Department"
 fra_west_aferica_province_reason:0 "Progress will track the number of provinces converted to [concept_incorporated_state].\n\nWest Africa exists almost #bold isolated from the world#!, with a dense [concept_pop] of Muslim inhabitants. Its distance from our homeland makes North African-style [concept_migration] policies impractical here.\n\nYet the weakening of traditional beliefs presents an opportunity: these natives lack strong national consciousness. Through proper education and influence, we can [concept_assimilation] multitudes of dark-skinned 'Frenchmen'. By creating these spiritually loyal subjects, we may transform this colony into a true overseas province - solving our [concept_pop] shortages and [concept_working_adults] deficits."
 fra_west_aferica_province_complete:0 "Complete incorporation of French West Africa."
 fra_west_aferica_province_button:0 "Consolidate West African Colonies"
 fra_saferica_province_button_tt:0 "3个月内没有采取该行动"
 fra_west_aferica_province_button_desc:0 "West Africa was initially classified as colonial territory. Full integration would provoke nationalist backlash at home."

 fra_conqueror_chad:0 "The Veiled Continent: Claiming Chad"
 fra_conqueror_chad_reason:0 "Chad represents a #bold major flashpoint#! in our African border disputes with [SCOPE.sCountry('GBR_scope').GetName]. This territory controls key #bold trans-Saharan trade routes#! and contains surprising stretches of arable land. Our [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] insist it could become a prime #bold cotton cultivation zone#!.\n\nWhether this proves true or not, capturing Chad would significantly strengthen [ROOT.GetCountry.GetName]'s strategic position in Africa. Forward to conquest!"
 fra_conqueror_chad_status:0 "Secure Chad to establish unified Central African provinces."

 fra_conqueror_cameroon:0 "The Veiled Continent: Cameroon Campaign"
 fra_conqueror_cameroon_reason:0 "#bold Cameroon#! occupies one of West Africa's most strategic locations - bordering Nigeria, the Congo, and Chad's deserts. Its #bold Gulf of Guinea#! coastline offers favorable climate and naval access.\n\nHowever, since the #bold slave trade era#!, European powers like [SCOPE.sCountry('SPA_scope').GetName] and [SCOPE.sCountry('GBR_scope').GetName] have established competing colonies here. For [ROOT.GetCountry.GetName]'s interests, we must seize this vital territory."
 fra_conqueror_cameroon_status:0 "Conquer Cameroon to advance into Chad."
 fra_conqueror_cameroon_button:0 "Launch Central African Expedition"
 fra_conqueror_cameroon_button_desc:0 "Central Africa's malaria-ridden rainforests pose serious obstacles. We may need to recruit skilled doctors to accompany our troops."

 fra_conqueror_madagascar:0 "The Veiled Continent: Madagascar Calling"
 fra_conqueror_madagascar_reason:0 "The #bold Merina Kingdom#! of Madagascar has long been contested between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('GBR_scope').GetName]. This vast island combines highlands, savannas and tropical forests rich in timber.\n\nMore importantly, it commands vital Indian-Atlantic trade routes. Controlling Madagascar would secure [ROOT.GetCountry.GetName]'s #bold strategic interests#! in East Africa."

 fra_mid_aferica_province:0 "French Central Africa: Overseas Department"
 fra_mid_aferica_province_reason:0 "Progress will track the number of provinces converted to [concept_incorporated_state].\n\nAs Africa's most primitive and religiously fragmented region, Central Africa demands... unconventional governance methods. Resettling mainland [concept_pop] alongside our #bold 'Desert Frenchmen'#! from Algeria could #bold balance local demographics#!.\n\nWith countless tribes scattered across impossible terrain, we cannot maintain large garrisons here. Instead, we must adopt British colonial tactics: #bold divide et impera#! - fragmenting native power structures for easier control.\n\nThis remains temporary. The day these peoples truly embrace French identity will mark their complete [concept_assimilation]."
 fra_mid_aferica_province_complete:0 "Complete incorporation of French Central Africa."
 fra_mid_aferica_province_button:0 "Consolidate Central African Colonies"
 fra_mid_aferica_province_button_desc:0 "Central Africa was initially classified as colonial territory. Full integration would provoke nationalist backlash at home."

 fra_conqueror_indochina:0 "The Indochina Gambit"
 fra_conqueror_indochina_reason:0 "Asia's mysteries have tempted Europe for generations. While [SCOPE.sCountry('GBR_scope').GetName] led this exploitation, we needn't settle for scraps. Establishing colonies in #bold Indochina#! offers splendid alternatives.\n\nRelying solely on African resources jeopardizes our interests. Southeast Asia's legendary rice paddies and luxury trades have enriched Europe for centuries. The declining [SCOPE.sCountry('CHI_scope').GetName] presents new opportunities - these humid lands require minimal [concept_colony] infrastructure, being ideal for plantations staffed by locals.\n\nThough expelled from India, we shall not fail in Indochina! Long live [ROOT.GetCountry.GetName]!"

 communaute_union_france:0 "The French Union"
 communaute_union_france_reason:0 "Progress will track #bold independence movements#! across Africa under [ROOT.GetCountry.GetName]'s rule.\n\nThrough our #bold prolonged African conquests#! and the #bold consolidation of [concept_government] authority#!, many African #variable overseas departments#! have gained varying autonomy. Under our guidance, their societies have become civilized and prosperous.\n\nYet this enlightenment carries an unfortunate consequence - educated #bold separatists#! now wave nationalist banners, demanding independence from our benevolent rule. The irony is palpable: were it not for our introduction of philosophy, literature, science and governance, these ingrates wouldn't even comprehend the concept of nationhood!\n\nNevertheless, rising nationalism in our overseas territories #bold demands Paris' attention#!. [SCOPE.sCountry('GBR_scope').GetName]'s failures demonstrate that brute suppression is #bold unsustainable long-term#!. We must summon their representatives to Paris, grant them #bold generous parliamentary seats#!, and extend #bold full French citizenship#! to all colonial subjects - elevating them to equal status with metropolitan citizens.\n\n#bold France must unite under one banner#! The time has come to formalize this indissoluble Union. [ROOT.GetCountry.GetName] shall never be divided!"
 fra_communaute_union_france_possible_1_tt:0 "Completed #bold French North Africa: Overseas Department#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_communaute_union_france_possible_2_tt:0 "Completed #bold French West Africa: Overseas Department#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_communaute_union_france_possible_3_tt:0 "Completed #bold French Central Africa: Overseas Department#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 fra_communaute_union_france_tt:0 "If African independence movements reach 1000, the French Union will dissolve!"
 fra_communaute_union_france_complete_tt:0 "All African #bold overseas departments#! will #bold lose their status#! and become [concept_unincorporated_state]"
 communaute_union_france_1_status:0 "#O #B Independence movements emerging in the French Union!#!#!"
 communaute_union_france_2_status:0 "#N #B Independence movements becoming serious in the French Union!#!#!"
 communaute_union_france_3_status:0 "#N #B The French Union's stability is collapsing!#!#!"
 communaute_union_france_status:0 "#P #B The French Union remains stable.#!#!"
 communaute_union_france_1_button:0 "Increase Colonial Welfare"
 communaute_union_france_button_50_effect_tt:0 "+50 Independence Movement"
 communaute_union_france_1_button_effect_tt:0 "-100 Independence Movement"
 communaute_union_france_button_25_effect_tt:0 "减少5独立倾向，持续5个月"
 communaute_union_france_1_button_desc:0 "Though some consider them second-class citizens, colonial subjects deserve equal welfare benefits under our laws of universal citizenship."
 communaute_union_france_1_button_possible_tt:0 "Cannot repeat within 5 years"
 communaute_union_france_2_button:0 "Develop Colonial Agriculture"
 communaute_union_france_2_button_desc:0 "Africa's untapped arable land and farming traditions make it ideal for agricultural expansion. Modest incentives could yield abundant natural resources."
 communaute_union_france_2_button_possible_tt:0 "Cannot repeat within 5 years"
 communaute_union_france_3_button:0 "Promote Colonial Industry"
 communaute_union_france_3_button_desc:0 "Africa's weak industrial base contradicts its role as France's manufacturing reserve. Relaxing wage restrictions may attract metropolitan investors."
 communaute_union_france_3_button_possible_tt:0 "Cannot repeat within 5 years"
 communaute_union_france_4_button:0 "Accelerate Colonial Development"
 communaute_union_france_4_button_desc:0 "Regardless of approach, colonial modernization remains our priority. Let us channel resources into Africa's transformation."
 communaute_union_france_4_button_possible_tt:0 "Cannot repeat within 5 years"
 communaute_union_france_5_button:0 "Expand Colonial Conscription"
 communaute_union_france_5_button_desc:0 "France's wars demand colonial manpower. With metropolitan forces stretched thin, conscription orders must be issued!"
 communaute_union_france_5_button_possible_tt:0 "Cannot repeat within 5 years"
 communaute_union_france_button_100_effect_tt:0 "+100 Independence Movement"
 communaute_union_france_progress_bar_1_tt:0 "正在#G 增加海外省的福利金#!"
 communaute_union_france_progress_bar_2_tt:0 "正在#N 开拓海外省的农牧业#!"
 communaute_union_france_progress_bar_3_tt:0 "正在#N 鼓励海外省的制造业#!"
 communaute_union_france_progress_bar_4_tt:0 "正在#G 推进海外省的建设#!"
 communaute_union_france_progress_bar_5_tt:0 "正在#N 从海外省增加征兵#!"
 communaute_union_france_progress_bar:0 "海外省独立倾向"
 communaute_union_france_progress_bar_desc:0 "海外省独立倾向：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!（[JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/1000）"

 russian_franco_alliance:0 "The Franco-Russian Alliance"
 russian_franco_alliance_reason:0 "As [ROOT.GetCountry.GetName], we and [SCOPE.sCountry('RUS_scope').GetName] are the most geographically distant nations in Europe, with starkly contrasting political systems. History bears witness to the bitter enmity between us—Emperor Napoleon's ill-fated invasion of Russia in 1812 forced Tsar Alexander I to burn Moscow itself rather than surrender it to the Grande Armée.\n\nYet the tides of geopolitics shift. Driven by #bold pragmatic interests#!, [SCOPE.sCountry('RUS_scope').GetName] now seeks to bury old grudges and stand with us against the rising threat of Central Europe. Moreover, their frantic industrialization demands #bold capital and advanced technology#!—resources our nation, as a willing benefactor, can provide. Together, we may forge a #bold mutually prosperous partnership#!.\n\nLast month, a [SCOPE.sCountry('FRA_scope').GetName] diplomatic delegation arrived aboard our warships at Kronstadt. In a symbolic gesture at the #bold Peterhof Palace#! on the shores of the Gulf of Finland, the Russian Tsar hosted a grand luncheon for our ambassador. There, our orchestra played #bold La Marseillaise#!—a revolutionary anthem still frowned upon by the Tsarist regime—yet the Tsar and his court rose in solemn respect, a deliberate overture of reconciliation.\n\nThe ice between our nations has broken. Let this alliance endure for generations, unyielding against all foes.\n\n#bold Together, France and Russia shall be unbreakable!#!"
 franco_russian_alliance_possible_tt:0 "Germany stands unified."
 fra_alliance_1_button:0 "Invest in Russian Railways"
 fra_alliance_1_button_desc:0 "Russia's ambitious railway expansion is hampered by its empty treasury. By extending loans to fund their iron roads, we may earn their lasting gratitude—and bind their economy to ours."
 fra_alliance_1_button_tt:0 "Cannot #bold Invest in Russian Railways#! again for 5 years."
 fra_alliance_2_button:0 "Dispatch Scientific Advisors"
 fra_alliance_2_button_desc:0 "While Russia lacks native scientific prowess, France's Enlightenment legacy shines bright. Sending our savants to Moscow will accelerate their modernization—and our influence."
 fra_alliance_2_button_tt:0 "Cannot #bold Dispatch Scientific Advisors#! again for 2 years."
 fra_alliance_3_button:0 "Request Russian Labor Migration"
 fra_alliance_3_button_desc:0 "Our factories hunger for sturdy hands, and Russia's peasant masses toil endlessly. Let them cross borders to fuel our industries—their sweat will grease the wheels of progress!"
 fra_alliance_3_button_tt:0 "Cannot #bold Request Russian Labor Migration#! again for 3 years."
 fra_alliance_4_button:0 "Demand Grain Export Agreements"
 fra_alliance_4_button_desc:0 "Though our own farms flourish, why waste French labor on soil when Russia's black earth yields cheap abundance? Secure tariffs favorable to our merchants."
 fra_alliance_4_button_tt:0 "Cannot #bold Demand Grain Export Agreements#! again for 5 years."
 fra_alliance_5_button:0 "Sign the Mutual Defense Pact"
 fra_alliance_5_button_desc:0 "As storm clouds gather over Europe, we must call upon Russia to honor its military obligations. Let their bear stand shoulder-to-shoulder with our lion!"
 fra_alliance_5_button_tt:0 "May only be renewed once per decade."
 fra_alliance_6_button:0 "Abrogate the Franco-Russian Alliance"
 fra_alliance_6_button_desc:0 "This marriage of convenience has run its course. Let the Tsar keep his frozen wastes—we shall face the future alone!"
 russian_franco_alliance_tt:0 "#bold Investing in railways or sending scientists#! each grants +25 Cooperation.\n#bold Requesting laborers or grain#! each costs 50 Cooperation.\nWhen the hour demands it, #bold sign the Mutual Defense Pact#! to formalize military ties—or #bold tear up the treaty#! and sever all relations."
 franco_russian_alliance_possible_2_tt:0 "We have accepted France's proposal."
 franco_russian_alliance_refuse_tt:0 "We shall reject any Franco-Russian entanglements."
 franco_russian_alliance_agree_tt:0 "We accept France's offer!\nThis unlocks the Franco-Russian Alliance journal entry."
 fra_alliance_button_need_50_tt:0 "Requires at least 50 Cooperation."

 paris_industrialize:0 "The Transformation of Paris"
 paris_industrialize_reason:0 "For a millennium, #variable Paris#! has been the beating heart of [ROOT.GetCountry.GetName]—a nexus of commerce, culture, and power. But the age of steam demands radical reinvention.\n\nLet us embark on a #bold grand travaux#! to remake the city in industry's image: replacing medieval alleys with Haussmann's grand boulevards, demolishing slums for steel-girded monuments to progress. Paris shall rise anew, draped in #bold the soot and splendor of modernity#!."
 paris_industrialize_status:0 "Forge Paris into Europe's crowning jewel."

 partant_pour_la_syrie:0 "Onward to Syria!"
 partant_pour_la_syrie_reason:0 "The #bold Bonapartist faction#! now dominates [ROOT.GetCountry.GetName]'s politics, their nostalgia for the #bold Napoleonic Empire#! stoked by tales of Marengo and Austerlitz. They clamor for martial glory—and [concept_government] must appease them.\n\nSyria, nominally under [SCOPE.sCountry('TUR_scope').GetName]'s crumbling rule, presents the perfect target. Here, in 1799, Napoleon's Oriental dreams foundered at Acre. Now, #bold our tricolor shall fly where his eagles fell#!."

 before_french_provisional_republic_tt:0 "#V #P #B A Provisional Government will seize power, resurrecting the Republic absent since 1804.#!#!#!\n#V #U #B Monarchists led by [GetIdeology('ideology_bonapartist').GetName] will counterattack, forcing a choice between consolidating the Republic or restoring the Bonapartist dynasty—unlocking corresponding journal entries.#!#!#!"
 fra_complete_natural_borders_tt:0 "Completed #V France's Natural Borders#! [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 french_provisional_republic:0 "The Second Republic"
 french_provisional_republic_reason:0 "#B This progress bar tracks#!#V how long republican forces maintain dominance in [ROOT.GetCountry.GetName].#!\n\nFollowing #V the storming of the Bastille in 1789#! and #V the Three Glorious Days of 1830#!, yet another [concept_turmoil] has engulfed Paris. The #B Orléanist [GetLawType('law_monarchy').GetName]#! collapsed as #V Louis-Philippe#! fled the Tuileries Palace. Under [SCOPE.sCharacter('french_provisional_republic_ruler').GetFullName], a Provisional Government and Constituent Assembly now rise—marking the first return of #B republican rule#! since #V Napoleon's Empire#!.\n\nYet [ROOT.GetCountry.GetName]'s [GetLawType('law_presidential_republic').GetName] remains precarious. While long-suppressed republicans celebrate, their shaky alliance with so-called #V 'Tomorrow’s Republicans'#!—#B in truth, monarchist factions#!—crumbles. The [GetIdeology('ideology_bonapartist').GetName] and [GetIdeology('ideology_legitimist').GetName] factions now unite under a #B Monarchist Bloc#!, buoyed by the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] and [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]. They clamor to crown a #V new Bonaparte#!.\n\nMeanwhile, Paris’ economic crisis swells the ranks of radical leftist [concept_political_movement]s. Unrest persists; neither republicans nor monarchists are safe from the mob’s wrath.\n\n#B The Republic’s fate hangs by a thread.#! Can #V Revolutionary France#!—that youthful, idealistic beacon—reawaken to guide [ROOT.GetCountry.GetName] to stability?"
 french_provisional_republic_complete_tt:0 "#V Republicans#! outmaneuvered #V Monarchists#! for 5 years."
 french_provisional_republic_on_complete_tt:0 "Republican institutions in [ROOT.GetCountry.GetName] will stabilize."
 french_provisional_republic_fail_tt:0 "#V Monarchists#! gained supremacy, and #V the Bonapartes#! have returned."
 french_provisional_republic_fail_2_tt:0 "National Workshops and leftist agitation have been suppressed."
 french_provisional_republic_fail_3_tt:0 "Election results are certified; voting laws entrenched."
 french_provisional_republic_on_fail_tt:0 "A coup will overthrow the Republic!"
 french_provisional_republic_status:0 "#bold The Republic teeters between republican zeal and monarchist resurgence.#!"
 french_provisional_republic_republic_progress_bar:0 "“Yesterday’s Republicans”"
 french_provisional_republic_republic_progress_bar_desc:0 "Republican Momentum: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 french_provisional_republic_republic_progress_bar_change_button:0 "Backing the Republicans"
 french_provisional_republic_republic_progress_bar_change_event:0 "Republican gains from recent events"
 french_provisional_republic_monarchy_progress_bar:0 "“Tomorrow’s Republicans”"
 french_provisional_republic_monarchy_progress_bar_desc:0 "Monarchist Momentum: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 french_provisional_republic_monarchy_progress_bar_change_button:0 "Backing the Monarchists"
 french_provisional_republic_monarchy_progress_bar_change_event:0 "Monarchist gains from recent events"
 french_provisional_republic_1_button:0 "Support the Republicans"
 french_provisional_republic_1_button_desc:0 "The republican cause faces existential peril. We must ensure the government’s loyalty to democratic ideals."
 french_provisional_republic_2_button:0 "Support the Monarchists"
 french_provisional_republic_2_button_desc:0 "This Republic is but a transient experiment. We must act swiftly to restore the Crown’s divine authority."
 french_provisional_republic_button_timer_tt:0 "Cannot switch allegiance for 1 year."
 french_provisional_republic_1_button_tt:0 "#V “Yesterday’s Republicans”#! gain +2 monthly momentum."
 french_provisional_republic_2_button_tt:0 "#V “Tomorrow’s Republicans” (Monarchists)#! gain +2 monthly momentum."
 french_provisional_republic_republican_event_support_increase_tt:0 "#V “Yesterday’s Republicans”#! gain +10 monthly momentum for 3 months."
 french_provisional_republic_monarchy_event_support_increase_tt:0 "#V “Tomorrow’s Republicans”#! gain +10 monthly momentum for 3 months."
