l_english:

 joi_flavor_fra.1.t: "Reconstitution of the National Assembly!"
 joi_flavor_fra.1.d: "Since the republican ideals forged in the era of the Great Revolution, republican institutions have been revived once more in [ROOT.GetCountry.GetName]: The citizen's parliament, originally established by the Third Estate, has been reconstituted and bestowed once more with the name of the body that proclaimed the Declaration of the Rights of Man—the National Assembly!"
 joi_flavor_fra.1.f: "«Liberty, property, security, and resistance to oppression are natural and imprescriptible rights of man... The right to property is inviolable and sacred.»\n«Men are born and remain free and equal in rights. Social distinctions may be founded only upon the general good... No person shall be accused, arrested, or imprisoned except in the cases and according to the forms prescribed by law. Those who solicit, expedite, execute, or cause to be executed arbitrary orders shall be punished.»\n«The free communication of ideas and opinions is one of the most precious rights of man... The guarantee of the rights of man and citizen requires public force: this force is therefore instituted for the advantage of all, and not for the personal benefit of those to whom it is entrusted.»"
 joi_flavor_fra.1.a: "The Assembly's duties must not exceed their limits."
 joi_flavor_fra.1.b: "Long live the free French Republic!"

 joi_flavor_fra.2.t: "Impeachment Debate"
 joi_flavor_fra.2.d: "A debate on whether [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is fit for office has convened today at the Palais Bourbon, seat of the National Assembly."
 joi_flavor_fra.2.f: "«Nothing proves this government's incompetence more than [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] themselves!»\n«Scoundrel! Is the opposition leader not engaging in shameless political opportunism, placing party above nation? Does he not seek to mask his own lack of policy on this grave matter?»\n«We are a democracy—our parties decide what policies to campaign on... The recent historic and humiliating defeat stems from governmental chaos and failure. Clearly, this administration's core plan on the nation's most pressing issue cannot command support. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has lost control; the government has lost the capacity to govern.»\n«Order! The deputy may seek intervention, but he shall not scream observations across the chamber in frustration!»\n«Thank you, Mr. Speaker. Yet as I've made plain, all precedent dictates that when a government suffers a defeat like last night's, it must resign and allow the people to elect a new assembly to address the nation's crises.»"
 joi_flavor_fra.2.a: "301 in favor, 299 against—[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is out!"
 joi_flavor_fra.2.b: "299 in favor, 301 against—[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] prevails!"

 joi_flavor_fra.3.t: "Tocqueville's Observations"
 joi_flavor_fra.3.d: "The conquest of Algiers is complete, yet its governance remains a pressing question for [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]..."
 joi_flavor_fra.3.f: "«#bold As the gentlemen know#!, Algiers stretches nearly straight from west to east, parallel to the sea, where stands a chain of high mountains called the #bold Atlas#!. At times, the Atlas suddenly recedes southward, revealing long, broad plains. Elsewhere, it presses close to the coast, bathing its last peaks in the waves. Occasionally, it folds upon itself, cradling deep valleys within its contours.»\n«The Atlas is home to #bold Berbers and Arabs#!; wherever you see a mountain, you may be certain an Arab tribe hides in its folds, and wherever a plain unfolds, Berber encampments will soon dot the horizon.»\n«I am convinced the Berbers' #bold religious devotion#! is lukewarm. They are a stoic, self-interested people who care more for this world than the next—#bold they may be subdued more easily by our luxuries and arts than by our cannons.#!»\n«As for the Arabs along Africa's coast, they possess many vices: like all semi-wild peoples, they #bold prize power and strength#! above all. They hold life cheap, #bold despise commerce and art#!, and #bold revel in war and clamor#!; they are haughty yet credulous, prone to unthinking fervor or excessive despair, their actions often immoderate, guided more by passion than reason.»\n«In short, gentlemen, I have shown you Algiers #bold before our conquest#!... Much more could be said of the Arabs, but I must restrain myself—the journal's confines demand it.»"
 joi_flavor_fra.3.a: "The government shall take this under advisement."

 joi_flavor_fra.4.t: "Hero of Africa"
 joi_flavor_fra.4.d: "The soldiers who fought in Africa have returned to [ROOT.GetCountry.GetName], welcomed as heroes with the warmest acclaim."
 joi_flavor_fra.4.f: "«Mama! Who are these men in formation?»\n«They are France's soldiers, child. Soldiers of Napoleon.»\n«Who is Napoleon?»\n«Our Emperor, our greatest general... or so they say. In any case, the British and Austrians have joined with Russians and Swedes to invade us... We've no choice but to fight back, my dear.»\n«Oh! Why would they invade us?»\n«Our nation... they seek to destroy la patrie; they come to burn, to slaughter, to pillage... they are wicked men.»\n«Truly?»\n«Yes, my love... Your father marches among them—see? He waves to you!»\n«Papa! Papa!»\n«Your father must go... How I wish he could stay...»"
 joi_flavor_fra.4.a: "Summon him to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]!"
 joi_flavor_fra.4.b: "Let him retire in peace."

 joi_flavor_fra.5.t: "A Young Lieutenant"
 joi_flavor_fra.5.d: "After countless campaigns and struggles, [ROOT.GetCountry.GetName] has finally raised the French flag over the captured city of Tunis."
 joi_flavor_fra.5.f: "«What troubled him most was his attire. To be a #bold true infantryman#!, adorned with ribbons and crosses, clad in the #bold Grande Armée's greatcoat#!—all very well, yet one must still prove he is #bold no provincial bumpkin#!. On the train, he pondered every detail his meager purse could afford. A carriage brought him to Rue de la Paix. Night had fallen; he slipped into Charvet's shop just as the doors were closing.»\n«'I require a shirt,' he declared, his face still bearing the #bold cheerful roughness#! acquired at a tavern earlier.»\n«'We've none ready-made, lieutenant,' replied Monsieur Charvet, torn between respect for the uniform and suspicion of the social rank it might conceal.»\n«Ungern flushed. This was, of course, his first time in such an establishment—recommended by an old officer on the train.»\n«Charvet adopted a pitying smile: 'Listen, Monsieur Robert. A client left an order here... urgent business in America, you see... If these shirts suit you...'»\n«Ungern marveled at the selection—#bold exquisite blue fabric#!—running his fingers over the shoulders. 'But will it fit, monsieur? The sleeves seem...'»\n«The fine cloth and hue #bold awakened his desire#!; he could scarcely believe his fortune.»\n«'It will.'»\n«Outside, Ungern glanced about, triumphant: this #bold tall, lithe infantryman#!, weighted by his shako, now basked in the warm, perfumed air—and the shirt's soft embrace.»"
 joi_flavor_fra.5.a: "Hail our brave soldier!"

 joi_flavor_fra.6.t: "A Cursed Vessel"
 joi_flavor_fra.6.d: "After relentless campaigns, [ROOT.GetCountry.GetName] has at last planted the French flag atop Meknes, capital of Morocco."
 joi_flavor_fra.6.f: "«My dear Uncle Biggs,»\n\n«I am in a writing mood, so I seize the moment to send a few lines—both to apprise you of my state and to hope that someday I may receive your reply. I should treasure it, for six months have passed since I last saw a familiar face or heard news from home in Meknes.»\n\n«I departed Toulon March 16th aboard the Thétis, calling at Majorca and Oran—a pleasant voyage, with tolerable fare and daily swims. But fortune faltered: we were transferred to the wretched Alson, enduring four weeks of torment. The ship was verminous, our shirts inspected daily. Rations were meager and foul; worse still, the mess had rotted. What relief to disembark at Casablanca! I emerged from that floating wreck gaunt and hollow-cheeked.»\n\n«Here, most labor falls to native women—a curious sight, for the men do little. Their Sundays pass like weekdays, observing only their own holy days. Turkish tobacco sells at 11 centimes per hundred cigarettes; they are tolerable.»\n\n«The place boasts a hotel or two and an Italian eatery, but otherwise resembles Algiers in its squalor.»\n\n«Letters arrive irregularly; the post’s uncertainty leaves us ever guessing.»\n\n«Not a station I would choose, yet choice was never mine.»\n\n«Your affectionate nephew,»\n«Robert-Joseph Jean-Ungern»"
 joi_flavor_fra.6.a: "Perhaps conditions ought to improve."

 joi_flavor_fra.7.t: "Desert Grumblings"
 joi_flavor_fra.7.d: "Through arduous campaigns, [ROOT.GetCountry.GetName] has expanded its dominion deep into the vast Sahara."
 joi_flavor_fra.7.f: "«Dearest Mother,»\n\n«Thank you for your long, kind letter—do not fret, I shall reply in full when time allows.»\n\n«As the address shows, I’ve left Biskra. My regiment quit the Saharan frontier in January—where winter bites cruelly—traveling three days by rail from Bône, then three more by steamer to Ajaccio, where we’ve joined the 7th Division. I commanded a detachment stationed near native tribes who harried us often, though without lasting harm.»\n\n«The desert’s heat after winter is unbearable: endless sands, scorching sun, and flies that torment without cease. A far cry from Marseille! Never did I imagine crossing the Sahara atop a camel. I am in sound health, yet shall rejoice when this struggle ends, and I return unscathed.»\n\n«P.S.: I’ve been promoted—spare no worry for me.»\n\n«Your devoted son,»\n«Robert»"
 joi_flavor_fra.7.a: "Let him rest awhile."

 joi_flavor_fra.8.t: "[ROOT.GetCountry.GetRuler.GetFirstName]'s Proposal"
 joi_flavor_fra.8.d: "With North Africa’s overseas provinces now under direct rule from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] proposes integrating the region as de jure French soil."
 joi_flavor_fra.8.f: "«All who reject our terms must be despoiled. Let everything be seized or razed—spare neither age nor sex: where French boots tread, let no grass grow.»\n«Whatever our philanthropists say, ends justify means. I’ve warned my soldiers personally—bring me a living Arab, and they’ll taste the flat of my saber...»\n«My dear friend, we must wage war thus: slay every male over fifteen, ship their women and children to the Marquesas or beyond.»\n«In short, annihilate all who won’t crawl like dogs at our feet.»"
 joi_flavor_fra.8.a: "France’s heartland must remain in Europe."
 joi_flavor_fra.8.b: "Who dares deny Algiers is part of France?!"

 joi_flavor_fra.9.t: "Paper Shortage"
 joi_flavor_fra.9.d: "Through tireless campaigns, [ROOT.GetCountry.GetName] has secured territory in West Africa’s fertile plains."
 joi_flavor_fra.9.f: "«Dear Anna,»\n\n«Forgive my delayed reply—recent duties left little time. As my kit is presently inaccessible, I write briefly, for my paper runs low. Next letter shall be fuller.»\n\n«Your last budget arrived after my postcard was sent. Such effort you’ve spent on those foolscap sheets! Yet I read them eagerly, for here I find it hard to pen anything amusing. My own letters must bore you terribly...»\n\n«I noted all your news of the office and our comrades abroad—but poor old Rippington! This was my first word of his fate...»\n\n«May our friends still in the desert emerge safely from this ordeal. André Corning and others are gone—a bitter toll.»\n\n«I must end here, Anna; the page is nearly full. Give my regards to all at home, and to any who ask of me...»\n\n«Yours,»\n«Ungern»"
 joi_flavor_fra.9.a: "A paper shortage, truly?"

 joi_flavor_fra.10.t: "Dispatched Letters"
 joi_flavor_fra.10.d: "After relentless campaigning, [ROOT.GetCountry.GetName] has extended its reach into Mauritania’s deserts."
 joi_flavor_fra.10.f: "«Dear Anna,»\n\n«A brief note to say we fare well—I forget what news I last sent. Days after returning from leave, we marched along the Niger toward Niamey, where native tribes massed thickly; others gathered beyond the border at Maradi.»\n\n«The Sahara is cruel—nothing but sand, sand, and more sand. Weeks we spent there, marching daily under blistering sun, covering dozens of leagues, all supplies hauled by mule and camel through rocky passes. At one camp, tainted water gave forty men typhoid; seven died, though the rest recovered.»\n\n«Yet despite these trials, Mauritania now lies quiet, and we’ve returned intact to Saint-Louis.»\n\n«Give my regards to Father and Mother. I trust all are well—we’ll meet again in some months.»\n\n«Affectionately,»\n«Robert Ungern»"
 joi_flavor_fra.10.a: "May they reunite soon."

 joi_flavor_fra.11.t: "Into the Interior"
 joi_flavor_fra.11.d: "After relentless campaigning, [ROOT.GetCountry.GetName] has expanded its dominion to the shores of Lake Chad."
 joi_flavor_fra.11.f: "Dearest Mother,\n\nMy address confirms my good health. What a different life this is! At first, sleeping on four blankets laid upon the hard ground seemed unbearable. Only last night did I finally rest properly. The rations are adequate, though service is rough. The climate is dreadful, yet my condition remains unchanged since departure. I've been unable to tend to my hair as you advised, and my collar now resembles the grating of some bureaucrat's office.\n\nA slight cough troubled me last Thursday, but it has passed. I forgot to mention—upon arrival, we were quartered in separate tents. Mine is quite tolerable, far more comfortable than the barracks. You needn't worry. Three other officers share the space: fine Lyonnais and Breton lads, one of whom knew my academy superintendent. They've shown me unexpected kindness—more than some of our own men—which astonishes me.\n\nI must close now. Often I recall our walks through town, the fields and meadows of our village near Marseille. It all seems so distant. I can only hope to return someday. Yet duty calls, and one prays this endeavor ends swiftly.\n\nYour loving son,\nRobert"
 joi_flavor_fra.11.a: "May he return home safely."

 joi_flavor_fra.12.t: "Establishment of the West African Administrative District"
 joi_flavor_fra.12.d: "With West Africa's overseas territories now under direct administration from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], a new governance system is implemented to serve both French and native interests."
 joi_flavor_fra.12.f: "Imagine, monsieur, these agile sons of the desert—accustomed to the whip and yataghan as instruments of rule—now ensnared in the thousand formalities of our #v $bureaucrats$#!, forced to bow before the slow, methodical machinery of centralized government. Where tribal elders once judged by custom, now all is rendered in French.\n\nFor three centuries under Arab yoke, the African natives lost all habit of self-rule. Their brightest minds were excluded from governance by jealous conquerors. Thus their old regime became detestable, and our new order must serve as the sole unifying thread—the focal point where divergent rays of light converge."
 joi_flavor_fra.12.a: "Let us commend West Africa's officers and troops!"

 joi_flavor_fra.13.t: "«Military Decorations»"
 joi_flavor_fra.13.d: "Through the soldiers' bravery, [ROOT.GetCountry.GetName] has finally conquered Chad."
 joi_flavor_fra.13.f: "To Lieutenant Colonel Robert, 7th Division:\n\nThe Government, National Assembly, and Cabinet extend their highest regards to all personnel of the 7th Division.\n\nRobert-Joseph Jean-Ungern:\n\nBy the decree of His Excellency the President, you are hereby awarded the Légion d'honneur in recognition of exceptional valor displayed in service to la Patrie, both as soldier and commander.\n\nAdditionally, you shall receive:\n- A wristwatch\n- A pocket chronometer\n- A silver pencil case\n\nThese tokens commemorate your receipt of military honors. The investiture ceremony at Les Invalides shall be scheduled forthwith.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]: [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_fra.13.a: "Another triumph for la Patrie!"

 joi_flavor_fra.14.t: "Sins"
 joi_flavor_fra.14.d: "The Congo and Equatorial rainforests have submitted to [ROOT.GetCountry.GetName]'s advance, the French flag now flying across this vast Dark Continent."
 joi_flavor_fra.14.f: "My dearest Mother,\n\nOur battalion endured a particularly grim ordeal. We entered the trenches Wednesday night. At 5 a.m. Sunday, our artillery commenced bombardment. Twenty minutes later, we scaled the parapet.\n\nMon Dieu! What reception the Congolese prepared! God knows where they procured those rifles—British mischief, no doubt—that peppered our ranks with gunfire!\n\nThe horror... Watching my men fall, especially knowing each by name, made it unbearable. To call them 'men' is wrong—most were boys, scarcely older than I was at enlistment.\n\nThey say the wicked find no rest. If true, I must be damned.\n\nYour grieving son,\nRobert Ungern"
 joi_flavor_fra.14.a: "All men err—this matters not."

 joi_flavor_fra.15.t: "Establishment of the Central African Administrative District"
 joi_flavor_fra.15.d: "With Central Africa's territories under direct rule from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], a new regime ensures France's absolute supremacy."
 joi_flavor_fra.15.f: "Recall my earlier words, monsieur: the entire Regency's civil and military apparatus once rested in native hands. Upon becoming masters of Equatorial Africa, we promptly summoned every last chief—from sultans to militia foot soldiers—and shipped the lot to Indochina's shores.\n\nTo erase all traces of prior rule, we burned every administrative ledger and scroll, whether authentic or not, that might preserve memory of what came before.\n\nConquest heralds a new epoch. Fearing contamination by the past, we demolished entire native quarters, rebuilding them à la française. Those permitted to remain received French names.\n\nMany jungle tribes now accept our direct rule—as they must."
 joi_flavor_fra.15.a: "Magnificent work!"

 joi_flavor_fra.16.t: "Federalization of Overseas Territories?"
 joi_flavor_fra.16.d: "A bill proposing political rights and citizenship for French subjects in African territories, presented by the Governors of Algeria, Senegal, Niger, and Congo in the name of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]."
 joi_flavor_fra.16.f: "#bold Gentlemen#!, the Assembly once instituted a #bold naturalization process#! for Algerian Muslims, granting them #bold full benefits under French law#!—including jus soli for their children—while permitting retention of personal status under Sharia.\n\nWe propose extending this simplified procedure throughout French Africa. The Civil Code's full implications remain, yet experience proves it #bold untenable to deny basic rights#! to Africans who've embraced French ideals but retain native customs. To withhold suffrage from loyal subjects—especially those providing military service—is unjust.\n\nNote this is no innovation! We follow precedents set elsewhere: placing natives who swear loyalty to [ROOT.GetCountry.GetName] under French jurisdiction with voting rights, while preserving their private legal status.\n\nIn these times, we must urgently undertake this assimilation—vital for the #bold moral health#! of France's African territories."
 joi_flavor_fra.16.a: "France must unite under one flag—let us proclaim it openly, dispelling fears of division!"
 joi_flavor_fra.16.b: "The state must prevent this madness that would 'darken' France!!"

 joi_flavor_fra.17.t: "Franco-Russian Alliance?"
 joi_flavor_fra.17.d: "As global tensions escalate—particularly [SCOPE.sCountry('GER_scope').GetName]'s threat to French security—reconciliation with former foe [SCOPE.sCountry('RUS_scope').GetName] gains traction."
 joi_flavor_fra.17.f: "For centuries, France sought Eastern allies to counter continental rivals. In the 12th century, we befriended Scotland against England; in the 16th, we allied with Ottomans against Habsburgs... Now, geopolitical necessity compels us to set aside ideological quarrels and historical grievances. The rising [SCOPE.sCountry('GER_scope').GetName] poses an intolerable threat—one that demands we clasp hands with Russia despite past enmities."
 joi_flavor_fra.17.a: "Best avoid these Eastern barbarians."
 joi_flavor_fra.17.b: "Let us embark for Russia!"

 joi_flavor_fra.18.t: "Franco-Russian Alliance!"
 joi_flavor_fra.18.d: "To counter [SCOPE.sCountry('GER_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName] has dispatched a naval delegation to the Gulf of Finland, proposing alliance."
 joi_flavor_fra.18.f: "The diplomatic balance maintained since the Anti-French Coalitions has collapsed. Yet friendship with a Western power could prove advantageous—particularly against German ambitions. Past hostilities with [SCOPE.sCountry('FRA_scope').GetName] belong to history; realpolitik must prevail. An alliance would secure our strategic position in future conflicts. Moreover, French technology and capital could greatly aid our development."
 joi_flavor_fra.18.a: "We must not forget our enmity with France."
 joi_flavor_fra.18.b: "A toast to our new French friends!"

 joi_flavor_fra.19.t: "Russian Delegation Arrives"
 joi_flavor_fra.19.d: "In a gesture of friendship, [SCOPE.sCountry('RUS_scope').GetName] dispatches a diplomatic mission to France."
 joi_flavor_fra.19.f: "«The evolving European situation and our mutual political objectives necessitate consultations to determine the most appropriate posture for both governments—each sincerely desiring to preserve peace through effective safeguards...»\n«Should either party face imminent aggression, both nations agree to coordinate immediate, simultaneous measures.»"
 joi_flavor_fra.19.a: "Welcome our Russian comrades!"

 joi_flavor_fra.20.t: "Pont Alexandre III Inaugurated"
 joi_flavor_fra.20.d: "The bridge symbolizing Franco-Russian friendship is completed, with [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] presiding over its unveiling."
 joi_flavor_fra.20.f: "«Today we consecrate this monument to Franco-Russian amity: the Pont Alexandre III, linking the Grand Palais to Les Invalides. Adorned with exquisite sculptures and illuminated by golden lamps at dusk, its four 17-meter pillars bear gilded bronze statues representing 'Science,' 'Art,' 'Combat,' and 'War.' This gift from our ally [SCOPE.sCountry('RUS_scope').GetName] ensures our friendship shall endure—as the Seine flows with the Neva!»"
 joi_flavor_fra.20.a: "A toast to this grand alliance!"

 joi_flavor_fra.21.t: "Trinity Bridge Inauguration"
 joi_flavor_fra.21.d: "The Trinity Bridge, symbol of Franco-Russian friendship, is completed with [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] presiding over its unveiling."
 joi_flavor_fra.21.f: ""I am honored to witness this monument to our friendship: the Trinity Bridge connecting Kamennoostrovsky Prospekt to Suvorov Square. Undoubtedly the finest bridge spanning the Neva, its exquisite carvings complement the Winter Palace nearby. The gates, railings, and lampposts—all crafted from artistic cast iron—feature clustered mountain motifs crowned by double-headed eagles with wreaths. Oval shields with crossed swords adorn gilded bronze elements throughout. This gift from our ally [SCOPE.sCountry('FRA_scope').GetName] to [ROOT.GetCountry.GetName] shall endure for generations, just as the Neva flows eternally with the Seine!""
 joi_flavor_fra.21.a: "A toast to this grand alliance!"

 joi_flavor_fra.22.t: "The Merina Monarchy?"
 joi_flavor_fra.22.d: "With Madagascar under our rule, the former sovereigns of the Merina Kingdom now fall into our hands."
 joi_flavor_fra.22.f: ""They say this troublesome king converted to Catholicism?"\n"You're mistaken—Lutheran, I believe."\n"Ha! What does it matter? Just another savage African heathen!""
 joi_flavor_fra.22.a: "Let their royal house persist."
 joi_flavor_fra.22.b: "Execute them all."

 joi_flavor_fra.23.t: "Intervention in Indochina?"
 joi_flavor_fra.23.d: "Religious and imperial interests compel action in Indochina to protect [ROOT.GetCountry.GetName]'s Catholic missionaries."
 joi_flavor_fra.23.f: ""The Lord of Hosts commands our intervention! By divine mandate, we must rescue our brethren! And if we happen to gain territory in the process—who dare say this isn't part of God's design?""
 joi_flavor_fra.23.a: "Onward to [SCOPE.sCountry('potential_imperialism_target').GetNameNoFormatting]!"
 joi_flavor_fra.23.b: "We should make peace, not war."

 joi_flavor_fra.24.t: "March on Syria"
 joi_flavor_fra.24.d: "Celebrating [ROOT.GetCountry.GetName]'s Syrian victories, artist Alexandre de Laborde performs a martial ballad for the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] at the Élysée Palace."
 joi_flavor_fra.24.f: ""March on to Syria!\nYoung and handsome Dunois,\nPrays to Virgin Mary,\nBegging for her grace:\n'O Immortal Queen,'\nHe vows before departure,\n'I love the fairest maiden,\nAnd would be the bravest knight.'\nUpon the sacred stone,\nHis glorious oath is carved;\nHe rides to join the fight,\nFollowing his liege lord.\nWith noble pious heart,\nHe cries amidst the fray:\n'Love to the fairest one,\nGlory to the bravest!'""
 joi_flavor_fra.24.a: "Glory to the bravest!"

 joi_flavor_fra.25.t: "Pelletier and Caventou"
 joi_flavor_fra.25.d: "Parisian chemists Pierre-Joseph Pelletier and Joseph Bienaimé Caventou isolate a new substance from cinchona bark, naming it quinine."
 joi_flavor_fra.25.f: ""This substance derives from a South American tree—purchased from Bolivian traders who say the Incas called it the 'sacred tree.' And sacred it is! While synthesis remains challenging, requiring comparison with natural samples, this breakthrough means we need no longer fear Africa's malaria scourge.""
 joi_flavor_fra.25.a: "A magnificent discovery!"

 joi_flavor_fra.26.t: "Introduction of Russian Laborers"
 joi_flavor_fra.26.d: "A new labor treaty with [SCOPE.sCountry('RUS_scope').GetName] brings their abundant workforce to [ROOT.GetCountry.GetName]'s factories."
 joi_flavor_fra.26.f: ""By this gracious agreement, sir, you gain an unprecedented opportunity: to work in advanced, prosperous [ROOT.GetCountry.GetName], learn French, and build a new life."\n"Mother of God! Can it be true? Divine providence delivers me from this wretched land to Paris—where streets are paved with gold!?"""
 joi_flavor_fra.26.a: "Indeed, lucky lad!"

 joi_flavor_fra.27.t: "The Executive Committee of [ROOT.GetCountry.GetName]"
 joi_flavor_fra.27.d: "Following the King's flight from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetName] was proclaimed. Yet, due to the revolution's abruptness, the Provisional Government remained disorganized. Under the leadership of [SCOPE.sCharacter('french_provisional_republic_leader').GetFirstName] [SCOPE.sCharacter('french_provisional_republic_leader').GetLastName], a provisional constitutional assembly was convened. The deputies resolved to appoint an Executive Committee to oversee elections and draft a constitution, sharing power with the President of the Provisional Council of Ministers."
 joi_flavor_fra.27.f: "«A crowd of fiery orators harangued the masses at street corners; others rang the tocsin in church steeples. We cast lead bullets and rolled cartridges. Trees, public urinals, benches, railings, and gas lamps along the boulevards—all were torn down or overturned. By dawn, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] was bristling with barricades.»\n\n«The resistance was short-lived. Soon, the National Guard intervened en masse—so thoroughly that by eight o'clock in the evening, the people had seized, willingly or by force, five barracks, nearly every town hall, and the most secure strategic points. By midnight, the monarchy crumbled with startling swiftness, meeting no resistance.»"
 joi_flavor_fra.27.a: "We need republicans like Professor Alphonse de Lamartine to safeguard the nation."
 joi_flavor_fra.27.b: "A moderate of repute, such as Monsieur Jules Favre, could ensure stability."
 joi_flavor_fra.27.c: "Sir Henri de Lamartine might unite the monarchist factions!"

 joi_flavor_fra.28.t: "The National Workshops"
 joi_flavor_fra.28.d: "Amid the ongoing economic crisis and revolutionary fervor in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], laborers and socialists have established 'National Workshops' to provide relief and employment for the city's jobless. However, our esteemed [SCOPE.sCharacter('french_provisional_republic_indu_leader').GetFirstName] [SCOPE.sCharacter('french_provisional_republic_indu_leader').GetLastName] warns [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that these workshops harbor dangerous socialist tendencies—potentially serving as a breeding ground for rebellion."
 joi_flavor_fra.28.f: "«Gentlemen, progress exists only when it benefits all—without exception. To me, progress is solidarity, recognized and achieved among all interests. Do you know why I wage war unto death against the principle of antagonism? Because it replaces tyranny, and tyranny, wherever it arises, I abhor.»\n\n«Unrestrained competition harms even its proponents, for they lack foresight. In conflict, no one stands alone; each leans upon those whose interests diverge entirely... The answer we seek, I declare from my heart: Progress must end revolution! Justice must abolish war!»"
 joi_flavor_fra.28.a: "In these turbulent times, the government should collaborate with them."
 joi_flavor_fra.28.b: "Monitor their socialist activities closely."

 joi_flavor_fra.29.t: "Exporting the Revolution?"
 joi_flavor_fra.29.d: "As the republican revolution in [ROOT.GetCountry.GetName] reignites, radicalism spreads across Europe. Polish and Hungarian nationalists, among others, now petition the Provisional Government to revive Napoleonic-era policies—calling for war against their so-called 'oppressors.' Domestically, their appeals have galvanized revolutionary fervor."
 joi_flavor_fra.29.f: "«Liberty takes root in the hearts of the people, as trees take root in the earth. Like the trees she nurtures, her branches stretch skyward; like the trees, she grows unceasingly, casting shade over generations. The first Tree of Liberty was planted by God Himself upon Golgotha eighteen centuries past: that tree was the Cross, where Christ sacrificed Himself for the liberty, equality, and fraternity of mankind.»"
 joi_flavor_fra.29.a: "Pledge support for foreign liberation movements."
 joi_flavor_fra.29.b: "We must reject the legacy of Napoleonic aggression!"

 joi_flavor_fra.30.t: "The May Demonstrations"
 joi_flavor_fra.30.d: "As chaos deepens in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], disgruntled National Workshop members and radical republicans—exploiting discontent with the government's 'timid' foreign policy—have mobilized the sans-culottes. They marched down the boulevards from Place de la Bastille, stormed the Palais Bourbon's chambers, and delivered a petition to the Provisional Government."
 joi_flavor_fra.30.f: "«Imagine the scene: the Assembly hall packed with senators, then overrun by ragged crowds scaling the galleries and columns. Thousands of banners waved; terrified women raised clenched hands; rioters perched on journalists' desks. The corridors seethed with bodies—a chaos of heads, shoulders, screaming faces, and brandished fists.»\n\n«No one spoke; all shouted. The deputies stood frozen. For three hours, the invasion raged. The presidential podium, the secretariat, the tribune—all vanished beneath a human tide.»"
 joi_flavor_fra.30.a: "Accept their petition and vow to champion foreign revolutions."
 joi_flavor_fra.30.b: "Dispatch the National Guard to arrest the ringleaders!"

 joi_flavor_fra.31.t: "The 45 Centimes Tax"
 joi_flavor_fra.31.d: "Facing severe fiscal deficits inherited from the Orleans Monarchy, the Provisional Government debates imposing an additional 45-centime tax on four direct taxes including land tax. This measure aims to extract more wealth from peasants and wage laborers to fill state coffers. Critics warn this may spark peasant revolts in southern regions, reminiscent of the 1791 tax rebellions."
 joi_flavor_fra.31.f: "\"The Minister of Finance is authorized to levy additional taxes, with proceeds deposited in a special Treasury account exclusively for short-term debt repayment (excluding securities under one year). The tax ceiling shall not exceed 45 centimes per commodity.\"\n\n\"Tax payments shall generate special certificates bearing the taxpayer's name and payment date. The Official Gazette will publish statements detailing redeemed securities, ensuring funds are properly allocated for fiscal recovery.\""
 joi_flavor_fra.31.a: "We cannot solve problems through taxation."
 joi_flavor_fra.31.b: "Authorize the additional tax."

 joi_flavor_fra.32.t: "The June Days Uprising"
 joi_flavor_fra.32.d: "As banks face liquidity crises and credit dries up, worsening economic conditions have radicalized the working class. Under anarchist and socialist leadership, rebels in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] have risen in violent revolt - even assaulting the Archbishop. Provisional Government leader [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has convened emergency sessions to coordinate suppression measures, echoing the 1789 Great Fear."
 joi_flavor_fra.32.f: "\"Citizen Representatives, at noon that day I entered the Saint-Martin barricade alone, bayonet in hand. The insurgents' indescribable fury surrounded me. Both sides fought desperately - they could have killed me, but spared this old soldier of Austerlitz and Waterloo in his National Guard uniform!\"\n\n\"Their chivalry shall never fade from memory... I fought them as brave Frenchmen, and they spared me again in defeat. Now I owe them bread... whatever may come.\""
 joi_flavor_fra.32.a: "Appoint General Saint-Arnaud to crush the National Workshops protesters."
 joi_flavor_fra.32.b: "Empower General Cavaignac to form a cabinet and suppress the revolt!"

 joi_flavor_fra.33.t: "Social Catholicism?"
 joi_flavor_fra.33.d: "Industrialization's transformation of labor relations has sparked ideological shifts within the traditionally conservative [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant]. Social justice doctrines gaining traction in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] reflect growing worker discontent, mirroring Lamennais' 1830s Christian socialist movements."
 joi_flavor_fra.33.f: "\"New economic doctrines reduce man to exchange value, severing social bonds in service of cosmopolitan fantasies. Productive competition gives way to Darwinian struggle - a barbaric system where workers become mere commodities traded at lowest price.\"\n\n\"For a century, materialist theories have obscured human dignity beneath calculations of profit. The soul vanishes before the ledger; national interests yield to globalist delusions. This is the true sickness afflicting our age.\""
 joi_flavor_fra.33.a: "Monitor these developments cautiously."
 joi_flavor_fra.33.b: "Our nation suffers from the disease of excessive competition!"

 joi_flavor_fra.34.t: "[ROOT.GetCountry.GetName] December Election"
 joi_flavor_fra.34.d: "The Republic's first presidential election has delivered a stunning result: recently returned exile [SCOPE.sCharacter('napoleon_iii_scope').GetFirstName] [SCOPE.sCharacter('napoleon_iii_scope').GetLastName] won 74.2% against Provisional Government leader [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s mere 19.6%. While most accept the outcome, some fear this Bonaparte may follow his uncle's path toward restoring [GetLawType('law_monarchy').GetName] - just as in 1804."
 joi_flavor_fra.34.f: "\"Grandfather, you cannot read!\" said the boy, holding the newspaper. \"How know you this man? Why choose him?\"\n\n\"Illiterate I may be,\" the old soldier replied, tracing the name with calloused finger, \"but this name I know. Bonaparte... He has returned. My Emperor has returned!\""
 joi_flavor_fra.34.a: "We need no new Napoleon - annul this election!"
 joi_flavor_fra.34.b: "Accept [SCOPE.sCharacter('napoleon_iii_scope').GetFirstName] [SCOPE.sCharacter('napoleon_iii_scope').GetLastName]'s victory as the people's will."

 joi_flavor_fra.35.t: "Burgraves Law"
 joi_flavor_fra.35.d: "Nostalgic for the Orleanist era's restricted suffrage, Minister [SCOPE.sCharacter('burgraves_leader').GetFirstName] [SCOPE.sCharacter('burgraves_leader').GetLastName]'s committee has drafted legislation rolling back voting rights. The bill now awaits [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s approval, threatening to undo 1848's democratic gains."
 joi_flavor_fra.35.f: "\"I abhor all violence justified by ideology - whether the Inquisitor's 'Convert or die!' or the Revolutionary's 'Liberty, equality or death!' Conscience demands we reject such false choices forever.\""
 joi_flavor_fra.35.a: "Universal suffrage must stand inviolate!"
 joi_flavor_fra.35.b: "Restore order to [ROOT.GetCountry.GetName] - sign the bill."

 joi_flavor_fra.36.t: "Operation Rubicon"
 joi_flavor_fra.36.d: "After Parliament blocked [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s unconstitutional bid for reelection, the President has acted. With [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] support in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], he dissolved the Assembly and called a plebiscite to restore [GetLawType('law_monarchy').GetName]. The rigged vote yielded 97% approval - mirroring Napoleon I's 1804 coronation - crowning him \"Emperor of the French.\""
 joi_flavor_fra.36.f: "\"I swear to maintain the integrity of the territory of the Empire, to respect and enforce respect for the Concordat and freedom of religion, equality of rights, political and civil liberty, the irrevocability of the sale of national lands; not to raise any tax except in virtue of the law; to maintain the institution of Legion of Honour and to govern in the sole interest, happiness and glory of the French people.\"\n\n\"I have closed the gaping abyss of anarchy, and I have unscrambled chaos, I have cleansed the Revolution, ennobled the common people, and restored the authority of kings. I have stirred all men to competition, I have rewarded merit wherever I found it, I have pushed back the boundaries of greatness: None of this, my dear, is a trifling matter: in these few brief words lies the whole of my history.\""
 joi_flavor_fra.36.a: "Vive l'Empereur!"

 joi_flavor_fra.37.t: "A Humiliating Defeat"
 joi_flavor_fra.37.d: "To the nation's shock, [ROOT.GetCountry.GetName] has suffered military defeat. Despite [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]'s personal leadership on campaign - echoing Napoleon I's disastrous Russian expedition - the outcome has exposed imperial incompetence, fueling public fury reminiscent of Waterloo's aftermath."
 joi_flavor_fra.37.f: "\"We remember this hillock, lined with cannons, where drunken madmen scurried between guns tended by folk hostile to all outsiders - their hatred for l'étranger surpassing all.\"\n\n\"[ROOT.GetCountry.GetRuler.GetLastName] sought to reclaim those guns. He should have planned carefully, but chose cunning instead - tossing sparks into the powder keg. This was no accident, [ROOT.GetCountry.GetRuler.GetFirstName], but calculated recklessness.\""
 joi_flavor_fra.37.a: "They herald the Empire's demise."
 joi_flavor_fra.37.b: "His Majesty should abdicate to preserve the Empire."

 joi_flavor_fra.38.t: "An Imperial Anthem?"
 joi_flavor_fra.38.d: "With the Bonaparte restoration, replacing the royalist anthem becomes imperative. Yet factions clash over the choice: retain Napoleon I's revolutionary \"Chant du Départ\" or adopt Alexandre de Laborde's crusader-themed \"Partant pour la Syrie\" - a decision reflecting the tension between revolutionary legacy and imperial grandeur."
 joi_flavor_fra.38.f: "\"Let victory's song open the gates!\nFreedom leads our advance,\nFrom northern ice to southern sands,\nWar's clarion call resounds,\nThe hour of battle strikes!\nTremble, enemies of France!\nTyrants drunk on blood and pride,\nForward, free citizens -\nSend despots to the grave!\"\n\n\"The Republic summons us!\nKnow we'll conquer or perish,\nFrenchmen must live for her,\nFrenchmen must die for her!\nMay ancestral swords\nSteady in valiant hands,\nRemember the Champ de Mars\nWhere in kings' and slaves' blood\nThese blades were baptized -\nBlessed by forebears, destined for glory!\""
 joi_flavor_fra.38.a: "Continue Napoleon's tradition: Adopt Chant du Départ!"
 joi_flavor_fra.38.b: "Let Frankish crusader spirit guide us: Choose Partant pour la Syrie!"

 joi_flavor_fra.39.t: "Légion d'Honneur"
 joi_flavor_fra.39.d: "Napoleon's 1802 Légion d'Honneur was suppressed during the Bourbon Restoration, its recipients purged. Now imperial officers of [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] petition [ROOT.GetCountry.GetRuler.GetFirstName] to restore this elite order - a symbolic resurrection of Napoleonic military prestige."
 joi_flavor_fra.39.f: "\"Show me any republic, ancient or modern, that knew how to govern without distinctions - you call them baubles? Yes, we lead men with baubles!\""
 joi_flavor_fra.39.a: "Simply resume awarding the Légion."
 joi_flavor_fra.39.b: "Reconstitute the Légion with strict new statutes."

 joi_flavor_fra.40.t: "The Emperor's Statue"
 joi_flavor_fra.40.d: "The equestrian statue before Les Invalides suffered deliberate neglect under [GetIdeology('ideology_legitimist').GetName] and [GetIdeology('ideology_orleanist').GetName] rule - its imperial regalia removed. Now [ROOT.GetCountry.GetRuler.GetFirstName] plans its restoration: clad in Grande Armée regalia, bicorne bearing the tricolor cockade - permanently fixing Napoleon's glory in France's visual memory."
 joi_flavor_fra.40.f: "\"By what divine right does one man write his name in blood across history? Vive Napoleon, father of soldiers and people alike!\"\n\n\"Mankind reserves its highest honors not for cautious mediocrities, but for those who dare greatly - even when leading millions to ruin. Napoleon stands foremost among history's immortal few.\""
 joi_flavor_fra.40.a: "Honor France's greatest son: Restore the Emperor's statue!"
 joi_flavor_fra.40.b: "Respect needn't be expressed through statuary."

 joi_flavor_fra.41.t: "The Extinction of Pauperism"
 joi_flavor_fra.41.d: "[ROOT.GetCountry.GetRuler.GetFirstName]'s populist treatise \"L'Extinction du Paupérisme\" helped secure [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] support during his rise. Now as Emperor, the rural poor expect fulfillment of his utopian promises - putting Bonapartist social policy to the test."
 joi_flavor_fra.41.f: "\"The workers own nothing but their labor - they must organize like legions to claim their place between the idle rich and landed gentry.\"\n\n\"Christianity ended slavery; the Revolution abolished serfdom; now democracy must eradicate poverty through association, education and discipline.\""
 joi_flavor_fra.41.a: "Empty promises for fools!"
 joi_flavor_fra.41.b: "The Empire must serve the people!"

 joi_flavor_fra.42.t: "[SCOPE.sCharacter('orsini_affair_radical').GetFirstName]'s Assassination Attempt"
 joi_flavor_fra.42.d: "Last night, Italian nationalist [SCOPE.sCharacter('orsini_affair_radical').GetFirstName] [SCOPE.sCharacter('orsini_affair_radical').GetLastName] bombed [ROOT.GetCountry.GetRuler.GetFirstName]'s carriage outside the Opéra - killing eight bystanders in an attack clearly enabled by British sanctuary for radicals. This echoes the 1800 Rue Saint-Nicaise plot against Napoleon I."
 joi_flavor_fra.42.f: "\"Life is sacred not in mere existence, but in action - a nation must fulfill its divine mission through liberty. When oppressed, men may rightly use violence to restore freedom.\""
 joi_flavor_fra.42.a: "Hunt all conspirators and protest to [SCOPE.sCountry('GBR_scope').GetName]!"
 joi_flavor_fra.42.b: "He died for his ideals - respect that."

 joi_flavor_fra.43.t: "Mexican Plea for Intervention"
 joi_flavor_fra.43.d: "Mexican conservatives, losing their civil war, beg [ROOT.GetCountry.GetRuler.GetFirstName] to install a puppet monarchy - offering future subservience to French interests. But this risks provoking [SCOPE.sCountry('USA_scope').GetName] under the Monroe Doctrine, potentially repeating Spain's disastrous Mexican adventures."
 joi_flavor_fra.43.f: "\"Should Mexico's constitutional government refuse our generous aid against rebellion, allied forces will occupy Córdoba, Orizaba and Tehuacán during negotiations - withdrawing only if talks collapse.\""
 joi_flavor_fra.43.a: "We've no interest in this quagmire."
 joi_flavor_fra.43.b: "Offer limited military support."
 joi_flavor_fra.43.c: "A golden chance to reclaim American influence!"

 joi_flavor_fra.44.t: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Palace of Industry"
 joi_flavor_fra.44.d: "A magnificent palace has been completed in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], built in a distinct rationalist architectural style of iron and glass. Its portico is adorned with sculptures by Elias Robert, depicting [ROOT.GetCountry.GetName] bestowing crowns upon Commerce and Industry, all surrounded by symbols of imperial grandeur."
 joi_flavor_fra.44.f: "“One day, the government decided to erect a grand palace for the Exposition Universelle. Previously, exhibitions had been scattered across ramshackle wooden huts and paper constructions. Between the Queen’s Court and the Champs-Élysées lay a vast, quiet field where idle rentiers played boules and, on holidays, acrobats would gather in crowds. This was the Place du Marigny.”\n\n“Soon, two or three thousand workers were brought in to raise the Palais de l'Industrie. Each spring, some two to three thousand works by living artists were displayed there for their contemporaries, while in summer and autumn—even sometimes in winter—it became home to displays of the finest poultry from every farm and the richest cheeses from across our pastures.”"
 joi_flavor_fra.44.a: "This palace stands as a testament to the glory of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]!"
 joi_flavor_fra.44.b: "The pinnacle of [ROOT.GetCountry.GetName]’s industrial civilization!"

 joi_flavor_fra.45.t: "Salon des Refusés"
 joi_flavor_fra.45.d: "The Paris Salon, sponsored by the [ROOT.GetCountry.GetName] government and its most prestigious academies, has long been the bastion of academic art. Yet this year, countless works deemed 'cynical' or 'eccentric' were rejected, with two-thirds of submissions refused. The spurned artists and their allies staged protests, and their outcry reached the ears of [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], who has been petitioned to permit an alternate exhibition for these 'unorthodox' new styles."
 joi_flavor_fra.45.f: "“His [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] received a flood of complaints over artworks rejected by the Salon jury. After consideration, he and his cabinet resolved to let the public judge for themselves, relocating these works to another wing of the Palace of Industry. Participation was voluntary: those unwilling simply needed to inform the administration to retrieve their canvases.”"
 joi_flavor_fra.45.a: "Degenerates! Keep them out!"
 joi_flavor_fra.45.b: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] welcomes this bold new art!"

 joi_flavor_fra.46.t: "Luncheon on the Grass"
 joi_flavor_fra.46.d: "Among the works at the Salon des Refusés, one stood out: Édouard Manet’s painting of a picnic, where a nude woman sits casually amidst a wooded glade alongside two dandies in modern dress. She stares unabashedly at the viewer, while another woman bathes leisurely in the stream behind them."
 joi_flavor_fra.46.f: "“This nude woman shocked the public. Mon Dieu! Such vulgarity—an unveiled woman seated brazenly among clothed men! They called Manet a voyeur and whispered scandalously.”\n\n“But the artist sought vivid contrasts and frank realism. What one must see is not merely a luncheon, but an entire landscape, full of vitality and nuance: the broad, firm foreground, the airy delicacy of the background, and that luminous white figure of the woman’s chemise against the greenery—an exquisite focal point rendering nature with elegant simplicity.”"
 joi_flavor_fra.46.a: "A masterpiece of modern realism!"

 joi_flavor_fra.47.t: "Anglo-French Free Trade Treaty?"
 joi_flavor_fra.47.d: "The tide of free trade has risen in both [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('FRA_scope').GetName]. Despite past rivalries, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is eager for rapprochement through commerce. Today, our Finance Minister, [SCOPE.sCharacter('free_trade_treaty_leader').GetFirstName] [SCOPE.sCharacter('free_trade_treaty_leader').GetLastName], met with his counterpart in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to draft a treaty seeking mutual reduction of tariffs."
 joi_flavor_fra.47.f: "“When a nation proposes such a treaty, it is naturally assumed to seek its own benefit. But it is wisdom, in our own interest, to reduce tariffs where both sides gain.”\n\n“Free trade allows each nation to produce what it does best at the lowest cost. Yet in [ROOT.GetCountry.GetName], this threatens our finest industries. Protection must not be blind or excessive, but neither should we dismantle it entirely.”"
 joi_flavor_fra.47.a: "We must shield our domestic industry."
 joi_flavor_fra.47.b: "This treaty benefits both our nations!"
 joi_flavor_fra.47.c: "This treaty benefits both our nations!"

 joi_flavor_fra.48.t: "The Life of Julius Caesar"
 joi_flavor_fra.48.d: "Out of admiration for Caesar’s conquests, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has commissioned a monumental history of the Roman general. Not content merely to sponsor it, he penned the first two volumes himself, drawing parallels between Caesar and Emperor Napoleon to extol the glory of the [ROOT.GetCountry.GetRuler.GetLastName] dynasty."
 joi_flavor_fra.48.f: "“After the wars, Caesar celebrated five triumphs—four in a single month, spaced only days apart: Gaul, Alexandria, Pontus, Africa, and lastly Spain, each with its own trophies and splendor. At the Gallic triumph, his chariot axle broke, nearly throwing him down; he ascended the Capitoline with a torch in hand, flanked by elephants bearing lanterns. At the Pontic triumph, his exhibit bore but three words: ‘Veni, vidi, vici.’”"
 joi_flavor_fra.48.a: "A splendid work of imperial grandeur."

 joi_flavor_fra.49.t: "The Manifesto of the Sixty"
 joi_flavor_fra.49.d: "Though the Empire suppressed worker agitation and stifled socialist thought for a time, foreign influences have rekindled unrest in [ROOT.GetCountry.GetName]. Recently, famed labor organizer #V Louis Talandier#! published 'The Manifesto of the Sixty,' electrifying the working class and reviving calls for social reform."
 joi_flavor_fra.49.f: "“Universal suffrage has matured us politically, but socially we remain unfree. The liberty won by the Third Estate through its vigor and perseverance must extend to every citizen. Political equality demands social equality, for since 1789, all Frenchmen are equal before the law.”\n\n“We possess no wealth but our arms, and suffer daily under capital’s yoke. Few of us can read; without free assembly, we cannot organize trade education, while industrial progress becomes the privilege of the capitalist alone.”\n\n“Without us, the bourgeoisie builds nothing lasting; without them, our liberation is delayed. Let us unite to achieve one goal: the triumph of true democracy!”"
 joi_flavor_fra.49.a: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has been far too lenient! Let these rabble taste steel!"
 joi_flavor_fra.49.b: "Workers must be treated fairly."
 joi_flavor_fra.49.c: "The workers’ power must be recognized politically."

 joi_flavor_fra.50.t: "The Government of National Defense"
 joi_flavor_fra.50.d: "The Empire has collapsed once more. The royal family has fled [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], and [ROOT.GetCountry.GetName] plunges into turmoil. A provisional [GetLawType('law_presidential_republic').GetName] has formed in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], declaring itself the Government of National Defense."
 joi_flavor_fra.50.f: "“We are no party government, but a government of defense. We have but one goal and one will: to save our nation by uniting army and people around the same banner that once humbled Europe.”\n\n“Today, as then, the name Republic means this: the army and the people, united, to defend [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].”"
 joi_flavor_fra.50.a: "Vive la République!"

 joi_flavor_fra.51.t: "The Mexican Throne"
 joi_flavor_fra.51.d: "[SCOPE.sCountry('MEX_scope').GetName] has fallen under our rule. The former republican government has fled into exile. It is now time to formally crown an Emperor of Mexico. However, the throne remains vacant: shall we choose a member of the illustrious [ROOT.GetCountry.GetRuler.GetLastName] family, invite a foreign royal of noble blood, or will [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself assume the crown in a personal union?"
 joi_flavor_fra.51.f: "\"If you can restore order from chaos, bring hope to the suffering, and unite the hearts of the people, you shall be the greatest monarch of the modern age: Go then, poor fool! Yet perhaps you will come to regret your splendid Castle of Miramar!\""
 joi_flavor_fra.51.a: "Mexico shall join us in a personal union, with #V [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] personally#! crowned Emperor."
 joi_flavor_fra.51.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s cousin, #V Prince Napoléon-Jérôme#!, shall take the throne."
 joi_flavor_fra.51.c: "#V Archduke Maximilian of Habsburg#! shall be crowned Emperor of Mexico."
 joi_flavor_fra.51.e: "#V Grand Duke Konstantin Nikolayevich of the Romanovs#! shall ascend the throne."
 joi_flavor_fra.51.g: "#V Prince George of Hanover#! shall be crowned Emperor."

 joi_flavor_fra.52.t: "The Petition of [SCOPE.sCharacter('adolphe_thiers_scope').GetFirstName] [SCOPE.sCharacter('adolphe_thiers_scope').GetLastName]"
 joi_flavor_fra.52.d: "A statesman of immense prestige, former President of the Council under the Republic, and now Deputy for the Seine, [SCOPE.sCharacter('adolphe_thiers_scope').GetFirstName] [SCOPE.sCharacter('adolphe_thiers_scope').GetLastName] has submitted a petition urging the government of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to lift emergency autocratic measures and restore [ROOT.GetCountry.GetName] to the path of liberty."
 joi_flavor_fra.52.f: "\"Some say: The Empire means war. I say: The Empire means peace. It is peace, because France herself desires peace, and when France is satisfied, the world is at peace. Glory is an inheritance; but war is not. I agree that [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], like Napoleon, has conquests to achieve; but I also hope, like the late Emperor, to reconcile opponents, and bring back dissenters into the great current of the people. \n\nWe have ruins to rebuild, false idols to overthrow, truth to vindicate, ignorance in our villages to dispel, and a rustic brutality to educate: such is my vision of Empire if it is to flourish.\""
 joi_flavor_fra.52.a: "These ideas threaten [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s rule!"
 joi_flavor_fra.52.b: "It is time to liberalize the Empire."

 joi_flavor_fra.53.t: "Legislative Elections"
 joi_flavor_fra.53.d: "A new constitution has been enacted in [ROOT.GetCountry.GetName]. Under it, the legislature has gained significant powers, including lawmaking and interpellation rights, diminishing the authority of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Yet, this reform has successfully calmed many discontented liberals and socialists."
 joi_flavor_fra.53.f: "\"There is a manly and reasonable passion for equality which excites men to wish to be strong and respected. This passion tends to elevate the humble to the rank of the powerful. But there also exists a depraved taste for equality, which reduces men to prefer equality in servitude to inequality in freedom.\""
 joi_flavor_fra.53.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall dissolve parliament and call fresh elections."
 joi_flavor_fra.53.b: "More authority should be devolved to democratic institutions."

 joi_flavor_fra.54.t: "A Prince Accused of Murder"
 joi_flavor_fra.54.d: "Last week, #V Prince Pierre-Napoléon Bonaparte#!, nephew of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], shot and killed journalist Victor Noir during a private quarrel. Though initially hushed up, Noir's family exposed the crime through the Rhône press, igniting public outrage against the royal family and even against [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself."
 joi_flavor_fra.54.f: "\"My mixed status has left me a pariah—a 19th-century 'Man in the Iron Mask.' I am neither prince, nor citizen, nor voter. I have neither function, nor occupation fit to secure my future. \n\nWho could be foolish enough to believe a Bonaparte could be anything but an assassin?\""
 joi_flavor_fra.54.a: "A mere rabble-rouser—he brought his fate upon himself!"
 joi_flavor_fra.54.b: "Arrest Prince Pierre; he must face justice."

 joi_flavor_fra.55.t: "The Funeral of Victor Noir"
 joi_flavor_fra.55.d: "Today, the body of #V Victor Noir#!, murdered by #V Prince Pierre-Napoléon Bonaparte#!, was given a public funeral in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. His sympathizers and opponents of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] have announced their participation, escorting his coffin to Père Lachaise Cemetery in Paris."
 joi_flavor_fra.55.f: "\"Assassin! You dared face me! You cowardly murdered my friend—murderer! To the scaffold with you! \n\nThe outrages Paris has endured are immeasurable. I swear I have done no evil, yet today I dare not return to Paris for fear of stones, for I have brought nothing but suffering and provoked hatred.\""
 joi_flavor_fra.55.a: "Send police to disperse unrelated crowds."
 joi_flavor_fra.55.b: "Offer official condolences and vow punishment for the killer."

 joi_flavor_fra.56.t: "[SCOPE.sCharacter('intelligentsia_protest_scope').GetFirstName] [SCOPE.sCharacter('intelligentsia_protest_scope').GetLastName] Denounces the Emperor"
 joi_flavor_fra.56.d: "The leader of [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant], prominent agitator [SCOPE.sCharacter('intelligentsia_protest_scope').GetFirstName] [SCOPE.sCharacter('intelligentsia_protest_scope').GetLastName], has published a blistering editorial in Le Siècle condemning the 'despotic rule' of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], resonating with many republicans."
 joi_flavor_fra.56.f: "\"Gentlemen, I am no radical; radicals know it, as their own papers prove. But I am of the revolutionary party in [ROOT.GetCountry.GetName] and Europe alike. I prefer moderate government, and will support it. Yet if power falls into less moderate hands—into those of zealots or radicals—I shall not abandon the cause, for this reason: I shall forever stand with the Revolution.\""
 joi_flavor_fra.56.a: "Let him rant—words do no harm to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_fra.56.b: "Arrest these meddlesome intellectuals!"

 joi_flavor_fra.57.t: "[SCOPE.sCharacter('trade_unions_protest_scope').GetFirstName] [SCOPE.sCharacter('trade_unions_protest_scope').GetLastName] Organizes Workers' Action"
 joi_flavor_fra.57.d: "The leader of [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetNameWithCountryVariant], former republican soldier and head of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'s unions, [SCOPE.sCharacter('trade_unions_protest_scope').GetFirstName] [SCOPE.sCharacter('trade_unions_protest_scope').GetLastName], has secretly rallied union members, staging a strike yesterday in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] against [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s autocratic rule, denouncing his accession referendum as fraudulent."
 joi_flavor_fra.57.f: "\"[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has done me the sad honor of engraving my name upon his roll of pardons. Months ago, my flight from North Africa earned the prince’s clemency, but now, I see only another snare. \n\nWhatever pardon [ROOT.GetCountry.GetRuler.GetLastName] proclaims, I cannot pardon him for his crimes of December 2nd, for the massacres of the 4th, his Sulla-like decrees, his bloody edicts, or his falsified ballot boxes, which I saw with my own eyes as a voter and fought against as a soldier of the Constitution.\""
 joi_flavor_fra.57.a: "The imperial government must tread carefully here."
 joi_flavor_fra.57.b: "Arrest these sans-culottes and rabble!"

 joi_flavor_fra.58.t: "The Belleville Program"
 joi_flavor_fra.58.d: "Renowned dissenter #V Léon Gambetta#!, who vocally opposed [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s restoration during the Republic, has issued a radical platform in his campaign as deputy for Belleville, energizing liberals and republicans alike."
 joi_flavor_fra.58.f: "\"Citizens, in the name of universal suffrage, the basis of all political and social organization, let us authorize our deputies to affirm radical democratic principles, demanding:\n\nUniversal suffrage without restriction; election of mayors, councils, and deputies;\nPersonal liberty safeguarded by law, not administrative whim;\nFull press freedom without guarantees or licenses;\nUnfettered right of assembly to debate any question—religious, philosophical, political, or social;\nFreedom of association, abolition of religious budgets, separation of church and state;\nSecular, free, compulsory primary education, with merit-based access to free higher studies;\nElection of all officials, abolition of privileges and sinecures;\nJustice and social equality guiding ongoing reforms to solve social and political questions.\n\nLiberty, Equality, Fraternity.\nBelleville Electoral Committee\""
 joi_flavor_fra.58.a: "This dangerous liberal tide must be stopped."
 joi_flavor_fra.58.b: "Many of these demands are reasonable."

 joi_flavor_fra.59.t: "[ROOT.GetCountry.GetName] Constitutional Referendum"
 joi_flavor_fra.59.d: "At [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s behest, the imperial government has held a plebiscite approving liberal reforms and enacting a new constitution for the Empire."
 joi_flavor_fra.59.f: "\"The people approve the reforms carried out by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] with the assistance of the nation's principal institutions, and ratify the Senate's decree of April 20th.\" \n\n[ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]\nImperial Constitutional Committee"
 joi_flavor_fra.59.a: "The plebiscite fails with 71% opposed."
 joi_flavor_fra.59.b: "The plebiscite passes with 83% in favor."

 joi_flavor_fra.60.t: "Imperial Ambition?"
 joi_flavor_fra.60.d: "Under the steady and prosperous rule of [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName], and with the rise of chauvinistic sentiment, many young citizens nostalgic for the Napoleonic era have begun calling for the Empire to embark on a grand new expansion and to revive the glory of Napoleon’s domination over the continent."
 joi_flavor_fra.60.f: "\"Who can explain, depict, or understand Napoleon? He is a man with crossed arms, omnipotent! He is the mightiest force known to mankind, the most focused, sharp, and incisive of all powers; a remarkable genius who brought armed civilization everywhere without ever settling permanently.\"\n\n\"He is omnipotent because he desires everything; a man of extraordinary willpower who fought off illness through battle, yet ultimately died bedridden after living amid the hail of bullets; his mind held codes, swords, words, and deeds.\""
 joi_flavor_fra.60.a: "Enough, the Empire needs to bring peace."
 joi_flavor_fra.60.b: "Europe, your [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has returned!"

 joi_flavor_fra.61.t: "Conqueror of the World"
 joi_flavor_fra.61.d: "With the surrender of the last anti-French coalition state, [ROOT.GetCountry.GetName]'s position in Europe is secured: under the leadership of [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the French nation has surpassed even the achievements of the Napoleonic era, becoming the absolute ruler of Europe and indeed the world."
 joi_flavor_fra.61.f: "\"The entire battlefield, soaked with rain and blood, the rye and corn harvests trampled under horse hooves, like a piece of dough.\"\n\n\"What follows are at least twenty-five thousand casualties, along with countless wounded horses. Scattered across the ground lie weapons, saddles, bridles, bags, various garments, shell fragments, military manuals, and more.\"\n\n\"The next day, the seemingly breathless corpses were hurriedly burned on pyres and buried in trenches running through the battlefield without any thorough investigation to see if any might revive... The remaining bodies were cared for as best as possible.\""
 joi_flavor_fra.61.a: "Glory belongs to [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"

 joi_flavor_fra.62.t: "The Eighth Anti-French Coalition!"
 joi_flavor_fra.62.d: "What was once feared has come true: following the restoration of the [GetIdeology('ideology_bonapartist').GetName], [SCOPE.sCountry('FRA_scope').GetName] has once again unleashed a terrifying war across Europe, much like Napoleon did at his coronation in 1803. History repeats itself as European powers convene conferences, organizing a large coalition army determined to defeat the invading [SCOPE.sCountry('FRA_scope').GetName]."
 joi_flavor_fra.62.f: "\"By the sacred indivisible Holy Trinity! Based on the faith that relations must be founded on the exalted truths taught by the eternal religion of the divine Savior, the countries joining this alliance solemnly declare:\n\nThe sole purpose of this agreement is to demonstrate to the world their unwavering resolve to govern internally and politically according to principles of justice, fraternity, and peace.\n\nThese principles apply not only to private life but must directly influence the decisions of monarchs, guiding all their actions to ensure the permanent existence of human institutions and to correct their flaws.\""
 joi_flavor_fra.62.a: "We cannot provoke mighty France."
 joi_flavor_fra.62.b: "United, we shall prevail!"

 joi_flavor_fra.63.t: "The Second Congress of Vienna"
 joi_flavor_fra.63.d: "With the renewed defeat of [SCOPE.sCountry('FRA_scope').GetName], just as in 1815, the allied powers entered Paris and convened the Second Congress of Vienna to redraw the balance of power in Europe and punish the war crimes of the [GetIdeology('ideology_bonapartist').GetName]."
 joi_flavor_fra.63.f: "\"Vienna now presents a remarkable scene: all the eminent figures of Europe are assembled with great pomp. The Emperor of Russia, empress, and grand duchesses; the King of Prussia and several princes of his family; the King of Denmark; the Kings and heirs of Bavaria and Württemberg; dukes and princes from Mecklenburg, Saxony-Weimar, Saxony-Coburg, Hesse, and other principalities; half the former royal princes and counts; and countless representatives from great and small European powers.\"\n\n\"This gathering created a spectacle and such diversity of images and interests that only in our extraordinary age could such a scene emerge. Yet the political situation underlying this spectacle has brought no real progress so far.\""
 joi_flavor_fra.63.a: "This time, we shall consign the Bonapartist scoundrels to eternal damnation!"
 joi_flavor_fra.63.b: "Saint Helena's court might as well be refurbished awaiting the arrival of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."

 joi_flavor_fra.64.t: "The Second Treaty of Tilsit"
 joi_flavor_fra.64.d: "French troops marched into Berlin once again, as in 1806, passing through the Brandenburg Gate. The Prussian royal family fled the capital, and Frankfurt—the seat of the German Confederation—fell under the control of [SCOPE.sCountry('FRA_scope').GetName]. The German princes have expressed their submission to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and it is time to restore rule over [SCOPE.sCountry('RHN_scope').GetName]."
 joi_flavor_fra.64.f: "\"The states of [SCOPE.sCountry('RHN_scope').GetName], including the King of Bavaria and the King of Württemberg, the Electors of the Rhineland and Baden, the Dukes of Berg and Cleves, the Counts of Hesse-Darmstadt, the Princes of Nassau-Usingen and Nassau-Weilburg, the Princes of Hohenzollern-Hechingen and Hohenzollern-Sigmaringen, the Princes of Salm-Salm and Salm-Kyrburg, the Prince of Isenburg-Birstein, the Duke of Arenberg, the Prince of Liechtenstein, and the Count of Rhein, shall permanently separate from the German Empire and unite into a special confederation called the Confederation of the Rhine.\"\n\n\"[ROOT.GetCountry.GetName] and the states of [SCOPE.sCountry('RHN_scope').GetName], collectively or individually, shall form an alliance; should any signatory be involved in a continental war, it shall immediately be allied by all other signatories; if a neighboring non-ally arms itself, the signatories shall arm themselves accordingly upon the request of any minister of the confederation at Frankfurt.\""
 joi_flavor_fra.64.a: "Weaken the Confederation’s autonomy as much as possible."
 joi_flavor_fra.64.b: "Sign the treaty, the Confederation shall govern Germany."

 joi_flavor_fra.65.t: "The Spanish Crown"
 joi_flavor_fra.65.d: "With the fall of Madrid, the master of the Iberian Peninsula—Spain—has effectively fallen under the control of [ROOT.GetCountry.GetName]. The king has expressed willingness to abdicate, perhaps following Emperor Napoleon’s example, by supporting a member of the [ROOT.GetCountry.GetRuler.GetLastName] family to reclaim the Spanish throne."
 joi_flavor_fra.65.f: "\"I enjoyed a royal feast served on pure silverware, with six attendants presenting nine exquisite dishes, many of whose ingredients I could not name; spent leisure time in Charles's private chambers, admiring the princess's botanical collection and archives, or riding elegant horses with the princess and prince along winding park paths beside blooming rhododendrons by an artificial lake where majestic European swans glided peacefully.\"\n\n\"I heard him openly discuss his brief and turbulent rule over Spain—if it can be called rule—blaming over half his misfortunes on the jealousy and conspiracies of unruly marshals over whom he had no authority. He admitted to being unpopular but also claimed sincere desire to benefit the people.\""
 joi_flavor_fra.65.a: "The Spanish throne shall be inherited by His Majesty Joseph Bonaparte’s descendants."
 joi_flavor_fra.65.b: "No more past mistakes; the Empire must secure its dominance in the peninsula."

 joi_flavor_fra.66.t: "The Second Treaty of Florence"
 joi_flavor_fra.66.d: "With the fall of Rome, representatives of [SCOPE.sCountry('AUS_scope').GetName] and [ROOT.GetCountry.GetName] held a secret meeting in Florence, where the anti-French coalition recognized [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s sovereignty over Italy."
 joi_flavor_fra.66.f: "\"During and after the war, all prisoners of war and hostages captured by land or sea shall be returned free of charge within six weeks of the treaty’s ratification, after reimbursement of any debts incurred during captivity. Each party shall reimburse expenses advanced for prisoners’ maintenance in detention.\"\n\n\"For this purpose, a committee shall be appointed with mutual consent to determine compensation to be paid to any contracting party; the committee shall also set the time and place of meetings, entrusted to enforce these provisions, considering costs for prisoners and foreign troops previously maintained by one party.\""
 joi_flavor_fra.66.a: "Rebuild the Kingdom of Naples under the descendants of Marshal Murat in southern Italy."
 joi_flavor_fra.66.b: "Integrate Italian territories under the Kingdom of Italy ruled by His Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."

 joi_flavor_fra.67.t: "The Crown of Poland?"
 joi_flavor_fra.67.d: "We marched under the banner of restoring Poland, capturing Warsaw and gaining the support of many Poles. However, as all Polish territories came under our control, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] began to feel uneasy about whether to officially restore the Kingdom of Poland."
 joi_flavor_fra.67.f: "\"His Imperial Majesty the Tsar of [SCOPE.sCountry('RUS_scope').GetName] irrevocably renounces all claims to the provinces formerly belonging to the Kingdom of Poland, which have, at various times, fallen under Russian rule. No individual—regardless of rank or status—whose property or residence lies within the former Polish territories or those now held by the Tsar, nor any person of the Duchy of Warsaw, or those residing in territories annexed into Russia, shall be prosecuted for their persons, property, rents, pensions, income, rank, or dignity, nor for any political or military activities undertaken during the present conflict.\""
 joi_flavor_fra.67.a: "A noble from the Wettin dynasty could ascend the Polish throne."
 joi_flavor_fra.67.b: "[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall reign over Warsaw."
 joi_flavor_fra.67.c: "The restoration of the Kingdom of Poland can wait; this land should serve as our strategic base for the campaign against Russia."

 joi_flavor_fra.68.t: "The Burning of Moscow"
 joi_flavor_fra.68.d: "Following the French-Russian War of 1812, Moscow once again fell into the hands of [ROOT.GetCountry.GetName]. The [SCOPE.sCountry('RUS_scope').GetName] tried to employ scorched-earth tactics, burning the city to hinder the imperial forces. Yet, under the well-prepared orders of [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], troops brought sufficient supplies from Poland, rendering the fire ineffective. Moreover, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] personally commanded the thorough destruction of the city—including the Kremlin and St. Basil's Cathedral—reducing centuries of Russian cultural heritage to ashes or rubble by explosives. Moscow was transformed into a literal inferno and ruin."
 joi_flavor_fra.68.f: "\"Since the previous day, people have been searching for firebrands, some were taken away, the rest unusable... The Poles reported having obtained and used incendiary bombs... They received orders from [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the military to burn the entire city overnight.\"\n\n\"What a dreadful sight! To destroy so many palaces with their own hands! An unthinkable solution! What kind of people are these? They are Scythians!\""
 joi_flavor_fra.68.a: "We could allow Russia to sign a dignified surrender."
 joi_flavor_fra.68.b: "The Empire’s sphere of influence will stretch across Eastern Europe!"

 joi_flavor_fra.69.t: "The Second Treaty of Pressburg"
 joi_flavor_fra.69.d: "Following the crushing defeat of [SCOPE.sCountry('AUS_scope').GetName] and its allies at Pressburg, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] sent envoys to the Anti-French Coalition to sign a treaty, ending the war and seizing significant territories from [SCOPE.sCountry('AUS_scope').GetName]."
 joi_flavor_fra.69.f: "\"[ROOT.GetCountry.GetName] will retain full ownership and sovereignty over all duchies, principalities, autonomous regions, and territories beyond the Alps, which before this treaty were either incorporated into the French Empire or subject to French legal and administrative authority.\"\n\n\"His Majesty the Emperor of Austria, representing himself and his heirs, agrees to the dispositions made by His Majesty the Emperor of France and the King of Italy concerning the duchies of Lucca and Piombino, and relinquishes all claims to Venetian territories under the Treaties of Campo Formio and Lunéville.\""
 joi_flavor_fra.69.a: "Restore the Illyrian Provinces; the rest can be entrusted to the Confederation."
 joi_flavor_fra.69.b: "We must maintain military control over the Alps."

 joi_flavor_fra.70.t: "Egypt under [ROOT.GetCountry.GetName]"
 joi_flavor_fra.70.d: "The armies of [ROOT.GetCountry.GetName] have occupied the Nile and Suez, the tricolor once again flying atop the Great Pyramid of Khufu—just as Napoleon’s forces did over a century ago."
 joi_flavor_fra.70.f: "The Nile Delta, the granary and heartland of many great empires; Caesar conquered here to bring it under Rome, Selim I subdued it under the Ottoman Empire. Now, following Napoleon’s expedition, the [ROOT.GetCountry.GetName] Empire reconquers this land, its tricolor once again waving above the pyramids.\nEgypt’s strategic importance in this era cannot be overstated: we may emulate the great empires that once ruled here, making Egypt the agricultural backbone of our empire, reaping trade and economic benefits; or transform it into a military bastion, strengthening our global dominance and enhancing military logistics. How shall we utilize this vital land?"
 joi_flavor_fra.70.a: "Egypt shall become the heart of our imperial power."
 joi_flavor_fra.70.b: "Egypt will provide us with strategic trade advantages."

 joi_flavor_fra.71.t: "The Sincere Accord"
 joi_flavor_fra.71.d: "Our government’s special envoy held a secret meeting in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] with former adversaries across the Strait. Publicly, it was claimed to address fisheries and colonial border disputes, but in truth they negotiated a military alliance treaty awaiting the signature of [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_fra.71.f: "\"The British Empire acknowledges France’s obligation to maintain order in Morocco and provide all necessary administrative, economic, fiscal, and military reforms, especially as a neighboring great power.\"\n\n\"To guarantee free passage through the Strait of Gibraltar, both governments agree not to erect any fortifications or strategic works between Melilla on the Moroccan coast and the right bank highlands of the Sebu River, excluding those locations themselves.\"\n\n\"Both governments pledge mutual diplomatic support in implementing the declarations concerning Egypt and Morocco... To confirm this, the French ambassador to His Majesty the King of the United Kingdom of Great Britain and Ireland and the British Overseas Territories, and the Secretary of State for Foreign Affairs, duly authorized, have signed and sealed this accord.\""
 joi_flavor_fra.71.a: "Never trust the cunning bastards across the Strait."
 joi_flavor_fra.71.b: "Our alliance will overcome every formidable foe!"

 joi_flavor_fra.72.t: "Declaration of Algiers"
 joi_flavor_fra.72.d: "[SCOPE.sCharacter('algerian_parade_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('algerian_parade_general_scope').GetLastName] stands on the deck of the Mediterranean fleet's flagship, the [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_ship_name')], and announces the end of large-scale military operations in Algeria."
 joi_flavor_fra.72.f: "The elaborately dressed army slowly winds its way along the Algiers waterfront. Zoauves in bright uniforms march in tight formation towards the [ROOT.GetCountry.GetAdjectiveNoFormatting] ships docked in the harbor, adorned with the tattered battle flags of the defeated Algerian legions. Behind them, Chasseurs d'Afrique, regular infantry, and native foot soldiers follow suit in their attire.\n\n[SCOPE.sCharacter('algerian_parade_general_scope').GetFullNameNoFormatting] stands on the aft deck, watching the large assembly of [ROOT.GetCountry.GetAdjectiveNoFormatting] troops. [SCOPE.sCharacter('algerian_parade_general_scope').GetHerHis] thoughts are interrupted by a gentle clearing of the throat. 'It is the Governor, sir. He wants to know what the arrangements are for what comes next.'"
 joi_flavor_fra.72.a: "Today, we pay tribute to the heroes of Africa!"
 joi_flavor_fra.72.b: "Subsidize companies to levy farmland for European settlers."
 joi_flavor_fra.72.c: "Rule by the sword is a thing of the past; make good deals with the local Sheikhs."

 joi_flavor_fra.73.t: "The Permanent Line"
 joi_flavor_fra.73.d: "A formidable system of concrete fortifications has been completed in [GetStateRegion('STATE_ALSACE_LORRAINE').GetName]. It consists of an intricate defensive network, including underground strongholds, reinforced bunkers, and military installations such as border outposts, communications centres, infantry shelters, roadblocks, artillery positions, machine-gun nests, supply depots, infrastructure, and observation posts."
 joi_flavor_fra.73.f: "“Either a decisive battle shall occur, in which [ROOT.GetCountry.GetName] may prevail; or, more likely, a stable front shall emerge—in which case the devastating consequences of the next war will not be borne upon the soil of [ROOT.GetCountry.GetNameNoFlag].”\n\n“We can scarcely conceive of constructing a defence akin to the Great Wall, for such an undertaking would be prohibitively costly; instead, we envision a system of strong and flexible defence, founded upon the dual principles of fully exploiting terrain and establishing continuous fields of fire across all positions.”"
 joi_flavor_fra.73.a: "It shall surely defend our nation!"

 joi_flavor_fra.74.t: "进攻崇拜"
 joi_flavor_fra.74.d: "受到“道德力量”风尚的影响，全面进攻的理念正在许多政治和军事领导人中占据主导地位。他们认为，只有贯彻每个[ROOT.GetCountry.GetAdjectiveNoFlag]战士身上所体现的高卢精神，例如毫不犹豫地用刺刀冲锋陷阵，才能在战争中取得胜利。"
 joi_flavor_fra.74.f: "“如果[ROOT.GetCountry.GetName]的士兵像意大利人那样犯了懦弱的错误，仅仅把他们退役是不够的。今后，你们应该用汽车将这些军官和士兵押送到总参谋部，并送上军事法庭。我相信，就像1793年一样，除了开除军籍或死刑之外，没有其他结果等着他们！”\n\n“如果你想取得胜利，那就采取迅速、残酷、有力、果断的手段去实现它。如果真有畏惧不前者，那除了立即处决之外，别无其他惩罚！[ROOT.GetCountry.GetName]目前唯一的法律就是：要么冲锋，要么死亡！”"
 joi_flavor_fra.74.a: "至少保留一些怀疑吧。"
 joi_flavor_fra.74.b: "胜利属于全力猛攻的勇士！"
 joi_flavor_fra.75.t: "无畏精神"
 joi_flavor_fra.75.d: "进攻主义思想被最近的辉煌胜利证明了其正确性，令整个[ROOT.GetCountry.GetName]为之振奋。许多公民开始相信，只要我们坚持伟大的无畏和猛攻精神，在任何接下来的战役中，都必将取得胜利。"
 joi_flavor_fra.75.f: "“在国家生死存亡之际，必须提醒所有人，现在绝非回头看的时候。一支无法继续作战的部队，也依然必须不惜一切代价坚守阵地，宁死也不退，并尽可能采取进攻。在当前形势下，任何失败都不能容忍：我们只管全力进攻，不要理睬那些懦弱的英国军队。”\n\n——约瑟夫·霞飞，于马恩河。"
 joi_flavor_fra.75.a: "胜利属于有征服意志的人！"
 joi_flavor_fra.75.b: "没有冲锋就没有胜利！"
 joi_flavor_fra.76.t: "鲜血的代价"
 joi_flavor_fra.76.d: "尽管我们采取了频繁的大规模进攻，但近期战争的惨重伤亡——以及庞大伤亡带来的厌战情绪开始迫使军官们质疑进攻主义的正确性。面对新式的杀伤性武器，[ROOT.GetCountry.GetName]的军队真的还应该秉持凯撒所赞扬的，凯尔特和高卢式的进攻传统吗？"
 joi_flavor_fra.76.f: "“步兵似乎忽略了组织自身进行持续作战的必要性。他们立即将大量密集的部队排成一列，这使他们立刻暴露在敌军火力之下，遭受重创，从而突然中断了进攻，并常常使他们陷入反击的境地。”\n\n“无论人们对未来的战争有何设想，有一点始终至关重要：那就是阻止领土遭到入侵。我们深知此类入侵可能造成的毁灭性后果，其破坏性之大，即使取得胜利也无法弥补。”"
 joi_flavor_fra.76.a: "这并不能说明进攻主义是完全错误的。"
 joi_flavor_fra.76.b: "对进攻的过度迷恋使我们面临最糟糕的命运..."
