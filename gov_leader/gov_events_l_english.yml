l_english:

 joi_flavor_gov.1.t: "Official Nationality"
 joi_flavor_gov.1.d: "The reign of His Majesty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Nicholas Romanov#! is drawing to its close. In striving to restore and defend the sacred order overthrown in the Napoleonic Wars, and with the assistance of men such as the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetLeader.GetFullName], his will has left a profound legacy upon [ROOT.GetCountry.GetName]."
 joi_flavor_gov.1.f: "“We have a common duty: to ensure that the education of the people proceeds, in accordance with the supreme intention of our august monarch, under the joint guidance of Orthodoxy, Autocracy, and the national spirit. I am firmly convinced that every professor and every teacher, so long as his heart is full of loyalty to the Throne and to the Fatherland, will strive with all his might to become a worthy servant of the government, and thus earn its complete confidence.”\n\n“Even if we have absorbed from the West certain unavoidable defects, we have nevertheless preserved within ourselves three pure and fundamental sentiments, in which lie the seeds and safeguards of our future development: these teach the people clearly to understand that, in all matters concerning them, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] acts according to the will of God, and not according to their own imaginings, nor those of foreigners.”"
 joi_flavor_gov.1.a: "Even from the sacred unity of autocracy..."
 joi_flavor_gov.1.b: "His autocratic regime was but a façade..."
 joi_flavor_gov.1.c: "Russia is a great family: the ruler is the father, and the subjects are his children..."

 joi_flavor_gov.2.t: "The Moral Value of Liberty"
 joi_flavor_gov.2.d: "The ministry of the Right Honourable #yellow William Gladstone#! is drawing towards its close. He sought to strengthen equality of opportunity in society, oppose protectionism in trade, and establish a system of public education, while also preserving Britain’s international prestige and the peace of the world by resisting reckless imperial expansion. His ideas and policies have left a profound legacy upon [ROOT.GetCountry.GetName]."
 joi_flavor_gov.2.f: "“The only means by which I can raise the wages of the coal miner is by striving to remove every commercial restriction that may lower the price of the product of his labour, and by reducing as far as possible the duties upon those necessities and articles of consumption which he requires. Beyond that, I look to foresight—that foresight which is not yet as widely diffused in our own country as it is in Scotland and in certain foreign lands.”\n\n“When Mr Gladstone visited the North, the news swiftly spread among the working people, and they came forth in their multitudes to greet the only Prime Minister who had ever bestowed rights upon the people of England. For twenty miles along the riverbank, the shores were crowded with those who had come to welcome him: women stood there with children in their arms, hoping one day to say that they had seen with their own eyes the people’s Chancellor pass by. Every man who could ply an oar stopped to cheer Mr Gladstone; and thousands of rugged miners, who had never before come near any public man, surged around his carriage, stretching out their arms to shake his hand, as though he were one of their own.”"
 joi_flavor_gov.2.a: "I sincerely wish you..."
 joi_flavor_gov.2.b: "Your liberty and your independence..."
 joi_flavor_gov.2.c: "A man at the very end of his days..."

 joi_flavor_gov.3.t: "The Rise of [GetIdeology('ideology_one_nation_conservatism_leader').GetName]"
 joi_flavor_gov.3.d: "At the initiative of the rising magnate of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], [SCOPE.sCharacter('disraeli_scope').GetFullName], many ideas once treated as dogma by [GetIdeology('ideology_british_tory_conservatism_old').GetName] have been recast. In order to attract the rising working class, the principles of [GetIdeology('ideology_one_nation_conservatism_leader').GetName], of which he is the foremost champion, are now gaining ground within the [SCOPE.sParty('conservative_party').GetName]."
 joi_flavor_gov.3.f: "“I have always held that Lord [SCOPE.sCharacter('disraeli_scope').GetLastName] was the greatest Radical in the House of Commons, for he accomplished what no other man in the country could have done: he managed to drag that lumbering coachload of dull and sluggish squires—I say ‘dull’ only in the parliamentary sense of the word—up the hill, and transform those Conservatives into radical reformers.”\n\n“Thus the people of England have united in seeking deliverance from the decaying conspiracy of prodigal oligarchy, savage sectarianism, and greedy clerical domination, all of them upheld behind the scenes by their hereditary leaders—the aristocracy. And so, at this very hour, the House of Lords represents everything save the Whig oligarchs, their instruments—the dissenters—and their masters—the Irish clergy.”"
 joi_flavor_gov.3.a: "This is the noble duty of our new age!"
 joi_flavor_gov.3.b: "Paternalism is hardly desirable."
 joi_flavor_gov.4.t: "Endymion of Conservatives"
 joi_flavor_gov.4.d: "The ministry of the Right Honourable #yellow Benjamin Disraeli#! is drawing towards its close. He sought to reform the stale habits of thought of the #yellow Conservative Party#!, to promote economic fairness, public health, and social stability; and he also upheld a world order favourable to [ROOT.GetCountry.GetName] through firm military and diplomatic means, enlarging the interests of the British Empire. He won broad support from those [GetIdeology('ideology_one_nation_conservatism_leader').GetName] who favoured benevolence and reform, as well as from the working classes. His ideas and policies have left a profound legacy upon [ROOT.GetCountry.GetName]."
 joi_flavor_gov.4.f: "“Would there be altogether a change of parties? Would the Protectionists try again? They were very strong, but always in a minority, like some great continental powers, who have the finest army in the world, and yet get always beaten. Would that band of self-admiring geniuses, who had upset every cabinet with whom they were ever connected, return on the shoulders of the people, as they always dreamed, though they were always the persons of whom the people never seemed to think?”\n\n“What I came for was to see our old nursery, where we lived so long together, and so fondly! Here it is; here we are. All I have desired, all I have dreamed, have come to pass. Darling, beloved of my soul, by all our sorrows, by all our joys, in this scene of our childhood and bygone days, let me give you my last embrace.”\n\n                                                    —Benjamin Disraeli, *Endymion*"
 joi_flavor_gov.4.a: "He was the saviour of Conservatism..."
 joi_flavor_gov.4.b: "I still believe he had a mission to fulfil..."
 joi_flavor_gov.4.c: "I thought he was a man set apart for a purpose..."

 joi_flavor_gov.5.t: "The Fulfilment of Manifest Destiny"
 joi_flavor_gov.5.d: "The presidency of #yellow James K. Polk#! is drawing to a close. He has opposed protectionism, seeking to promote commercial prosperity through the reduction of tariffs, and has advocated the establishment of an Independent Treasury to shield public finances from the influence of private banks. Abroad, his expansion along the Pacific coast and into Mexican territories has vigorously advanced the doctrine of Manifest Destiny. Many now believe that [ROOT.GetCountry.GetName], guided by Providence, is not only destined to span the continent from the Atlantic to the Pacific, but is also bound to carry republican institutions across the entirety of #O North America#!, fulfilling a civilising mission."
 joi_flavor_gov.5.f: "“I feel that I am now entirely relieved from all the burdens of public affairs. I am persuaded that I shall enjoy greater happiness in retirement than during the four years in which I held the highest office bestowed by my fellow citizens.”\n\n“Polk’s body had been worn down by the weight of his labours; his hair had turned entirely white, and he suffered long from chronic illness. As he departed the White House and returned to Tennessee, he was met with public acclaim along his journey—yet such honours only further exhausted his frail condition. He seemed a hero who came and went with quiet resolve, completing his mission before swiftly vanishing from the public eye. Yet the people shall not forget him.”"
 joi_flavor_gov.5.a: "James K. Polk—we shall not forget your service..."
 joi_flavor_gov.5.b: "Old Hickory’s heir, you have earned your rest..."
 joi_flavor_gov.5.c: "Merely an ageing man, nothing more..."
