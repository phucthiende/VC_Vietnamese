l_english:
 government_leader_nicholas_i:0 "Orthodoxy, Autocracy, Nationality"
 government_leader_nicholas_i_reason:0 "In the aftermath of the #b Napoleonic Wars#!, the spirit of #R disloyalty#! has become #b deeply rooted#! among the #v $aristocrats$#! of [ROOT.GetCountry.GetName]—the very foundation upon which the #yellow House of [SCOPE.sCharacter('nicholas_i_scope').GetLastName]#! rests. His Majesty [SCOPE.sCharacter('nicholas_i_scope').GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the supreme defender of reaction and the sacred order in 欧洲, ascended the throne amidst the rebellion of the Decembrist conspirators, and thus has ever since suspected that those around him may be plotting to overthrow his rightful crown.\n\nIn order to #B root out rebellion#! and destroy the conspiracies across Europe that seek to undermine monarchy, religion, and public morality, His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] intends to establish a powerful #yellow political police#!, enforce #yellow censorship#!, and transform the aim of the #yellow education system#! so that it shall #B reject Western thought and instead cultivate executors of the monarch’s will who are #V devout#!, #V unconditionally loyal to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, and #V rigorously disciplined#!#!—thereby achieving the imperial unity of #O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],government_leader_nicholas_i_modifier_effects_tt absolutism#!#! under the absolute authority of [GetReligion('orthodox').GetName] and [GetLawType('law_monarchy').GetName].\n\n[SCOPE.sCharacter('nicholas_i_scope').GetFirstName]#yellow ’s Reactionary Agenda:#!\nCompleting the tasks of Tsar [SCOPE.sCharacter('nicholas_i_scope').GetFirstName]’s agenda will increase the effectiveness of this [concept_journal_entry], and the corresponding achievements will be counted upon #B completion#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_1_checkbox')]Has the [GetLawType('law_autocracy').GetName] and [GetLawType('law_state_religion').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_2_checkbox')]Has the [GetLawType('law_censorship').GetName] or [GetLawType('law_outlawed_dissent').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_3_checkbox')]Has the [GetLawType('law_secret_police').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_4_checkbox')][concept_literacy] is #V below 15%#! and remaining [concept_bureaucracy] is not less than #V 1000#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_5_checkbox')]All #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#! [Concept('concept_political_movement','$concept_political_movements$')]s have [concept_activism] #B below 10%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_6_checkbox')][GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] are both [concept_in_government] and [concept_powerful]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_7_checkbox')]No #L #B republican#!#! [concept_country] of [concept_major_power] [concept_rank] or higher exists upon the #O European Continent#! of 欧洲"
 government_leader_nicholas_i_possible_tt:0 "Is #yellow Nicholas Romanov#!"
 government_leader_nicholas_i_modifier_effects_tt:0 "[GetStaticModifier('government_leader_nicholas_i_je_modifier').GetName]\n[GetStaticModifier('government_leader_nicholas_i_je_modifier').GetDesc]"
 government_leader_nicholas_i_complete_tt:0 "[SCOPE.sCharacter('nicholas_i_scope').GetFullName] has #O died#!, #O abdicated#!, or been [concept_exile]d"
 government_leader_nicholas_i_on_complete_tt:0 "#V If#! we complete all #yellow agenda items#!, we shall gain the [GetLawType('law_official_nationalism').GetName] [concept_law].\n#V If#! we fail to fulfil the first three #yellow agenda items#! upon completion, the reactionary forces within our country shall suffer a setback."
 joi_flavor_gov_1_a_tt:0 "#B ...and may yet produce a model of national enlightenment.#!"
 joi_flavor_gov_1_b_tt:0 "#B ...serving only to conceal the greed and arbitrariness of officials at every level.#!"
 joi_flavor_gov_1_c_tt:0 "#B ...a father wielding absolute authority over his children, yet granting them peace and happiness in return.#!"

 government_leader_william_gladstone:0 "Gladstonian Liberalism"
 government_leader_william_gladstone_reason:0 "In this high tide of the #B Pax Britannica#!, the steadfast champion of #blue #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberalism#!#!, [SCOPE.sCharacter('gladstone_scope').GetFullName], has served continuously as Prime Minister of [ROOT.GetCountry.GetName] since the accession of the [SCOPE.sParty('liberal_party').GetName], guiding the British government with a political faith in liberalism that is almost religious in its fervour.\n\nHis programme seeks to strengthen #B individualism, liberty, and equal rights#!, consolidating the prosperity of [ROOT.GetCountry.GetName] through [GetLawType('law_laissez_faire').GetName] and [GetLawType('law_free_trade').GetName], and by reducing [concept_tariffs], limiting [concept_government_expenses], and lowering [concept_taxes], thereby maintaining a balanced budget while preserving a #B clean government#! that interferes as little as possible in a #B #V free society#!#!.\n\n#B [SCOPE.sCharacter('gladstone_scope').GetFullName]#yellow ’s Programme:#!#!\nCompleting the tasks of Prime Minister [SCOPE.sCharacter('gladstone_scope').GetLastName]’s programme will increase the effectiveness of this [concept_journal_entry], and the corresponding achievements will be counted upon #B completion#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_1_checkbox')]Has the [GetLawType('law_laissez_faire').GetName] [concept_law] and the highest GDP in the world\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_2_checkbox')]Has the [GetLawType('law_free_trade').GetName] [concept_law], and the total [concept_traded_quantity] of imports and exports between our [concept_market] and the [concept_world_market] is #B at least#! #V 250k#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_3_checkbox')]#O Tax Level#! no higher than #V Low#!, and no more than #V 5#! [concept_consumption_tax]es collected\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_4_checkbox')][concept_investment_pool] receives at least #V 3M#! in total [concept_reinvestment], and the country possesses [concept_economy_health]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_5_checkbox')]Completed the #V $elementary_education_1870_act$#! [concept_journal_entry], and [concept_literacy] is #B at least#! #V 70%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_6_checkbox')]Completed the #V $british_empire_ireland$#! [concept_journal_entry], the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] is in government, and [concept_legitimacy] is at least 80\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_7_checkbox')]Fewer than 2 [concept_great_power]s in 欧洲 are currently at war\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_8_checkbox')]Has the [GetLawType('law_census_voting').GetName] or [GetLawType('law_universal_suffrage').GetName] [concept_law]"
 government_leader_william_gladstone_possible_tt:0 "Is #yellow William Gladstone#!"
 government_leader_william_gladstone_complete_tt:0 "[SCOPE.sCharacter('gladstone_scope').GetFullName] has #O died#!, #O retired#!, or been [concept_exile]d"
 government_leader_william_gladstone_on_complete_tt:0 "#V If#! we complete at least five #yellow Gladstone Programme#! items, the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] and the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] may in future continue to gain leaders with the [GetIdeology('ideology_gladstonian_liberalism_leader').GetName] ideology."
 government_leader_william_gladstone_on_complete_2_tt:0 "If we complete all #yellow Gladstone Programme#! items, we shall gain the following special #o modifier#!:"
 country_no_voting_franchise_tt:0 "This country cannot vote in [concept_election]s"
 joi_flavor_gov_2_a_tt:0 "#B ...the freedom and independence of the individual.#!"
 joi_flavor_gov_2_b_tt:0 "#B ...and oppose the doctrine of so-called collectivism.#!"
 joi_flavor_gov_2_c_tt:0 "#B ...a man who in essence remained a Peelite.#!"

 government_leader_benjamin_disraeli:0 "Humanitarian Conservatism"
 government_leader_benjamin_disraeli_reason:0 "Industrialisation is not merely transforming our nation; for the [SCOPE.sParty('conservative_party').GetName], #B change#! is equally necessary. Since the repeal of the #O Corn Laws#! and the passage of the #O Reform Acts#!, the once-mighty [SCOPE.sParty('conservative_party').GetName] has seen its power decline, weakened by the fading influence of its traditional pillar, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], and the influx of millions of new voters from the [concept_lower_strata].\n\nThe current leader of the [SCOPE.sParty('conservative_party').GetName], #yellow Sir#! [SCOPE.sCharacter('disraeli_scope').GetFullName], believes that if the party is to prevail in [concept_election]s among this new electorate, it must #B pursue social reform#!. Through a series of measures he seeks to #B improve the condition of the people#!, provide social support to #B protect the working classes#!, and encourage the [concept_upper_strata] to share their wealth and advantages downward within a paternalistic [concept_government], ultimately establishing a #V benevolent and humanitarian organic society#! while preserving the #B conservative hierarchical order#!.\n\n#B [SCOPE.sCharacter('disraeli_scope').GetFullName]#yellow ’s Programme:#!#!\nCompleting the tasks of Prime Minister [SCOPE.sCharacter('disraeli_scope').GetLastName]’s programme will increase the effectiveness of this [concept_journal_entry], and the corresponding achievements will be counted upon #B completion#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_1_checkbox')]Has the [GetLawType('law_monarchy').GetName] [concept_law] and voting rights, and the [concept_activism] of #B Radical movements#!, #B Labour movements#!, and all #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#! [Concept('concept_political_movement','$concept_political_movements$')]s is #B below 25%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_2_checkbox')]Has the [GetLawType('law_public_health_insurance').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_3_checkbox')]Has the [GetLawType('law_regulatory_bodies').GetName] or [GetLawType('law_worker_protections').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_4_checkbox')][concept_sol] is at least #V 20#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_5_checkbox')]Controls the #yellow Suez Canal Company#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_6_checkbox')]Is the world’s No.1 [concept_great_power], and the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] possesses the #yellow #tooltippable;tooltip:[GetPlayer.GetTooltipTag],emperor_ofindia_list_tt Emperor of India#!#! trait\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_7_checkbox')]Russia or its subjects control #B no more than#! #V 1#! province in Balkans\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_8_checkbox')]Has the [GetLawType('law_census_voting').GetName] or [GetLawType('law_universal_suffrage').GetName] [concept_law], and has completed the #V $great_1867_parliament_reform$#! [concept_journal_entry]"
 government_leader_benjamin_disraeli_possible_tt:0 "Is #yellow Benjamin Disraeli#!"
 government_leader_benjamin_disraeli_complete_tt:0 "[SCOPE.sCharacter('disraeli_scope').GetFullName] has #O died#!, #O retired#!, or been [concept_exile]d"
 government_leader_benjamin_disraeli_on_complete_tt:0 "#V If#! we complete at least five #yellow Disraeli Programme#! items, the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName], and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] may in future continue to gain leaders with the [GetIdeology('ideology_one_nation_conservatism_leader').GetName] ideology."
 ideology_british_tory_conservatism_reformed_tt:0 "The original conservative ideology of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] and the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] will be updated to the #V reformed#! [GetIdeology('ideology_british_tory_conservatism_reformed').GetName] ideology!"
 finish_great_1867_parliament_reform_tt:0 "Completed the #V $great_1867_parliament_reform$#! [concept_journal_entry]"
 emperor_ofindia_list_tt: "The #B Emperor of India#! trait will be granted to the current monarch after your #B Indian#! subject completes the #V Unify the Subcontinent#! [concept_journal_entry].\nThe #V Unify the Subcontinent#! [concept_journal_entry] becomes available to the #B Indian#! subject after it researches the #B General Staff#! technology, with the objective of occupying all regions of the [concept_indian_subcontinent]."
 joi_flavor_gov_4_a_tt:0 "#B ...possessing perfect gentlemanly manners and a will of steel.#!"
 joi_flavor_gov_4_b_tt:0 "#B ...who will not vanish before completing his mission.#!"
 joi_flavor_gov_4_c_tt:0 "#B ...even if only to give people hope.#!"

 government_leader_usa_polk_character_possible_tt:0 "Is #yellow James K. Polk#!"
 government_leader_james_polk:0 "The Promise of Manifest Destiny"
 government_leader_james_polk_reason:0 "In his presidential campaign speeches, a distinguished candidate has pledged to fulfil #B the Manifest Destiny of the United States#!. As a prominent figure of the #yellow Democratic Party#!, [SCOPE.sCharacter('polk_scope').GetFullName] was elected to the House of Representatives at the age of 29, and since the presidency of #yellow Andrew Jackson#! has served as Speaker of the House and Governor of Tennessee. He is regarded by the #yellow Democratic Party#! as the most faithful heir to Jacksonian leadership.\n\nHis programme of governance seeks to realise the #B expansionist vision of Manifest Destiny#! and the #B spirit of Jacksonian Democracy#!—to secure the prosperity of [ROOT.GetCountry.GetName] through [GetLawType('law_free_trade').GetName], to reduce [concept_tariffs], and to place [concept_government_expenses] under an independent treasury system. With finances stabilised, he aims to expand outward and carry the principles of democracy across the #O North American continent#!.\n\n#B [SCOPE.sCharacter('polk_scope').GetFullName]#yellow ’s Campaign Promises:#!#!\nFulfilling the objectives outlined in President [SCOPE.sCharacter('polk_scope').GetLastName]’s programme will enhance the effectiveness of this [concept_journal_entry], and the associated achievements will be counted upon #B completion#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_1_checkbox')] Enact [GetLawType('law_free_trade').GetName] [concept_law], and ensure our total [concept_traded_quantity] of imports and exports between our [concept_market] and the [concept_world_market] reaches at least #V 8k#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_2_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] or its [concept_subject] has secured #yellow Oregon#!, #yellow Idaho#!, and #yellow Washington#!, thereby resolving the Oregon Question\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_3_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] or its [concept_subject] has fully acquired #yellow California, Arizona, Utah, New Mexico, Colorado#!, and #yellow Nevada#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_4_checkbox')] Restore the Independent Treasury: all our [concept_incorporated_state] possess [GetBuildingType('building_government_administration').GetName], and the national treasury maintains a positive balance\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_5_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] has fully secured #yellow Texas#! and incorporated it as an [concept_incorporated_state]"
 government_leader_james_polk_complete_tt:0 "[SCOPE.sCharacter('polk_scope').GetFullName] has #O died#!, #O retired#!, or been [concept_exile]"
 government_leader_james_polk_on_complete_tt:0 "#V If#! we fulfil at least 4 #yellow Promises of Manifest Destiny#!, the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] and the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] may continue to produce leaders with the [GetIdeology('ideology_jacksonian_democrat').GetName] ideology in the future."
