l_english:

 gov_frankfurter_kaiserreich: "Frankfurt Imperial Government"
 gov_frankfurter_kaiserreich_desc: "In this [concept_government_type], the state is headed by a hereditary [Concept('concept_ruler', '$RULER_TITLE_KAISER$')] or [Concept('concept_ruler', '$RULER_TITLE_KAISERINE$')], who exercises power according to the provisions of the Frankfurt Constitution and authorizes the Imperial Diet to govern.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_lander_der_krone: "Crown Lands"
 gov_lander_der_krone_desc: "Authorized territories under the Imperial Government, the [concept_lander_der_krone] are represented by their parliaments under the crown of the [Concept('concept_ruler', '$RULER_TITLE_KAISER$')] or [Concept('concept_ruler', '$RULER_TITLE_KAISERINE$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_second_napolean_empire: "French Empire"
 gov_second_napolean_empire_desc: "By the grace of God and the will of the people, as enshrined in the Constitution, the government of the French is headed by the [Concept('concept_ruler', '$RULER_TITLE_EMPEROR$')] or [Concept('concept_ruler', '$RULER_TITLE_EMPRESS$')], elected by the Senate and the people of France.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_jap_japanese_empire: "Empire of Japan"
 gov_jap_japanese_empire_desc: "In this [concept_government_type], the [Concept('concept_ruler', '$RULER_TITLE_JAPEMPEROR$')] is a descendant in an unbroken line from the goddess Amaterasu, and is recognized as a sacred and inviolable symbolic ruler.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_celestial_empire: "Celestial Empire"
 gov_celestial_empire_desc: "Under this [concept_government_type], the [concept_country] is ruled by the [Concept('concept_ruler', '$RULER_TITLE_EMPEROR$')], who is considered the Son of Heaven and a sacred and supreme [concept_ruler] governing the great central dynasty with wise mandate from heaven.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sublime_porte: "Sublime Porte"
 gov_sublime_porte_desc: "The most exalted [Concept('concept_ruler','$RULER_TITLE_CALIPH$')], the Shadow of God upon Earth, the Guardian of the Holy Cities, the [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] of the Two Seas and the Two Continents, the [Concept('concept_ruler','$RULER_TITLE_SULTAN$')] of the Turks and of Islam, the Roman [Concept('concept_ruler','$RULER_TITLE_KAISER$')], His Imperial Majesty the Ottoman [Concept('concept_ruler','$RULER_TITLE_PADISAH$')], whose [concept_government] stands supreme.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sublime_porte_caliph: "崇高之门"
 gov_sublime_porte_caliph_desc: "至高无上的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]，真主在世上的影子，圣地监护，两海与两陆的[Concept('concept_ruler','$RULER_TITLE_EMPEROR$')]，突厥与伊斯兰的[Concept('concept_ruler','$RULER_TITLE_SULTAN$')]，罗马[Concept('concept_ruler','$RULER_TITLE_KAISER$')]，奥斯曼[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]陛下的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_spqr: "元老院与罗马人民"
 gov_spqr_desc: "自由的全体罗马公民之代表，尊贵的[Concept('concept_ruler','$RULER_TITLE_KAISER$')]，神之子，统帅[Concept('concept_ruler','$RULER_TITLE_AUGUSTUST$')]，最高祭司，保民官权拥有者，天下的主宰，罗马[Concept('concept_ruler','$RULER_TITLE_IMPERATOR$')]奉罗马人民与元老院的旨意所授权的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"

 gov_british_presidential_dominion: "Dominion"
 gov_british_presidential_dominion_desc: "Under this [concept_government_type], the [concept_country] is governed by a [Concept('concept_ruler', '$RULER_TITLE_GOVERNOR_GENERAL$')] representing the British monarch, enjoying a high degree of self-governance.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_british_parliamentary_dominion: "Dominion"
 gov_british_parliamentary_dominion_desc: "Under this [concept_government_type], the [concept_country] is governed by a parliament [Concept('concept_election', '$concept_elected$')] through democratic procedures; although there is a [Concept('concept_ruler', '$RULER_TITLE_GOVERNOR_GENERAL$')] representing the British monarch, they do not have actual governing power.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_federal_government_of_united_states: "Federal Government"
 gov_federal_government_of_united_states_desc: "Under this [concept_government_type], the [concept_country] is governed by a [Concept('concept_ruler', '$RULER_TITLE_PRESIDENT$')] [Concept('concept_election', '$concept_elected$')] by the Electoral College of each state, exercising executive power according to the Constitution under the constraints of Congress, the Supreme Court, and state governments.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

 RULER_TITLE_JAPEMPEROR: "Emperor"
 RULER_TITLE_JAPPRINCE: "Crown Prince"
 RULER_TITLE_CHINESEPRINCE: "Crown Prince"
 RULER_TITLE_PADISAH: "Padisah"
 RULER_TITLE_SEHZADE: "谢赫扎德"
 RULER_TITLE_IMPERIAL_PRINCESS: "Imperial Princess"
 RULER_TITLE_KING_TOOLTIP: "君主"
 RULER_TITLE_AUGUSTUST: "奥古斯都"
 RULER_TITLE_IMPERATOR: "英白拉多"
