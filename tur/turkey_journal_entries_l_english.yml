 tur_sublime_porte:0 "The Sublime Porte"
 tur_sublime_porte_reason:0 "#B #G The Ottoman [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of the Empire, Caliph of Islam, Shadow of God on Earth, Guardian of the Holy Cities, Emperor of the Two Seas and the Two Lands, Sultan of the Turks and of Islam, Caesar of Rome, His Most Sublime Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle],#V is the reigning sovereign.#!#!#!\n\nAs the most renowned title of the #V Imperial Government#!, the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Ottoman Sublime Porte#! originally signified the gate leading to the outer court of #B Topkapı Palace#!. The name derived from the ancient custom by which monarchs proclaimed official decisions and judgements at the gate of the palace, a practice likewise followed by [ROOT.GetCountry.GetName] since the reign of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #V Orhan I#!. Yet in the eighteenth century, a magnificent palace was erected on #B Alemdar Street, to the west of Topkapı Palace#!, which became the seat of the #yellow Grand Vizier#! and numerous departments of state, and from that time replaced the palace court itself as the place known as the #G #B “Sublime Porte”#!#!.\n\nWith the #B changing of the times and the growing burden of administration#!, the #G #B Porte#!#! gradually developed into a #V complete and intricate bureaucratic system#!: there the Empire’s #v $bureaucrats$#! and #v $aristocrats$#! co-ordinate #O finance, military affairs, and legislation#!, turning the will of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] into concrete [concept_law]s and [concept_decree]s. It not only gathered the finest civil servants and counsellors of the Empire, but in countless internal and external crises it also #B sustained the working of the state apparatus#!, enabling [ROOT.GetCountry.GetName] to #B preserve unity and order#! across its vast dominions.\n\nYet the #G #B Porte#!#! has just as often meant intrigue, struggle, and betrayal within the court: if the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] cannot assert his #V supreme authority#! and #V strong iron hand#! over the Porte, then conspiracies from the court and from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] may at any moment cast him down from the throne of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
