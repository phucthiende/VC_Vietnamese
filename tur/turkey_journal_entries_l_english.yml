 great_ottomanism_1_button_desc:0 "Secular institutions and policies must replace the religiously defined communal structure of the millet system: let us equalise elementary education, conscription, the poll tax, and the bureaucracy, abolish Muslim privilege, and establish in the constitution the equal civic and autonomous standing of the [GetCulture('bulgarian').GetName] people."
