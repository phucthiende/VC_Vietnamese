 ottoman_constitutional_era_fail_2_tt:0 "Completed all objectives of the #V Enlightened Autocracy of [ROOT.GetCountry.GetRuler.GetFirstName]#! [concept_journal_entry]"
 ottoman_constitutional_era_1_button:0 "Suspend the Constitution"
 ottoman_constitutional_era_1_button_desc:0 "How can the authority of the Padishah be bound by some absurd constitution? Let the sword speak instead."
 ottoman_constitutional_era_1_button_enable_tt:0 "The Constitution has not yet been suspended"
 ottoman_constitutional_era_1_button_possible_tt:0 "#U Parliamentary Influence#! is at least 300"
 ottoman_constitutional_era_1_button_effect_tt:0 "The [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] shall dissolve the parliament by force and suspend the constitution, proclaiming personal autocracy.\nThis may decisively advance #G Court Authority#! in the future, but may also provoke a #V fierce resurgence#! of #U Parliamentary Influence#!.\nWhile the constitution remains suspended, the growth of #U Parliamentary Influence#! will be halted.\nNote: this does not mean the constitution is abolished; therefore #U Parliamentary Influence#! may yet return in the future."
