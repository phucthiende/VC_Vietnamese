l_english:
 peter_the_great_of_turkey:0 "The Peter the Great of the Ottomans"
 peter_the_great_of_turkey_reason:0 "Since becoming the [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] of [ROOT.GetCountry.GetName] in #V 1808#!, [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has undertaken a number of reforms in order to save the Empire from decline: in the #V Auspicious Incident of 1826#! he executed the rebellious Janissaries and abolished the #O Janissary Corps#!; in 1827 he commissioned the world’s largest #O ship-of-the-line#!, the #yellow Mahmudiye#!, reviving the Empire’s [concept_fleet]; in 1830 he abolished the long-defunct #B Timar and Ziamet system#!; and in 1834 he suppressed the local #O hereditary Derebeys#!, who had in almost every province of the Empire #B proclaimed themselves petty kings.#!\n\nYet the condition of [ROOT.GetCountry.GetRuler.GetFullName] is far from reassuring: he is believed to be suffering from the #V White Plague#!. With the rise of the [Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')] of [SCOPE.sCountry('EGY_scope').GetName] and the #R loss of Syria#!, [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is resolved, in the final years of his life, to reform the backward political and military systems of [ROOT.GetCountry.GetName] yet further, after the model of the Western European [concept_great_power]s. This will require us to take active political measures and cultivate ties with the Western European [concept_great_power]s, so as to obtain greater support from them.\n\n[ROOT.GetCountry.GetRuler.GetFirstName]#yellow ’s Reform Agenda:#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_1_checkbox')]Has the [GetLawType('law_appointed_bureaucrats').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_2_checkbox')]Is the #O leading producer#! of [SCOPE.sGoods('tobacco_scope').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_3_checkbox')][concept_army] #O size#! #B at least 200#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_4_checkbox')][concept_fleet] #O size#! #B at least 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_5_checkbox')]Has the [GetLawType('law_professional_army').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_6_checkbox')][concept_relations] with [SCOPE.sCountry('GBR_scope').GetName] are #G at least 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_7_checkbox')][concept_relations] with [SCOPE.sCountry('FRA_scope').GetName] are #G at least 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_8_checkbox')]Has successfully obtained [concept_military_assistance] from [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName], or [SCOPE.sCountry('RUS_scope').GetName]\n\nThe more of this reform agenda we can complete before [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] passes away, the greater the authority of the Porte will be when [ROOT.GetCountry.GetHeir.GetFirstName] [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] succeeds, and the weaker the resistance to reform shall become."
 peter_the_great_of_turkey_status:0 "#B Continue the grand reforms of [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!"
 peter_the_great_of_turkey_complete_tt:0 "[ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has passed away"
 edict_of_gulhane_event_1_tt:0 "He is regarded as a great reformer of genius, comparable to Peter the Great, who breathed new life into the Empire."
 edict_of_gulhane_event_2_tt:0 "He is regarded as a reformer full of contradictions, who charged against decay with sword in hand, his resolve unmatched."
 edict_of_gulhane_event_3_tt:0 "He is regarded as the gravedigger of the old order and the founder of a new age; his name stands astride decline and revival."
 edict_of_gulhane_event_4_tt:0 "He is regarded as a rebellious Sultan who sought to save his Empire, yet Allah did not permit him to succeed."
 peter_the_great_of_turkey_button:0 "Invite British Specialists for a Consultation"
 peter_the_great_of_turkey_button_desc:0 "According to the diagnosis of the most distinguished physicians at our court, the Padishah suffers from what the Westerners call tuberculosis. We have no cure for it, yet from technologically advanced #yellow Great Britain#! we might, at some expense, engage the foremost scholars of the Royal Medical Society at least to improve the Padishah’s condition somewhat."
 peter_the_great_of_turkey_button_possible_tt:0 "The Padishah’s condition has significantly worsened (progress bar at least 15)"
 peter_the_great_of_turkey_button_effect_tt:0 "We shall communicate with the British and invite experts of the Royal Medical Society to Topkapı to examine the Padishah.\nThis is expected to delay the progress of the Padishah’s illness, though it can never cure it."

 tanzimat_main:0 "The Tanzimat Reforms"
 tanzimat_main_reason:0 "Though we created much splendour in what was once the #G classical age#! of [ROOT.GetCountry.GetName], since the end of the #V #yellow Tulip Age#! of the eighteenth century#! [ROOT.GetCountry.GetName] has fallen into a period of disorder: #B the dominions of the Empire have steadily shrunk, while its strength has visibly waned beside the [concept_great_power]s of 欧洲#!. As new technologies and ideas spread through 欧洲, the gap between the Empire and the [concept_great_power]s of 欧洲 grows ever wider. Though [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Mahmud II#! has already attempted numerous reforms to address the Empire’s decline, such measures still #B appear insufficient#! when set against the rapid transformations of 欧洲.\n\nIf we are to reverse the Empire’s slow decline, we must carry out #V thorough reforms#! in every function of government: #O legislative institutions#!, #O trade policy#!, the #B secularisation and codification#! of the [concept_law] #O system#!, action against [GetLawType('law_slave_trade').GetName], and the institutions of #O education, property law, law enforcement, and the military#! must either be completely reorganised or, in some cases, #B built by the Porte from the ground up#!.\n\nBy establishing new institutions and extending the benefits of good administration to all the #O provinces#! of [ROOT.GetCountry.GetName], [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFirstName] #yellow Pasha#! believes that the Empire will be able to build a more #G centralised and modern#! [concept_government], raise the [concept_legitimacy] of [ROOT.GetCountry.GetAdjectiveNoFlag] rule, #V restore her dignity among the [concept_great_power]s, and perhaps even recover her former glory#!."
 tanzimat_main_possible_tt:0 "#yellow Mahmud II#! Padishah has died, and the Edict of the Rose Chamber has been proclaimed."
 tanzimat_main_status:0 "#U #B Complete the modernisation and revival of [ROOT.GetCountry.GetName]#!#!"
 tanzimat_main_complete_tt:0 "Completed 7 #V Tanzimat#! [concept_journal_entry]s"
 tanzimat_main_1_button:0 "Promulgate the Imperial Reform Edict"
 tanzimat_main_1_button_desc:0 "The reforms undertaken thus far are no longer sufficient to meet the Empire’s present needs. The Padishah must sign a decree, based upon the reform draft of [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName], further advancing religious equality within the Empire so as to win the confidence of the Christian Great Powers and to ease the internal tensions of our state."
 tanzimat_main_1_button_possible_tt:0 "At least 3 #V Tanzimat#! [concept_journal_entry]s have already been completed"
 tanzimat_main_1_button_visible_tt:0 "No reform edict has yet been promulgated"
 tanzimat_main_advance:0 "Advance #V Tanzimat#! progress bar by 1"
 tanzimat_religious_modernization:0 "Tanzimat: Freedom of Conscience"
 tanzimat_religious_modernization_reason:0 "The [concept_law]s based upon #I Sharia#! have grown obsolete: with the rise of #yellow nationalism#!, the discontent of non-[GetReligion('sunni').GetName] [concept_pop]s within the Empire—especially the #O Christians#! of Balkans—is undermining the [concept_legitimacy] of [ROOT.GetCountry.GetAdjectiveNoFlag] rule.\n\nIf we are to rebuild a united [ROOT.GetCountry.GetAdjectiveNoFlag] state, the privileges and inequalities founded upon [concept_religion] [concept_discrimination] must be abolished. We must also fashion from [concept_law] and [concept_government] a new understanding of #B justice and equality#!, overcome the communal tensions of the #O millet#! and [concept_religion] system, define the concept of citizenship and the rights that flow from it—and place [ROOT.GetCountry.GetAdjectiveNoFlag] #V citizenship#!, and #B loyalty to [ROOT.GetCountry.GetName], above all other narrower communal identities#!."
 tanzimat_fiscal_modernization:0 "Tanzimat: Fiscal Modernisation"
 tanzimat_fiscal_modernization_reason:0 "The [concept_taxes] system of [ROOT.GetCountry.GetName] is ancient and outdated: it relies on local #V Iltizam#! #v $aristocrats$#! to collect taxes on the state’s behalf, gravely weakening the revenues at the Porte’s disposal. This system also deepens corruption within the imperial government and forces heavy tax burdens upon the #v $farmers$#!.\n\nIf [ROOT.GetCountry.GetName] is still to compete on equal terms with the [concept_great_power]s of 欧洲, the Porte must possess a #v $bureaucrats$#! apparatus capable of directing the [concept_money] of the whole country. We ought to imitate the great powers of 欧洲 by establishing #B an independent Ministry of Finance and audit offices#!, introducing #B modern accounting methods#!, and #B unifying the complex and cumbersome taxes and rates of the Empire#!, so that the Porte may create a #V true long-term budget#!."
 tanzimat_centralisation:0 "Tanzimat: Centralisation"
 tanzimat_centralisation_reason:0 "Though many of the #O Derebey lords#! who once tyrannised the provinces were largely destroyed by #V 1820#!, the authority of the Porte in the provinces of [ROOT.GetCountry.GetAdjectiveNoFlag] still remains in a #b highly precarious state#!. After the #V Second Serbian Uprising of 1815#! and the #V Greek Revolt of 1828#!, [ROOT.GetCountry.GetName] lost the #O Peloponnese#! and #O Northern Serbia#!, lands it had ruled for centuries. This further weakened the authority of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nWe must not sit idly by while #R separatist rebels#! and #R local autonomy#! tear the Empire apart: the old system of rule no longer suffices for the needs of the age. We must carry out a #B thorough reorganisation#!, establish a #V modern $bureaucrats$ system#!, replace the Imperial Council with ministerial departments, substitute provincial administration for the private authority of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], and define their spheres of responsibility more clearly, so that they may better serve the provinces of the [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_country]."
 tanzimat_centralisation_goal:0 "The following conditions must be met for 5 years:"
 tanzimat_centralisation_complete_tt:0 "Completed the #V Fiscal Modernisation#! [concept_journal_entry]"
 tanzimat_centralisation_complete_2_tt:0 "Completed the #V Provincial Reform of Syria#! [concept_journal_entry]"
 tanzimat_military_modernization:0 "Tanzimat: Army Reform"
 tanzimat_military_modernization_reason:0 "The traditional [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] of [ROOT.GetCountry.GetAdjectiveNoFlag]—the #O Janissary Army#!—has declined in military prestige, and was abolished by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Mahmud II#! in the #v Auspicious Incident of 1826#!, being replaced by the present #O Mansure Army#!. Yet in the face of the military threat posed by the [concept_great_power]s of 欧洲, this force remains wholly inadequate to defend our sovereignty.\n\nWe must build an army founded upon discipline and drill, hire excellent #v $officers$#! from 欧洲, and train new recruits according to European drill and tactics. We must also establish specialised institutions for the study of #O military#! [concept_technology] and #o tactics#!, and create #B unified command, logistics, and staff departments#!—there can be no doubt that this shall be #V a difficult long-term task#!."
 tanzimat_reform_education:0 "Tanzimat: Secularisation of Education"
 tanzimat_reform_education_reason:0 "In [ROOT.GetCountry.GetName], only a very small number of people possess #v basic literacy#!: if our reforms are to proceed, then #b a thorough reconstruction of the public life of the [ROOT.GetCountry.GetAdjectiveNoFlag] people#! is necessary.\n\nWe must #b standardise and modernise the educational system of the Empire#!, establish our own #v state schools#!, encourage our citizens to attend them, and spread #yellow elementary education#! among children and youths. We must also found #yellow institutions of higher learning#! of our own, cultivating our own [ROOT.GetCountry.GetAdjectiveNoFlag] scholarly and theological #v $academics$#!."
 tanzimat_reform_education_goal:0 "Increase our [concept_literacy] by 20%"
 tanzimat_economic_modernization:0 "Tanzimat: Urbanisation"
 tanzimat_economic_modernization_reason:0 "In this age, #V industry and towns#! are the source of the strength and prosperity of a [concept_country]. Yet while the countries of 欧洲 advance rapidly with industrialisation, [ROOT.GetCountry.GetName] remains hampered by many institutional and structural factors that prevent it from matching their pace.\n\n[ROOT.GetCountry.GetName] must unify its #B tariffs and commercial law#!, introduce European-style [concept_company] #O institutions#! and #O economic regulation#!, #B legislate to protect private property#!, encourage #B new investors#!, ensure that local handicrafts and producers receive #V sufficient protection#!, promote the prosperity of the [ROOT.GetCountry.GetAdjectiveNoFlag] #V [concept_market]#!, solve our economic backwardness, and #B set us upon the road to industrialisation#!."
 tanzimat_economic_modernization_state_tt:0 "Is an [concept_incorporated_state]"
 tanzimat_build_railways:0 "Tanzimat: Lay Down the Railways"
 tanzimat_build_railways_reason:0 "The dominions of [ROOT.GetCountry.GetName] are vast, and its geography #B complex and varied#!, creating #V immense difficulties#! for governance and communication alike. In many remote [concept_state_region]s of [ROOT.GetCountry.GetAdjectiveNoFlag], the commands of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] cannot effectively be transmitted or enforced, hindered as they are by #B great distances and mountain barriers#!.\n\nYet the invention of #O railways#! [concept_technology] offers us a new opportunity: if we can lay functioning #O railways#! throughout the Empire, then #B neither #V administrative governance#! nor #V military deployment#! shall any longer present an insuperable problem#!."
 failed_sick_man_main_tt:0 "Failed to complete the #V Tanzimat Reforms#! or the #V Tanzimat: Centralisation#! [concept_journal_entry]"

 ottoman_imperial_arsenal:0 "The Imperial Arsenal of Galata"
 ottoman_imperial_arsenal_reason:0 "The #yellow Imperial Arsenal#! situated at #O Galata and Tophane#! was built by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #B #G Mehmed the Conqueror#!#!, and for many years was used for the casting of artillery. It was here that the artillery technology of [ROOT.GetCountry.GetName] first developed, rendering immense service to the rise of [ROOT.GetCountry.GetAdjectiveNoFlag]. Enlarged by successive [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]s, its productive capacity steadily expanded, and it long retained its place as the Empire’s #B most important military-industrial institution#!.\n\nYet since the #V seventeenth century#!, in the face of the challenge posed by the #O artillery#! of 欧洲, the #O military#! [concept_technology] of [ROOT.GetCountry.GetName] has begun to stagnate. This in turn brought about the decline of the #yellow Imperial Arsenal#!. Much of its equipment is old and inefficient, and domestic supply now faces considerable difficulty in meeting [ROOT.GetCountry.GetName]’s military needs, to the point that many #V vital military materials must be imported#!.\n\nIf we wish to restore the glory of the #G Imperial Army#!, the most important task before us is to revive the #B technical superiority and craftsmanship#! we once possessed—and that revival must begin with the restoration of this ancient #yellow Imperial Arsenal#!."
 ottoman_imperial_arsenal_usa_reform_button:0 "Hire American Naval Engineers"
 ottoman_imperial_arsenal_usa_reform_button_desc:0 "Shipbuilding experts from the New World have brought ideas never before seen—ironcladding, screw propellers, and steam engines—and these have commanded the respect of the officers of the Imperial Navy. If Tophane and the Imperial Dockyards can obtain their assistance, the shipyards of the Golden Horn may recover the output they once possessed."
 ottoman_imperial_arsenal_fra_reform_button:0 "Hire French Artillery Engineers"
 ottoman_imperial_arsenal_fra_reform_button_desc:0 "The artillery schools and arsenals of France have long been regarded as the model of military industry in 欧洲. We have also concluded many co-operative ventures with France in the past. With French support, our artillery production industry will be able to catch up with Western standards."
 ottoman_imperial_arsenal_gbr_reform_button:0 "Hire British Mechanical Engineers"
 ottoman_imperial_arsenal_gbr_reform_button_desc:0 "Our machine tools and foundry lathes are hopelessly antiquated, and the old administrative system can no longer sustain the continued expansion of the Imperial Arsenal. By introducing British standards, methods of management, and mechanical techniques, Galata shall be reborn."

 muhtar_system:0 "The Muhtar System"
 muhtar_system_reason:0 "#V Muhtar#!, meaning #B “the chosen man”#!, was a local administrative system established by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Mahmud II#! after abolishing the #I Timar fief system#! and the #I Derebey order#!. It signified the #V local headmen#! elected by the most basic #G village#!-level administrative units of [ROOT.GetCountry.GetName].\n\nBefore this system was introduced, the Porte relied for local administration upon the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] and [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] of each locality, greatly reducing the efficiency of [concept_government] taxation and conscription. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Mahmud II#! bestowed the status of imperial officials upon these local elders chosen by the people themselves, thus helping the Porte shake off its dependence upon the #v $aristocrats$#! and #v $clergymen$#!.\n\nYet as a newly created institution, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_1_effect_tt $muhtar_system_old_modifier$#! remains fragile, and often fails to operate with the strength that [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] expects of it. If we can strengthen the economic influence of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] over its [concept_state]s, then #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_2_effect_tt $muhtar_system_new_modifier$#! may well come to play a much greater role within the administrative system of [ROOT.GetCountry.GetName]."
 muhtar_system_status:0 "#B Locally elected Muhtars govern the villages of the Empire’s provinces#!"
 muhtar_system_on_complete_tt:0 "All local village election and self-government systems in #O provinces#! possessing #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_1_effect_tt $muhtar_system_old_modifier$#! shall be formally recognised in law, establishing #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_2_effect_tt $muhtar_system_new_modifier$#!."
 muhtar_system_modifier_1_effect_tt:0 "[GetStaticModifier('muhtar_system_old_modifier').GetName|v]\n[GetStaticModifier('muhtar_system_old_modifier').GetDesc]"
 muhtar_system_modifier_2_effect_tt:0 "[GetStaticModifier('muhtar_system_new_modifier').GetName|v]\n[GetStaticModifier('muhtar_system_new_modifier').GetDesc]"

 baghdad_railway:0 "The Baghdad Railway"
 baghdad_railway_reason:0 "The dominions of [ROOT.GetCountry.GetName] stretch across the Middle East, yet have always been hampered by #B great distances and rugged terrain#!. This is particularly true between #yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! and #yellow Iraq#!, which are separated by the #B Anatolian Plateau and the Syrian Desert#!. Orders from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] often require weeks or even months to arrive. Transport between the two still depends upon #B ancient posting stations and camels#!, weakening our administrative efficiency and making it ever harder for the Porte to control the region militarily.\n\nYet with the modernising reforms brought by the #yellow Tanzimat#!, our rising #v $capitalists$#! and #v $engineers$#! have advanced a grand design: to lay a #B steel trunk line#! from #V [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! to #V Baghdad#! and thence to the #V Persian Gulf#!. Many officials of the Porte are convinced that this railway will undoubtedly bring #G growth in trade#! and #G industrial renewal#!, while enabling [ROOT.GetCountry.GetName] to move its armies more swiftly to the distant provinces of [GetStrategicRegion('region_arabia').GetName], thereby checking #R separatism and local unrest#!."
 baghdad_railway_status:0 "Establish a railway linking the Persian Gulf with the Mediterranean"
 hejaz_railway:0 "The Holy Railway"
 hejaz_railway_reason:0 "As #G Guardian of the Two Holy Sanctuaries#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] rules not only over the broad lands of [GetStrategicRegion('region_arabia').GetName], but also bears the charge of protecting the two #yellow Holy Cities#! of #V Mecca#! and #V Medina#!. Yet the distance between #yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! and the #yellow Holy Cities#! is immense, and pilgrims and officials alike often require months to travel between them, while along the way they are constantly threatened by #R tribal raids#!.\n\nWith the reorganisation of the imperial administration and the strengthening of our finances, many #v $bureaucrats$#! of the Porte and devout #v $clergymen$#! have proposed that a #B railway trunk line#! be laid from #V Damascus#! straight to #V Medina#!, so as to ensure that pilgrims may reach the Holy Cities safely, strengthen the #V direct governance#! of [ROOT.GetCountry.GetName] over the lands of [GetStrategicRegion('region_arabia').GetName], reinforce the standing of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] as the #V rightful Caliph of the Islamic world#!, and secure the Empire’s southern frontier."
 hejaz_railway_status:0 "Construct a railway linking Mecca and Medina with Jerusalem"
 hejaz_railway_1_button:0 "Seek Donations from the Islamic World"
 hejaz_railway_1_button_desc:0 "The construction of the Holy Railway is not merely an internal affair of the Empire: this railway shall benefit every pious pilgrim. If the Islamic states still retain devotion to Allah and respect for the Caliph, then they ought to contribute to it."
 hejaz_railway_1_button_possible_tt:0 "No fundraising campaign has yet been launched for the Holy Railway"
 hejaz_railway_1_button_effect_tt:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] shall, in the name of the #G Caliph and Guardian of the Holy Cities#!, launch an appeal throughout the Islamic world for donations towards the construction of the Holy Railway."
 baghdad_railway_fail_tt:0 "An enemy [concept_front] has reached [SCOPE.sState('baghdad_railway_state').GetCityHubName]"
 hejaz_railway_fail_tt:0 "An enemy [concept_front] has reached [SCOPE.sState('hejaz_railway_state').GetCityHubName]"
 anatolia_industrialize:0 "Industrialise Anatolia"
 anatolia_industrialize_reason:0 "For a long time, the economic centre of [ROOT.GetCountry.GetName] has been concentrated in the #V coastal cities#! of the Mediterranean and in the #V Balkans#!, while the broad interior of #yellow Anatolia#! has remained trapped in an economic structure dominated by the #v $peasants$#!. The #B rugged mountain terrain#! and #B backward transport conditions#! have made it all the harder for the inland provinces to integrate into the imperial [concept_market], preventing resources from circulating efficiently and thereby weakening the potential of the [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_market].\n\nWe ought to advance #V urbanisation and industrialisation#! in the Anatolian interior, and, together with the expanding #B railway network#!, bring what has hitherto been dispersed local production into a unified [concept_market] system, transforming this traditional land of the [GetCulture('turkish').GetName] people into the #V inland core#! and true #V industrial base#! of [ROOT.GetCountry.GetName]’s modernisation."
 anatolia_industrialize_status:0 "The core regions of Anatolia must be industrialised"
 rumeli_industrialize:0 "Urbanise the Balkans"
 rumeli_industrialize_reason:0 "As the core European possession of [ROOT.GetCountry.GetName], Balkans has long been one of the Empire’s most prosperous regions, yet also its #B most restless frontier#!. Though Balkans possesses an ancient commercial tradition, its broad countryside still remains dominated by #v $peasants$#! living in [concept_subsistence_building]s, only loosely connected to the [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_market].\n\nWe must promote #V urban expansion and industrialisation#! in Balkans, encourage the growth of #V commerce and industry#! in its major cities, and gradually draw the rural population into the close [concept_market] #o network#! centred upon [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 rumeli_industrialize_status:0 "Develop the urban foundations of the Balkan provinces"
 egypt_industrialize:0 "Industrialise Egypt"
 egypt_industrialize_reason:0 "The #yellow Nile Delta#! has long been one of the most important agricultural and export centres of [ROOT.GetCountry.GetName], owing to its fertile lands and #V cotton cultivation#!. Yet the economic structure of the #yellow Nile Delta#! remains highly dependent upon raw-material production and external trade, with great [concept_wealth] flowing out into the [concept_world_market] in unprocessed form. As a result, no solid industrial system has yet taken root locally, weakening Egypt’s economic potential.\n\n[ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] holds that we ought to advance #V urban expansion and industrial construction#! in Egypt, developing textile, processing, and mechanical industries along the Nile so that raw materials may be #B produced and manufactured locally#!, strengthening Egypt’s integration into the [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_market], and ultimately transforming the #yellow Nile Delta#! into a #V rising industrial region#! supporting the modernisation of [ROOT.GetCountry.GetName]."
 egypt_industrialize_status:0 "Turn the Nile Delta into a new industrial region"
 mesopotamia_management:0 "Develop Mesopotamia"
 mesopotamia_management_reason:0 "The land between the #yellow Euphrates#! and the #yellow Tigris#! was once hailed as the #G cradle of civilisation#!, yet now lies in decline: the floods of the two rivers alternately ravage it, and in summer, when the waters recede, vast stretches of #V saline land#! are left behind, so that what was once fertile and densely peopled country has gradually #B turned into marsh and wasteland#!.\n\nMany [Concept('concept_ruler','$RULER_TITLE_KING_TOOLTIP$')]s who once ruled #O Mesopotamia#! attempted to govern this land, yet none succeeded in establishing a #B durable and systematic hydraulic regime#!. But #V technological progress and modernisation#! now present an unprecedented opportunity. The [ROOT.GetCountry.GetAdjectiveNoFlag] #v $engineers$#! believe that, with #V new materials and building methods#!, together with #V sufficient labour and capital#!, we shall be able to undertake a complete programme of #G river regulation, dyke reinforcement, drainage, and irrigation#!, restoring the neglected [concept_arable_land] bit by bit, so that #O Mesopotamia#! may once again become a stable and reliable #I agricultural centre#! of [ROOT.GetCountry.GetName], and a #V powerful guarantee of local and national [concept_food_security]#!."
 mesopotamia_management_possible_tt:0 "At least 5 #V Tanzimat#! [concept_journal_entry]s have already been completed"
 mesopotamia_management_complete_tt:0 " Completed the development works in Mesopotamia.\n#bold •This undertaking is expected to add a total of 2400 [concept_arable_land] across our 4 [concept_state_region]s in Mesopotamia.#!"
 mesopotamia_management_status:0 "The development works shall continually add new [concept_arable_land] to Mesopotamia; if we have researched the Steam Turbine, the work shall proceed more efficiently."
 mesopotamia_management_start_button:0 "Begin the Works of Development"
 mesopotamia_management_start_button_desc:0 "The government now possesses sufficient funds to begin the great task of developing Mesopotamia. Let us approve the appropriation and begin transforming the saline lands and deserts of Mesopotamia into farmland!"
 mesopotamia_management_start_button_possible_tt:0 "The works of development are not yet complete (progress bar below 300)"
 istanbul_industrialize:0 "Revive Konstantiniyye"
 istanbul_industrialize_reason:0 "#B #italic “If the world were but a single state, Constantinople would surely be its capital.”#!#!\n\nSince the conquest of #yellow Constantinople#! by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #G Mehmed the Conqueror#!, #G Konstantiniyye#! has stood as the [concept_capital_state] of [ROOT.GetCountry.GetName] and the great entrepôt of trade between Europe and Asia. Yet with the growth of #B population and industry#!, the #B narrow streets, crowded quays, and outdated civic facilities#!, together with the #B walls and old quarters#! that hinder the city’s outward expansion, have rendered #G Konstantiniyye#! unable to fulfil the demands of a #V foremost capital#! worthy of [ROOT.GetCountry.GetName].\n\nWe must undertake a comprehensive rebuilding and expansion of #G Konstantiniyye#!: we shall enlarge the #V harbour and dock facilities#!, plan modern #V industrial districts and drainage systems#!, build #V railways and efficient urban quarters#!, and reshape the face of the city with #V broad boulevards and orderly public squares#!, so that #G Konstantiniyye#! may once more become that #B pearl of the Mediterranean, Queen of Cities, and the most renowned and desired great metropolis in 欧洲#!."
 istanbul_industrialize_status:0 "Restore Konstantiniyye to its place as the city desired by the world"

 ottoman_conqueror_greek:0 "Recover Greece"
 ottoman_conqueror_greek_reason:0 "The [GetCulture('greek').GetName] revolt of #V 1827#! succeeded only through the military intervention of [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('FRA_scope').GetName], and [SCOPE.sCountry('RUS_scope').GetName], compelling us in the #V Protocol of London of 1830#! to recognise the independence of [SCOPE.sCountry('GRE_scope').GetName], thereby depriving [ROOT.GetCountry.GetName] of the #O Peloponnese and Southern Greece#!, which it had ruled for centuries.\n\nIf [ROOT.GetCountry.GetName] wishes to restore its prestige in Balkans and 欧洲, the traitors of [SCOPE.sCountry('GRE_scope').GetName] must be destroyed: only the sword of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] can teach the [GetCulture('greek').GetName]s their proper station!"
 ottoman_conqueror_greek_fail_tt:0 "Failed to complete the #V Tanzimat Reforms#! or the #V Tanzimat: Centralisation#! [concept_journal_entry]"
 ottoman_conqueror_greek_on_complete_1_tt:0 "All #yellow Greek provinces#! shall once more become [concept_incorporated_state]s.\nIf the #yellow Ionian Islands#! are controlled by a foreign power, we shall negotiate with its controller for their return to our country."
 ottoman_conqueror_greek_on_complete_2_tt:0 "The destruction of #yellow Greece#! shall for a time greatly intimidate other #O separatists#!."
 ottoman_conqueror_syria:0 "Recover Syria"
 ottoman_conqueror_syria_reason:0 "The Egyptian revolt of 1832, led by the traitorous [Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')] [SCOPE.sCharacter('EGY_leader').GetFirstName] of [SCOPE.sCountry('EGY_scope').GetName], once seized the city of #yellow Konya#!, almost within sight of the imperial capital [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], and stripped His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of the Empire’s lawful sovereignty over Syria.\n\nThe Porte can no longer stand idle while the tyrant of [SCOPE.sCountry('EGY_scope').GetName] continues to rule our sacred lands: by whatever means are necessary, Syria must be restored to the bosom of [ROOT.GetCountry.GetName]!"
 ottoman_conqueror_syria_status:0 "Recover #O Syria#!, stolen by [SCOPE.sCountry('EGY_scope').GetName] in 1833"
 ottoman_conqueror_syria_1_button:0 "Request Intervention from the [concept_great_power]s of 欧洲"
 ottoman_conqueror_syria_1_button_desc:0 "Syria is the lawful territory of the Empire, and the occupation of it by the [Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')] of [SCOPE.sCountry('EGY_scope').GetName] is wholly illegitimate. Among the [concept_great_power]s of 欧洲, there are no shortage of men inclined to support our cause. By sending diplomatic notes to their governments, we stand a strong chance of securing their intervention in this war."
 ottoman_conqueror_syria_1_button_possible_tt:0 "No diplomatic note has yet been sent to the [concept_great_power]s of 欧洲"
 ottoman_conqueror_syria_1_button_effect_tt:0 "We shall send notes to all the [concept_great_power]s of 欧洲, requesting their support in our diplomatic struggle.\nThe better our relations with a given [concept_great_power] of 欧洲, or the worse Egypt’s relations with that power, the greater the chance that it will choose to support us."
 ottoman_conqueror_egypy:0 "Recover Egypt"
 ottoman_conqueror_egypy_reason:0 "The conquest of #yellow Egypt#! in #V 1517#! by His Majesty #G Selim the Grim#! transformed [ROOT.GetCountry.GetName] from an Anatolian and Balkan kingdom on the margins of the Islamic world into a vast empire, and won for it the sacred title of #I Guardian of the Two Holy Sanctuaries#!. Yet after the turmoil following #yellow Napoleon#!’s withdrawal from #yellow Egypt#! and the rebellion of Muhammad Ali after #V 1831#!, [SCOPE.sCountry('EGY_scope').GetName] has in practice achieved near-complete independence from imperial rule.\n\nNow that #yellow Syria#! has been recovered, we ought to turn our attention to this vital land commanding the #B granary of the Mediterranean and the Red Sea#!. As a lawful possession of [ROOT.GetCountry.GetName], we cannot allow the usurpers of [SCOPE.sCountry('EGY_scope').GetName] to continue ruling there: only by #B force of arms#! can #yellow Egypt#! be made once more to submit at the feet of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and the sovereignty of the Empire thereby be vindicated."

 ottoman_conquest:0 "Ottoman Conquest"
 ottoman_conquest_reason:0 "#white #B #italic “My friends, my imperial subjects! You all know well that our forefathers established the Empire we now possess only through countless arduous struggles and immense dangers. Some among you who are older took part in many of their feats with your own hands—while those of you who are younger have heard of these deeds from your fathers, and such things shall never be forgotten by time: yet the tale of one who has seen with his own eyes surpasses mere hearsay of the epics of the past.”#!#!#!\n\nThe #B old splendour#! of [ROOT.GetCountry.GetName] was not bestowed upon us out of thin air, nor gained through papers and diplomacy: it consisted of lands #V conquered by the swords of the Empire’s forefathers#!. From the #yellow Danube#! winding through #B Pannonia#!, to the #yellow Atlas Mountains#! along the #B rich North African coast#!, to the #B lush valleys#! beside the #yellow Nile in Egypt#!, and the #yellow Euphrates banks#! baked by the sun of #B Syria#!—[ROOT.GetCountry.GetName] once ruled almost half the dominions of the #O Roman Empire#!.\n\nBut the changes of time have been severe: the #R long decline#! that began in the #V seventeenth century#! stripped [ROOT.GetCountry.GetName] of many lands #B that were once ours by right#!, some in [concept_war], others at the #O negotiating table#!. Now the [concept_great_power]s of 欧洲 divide the world anew around us, and our name appears ever less often in their papers.\n\n#B If the Empire has been set in order, shall the Porte still continue to yield ground?#! The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] must remind the whole world that the most sublime [ROOT.GetCountry.GetName] still exists, and that the sword in her hand retains the power to #V decide the fate of 欧洲—and of the #O world#! itself!#!"
 ottoman_conquest_possible_tt:0 "Completed the #V Tanzimat Reforms#! [concept_journal_entry]"
 ottoman_conquest_complete_tt:0 "Completed 7 #V Great Conqueror#! [concept_journal_entry]s"
 ottoman_conquest_status:0 "#G Reconquer the lands that [ROOT.GetCountry.GetName] ruled in its glorious past#!"
 ottoman_conquest_north_africa:0 "Great Conqueror: Retake Barbary"
 ottoman_conquest_north_africa_reason:0 "The #yellow Barbary provinces#! long remained beneath the suzerainty of [ROOT.GetCountry.GetName], forming an important shield for the Empire in the Western Mediterranean. Yet with the military intervention of the other [concept_great_power]s of 欧洲, the #V conquest of [SCOPE.sCountry('FRA_scope').GetName] in 1830#!, and the rise of local autonomous forces, this region gradually slipped away from the control of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\n\nIf [ROOT.GetCountry.GetName] wishes to restore its strategic standing in the Mediterranean, the North African coast must be reintegrated: we ought to reassert our #B lawful suzerainty#! over Barbary, and thereby secure the free passage of imperial maritime trade."
 ottoman_conquest_morocco:0 "Great Conqueror: Liberate Morocco"
 ottoman_conquest_morocco_reason:0 "Though it once bowed to [ROOT.GetCountry.GetName], #yellow Morocco#! long remained in practice beyond the effective influence of the #B Porte#!. As the powers of 欧洲 penetrate ever more deeply, it is plain that #yellow Morocco#! can no longer defend its sovereignty by itself.\n\nOut of the sacred duty to defend the Islamic world, #yellow Morocco#! must not be allowed to fall wholly into foreign hands: it must accept the benevolent rule of [ROOT.GetCountry.GetName]."
 ottoman_conquest_hungary:0 "Great Conqueror: Conquer Hungary"
 ottoman_conquest_hungary_reason:0 "Since #V Suleiman the Magnificent#! conquered #B Hungary and Transylvania#!, the #yellow Pannonian Plain#! has stood as an important front of [ROOT.GetCountry.GetName] in 欧洲, and as the core zone of the Danubian system. Yet with the rise of [SCOPE.sCountry('AUS_scope').GetName], Hungary gradually passed from the Empire’s influence and became a bridgehead of the powers of 欧洲.\n\nLet us recreate the glorious feats of Suleiman the Magnificent, strike down the wicked [SCOPE.sCountry('AUS_scope').GetName] in a single blow, and reclaim Hungary from German rule for the Empire!"
 ottoman_conquest_transylvania:0 "Great Conqueror: Recover Transylvania"
 ottoman_conquest_transylvania_reason:0 "Since #V Suleiman the Magnificent#! conquered #B Hungary and Transylvania#!, #yellow Transylvania#! has stood as an important front of [ROOT.GetCountry.GetName] in 欧洲, and as a principal region of the Danubian system. Yet with the rise of [SCOPE.sCountry('AUS_scope').GetName], Transylvania gradually slipped from the Empire’s influence and became a bridgehead of the powers of 欧洲.\n\nIt is evident that if [ROOT.GetCountry.GetName] wishes to recover the leading hand in Balkan affairs, the strategic importance of this mountainous region cannot be ignored: we must recover this former vassal land that once lay under the authority of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 ottoman_conquest_persia:0 "Great Conqueror: Protect Crimea"
 ottoman_conquest_persia_reason:0 "The #yellow Crimean Khanate#! on the northern shore of the Black Sea long maintained close vassal relations with [ROOT.GetCountry.GetName]. Yet with the rise of [SCOPE.sCountry('RUS_scope').GetName] in Eastern Europe and the Empire’s crushing defeat in the #V Russo-Turkish War of 1768#!, this land was seized by the treacherous Tsars of the North and made into the base of their so-called Black Sea Fleet.\n\nThe revival and reconquest of the Empire demand that we avenge the humiliation of the #V Russo-Turkish Wars#!: the old treaties must be cast aside, and [ROOT.GetCountry.GetName] shall drive these despicable #yellow Slavs#! #B back to their East European plain!#!"
 ottoman_conquest_caucasus:0 "Great Conqueror: Pacify the Caucasus"
 ottoman_conquest_caucasus_reason:0 "The Caucasus is home to many nations—from the [GetCulture('georgian').GetName]s and [GetCulture('armenian').GetName]s to the [GetCulture('azerbaijani').GetName]s—but they share one thing in common: sheltered by the rugged mountains and protected by [SCOPE.sCountry('RUS_scope').GetName], they resist the influence of the Empire.\n\nIt is plain that the rule of [SCOPE.sCountry('RUS_scope').GetName] here is ill-suited to the region, and [ROOT.GetCountry.GetName] ought to make the peoples of the Caucasus bend the knee before the majesty of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 ottoman_conquest_southern_italy:0 "Great Conqueror: Conquer Italy"
 ottoman_conquest_southern_italy_reason:0 "#B #italic “The Empire encircled the Mediterranean... its conquerors called it ‘our sea’.”#!#!\n\nSince the distant days of Rome, the #yellow Italian Peninsula#! and its #yellow Mediterranean coasts#! have lain at the centre of 欧洲. At the height of [ROOT.GetCountry.GetName]’s splendour, the Ottoman fleet dominated most of the Mediterranean, and once pushed its spearhead as far as #V Otranto#!, achieving what no #I Muslim Empire#! had done since the #I Arab Empire#!: setting foot once more in Italy.\n\nThe ambitious [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] now plans to accomplish what even #yellow Mehmed the Conqueror#! did not complete, to make good the title of #O Roman Emperor#!, and just as #V Fatih conquered Constantinople#!, to bring #yellow Rome#!—and indeed all Italy—under the rule of [ROOT.GetCountry.GetName]. Needless to say, this shall be our #B greatest conquest of all!#!"

 ottoman_rebuild_syria:0 "Provincial Reform of Syria"
 ottoman_rebuild_syria_reason:0 "Though #yellow Syria#! has returned to the rule of [ROOT.GetCountry.GetName], the long domination of the [Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')] of #yellow Egypt#! there has left #B great confusion#! in its wake. Many of our administrative structures were broken apart, and the authority of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has been utterly weakened.\n\nYet this also affords us an excellent opportunity to reshape the administrative order of #yellow Syria#! anew: it may serve as the #B ideal proving ground#! for the #V new provincial structure#! envisaged by the leaders of [GetIdeology('ideology_tanzimatism').GetName]. If we can gain experience here in #V modern administrative governance#!, we shall be able to apply it more effectively across the whole of [ROOT.GetCountry.GetName]."
 ottoman_rebuild_syria_status:0 "Establish a firm provincial administrative structure in Syria"

 ottoman_constitutional_era:0 "The Constitutional Era"
 ottoman_constitutional_era_reason:0 "#U Parliamentary Influence#! will increase with the strength of the [GetIdeology('ideology_constitutionalist').GetName] faction and #U liberal [concept_law]s#! such as the right of assembly.\n#G Court Authority#! will increase with the strength of the [GetIdeology('ideology_reactionary').GetName] faction and #G autocratic [concept_law]s#! such as Autocracy.\n\nWith the support of [GetIdeology('ideology_constitutionalist').GetName] #v $bureaucrats$#! and #v $officers$#!, the #G Young Ottomans#! are attempting to seize control of the #B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Sublime Porte#!#! through an armed coup, proclaim a #yellow democratic constitution#!, compel the [Concept('concept_ruler','$RULER_TITLE_PADISAH$')] to become a #yellow constitutional monarch#!, and establish responsible government in [ROOT.GetCountry.GetAdjectiveNoFlag].\n\nThe #U #B tide of constitutionalism#!#! is rapidly spreading from the capital throughout [ROOT.GetCountry.GetName]: decades of #V Tanzimat#! reform have paved the way for this moment, while #B modern schools, railways, and telegraphs#! carry ideas faster than ever before. #O Newspapers and printed pamphlets#! have taken political debate beyond the palace and into the streets of the cities. Even many #v $aristocrats$#! families have begun to believe that #U parliament and written law#! may secure the Empire’s future and win the respect of the world.\n\nFor the #V Imperial Government#!, both in domestic affairs and diplomacy, this is a #B profoundly turbulent era#!: fierce #V struggles for power#! and rapid #V changes of authority#! now dominate the politics of [ROOT.GetCountry.GetName]. Will the #U ideals of constitutional rule#! prevail, or will #G courtly autocracy#! return once more to [ROOT.GetCountry.GetName]—or perhaps... something #B wholly unforeseen#! shall emerge?"
 ottoman_constitutional_era_possible_tt:0 "Failed or timed out in the #V Tanzimat Reforms#! [concept_journal_entry]"
 sublime_porte_absolutism_victory_tt:0 "Failed in the #V Constitutional Era#! [concept_journal_entry]"
