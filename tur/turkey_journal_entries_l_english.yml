 armenian_massacre_issue:0 "The Bloody Years"
 armenian_massacre_issue_reason:0 "The [GetCulture('armenian').GetName]s living throughout [ROOT.GetCountry.GetName] have long suffered the hostility of the [GetCulture('turkish').GetName]s; and following the recent [GetCulture('armenian').GetName] disturbances, this feeling is now growing ever more intense amid the #B mounting tensions within the Empire#!.\n\nNor is this enmity confined merely to the people at large. Within the #V Imperial Government#! itself, a group of senior officials led by Pasha [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.GetFirstName] #yellow are stirring up anti-Armenian sentiment#! and attempting to gather troops, while urging other members of the #G #L Porte#!#! to bring about a #V genocide on a vast scale#!. Unless we #B act in time#!, such an outcome is all but #B certain to occur#!."
 armenian_massacre_issue_on_complete_tt:0 "We shall proclaim an edict absolutely forbidding all acts of extermination and discrimination against the [GetCulture('armenian').GetName]s."
 armenian_massacre_issue_on_fail_tt:0 "The Porte shall adopt decisive measures to #R exterminate#! the [GetCulture('armenian').GetName]s of the Empire as far as possible."
