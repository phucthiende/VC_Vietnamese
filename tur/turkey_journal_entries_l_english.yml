 ottoman_autocratic_rule:0 "The Enlightened Autocracy of [ROOT.GetCountry.GetRuler.GetFirstName]"
 ottoman_autocratic_rule_reason:0 "Since the suspension of the constitution, the autocratic court led by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has regained control over the power of [ROOT.GetCountry.GetName]. Adhering to the principles of #yellow Islamism#! and [GetLawType('law_autocracy').GetName], [ROOT.GetCountry.GetRuler.GetFirstName] pursues a programme of rule intended, through #V benevolent despotism#!, to weaken the authority of the #B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Imperial Government#!#!, consolidate the rule of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], uphold the authority of #I Islam#! and the #O Caliphate#!, suppress separatism, and continue the #B centralisation and modernisation#! of [ROOT.GetCountry.GetName].\n\nThe #V Enlightened Autocratic Agenda#! of [SCOPE.sCharacter('autocratic_ruler').GetFullName]:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_1_checkbox')]Has the [GetLawType('law_autocracy').GetName] and [GetLawType('law_outlawed_dissent').GetName] [concept_law]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_2_checkbox')]Has the [GetLawType('law_appointed_bureaucrats').GetName] and [GetLawType('law_secret_police').GetName] [concept_law]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_3_checkbox')]All #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#! [Concept('concept_political_movement','$concept_political_movements$')] have [concept_political_movement_support] #B no higher than 5%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_4_checkbox')]All #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#! [Concept('concept_political_movement','$concept_political_movements$')] have [concept_activism] #B no higher than 25%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_5_checkbox')]Completed the #V Baghdad Railway#! and #V Holy Railway#! [concept_journal_entry]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_6_checkbox')]Completed the #V Revival of Konstantiniyye#!, #V Industrialise Anatolia#!, and #V Urbanise Rumelia#! [concept_journal_entry]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_8_checkbox')][concept_rank] is at least [concept_great_power]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_9_checkbox')]#B GDP#! is at least 300M\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_10_checkbox')]Owns all [concept_homeland]s of the #yellow Turkish#! and #yellow Mashriqi#! [concept_culture]s (#yellow Arabistan#! and #yellow Kars#! excepted), and has not recently been defeated in [concept_war]"
