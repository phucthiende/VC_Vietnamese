 caliph_and_ummah:0 "The Caliph and the Ummah"
 caliph_and_ummah_reason:0 "The tide of #V nationalism#! is #R tearing our state apart#!: [ROOT.GetCountry.GetName] must find a bond deeper than blood and language—and, peace be upon him, there is nothing more dependable than our shared #G Islamic faith#!.\n\nThe [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is not merely the ruler of [ROOT.GetCountry.GetName], but also #B the Shadow of God on Earth and the [Concept('concept_ruler','$RULER_TITLE_CALIPH$')] of the Islamic world#!. This office does not end at the borders of [ROOT.GetCountry.GetName], but extends across the whole #G Ummah#!—wherever in the world men profess [GetReligion('sunni').GetName] #G Islam#!, they acknowledge the supreme authority of the [Concept('concept_ruler','$RULER_TITLE_CALIPH$')].\n\nWe must strengthen #yellow religious education#!, support the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], restore the sacred #yellow Sharia#! to its place in public life, and in the end overcome the so-called #O poison of modernity#! and the #O threat of the [concept_great_power]s of 欧洲#!, rebuilding a #b political community founded upon faith#!."
 caliph_and_ummah_complete_tt:0 "Maintain the [GetLawType('law_state_religion').GetName] and [GetLawType('law_autocracy').GetName] [concept_law]s for 5 years"
 caliph_and_ummah_possible:0 "The #I Ottoman Caliphate#! has already failed in the #V United Realm#! [concept_journal_entry]"
 caliph_and_ummah_complete_1_tt:0 "Failed or timed out in the #V Bloody Years#! [concept_journal_entry]"
 caliph_and_ummah_status:0 "Unite the Islamic world beneath the banner of [ROOT.GetCountry.GetName]"
 caliph_and_ummah_filter_tt:0 "Meets one of the following conditions:\n•[concept_strategic_region] is Anatolia\n•[concept_strategic_region] is Arabia\n•[concept_strategic_region] is the Nile\n•[concept_strategic_region] is Persia"
 event_tur_65_a_tt:0 "The first title of our [concept_ruler] will change to [Concept('concept_ruler','$RULER_TITLE_CALIPH$')], while the [concept_heir] will change to [Concept('concept_ruler','$RULER_TITLE_SHARIF$')].\nWe shall send invitations to a World Islamic Congress to all [GetReligion('sunni').GetName] countries in the world; those agreeing to attend will become members of our power bloc, and countries with better relations may swear loyalty to us and thus become subjects."
 rebuild_muslism_slavery:0 "Revive the Islamic Slave Trade"
 rebuild_muslism_slavery_reason:0 "The weakness of [ROOT.GetCountry.GetName] stems in essence from our abandonment of the #B sacred order followed by our forefathers#!: the world is a garden, watered by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], that is, by authority; what guards that authority is the Islamic Law, which is likewise the policy that sustains the state—and [GetLawType('law_slave_trade').GetName] is a #V sacred institution recognised by the Sacred Law#!.\n\nIn the past, under pressure from the [concept_great_power]s of 欧洲, we abolished [GetLawType('law_slave_trade').GetName], and in so doing violated the sacred [concept_law], thereby #B losing the favour of Allah#!: [ROOT.GetCountry.GetName] ought to restore this #V ancient and orthodox [concept_law]#!, so that the Empire may #B once more enjoy the protection of Allah#!."
 rebuild_muslism_slavery_complete_tt:0 "Maintain the [GetLawType('law_slave_trade').GetName] or [GetLawType('law_debt_slavery').GetName] for at least 1 year."
 event_tur_69_a_tt:0 "We shall be required to restore [GetLawType('law_debt_slavery').GetName] within 5 years."
 event_tur_69_b_tt:0 "We shall be required to restore [GetLawType('law_slave_trade').GetName] within 5 years."
 caliph_and_ummah_fail_var_tt:0 "Failed, timed out, or became invalid in the #V Caliph and the Ummah#! [concept_journal_entry]"
 rebuild_janissary:0 "Rebuild the Janissaries"
 rebuild_janissary_reason:0 "Ever since the #G Janissaries#! were abolished in #v 1826#! by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Mahmud II#!, the #yellow military system#! of [ROOT.GetCountry.GetName] has steadily drawn closer to the model of 欧洲. Yet the so-called “professionalism” of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] has done nothing to solve the problem of #b military interference in politics#!; rather, it has bred a class of #v $officers$#! who imagine themselves to be the pioneers of reform. Corrupted by the #V wicked ideas of the West#!, these traitors are no longer loyal to #B His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], appointed by Allah#!, but instead presume to lecture the Empire upon its sacred order.\n\nThere can be no doubt that the decision to #V abolish the Janissaries#! was a mistake from the first: we must correct that error, and restore the great #G Janissary Corps#! to [ROOT.GetCountry.GetName]."
 rebuild_janissary_complete_tt:0 "Maintain [GetLawType('law_peasant_levies').GetName] for at least 1 year."

 the_unruly_arabs:0 "The Unruly Arabs"
 the_unruly_arabs_reason:0 "Across the whole #yellow Peninsula#! of [GetStrategicRegion('region_arabia').GetName], the balance once maintained through tribal structures and religious authority is now being shaken by ideas of #L #R nationalism#!#!. With the spread of the #O Arabic#! language, literature, and foreign ideologies, ideas opposed to [GetCulture('turkish').GetName] rule are quietly taking shape in the deserts ruled by [SCOPE.sCountry('TUR_scope').GetName].\n\nThe [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], educated overseas in Western learning, together with the local [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], who bitterly resent Ottoman rule, are joining hands—with the aid of other #O foreign [concept_great_power]s#! likewise hostile to [SCOPE.sCountry('TUR_scope').GetName]—to incite the [GetCulture('bedouin').GetName] people to overthrow by force the rule of the [GetCulture('turkish').GetName] regime in [GetStrategicRegion('region_arabia').GetName]:\n\nThough matters have not yet passed wholly beyond the control of the #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Porte#!, the underlying #B separatist tendency and diplomatic crisis#! can no longer be ignored. This land, long held beneath the imperial order, now faces a #V restlessness without precedent#!. What course shall the future of the desert take?\n\n@information! While #V $the_unruly_arabs$#! is active, the countries of [GetStrategicRegion('region_arabia').GetName] will take steps to resist the rule of [SCOPE.sCountry('TUR_scope').GetName], will be more likely to demand independence, and will seek the support of other [concept_great_power]s."
