 event_tur_46_e_tt:0 "The current leader of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] shall resign, and a successor will be selected at random."
 event_tur_49_a_tt:0 "The current Grand Vizier, [SCOPE.sCharacter('progress_pasha_scope').GetFullName], shall resign, and the Porte will appoint a new Grand Vizier chosen at random from among the following ideologies:\n•[GetIdeology('ideology_modernizer_leader').GetName]\n•[GetIdeology('ideology_reformer').GetName]\n•[GetIdeology('ideology_authoritarian').GetName]\n•[GetIdeology('ideology_humanitarian_royalist').GetName]\n•[GetIdeology('ideology_positivist').GetName]\n•[GetIdeology('ideology_corporatist_leader').GetName]"
 event_tur_49_b_tt:0 "The current Grand Vizier, [SCOPE.sCharacter('progress_pasha_scope').GetFullName], shall resign."
