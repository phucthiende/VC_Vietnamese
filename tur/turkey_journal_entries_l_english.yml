 tur_sublime_porte_1_button:0 "Convene the Porte Council"
 tur_sublime_porte_1_button_desc:0 "The council of the Sublime Porte is an excellent arena in which the Padishah may exert his influence over the Porte and govern the Empire. The Padishah ought to summon the officials of the Porte to Topkapı Palace and hear their counsel."
 tur_sublime_porte_1_button_effect_tt:0 "The Padishah shall convene the Porte Council and determine the chief direction of policy for the coming years.\nDepending on the focus chosen at the council, [concept_sublime_court_dissatisfaction] may rise, but [concept_sublime_porte_authority] shall also increase."
 tur_sublime_porte_2_button:0 "Dismiss the Grand Vizier"
 tur_sublime_porte_2_button_desc:0 "Though the Grand Vizier is the Empire’s chief minister, the Padishah alone possesses the supreme right to appoint and dismiss him. If the present Grand Vizier is judged by the Padishah to be unfit, then the outcome is surely obvious..."
 tur_sublime_porte_2_button_effect_tt:0 "The Padishah shall issue a decree dismissing the current Grand Vizier and selecting a successor more suited to present needs.\nDepending on the new Grand Vizier chosen, [concept_sublime_porte_authority] may increase."
 tur_sublime_porte_3_button:0 "Designate a New Heir"
 tur_sublime_porte_3_button_desc:0 "As master of the Ottoman harem, the Padishah naturally possesses many worthy heirs, and some among them have shown true promise as rulers. Let us at least determine, in name, who the next Padishah shall be."
 tur_sublime_porte_3_button_effect_tt:0 "The Padishah shall summon all his subjects and designate a new prince as our heir."
 tur_sublime_porte_3_button_possible_tt:0 "The heir does not have the [GetCharacterTrait('special_prince_governor').GetName] [concept_character_trait]"
 tur_sublime_porte_4_button:0 "Appoint the Sword-Bearing Pasha"
 tur_sublime_porte_4_button_desc:0 "The Sword-Bearing Pasha is the supreme commander of the imperial army, and the right to appoint or dismiss him naturally belongs to His Majesty the Padishah. The Padishah requires a loyal and dependable pasha: the present one seems not to meet that standard."
 tur_sublime_porte_4_button_effect_tt:0 "The Padishah shall dismiss the current Sword-Bearing Pasha of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] and seek a new man to replace him.\nDepending on the new Pasha chosen, [concept_sublime_court_dissatisfaction] may decrease."
 tur_sublime_porte_5_button:0 "Call for Jihad"
 tur_sublime_porte_5_button_desc:0 "The Empire is the unquestioned leader of the Islamic world, and His Majesty the Padishah is the rightful Caliph of all Islam. As ghazi warriors, no Muslim may escape the sacred duty of fighting the infidel: let us call upon the states of the Islamic world to join this great jihad!"
 tur_sublime_porte_5_button_effect_tt:0 "The Padishah, in his capacity as Caliph, shall issue a proclamation of jihad to the whole Islamic world, mobilising all Muslims to wage war against the infidel enemy."
 tur_sublime_porte_6_button:0 "Issue Courtly Rewards"
 tur_sublime_porte_6_button_desc:0 "The shadow of rebellion is spreading through the Porte: the Padishah ought to take measures, at the very least to draw over or secure the loyalty of certain of his servants."
 tur_sublime_porte_6_button_effect_tt:0 "The Padishah shall choose an interest group and bestow wealth and noble honours upon its leading figures.\nThis shall help reduce [concept_sublime_court_dissatisfaction]."
