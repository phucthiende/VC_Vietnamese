 the_unruly_arabs_tur_victory_tt:0 "#O Arab#! nationalist movements shall come to an end.\nThe #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_unruly_arabs_modifier_effects_tt $arabic_nations_wakeup_modifier$#! modifier shall be removed from all #B [GetStrategicRegion('region_arabia').GetName] nationalist movements#! in the #yellow Ottoman Empire#!."
 the_unruly_arabs_tur_start_tt:0 "The nationalists of [GetStrategicRegion('region_arabia').GetName] will begin trying to secure independence: they may pursue this aim through #B attacks on our territory#!, #B the publication of Arabic literature#!, or even #V winning foreign support#!.\nIf we fail to conciliate or suppress these restless people of [GetStrategicRegion('region_arabia').GetName] in time, they will sooner or later launch an #R armed revolution!#!"
 foreign_support_arab_enable_tt:0 "#O Arab#! nationalists will begin taking various actions beneath the rule of the #yellow Ottoman Empire#! in pursuit of independence.\nOur country will begin to support them, unlocking for us a series of concrete #B support measures#! in the #V Unruly Arabs#! [concept_journal_entry] to help these #O Arabs#! win their independence; we may also #B terminate this support#! at any time.\nIf our country ultimately chooses #yellow military intervention#!, then the [GetStrategicRegion('region_arabia').GetName] [concept_country]s that successfully #G gain independence may become our [concept_subject]s#!."
 foreign_support_arab_stay_tt:0 "#O Arab#! nationalists will begin taking various actions beneath the rule of the #yellow Ottoman Empire#! in pursuit of independence.\nOur country will begin to support the suppression efforts of the #yellow Ottoman Empire#!, unlocking for us a series of concrete #B support measures#! in the #V Unruly Arabs#! [concept_journal_entry] to help the #yellow Ottoman Empire#! maintain its rule in [GetStrategicRegion('region_arabia').GetName]; we may also #B terminate this support#! at any time.\nIf the #yellow Ottoman Empire#! successfully suppresses the independence movement, #V relations between our two countries will greatly improve#!—and we may even #G obtain [concept_trade_privilege], [concept_foreign_investment_rights], or even a [concept_treaty_port] from them#!."
 foreign_support_arab_rise_tt:0 "#O Arab#! nationalists will begin taking various actions beneath the rule of the #yellow Ottoman Empire#! in pursuit of independence.\nOur country will support this effort, and begin striving for independence from the rule of the #yellow Ottoman Empire#!, or aid our other #B Arab brethren in gaining independence#!.\nIf the rule of the #yellow Ottoman Empire#! in [GetStrategicRegion('region_arabia').GetName] ultimately collapses, we shall #V reap benefits#!, and may even #G unite some of those newly independent brother-states friendly to us into a stronger federation#!."
 foreign_support_arab_fall_tt:0 "#O Arab#! nationalists will begin taking various actions beneath the rule of the #yellow Ottoman Empire#! in pursuit of independence.\nOur country will oppose this effort, and support the #yellow Ottoman Empire#! in maintaining its rule over [GetStrategicRegion('region_arabia').GetName]. If the #yellow Ottoman Empire#! successfully suppresses the independence movement, #V relations between our two countries will greatly improve#!, and we shall receive from them the #G title of #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_arab_khedive_modifier_effects_tt $the_arab_khedive_modifier$#!#!."
 the_arab_khedive_modifier_effects_tt:0 "[GetStaticModifier('the_arab_khedive_modifier').GetName|v]\n[GetStaticModifier('the_arab_khedive_modifier').GetDesc]"
 foreign_support_arab_neutral_tt:0 "#O Arab#! nationalists will begin taking various actions beneath the rule of the #yellow Ottoman Empire#! in pursuit of independence.\nOur country shall remain #B neutral#! for a time, though we shall still have the opportunity to choose our side later."
 the_unruly_arabs_tur_victory_other_tt:0 "The #yellow Ottoman Empire#! has at last prevailed in this struggle with the Arabs! If our country was among those supporting the #yellow Ottoman Empire#!, we shall #G receive rewards#! from them according to the extent of our participation."
 the_unruly_arabs_arb_fail_tt:0 "Let us not linger amidst the drifting sands of a decaying past: though its charm in that instant was so beautiful."
 the_unruly_arabs_1_button:0 "Raise the Rank of Arab Aristocrats"
 the_unruly_arabs_1_button_desc:0 "Among tribes and urban elites alike, office and honour often work better than preaching. By carefully promoting notable Arab families within the provincial administration, the tax offices, and the judiciary, we may draw some of the most influential men away from the streets and the mosques and back into the offices and council chambers—at the very least making them more willing, in public, to “preserve order”."
 the_unruly_arabs_2_button:0 "Strengthen Centralised Rule in Arabia"
 the_unruly_arabs_2_button_desc:0 "When local councils, religious courts, and private tax networks each go their own way, the commands of any capital are no more than words on paper. By drawing key functions back into the hands of the #v $bureaucrats$#! system, the Porte will be able to strengthen its rule in the desert."
 the_unruly_arabs_2_button_allow_tt:0 "[concept_unruly_arabs_progress] is at least 100"
 the_unruly_arabs_3_button:0 "Suppress Arab Societies"
 the_unruly_arabs_3_button_desc:0 "If we allow private Arab societies and publishing networks to expand unchecked, they will sooner or later turn into organised political disorder. The Empire’s police force must organise itself to shut down and suppress their meeting places, and sever their financial connections."
 the_unruly_arabs_3_button_allow_tt:0 "[concept_unruly_arabs_progress] is at least 200"
 the_unruly_arabs_4_button:0 "Impose Military Rule in Arabia"
 the_unruly_arabs_4_button_desc:0 "Once matters enter the stage of open confrontation, the civil administration is plainly no longer sufficient to deal with these Arab agitators. We shall place the Arab cities, railway stations, passes, and water sources under the direct control of the army, and impose curfews and patrols to ensure that the organs of local rule are not threatened any further."
 the_unruly_arabs_4_button_allow_tt:0 "[concept_unruly_arabs_progress] is at least 300"
 the_unruly_arabs_5_button:0 "Promote Arabic Literature"
 the_unruly_arabs_5_button_desc:0 "The Arab nation is still an emerging idea: we ought to subsidise newspapers, schools, and presses, encouraging poetry, history, and political commentary to be written in #O Arabic#!, so that scattered local identities may be forged into the more unified whole of a “nation”."
 the_unruly_arabs_6_button:0 "Raid Ottoman Territory"
 the_unruly_arabs_6_button_desc:0 "What our great desert nation does best is wage guerrilla war in the desert! By raiding Ottoman border posts, supply lines, and outlying provinces, we can force these Turks to scatter their strength across a vast land, bringing continual destruction and disorder upon their soil."
 the_unruly_arabs_6_button_possible_tt:0 "No other [GetStrategicRegion('region_arabia').GetName] country has raided Ottoman territory within the last 3 months"
 the_unruly_arabs_7_button:0 "Open Communications with Foreign [concept_great_power]s"
 the_unruly_arabs_7_button_desc:0 "By our own strength alone, it will be difficult for us to secure a place on the international stage, still less to stand against the mighty Ottoman Empire—we must therefore establish secret contact, through informal channels, with foreign [concept_great_power]s, sound out their views and interests concerning the peninsula, and win from them as much aid and recognition as we can."
 the_unruly_arabs_7_button_possible_2_tt:0 "This country has not yet concluded any agreement with any Arab country"
 the_unruly_arabs_7_button_possible_tt:0 "Neither you nor any Arab country has communicated with a foreign [concept_great_power] in the last year"
 the_unruly_arabs_8_button:0 "Open Communications with the Arabs"
 the_unruly_arabs_8_button_desc:0 "The changing situation on the Arabian Peninsula is difficult to predict: yet for us, the time to place our wager may have come. We must discover whether these Arabs seek money, arms, advisers—or merely a pledge in writing."
 the_unruly_arabs_8_button_possible_1_tt:0 "Our country has not yet reached any agreement with any Arab country"
 the_unruly_arabs_8_button_possible_2_tt:0 "Is a country in the [GetStrategicRegion('region_arabia').GetName] region"
 accept_the_unruly_arabs_8_button_tt:0 "Has not yet agreed to accept our support"
 the_unruly_arabs_9_button:0 "Provide Military Support"
 the_unruly_arabs_9_button_desc:0 "These Arab ascetics and nomads have no real capacity to wage war against the Ottoman Empire. We shall provide arms, training, advisers, and logistical connections, and where necessary help them establish a more stable command structure."
 the_unruly_arabs_9_button_possible_tt:0 "This country has already communicated with us through #B correspondence#! and reached an agreement"
 the_unruly_arabs_10_button:0 "Recognise an Arab State"
 the_unruly_arabs_10_button_desc:0 "Recognition is not the same as intervention, but it makes the course of events harder to reverse. Let us issue a public declaration recognising the legitimacy and independence of the Arab state; for our effort to break the Turks, this is all gain at little cost."
 the_unruly_arabs_10_button_possible_1_tt:0 "Has not yet publicly recognised any Arab state"
 the_unruly_arabs_10_button_possible_2_tt:0 "Our country has at least communicated through #B correspondence#! with an Arab country and reached an agreement"
 great_power_unruly_arabs_10_tt:0 "No other [concept_great_power] has recognised an Arab state in the last 3 months"
 the_unruly_arabs_11_button:0 "Aid Our Arab Brethren"
 the_unruly_arabs_11_button_desc:0 "As Arab brethren sharing the same culture and faith, we must support our brothers in their great struggle against Turkish tyranny. Let us continue to channel support into the Arab subjects of the Ottomans, increasing their ability to conduct propaganda, mobilisation, and armed resistance."
 the_unruly_arabs_12_button:0 "Provide Military Assistance"
 the_unruly_arabs_12_button_desc:0 "Embarrassing though it may be, the military power of the Ottoman Empire is not to be looked at lightly. As allies, we should provide arms, training, advisers, and logistical assistance, and where necessary help them build a stronger command and military system."
 the_unruly_arabs_12_button_possible_tt:0 "Has not yet provided military aid to the Ottomans"
 the_unruly_arabs_13_button:0 "Support Ottoman Sovereignty"
 the_unruly_arabs_13_button_desc:0 "A diplomatic position must be written into diplomatic language. We shall send notes to the other powers, explicitly supporting Ottoman territorial sovereignty in the Arabian Peninsula: for our effort to crush the Arabs, it is an undertaking of all gain and little cost."
 the_unruly_arabs_14_button:0 "Suppress Arabism"
 the_unruly_arabs_14_button_desc:0 "We are subjects of the rightful Caliph of the Ottoman Empire, not of any so-called Arab national community! The local authorities must be ordered to suppress the relevant nationalist propaganda by censorship, proscription, and educational discipline, striking first at its organisers and its channels of dissemination."
 the_unruly_arabs_15_button:0 "Change Our Position"
 the_unruly_arabs_15_button_desc:0 "In a changing international situation, watching and waiting is itself a choice—and one that may be revised. We shall formally alter our diplomatic position: either from supporting the Ottomans to supporting the Arabs, or the reverse. A change of stance may carry a cost, but it may also save us from placing our stake upon the losing side."
 the_unruly_arabs_new_button:0 "Evacuate an Arab City"
 the_unruly_arabs_new_button_desc:0 "Arab resistance has already had a grave effect upon our rule in Arabia, and indeed upon the stability of the whole Empire, while international opinion against our repression continues to swell. It is now plain that continuing to pour resources into suppressing Arab cities and maintaining our rule there has become an unprofitable venture."
 the_unruly_arabs_new_button_effect_tt:0 "[concept_unruly_arabs_progress] will increase by 2 each month for 2 years"
 the_unruly_arabs_15_button_possible_tt:0 "Has not changed position within 1 year"
 the_unruly_arabs_15_button_ara_tt:0 "We shall abandon our support for the #yellow Ottomans#! and instead support the #yellow Arabs#!."
 the_unruly_arabs_15_button_tur_tt:0 "We shall abandon our support for the #yellow Arabs#! and instead support the #yellow Ottomans#!."
 the_unruly_arabs_15_button_set_tt:0 "We shall randomly declare one side as our position, and immediately allow one change of position."
 the_unruly_arabs_tur_act_timer_tt:0 "Has taken no other action within 1 year"
 the_unruly_arabs_ara_act_timer_tt:0 "Has taken no other action within 1 year"
 the_unruly_arabs_tur_act_benifit_1_tt:0 "[concept_unruly_arabs_progress] will decrease by 0.5 each month for 6 months"
 the_unruly_arabs_tur_act_benifit_2_tt:0 "[concept_unruly_arabs_progress] will decrease by 0.5 each month for 12 months"
 the_unruly_arabs_tur_act_benifit_3_tt:0 "[concept_unruly_arabs_progress] will decrease by 1 each month, and [concept_unruly_arabs_timer] will also decrease by 1 #V per year#!, for 5 years"
 the_unruly_arabs_ara_act_benifit_1_tt:0 "[concept_unruly_arabs_progress] will increase by 1 each month for 12 months"
 the_unruly_arabs_ara_act_benifit_2_tt:0 "[concept_unruly_arabs_progress] will increase by 1 each month for 6 months"
 the_unruly_arabs_ara_act_benifit_3_tooltip_tt:0 "Negotiation targets for this option will only appear once there are countries meeting the conditions.\nIf a [concept_great_power] agrees to our request, [concept_unruly_arabs_progress] will increase by 1 each month for 5 years"
 the_unruly_arabs_ara_act_benifit_3_tt:0 "[concept_unruly_arabs_progress] will increase by 1 each month for 5 years"
 the_unruly_arabs_ara_act_benifit_4_tooltip_tt:0 "Negotiation targets for this option will only appear once there are countries meeting the conditions.\nIf the Arabs reach an agreement with us, [concept_unruly_arabs_progress] will increase by 1 each month for 5 years"
 the_unruly_arabs_ara_act_benifit_4_tt:0 "[concept_unruly_arabs_progress] will increase by 1 each month for 5 years"
 the_unruly_arabs_ara_act_benifit_5_tt:0 "[concept_unruly_arabs_progress] will increase by 0.5 each month for 12 months"
 the_unruly_arabs_ara_act_benifit_6_tt:0 "[concept_unruly_arabs_progress] will decrease by 0.3 each month for 5 years"
 the_unruly_arabs_ara_act_benifit_8_tt:0 "[concept_unruly_arabs_progress] will increase by 1 each month for 3 months"
 the_unruly_arabs_ara_act_benifit_9_tt:0 "[concept_unruly_arabs_progress] will decrease by 1 each month for 3 months"

 great_arab_revolt:0 "The Great Arab Revolt"
 great_arab_revolt_reason:0 "The long-standing discontent of the people of [SCOPE.sCountry('ARA_scope').GetName] under the rule of [SCOPE.sCountry('TUR_scope').GetName] has now developed into military conflict. Backed by foreign [concept_great_power]s and #yellow Arab states#!, the state of [SCOPE.sCountry('ARA_scope').GetName], led by the Hashemite [SCOPE.sCharacter('ara_ruler').GetFullName], has launched a great armed uprising: if [SCOPE.sCountry('TUR_scope').GetName] cannot suppress this revolt in time, the nations of [GetStrategicRegion('region_arabia').GetName] will one after another win their independence."
 great_arab_revolt_possible_tt:0 "$dyn_c_ottoman_empire$ failed or timed out in the #V $the_unruly_arabs$#! [concept_journal_entry]"
 great_arab_revolt_complete_tt:0 "The revolting Arab states have not been destroyed by the Ottomans and have survived for 2 years"
 this_country_support_ara_tt:0 "Was on the side supporting #yellow the Arabs#! in the #V $the_unruly_arabs$#! [concept_journal_entry]"
 great_arab_revolt_fail_tt:0 "No newly independent [GetStrategicRegion('region_arabia').GetName] country still exists"
 great_arab_revolt_progress_bar:0 "Revolt Progress"
 great_arab_revolt_progress_bar_desc:0 "Revolt Progress: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
 great_arab_revolt_progress_bar_1_tt:0 "The progress requirements are being met"
 great_arab_revolt_1_button:0 "Claim Syria"
 great_arab_revolt_1_button_desc:0 "These Arabs are not yet truly capable of ruling themselves: Syria ought to accept our protection, and only under our benevolent rule may the Arabs be civilised."
 great_arab_revolt_1_button_1_tt:0 "No other [concept_great_power] has claimed Syria within 4 months"
 great_arab_revolt_1_button_2_tt:0 "Has not yet claimed this region"
 great_arab_revolt_1_button_3_tt:0 "Has not made any other claim within 1 year"
 great_arab_revolt_2_button:0 "Claim Iraq"
 great_arab_revolt_2_button_desc:0 "The strategic position of Iraq is important, and these Arabs are not yet truly capable of ruling themselves: Iraq ought to accept our protection, and only under our benevolent rule may the Arabs be civilised."
 great_arab_revolt_2_button_1_tt:0 "No other [concept_great_power] has claimed Iraq within 4 months"
 great_arab_revolt_3_button:0 "Claim Palestine"
 great_arab_revolt_3_button_desc:0 "Palestine is the land of the Holy City of Jerusalem, and with Ottoman power collapsing, this is the very moment to recover the Holy City: Palestine ought to accept our rule."
 great_arab_revolt_3_button_1_tt:0 "No other [concept_great_power] has claimed Palestine within 4 months"
 great_arab_revolt_4_button:0 "Establish the Arab Federation"
 great_arab_revolt_4_button_desc:0 "The Arab states ought to unite as one whole. If we can stand together, we shall no longer fear any foreign oppression or hostility!"
 great_arab_revolt_4_button_possible_tt:0 "We must ensure that #yellow Iraq#! and #yellow Syria#! have already passed out of the rule of $dyn_c_ottoman_empire$.\nIf they still remain under the rule of $dyn_c_ottoman_empire$, we ought to save our #yellow Iraqi#! and #yellow Syrian#! brethren by means of #O Liberate Country#!, and in the end establish the Arab Federation."

 ottoman_corsairs:0 "Mediterranean Corsairs"
 ottoman_corsairs_reason:0 "Though they were once extinguished by the blows of the #B Barbary Wars, the Bombardment of Algiers, and the French occupation#!, #R piracy in the Mediterranean#! has now begun to revive. Corsairs from #yellow North Africa#! and #yellow Anatolia#! are sweeping along the coasts of the #V Mediterranean#!, plundering the shores of many states and preying upon their [concept_trade] shipping, thereby damaging the [concept_trade] of all nations concerned.\n\n@information!If the leading state in #V $ottoman_corsairs$#! still possesses certain #V key harbours#! in the #V Mediterranean#!, it may #B continue its raiding operations#!. If it abolishes [GetLawType('law_slave_trade').GetName], the corsair crisis shall also come to an end."
 ottoman_corsairs_possible_1_tt:0 "$dyn_c_ottoman_empire$ has completed the #V $caliph_and_ummah$#! [concept_journal_entry]"
 ottoman_corsairs_possible_2_tt:0 "$dyn_c_ottoman_empire$ has completed the #V $rebuild_muslism_slavery$#! [concept_journal_entry]"
 ottoman_corsairs_possible_3_tt:0 "#yellow The Maghreb#! exists"
 status_ottoman_corsairs_active:0 "The corsairs are in a season of raiding"
 status_ottoman_corsairs_inactive:0 "The corsairs are in a season of repose"
 status_ottoman_corsairs_banned:0 "Mediterranean piracy has already perished under the blows of the American Barbary Wars, the British Bombardment of Algiers, and the French occupation"
 event_tur_93_a_tt:0 "We shall be permitted, through the #V $ottoman_corsairs$#! [concept_journal_entry], to raid provinces along the Mediterranean coast, seizing their population and wealth, though this shall also bring us infamy.\nDuring the raiding season, the corsairs will also randomly prey upon foreign merchant shipping passing through the Mediterranean, bringing money to our country while injuring the trade of others.\nIf our country abolishes [GetLawType('law_slave_trade').GetName], or loses certain key corsair harbours, the corsair operations shall be forced to end."
 event_tur_93_b_tt:0 "While the corsairs of [SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting] remain in a #V season of raiding#!, they may plunder any province lying upon the Mediterranean coast, bringing damage to those provinces.\nThe corsairs may also prey upon our merchant ships passing through the Mediterranean, thereby harming our trade.\nIf we wish to put an end to their depredations, we must force [SCOPE.sCountry('corsairs_scope').GetName] to abolish [GetLawType('law_slave_trade').GetName], or else seize certain key corsair ports belonging to [SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting]."
 ottoman_corsairs_1_button:0 "Order the Raiding to Begin"
 ottoman_corsairs_1_button_desc:0 "nan"
 ottoman_corsairs_1_button_tt:0 "We shall instruct the navy to begin raiding. The season of raiding shall last for 3 years, and must thereafter be followed by 1 year of repose."
 ottoman_corsairs_button_active_tt:0 "The corsairs are presently in a season of raiding"
 ottoman_corsairs_button_timer_tt:0 "No raiding action has been undertaken within the past 3 months"
 ottoman_corsairs_2_button:0 "Raid the Coasts of Iberia and Occitania"
 ottoman_corsairs_2_button_desc:0 "nan"
 ottoman_corsairs_3_button:0 "Raid the Coasts of Italy and the Balkans"
 ottoman_corsairs_3_button_desc:0 "nan"
 ottoman_corsairs_4_button:0 "Raid the Coasts of the Black Sea"
 ottoman_corsairs_4_button_desc:0 "nan"
 ottoman_corsairs_5_button:0 "Dispatch Naval Patrols"
 ottoman_corsairs_5_button_desc:0 "nan"
 ottoman_corsairs_progress_bar:0 "#O Raiding Efficiency#!"
 ottoman_corsairs_progress_bar_desc:0 "#O Raiding Efficiency#!: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 event_tur_97_a_1_tt:0 "As they have naval patrol escorts, they shall reduce their losses by 50%."
 event_tur_97_a_2_tt:0 "As they have no naval patrol escorts, they shall suffer 100% of the losses."
 event_tur_97_b_1_tt:0 "As we have naval patrol escorts, we shall reduce our losses by 50%."
 event_tur_97_b_2_tt:0 "As we have no naval patrol escorts, we shall suffer 100% of the losses."
 change_10_ottoman_corsairs_efficency_tt:0 "Increase #O Raiding Efficiency#! by #G 10%#!."
 change_20_ottoman_corsairs_efficency_tt:0 "Reduce #O Raiding Efficiency#! by #G 20%#!.\nDuring the following 4 years, if our merchant ships are attacked by corsairs, their losses shall be #G reduced by 50%#!."
 change_25_ottoman_corsairs_efficency_tt:0 "Increase #O Raiding Efficiency#! by #G 25%#!."

 tur_tobacco_industry:0 "The Tobacco Industry of Turkey"
 tur_tobacco_industry_reason:0 "Since its introduction into the Empire in the sixteenth century, @tobacco!#V tobacco#! has swiftly become one of the most common articles of consumption in both the towns and countryside of [ROOT.GetCountry.GetName]: it burns upon the stone steps outside mosque courtyards, rises in smoke above the benches of coffeehouses, and accompanies soldiers upon the march through wind and sand alike. #B The love of tobacco has all but become a habit of life#!—whether rich or poor, noble or common, men find in its smoke a #B brief forgetfulness of their daily cares#!.\n\nYet @tobacco!#V tobacco#! ought not to remain merely a consumer good: as the Empire’s finances grow ever more strained, tobacco duties have gradually become one of the steadiest and most dependable sources of revenue. We must establish a #V monopoly system#!, impose #B strict regulation and centralised purchasing#!, and transform this everyday commodity into a #B pillar of [concept_government] power and fiscal order#!—indeed, a guarantee of the credit of [ROOT.GetCountry.GetName]—and into its #V most profitable export commodity#!."
 tur_tobacco_industry_possible_tt:0 "Is the leading producer of @tobacco!#V tobacco#!"

 ottoman_public_debt:0 "Ottoman Public Debt"
 ottoman_public_debt_reason:0 "Under the pressure of continual #V military expenditure#! and #V reform expenditure#!, the [concept_treasury] and [concept_building_balance] of [SCOPE.sCountry('TUR_scope').GetName] have fallen into grave disorder: to make good the #R deficit#!, the #G Porte#! has begun frequently issuing public bonds upon foreign capital markets, with the result that the Empire’s finances have grown ever more dependent upon #R foreign debt#!.\n\nAs more and more of these bonds pass into the hands of bankers and state institutions in 欧洲, the Empire’s financial troubles are gradually ceasing to be a merely #B internal affair#! and are becoming a #V question of international concern#!.\n\nFor [SCOPE.sCountry('TUR_scope').GetName], this grave #B creditor crisis#! has already #V eroded the sovereignty of the Porte#!: if the finances can be put in order, equilibrium between revenue and expenditure restored, and the debt gradually repaid, the Empire may yet #B recover its lost authority#!; but if foreign debt continues to spiral out of control, the shadows of #V mortgaging and international intervention will inevitably fall over the Porte#!.\n\n@information!#B #O Number of Foreign Debts#!#!: this represents the number of debts currently owed by [SCOPE.sCountry('TUR_scope').GetName] to the other participating countries in the #V $ottoman_public_debt$#! [concept_journal_entry]. The greater the number of foreign debts, the more interest the Ottomans must pay; by holding Ottoman bonds, creditor countries shall receive interest from the Ottomans."
 tur_clear_debt_tt:0 "All current #V domestic loans#! held by #yellow $dyn_c_ottoman_empire$#! shall be repaid."
 ottoman_public_debt_journal_possible_tt:0 "#yellow $dyn_c_ottoman_empire$#! has begun issuing public bonds through the #B Issue Public Debt#! decision"
 ottoman_public_debt_possible_tt:0 "[ROOT.GetCountry.GetNameNoFlag] is currently #V in debt#! and #V running a fiscal deficit#!"
 ottoman_public_debt_complete_1_tt:0 "The debt crisis has lasted for at least 1 year"
 ottoman_public_debt_complete_tt:0 "The Ottomans have #O 0 foreign debts#!"
 ottoman_public_debt_fail_tt:0 "The Ottomans have reached #O 25 foreign debts#!"
 ottoman_public_debt_progress_bar:0 "#O Number of Foreign Debts#!"
 ottoman_public_debt_progress_bar_desc:0 "#O Number of Foreign Debts#!: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/25)"
 ottoman_public_debt_1:0 "$dyn_c_ottoman_empire$ currently has no foreign debt"
 ottoman_public_debt_2:0 "$dyn_c_ottoman_empire$ has a #R vast#! amount of foreign debt"
 ottoman_public_debt_3:0 "$dyn_c_ottoman_empire$ has a #I considerable#! amount of foreign debt"
 ottoman_public_debt_4:0 "$dyn_c_ottoman_empire$ has only a #V slight#! amount of foreign debt"
 ottoman_public_debt_1_button:0 "Request a Foreign Loan"
 ottoman_public_debt_1_button_desc:0 "The Porte can no longer bear its present debt burden unaided; we must continue borrowing from other countries."
 ottoman_public_debt_1_button_tt:0 "We shall borrow from a [concept_great_power] participating in the #V $ottoman_public_debt$#! [concept_journal_entry]. If they agree, our debt bar shall be cleared, but the #O Number of Foreign Debts#! shall #V increase by 1#!, and so too shall the interest we must pay to that country."
 ottoman_public_debt_2_button:0 "Repay One Foreign Debt"
 ottoman_public_debt_2_button_desc:0 "Our finances are beginning to recover; we cannot allow foreigners to continue exploiting our financial sovereignty—we must repay the debt."
 ottoman_public_debt_2_button_tt:0 "Our #O Number of Foreign Debts#! shall #V decrease by 1#!, and the interest we must pay shall likewise be reduced."
 ottoman_public_debt_2_button_possible_tt:0 "#O Number of Foreign Debts#! is at least 1"
 event_tur_98_a_tt:0 "We shall receive an initial #O Number of Foreign Debts#! equal to the number of [concept_great_power]s participating in the #V $ottoman_public_debt$#! [concept_journal_entry]. Each subsequent loan shall increase the #O Number of Foreign Debts#! by 1, while each repayment shall reduce it by 1.\nThe interest on our foreign debts shall be paid proportionally according to the number of claims held by each country."
 event_tur_98_b_tt:0 "We shall authorise our banks to extend a one-off loan to $dyn_c_ottoman_empire$, and shall begin drawing interest from it. If $dyn_c_ottoman_empire$ later seeks further loans from us, we may refuse their request."
 ottoman_public_debt_3_button_any_tt:0 "Holds at least 1 public debt claim"
 ottoman_public_debt_3_button_minus_tt:0 "Reduce the number of public debt claims held by 1"
 ottoman_public_debt_3_button:0 "Unilaterally Default on One Debt"
 ottoman_public_debt_3_button_desc:0 "Who cares for covenants and regulations? The Empire’s finances must come before all else—we shall simply refuse to acknowledge this debt, and repudiate it outright!"
 ottoman_public_debt_4_button:0 "Mortgage Cyprus"
 ottoman_public_debt_4_button_desc:0 "Many of the Great Powers have shown interest in the island of Cyprus: as a principal base in the Eastern Mediterranean, it could extend their influence there. Yet we care nothing for that—provided only that the debt be paid."
 ottoman_public_debt_5_button:0 "Forgive One Debt"
 ottoman_public_debt_5_button_desc:0 "The Ottomans appear to be in very serious difficulties. If we simply allow them to collapse into bankruptcy, that will profit none of us. Perhaps we may forgive one of their debts, and thus ease the pressure upon the Porte."
 ottoman_public_debt_5_button_1_tt:0 "You hold at least 1 #O Public Debt Claim#!"
 ottoman_public_debt_6_button:0 "Seize Ottoman Merchant Ships"
 ottoman_public_debt_6_button_desc:0 "It is unlikely that the Ottomans shall repay what they owe us any time soon, yet the merchant ships of that old debtor still sail through our waters as though nothing were amiss? Let us seize their vessels and take them in lieu of repayment."
 ottoman_public_debt_6_button_any_tt:0 "You hold at least 3 #O Public Debt Claims#!"
 event_tur_99_c_tt:0 "The number of #O Public Debt Claims#! you hold shall increase by 1, and the interest you receive shall increase accordingly."
 event_tur_99_b_tt:0 "The #O Number of Foreign Debts#! shall increase by 1, and the interest you must pay shall increase accordingly."
 event_tur_99_a_tt:0 "Our request for a loan has been refused."
 event_tur_99_e_tt:0 "We shall refuse the loan request of $dyn_c_ottoman_empire$."
 reduce_building_gold_reserves_tt:0 "@information!Our private [concept_building_owners] will extend loans to $dyn_c_ottoman_empire$ by drawing from the [concept_cash_reserves] of the [concept_building] in which they hold [concept_ownership_share], covering #V 75%#! of its outstanding debt.\n@information!#R #B The remaining #L #V 25%#!#! of the #L Ottoman debt#! will be assumed and financed by the #L government#!#!."
 tur_refuse_debt_tt:0 "我们将拒绝向外借债，并使#V $ottoman_public_debt$#![concept_journal_entry]失效，不产生任何效果。"
 ottoman_public_debt_1_button_possible_tt:0 "No #V Unilaterally Default on One Debt#! in the past 5 years"

 liberalism_of_turkey:0 "Secularism in Turkey"
 liberalism_of_turkey_reason:0 "Under the leadership of [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [ROOT.GetCountry.GetName] is undergoing a series of far-reaching #B political, social, cultural, and religious reforms#!, with the intention that these #V secularising and democratising#! measures shall advance the process of #B #blue liberalism#!#! in [ROOT.GetCountry.GetAdjectiveNoFlag].\n\n[ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] wishes to strengthen [concept_government] #B regulation of the private economy within our society, forbid religion from interfering in affairs of state, and emphasise the spirit of the rule of law, popular sovereignty, and civic virtue#!, ultimately shaping these principles into the #V defining values#! of a #B secular, democratic, independent, strong, and free#! [ROOT.GetCountry.GetAdjectiveNoFlag] #yellow nation#!.\n\n[ROOT.GetCountry.GetRuler.GetFirstName]#yellow ’s Secularist Agenda:#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_1_checkbox')]Has the [GetLawType('law_universal_suffrage').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_2_checkbox')]Has the [GetLawType('law_womens_suffrage').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_3_checkbox')]Has the [GetLawType('law_presidential_republic').GetName] or [GetLawType('law_parliamentary_republic').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_4_checkbox')]Has the [GetLawType('law_right_to_associate').GetName] and [GetLawType('law_public_schools').GetName] [concept_law]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_5_checkbox')]Has the [GetLawType('law_protected_speech').GetName] [concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_6_checkbox')]Has the [GetLawType('law_interventionism').GetName] and [GetLawType('law_total_separation').GetName] [concept_law]s\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_7_checkbox')][GetInterestGroupVariant('ig_devout',GetPlayer).GetName] is not [concept_powerful], and is not [concept_in_government]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_8_checkbox')]All #B #L cultural majority#!#! or #B #L cultural minority#!#! [Concept('concept_political_movement','$concept_political_movements$')]s have [concept_activism] #B below 50%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_9_checkbox')]All #B #L religious majority#!#! or #B #L religious minority#!#! [Concept('concept_political_movement','$concept_political_movements$')]s have [concept_activism] #B below 25%#!"
