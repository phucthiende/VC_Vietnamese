 great_ottomanism:0 "The United Realm"
 great_ottomanism_reason:0 "Before this century, the vast dominions of [ROOT.GetCountry.GetName] were divided into many #B small communities, each governing itself#!: the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ruled over them all, yet in most regions each still followed its own [concept_law] and [concept_religion].\n\nThough this once contributed to the success of #B imperial conquest#!, the rise in 欧洲 of the #V nation-state#!, founded upon a #B shared sense of identity#!, together with the growing penetration of 欧洲#O thought#! and the influence of the [concept_great_power]s of 欧洲 within [ROOT.GetCountry.GetName], has made the mounting threat of internal #R [concept_national_awakening]#! the driving force behind the #B disintegration of the Empire’s lands#!.\n\nIn order to reunite the whole of [ROOT.GetCountry.GetName], the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], inspired by the theories of philosophers such as #V John Locke, Montesquieu, and Rousseau#!, and influenced by the #V American Revolution#! and the #V French Revolution#!, seek to advocate equality among the various #G millets#!, to embrace all the Empire’s different peoples regardless of [concept_religion]#o faith#!, to establish the principle of #V equality before the [concept_law]#!, and to ensure that all citizens share the same #O traditions#! and [concept_law]s—so that the Empire may ultimately be united as a #B commonwealth in which all are regarded as #yellow [GetCulture('rumeli_turkish').GetName]s#! and enjoy equal rights#!."
