l_english:

 joi_flavor_tur.1.t: "Edict of Gülhane"
 joi_flavor_tur.1.d: "The old [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #yellow Mahmud II#!, has passed away. Like his father before him, the new [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [ROOT.GetCountry.GetRuler.GetFullName], is likewise an advocate of reform, backed by #O Tanzimatist#! pashas such as [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]. The new [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is resolved to continue along his father’s path and carry out thorough reforms throughout the Empire."
 joi_flavor_tur.1.f: "“It is known to the whole world that, in the early days of the rule of [ROOT.GetCountry.GetName], the glorious precepts of the #yellow Qur’an#! and the laws of the Empire were held in full esteem. By virtue of this, the Empire grew in strength, and all its subjects, without exception, lived in the greatest ease and prosperity. In the course of the last one hundred and fifty years, however, a succession of calamities and various causes have brought about disregard for the sacred law and the regulations derived therefrom, and the former strength and prosperity have given way to weakness and poverty.”\n\n“We are persuaded that, should effective means be sought out, the objects which, with the help of Allah, we hope to attain may be realised within a few years. Therefore, with full confidence in the aid of Almighty God and assured of the support of the Prophet, we deem it wise, by means of new institutions, to provide sound government for the provinces composing the [ROOT.GetCountry.GetAdjectiveNoFormatting] state.”"
 joi_flavor_tur.1.a: "At this moment, fate closes his chapter."
 joi_flavor_tur.1.b: "Surely we belong to Allah, and unto Him we shall return."
 joi_flavor_tur.1.c: "A new dawn for the Empire."
 joi_flavor_tur.1.e: "A great reform is urgently needed."

 joi_flavor_tur.2.t: "Edict of Reorganisation"
 joi_flavor_tur.2.d: "[ROOT.GetCountry.GetName] has successfully modernised and once more taken its place upon the world stage. A wholly new age has begun for the [ROOT.GetCountry.GetAdjectiveNoFormatting] state."
 joi_flavor_tur.2.f: "Great. It is the only word fit to describe it. Through the streets of Konstantiniyye one may now see modern factories and schools, and guards drilling in military formation. Where once farms spread across the land, shining urban districts now rise from the earth. Who could have imagined that only a few decades ago the Empire stood upon the brink of collapse? Once, the eyes of Europe’s powers were filled with pity and greed whenever they looked upon us, always seeking an opportunity to partition our lands. Now we see in the eyes of their diplomats only awe at our achievements, and they are compelled to treat us as equals. Allah is most great!"
 joi_flavor_tur.2.a: "The Empire has been reorganised; we shall march upon our old lands."
 joi_flavor_tur.2.b: "Law and equality must be the Empire’s highest priority."
 joi_flavor_tur.2.c: "Reorganisation means new economic prosperity."
 joi_flavor_tur.2.e: "We shall reap the benefits of education."
 joi_flavor_tur.3.t: "Committee of the Teşkilât-ı Mahsusa"
 joi_flavor_tur.3.d: "Though once regarded as the remedy that would save the Empire, the Tanzimat reforms have now become unpopular. The [GetIdeology('ideology_constitutionalist').GetName], who deem the reforms far too limited, have formed a committee within the government and compelled [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] to accept the democratic constitution they drafted, proclaiming the establishment of a constitutional government."
 joi_flavor_tur.3.f: "“All Ottomans enjoy individual liberty, provided they do not infringe upon the liberty of others... No one may, under any pretext whatever, suffer punishment save in the cases and forms prescribed by law.”\n\n“All Ottomans are equal before the law; they enjoy the same rights and owe the same duties to the state, without distinction of religion.”\n\n“There is one condition for holding public office—that one must know Turkish, the official language of the state. All Ottomans shall be admitted to public employment according to their talent, merit, and capacity.”"
 joi_flavor_tur.3.a: "Only full constitutionalism can save the Empire!"
 joi_flavor_tur.3.b: "Might it be that [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] are right after all?"
 joi_flavor_tur.4.t: "Dead Man of Europe"
 joi_flavor_tur.4.d: "[ROOT.GetCountry.GetName] has failed to modernise and regain its footing on the world stage. The vultures circle overhead; the end of [ROOT.GetCountry.GetName] is near."
 joi_flavor_tur.4.f: "The Sublime Porte has fallen silent. After [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] declared his intention to abdicate—very likely under coercion from his ministers—he was found dead in his chambers. Like our beloved Empire, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] had long been tormented by sickness, until at last he could no longer bear the weight of the crown, and became but the broken and maddened shadow of himself."
 joi_flavor_tur.4.a: "Surely we belong to Allah, and unto Him we shall return."
 joi_flavor_tur.5.t: "Ottoman Civil Code"
 joi_flavor_tur.5.d: "Despite the fierce opposition of Mufti [SCOPE.sCharacter('devout_pasha_scope').GetFirstName], discriminatory religious policies have at last been abolished with the support of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]. Many reformers within the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] now hope to transform [ROOT.GetCountry.GetName], in law, into a thoroughly secular state."
 joi_flavor_tur.5.f: "“Every man shall possess his property of every kind, and shall enjoy complete freedom to dispose of it without hindrance or permission from any person whatever; thus the innocent heirs of a criminal shall not be deprived of their lawful rights, nor shall the property of the criminal be confiscated. These Imperial privileges shall extend to all our subjects, whatever religion or sect they may belong to; they shall enjoy them without exception. We therefore grant absolute security to the lives, honour, and fortunes of the inhabitants of the Empire, for these are guaranteed by the sacred text of the Law.”"
 joi_flavor_tur.5.a: "Secular law shall replace the Sharia."
 joi_flavor_tur.5.b: "The Sharia courts should yet retain certain privileges."
 joi_flavor_tur.6.t: "The Question of Taxation"
 joi_flavor_tur.6.d: "The old tax system, once convoluted and frequently misapplied, has been overhauled. With the help of fiscal experts such as [SCOPE.sCharacter('progress_pasha_scope').GetFullName], the taxation system of [ROOT.GetCountry.GetName] has been thoroughly renewed."
 joi_flavor_tur.6.f: "“If the property of individuals lacks security, then each man will remain indifferent to the voice of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and of the state; no one will concern himself with the advancement of the public welfare, but only with his own affairs. If, on the contrary, the citizen possesses full confidence in all his property, then, as he becomes devoted to his own enterprise and seeks to enlarge it in order to increase his comfort, he will feel his love for his sovereign and his country grow daily stronger, and his devotion to the fatherland will likewise deepen.”\n\n“Henceforth, it is necessary that each member of [ROOT.GetCountry.GetAdjectiveNoFormatting] society be taxed at a fixed rate proportionate to his wealth and income, and that no other tax whatsoever be levied upon him; further, it is necessary that special laws be enacted to regulate and limit the expenses of both our Army and our Navy.”"
 joi_flavor_tur.6.a: "Military service shall become a duty, not something that can be avoided by paying tax."
 joi_flavor_tur.6.b: "The Jizya shall be reformed, so as to prevent its wrongful levy upon Muslims."
 joi_flavor_tur.7.t: "Provincial Reform Act [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_tur.7.d: "Many of the privileges of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] have been revoked, and a provincial administrative system of “#yellow Vilayets#!”, drafted in imitation of the Western Great Powers, has been introduced, greatly improving the ability of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the Porte to govern their domains."
 joi_flavor_tur.7.f: "“Aside from its various legal reservations, the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] is bound by a solemn duty: to respect science, the demands of the age, its own political judgement, and the rights of citizens and interests of the nation above all private considerations. It is this duty alone that can safeguard public order. Even where errors and missteps arise along this path, the effective means of correcting them cannot, as in former days, lie in the hands of institutions charged with controlling the press.”"
 joi_flavor_tur.7.a: "Both men and opinions shall circulate more freely!"
 joi_flavor_tur.7.b: "The reform of administration is the mark of an Empire becoming modern."
 joi_flavor_tur.7.c: "The Porte must tighten its censorship of dissidents."
 joi_flavor_tur.8.t: "The Imperial Regular Army"
 joi_flavor_tur.8.d: "By reforming the #yellow Mansure Army#! and adopting new Western-style uniforms and standards of training, the armed forces of [ROOT.GetCountry.GetName] have passed through a difficult period of modernisation. Yet the results have proved remarkable: many Western military observers have been forced to admit that the armies of the Empire are now fully capable of meeting European standards."
 joi_flavor_tur.8.f: "“Everything in war is simple, but the simplest thing is difficult. These difficulties accumulate and produce a friction which no man can imagine who has not seen war. The whole is less like a finely tuned machine than a scene of chaos.”\n\n“Courage is the first quality of a warrior—not merely courage in the face of death, but moral courage also: the courage to bear responsibility, to decide, and to endure doubt and uncertainty.”"
 joi_flavor_tur.8.a: "A fine army requires distinguished officers and soldiers."
 joi_flavor_tur.8.b: "An army’s fighting strength lies in its organisation and staff."
 joi_flavor_tur.9.t: "General Education Regulation"
 joi_flavor_tur.9.d: "The old #yellow Sharia schools#! have been abolished, and a Western-style system of education has been established by the Porte, intended to provide as equal an educational opportunity as possible to the whole society of [ROOT.GetCountry.GetName]."
 joi_flavor_tur.9.f: "“Society can and does execute its own mandates: and if it issues wrong mandates instead of right, or any mandates at all in things with which it ought not to meddle, it practises a social tyranny more formidable than many kinds of political oppression, since, though not usually upheld by such extreme penalties, it leaves fewer means of escape, penetrating much more deeply into the details of life, and enslaving the soul itself.”"
 joi_flavor_tur.9.a: "Educational institutions must ensure the loyalty and conversion of the people."
 joi_flavor_tur.9.b: "Educational institutions ought to devote themselves to the teaching of objective truth."
 joi_flavor_tur.10.t: "Land Emancipation Act"
 joi_flavor_tur.10.d: "Under the benevolent and enlightened rule of His Majesty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetName] has made notable progress in developing its abundant resources. A wholly new land code has been enacted, enabling the formerly impoverished [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] to understand the rights and obligations established between the tiller of the soil and the government."
 joi_flavor_tur.10.f: "“Where land has been held under tapu for ten years without opposition, and no claim or challenge has been brought, possession shall be deemed lawful; but where a legal impediment has existed, suit may be brought within ten years after that impediment has ceased, and not thereafter. Yet if the opposite party admits to unlawful occupation and cultivation, he may not plead prescription; the land shall be restored to its rightful owner.”\n\n“An entire tract of land within a town or village shall not be granted as a whole to one or several inhabitants; rather, the land shall be divided into parcels and allotted to individual households, and the government shall deliver title deeds to them as proof of lawful possession.”"
 joi_flavor_tur.10.a: "Sign the decree and distribute the land to the peasants."
 joi_flavor_tur.10.b: "Agriculture, like any other industry, shall fall under the sway of the market."
 joi_flavor_tur.11.t: "Orient Railway Concession"
 joi_flavor_tur.11.d: "In the Balkan lands under the rule of [ROOT.GetCountry.GetName], villages and towns once unconnected are now linked by long and reliable stretches of railway. The eager [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] have petitioned the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] for the concession to operate this line, declaring that it will usher our Balkan provinces into a new age of great prosperity."
 joi_flavor_tur.11.f: "“The concession includes a trunk line from Istanbul to Dobrljin, passing through Adrianople, Sofia, Niš, Sarajevo, and Banja Luka. This route is known as the ‘Southern Line’, as it was designed to bypass Serbia and run nearer to Bosnia.”\n\n“The total length of the concessionary line is estimated at 2,500 kilometres, with a concession period of 99 years. As compensation for the cost of construction, the concession-holder shall receive a rental payment from the government of 14,000 francs per kilometre, and 8,000 francs per kilometre from the operating company. These sums are calculated so as to provide the concession-holder with a return of 11 per cent on the investment.”"
 joi_flavor_tur.11.a: "Approve the company’s private concession."
 joi_flavor_tur.11.b: "The railways must be monopolised by state institutions."
 joi_flavor_tur.12.t: "Young Ottoman Coup"
 joi_flavor_tur.12.d: "Backed by the revolutionary-minded [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] and by elements of the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] sympathetic to them, an organisation styling itself the “Young Ottomans” burst into the Sublime Porte, abducted the Grand Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFullName], and forced the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to yield and transfer power to them. They swiftly promulgated a provisional constitution and proclaimed constitutional reform throughout [ROOT.GetCountry.GetName]."
 joi_flavor_tur.12.f: "“[SCOPE.sCharacter('progress_pasha_scope').GetFullName] declared that resignation was the demand of the whole people. ‘No promise can suffice,’ he said. ‘A change of ministry means that we shall defend the honour of the nation, or else perish. The whole nation stands ready to make sacrifices. In matters of money, the whole nation shall make sacrifices. We are resolved at all costs to abolish the unreasonable rule of the Porte.’ This, he insisted, is the indispensable condition of prosperity.\n\nAll newspapers in Constantinople not belonging to the #yellow Young Ottomans#! have been suspended. They proclaim that Pasha [SCOPE.sCharacter('army_pasha_scope').GetFirstName] has betrayed the nation; the situation is grave. It is expected that the Young Ottomans will soon resort to armed action.”"
 joi_flavor_tur.12.a: "Long live constitutionalism!"
 joi_flavor_tur.12.b: "Cursed liberals—I shall return yet!"
 joi_flavor_tur.13.t: "General Election of the National Assembly [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_tur.13.d: "Driven forward by the [GetIdeology('ideology_constitutionalist').GetName], the old political order has been wholly swept away. Power once monopolised by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and the Porte has been handed over to a democratically elected National Assembly, while the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself has signed a constitution drafted by [SCOPE.sCharacter('progress_pasha_scope').GetFullName], acknowledging his role as a constitutional monarch and pledging faithfully to defend the constitution."
 joi_flavor_tur.13.f: "The weather is fair today: [TimeKeeper.GetCurrentDate.Format('y m d')]—a day destined to become one of the most emblematic in the history of [ROOT.GetCountry.GetName]—the opening of the first nationwide universal election for the National Assembly. His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], having already sworn loyalty to the constitution, departed from Topkapı Palace and made his way to Dolmabahçe Palace, now designated the home of Parliament. Crowds of citizens receiving the franchise for the first time lined the roads; many townsfolk, intellectuals, and workers who had devoted their lives to the cause of liberty gazed at the ballots in their hands and wept. How many generations had striven so that these ballots might finally come into their possession! They were now citizens of this country!\n\nThe [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] entered the parliamentary palace, though he was forbidden by the constitution from entering the lower chamber—and indeed he obeyed the constitution, placing this great opening ceremony within the upper chamber. He entered, the deputies rose in salute, and the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] sat in silence upon the throne, facing the constitutional preamble carved into the wall of Parliament. Yes, before all citizens and before Allah, we swear loyalty to nation, law, and monarch; we swear not to disperse until the liberty of the nation is established and secure!"
 joi_flavor_tur.13.a: "A free nation is the greatest of nations."
 joi_flavor_tur.14.t: "The Sword of Osman"
 joi_flavor_tur.14.d: "The #yellow liberals#! and #yellow constitutionalists#! who once controlled [ROOT.GetCountry.GetName] have all been arrested in an armed coup led by [ROOT.GetCountry.GetRuler.GetFullName] and the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] loyal to the court. After brief trials, they were put to death before the gates of Topkapı Palace. The former [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], under threat of force from [ROOT.GetCountry.GetRuler.GetFirstName], was compelled to abdicate, and the fiercely autocratic [ROOT.GetCountry.GetRuler.GetFirstName] has ascended the [ROOT.GetCountry.GetAdjective] throne. Though the road ahead is uncertain, there can be little doubt that he shall rule this Empire by the most despotic means."
 joi_flavor_tur.14.f: "The accession ceremony of [ROOT.GetCountry.GetName] may well be among the grandest sights any man shall witness in his lifetime, and the accession of [ROOT.GetCountry.GetRuler.GetFirstName] has proved no exception. The Sharif of Konya girded the new [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], His Majesty [ROOT.GetCountry.GetRuler.GetFirstName], with the #G Sword of Osman#!, while our viziers looked upon him with a measure of awe.\n\nNone had expected that the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] would ultimately prevail in this brutal political struggle and succeed his father. Some mutter in private against his cruelty and violence, claiming that it was his brutality, rather than his justice, that secured his triumph. And the revolutionaries who once sat within the Porte—the liberals who never believed [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to be a threat—had hoped to wield the Empire through him. They all failed in the end, dying before the gates of Topkapı Palace, their blood spilled across the square.\n\nOf one thing there can be no doubt: our new [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has already made it plain that, when necessary, he will never hesitate to strike a merciless blow against those he deems to have betrayed him."
 joi_flavor_tur.14.a: "May Allah grant His Majesty a long and glorious reign!"

 joi_flavor_tur.15.t: "Trial before the Sharia Court"
 joi_flavor_tur.15.d: "A recent trial arising from a land dispute is fast becoming a religious question. The newly enacted laws require Muslims and infidels to be tried together, yet Mufti [SCOPE.sCharacter('devout_pasha_scope').GetFullName], who presides over the case, refuses to sit beside an infidel."
 joi_flavor_tur.15.f: "“They eagerly listen to falsehood and devour what is unlawful. If they come to you for judgement, you may judge between them, or turn away from them; they cannot harm you in the least. But if you judge, then judge between them with justice, for Allah loves those who judge justly. Yet how is it that they come to you for judgement when they have the Tawrat with them, containing Allah’s judgement, and then turn away thereafter? Such are not true believers.”\n\n“Verily, We sent down the Tawrat, wherein is guidance and light; by it the prophets who submitted to Allah judged for the Jews, as did the rabbis and learned men, inasmuch as they were entrusted with the Book of Allah and were witnesses thereto. Therefore fear not men, but fear Me; and do not barter away My signs for a paltry gain. Whosoever does not judge by what Allah has revealed, they are the unbelievers.”"
 joi_flavor_tur.15.a: "Order the secular court to proceed according to statute."
 joi_flavor_tur.15.b: "We must place reverence for the Sharia first."
 joi_flavor_tur.15.c: "A more reliable Mufti would please us."
 joi_flavor_tur.16.t: "The Question of Inflation"
 joi_flavor_tur.16.d: "Over the past centuries, chronic budget deficits have forced the Porte repeatedly to debase the Empire’s old gurush coin, causing serious price inflation and confusion within the currency system. Worse still, a multitude of coinages now circulate within the Empire: gold-silver alloys, provincial mintings, foreign currencies, and more besides. The needs of the Tanzimat reforms demand that we continue to expand fiscal revenues, and Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFullName] has proposed that we abolish the old gurush and replace it with a new lira."
 joi_flavor_tur.16.f: "“The enormous costs of administration and maintenance, combined with a succession of devastating wars that greatly increased military expenditure, brought about budget deficits, fiscal disorder, and economic stagnation. The efforts of the [ROOT.GetCountry.GetName] government in the seventeenth and eighteenth centuries to stabilise the currency system proved both futile and ambiguous: the minting authorities sought to combat debasement by withdrawing inferior coinage, melting it down, and reissuing it with a greater gold content.”\n\n“These measures produced two consequences: first, poorer-quality coin was removed from circulation, giving individuals an incentive to hoard it, melt it down, and sell the metal for the higher bullion value; and second, the phenomenon described by Thomas Gresham—now known as Gresham’s Law—whereby coin of higher intrinsic value flowed out of the issuing country, while inferior foreign coin flooded into the market.”"
 joi_flavor_tur.16.a: "It is plain enough that exchange rates are not the cause of inflation."
 joi_flavor_tur.16.b: "The value of the new lira shall be guaranteed directly by the #B #yellow Porte#!#!."
 joi_flavor_tur.16.c: "By pegging the lira to the #B #O Pound Sterling#!#!, we may bring our inflation under control."
 joi_flavor_tur.16.h: "By pegging the lira to the #B #U Franc#!#!, we may bring our inflation under control."
 joi_flavor_tur.17.t: "Governors and Civil Officials"
 joi_flavor_tur.17.d: "In [SCOPE.sState('tur_17_event_scope').GetCityHubName], our newly appointed administrative governor from the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] has demanded that the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], who formerly ruled the region, surrender their private armed retainers and yield all administrative authority, but the governor has met with resistance."
 joi_flavor_tur.17.f: "“The Turkish term for governor is ‘Beylerbeyi’, meaning ‘Lord of Lords’. In time of war, they gather beneath the standard of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and fight as a division of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s army; yet as territorial governors, the Beylerbeyis now bear much broader responsibilities. They play a vital role in the assignment of timars within their jurisdiction, and are charged with maintaining order and administering justice.”\n\n“The office of Beylerbeyi is the most prestigious and profitable in provincial government, and the Sultan almost always chooses his viziers from among the Beylerbeyis. When a Beylerbeyi is stripped of his administrative office, he brings suit and continues to exercise his command until he is recalled to Konstantiniyye.”"
 joi_flavor_tur.17.a: "The power of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] must be respected."
 joi_flavor_tur.17.b: "The orders of the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] stand above all else!"
 joi_flavor_tur.18.t: "Conscription Lottery in [SCOPE.sState('tur_18_event_scope').GetCityHubName]"
 joi_flavor_tur.18.d: "In the marketplace of [SCOPE.sState('tur_18_event_scope').GetCityHubName], the drums sound: conscription officers are drawing soldiers from among Muslims and unbelievers alike. Yet many Muslims are angered by the fact that they not only pay taxes under various other names—and more than the unbelievers do—but still remain bound to military service."
 joi_flavor_tur.18.f: "“Fight those among the People of the Book who do not believe in Allah nor the Last Day, who do not forbid what Allah and His Messenger have forbidden, and who do not follow the religion of truth, until they pay the Jizya willingly while they are brought low. The Jews say, ‘Uzair is the son of Allah,’ and the Christians say, ‘The Messiah is the son of Allah.’ Such are the words of their mouths, resembling those of the unbelievers before them. May Allah curse them—how far they are turned away!”\n\n“They seek to extinguish the light of Allah with their mouths, but Allah refuses save to perfect His light, though the unbelievers despise it. It is He Who sent His Messenger with guidance and the religion of truth, that He might make it prevail over all religions, though the polytheists dislike it.”"
 joi_flavor_tur.18.a: "It is plain that this is unjust to the faithful!"
 joi_flavor_tur.18.b: "The exemption payment under the Jizya brings us wealth."

 joi_flavor_tur.19.t: "The Coup of [TimeKeeper.GetCurrentDate.Format('m d')]"
 joi_flavor_tur.19.d: "A secret political society long opposed to the dictatorial despotism of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]—the Young Turks—has launched a military coup under the leadership of their astonishing and well-concealed chief, Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], in an attempt to bring the autocratic government of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to an end and force his abdication."
 joi_flavor_tur.19.f: "“Revolutionaries of the Committee of Union and Progress, led by Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], burst into the cabinet offices of the Sublime Porte. Their intrusion was met with gunfire from the guards—one cabinet aide fired first upon the invaders, perhaps aiming at [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] Pasha himself—setting off a firefight in which Pasha [SCOPE.sCharacter('army_pasha_scope').GetFullName], present on the scene, was killed outright.”\n\n“News has lately arrived that the subordinates of [SCOPE.sCharacter('army_pasha_scope').GetFirstName] are marching upon Constantinople from Çatalca and other districts, sworn to avenge him. There can be little doubt that this is a most ominous sign for the new government.”"
 joi_flavor_tur.19.a: "A new age shall come."
 joi_flavor_tur.19.b: "Summon the army—the time for reckoning has come!"
 joi_flavor_tur.20.t: "Raid on the Sublime Porte"
 joi_flavor_tur.20.d: "A sensational demonstration against the cabinet of [SCOPE.sCharacter('old_pasha_scope').GetFirstName] has at last turned into a military coup. The conservative-supporting [SCOPE.sCharacter('army_pasha_scope').GetFullName] has been shot dead, and the revolutionary forces, under the leadership of [SCOPE.sCharacter('progress_pasha_scope').GetFullName], have swiftly seized the Porte and Parliament, proclaiming a military government for the salvation of the nation."
 joi_flavor_tur.20.f: "“Only last Thursday, a demonstration was suddenly organised—fifteen men carrying six flags advanced upon the ‘Sublime Porte’. [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] joined them, while at the same time dozens of his confederates emerged from nearby coffeehouses. In the end, a crowd of roughly one hundred and fifty arrived at the gates of the Porte. That very morning, the regular guards of the Porte had mysteriously been replaced by troops sympathetic to the Young Turks. At this moment, [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] threw open his coat, bared his chest, and cried aloud to the soldiers: ‘Come then! Save the honour of the fatherland! It has been trampled underfoot by a traitorous government! Fire upon me if you will, and let me go to my grave beneath this shame—for in Turkey there is no honour left!’\n\nThereupon [SCOPE.sCharacter('army_pasha_scope').GetFullName] and five others were shot dead; post-mortem examination showed that, besides gunshot wounds, the victims had also been stabbed, while the Sword-Bearing Pasha himself was struck by three bullets. As the gunfire rang out, [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] Pasha approached [SCOPE.sCharacter('old_pasha_scope').GetFirstName] Pasha and said: ‘You must promulgate these measures, or resign at once—or else still more blood shall flow.’ And [SCOPE.sCharacter('old_pasha_scope').GetFirstName] Pasha, calm even in the moment of crisis, chose resignation so as to prevent greater bloodshed.”"
 joi_flavor_tur.20.a: "Long live Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]!"
 joi_flavor_tur.21.t: "The Encirclement of Dolmabahçe Palace"
 joi_flavor_tur.21.d: "At the instruction of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] loyal to the throne have launched a military coup in the capital, surrounding the parliamentary palace—Dolmabahçe Palace—and compelling Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], who was presiding over Parliament, and his cabinet to resign. The constitution has been suspended and the Empire’s elected assembly dissolved by force."
 joi_flavor_tur.21.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] visited Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] in the morning and urged him to resign, but the Vizier refused the demand of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. At three o’clock in the afternoon, Pasha [SCOPE.sCharacter('old_pasha_scope').GetFirstName], acting under the secret instruction of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], arrived at Dolmabahçe Palace with five cavalrymen.\n\nMeanwhile, the palace guard was suddenly mobilised and swiftly sealed off the whole of Konstantiniyye, surrounding Parliament and unfurling, as prearranged, a banner demanding the resignation of the entire cabinet. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] appeared on horseback upon a white steed, accompanied by the former ambassador to Washington, Pasha [SCOPE.sCharacter('army_pasha_scope').GetFirstName].\n\nThey dismounted at the palace gates and demanded an audience with the deputies, but the doors of Parliament were shut fast, and the deputies refused to receive anyone save the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself. Commander [SCOPE.sCharacter('army_pasha_scope').GetFirstName] broke through the parliamentary guard and entered the chamber, declaring that the cabinet must resign. Thus, under the menace of swords and guns, Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] wrote out his resignation and handed it to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_tur.21.a: "Your Majesty’s most obedient servant."
 joi_flavor_tur.22.t: "The Great Revolt of [SCOPE.sState('armenian_state_scope').GetCityHubName]"
 joi_flavor_tur.22.d: "The liberal constitutional revolution has thrown the [GetReligion('sunni').GetName] population of [SCOPE.sState('armenian_state_scope').GetCityHubName] into panic at the weakening of their privileges. In retaliation, they have carried out a massacre of the [SCOPE.sCulture('armenian_scope').GetName] people; the [SCOPE.sCulture('armenian_scope').GetName] in turn have taken up arms against their [SCOPE.sCulture('turkish_scope').GetName] assailants, drawing the local garrison into the violence and the massacre besides."
 joi_flavor_tur.22.f: "“Brother, if you wish to know the news here, we have already killed 1,200 [SCOPE.sCulture('armenian_scope').GetName]s, and fed them all to the dogs; mother, I am safe and well. Father, twenty days ago we made war upon the [SCOPE.sCulture('armenian_scope').GetName] infidels. Thanks be to Allah, we have suffered no harm.”\n\n“Now there is a rumour that our battalion is to be sent to your district—and if that is true, then we shall kill every [SCOPE.sCulture('armenian_scope').GetName] there as well. Another 511 [SCOPE.sCulture('armenian_scope').GetName]s are wounded, and every day hundreds are dying. Ask the soldiers and the savage militias, and you will find that not one of them has so much as shed a drop of blood. May Allah preserve you all.”"
 joi_flavor_tur.22.a: "There can be no doubt: this is an evil revolt of Armenian infidels."
 joi_flavor_tur.22.b: "Take measures and bring the instigators of the massacre to stern justice!"

 joi_flavor_tur.23.t: "Baghdad–Konstantiniyye Railway"
 joi_flavor_tur.23.d: "After a long labour of engineering, a vast railway capable of effectively linking #yellow Konstantiniyye#! and #yellow Baghdad#! has at last been completed. Though technical difficulties arose from the remoteness of the Taurus Mountains, the efforts of [ROOT.GetCountry.GetName] have at last brought this magnificent undertaking to a triumphant conclusion."
 joi_flavor_tur.23.f: "“The [SCOPE.sCountry('GBR_scope').GetAdjective] believe that, if Antwerp in the hands of a Continental Power is, as Napoleon said, a pistol pointed at the coast of England, then Baghdad and the Persian Gulf in the hands of any rival Great Power would be a 42-centimetre gun aimed at India.”\n\n“An expert commission has studied the geological condition of the Tigris and Euphrates, and declares that the region contains veritable ‘lakes of oil’, their reserves all but inexhaustible; yet, given the difficulty of transport, it remains uncertain whether these oilfields can compete with the existing fields of [SCOPE.sCountry('USA_scope').GetAdjective] and [SCOPE.sCountry('RUS_scope').GetAdjective].”"
 joi_flavor_tur.23.a: "The province of Iraq shall prosper by means of the railway!"
 joi_flavor_tur.23.b: "The railway has aided our military movements."
 joi_flavor_tur.24.t: "The Road of Pilgrimage"
 joi_flavor_tur.24.d: "Through the determined investment of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], a railway connecting Jerusalem, Damascus, and Medina, and passing through the Hejaz, has been completed, greatly easing the yearly journey of pilgrims to the Holy Places."
 joi_flavor_tur.24.f: "“Many Syrians I met remembered fondly the atmosphere aboard the trains. That, of course, is one of the wonderful things about rail travel: strangers gathered into a common space, the gentle rhythm of the carriage encouraging conversation. ‘Each carriage was a little world of friendliness and courtesy,’ the old man recalled.”\n\n“‘If you are looking for a train, though, you have come to the wrong place,’ the old man said with a laugh. He was right, of course, for though this was the grand Hejaz Station in the heart of Damascus, it no longer served any purpose, and had no more passengers.\nNow it seems frozen in time, like a snapshot of an age gone by; like a living museum, preserving a dream that was never fulfilled.”"
 joi_flavor_tur.24.a: "This railway shall serve every pilgrim."
 joi_flavor_tur.24.b: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s devotion to Allah is beyond question!"

 joi_flavor_tur.25.t: "The Province of Egypt"
 joi_flavor_tur.25.d: "The rebellious Khedive of Egypt abandoned resistance and surrendered to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], who had personally led the campaign, after the armies of [ROOT.GetCountry.GetName] entered Cairo. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], like his ancestor of centuries past, #V Selim the Grim#!, entered Cairo beneath the banners of victory. Painters attached to the army recorded this epic moment, and many foreign observers held that it marked a great restoration of the power of the [ROOT.GetCountry.GetAdjectiveNoFormatting] state."
 joi_flavor_tur.25.f: "“The Khedive stood beneath the standards and cried out to the soldiers: ‘Aghas! Take heart! Fight, and I shall reward you!’ But no man heeded him, and the soldiers fled the field in droves. ‘Pray that Allah grant us victory!’ the Khedive shouted. ‘Now is the hour of prayer.’\n\nYet he found neither succour nor guard; and thereafter he felt a fire that could not be extinguished. The day was exceedingly hot, and between the two armies there hung an unusually heavy cloud of dust. It was a day on which Allah’s wrath fell upon the Egyptian army, and the Egyptian army ceased to fight.”"
 joi_flavor_tur.25.a: "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s bureaucrats shall replace the rule of the Khedive."
 joi_flavor_tur.25.b: "Appoint a new Governor of Cairo."
 joi_flavor_tur.26.t: "Ottoman Request for Intervention in Syria"
 joi_flavor_tur.26.d: "In consequence of the open rebellion of [SCOPE.sCountry('EGY_scope').GetName], the embassy of the Sublime Porte of [SCOPE.sCountry('TUR_scope').GetName] in our country delivered a diplomatic note yesterday, requesting that [ROOT.GetCountry.GetName] support their claim to recover Syria."
 joi_flavor_tur.26.f: "“The Padishah, perceiving that Muhammad Ali was not content with what he had already obtained, sought to forestall him and prevent further action on the part of [SCOPE.sCountry('TUR_scope').GetName], proposing that, if Ali withdrew from Syria and Crete and renounced all aspirations to complete independence, he should be granted hereditary rule in Egypt and the Arabian Peninsula.”\n\n“Within the Empire, however, both sides had already prepared for war. Ibrahim had assembled a considerable army in Syria. In Constantinople, the commander of [SCOPE.sCountry('TUR_scope').GetName], #yellow Hafiz Pasha#!, assured the Padishah that he could defeat the forces of [SCOPE.sCountry('EGY_scope').GetName].”"
 joi_flavor_tur.26.a: "This is no concern of ours."
 joi_flavor_tur.26.b: "We ought to support [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.27.t: "The Syrian Vilayet"
 joi_flavor_tur.27.d: "With the unrest in Syria put down, these old imperial territories have been reintegrated into the rule of the Porte, and [ROOT.GetCountry.GetName] has at last driven from Syria every enemy that dared covet this land."
 joi_flavor_tur.27.f: "“By the will of Allah, the Sublime Porte has established Damascus, Tripoli of Syria, Sidon, Safed, Aleppo, Jerusalem, and Nablus under the rule of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], permitting the pilgrimage to proceed and ordaining that sacrifices be offered each year at the tomb of the Prophet.”\n\n“The descendants of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] enjoy the title of Sheikh of Mecca, together with that of the district of Jeddah; moreover, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has granted the governor’s request that the district of Adana be placed under the governorship of Taurus, and has conferred upon him the title of Muhassil.”"
 joi_flavor_tur.27.a: "May the Lord’s peace be upon it."

 joi_flavor_tur.28.t: "The Most Sublime Realm"
 joi_flavor_tur.28.d: "As the dominions of [ROOT.GetCountry.GetName] have once more reached the frontiers of its age of splendour, surpassing even the achievements of #yellow Suleiman the Lawgiver#!, and as the glory of conquering the #V Eternal City#! has been set upon the brow of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], there can be no doubt that the #G [ROOT.GetCountry.GetAdjectiveNoFormatting] state#! has truly cast off the long centuries of weakness and decline and ascended once more to the summit of the world."
 joi_flavor_tur.28.f: "“Comrades, only now has the glory of this victory been made complete: in this hour of exultation, we possess the wealth of the Romans, have won their Empire, and their religion has been utterly extinguished. Our forefathers longed to attain this end; now you ought to rejoice, for it is by your valour that this Empire has been won for us.”\n\n“Allah has favoured that victorious cause, the sacred deeds of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], by which the world has been brought beneath the rule of the [ROOT.GetCountry.GetAdjectiveNoFormatting] people: [ROOT.GetCountry.GetAdjectiveNoFormatting], crown of the earth, whose majesty none may equal; she is ordained by fate—the city that shall rule over all nations!”"
 joi_flavor_tur.28.a: "Long live His Majesty [ROOT.GetCountry.GetRuler.GetFullName], Caesar of Rome and Emperor of the Two Seas and the Two Lands!"
 joi_flavor_tur.28.b: "May peace be upon him, His Majesty [ROOT.GetCountry.GetRuler.GetFullName], Padishah of the Turks and of Islam, the Supreme Caliph!"
 joi_flavor_tur.29.t: "The Barbary Province"
 joi_flavor_tur.29.d: "As Allah has willed, the infidels have been defeated, and the armies of [ROOT.GetCountry.GetName] have conquered the Maghrebi lands once held by the #yellow Barbary Corsairs#! in submission to the Porte, but later fallen into the hands of #yellow France#!. The winds of the Mediterranean blow across the harbour of Algiers; there can be no doubt that we now wield formidable power in the Mediterranean."
 joi_flavor_tur.29.f: "“In Tunis there are nearly two hundred schools established for the instruction of children,\nEach one broad as a spacious hall.\nThe master teaches not from books, but from a great board;\n\nEach day he expounds a verse of the Qur’an, reciting and repeating it,\nAgain and again, until the whole chapter is engraved upon the heart.\nIt often takes them seven full years,\nBefore the sacred words are fixed within their memory—\n\nAnd indeed, they accomplish it.”"
 joi_flavor_tur.29.a: "Barbary shall be organised as a Vilayet."
 joi_flavor_tur.29.b: "Power in Barbary ought to be restored to its lawful Emirs."
 joi_flavor_tur.30.t: "The Province of Transylvania"
 joi_flavor_tur.30.d: "The armies of [ROOT.GetCountry.GetName] have recovered Transylvania, seized by the House of Habsburg after 1687. [ROOT.GetCountry.GetRuler.GetFirstName] stands upon the high platform of ancient Bran Castle, beneath him the forests of Transylvania and the banners of the imperial host."
 joi_flavor_tur.30.f: "“I had the impression that we were leaving the West and entering the East.\nThat magnificent bridge over the Danube, where the river is broad and deep,\nCarried us into the lingering traces of Turkish rule.\n\nI had read somewhere that:\n‘All the superstitions of the world are gathered into the horseshoe of the Carpathians,\nAs though it were their central shrine.’\n\nIn that land dwell the descendants of the Dacians—\nTo the west the Magyars, and to the east and north the Székelys.\nAnd thither I am bound,\nTo the people who call themselves the descendants of Attila and the Huns.”"
 joi_flavor_tur.30.a: "Transylvania shall be established as a Vilayet."
 joi_flavor_tur.30.b: "The Province of Transylvania shall be restored!"
 joi_flavor_tur.31.t: "The Hungarian Possession"
 joi_flavor_tur.31.d: "The #yellow Kingdom of Hungary#! was once one of our chief rivals in Balkan affairs, especially after it fell under the dominion of the House of Habsburg. Yet fortune did not smile upon them, and this little kingdom has at last bowed once more before [ROOT.GetCountry.GetName], just as it did before Suleiman the Magnificent."
 joi_flavor_tur.31.f: "“Ah, only now is the plain truly desolate!\nWinter has come, and all the wealth of life has faded into emptiness.\nEven the smallest cricket no longer sings for the night.\nThe fields lie smooth as a frozen sea;\n\nThe sun flies low, like a weary bird,\nOr like an old traveller, dim of sight,\nWho must stoop low to discern the blurred shape of the earth.\nAnd even then, he can make out but little.\n\nAmong the grasses there is utter silence,\nAnd even the faintest insect-cry has vanished.”"
 joi_flavor_tur.31.a: "Hungary shall become our base for a renewed march upon Vienna."
 joi_flavor_tur.31.b: "Consolidate the territory; we must gain a footing in Central Europe."
 joi_flavor_tur.32.t: "The Second Treaty of Küçük Kaynarca"
 joi_flavor_tur.32.d: "The armies of [ROOT.GetCountry.GetName] have once again conquered many key territories of the Crimea, after the peninsula fell into the hands of [SCOPE.sCountry('RUS_scope').GetName] in 1783, including the Cossack steppe that once formed the Empire’s northern frontier. Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] believes it the wiser course to restore, in the name of the old #yellow Crimean Khanate#!, an autonomous Cossack state to govern this turbulent region."
 joi_flavor_tur.32.f: "“[SCOPE.sCountry('RUS_scope').GetName] shall restore Crimea, the Donbas, Kherson, and Moldavia. [ROOT.GetCountry.GetName] undertakes never to hinder the free exercise of the Christian religion in these territories, and shall permit any families wishing to depart the country to emigrate freely with all their property. From the date upon which this treaty comes into effect, [ROOT.GetCountry.GetName] shall remit all taxes upon the inhabitants of these regions for two years. When that term has expired, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] pledges to deal with them fairly and justly in matters of taxation.”\n\n“[SCOPE.sCountry('RUS_scope').GetName] undertakes that, whenever the [ROOT.GetCountry.GetAdjectiveNoFlag] Court shall wish to conclude any commercial treaty with the Empire’s protectorates, [SCOPE.sCountry('RUS_scope').GetAdjectiveNoFlag] shall employ its power and influence in aid of the [ROOT.GetCountry.GetAdjectiveNoFlag] Court; it further authorises the [ROOT.GetCountry.GetAdjectiveNoFlag] Sublime Porte to build in Moscow a public mosque of the ‘Arab rite’; said mosque shall forever remain under the protection of the Porte.”"
 joi_flavor_tur.32.a: "Crimea shall accept the direct rule of the Porte."
 joi_flavor_tur.32.b: "We ought to restore the Crimean Khanate as a protectorate."
 joi_flavor_tur.33.t: "Administration of the Caucasus"
 joi_flavor_tur.33.d: "With the armies of [ROOT.GetCountry.GetName] having utterly crushed the occupiers of [SCOPE.sCountry('RUS_scope').GetName], the Caucasus Mountains have once more been brought beneath the control of the Porte."
 joi_flavor_tur.33.f: "“I love to gaze upon the night sky from the crest of the stormy mountains—\nA sea of cloud rolling without bound;\nLightning flickers, thunder beats like drums,\nAnd torrents roar against the mountain wall.\n\nIn the Caucasus there is a kind of freedom—\nThe cliffs stand beneath the stars like iron,\nAnd snowy peaks burn with phantom light in the dark;\n\nEagles wheel, waterfalls sing,\nAnd man, here, feels his own smallness,\nYet is lifted by the spectacle into the sublime.”"
 joi_flavor_tur.33.a: "The Caucasus shall be organised into Vilayets."
 joi_flavor_tur.33.b: "Restore the puppet states of the Caucasus."
 joi_flavor_tur.34.t: "The Conquering Padishah"
 joi_flavor_tur.34.d: "The armies of [ROOT.GetCountry.GetName] have conquered lands upon which not even #yellow Mehmed the Conqueror#! ever set foot. By decree of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #V St Peter’s Basilica#! has been converted into a mosque, and four minarets have swiftly been raised around the most sacred church of the Catholic world. Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFullName] has suggested to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that perhaps we may imitate the example of the Conqueror and remove the capital to this former imperial seat of the #yellow Roman Empire#!."
 joi_flavor_tur.34.f: "“Among all these outrages, the profanation of #yellow St Peter’s Basilica#! was the most striking: the church was thronged with multitudes of people, praying in despair. The famous bronze doors were shut fast, and all within waited in agony for the coming of the [ROOT.GetCountry.GetAdjective] conquerors. Suddenly violent blows shook the gates and burst them open, and a bloodstained rabble poured into the sanctuary. To make room for themselves, and out of sheer greed, they began to brandish spears and scimitars.”\n\n“They looked about them and thought: fortune stands before us. In an instant all the young, the handsome, and the healthy were stripped naked, robbed of everything, and driven away; noble-born nuns and gentle young ladies of aristocratic house, now naked beneath their long hair, were reduced to slavery. Their [ROOT.GetCountry.GetAdjective] masters bound them with whatever lay at hand: belts, girdles, veils, sacred cords, tent ropes, camel halters, and horse reins... They were beaten and driven outside, drawn up in long lines to meet their shameful fate, and carried off to every corner of the Islamic world.”"
 joi_flavor_tur.34.a: "Konstantiniyye shall remain the capital, but Rome too shall receive her due station."
 joi_flavor_tur.34.b: "As Fatih conquered Constantinople, so Rome ought to become the new capital!"

 joi_flavor_tur.35.t: "Pacifying the Two Rivers"
 joi_flavor_tur.35.d: "After long years of investment and development in Mesopotamia, the fields of ancient Sumer and the Abbasids have at last once more been watered by [ROOT.GetCountry.GetName]. We have succeeded in mastering the floods that ravaged the land, reclaiming the soils affected by salinisation, and constructing a vast irrigation network covering some three million hectares of farmland."
 joi_flavor_tur.35.f: "“Baghdad—the Paradise of the Earth, the City of Peace, the Dome of Islam, the Meeting Place of the Two Rivers, the Pearl of Nations, the Eye of Iraq, the Court of the Caliph; her air is more nourishing than any air in the world; her waters sweeter than any waters in the world; her breeze gentler than any breeze in the world.”\n\n“As for the two noble rivers—the Tigris and the Euphrates—their fame alone suffices to spare all description; let it only be said that Allah has blessed them, and set them alongside their brother the Nile, that they may forever be praised and remembered among men.”"
 joi_flavor_tur.35.a: "The whole of [ROOT.GetCountry.GetName] shall benefit greatly from this."
 joi_flavor_tur.35.b: "The people of Mesopotamia shall be the chief beneficiaries."
 joi_flavor_tur.36.t: "Queen of Cities"
 joi_flavor_tur.36.d: "After a vast and costly programme of reconstruction, #yellow Konstantiniyye#!—the most renowned and illustrious city of [ROOT.GetCountry.GetName] for over a thousand years—has at last been modernised. Bridges have been built across the #yellow Golden Horn#!, and broad new boulevards, a new opera house, a central market, waterworks, railways, sewers, and parks have all been laid out. This city of long and glorious history now rises once more upon the Bosporus as a #V grand metropolis#!."
 joi_flavor_tur.36.f: "“I seemed to behold a vast sea of light, endless forms and colours glimmering there;\nThe prow had crossed the boundary: Constantinople was revealed!\n\nBoundless Constantinople, proud Constantinople, sublime Constantinople!\nGlory to the Creator, and to her people!\n\nAnd now, go on—profane this sacred vision, O humble pen, with your words!\nWho can describe Constantinople? Queen of Cities, desired by the world!”"
 joi_flavor_tur.36.a: "Queen of Cities—she is the brightest jewel of the Mediterranean!"
 joi_flavor_tur.36.b: "The City Desired by the World! No city shall surpass her!"

 joi_flavor_tur.37.t: "The Sick Man of Europe"
 joi_flavor_tur.37.d: "[ROOT.GetCountry.GetName] has now entered a period of steady decline. Unless we assert [ROOT.GetCountry.GetAdjectiveNoFormatting] sovereignty and reclaim our place in a world of contending powers, we shall face the danger of ruin."
 joi_flavor_tur.37.f: "We have declined, yet we may rise again. In a bold stroke, we abolished the Janissaries—those wretches who so lamentably monopolised power for centuries, and only at the very end consented to reform. Many local tyrants and ruffians have been uprooted, yet there is still far more work to be done.\n\nAnd yet the life of His Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], who presided over these reforms, now draws near its end. In the last years of his reign, we must replace the Janissaries with a truly modern army, and restore the [ROOT.GetCountry.GetAdjectiveNoFormatting] Sublime Porte as the very summit of civilisation. At the same time, securing our sovereignty, cultivating trustworthy foreign allies, and planning the recovery of the old lands of our Empire must be placed at the very forefront of the [ROOT.GetCountry.GetAdjectiveNoFormatting] agenda."
 joi_flavor_tur.37.a: "Even the greatest monarch must one day leave the stage. All we can do is play the final act well."

 joi_flavor_tur.38.t: "Provincial Appointment"
 joi_flavor_tur.38.d: "According to the traditions of [ROOT.GetCountry.GetName], our [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] ought, at this youthful age, to be appointed to govern some small outlying province as governor and ruler. Yet the mother of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], our Valide Sultan, does not support such a course."
 joi_flavor_tur.38.f: "Our beloved [ROOT.GetCountry.GetHeir.GetFirstName], who is also our heir, is still very young, and thus has much to learn of life and of the arts by which a good ruler is made. Most of our viziers hold that it is our duty to preserve the noble traditions of our dynasty by sending our son out to some small province to serve as its governor and ruler. There he may learn what it is to govern; and by granting them prosperous provinces in due measure, we may also lessen the likelihood of future struggles over the succession.\n\n[SCOPE.sState('prince_governor_state').GetCityHubName] has in the past served as such a place of appointment, and might be well suited to [ROOT.GetCountry.GetHeir.GetFirstName]. Others, however—including the mother of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], the Valide Sultan—hold that the young [ROOT.GetCountry.GetHeir.GetFirstName] would be better educated within the imperial harem, where he may be continually instructed by worthy tutors and kept under the watch of those who know him well."
 joi_flavor_tur.38.a: "The imperial harem is better suited to young [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.38.b: "Governing [SCOPE.sState('prince_governor_state').GetCityHubName] shall bring [ROOT.GetCountry.GetHeir.GetFirstName] many benefits."
 joi_flavor_tur.39.t: "Return from Appointment"
 joi_flavor_tur.39.d: "After a period of training, our [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] has returned from his post as governor. Yet, from all appearances, he seems not to have learned very much, and may still require further tempering."
 joi_flavor_tur.39.f: "[ROOT.GetCountry.GetHeir.GetFirstName] has now returned from his governorship. By his own account, the experience has caused him to grow in many respects, and he is now more prepared than ever to succeed to the throne when Allah calls our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\n\nWhat exactly our beloved son has learned is not entirely plain to us; but rumours are spreading through the harem that the only thing [ROOT.GetCountry.GetHeir.GetFirstName] has truly enlarged during his time in the provinces is his purse from tax collection."
 joi_flavor_tur.39.a: "Make arrangements; he still requires discipline."
 joi_flavor_tur.39.b: "All is well."
 joi_flavor_tur.40.t: "The Years as Governor of [SCOPE.sState('prince_governor_state').GetCityHubName]"
 joi_flavor_tur.40.d: "The experience of serving as governor in [SCOPE.sState('prince_governor_state').GetCityHubName] has beyond question granted our [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFullName], who shall one day rule [ROOT.GetCountry.GetName], many valuable lessons; it has also given him his first taste of real power."
 joi_flavor_tur.40.f: "[ROOT.GetCountry.GetHeir.GetFirstName] has now returned to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], bringing to an end his time as governor in [SCOPE.sState('prince_governor_state').GetCityHubName]. [ROOT.GetCountry.GetHeir.GetFirstName] declares that these years have taught him a great many things, chiefly what it means to be a ruler, and how our provincial system truly operates.\n\nIn the years during which [ROOT.GetCountry.GetHeir.GetFirstName] was away from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], he also had ample opportunity to command local troops, supervise the administrative system, and treat with provincial powers, all of which shall better fit him to become a distinguished [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in future."
 joi_flavor_tur.40.a: "He has proved himself a true son of Osman."
 joi_flavor_tur.41.t: "Coming-of-Age Ceremony"
 joi_flavor_tur.41.d: "According to the traditions of [ROOT.GetCountry.GetName], when our [ROOT.GetCountry.GetHeir.GetFirstName] [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] reaches his sixteenth year and undergoes his coming-of-age ceremony, he ought to be assigned to the imperial army, so that he may gain experience of command and win the confidence of the troops."
 joi_flavor_tur.41.f: "Like the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]s of old, [ROOT.GetCountry.GetHeir.GetFirstName] longs to win for himself the name of conqueror, and to be hailed as a [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] who leads an empire from horseback. Given that [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] remains in good health, and that we do not intend to send the [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] truly into battle, the fulfilment of that dream must remain uncertain for the present.\n\nYet now [ROOT.GetCountry.GetHeir.GetFirstName] is mocked by the other princes, and his mother asks that the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] grant him a force of his own. This is not an unreasonable request; nevertheless, when men seek to risk the life and person of our beloved heir, we must carefully consider what motives lie behind their counsel."
 joi_flavor_tur.41.a: "This shall do [ROOT.GetCountry.GetHeir.GetFirstName] good."
 joi_flavor_tur.41.b: "He is far safer in the harem."
 joi_flavor_tur.42.t: "The Support of the Valide Sultan"
 joi_flavor_tur.42.d: "We have marked out [ROOT.GetCountry.GetHeir.GetFirstName] as the best candidate for succession, and the Crown Prince is the most favoured among all the princes of the Empire and their mothers. Even so, his succession has proven more difficult than anyone imagined, and many lay the blame upon our Haseki Sultan. In order to thwart this destructive intrigue, however, the Valide Sultan herself—the mother of His Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]—has stepped forward to defend [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.42.f: "“Rumour has it that [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s most beloved son, [ROOT.GetCountry.GetHeir.GetFirstName], is plotting rebellion against his father [ROOT.GetCountry.GetRuler.GetFirstName] and the overthrow of the state. Majesty, I implore you to cut this tumour from the body of the realm, and put [ROOT.GetCountry.GetHeir.GetFirstName] to death.”\n\n“Yet my son, His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] of Empire and Porte, surely the Haseki Sultan speaks here for her own interest; [ROOT.GetCountry.GetHeir.GetFirstName] is not her son, but another very well might stand to profit in his place. You ought to bear this in mind. I have often offered counsel and protection to his cause, and I do not believe him to be such a man.”\n\n“Majesty, [ROOT.GetCountry.GetHeir.GetFirstName] is the most suitable heir. Yet he has many brothers, jealous of his station as successor, and these brothers each hold office across the Empire. These worthless fools think only of disrupting his reign and advancing themselves when he ascends the throne. It may therefore be best, while we still have time, to cut down these wolves and jackals. Yet such a course, too, may have unforeseen consequences in future. Majesty, we must proceed with the utmost caution and deliberation.”"
 joi_flavor_tur.42.a: "Recall [ROOT.GetCountry.GetHeir.GetFirstName]; he must be closely investigated."
 joi_flavor_tur.42.b: "There can be no doubt—his mother’s support is just, and [ROOT.GetCountry.GetHeir.GetFirstName] is innocent."
 joi_flavor_tur.42.c: "Severely punish the slanderous courtier, and send word to [ROOT.GetCountry.GetHeir.GetFirstName] that his father places full trust in him."
 joi_flavor_tur.43.t: "Prosperity in [SCOPE.sState('prince_governor_state').GetCityHubName]"
 joi_flavor_tur.43.d: "Lately, the task of governing [SCOPE.sState('prince_governor_state').GetCityHubName] has been entrusted to our [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFullName], and the swiftness with which he has handled these affairs has exceeded our expectations. The local economy has flourished, the city centre has drawn more merchants and craftsmen to settle there, and the tax revenues have improved over the long term."
 joi_flavor_tur.43.f: "“[SCOPE.sState('prince_governor_state').GetCityHubName], a truly peaceful and prosperous town beneath the rule of Allah: its people are wise, charming, graceful, and learned. Its climate is gentle, and every good thing is gathered there, so that all men desire it. Men would wage any war for it, and every hand would be raised in its defence. Its fame is so great that no further word is needed; its splendour far exceeds our imagining, and none may compare with it.”"
 joi_flavor_tur.43.a: "Do not rejoice too soon."
 joi_flavor_tur.43.b: "Excellent indeed."
 joi_flavor_tur.44.t: "The Prince-Governor at the Front"
 joi_flavor_tur.44.d: "To our satisfaction, our [ROOT.GetCountry.GetHeir.GetFirstName] [Concept('concept_heir','$RULER_TITLE_SEHZADE$')], who has been serving in the army, has gained greatly from his long military career, and this has now become manifest in war. In a recent engagement he was ordered to lead a battalion in assault, and, thanks be to Allah, won an unprecedented victory. His tactical thinking has been praised alike by comrades and superiors; even the Sword-Bearing Pasha, [SCOPE.sCharacter('progress_pasha_scope').GetFullName], who had previously paid little heed to his service, is now planning to transfer him to more critical duties."
 joi_flavor_tur.44.f: "The recent war against [SCOPE.sCountry('enemy_country_scope').GetName] has given Prince-Governor [ROOT.GetCountry.GetHeir.GetFirstName] an opportunity truly to prove his worth as a military commander and holy warrior: according to the reports, he did all in his power within his sphere to defeat the enemy’s forces, carrying the flames of war across the frontier into the lands beyond. The faithful flock eagerly to his banners, and the elite of the army have begun to take notice of him, and may well support him in future struggles for the succession.\n\n“You are worthy of praise like the House of Muhammad! Recite the valour of [ROOT.GetCountry.GetHeir.GetFirstName], that praised one in the flower of youth and glory: he is our hope in hard times, and bears the honour of glorious Hasan; like the generous and radiant sun, like the glory and sublimity of the world: you are the lion of war, the beast of victory!”"
 joi_flavor_tur.44.a: "[ROOT.GetCountry.GetHeir.GetFirstName] may be transferred to command cavalry for further instruction."
 joi_flavor_tur.44.b: "[ROOT.GetCountry.GetHeir.GetFirstName] ought to be exposed to our most advanced artillery arm."
 joi_flavor_tur.45.t: "Son of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
 joi_flavor_tur.45.d: "It is well known that the succession of [ROOT.GetCountry.GetName] is unstable under the present circumstances. Vizier [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] insists that the time has come for the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to designate the [concept_heir] of his own choosing, so as to avert the worst succession struggle that may otherwise arise."
 joi_flavor_tur.45.f: "His august Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], ruler of [ROOT.GetCountry.GetName], Sultan of Sultans, is renowned as a great man and an unshakable sovereign. Befitting such rank and ability, he has also fathered many children of great promise, and some among them display the qualities of kingship.\n\nOur officials and these sons alike know that only one may inherit the supreme dignity, and know also what awaits the losers. The appointment of a [concept_heir]—though it may not wholly prevent them from contending over their favourite candidate—may yet avert the worst of the succession struggles that are likely to follow if our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] goes to Allah without having clearly designated his successor."
 joi_flavor_tur.45.a: "The most devout son is our best choice."
 joi_flavor_tur.45.b: "The strongest son is our best choice."
 joi_flavor_tur.45.c: "The most orthodox son is our best choice."
 joi_flavor_tur.45.e: "The most just son is our best choice."
 joi_flavor_tur.45.g: "The most learned son is our best choice."
 joi_flavor_tur.46.t: "A New Sword-Bearing Pasha?"
 joi_flavor_tur.46.d: "The present Sword-Bearing Pasha, [SCOPE.sCharacter('progress_pasha_scope').GetFullName], though a most valiant man who has rendered great services both to [ROOT.GetCountry.GetName] and to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], is, for one reason or another, to be removed from political office by decision of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and replaced by another pasha. What manner of Sword-Bearing Pasha ought we now to seek?"
 joi_flavor_tur.46.f: "“It is said that the Prophet Muhammad once declared: ‘Allah loves courage, even if it be shown only in the killing of a snake.’ And [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]—may Allah have mercy upon his soul—was indeed among the greatest of warriors, resolute in mind, fierce in bearing, and of extraordinary composure, so that no turn of fortune could make him afraid.”\n\n“I myself saw him, at the beginning of the harsh winter, after he had issued his orders to the host, confront the greater part of the enemy with only a scant handful of followers and without once giving ground. I later asked the king upon the coast, who at the time sat with the Sultan and spoke on a day of truce of the enemy’s numbers.”\n\n“The interpreter conveyed his reply: ‘I went with the lord of Tyre to observe their camp, and when we looked down from the heights and reckoned their strength, we found their army to number five hundred thousand men.’”"
 joi_flavor_tur.46.a: "We require a pasha of illustrious military achievement."
 joi_flavor_tur.46.b: "An enlightened and reforming pasha would best serve our interests."
 joi_flavor_tur.46.c: "Above all, the army must remain loyal to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_tur.46.e: "Let the army put forward a pasha of its own."
 joi_flavor_tur.47.t: "The Proclamation of Jihad"
 joi_flavor_tur.47.d: "The recent war against the wicked infidels of [SCOPE.sCountry('enemy_country_scope').GetName] has moved the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], with the aid of the Grand Mufti [SCOPE.sCharacter('progress_pasha_scope').GetFullName], to summon all Muslims, in the name of the Caliph of all [GetReligion('sunni').GetName] and [GetReligion('shiite').GetName], to wage jihad against the infidel. May Allah preserve [ROOT.GetCountry.GetName]!"
 joi_flavor_tur.47.f: "“My heroic soldiers: upon the sacred path of holy war and battle which we have undertaken, against the enemies who threaten our radiant faith and our beloved homeland, you must never abandon your resolve, your steadfastness, or your spirit of self-sacrifice, not even for a moment. Drive the enemy before you as though you were driving lions. With this sacred decree, I call upon three hundred million believers in Islam to take part in this greatest jihad, and the very survival and fate of [ROOT.GetCountry.GetName] depend upon your victory. The prayers and blessings of three hundred million innocent and oppressed believers, offered in boundless joy and exaltation in mosques and sacred houses across the world, are with you in the embrace of Allah.”\n\n“My soldier sons: the duty laid upon you now is one that no army in the world has ever before been entrusted with: prove yourselves the true heirs of the Ottoman armies that once shook the world, and ensure that the infidel enemy shall never again dare set foot upon our holy lands. There can be no doubt that the grace of Almighty Allah and the sacred aid of our glorious Prophet shall help us to triumph over the enemy. Do not forget that you are also the comrades of the bravest and greatest army in the world, and that in today’s war we fight side by side with them. May the righteous martyrs bring us tidings of victory, may the holy war of the ghazis be blessed, and may their swords remain sharp.”"
 joi_flavor_tur.47.a: "Mobilise the whole Islamic world for a death struggle against the infidel!"
 joi_flavor_tur.47.b: "Ensure that our ghazi warriors remain zealous for holy war."
 joi_flavor_tur.48.t: "Courtly Rewards"
 joi_flavor_tur.48.d: "To mark the loyalty of the various ranks of bureaucrats and dignitaries within the Porte, and to placate them besides, His Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has decided to bestow a public reward upon all officials of the Porte deemed meritorious."
 joi_flavor_tur.48.f: "“He never kept gold and silver treasure within his own vaults. On the contrary, whenever wealth came into his hands, he spent it in the cause of Allah, giving alms to the poor and to those who strove in Allah’s path. He used to say: ‘By Allah, I shall not leave so much as a single coin within my house.’\n\nWhenever he saw the poor, his heart would grow tender, and at times he would even strip off his own garments to lay them over them. He delighted in forgiving others, and often said: ‘Before me, men are the creatures of Allah. If I forgive them, Allah will forgive me also.’”"
 joi_flavor_tur.48.a: "A double reward of gold and honour shall ensure loyalty."
 joi_flavor_tur.48.b: "Let us reward them with some gold."
 joi_flavor_tur.48.c: "A few titles shall suffice to humour them."
 joi_flavor_tur.49.t: "A New Grand Vizier?"
 joi_flavor_tur.49.d: "Though the present Grand Vizier, [SCOPE.sCharacter('progress_pasha_scope').GetFullName], has discharged his duties well enough, the demands of the current political situation have led His Majesty the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to resolve upon appointing a new Grand Vizier."
 joi_flavor_tur.49.f: "“O thou, my vizier of enlightened mind, my faithful servant, Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFullName]! Once this imperial rescript of mine reaches thee, thou shalt delay not for a single moment—thou shalt go forth with my great commander, Pasha [SCOPE.sCharacter('army_pasha_scope').GetFirstName], unto the holy campaign; with the forces of the household well-ordered and made ready, thou shalt set out upon the monarch’s war.”\n\n“Pasha [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] is a warrior-minister who fights for the cause of the Lord—how then could I put him to death here and now? For our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Majesty all his life has been most careful to avoid killing with his own hand or causing another to be slain; he always strives, as far as possible, neither to kill nor to have men killed.”"
 joi_flavor_tur.49.a: "Our Grand Vizier must above all know how to carry out the Sultan’s will."
 joi_flavor_tur.49.b: "We may as well accept the recommendation from below."
 joi_flavor_tur.50.t: "The Porte Council of [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_tur.50.d: "His Majesty [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]—master of Topkapı and of the Porte—has issued an imperial decree ordaining that this year’s Porte Council shall assemble in [TimeKeeper.GetCurrentDate.Format('y m')] to deliberate upon the present condition of [ROOT.GetCountry.GetName]."
 joi_flavor_tur.50.f: "“The fixing of taxes is also of the utmost importance, for a state that maintains the land must of necessity maintain soldiers, barracks, and other indispensable expenses, and these require money to administer them, while that money comes from the taxes of the subjects. It is therefore important that taxation be regarded in a proper light; thanks be to Allah, for in former times men thought of taxes only as revenue, and that money merely fell into the hands of the Porte.”\n\n“In order that they may be free from interference by any side, and that, where accusation or crime is concerned, since they have not themselves been harmed by accusation or crime, their property ought not to be confiscated, nor should they be deprived of their inheritance. Muslims and all others who represent our sublime sovereignty ought, without exception, to be granted this permission.”"
 joi_flavor_tur.50.a: "The Porte ought to concern itself with the domestic economy."
 joi_flavor_tur.50.b: "The Porte must focus upon the navy."
 joi_flavor_tur.50.c: "The Porte must give priority to land defence."
 joi_flavor_tur.50.e: "The clouds of rebellion gather! Investigate the traitors within the Porte with the utmost rigour."
 joi_flavor_tur.50.g: "The Porte must aid the people of the Empire."
 joi_flavor_tur.51.t: "Heartbroken"
 joi_flavor_tur.51.d: "Our [ROOT.GetCountry.GetHeir.GetFirstName] [Concept('concept_heir','$RULER_TITLE_SEHZADE$')], who has secretly been serving with the army, was recently unfortunate enough to be shot during a frontier skirmish. The bullet passed clean through his body, though it struck no vital organ. Even so, grave infection and the wound itself now threaten his life."
 joi_flavor_tur.51.f: "How innocent that smile was; the way he used to ask, so curiously, about all the affairs of the Empire moved me so deeply. ‘Father!’ he would say, ‘Father, how vast are the Holy Lands?’—asking it again and again. I still remember our laughter as we tasted fruit together. I believed... I believed that all I had done for him would lead to a better end. Yet plainly, I was mistaken. My strong and healthy prince is wounded, so terribly wounded, and now he lies before me, perhaps on the verge of sleeping forever.\n\nIn the beads of sweat upon his brow are reflected the anxious eyes of his attendants, fearful for [ROOT.GetCountry.GetHeir.GetFirstName]’s life; he may not live to see the morning. I do not wish this to be the last time I behold him, but only Allah may decide that, and guilt weighs heavily upon my heart. In sleep, the faces of all my own flesh and blood rise before me out of memory—how am I now to face my wives and concubines? Now there is only guilt and shame."
 joi_flavor_tur.51.a: "Let us pray for [ROOT.GetCountry.GetHeir.GetFirstName]’s life."
 joi_flavor_tur.51.b: "Fetch a well-trained physician at once."
 joi_flavor_tur.51.c: "Treat him with the latest medicines."
 joi_flavor_tur.51.e: "We must organise an international consultation of experts."
 joi_flavor_tur.51.h: "The newly developed antibiotic remedies are sure to help."

 joi_flavor_tur.52.t: "The Armenian Genocide!"
 joi_flavor_tur.52.d: "As the hostility of the [SCOPE.sCulture('turkish_scope').GetName] people of [ROOT.GetCountry.GetName] towards the [SCOPE.sCulture('armenian_scope').GetName]s has reached its height, a secret order for massacre—planned in person by [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] and approved by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]—has spread through the Empire’s garrisons. An unprecedented slaughter has begun, and foreign journalists arriving to investigate have uncovered the crime. The *Times*, in fury, has denounced the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] as an ‘Enemy of Mankind’."
 joi_flavor_tur.52.f: "“On the afternoon of [TimeKeeper.GetCurrentDate.Format('m d')], I witnessed a scene that shall be engraved upon my mind forever, the most dreadful spectacle I have ever beheld: along the northern wall of the mass grave lay countless butchered corpses of [SCOPE.sCulture('armenian_scope').GetName]s, strewn in all directions. Many bodies had been hideously mutilated beyond recognition. I saw one corpse whose face had been crushed out of all shape by some heavy object. I saw some whose necks had almost been severed by the knife. I also saw one body whose chest had been flayed, whose forearm had been cut off, and whose upper arm had likewise been stripped of skin.”\n\n“When I asked whether dogs had done it, they told me that it was the [SCOPE.sCulture('turkish_scope').GetName]s with knives. A dozen bodies had been half-burnt. All the corpses had been stripped of their clothing save for one or two cotton undergarments... It is one thing to be slain by brave men upon the battlefield; it is quite another to be cold-bloodedly butchered by cowardly armed soldiers while utterly defenceless.”"
 joi_flavor_tur.52.a: "This is but a merciful special programme of instruction; pay no heed to the ravings of foreign powers."
 joi_flavor_tur.53.t: "The Armenian Revolt of [SCOPE.sState('armenian_scope').GetCityHubName]"
 joi_flavor_tur.53.d: "A group of [SCOPE.sCulture('armenian_culture_scope').GetName]s seeking autonomy, radicalised by the recent and continual rise in anti-[SCOPE.sCulture('armenian_culture_scope').GetName] sentiment, has launched an armed attack in [SCOPE.sState('armenian_scope').GetCityHubName]. It is said that the local offices of government have already fallen—though some officials maintain that this is mere nonsense invented by the local Beys to excuse themselves."
 joi_flavor_tur.53.f: "“My report from [SCOPE.sState('armenian_scope').GetCityHubName] differs from Your Excellency’s,” [SCOPE.sCharacter('tur_pasha_scope').GetFirstName] said hesitantly, in a tone of punctilious care. “My report mentions no revolt whatsoever among the local populace, but rather months of provocative repression by the district and local officials. What they describe are trifling disturbances, the sort that could easily be calmed by strengthening the town police, and any fair-minded man can readily see that the dispatch of more than a thousand soldiers as reinforcements was a deliberate act.”"
 joi_flavor_tur.53.a: "Show mercy to the people of [SCOPE.sState('armenian_scope').GetCityHubName]."
 joi_flavor_tur.53.b: "The revolt must be crushed, even if it means slaughter on a grand scale!"
 joi_flavor_tur.54.t: "The [ROOT.GetCountry.GetRuler.GetFirstName] Massacres"
 joi_flavor_tur.54.d: "Hostility towards the [SCOPE.sCulture('armenian_culture_scope').GetName]s is growing ever fiercer, and even [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] himself has begun to incline towards the view that the [SCOPE.sCulture('armenian_culture_scope').GetName]s ought to be ‘utterly exterminated’. He is attempting to direct officers loyal to him in [SCOPE.sState('armenian_scope').GetCityHubName], such as [SCOPE.sCharacter('tur_pasha_scope').GetFirstName], secretly to eradicate the local [SCOPE.sCulture('armenian_culture_scope').GetName] community."
 joi_flavor_tur.54.f: "“The condition of [SCOPE.sState('armenian_scope').GetCityHubName] is beyond description. The town has been plundered and laid waste: the number of dead cannot be reckoned. Corpses lie scattered throughout the streets. When I went out on Friday, I had to pick my way carefully between the bodies so as not to tread upon them. On Saturday morning, I counted a dozen cartloads of [SCOPE.sCulture('armenian_culture_scope').GetName] corpses carried to the river and thrown in, all within half an hour. In their cemetery, graves are being dug in batches.”\n\n“On Friday afternoon, 250 so-called [ROOT.GetCountry.GetAdjectiveNoFormatting] reservists, without officers, hijacked a train in [SCOPE.sState('capital_state').GetCityHubName] and forced the driver to take them to [SCOPE.sState('armenian_scope').GetCityHubName]. There they took part in the utter destruction of the [SCOPE.sCulture('armenian_culture_scope').GetName] quarter of [SCOPE.sState('armenian_scope').GetCityHubName], which was the finest part of the town. Their plundering was as thorough as it was swift.”"
 joi_flavor_tur.54.a: "Stop the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s senseless command."
 joi_flavor_tur.54.b: "Well done, [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]! We call that efficiency."
 joi_flavor_tur.55.t: "The Assassination of Pasha [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]"
 joi_flavor_tur.55.d: "Yesterday, an [SCOPE.sCulture('armenian_culture_scope').GetName] student in the capital openly shot dead our Pasha, [SCOPE.sCharacter('tur_pasha_scope').GetFullName], in the street. At a busy corner he fired at close range into the back of his neck; the bullet passed through his spinal cord and emerged above his left eye, shattering his brain and killing him instantly. At today’s trial, several eminent foreign barristers appeared for the defence, arguing before the court that he was no murderer, but merely the instrument of justice, carrying out a sacred revenge upon Pasha [SCOPE.sCharacter('tur_pasha_scope').GetFirstName], who had organised several massacres."
 joi_flavor_tur.55.f: "“By order of that wretched man, a gendarme took away my sister; hundreds violated her, and her body was left exposed in the street. Armed gendarmes forced the Armenians of the town to abandon home and property, and no sooner had we left the city than the gendarmes began to shoot the victims and rob us of what we possessed.”\n\n“I would rather die now than speak once more of those dark days: I do not think myself guilty, for my conscience is clear... I killed a man, but I am not a murderer.”\n\n“I had a dream: the images of the massacres appeared before my eyes again and again. I saw the corpse of my mother. The corpse rose to its feet, came before me, and said: ‘You saw [SCOPE.sCharacter('tur_pasha_scope').GetFirstName] here, and yet remained indifferent? You are no longer my son!’”"
 joi_flavor_tur.55.a: "The Pasha is dead; I have no wish to judge right or wrong... Let the [SCOPE.sCulture('armenian_culture_scope').GetName]s answer for it!"
 joi_flavor_tur.55.b: "The massacres of Pasha [SCOPE.sCharacter('tur_pasha_scope').GetFirstName] were monstrous! Acquit the assassin!"
 joi_flavor_tur.56.t: "The Massacre of [SCOPE.sState('armenian_state_scope').GetCityHubName]"
 joi_flavor_tur.56.d: "A brutal scheme for the massacre of the [SCOPE.sCulture('armenian_scope').GetName]s has been laid before the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. The officer organising the massacre has informed the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that he is prepared utterly to exterminate the [SCOPE.sCulture('armenian_scope').GetName]s of [SCOPE.sState('armenian_state_scope').GetCityHubName], so as to make living space for true [ROOT.GetCountry.GetAdjective] citizens."
 joi_flavor_tur.56.f: "“The [SCOPE.sCulture('armenian_scope').GetName]s were compelled to divide themselves into four groups of 500 families each and leave [SCOPE.sState('armenian_state_scope').GetCityHubName] for Erzincan. They were forced to walk over the corpses of other [SCOPE.sCulture('armenian_scope').GetName]s who had been murdered earlier. She testified that upon reaching Erzincan, the men were separated from the other deportees, tied together, and cast into the river.”\n\n“The gendarmes came and selected the prettiest women and girls, and any who refused were run through with bayonets and had their legs torn apart; the executioners ripped open the bellies of pregnant women and murdered their children. This was in truth the destruction of the entire [SCOPE.sCulture('armenian_scope').GetName] people.”"
 joi_flavor_tur.56.a: "Stop this atrocity! The [SCOPE.sCulture('armenian_scope').GetName] Dhimmis are protected by the Sacred Law!"
 joi_flavor_tur.56.b: "Butcher the [SCOPE.sCulture('armenian_scope').GetName]s of [SCOPE.sState('armenian_state_scope').GetCityHubName]!"

 joi_flavor_tur.57.t: "The Bulgarian Genocide!"
 joi_flavor_tur.57.d: "On [TimeKeeper.GetCurrentDate.Format('y m d')], a secret order signed by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] was delivered to the garrison in Sofia, and a mass genocide of the [SCOPE.sCulture('bulgarian_scope').GetName] people began."
 joi_flavor_tur.57.f: "“The number of children slain in these massacres is astounding. They were often bayoneted, and we have had several witnesses tell us that they saw tiny infants being carried through the streets upon bayonets, both here and at Otluk-Köy. The reason is simple. Once a Muslim has killed a certain number of infidels, whatever sins he may have committed, he is assured of paradise.”\n\n“There was a heap of skulls, mingled with bones from every part of the human body, nearly complete skeletons rotting away, with clothes, hair, and decaying flesh piled into a mass of unspeakable filth, among which luxuriant weeds had grown. It gave off a sickening odour, like that of dead horses, and our untimely arrival interrupted the dogs at their feeding... The ground there was strewn everywhere with skeletons, still clinging with fragments of clothing and putrid flesh.”"
 joi_flavor_tur.57.a: "We call that efficiency."

 joi_flavor_tur.58.t: "The Serbian Genocide!"
 joi_flavor_tur.58.d: "On [TimeKeeper.GetCurrentDate.Format('y m d')], a secret order signed by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] was delivered to the garrisons stationed in Serbia, and a mass genocide of the [SCOPE.sCulture('serb_scope').GetName] people began."
 joi_flavor_tur.58.f: "“About four hours from the town of Yozgat, we saw hundreds of heads with long hair hanging over their shoulders in a valley—these were the heads of women and girls. The commander of the gendarmerie escort was named Şükrü. I said to him: ‘I thought only the men were killed.’\n\nHe replied: ‘No. If we kill only the men and not the women and children, then in fifty years the [SCOPE.sCulture('serb_scope').GetName]s will again number in the millions. Therefore we must destroy the women and the children as well, if we are to solve the matter once and for all, both at home and abroad; we must make certain that there shall never be any witnesses left to testify. And if need be, we can always drive them into the Syrian desert to starve.’”"
 joi_flavor_tur.58.a: "We call that efficiency."

 joi_flavor_tur.59.t: "The Assyrian Genocide!"
 joi_flavor_tur.59.d: "On [TimeKeeper.GetCurrentDate.Format('y m d')], a secret order signed by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] was delivered to the garrison at Mosul, and a mass genocide of the [SCOPE.sCulture('assyrian_scope').GetName] people began."
 joi_flavor_tur.59.f: "“I beseech my countrymen,” he wrote, “that more than the fate of any other people in Europe, the fate of the [SCOPE.sCulture('assyrian_scope').GetName]s depends upon you, and that you demand and insist that our government, having long striven in one direction, must now strive in the opposite direction, and do all in its power, together with the nations of Europe, to destroy the administrative authority of [ROOT.GetCountry.GetName] over the [SCOPE.sCulture('assyrian_scope').GetName]s. Let the [SCOPE.sCulture('turkish_scope').GetName]s now end their outrages in the only possible way—by bringing ruin upon themselves...”"
 joi_flavor_tur.59.a: "This is all part of some foreign plot!"

 joi_flavor_tur.60.t: "The Greek Genocide!"
 joi_flavor_tur.60.d: "On [TimeKeeper.GetCurrentDate.Format('y m d')], a secret order signed by [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] was delivered to the garrison in Macedonia, and a mass genocide of the [SCOPE.sCulture('greek_scope').GetName] people began."
 joi_flavor_tur.60.f: "“Every sign indicates that the [SCOPE.sCulture('turkish_scope').GetName]s intend to treat the [SCOPE.sCulture('greek_scope').GetName]s as they treated the [SCOPE.sCulture('armenian_scope').GetName]s, by marking them out as enemies of the state to be removed. The method adopted by the [SCOPE.sCulture('turkish_scope').GetName]s is to deport people into the interior without taking any measures for their survival, leaving them to perish from death, hunger, and disease. Thereafter they plunder and burn or destroy the abandoned houses. What the [SCOPE.sCulture('turkish_scope').GetName]s have done to the [SCOPE.sCulture('greek_scope').GetName]s is precisely what they once did to the [SCOPE.sCulture('armenian_scope').GetName]s.”"
 joi_flavor_tur.60.a: "We call that efficiency."

 joi_flavor_tur.61.t: "The Rise of the [GetIdeology('ideology_ottomanism').GetName] Movement"
 joi_flavor_tur.61.d: "A current of thought known as [GetIdeology('ideology_ottomanism').GetName] is rising in [ROOT.GetCountry.GetName]. Its supporters believe that it may forge a new national unity, and thereby prevent the Empire from being torn apart by the Millet system built upon religious division."
 joi_flavor_tur.61.f: "“When we speak of ‘protected peoples’, we mean that they are bound by the covenant of Allah, His Messenger, and the Muslim community, and that they are owed protection as a duty incumbent upon every man; that is the meaning of the term. At present, however, many of our brethren take offence at the word ‘protected people’, and I have written in my book that I see no reason why the ijtihad of modern Islam should not abandon the expression ‘protected people’ and instead call them non-Muslim citizens.”\n\n“No protected person ought to be beaten for the collection of the Jizya, nor forced to stand beneath the burning sun, nor have any hateful thing inflicted upon his body, nor suffer any such treatment. On the contrary, [ROOT.GetCountry.GetName] ought to treat them with forbearance.”"
 joi_flavor_tur.61.a: "We belong to Allah alone, and to Him we shall return!"
 joi_flavor_tur.61.b: "Our fatherland belongs to every Ottoman, whatever his origin!"
 joi_flavor_tur.62.t: "The Bankruptcy of [GetIdeology('ideology_ottomanism').GetName]"
 joi_flavor_tur.62.d: "The attempt to establish a new #yellow Ottoman#! national identity has failed. Many now believe that unless steps are taken to save our territories, the great [ROOT.GetCountry.GetName] will be torn to pieces by the raging storms of religious segregation and nationalism."
 joi_flavor_tur.62.f: "“Christians and Turks can no longer live together: only a Christian government can provide equality, justice, and liberty of conscience. Christian rule must replace Muslim rule... Eastern Anatolia and Cilicia are the regions in which Christian government should be established; the Christians of Turkey desire this, that is to say, they are demanding Christian rule, as elsewhere in Europe.”"
 joi_flavor_tur.62.a: "This is the will of Allah."
 joi_flavor_tur.62.b: "The legacy of [GetIdeology('ideology_ottomanism').GetName] still profits us greatly."
 joi_flavor_tur.63.t: "The National Assembly of the [SCOPE.sCulture('gtr_event_scope').GetName]"
 joi_flavor_tur.63.d: "The old Millet order of the [SCOPE.sCulture('gtr_event_scope').GetName] has accepted our reforms, abolishing all inequalities imposed upon the local people and guaranteeing the equal rights of the [SCOPE.sCulture('gtr_event_scope').GetName] in the constitution. Local autonomous assemblies and institutions have been established, it has been proclaimed that the appointment and dismissal of native officials shall henceforth be decided by the local assembly and people themselves, and they have been granted the power to levy and allocate a portion of their own taxes. [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], meanwhile, shall no longer interfere in the internal governance of the region, and shall instead concern itself only with common defence and foreign affairs."
 joi_flavor_tur.63.f: "“Whenever legislators endeavour to take away and destroy the property of the people, or reduce them to slavery under arbitrary power, they put themselves into a state of war with the people. Thereupon the people are absolved from any further obedience, and may appeal to that common refuge which God hath provided for all men against force and violence.”\n\n“Thus whenever the legislators transgress this fundamental rule of society, or, through ambition, fear, folly, or corruption, seek to seize or place into the hands of others an absolute power over the lives, liberties, and estates of the people, they forfeit, by breach of trust, the power the people had placed in their hands for purposes altogether contrary, and it devolves to the people, who have a right to resume their original liberty.”"
 joi_flavor_tur.63.a: "The autonomy of the [SCOPE.sCulture('gtr_event_scope').GetName] people shall be guaranteed by the constitution!"

 joi_flavor_tur.64.t: "The Salafi Movement"
 joi_flavor_tur.64.d: "A fundamentalist [GetReligion('sunni').GetName] movement known as the ‘Salafi Movement’ is rising within [ROOT.GetCountry.GetName]. [GetIdeology('ideology_salafi').GetName] seeks utterly to cleanse the country of the poisons brought by the movement of modernisation, by restoring the pure traditions of Islam as practised by the Prophet Muhammad, his Companions, and the generations that transmitted after them."
 joi_flavor_tur.64.f: "“To declare oneself a follower of the pious forefathers, to belong to their school, and to take pride in that, is no shame; on the contrary, by the consensus of the scholars, it ought to be accepted. The jurisprudential school of the Salaf must necessarily be the truth. If a man adheres inwardly and outwardly to that doctrine, then he is as one who follows the truth both inwardly and outwardly.”\n\n“It is very simple. We want the Sharia. We want the Sharia in economics, in politics, in justice, in the guarding of frontiers, and in foreign relations.”"
 joi_flavor_tur.64.a: "[ROOT.GetCountry.GetName] shall press resolutely onward upon the path of modernisation!"
 joi_flavor_tur.64.b: "The sayings and deeds of the Prophet and the Hadith shall become the sacred standard of governance in [ROOT.GetCountry.GetName]."
 joi_flavor_tur.65.t: "The New Islamic World"
 joi_flavor_tur.65.d: "Now that [ROOT.GetCountry.GetName] has begun thoroughly to enforce the [GetReligion('sunni').GetName] Sharia in politics, diplomacy, and the military, and to extirpate from the Empire the corrupting poisons of such evil modern ideologies as liberalism and socialism, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] believes that the time has come to summon a congress of Muslims from across the world, so as to consolidate his supreme position as [Concept('concept_ruler','$RULER_TITLE_CALIPH$')]."
 joi_flavor_tur.65.f: "“The world is a garden, watered by dynasty, that is, by authority. That authority is guarded by the Sharia, and the Sharia is likewise the policy that sustains the Empire; the Empire is the product of the army; the army is secured by wealth; wealth is obtained from the Ummah, and by justice they become servants of the monarch; and justice is the foundation of the welfare of the world.”\n\n“The intention of [ROOT.GetCountry.GetName] is plain: the leaders among the scholars and notables ought to assemble and compile a code of ordinances founded upon the deep-rooted principles of the Sacred Law, suited to the needs of the age, easy to apply, and free from disagreement. Then the Caliph shall command the rulers of [GetReligion('sunni').GetName] to enforce that code.”"
 joi_flavor_tur.65.a: "The [Concept('concept_ruler','$RULER_TITLE_CALIPH$')] is the mouthpiece of Allah!"
 joi_flavor_tur.66.t: "The Supreme Nation"
 joi_flavor_tur.66.d: "The attempt to unite all [GetReligion('sunni').GetName] Muslims has failed. The supporters of [GetLawType('law_monarchy').GetName] have suffered a grievous blow, the former [Concept('concept_ruler','$RULER_TITLE_CALIPH$')] has been driven into exile, and the influence of religious tradition in our country is being struck down as never before—while the cry of nationalism rises ever louder."
 joi_flavor_tur.66.f: "“Faced with the brilliance of knowledge, science, and all civilisation, I cannot accept that within the civilised society of the [SCOPE.sCulture('turkish_scope').GetName] there should exist such primitive men, seeking material and spiritual advantage under the guidance of sheikhs. [ROOT.GetCountry.GetName] cannot be a country of sheikhs, dervishes, and disciples. The best and truest order is the order of civilisation: to be a real man, it is enough to fulfil the requirements of civilisation. The leaders of the dervish orders will in time understand the truth of my words, close their lodges, and admit that their doctrines have grown obsolete.”"
 joi_flavor_tur.66.a: "The traditions of [GetReligion('sunni').GetName] must be preserved in earnest."
 joi_flavor_tur.66.b: "Long live the civilised [SCOPE.sCulture('turkish_scope').GetName] nation!"
 joi_flavor_tur.67.t: "The Poison of the West"
 joi_flavor_tur.67.d: "Anti-Western and indeed anti-modern sentiment is steadily rising in [ROOT.GetCountry.GetName] alongside the growing influence of the [GetReligion('sunni').GetName] clergy. Many faithful Muslims are petitioning the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], demanding the uprooting of certain Western-style policies adopted within the Empire."
 joi_flavor_tur.67.f: "“In the Middle East and in [ROOT.GetCountry.GetName], religious discourse dominates society, broadcasting, and the very outlook of the world. Radical [GetReligion('sunni').GetName] mosques are springing up everywhere across the land. Bookshops are filled with religious works... Demands for the Sharia, the belief that the government has departed from Islam, the conviction that Islam is the answer to every question, and the certainty that the West has declared war upon Islam—these are the themes that dominate public discussion. The Islamists may not control parliament or the institutions of government, but they have already seized the popular imagination.”"
 joi_flavor_tur.67.a: "The poisonous weed of [GetLawType('law_freedom_of_conscience').GetName] must be torn out by the roots!"
 joi_flavor_tur.67.b: "[GetLawType('law_private_schools').GetName] and [GetLawType('law_public_schools').GetName] ought to be remade under the Sharia."
 joi_flavor_tur.67.c: "[GetLawType('law_no_womens_rights').GetName] is the will of Allah."
 joi_flavor_tur.67.e: "[GetLawType('law_outlawed_dissent').GetName] will help preserve the stability of the sacred order."
 joi_flavor_tur.67.g: "[GetLawType('law_industry_banned').GetName] can purge the poisons discharged by modernity into the Empire."
 joi_flavor_tur.67.k: "[GetLawType('law_agrarianism').GetName] may help us recover the favour of Allah."
 joi_flavor_tur.67.i: "We cannot reject modern civilisation."
 joi_flavor_tur.68.t: "Restore the Janissaries?"
 joi_flavor_tur.68.d: "The Janissary corps was once among the finest armies of [ROOT.GetCountry.GetName], yet in the Auspicious Incident of 1834 it was dissolved by the then [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #yellow Mahmud II#!, and thereby ceased to exist. Yet now, with the recent restoration of #O slavery#!, the present [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [ROOT.GetCountry.GetRuler.GetFullName], has concluded that the time has come to restore the Devshirme and rebuild that great army which once made the Christian world tremble."
 joi_flavor_tur.68.f: "“For the execution of the famous sacred ruling of the Sheikh ul-Islam, according to which, if any unbelieving parents or any other persons resist the giving up of their sons to the corps of guards, they are to be hanged at once upon their own doorposts, for their blood is deemed unclean.”\n\n“Think of the heart-rending grief of it! How many mothers scratched their cheeks raw! How many fathers beat their breasts! What anguish these Christians endured at being separated from their children while they yet lived; better that they be dead and buried in our churches than taken alive to become Turks and forsake our faith. Better that they should die!”"
 joi_flavor_tur.68.a: "Our present army better suits our needs."
 joi_flavor_tur.68.b: "The Janissaries must be reborn!"
 joi_flavor_tur.69.t: "The Slave Traditions of [ROOT.GetCountry.GetName]"
 joi_flavor_tur.69.d: "Though [GetLawType('law_slavery_banned').GetName] was once much praised during the movement of modernisation, and was even enacted as the law of [ROOT.GetCountry.GetName], the renewed revival of [GetReligion('sunni').GetName] tradition has led many to argue that the Empire ought to restore its old slaveholding customs—above all, the custom of enslaving wicked infidels."
 joi_flavor_tur.69.f: "“The proper order of [ROOT.GetCountry.GetName] ought to conform to slavery, for slaves possess no true humanity and no property, being in many respects akin to foolish beasts: to regard them as equally human with the people of this country is plainly an unreasonable thing.”\n\n“In former days we captured or purchased new slaves upon the frontiers of the Islamic world, transported them to the principal cities, and there they were sold in the slave markets and dispersed abroad.”"
 joi_flavor_tur.69.a: "[GetLawType('law_debt_slavery').GetName] accords with the teaching of Allah."
 joi_flavor_tur.69.b: "[GetLawType('law_slave_trade').GetName] may strengthen our labour force."
 joi_flavor_tur.69.c: "We cannot countenance such a regression!"
 joi_flavor_tur.70.t: "The World Islamic Congress"
 joi_flavor_tur.70.d: "The [Concept('concept_ruler','$RULER_TITLE_CALIPH$')] of [SCOPE.sCountry('leader_scope').GetName] has proclaimed the convening of a congress for Muslims across the world, in order to deliberate upon the future of the [GetReligion('sunni').GetName] nations."
 joi_flavor_tur.70.f: "“For our state and our people, two things are of supreme importance: religion, and the rights handed down to us by our fathers. We know what we must avoid, and we know what, for our own benefit, we must accept.”\n\n“By Allah, we can no longer endure these insults against our forefathers, this mockery of our traditional values, and this blasphemy against our divinity. [ROOT.GetCountry.GetRuler.GetFullName], either you shall stop these infidels yourself, or else let us stop them for you. Since you and we alike oppose their words, then let us rid ourselves of them.”"
 joi_flavor_tur.70.a: "The brethren of [GetReligion('sunni').GetName] must obey the will of the Caliph."
 joi_flavor_tur.70.b: "The will of [SCOPE.sCountry('leader_scope').GetName] shall be obeyed by us."
 joi_flavor_tur.70.c: "What delusions possess [SCOPE.sCountry('leader_scope').GetName]?"

 joi_flavor_tur.71.t: "The Land of the Ottomans"
 joi_flavor_tur.71.d: "After long reforms of equalisation, the ideals of [GetIdeology('ideology_ottomanism').GetName] have been written into law: the principles of religious and national equality alike are now instilled through compulsory instruction in our schools. The Porte has also promulgated many preferential measures benefiting peoples once oppressed, and the work of secular reform has achieved a tremendous success."
 joi_flavor_tur.71.f: "“The great tree continued to grow and flourish until it became a mighty and splendid giant: its boughs and trunk intertwined to form a gentle shade, whose shadow spread across the horizon of the whole world, and beneath that shade stood four mountain ranges, which [ROOT.GetCountry.GetRuler.GetLastName] recognised as the Caucasus, the Atlas, the Taurus, and the Balkans.”\n\n“These four lofty mountains were like four great pillars upholding the dome of that sacred tree, and beneath that dome, at the centre of the earth, four rivers sprang from the roots of the tree: the Tigris, the Euphrates, the Danube, and the Nile.”\n\n“In the valley there stood a shining and magnificent city, filled with domes and spires, with pyramids and obelisks, minarets and towers, upon whose summits the crescent moon cast its light; suddenly a mighty wind arose, and the leaves of the tree became sharp scimitars, and the raging gale blew those sword-leaves towards every city in the world, but most especially against Constantinople.”"
 joi_flavor_tur.71.a: "United Ottomans shall never be defeated!"

 joi_flavor_tur.72.t: "The Golden Land, the Bay of Slaves"
 joi_flavor_tur.72.d: "With the revival of [GetLawType('law_slave_trade').GetName] in [ROOT.GetCountry.GetName], the markets of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] are once more crowded with imported or kidnapped #v $slaves$#! from Africa, from many other lands, and even from the coasts of Europe; slave ships fill the city’s harbours, bringing us immense wealth."
 joi_flavor_tur.72.f: "“In former times, an ‘ordinary’ Circassian girl at £100 was thought exceedingly cheap, yet now the same article may be had for £5! Once, a Circassian slave-girl could almost certainly be sold into a respectable household, where she would not only be well treated, but might often attain both position and wealth; but now prices are so low that any man who had never before dreamt of owning slaves may purchase her.”\n\n“By reason of the revived [GetLawType('law_slave_trade').GetName], a constant stream of female slaves—fair-haired beauties from Georgia and Circassia, brown-skinned Arab girls from the edge of the Sahara—pours into the markets of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] through every manner of circuitous channel, there to live with their [SCOPE.sCulture('turkish_scope').GetName] masters and maintain frequent sexual relations with them.”"
 joi_flavor_tur.72.a: "There are but two kinds of men in the Empire: the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and his slaves."
 joi_flavor_tur.73.t: "The Ghost of the Janissaries"
 joi_flavor_tur.73.d: "The Janissaries—that army which in former times brought [ROOT.GetCountry.GetName] so much glory, yet also so many disasters and disturbances—have, amidst great controversy, been revived by the hand of [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. What effect this force shall have upon the Empire in the present age remains to be seen, but one thing is beyond alteration: the Janissaries have returned!"
 joi_flavor_tur.73.f: "“They saw the [SCOPE.sCulture('turkish_scope').GetName]s drawing near the walls, intent upon battle, especially the Janissaries; and when one or two Janissaries were slain, more Janissaries immediately came and bore the bodies away. They cared nothing for how near they stood to the walls; our men fired at them with guns and crossbows, aiming at those [SCOPE.sCulture('turkish_scope').GetName]s carrying off their dead comrades, and both bearers fell dead at once. Then still more Janissaries came and lifted away the bodies, utterly without fear, preferring the loss of ten men to enduring the shame of leaving a Janissary corpse lying beneath the walls.”"
 joi_flavor_tur.73.a: "Faithful unto death!"

 joi_flavor_tur.74.t: "The Arab Awakening"
 joi_flavor_tur.74.d: "With the spread of the printing press, the rise of newspapers and publishing houses, and the flourishing of new nationalist ideas in [GetStrategicRegion('region_arabia').GetName] under the rule of [SCOPE.sCountry('TUR_scope').GetName], a wave of Arab cultural revival known as the #V ‘Nahda Movement’#! has swept across [GetStrategicRegion('region_arabia').GetName]. From the rebirth of Arabic language and art to resistance against the centralised rule of the [SCOPE.sCulture('turkish_scope').GetName]s, this once-quiet peninsula has begun to stir restlessly."
 joi_flavor_tur.74.f: "“Tyranny knows no limit, and it produces every kind of corruption: it corrupts religion, distorts morality, strangles knowledge, destroys courage, and reduces nations to slaves rather than citizens. If tyranny endures, then a nation comes to know nothing of liberty save the name, and nothing of dignity save its shadow.”\n\n“Arabism is not a memory of the past, nor a longing for vanished ages, but a living reality flowing in the conscience of this nation. Whatever frontiers may tear it apart, whatever governments may divide it, the Arab nation remains one, for it bears within itself a mission not yet fulfilled: when that nation awakens and understands its mission, its history shall become strength, and its future a responsibility owed to all mankind!”"
 joi_flavor_tur.74.a: "The Empire must preserve its rule upon the peninsula!"
 joi_flavor_tur.74.b: "A fine opportunity to break up [SCOPE.sCulture('turkish_scope').GetName] rule! Let us make contact with these [SCOPE.sCulture('bedouin_scope').GetName]s!"
 joi_flavor_tur.74.c: "[SCOPE.sCountry('TUR_scope').GetName] is our friend! We ought to support them!"
 joi_flavor_tur.74.e: "How can free [SCOPE.sCulture('bedouin_scope').GetName]s endure the weight of chains?!"
 joi_flavor_tur.74.i: "Let us convey the loyalty of [ROOT.GetCountry.GetName] to the [SCOPE.sCulture('turkish_scope').GetName]s."
 joi_flavor_tur.74.g: "An interesting development; let us observe and wait."
 joi_flavor_tur.75.t: "The Slumbering Desert"
 joi_flavor_tur.75.d: "After decades of turmoil, the tide of nationalism in [GetStrategicRegion('region_arabia').GetName] has at last been beaten down beneath the iron fist of the [SCOPE.sCulture('turkish_scope').GetName]s and their allies abroad. The desert, which once seemed aflame, has fallen once more into slumber: beyond doubt, this is among the greatest victories [SCOPE.sCountry('TUR_scope').GetName] has achieved in recent times."
 joi_flavor_tur.75.f: "“To restore an Arab state, and upon the declining place of the [SCOPE.sCulture('turkish_scope').GetName]s build some great Arab Empire? Believe not the lies of those hired scribblers who take foreign gold! If discord arises between these two pillars of Islam, it can bring only the destruction of Muslim strength... If the two peoples are separated, then they are destined for ruin.”\n\n“The service rendered by [SCOPE.sCountry('TUR_scope').GetName] to Islam and to the Muslims is beyond dispute, nor may their feats of valour be understated. It pains Allah deeply that so many of our Muslim brethren have lately questioned, opposed, and even rebelled against that House; as brothers in Islam, we have a sacred duty to meet the needs of that dynasty and obey its commands.”"
 joi_flavor_tur.75.a: "Glory be! It is the honour of [ROOT.GetCountry.GetName]!"
 joi_flavor_tur.75.b: "We fear not the years, though hardship press upon us..."
 joi_flavor_tur.75.c: "It seems these [SCOPE.sCulture('turkish_scope').GetName]s have been fortunate this time."
 joi_flavor_tur.76.t: "The Great Arab Revolt!"
 joi_flavor_tur.76.d: "As nationalist fervour among the [SCOPE.sCulture('bedouin_scope').GetName] people under the rule of [SCOPE.sCountry('TUR_scope').GetName] continues to rise, aided by the support of certain foreign Great Powers, the Arabs, under the leadership of the الشريف [SCOPE.sCharacter('holy_ruler').GetFullName], have declared the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Caliph, [SCOPE.sCharacter('tur_ruler').GetFullName], a usurper and an illegitimate Caliph, and have raised an army in an attempt to win independence from [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.76.f: "“We have now seen the true face of the usurpers of [SCOPE.sCountry('TUR_scope').GetName]: we have come to understand their wicked designs against our faith, we have witnessed the crimes and evil deeds they have committed in our Holy Places, and our faith has shown us the road to redemption. In the name of that faith, we have fulfilled our duty to ourselves and to the Muslims of the whole world.”\n\n“At last, in order to please Allah, we have raised the banner of revolt, and He has granted us victory and stands beside us, upholding His law and His religion, in full accordance with His wisdom; and His will shall surely advance the welfare of this people.”\n\n“If there remains among the peoples of Arabia any spark of true religious zeal, then they must save their country from the calamity into which its inhabitants have fallen, and deliver it from the ruin and disaster into which the wicked hands of the [SCOPE.sCulture('turkish_scope').GetName]s have dragged it!”"
 joi_flavor_tur.76.a: "Those accursed [SCOPE.sCulture('bedouin_scope').GetName] rebels!"
 joi_flavor_tur.76.b: "Summon the Cabinet at once; [ROOT.GetCountry.GetName] must make its choice!"
 joi_flavor_tur.76.c: "Arise, [SCOPE.sCulture('bedouin_scope').GetName] warriors! Only slaves submit to a life of humiliation and oppression!"
 joi_flavor_tur.77.t: "Declaration of Independence"
 joi_flavor_tur.77.d: "[SCOPE.sCountry('ARA_scope').GetName], under the leadership of the الشريف [SCOPE.sCharacter('holy_ruler').GetFullName], has declared the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Caliph, [SCOPE.sCharacter('tur_ruler').GetFullName], a usurper and an illegitimate Caliph, and has issued a note to [ROOT.GetCountry.GetName] in the name of the Guardian of the Holy Places and the rightful Caliph, calling upon us to join the just cause of Arab independence."
 joi_flavor_tur.77.f: "“We, the freedom-loving people of [SCOPE.sCountry('ARA_scope').GetName], wish to tell our Arab brethren that, on the Day of Judgement, we shall confess before Almighty Allah that among the Muslim rulers now known to us, there is none more righteous, more God-fearing, than the descendant of His Prophet, the ruler who now governs the state of [SCOPE.sCountry('ARA_scope').GetName], [SCOPE.sCharacter('holy_ruler').GetFullName].”\n\n“We can find no man more pious, more faithful to the law of Allah, or more capable of conducting the affairs of state in a manner pleasing to Allah. The people of the Holy Places have raised him up as king for one reason alone: in doing so, they serve both their religion and their nation.”\n\n“We call upon those who oppose us to take heed: if there yet remains in you any spark of true religious zeal, then you must save the other nations from the calamity into which their peoples have fallen, and deliver them from the ruin and disaster into which the wicked hands of the [SCOPE.sCulture('turkish_scope').GetName]s have dragged them.”"
 joi_flavor_tur.77.a: "Arise, [SCOPE.sCulture('bedouin_scope').GetName] warriors! Only slaves submit to a life of humiliation and oppression!"
 joi_flavor_tur.77.b: "No, no—we are loyal servants of [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.78.t: "The Arab Crisis"
 joi_flavor_tur.78.d: "[SCOPE.sCountry('ARA_scope').GetName], under the leadership of the الشريف [SCOPE.sCharacter('holy_ruler').GetFullName], is presently engaged in minor clashes with [SCOPE.sCountry('TUR_scope').GetName], which formerly ruled the Arabian Peninsula. It is only to be expected that, once the main armies of both sides have fully assembled, these skirmishes will escalate into a full-scale war. What stance ought [ROOT.GetCountry.GetName] to take in this matter?"
 joi_flavor_tur.78.f: "“This serves our interests well enough, for it accords with our immediate aim: the breaking up of the Islamic ‘bloc’, the defeat and dismemberment of [SCOPE.sCountry('TUR_scope').GetName]. And the state established by [SCOPE.sCharacter('holy_ruler').GetFullName] to succeed [SCOPE.sCulture('turkish_scope').GetName] rule is no threat to us: the [SCOPE.sCulture('bedouin_scope').GetName]s are less stable than the [SCOPE.sCulture('turkish_scope').GetName]s. If the matter is handled properly, they will remain in a state of political fragmentation, divided into many small principalities, mutually at odds and lacking cohesion.”\n\n“I do not in the least believe that the negotiations at present can have much effect upon the future settlement of [GetStrategicRegion('region_arabia').GetName], nor that they can establish our rights there, nor bind our hands. The situation and all its circumstances are far too complicated for that. What we must do now is to guide the [SCOPE.sCulture('bedouin_scope').GetName]s onto the proper path, detach them from the [SCOPE.sCulture('turkish_scope').GetName]s, and bring them over to our side.”"
 joi_flavor_tur.78.a: "We shall support the just cause of the [SCOPE.sCulture('bedouin_scope').GetName]s!"
 joi_flavor_tur.78.b: "We ought to help the [SCOPE.sCulture('turkish_scope').GetName]s suppress the rebellion."
 joi_flavor_tur.78.c: "This is no concern of [ROOT.GetCountry.GetName]."
 joi_flavor_tur.78.e: "Promise military assistance to [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.78.i: "Promise military assistance to [SCOPE.sCountry('ARA_scope').GetName]."
 joi_flavor_tur.79.t: "Lawrence of Arabia"
 joi_flavor_tur.79.d: "A [SCOPE.sCountry('GBR_scope').GetName] military mission, led by Sir [SCOPE.sCharacter('te_lawrence_scope').GetFullName], together with a small, well-trained detachment of British troops, has set out and is expected soon to arrive in [SCOPE.sCountry('ARA_scope').GetName], where it will assist them in their war against the [SCOPE.sCulture('turkish_scope').GetName]s. Sir [SCOPE.sCharacter('te_lawrence_scope').GetLastName] is clothed in Arab robes, which, by his own account, are cleaner and more suitable in the desert."
 joi_flavor_tur.79.f: "“The tribes are of value only in defence; their true field is guerrilla war. They are intelligent, nimble, full of energy, and nearly reckless, yet too individualistic to submit to orders, to fight in line, or to aid one another. I believe it impossible to organise them into a regular army: the war in the Hejaz is a war of dervishes against regular troops—and we are on the side of the dervishes.”\n\n“As for my own work on the Arab front, I am determined to accept no reward. The Cabinet has inspired the people of [SCOPE.sCountry('ARA_scope').GetName] to fight for us by the explicit promise of autonomy after the war. The Arabs trust men, not institutions. They regard me as the free agent of [SCOPE.sCountry('GBR_scope').GetName], and require me to endorse in writing the promises of the [SCOPE.sCountry('GBR_scope').GetAdjectiveNoFormatting] government. Sustained by that hope, they have accomplished some splendid feats.”"
 joi_flavor_tur.79.a: "Let us welcome Sir [SCOPE.sCharacter('te_lawrence_scope').GetLastName]!"
 joi_flavor_tur.79.b: "Sir [SCOPE.sCharacter('te_lawrence_scope').GetLastName] shall surely help [SCOPE.sCountry('ARA_scope').GetName] secure victory!"
 joi_flavor_tur.80.t: "Brémond of Arabia"
 joi_flavor_tur.80.d: "A [SCOPE.sCountry('FRA_scope').GetName] military mission, led by General [SCOPE.sCharacter('fra_bremond_scope').GetFullName], together with a small, well-trained detachment of French troops, has set out and is expected soon to arrive in [SCOPE.sCountry('ARA_scope').GetName], where it will assist them in their war against the [SCOPE.sCulture('turkish_scope').GetName]s."
 joi_flavor_tur.80.f: "“The decision to retreat remains a mystery to this day. It was made neither in Beirut nor in Adana, but in Marash. There can be little doubt that, had Marash possessed wireless equipment to maintain uninterrupted communication with Adana, the order to evacuate would never have been issued.”\n\n“They were some eight hundred in number, silent, yet not in the least ashamed. [SCOPE.sCharacter('holy_ruler').GetFirstName] himself seemed wholly unconcerned. Upon entering the town, he turned to the commander following behind him and shouted: ‘Good heavens, our town is in ruins! I must telegraph the Prime Minister and ask him to send forty stonemasons to repair the public buildings.’ And indeed, he did so.”"
 joi_flavor_tur.80.a: "Let us welcome General [SCOPE.sCharacter('fra_bremond_scope').GetLastName]!"
 joi_flavor_tur.80.b: "The experienced General [SCOPE.sCharacter('fra_bremond_scope').GetLastName] shall surely be of use to [SCOPE.sCountry('ARA_scope').GetName]."
 joi_flavor_tur.81.t: "Dispatching a Military Mission to [GetStrategicRegion('region_arabia').GetName]"
 joi_flavor_tur.81.d_1: "A foreign military mission, led by General [SCOPE.sCharacter('general_scope').GetFullName], has arrived in [ROOT.GetCountry.GetName] to assist us against our enemies in this war."
 joi_flavor_tur.81.d_2: "A military mission of [ROOT.GetCountry.GetName], led by General [SCOPE.sCharacter('general_scope').GetFullName], together with a small, well-trained detachment of [ROOT.GetCountry.GetAdjectiveNoFormatting] troops, has set out and is expected soon to reach its destination, where it will intervene in the war between the [SCOPE.sCulture('turkish_scope').GetName]s and the [SCOPE.sCulture('bedouin_scope').GetName]s."
 joi_flavor_tur.81.f: "“General [SCOPE.sCharacter('general_scope').GetFullName] has perceived more clearly than any man the vision of [ROOT.GetCountry.GetName]’s power and its significance in transport and in war. He believes that, by serving as a military adviser in the [ROOT.GetCountry.GetAdjectiveNoFormatting] army, he may uphold the dignity of this glorious profession and help draw the most ardent talents among our young men into the field where they are most urgently needed. For this contribution and for this example, we owe him a particular gratitude: it is in itself a most precious gift.”"
 joi_flavor_tur.81.a: "Let us welcome General [SCOPE.sCharacter('general_scope').GetLastName]!"
 joi_flavor_tur.81.b: "We wish General [SCOPE.sCharacter('general_scope').GetLastName] a successful journey to [SCOPE.sCountry('ARA_scope').GetName]!"
 joi_flavor_tur.81.c: "We wish General [SCOPE.sCharacter('general_scope').GetLastName] a successful journey to [SCOPE.sCountry('TUR_scope').GetName]!"
 joi_flavor_tur.82.t: "[SCOPE.sCountry('button_scope').GetName] Raids the Provinces of [GetStrategicRegion('region_arabia').GetName]"
 joi_flavor_tur.82.d: "[SCOPE.sCountry('button_scope').GetName], making use of the tactical advantages of the desert, has sent forth several compact and capable detachments to raid the Arab provinces under the rule of [SCOPE.sCountry('TUR_scope').GetName]. [SCOPE.sState('arabic_state').GetCityHubName] has suffered grievous losses in the attack."
 joi_flavor_tur.82.f: "“In truth, the [SCOPE.sCulture('turkish_scope').GetName]s found themselves confronted by unforeseen difficulties: their garrisons suffered from high rates of sickness among the soldiers and the increasing weakness of their beasts of burden, signs alike of overwork and of an insufficient food supply. The constant activity of the tribes in their rear also served continually to hamper them.”\n\n“Some tribes may perhaps desert the cause of the [SCOPE.sCulture('bedouin_scope').GetName]s, but that does not mean they become reliable allies of the [SCOPE.sCulture('turkish_scope').GetName]s. The [SCOPE.sCulture('turkish_scope').GetName]s soon found themselves in a land hostile on every side: during the first fortnight of [TimeKeeper.GetCurrentDate.Format('m')], tribal raids were costing them, on average, forty camels and twenty soldiers a day, with heavy losses of supplies besides.”"
 joi_flavor_tur.82.a: "Confound them!"
 joi_flavor_tur.82.b: "[SCOPE.sCulture('bedouin_scope').GetName] warriors shall never be slaves!"
 joi_flavor_tur.83.t: "The [SCOPE.sCharacter('ara_ruler').GetLastName]–[SCOPE.sCharacter('great_power_politician').GetLastName] Correspondence"
 joi_flavor_tur.83.d: "The Emir of [SCOPE.sCountry('ara_scope').GetName], [SCOPE.sCharacter('ara_ruler').GetFullName], has engaged in several secret telegraphic exchanges with [SCOPE.sCharacter('great_power_politician').GetFullName], a prominent Cabinet minister and the official responsible for Arab affairs in [SCOPE.sCountry('great_power_scope').GetName], in the hope of winning [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] support for the further advancement of the cause against [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.83.f: "“Subject to the modifications mentioned above, and without prejudice to our existing treaties with the Arab Emirates, we accept these limitations and frontiers. With regard to those territories in which [SCOPE.sCountry('great_power_scope').GetName] is free to act without detriment to the interests of its allies, I am empowered, on behalf of the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government, to give the following assurance and to reply thus to your letter: subject to the above modifications, [SCOPE.sCountry('great_power_scope').GetNameNoFlag] is prepared to recognise and support the independence of the Arabs within the territories proposed by the Sharif of [SCOPE.sCountry('ara_scope').GetName].”\n\n“It is officially guaranteed that any measures taken during the Conference are of a purely temporary character and cannot in any way prejudice the final settlement. [SCOPE.sCountry('ara_scope').GetName] will undoubtedly send representatives to the Peace Conference; if I discover that anyone is acting in violation of these instructions, I shall replace them. I remind Emir [SCOPE.sCharacter('ara_ruler').GetLastName] that [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] is bound to do its utmost to arrive at a settlement in accordance with the wishes of the peoples concerned, and I urge him to place his full confidence in the good faith of [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting].”"
 joi_flavor_tur.83.a: "We shall support Emir [SCOPE.sCharacter('ara_ruler').GetLastName] in his just struggle against [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.83.b: "We ought politely to decline Emir [SCOPE.sCharacter('ara_ruler').GetLastName]’s request."
 joi_flavor_tur.83.c: "Our heartfelt thanks to our dear ally, [SCOPE.sCountry('great_power_scope').GetName]!"
 joi_flavor_tur.83.e: "Ah, what a pity."
 joi_flavor_tur.84.t: "The [SCOPE.sCharacter('great_power_politician').GetLastName]–[SCOPE.sCharacter('ara_ruler').GetLastName] Correspondence"
 joi_flavor_tur.84.d: "[SCOPE.sCharacter('great_power_politician').GetFullName], an important Cabinet minister and the official responsible for Arab affairs in [SCOPE.sCountry('great_power_scope').GetName], has engaged in several secret telegraphic exchanges with Emir [SCOPE.sCharacter('ara_ruler').GetFullName] of [SCOPE.sCountry('ara_scope').GetName], and has expressed a willingness to provide [SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting] with certain crucial forms of assistance in support of their struggle against [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.84.f: "“Subject to the modifications mentioned above, and without prejudice to our existing treaties with the Arab Emirates, we accept these limitations and frontiers. With regard to those territories in which [SCOPE.sCountry('great_power_scope').GetName] is free to act without detriment to the interests of its allies, I am empowered, on behalf of the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government, to give the following assurance and to reply thus to your letter: subject to the above modifications, [SCOPE.sCountry('great_power_scope').GetNameNoFlag] is prepared to recognise and support the independence of the Arabs within the territories proposed by the Sharif of [SCOPE.sCountry('ara_scope').GetName].”\n\n“It is officially guaranteed that any measures taken during the Conference are of a purely temporary character and cannot in any way prejudice the final settlement. [SCOPE.sCountry('ara_scope').GetName] will undoubtedly send representatives to the Peace Conference; if I discover that anyone is acting in violation of these instructions, I shall replace them. I remind Emir [SCOPE.sCharacter('ara_ruler').GetLastName] that [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] is bound to do its utmost to arrive at a settlement in accordance with the wishes of the peoples concerned, and I urge him to place his full confidence in the good faith of [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting].”"
 joi_flavor_tur.84.a: "The support of [SCOPE.sCountry('great_power_scope').GetName] is of great use to us."
 joi_flavor_tur.84.b: "Accursed foreign meddlers—be gone!"
 joi_flavor_tur.84.c: "Excellent. [SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting] shall become an important piece in the hands of mighty [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting], for the destruction of [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.84.e: "These ungrateful [SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting]s!"
 joi_flavor_tur.85.t: "The Joint Declaration of [SCOPE.sCountry('great_power_scope').GetNameNoFlag] and [SCOPE.sCountry('ara_scope').GetNameNoFlag]"
 joi_flavor_tur.85.d: "Under the impetus of [SCOPE.sCharacter('great_power_politician').GetFullName], a senior statesman of [SCOPE.sCountry('great_power_scope').GetName], and Emir [SCOPE.sCharacter('ara_ruler').GetFullName] of [SCOPE.sCountry('ara_scope').GetName], the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Parliament has approved a joint treaty publicly declaring to the world that [SCOPE.sCountry('great_power_scope').GetNameNoFlag] shall recognise [SCOPE.sCountry('ara_scope').GetNameNoFlag] as a respected independent state, and hinting that such recognition ought to be extended to all the states of [GetStrategicRegion('region_arabia').GetName] which still remain under the shadow of [SCOPE.sCountry('TUR_scope').GetName]."
 joi_flavor_tur.85.f: "“The aim of [SCOPE.sCountry('great_power_scope').GetName] is the complete liberation of those peoples long oppressed by the [SCOPE.sCulture('turkish_scope').GetName]s, and the establishment of national governments and administrations deriving their authority from the initiative and free choice of the local inhabitants. To achieve these ends, [SCOPE.sCountry('great_power_scope').GetNameNoFlag] and [SCOPE.sCountry('ara_scope').GetNameNoFlag] shall work together, encouraging and assisting the establishment of native governments and administrations in Syria and Mesopotamia, and in the territories they are endeavouring to liberate, and shall recognise them immediately once they are in effective being.”\n\n“[SCOPE.sCountry('great_power_scope').GetName] has no intention whatever of imposing any particular institutions upon the peoples of these regions, but desires only, through support and adequate assistance, to ensure the proper working of governments and administrations freely elected by the people. It seeks to secure impartial and equal justice for all, to foster the economic development of the country by encouraging and stimulating local initiative, to aid the spread of education, and to bring to an end the conflicts that have long been exploited by [SCOPE.sCountry('TUR_scope').GetName].”"
 joi_flavor_tur.85.a: "How dare they!"
 joi_flavor_tur.85.b: "Most exciting! Perhaps we too ought to attempt contact with [SCOPE.sCountry('great_power_scope').GetName]?"
 joi_flavor_tur.85.c: "A most interesting development. It seems matters are turning against the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]s."
 joi_flavor_tur.85.e: "Tremble, accursed [SCOPE.sCulture('turkish_scope').GetName]s—your end is near!"
 joi_flavor_tur.85.i: "Arab brethren! Our hour has come!"
 joi_flavor_tur.86.t: "The [SCOPE.sCountry('great_power_scope').GetName] Military Mission to the Ottomans"
 joi_flavor_tur.86.d: "Following discussions between [SCOPE.sCharacter('great_power_politician').GetFullName], Minister of War of [SCOPE.sCountry('great_power_scope').GetName], and the Padishah of [SCOPE.sCountry('TUR_scope').GetName], [SCOPE.sCharacter('tur_ruler').GetFullName], the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government has resolved to dispatch a military mission, led by General [SCOPE.sCharacter('general_scope').GetFullName], to [SCOPE.sCountry('TUR_scope').GetNameNoFlag], to provide advice and assistance in the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] campaign to pacify the unrest in [GetStrategicRegion('region_arabia').GetName]."
 joi_flavor_tur.86.f: "“To inspire in our youth patriotism and the military spirit, so that they may take pride in the glory and greatness of [SCOPE.sCountry('TUR_scope').GetName], and at the same time provide them with a healthy physical education, preparing them for a military career. And likewise, to cultivate patriotism, love of country, martial virtue, and bodily strength.”\n\n“All the hopes of the [SCOPE.sCulture('turkish_scope').GetName]s rest upon their younger generation: you are that generation, and once you rise to the summit, you shall save this country.”"
 joi_flavor_tur.86.a: "Our thanks to [SCOPE.sCountry('great_power_scope').GetName] for its assistance!"
 joi_flavor_tur.86.b: "General [SCOPE.sCharacter('general_scope').GetFullName] shall serve the Ottoman cause."
 joi_flavor_tur.86.c: "General [SCOPE.sCharacter('general_scope').GetFullName] shall lead a military mission to aid the [SCOPE.sCulture('turkish_scope').GetName]s."
 joi_flavor_tur.87.t: "Martial Law in Arabia!"
 joi_flavor_tur.87.d: "In view of the grave situation lately prevailing in [GetStrategicRegion('region_arabia').GetName], the [SCOPE.sCountry('turkish_scope').GetAdjectiveNoFormatting] Sublime Porte has resolved upon violent measures, proclaiming military rule throughout the provinces of [GetStrategicRegion('region_arabia').GetName] under imperial authority, and issuing a decree of martial law."
 joi_flavor_tur.87.f: "To the great [SCOPE.sCulture('turkish_scope').GetName] nation and to all Imperial subjects of [GetStrategicRegion('region_arabia').GetName]:\n\nFrom 3 o’clock in the morning of [TimeKeeper.GetCurrentDate.Format('m d')], the armed forces of [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] have assumed control of the civil administration of [GetStrategicRegion('region_arabia').GetName]. This operation, thanks to the close cooperation of all subjects and the security forces, has met with complete success and with scarcely any loss of life. A curfew is hereby imposed throughout Arabia, until further notice, upon all persons save members of the armed forces.\n\nIn the name of the supreme Padishah and Caliph of Islam, His Majesty [SCOPE.sCharacter('tur_ruler').GetFullName], the Sublime Porte requires that all Imperial subjects exert themselves to the utmost in assisting the operations of the armed forces, and actively report suspicious persons in their vicinity, so that together we may restore the peace for which the peoples of the Empire long.\n\nThe [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Sublime Porte, [TimeKeeper.GetCurrentDate.Format('y m d')], at Topkapı Palace."
 joi_flavor_tur.87.a: "[SCOPE.sCulture('bedouin_scope').GetName] rats, you have nowhere left to hide!"
 joi_flavor_tur.87.b: "Remarkable news, though not wholly unexpected."
 joi_flavor_tur.87.c: "Accursed [SCOPE.sCulture('turkish_scope').GetName]s!"

 joi_flavor_tur.88.t: "The Collapse of Ottoman Rule"
 joi_flavor_tur.88.d: "The [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] armies have suffered a grievous defeat in this desert war, and the Sublime Porte of [SCOPE.sCountry('TUR_scope').GetName] has been compelled to sign an agreement with [SCOPE.sCountry('ARA_scope').GetName], declaring its recognition of the independence of the Arab state. Many hold that this is the death knell of the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Muslim Empire."
 joi_flavor_tur.88.f: "“The Empire is utterly exhausted. Our resources are drained away, and war has consumed the last strength of the state. The Arab Revolt was a terrible blow: it struck at the most sensitive core of unity within the Empire.”\n\n“The Empire of the [SCOPE.sCulture('turkish_scope').GetName]s is collapsing before our very eyes: after long suffering, the Arab nation has won back its freedom.”"
 joi_flavor_tur.88.a: "This is the end of the Empire, and the end of its glory."
 joi_flavor_tur.88.b: "This is our fatherland, the soil where our forefathers sleep!"
 joi_flavor_tur.88.c: "We must admit that the Arabs have displayed the mighty force of liberty."
 joi_flavor_tur.88.i: "A magnificent achievement!"
 joi_flavor_tur.89.t: "[SCOPE.sCountry('great_power_scope').GetName] Claims Syria"
 joi_flavor_tur.89.d: "The government of [SCOPE.sCountry('great_power_scope').GetName] is attempting to expand its influence in [GetStrategicRegion('region_arabia').GetName] through the Great Arab Revolt. [SCOPE.sCountry('SYR_scope').GetName] has received notice from [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] demanding that [SCOPE.sCountry('SYR_scope').GetAdjectiveNoFormatting] accept [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] mandatory rule."
 joi_flavor_tur.89.f: "“[SCOPE.sCountry('great_power_scope').GetName] demands a settlement designed both to compensate it for the inconveniences and losses it has suffered as a consequence of the collapse of [SCOPE.sCountry('TUR_scope').GetName], and to preserve its historic and traditional position in Syria, while ensuring the full realisation of its economic aims in the Near East.”\n\n“I have repeatedly pointed out to the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government that the Arabs feel a deep aversion to the prospect of [SCOPE.sCountry('great_power_scope').GetName] exercising authority over any Arab territory. This presents considerable danger to our future relations with the Arabs, because it is difficult—indeed, perhaps impossible—to make [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] understand the error of her ways.”"
 joi_flavor_tur.89.a: "We ought to accept reality."
 joi_flavor_tur.89.b: "Free Arabs shall never submit!"
 joi_flavor_tur.89.c: "A great diplomatic victory!"
 joi_flavor_tur.89.e: "[SCOPE.sCountry('SYR_scope').GetName] must learn its proper station."
 joi_flavor_tur.90.t: "[SCOPE.sCountry('great_power_scope').GetName] Claims Iraq"
 joi_flavor_tur.90.d: "The government of [SCOPE.sCountry('great_power_scope').GetName] is attempting to expand its influence in [GetStrategicRegion('region_arabia').GetName] through the Great Arab Revolt. [SCOPE.sCountry('IRQ_scope').GetName] has received notice from [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] demanding that [SCOPE.sCountry('IRQ_scope').GetAdjectiveNoFormatting] accept [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] mandatory rule."
 joi_flavor_tur.90.f: "“The government of [SCOPE.sCountry('great_power_scope').GetName] requires the securing of its position in the Persian Gulf, the opportunity to develop the southern regions of Mesopotamia, the establishment of an overland commercial and military route between the Persian Gulf and the Mediterranean, and influence over a sufficiently wide area to provide suitable sanatoria and summer retreats for those engaged in the irrigation works of Mesopotamia.”\n\n“To accept the entire scheme would mean that [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] would surrender a considerable part of its interests; but provided Arab cooperation is secured, and provided the Arabs satisfy the necessary conditions and receive the four cities of Homs, Hama, Damascus, and Aleppo, the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government will not oppose the arrangement.”"
 joi_flavor_tur.90.a: "We ought to accept reality."
 joi_flavor_tur.90.b: "Free Arabs shall never submit!"
 joi_flavor_tur.90.c: "A great diplomatic victory!"
 joi_flavor_tur.90.e: "[SCOPE.sCountry('IRQ_scope').GetName] must learn its proper station."
 joi_flavor_tur.91.t: "[SCOPE.sCountry('great_power_scope').GetName] Claims Palestine"
 joi_flavor_tur.91.d: "The government of [SCOPE.sCountry('great_power_scope').GetName] is attempting to expand its influence in [GetStrategicRegion('region_arabia').GetName] through the Great Arab Revolt. [SCOPE.sCountry('ARA_scope').GetName] has received notice from [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] demanding that [SCOPE.sCountry('ARA_scope').GetAdjectiveNoFormatting] accept [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] mandatory rule over Palestine and Jordan under its authority."
 joi_flavor_tur.91.f: "“If there is any value in our support for King [SCOPE.sCharacter('ara_ruler').GetFirstName] and the other Arab leaders of lesser birth and prestige than King [SCOPE.sCharacter('ara_ruler').GetLastName], then it lies in our readiness to recognise the complete sovereign independence of the Palestinian Arabs. It now seems time for the [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] Government to understand the exact nature of our commitments to [SCOPE.sCountry('ARA_scope').GetAdjectiveNoFormatting], and to make clear to him whether he, or some other, shall become the ruler of Palestine—for [SCOPE.sCountry('ARA_scope').GetName] is the only state capable of becoming the leader of the Arab nations and of compelling the other Arab Emirs to submit.”\n\n“The Mandatory shall be responsible for putting into effect the declaration issued by the Government of [SCOPE.sCountry('great_power_scope').GetName] on [TimeKeeper.GetCurrentDate.Format('y m d')], and adopted by the above-mentioned Powers, in favour of the establishment in Palestine of a national home for the Jewish people, it being clearly understood that nothing shall be done which may prejudice the civil and religious rights of the existing non-Jewish communities in Palestine, or the rights and political status enjoyed by Jews in any other country.”"
 joi_flavor_tur.91.a: "We ought to accept reality."
 joi_flavor_tur.91.b: "Free Arabs shall never submit!"
 joi_flavor_tur.91.c: "A great diplomatic victory!"
 joi_flavor_tur.91.e: "[SCOPE.sCountry('ARA_scope').GetName] must learn its proper station."
 joi_flavor_tur.92.t: "Long Have I Waited, My Fatherland"
 joi_flavor_tur.92.d: "Freed from the rule of [SCOPE.sCountry('TUR_scope').GetName], the [SCOPE.sCulture('bedouin_scope').GetName] people, under the leadership of [SCOPE.sCountry('ARA_scope').GetName] and its ruler [SCOPE.sCharacter('ara_ruler').GetFullName], preserved their independence, resisted pressure and aggression from every quarter, and at last rose from the desert to unite as a new state—free, independent, and equal: #V a new country belonging to all the peoples of [GetStrategicRegion('region_arabia').GetName].#!"
 joi_flavor_tur.92.f: "“For glory and fatherland, we live and die,\nAll of us are men of lofty purpose, steadfast and unbending.\nHow can a free man bear the weight of chains?!\nOnly a slave would submit to a life of humiliation and oppression!\n\nWe do not fear the years, though suffering presses hard,\nAnd how many martyrs have fallen in battle for the fatherland?\n\nThis is our homeland, the soil where our forefathers sleep,\nThe place beneath the heavens where inspiration and revelation descend.\nGreen mountains and clear waters, beauty enough to intoxicate the soul,\nEvery inch of this land is bound up with our very blood!”"
 joi_flavor_tur.92.a: "We swear never to turn back until the hour of our fatherland’s redemption and triumph!"
 joi_flavor_tur.92.b: "Glory to us, and to the state we have created!"
 joi_flavor_tur.92.c: "These Arabs have actually managed it?!"
 joi_flavor_tur.92.e: "Those accursed Arabs..."
 joi_flavor_tur.92.i: "Congratulations to our brethren in [SCOPE.sCountry('ARA_scope').GetName] on breaking the centuries-old yoke of the [SCOPE.sCulture('turkish_scope').GetName]s!"

 joi_flavor_tur.93.t: "The Revival of the Corsair Empire"
 joi_flavor_tur.93.d: "Under the leadership of [SCOPE.sCountry('corsairs_scope').GetName], Islamic [GetLawType('law_slave_trade').GetName] in the Mediterranean has risen once more. Through the control of such key corsair ports as #yellow [SCOPE.sState('TRIPOLI_state_scope').GetCityHubName]#! and #yellow [SCOPE.sState('CRETE_state_scope').GetCityHubName]#!, the Mediterranean pirate bands—thought extinct after the two Barbary Wars, the British bombardment of Algiers, and the Fly-Whisk Incident—have now returned under the protection of the [SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting] navy."
 joi_flavor_tur.93.f: "“It is written in their Qur’an that all peoples who do not acknowledge the Prophet are sinners, and that the faithful possess both the right and the duty to plunder and enslave them; and that every Muslim who falls in this war shall surely enter Paradise. He also said that the first man to board an enemy ship may claim an extra slave, and that when they leap upon the enemy deck each sailor carries a dagger in either hand and a third in his teeth; this commonly throws the enemy into such terror that they beg for mercy at once.”"
 joi_flavor_tur.93.a: "Set sail—your corsair [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has returned!"
 joi_flavor_tur.93.b: "These Barbary dogs!"
 joi_flavor_tur.94.t: "The Corsair Raids of [SCOPE.sCountry('TUR_scope').GetName]"
 joi_flavor_tur.94.d: "The corsairs of [SCOPE.sCountry('TUR_scope').GetName] have raided parts of the Mediterranean coasts of #yellow Iberia#! and #yellow Occitania#!, bringing loss and turmoil to the region. [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting], meanwhile, has profited handsomely."
 joi_flavor_tur.94.f: "“My master, my lord, is a man of immense patience; but he knows well what measures ought to be taken against states that exhaust that patience with empty words of friendship,” he said. “I must have a transport ship filled with slaves and goods, just like the one you once sent in tribute to the Algerines.”\n\n“There is no mention of any transport ship in the treaty! We would rather fight than submit to such extortion,” protested the Governor. “You have just received these precious jewels—have you no shame in making such a demand?”\n\nThe Sultan blew a cloud of smoke from his pipe. “We think all this mere bluster; we can see how you continue to contend with [SCOPE.sCountry('TUR_scope').GetName]. Your ridiculous conduct can bring you nothing but contempt and ridicule.”"
 joi_flavor_tur.94.a: "Heh heh heh..."
 joi_flavor_tur.94.b: "Blast these [SCOPE.sCountry('TUR_scope').GetName] corsairs!"
 joi_flavor_tur.95.t: "The Corsair Raids of [SCOPE.sCountry('TUR_scope').GetName]"
 joi_flavor_tur.95.d: "The corsairs of [SCOPE.sCountry('TUR_scope').GetName] have raided parts of the Mediterranean coasts of #yellow Italy#! and #yellow the Balkans#!, bringing loss and turmoil to the region. [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting], meanwhile, has profited handsomely."
 joi_flavor_tur.95.f: "“If I succeed, it is for us all; if I fail, it is for myself alone,” he wrote in a letter, quoting a passage from a classical memoir. “But,” he added in an exaggerated flourish, “any personal risk is preferable by far to the humiliation of treating with vile pirates over ransom for the lawful heirs of liberty. To speak plainly, I would rather lose peace, even be impaled, than make such concessions. Is my country incapable of indignation?”\n\n“It is not,” replied the Sultan, “for we have waited so long upon our demands, and you have not repaid our patience in the slightest. All the maritime states receive the same demands from us every two or three years; and you, like the other Christians, shall have to submit to them.”"
 joi_flavor_tur.95.a: "Heh heh heh..."
 joi_flavor_tur.95.b: "Blast these [SCOPE.sCountry('TUR_scope').GetName] corsairs!"
 joi_flavor_tur.96.t: "The Corsair Raids of [SCOPE.sCountry('TUR_scope').GetName]"
 joi_flavor_tur.96.d: "The corsairs of [SCOPE.sCountry('TUR_scope').GetName] have raided parts of the Mediterranean coasts around the #yellow Dnieper#!, #yellow the Caucasus#!, and #yellow the Danube#!, bringing loss and turmoil to the region. [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting], meanwhile, has profited handsomely."
 joi_flavor_tur.96.f: "“Only a few days ago,” wrote the official, “they demanded eighty coins of twenty-four pounds each. At this rate, when shall our payments ever end? I can no longer speak of resistance and coercion: the operations of our fleet this season have been of no help whatever to my efforts. The so-called fleet sent by the government to cruise these waters would have been better replaced by frigates commanded by mercenaries.”\n\n“Quite the reverse. We had expected to receive the full terms of the peace arrangement within the year, yet they have brought us nothing at all, despite the many hints we offered the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]s in the hope that they might show some token of sincere friendship. To this day, however, we have received no sign whatever of any true friendship on their part.”"
 joi_flavor_tur.96.a: "Heh heh heh..."
 joi_flavor_tur.96.b: "Blast these [SCOPE.sCountry('TUR_scope').GetName] corsairs!"
 joi_flavor_tur.97.t: "[SCOPE.sCountry('TUR_scope').GetName] Plunders Merchant Shipping"
 joi_flavor_tur.97.d: "The corsairs of [SCOPE.sCountry('TUR_scope').GetName] have attacked a merchant convoy of [SCOPE.sCountry('unlcky_scope').GetName] passing through the Mediterranean on trade. The wealth aboard has been plundered, the vessels seized, and many [SCOPE.sCountry('unlcky_scope').GetAdjectiveNoFormatting] merchants have suffered grievous losses."
 joi_flavor_tur.97.f: "“To force the merchantmen of [SCOPE.sCountry('unlcky_scope').GetName] to sail under the flag of [SCOPE.sCountry('TUR_scope').GetName] to Constantinople, and to employ them for such a purpose, has deeply affronted not only the Marshal himself but the [SCOPE.sCountry('unlcky_scope').GetAdjectiveNoFormatting] people as well. Whatever short-term advantage may have accrued to our interests from the measure, the insult involved is of so grave a character that, at the proper time, it may become necessary to review the matter anew. In light of this, the Marshal hopes that no one will make any remark or take any action that might unnecessarily hamper the competent authorities in any examination of the affair that may serve to uphold the honour of the nation.”"
 joi_flavor_tur.97.a: "Well done, lads!"
 joi_flavor_tur.97.b: "Send a protest to [SCOPE.sCountry('TUR_scope').GetName]!"

 joi_flavor_tur.98.t: "The Muharrem Decree"
 joi_flavor_tur.98.d: "The grave debt crisis of [SCOPE.sCountry('TUR_scope').GetName] has compelled the Sublime Porte to begin issuing government bonds to the European Great Powers. Yet the threat of insolvency has alarmed European bankers, and under their pressure the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] debt question has now been laid before the governments of the various powers."
 joi_flavor_tur.98.f: "“The Government of [SCOPE.sCountry('TUR_scope').GetName], having regard to the declaration made by its representatives at the conference of [TimeKeeper.GetCurrentDate.Format('y m d')], and in accordance with the obligations it assumed in its note, together with the supplementary note of the same year, invites the creditors of the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Public Debt to elect a certain number of representatives and send them to Constantinople with all possible speed, there to negotiate directly with the Sublime Porte upon a fair and practical scheme for the reorganisation of the [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Public Debt, and to discuss the resumption of interest payments and the repayment of principal.”\n\n“On the side of the Imperial Government, a special commission has been appointed to negotiate with these representatives. Its deliberations began on 1 September of this year and continued through September, October, November, and December. At length complete agreement was reached between the Imperial commissioners and the representatives, and this settlement was confirmed by minutes signed by both parties. Upon that basis, the Imperial Government shall promulgate the terms.”"
 joi_flavor_tur.98.a: "Let us hope this borrowing settles the matter once and for all..."
 joi_flavor_tur.98.b: "It seems the financial troubles of the [SCOPE.sCulture('turkish_scope').GetName]s are already quite severe?"
 joi_flavor_tur.98.c: "Even if we go bankrupt, we refuse to borrow from foreigners!"
 joi_flavor_tur.99.t: "A New Public Debt?"
 joi_flavor_tur.99.d: "[SCOPE.sCountry('TUR_scope').GetName] is attempting to secure a new #O Public Debt#! from [SCOPE.sCountry('debt_lender_scope').GetName]. Though the Sublime Porte has pledged the reliability of the bond, the bankers of [SCOPE.sCountry('debt_lender_scope').GetAdjectiveNoFormatting] remain anxious about the possibility of bankruptcy."
 joi_flavor_tur.99.f: "“It is evident enough that the rate of interest cannot itself be the reward of saving or waiting. For if a man keeps his savings wholly in cash, then, though the amount he has saved remains the same, he earns no interest whatsoever. On the contrary, the very definition of interest tells us plainly that it is the reward for providing liquid funds for a specified period.”\n\n“By similar reasoning, one might deny that wages are the reward of labour, or profit the reward of risk, since labour is sometimes undertaken without any expected or realised return, and since men know full well that those who run financial risks may end in loss rather than profit.”"
 joi_flavor_tur.99.a: "The [SCOPE.sCountry('debt_lender_scope').GetAdjectiveNoFormatting]s are miserly indeed!"
 joi_flavor_tur.99.b: "Our thanks to [SCOPE.sCountry('debt_lender_scope').GetName] for its generosity!"
 joi_flavor_tur.99.c: "Let them borrow, let them borrow—we are generous saviours, after all!"
 joi_flavor_tur.99.e: "Let them go and borrow from their own Allah!"
 joi_flavor_tur.100.t: "The Sovereign Debt Decree of [TimeKeeper.GetCurrentDate.Format('y')]"
 joi_flavor_tur.100.d: "Through the efforts of [SCOPE.sCountry('TUR_scope').GetName], the #O Public Debt#! question that has plagued the Sublime Porte for so many years has at last been resolved. Though the treasury of the Imperial Government has been all but emptied by the vast burden of interest, the debt that threatened the sovereign independence of [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] has finally been paid off by the Porte today."
 joi_flavor_tur.100.f: "“Thus every individual endeavours, so far as he can, to employ his capital in support of domestic industry, and to direct that industry in such a manner that its produce may be of the greatest value; and he thus necessarily labours to render the annual revenue of society as great as possible. In truth, he commonly neither intends to promote the public interest, nor knows to what degree he is promoting it.”\n\n“By preferring the support of domestic to that of foreign industry, he intends only his own security; and by directing that industry so that its produce may be of the greatest value, he intends only his own gain. In this, as in many other cases, he is led by an invisible hand to promote an end which was no part of his intention.”\n\n“Nor is this always the worse for society. By pursuing his own interest, he frequently promotes that of society more effectually than when he really intends to promote it.”"
 joi_flavor_tur.100.a: "Gold leaves the treasury, and sovereignty returns to the palace!"
 joi_flavor_tur.100.b: "A happy outcome indeed—at the very least, the money we lent has returned intact, with interest attached!"

 joi_flavor_tur.101.t: "Atatürk"
 joi_flavor_tur.101.d_1: "Under the vigorous reforms of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetName] has been wholly transformed: a homogeneous, united, and secular nation has been forged, and the values of #V liberalism, secularism, and nationalism#! are now held to be among the defining principles of the [ROOT.GetCountry.GetAdjectiveNoFormatting] nation. With the backing of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’s supporters, the [ROOT.GetCountry.GetAdjectiveNoFormatting] National Assembly has resolved to confer upon [ROOT.GetCountry.GetRuler.GetFullName] the title of #yellow Atatürk#!, meaning #yellow Father of the Nation#!."
 joi_flavor_tur.101.d_2: "The former [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [SCOPE.sCharacter('liberalism_leader').GetFullName], has passed away. He was regarded as the most important leader of [ROOT.GetCountry.GetName] in this age, the man who reshaped the #yellow [ROOT.GetCountry.GetAdjectiveNoFormatting]#! nation—though that nation still remained, in many respects, short of the ideal he had hoped to achieve. As the highest tribute to his memory, the [ROOT.GetCountry.GetAdjectiveNoFormatting] National Assembly has resolved to bestow upon [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('liberalism_leader').GetFirstName] the title of #yellow Atatürk#!, meaning #yellow Father of the Nation#!."
 joi_flavor_tur.101.f: "“By complete independence, we of course mean complete freedom in every sphere—economic, financial, judicial, military, and cultural alike. To lose independence in any one of these is equivalent to losing all independence for the state and the nation: we must liberate our sense of justice, our laws, and our legal institutions from the fetters that still bind us, though they no longer accord with the needs of our century.”\n\n“There is no logical explanation for depriving women of their political rights: any hesitation or negative attitude on this question is nothing more than a social phenomenon gradually fading into the past. Women must possess both the right to vote and the right to be elected; because democracy requires it, because women have interests that must be defended, and because they have social duties that must be fulfilled.”\n\n“On the day of his funeral, I was at my post, weeping bitterly at the finality of death. Today I am not sorrowful, for fifteen years of experience have taught me that Atatürk shall never truly die.”"
 joi_flavor_tur.101.a: "May the [ROOT.GetCountry.GetAdjectiveNoFormatting] state prove worthy of inheriting the mantle of #yellow Atatürk#!..."
 joi_flavor_tur.101.b: "#yellow Atatürk#! forged a truly independent and free [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 joi_flavor_tur.101.c: "#yellow Atatürk#! shall be remembered by history as one of the greatest founders of states in this century."
 joi_flavor_tur.101.e: "He is the Washington of our nation. #yellow Atatürk#! shall be remembered by history as one of the greatest founders of states in this century."
 joi_flavor_tur.101.g: "He is the Washington of our nation. #yellow Atatürk#! shall be remembered by history as one of the greatest founders of states in this century."
